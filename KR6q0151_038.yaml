body:
  text: 武林十八㵎理安禪寺住持婁東行悅集頭首四節秉拂大慧杲禪師結夏秉拂聲前逈逈一路子黃面瞿曇不知一句明明百草頭碧眼胡兒罔措閙浩浩處靜悄悄靜悄悄處閙浩浩直下如王寶劍誰敢當頭擬犯鋒鋩橫尸萬里更說甚麼似地擎山不知山之孤峻如石含玉不知玉之無瑕更說甚麼香象渡河徹底截流而過更說甚麼全明全暗雙放雙收須知恁麼來者寸絲不挂恁麼去者堆山積嶽將錯就錯以大圓覺為我伽藍身心安居平等性智九十日內和泥脫墼到者裏若有轉身一路則不守自家活計豈遵先聖軌儀所以道全鋒敵勝罕遇知音同死同生萬中無一且道同生同死底是甚面目驀拈拄杖云趙州和尚來也金佛不度爐木佛不度火泥佛不度水卓一下云百雜碎沒縫罅明眼衲僧盲聾瘖啞金剛水際藏身非非想天走馬一即一切一切即一盡大地是箇解脫門是人知有且道石室行者踢碓因甚麼忘却移腳良久喝一喝復舉三聖道我逢人即出出則不為人興化道我逢人即不出出則便為人真淨和尚云兩箇老古錐竊得臨濟些子活計各自分疆列界氣衝宇宙使明眼人只得好笑師云真淨老人大似欺誣亡沒杲上座即不然豁開三要三玄路坐斷須彌第一峯且道在三聖分上耶在興化分上耶具眼者辨取天如則禪師杭州淨慈禪寺結夏節秉拂問答畢乃云有法可說是名謗法無法可說亦名謗法不見一法是大過患若見一法亦是過患恁麼也不得不恁麼也不得恁麼不恁麼總不得三世諸佛歷代祖師到者裏結舌有分只如道法非見聞覺知不離見聞覺知竪拂云還見麼擊拂云還聞麼既見了既聞了畢竟是有法耶是無法耶喝一喝者裏是甚麼境界說有說無衲僧家向銀山鐵壁裏突出金剛眼睛徹見佛祖肝腸無絲毫滲漏和他命根一拶拶斷然後全主全賓全殺全活趂動南山白額吞却無毛大蟲不妨鼻孔裏聽聲眉毛上吐氣恁麼也得不恁麼也得恁麼不恁麼總得是謂我為法王於法自在說甚麼安居禁足尅期取證大好無繩自縛去也者箇猶是作用邊事若曰真正舉揚且待上方拄杖子出來露箇消息卓拄杖云驚群須是英靈漢敵勝還他獅子兒楚石琦禪師徑山首座寮結夏秉拂拈拄杖云者箇是徑山拄杖子為甚麼在琦上座手裏已知來處何假繁詞脫或未知不免露箇消息凌霄峯頂選佛場開一句當陽十方坐斷果然坐斷去久參先德不妨禁足護生後學初機誰敢違條起例上無攀仰下絶己躬人人常光現前箇箇壁立萬仞三世諸佛舌頭無骨六代祖師眼上安眉德山見僧入門便棒畫餅充饑臨濟見僧入門便喝望梅止渴老妙喜見僧入門便道喚作竹篦則觸不喚作竹篦則背不得下語不得無語雕沙無鏤玉之談結草乖道人之意既不得下語又不得無語拈來拗作兩截看他作箇什麼伎倆廣澤龍王忍俊不禁把須彌山一摑百雜碎𨁝跳上梵天去也召衆云且道者一期佛事還有為人處也無以拄杖連卓三下復舉南嶽讓和尚遣一僧往江西探馬大師候大師上堂出問云作麼生大師云自從胡亂後三十年不曾少鹽醬師云馬大師道三十年不曾少鹽醬早是費却多少鹽醬了也我若作馬大師才見者僧出來便下禪床擒住痛與一頓教他歸去舉似南嶽且顯師承有據自家眼目分明管取坐斷天下人舌頭曹溪一脉未致寂寥在用彰俊禪師靈隱秉拂大道本無背向擬心凑泊則差天是天地是地山是山水是水日月星辰運行四時有什麼過黃面瞿曇也大無端剛要立期立限使大地衆生據菩薩乘修菩薩行恰如群蚋聚一器中鼓發狂閙無有休息如斯禁制爭知靈山門下燈籠走入露柱佛殿騎却山門斯須之間䃲礴於上方拄杖頭上開安居法門說祕密王三昧法拈拄杖卓一下還聞麼古德道我為諸聖說不為凡夫說咄解制秉拂佛朗性禪師領衆赴京考試留天界居第一座解制秉拂獅子絃一奏群音悉絶正令全提凡聖結舌衆中有作家禪將直下出來人天衆前展陳開旗共建法幢有麼有麼良久云大衆便恁麼散去已是惡水不少既無莫怪秉拂上座將黑豆換却諸人眼睛去也驀拈拄杖卓一下云軟似兜羅又卓一下云硬如鐵壁天上天下古今不識若喚作禪道佛法正是小家惡口文章奇句亦是妄言綺語盡屬埋沒先宗得無纍乎諸人若向生佛已前各各腳跟下有一片無陰陽田地極是潔淨極是分曉不勞心力回頭一本來成現安樂受用無不如意說甚德山棒臨濟喝盡是太平奸賊亂世英雄明眼人在一場笑具更要九旬禁足結制解制懸沙止饑箭穿石裏然承堂頭和尚慈旨難以固辭只得暫借威光於萬指叢中馬頭截角况僧録司官諸位宗主和尚屈駕臨筵為法作證諸佛歡喜賢聖駢集人天交接并會中達官士庶七趣四生無邊凡聖八部天龍一切神衆普皆歡喜各各自聞廓徹妙旨更不敢加一絲毫頭佛法與諸人分上雖然如是疏山今日也要與諸人據欵結案去也卓拄杖喝一喝云直截根源佛所印摘葉尋枝吾不能復舉夜來堂頭和尚舉東山上堂云百煉黃金鑄鐵牛十分高價與人酬庭前不有花含笑又是東山一夏休古人與麼道畢竟意旨如何師云百煉黃金鑄鐵牛頭角覓不得十分高價與人酬大好行市庭前不有花含笑衆僧不歸單位又是東山一夏休秋初無雨白露看古人與麼道畢竟意旨如何釣竿斫盡重栽竹不得鯤鯨誓不休顧視大衆云委悉麼喝一喝云癡人面前不得說夢久立衆慈伏惟珍重下座冬夜秉拂大慧杲禪師冬至秉拂豁開戶牖妙手畫難成當軒者誰擡眸已蹉過不是心不是佛不是物不是禪不是道三世諸佛說不及六代祖師傳不到便恁麼去只是箇無孔鐵鎚直饒出得荊棘林未免死於平地上所以道言無展事語不投機承言者喪滯句者迷可中有箇出情塵超物外不承言不滯句百草頭上薦得祖師閙市裏識得自己直下如龍得水似虎靠山腳跟下正好朝打三千暮打八百何故我王庫內無如是刀若是出格道流必不作者般去就雖然如是盡法無民今夜放一線道與諸人相見舉起拂子云君子道長畫一畫云小人道消滴水一滴凍節令不相饒狸奴白牯鼻繩斷水底藏身被火燒擊禪床一下復舉本仁示衆云尋常不欲向聲前句後鼓弄人家男女何故且聲不是聲色不是色有僧問如何是聲不是聲仁云喚作色得麼僧云如何色不是色仁云喚作聲得麼僧禮拜仁云且道為儞說答儞話若人辨得許儞有箇入處師云本仁將一穿雲居子換却天下人眼睛却被者僧將一條斷貫索不動干戈穿却鼻孔後來舜老夫拈云本仁既已入草者僧又落深村然則陽春雪曲時人難和村歌社舞到處與人合得著師云舜老夫是則也是未免隨摟摗秉拂上座不惜眉毛為諸人說破聲不是聲色不是色馬後驢前神出鬼沒雪曲陽春和不齊村歌社舞且淈𣸩以拂子擊禪床云者箇決定不是聲復舉起云者箇決定不是色且畢竟是箇甚麼喝一喝云此時若不究根源直待當來問彌勒歲夜秉拂大慧杲禪師歲節秉拂百尺竿頭進一步甚麼處得者消息來萬仞峯前露一機墮在時人窠窟裏莫妄想放下著絶伎倆處便肯承當鼻孔索頭在我手裏所以南泉道牽牛向溪東放不免食他國王水草牽牛向溪西放亦不免食他國王水草不如隨分納些些總不見得杲上座隨分納些些去也良久云釋迦掩室於摩竭耕地種蒺䔧淨名杜口於毗耶錮鏴著生鐵須菩提唱無說以顯道餿飯祭閒神釋梵絶聽而雨華果有領受者直饒向上一路千聖不傳硬糾糾活鱍鱍棒下無生忍臨機不見師也是隔靴抓癢總不恁麼落在無事界中且作麼生通得箇機關應得箇時節去驀拈拄杖卓一下云還委悉麼差之毫𨤲失之千里孟春猶寒終而復始釋迦老子是繫驢橛一大藏教是破故紙如我按指海印發光汝暫舉心塵勞先起超佛越祖之談未語已前向諸人腳跟下蹉過了也畢竟如何毗婆尸佛早留心直至如今不得妙又卓一下復舉僧問鏡清新年頭還有佛法也無清云有僧云如何是新年頭佛法清云元正啓祚萬物咸新僧云謝師答話清云山僧今日失利又僧問明教新年頭還有佛法也無教云無僧云年年是好年日日是好日為甚麼却無教云張公喫酒李公醉僧云老老大大龍頭蛇尾教云山僧今日失利師云二尊宿一人向高高峯頂立不露頂一人向深深海底行不濕腳是則也是未免有些誵訛今夜或有人問杲上座新年頭還有佛法也無只向他道今日一隊奴僕在茶堂裏村歌社舞弄些神鬼直得點𮌎尊者惡發把鉢盂峯一擲擲過恆河沙世界之外驚得憍陳如怕怖慞惶倒騎露柱跳入擔板禪和鼻孔裏撞倒舒州天柱峯安樂山神忍俊不禁出來攔𮌎搊住云尊者儞既稱阿羅漢出三界二十五有塵勞超分段生死因甚麼有許多無明被者一問不勝懡㦬却回佛殿裏第三位打坐依舊點𮌎點肋道天上天下惟我獨尊自云住住杲上座他問新年頭佛法為甚麼一向虗空裏打筋斗說脫空謾人良久云杲上座今夜失利用彰俊禪師淨慈首座寮秉拂一年三百六十日結交頭一句子要與本地相契無一毫頭走作始得如或走作不落妙勝境界便入顛倒海裏衲僧家如百煉精金入水入火不為火水所變入淨入穢不為淨穢所移故此南屏門下現前一衆壁立萬仞滴水氷生又管甚三陽布令四序開端上方拄杖子聞與麼道踴躍出來與秉拂上座交相慶讚拈拄杖卓一下咄哉拙郎君巧妙無人識打破鳳林關著靴水上立喝一喝住持謝秉拂提綱雪巖欽禪師上堂謝一清叟并藏主秉拂夜月透靈犀寒光吞老蚌如是轉法輪乎沉乎萬象直得純清絶點固是真常流注打破相呈又成甚麼伎倆拍膝一下云山僧恁麼道也是無風起浪元叟端禪師上堂謝夏齊秉拂雪峯和尚云演一句則千句萬句流通拈向一邊飲一味則千味百味具足置之一壁雪峯低頭歸庵巖頭聞云雪峯與我同條生不與我同條死且作麼生臨朕砧井底種林禽今年桃李貴一顆直千金上堂謝秉拂首座說底見也見了聞也聞了藏主說底見也見了聞也聞了拈拄杖云拄杖子涌身虗空放大光明現大神變說四十二波羅密法門未見者直須見取未聞者直須聞取卓一卓只此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分上堂謝秉拂并夏齊舉趙州會下二僧相推不肯作第一座主事白州州云總教他作第二座主事云第一座教誰作州云裝香著主事云裝香了也州云戒香定香解脫香應庵叔祖云趙州下者一槌不妨驚群動衆子細檢點將來也是泥裏洗土塊薦福門下不用相推第一座也有人第二座也有人第三座也有人雖然不免從頭注過第一座鐵額銅頭不破第二座陽春白雪無人和第三座真實身心同達磨師云玉本無瑕雕文喪德趙州應庵之謂也中峯咬定牙關盡力𨁝跳出他綣繢不得亦未免從頭注過第一座露柱燈籠俱拶破第二座偏向淨缶裏吐唾第三座璞玉渾金能幾箇都寺營辦夏齊又且如何水長船高泥多佛大謝秉拂并夏齊上堂教中道於食等者於法亦等於法等者於食亦等都寺營齊內外悉皆飫飽是名食等首座秉拂內外悉皆見聞是名法等其施汝者不名福田供養汝者墮三惡道喝一喝下座上堂謝秉拂并夏齊無絃琴上撫出五音六律無底鉢中飣出七珍八寶未聞者得聞未飽者得飽碁盤石𨁝跳上天鉢盂池哮吼入海俱胝道者忍俊不禁將國一祖師坐禪石喝成三片直下恰似川字籀文喝一喝鐵關樞禪師謝首座秉拂上堂一機疾雷破山十聖三賢耳聾眼瞎一句獰龍攪海銅頭鐵額膽喪魂飛且道是甚麼句卓拄杖喝一喝不是我首座大難提持楚石琦禪師謝首座秉拂都寺辦齊上堂禪非意想以意想求之則乖道絶功𤏩以功𤏩擬之則錯安箇是立箇非捨箇迷就箇悟轉急轉緩轉親轉疏不能透過那邊多只住在者裏進則銀山萬疊退則鐵壁千尋拶得一路開挨得一線入元來自己便是銀山鐵壁到與麼地有甚麼奇特三德六味味逾多一句了然超百億愚庵及禪師謝齊秉拂上堂五祖和尚示衆云結夏無可管顧諸人未免作一家宴遂擡手云邏囉招邏囉搖邏囉送莫怪空疏伏惟珍重南屏冬至叢席荒凉直是無可施設賴有庫司都寺與堂中首座前日作那一場佛事不同小小離四句絶百非攪酥酪醍醐為一味鎔瓶盤叉釧為一金令我現前一衆三世諸佛歷代祖師五百十六大阿羅漢均飽禪悅法喜眼裏也飽耳裏也飽不覺手之舞之足之蹈之歡喜踴躍向宗鏡光中同聲讚歎云希有希有奇哉奇哉於食等者於法亦等於法等者於食亦等山僧只管端坐受供養且道與五祖相共多少良久云其施汝者不名福田供養汝者墮三惡道解制謝都寺辦齊藏主秉拂上堂咬破鐵餕餡百味具足演出大藏教一句該通三腳驢子弄蹄行萬里無寸草下座笑隱欣禪師謝秉拂上堂正印全提聖凡路絶箭鋒相拄照用同時一句子函蓋乾坤一句子奔流度刃儞有拄杖子我與儞拄杖子儞無拄杖子我奪却儞拄杖子謝首座秉拂都寺齊上堂還丹一粒點鐵成金至理一言轉凡成聖楊岐和尚道天得一以清地得一以寧衲僧得一時如何鉢盂口向天者裏透得非但轉凡成聖點鐵成金亦能與人抽釘拔楔解粘去縛提持綱要荷負叢林其或未然同器而食飯色有異謝首座秉拂都寺齊上堂問一答十問十答百當陽突出須彌盧於食等者於法亦等信口咬破鐵餕餡一句三玄一玄三要千牛拽不回先照後用先用後照俊鶻趂不及離四句絶百非則不問如何是摩訶衍法卓拄杖下座謝首座秉拂上堂舉大慧和尚在雲居圓悟會中作首座冬夜秉拂昭覺元禪師出問眉間挂劍時如何大慧云血濺梵天師云奇哉奇哉一千七百人善知識生氣凜然誰知二百年後金陵城中再逢作者如獅子筋琴一奏則衆絃皆絶如塗毒鼓一擊則聞者皆喪我此一衆親近承事勿生疲厭各隨根機成就法器雖然有際天之雲濤可容吞舟之魚有九萬里之風可負垂天之翼了庵欲禪師謝首座秉拂兼客至上堂南泉斬猫趙州戴草鞋而出興化法戰克賓設饡飯便行是皆發揮本有靈光要且不借別人鼻孔出氣所以前日首座說法高聳人天今朝道伴相過光揚宗眼且道山僧鼓兩片皮成得甚麼邊事拍禪床從前汗馬無人識只要重論蓋代功月分須知正月楊岐會禪師歲旦上堂春風如刀春雨如膏律令正行萬物情動儞道腳踏實地一句作麼生道出來向東涌西沒處道看直饒道得也是梁山頌子雲峯悅禪師歲旦上堂三十六旬竟今朝還復起剎那不相知諸法何曾爾尊卑敘禮儀歡戚同居止廓哉總持門而人不能啓玉兔金烏藏頭露尾以拂子擊禪床下座真淨文禪師歲旦上堂不見一法即如來方得名為觀自在諸禪德今日人人添一歲還見麼若不見又道人人添一歲若見在甚麼處安著既見著處便見出處出處既明方能世出世間於法自在觀自在菩薩將錢買糊餅放下却是饅頭好諸禪德一年添一歲一歲一如來拈拄杖云拄杖子亦成佛也看歲旦上堂去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧連錐也無師云香嚴與麼道奇特甚奇特要且只知其貧不知其富洞山即不然去年富未是富今年富始是富去年富惟有一領墨黲布褊形今年富添得一條百衲山水袈裟歲朝抖擻呈禪衆實謂風流出當家諸禪德洞山與麼為復是不肯古人耶為復扶古人耶試辨看元旦上堂問話畢乃云一問一答皆是當人各各神通光明清淨妙心一一從自己運出來烜赫現前自是衆生迷情不覺不知改旦新元伏惟知事首座大衆尊候萬福良久云昨日今朝事不同人人依舊主人翁雖然平等添新歲夢覺元來總是空是空却不空二十空門元不著一性如來體共同喝一喝下座白雲端禪師歲旦上堂今日普天之下盡添一歲且道水牯牛還添也無添與不添且置且道牯牛鼻孔重多少若知得他鼻孔斤兩分明一任侵他人苗稼若也未然臘月三十日莫道春來草自青保寧勇禪師歲旦上堂昨日去年去今日今年來去年去不去今年來不來遍野盈尺雪大地亡纖埃無名無字人舉目聊徘徊五祖演禪師歲旦上堂元正啓祚萬物咸新揚盡大千沙界都來只在一塵乃展手云是新是舊有人出來道看若無四面且世諦流布去也遂叉手云孟春猶寒伏惟首座大衆洎諸知事尊體起居萬福歲朝上堂威音王已前也恁麼威音王已後也恁麼三世諸佛也恁麼西天四七東土二三也恁麼前年去年也恁麼明年後年更後年外後年也恁麼忽有箇出來道和尚和尚自云若不被他喚住便一百年也只恁麼復云元正啓祚萬物咸新去年乞火和烟得今日擔泉帶月歸運推移日南長至當軒有直道無人肯駐腳孟春猶寒伏惟首座大衆起居萬福蘇武牧羊海畔纍日欣然李陵望漢臺邊終朝笑發落在甚處仁義只從貧處斷世情偏向富門多元旦上堂元正啓祚西天此土萬物咸新獬豸麒麟應時納祐誠言不謬孟春猶寒萬種千般伏惟首座大衆普天齊用洎諸知事懷才抱義并諸化主如龍似虎尊體起居萬福直是如金如玉歲歲三百六十日管取粥足飯足圓悟勤禪師歲旦上堂元正啓祚打開門戶萬物維新天地同春應時納祐不落窠臼罄無不宜萬世一時孟春猶寒伏惟首座大衆起居萬福乞火和烟得擔泉帶月歸復云新年頭有佛法正是土上加泥新年頭無佛法又成當面蹉過到箇裏佛法世法有無新舊一時拈向一邊且不落夤緣一句作麼生道還委悉麼乾坤一合地糊餅日月兩輪天氣毬龍門遠禪師元旦上堂萬物咸新論故鄉擡眸元是舊爺娘先春花發馨香遠物外山河日月長復舉僧問百丈如何是奇特事丈云獨坐大雄峯僧禮拜丈便打師云錯打人僧問德山如何是奇特事山云我宗無語句亦無一法與人師云猶較些子僧問羅山如何是奇特事羅山云道什麼師云成何道理大衆古人鈎頭著餌意在得魚如今洗腳上船能有幾箇或有人問龍門如何是奇特事山僧向伊道此去太湖不遠恁麼說話有甚奇特又向伊道咫尺是棠梨大衆還會麼等閒如不會須作等閒看下座元旦上堂以拄杖畫一畫云天得一斗牛女虗危室畢地得一草木山河并土石君得一上下四維無等匹召大衆云萬象森羅影現中一顆圓明光的歷有歡榮有愁戚或冤親或順逆富且貴貧且乞萬樣千般誰運為空谷之聲隨應出鴛鴦繡了任君看不露金針太綿密褒禪奉勸各回頭莫待臨行却啾唧識取摩訶般若光萬古悠悠是今日久立大慧杲禪師歲旦上堂拈拄杖空中作書字勢云歲朝把筆萬事皆吉應時納祐慶無不宜若作世諦流布平地喫交更在佛法商量眉鬚墮落卓拄杖下座歲旦上堂去年今日也只是者箇前年今日也只是者箇先前年今日也只是者箇外前年今日也只是者箇明年今日也只是者箇後年今日也只是者箇外後年今日也只是者箇更外後年今日也只是者箇且道者箇是什麼元正啓祚萬物咸新應時納祐慶無不宜喝一喝云俗氣不除歲旦上堂一年三百六十日今朝又是從頭起人人有箇主人公水牛銜却老鼠尾深沙歡那吒喜佛殿走出三門去僧堂撞入厨庫裏敢問大衆還有不遷義也無自云有作麼生是不遷義東君行正令華發樹南枝應庵華禪師元正上堂舉僧問鏡清新年頭還有佛法也無清云有僧云如何是新年佛法清云元正啓祚萬物咸新僧云謝師答話清云鏡清今日失利僧又問智門新年還有佛法也無門云無僧云年年是好年為什麼却無門云張公喫酒李公醉僧云老老大大龍頭蛇尾門云智門今日失利師云二尊宿一人嘴長三尺一人項短二寸若檢點得出報恩今日失利元旦上堂古今天地古今日月古今人倫古今山河釋迦彌勒坐籌帷幄耶舍拭眼罷戰沙場且道功成名遂一句作麼生道萬人遐仰處紅日到中天元正上堂元正啓祚更無回互萬物咸新截鐵斬釘應時納祐跳出窠臼孟春猶寒言端語端知事頭首各各希有雲堂大衆雍容鄭重蔣山恁麼說話且道在裏許不在裏許若在裏許未免是箇流俗阿師不在裏許又著在什麼處所以道世人住處我不住世人行處我不行不是與人難共住大都緇素要分明密庵傑禪師歲旦上堂元正一旦萬事成辦大乘小乘井索錢貫更問佛法如何也是秦時𨍏轢鑽松源嶽禪師歲旦示衆元正改旦萬事成現有時放行有時坐斷不惜兩莖眉和盤掇轉看佛法世法都盧一片既是佛法世法如何得成一片但辨肯心必不相賺靈隱遠禪師上堂新歲有來由烹茶上酒樓一雙為兩腳半箇有三頭突出神難辨相逢鬼見愁倒吹無孔笛促拍舞凉州咄淨慈昌禪師元旦上堂舉拂子曰歲朝把筆萬事皆吉忽有箇漢出來道和尚這箇是三家村裏保正書門底為甚麼將來寶華王座上當作宗乘祇向他道牛進千頭馬入百匹石霜鑒禪師上堂送舊年迎新歲動用不離光影內澄輝湛湛夜堂寒借問諸人會不會若也會增瑕纇若不會依前昧與君指箇截流機白雲更在青山外高峯妙禪師歲旦示衆百年難遇歲朝春姹女梳粧越樣新惟有東村王大姐依前滿面是埃塵歲旦示衆山僧去年三十六今年又添一歲諸人共知拈拄杖云且道拄杖子年多少擊禪床云元正啓祚萬物咸新萬壽念禪師歲旦上堂往復無際動靜一源含有德以還空越無私而逈出昔日日今日日照無兩明昔日風今日風鼓無兩動昔日雨今日雨澤無兩潤於其中間覓去來相而不可得何故自他心起起處無蹤自他心忘忘無滅跡大衆若向者裏會去與天地而同根共萬物而為一體若也未明山僧為你重重頌出元正一古佛家風從此出不勞向上用工夫歷劫何曾異今日元正二寂寥冷淡無滋味趙州相喚喫茶來剔起眉毛須瞥地元正三上來稽首各和南若問香山山裏事靈源一派碧如藍遂喝一喝下座護國昌禪師上堂拈拄杖卓曰三十六旬之開始七十二候之起元萬迎和氣之時東帝布生成之令直得天垂瑞彩地涌禎祥微微細雨洗寒空淡淡春光籠野色可謂應時納祐慶無不宜盡大地人皆添一歲敢問諸人且道那一人年多少良久曰千歲老兒顏似玉萬年童子𩬆如絲萬杉堅禪師歲旦上堂有一人不拜歲不迎新寒暑不能侵其體聖凡不能混其迹從來鼻孔遼天誰管多年曆日大衆且道此人即今在甚麼處卓拄杖曰咄咄咄沒處去大梅英禪師元旦上堂三十六旬之始七十二候之初末後一句則且置祇如當頭一句又作麼生道拈拄杖曰歲朝把筆萬事皆吉急急如律令大衆山僧恁麼舉唱且道還有祖師意也無良久曰記得東村黑李四年年親寫在門前卓拄杖下座劍門分禪師元旦上堂弄虗頭徒費力寒暑不能變真實堂堂受屈深可憐幾度年年正月一拈起殺人刀火後莖茅萬丈高放下活人劍不是貴兮不是賤縱橫殺活如獅子出林群狐絶蹤跡年年是好年日日是好日大鵬不作老鴉飛黃河九曲纖纖直喝一喝下座
