body:
  text: 武林十八澗理安禪寺住持婁東行悅集白椎後垂語臨濟玄禪師府主王常侍與諸官請師開堂云山僧今日事不獲已曲順人情方登此座若約祖宗門下稱揚大事直是開口不得無你措足處山僧此日以常侍堅請那隱綱宗還有作家戰將直下展陳開旗者麼對衆證據看道吾真禪師開堂日云便與麼觀得一時著便若論玄微見與不見一時𭣟瞎在北禪上堂云青山峭峻白日如梭龍門無客鬧市人多諸人且道即今下菜行頭有幾人納稅百姓法華舉禪師開堂云夫第一義諦非智辨所詮心機所測教外別傳不立文字既到者裏復且如何直須坐斷毗盧不存凡聖還能如是麼若也未能山僧重説偈言去也不結毗盧印那弘古佛心明月照幽谷寒濤助夜砧諸人委悉麼各希發問大愚芝禪師開堂日云還有人委得落處麼若委得隨機利物應化無方天上人間出沒卷舒縱橫自在若也未委落處釋迦老子三世諸佛二十八祖天下老和尚一時拋在爐中從聽老僧葛藤慈明圓禪師南源開堂云大衆會麼宜陽秀水南嶽石橋若也不會謾你諸人去也所以道達磨西來教外別傳一句且道別傳箇什麼直指人心見性成佛祇如諸人盡是祖師指出底人還信得及麼若信得及與祖佛同參若信不及可謂自生退屈此日一會不是小緣將一瓣香為我無得禪師且道諸人還識無得禪師麼若也不識有疑請問雲峯悅禪師開堂日云祖禰不了殃及子孫事到如斯寧容分雪所謂出世利生之事呼為第一義門但有言説多無實義諸人若也委悉山僧出世事畢其或未然有疑請問真淨文禪師開堂日白椎畢師召大衆云當須自觀若此觀者名為正觀若他觀者名為邪觀邪正未分有疑請問聖壽開堂白椎竟良久乃云會麼少室峯前曾示此高安灘上復誰傳會中若有仙陀客莫學神光廢九年遂喝云有疑請問報寧開堂白椎竟乃垂一足云大衆為是一耶二耶良久云上士一決一切了中下多聞多不信有疑請問白雲端禪師開堂日白椎竟顧視左右云便與麼散去自古自今如麻似粟若言更有如何若何曹溪一路平沉所以從上諸聖皆向火𦦨裏出來垂手只要一切人眼橫鼻直去今日衆中有大家垂手者麼出來保寧勇禪師開堂日白椎罷顧衆云委悉麼若不委悉為蛇畫足去也古佛巖前千華競秀曹溪源上萬派歸流莫有陟巇嶮涉渺瀰者麼不顧危亡便請相見五祖演禪師四面開堂云若論第一義西天二十八祖唐土六祖立在下風一大藏教白雲萬里摩竭掩室毗耶杜口正在夢中千佛出世𥧌語未了文殊普賢拗曲作直所以道設使言前薦取猶是滯殼迷封縱饒句下精通未免觸途狂見若也把定封疆説什麼法堂前草深一丈直得凡聖路絶鳥飛不度天下衲僧無出氣處衆中莫有不甘底麼出來相見海會開堂白椎罷乃云金鏃慣將平祖道鐵鞭多力恨無讐莫有不顧危亡底衲僧麼出來相見東山開堂白椎罷乃云當觀第一義寶劍霜鋒利掣電隔三千最勝無倫譬眼辨手能親出來相比試雪竇顯禪師萬壽開堂白椎了師云宗乘一唱三藏絶詮祖令當行十方坐斷其有達士不避死生眨上眉毛出衆相見住雪竇開堂白椎了乃云如來正法眼藏委在今日放行則瓦礫生光把定則真金失色權柄在手殺活臨時其有作者共相證據龍門遠禪師開堂日白椎罷乃云觀即不一一即不觀第一義門今在何所圓悟勤禪師崇寧開堂白椎竟乃云駕千鈞弩一擊便行射透鐵圍不容擬議一言之下殺活全彰寸機之中包括群象直須當頭點破可以千眼頓開更若四顧躊躇便見撈天摸地有搆得底出衆相見夾山入院開堂云野猿抱子歸青嶂幽鳥銜花過碧巖此地昔年曾作客今茲為主愧無慙衆中還有辨得賓主底衲僧麼入院開堂云炎炎伏暑離青嶂肅肅清秋渡碧湘古殿耽耽松檜密無塵金地足清涼既到者裏還有本色衲僧麼出來共相證明住雲居先於南康軍開堂白椎竟乃云包融萬有聲振大千乃佛乃祖頂門開若天若人方寸濶便恁麼薦得不妨省要苟或踟蹰落在第二義門去也還有箭鋒相拄底衲僧麼出來共相激揚虎丘隆禪師住開聖白椎竟乃云垂鈎四海祇釣鯨鰲離鈎三寸莫有道得底出來道看大慧杲禪師住徑山白椎竟乃云諸方舊例今古常儀直饒千佛世尊次第出世升于此座末上也少者一杓惡水不得莫有回避得底麼出來證據應庵華禪師明果入院開堂白椎竟乃云證第一義諦空名獅子吼獅子既吼狐狼屏迹異類潛蹤莫有共相出手底麼出來相見住蔣山白椎罷乃云若論第一義如紅爐上一點雪相似若也聽不出聲見不超色何妨出衆決疑密庵傑禪師靈隱開堂白椎竟乃云正令已行千差削迹佛佛從茲授手祖祖於是相傳恁麼會得便乃高揖釋迦不拜彌勒其或尚留觀聽何坊致問住靈隱白椎竟乃云第一義諦空洞無象表裏一如佛及衆生盡為增語且作麼生觀若有心觀屬妄想無心觀屬斷見不有不無心觀顢頇佛性莫有具透關眼底衲僧出來大家擎展了覺圓禪師開堂上首白椎竟師良久曰直饒阿那律天眼未解諦觀便是千手大悲焉能提掇衆中莫有不甘者麼出來掀倒禪床喝散大衆然雖如是未是作家且於第二門中與衲僧出氣金山惟仲禪師開堂上首白椎竟師顧左右曰還會麼獅子奮迅象王回旋於斯明得不妨省力其或不然有疑請問上方益禪師開堂上首白椎罷師曰白椎前觀一又不成白椎後觀二又不是到者裏任是鐵眼銅睛也須百雜碎莫有不避危亡底衲僧試出來看元叟端禪師住鳳山開堂云拈一機則千機萬機頓赴如刻人糞作旃檀香舉一句則千句萬句朝宗似持蠡㲉量大海水莫有淨裸裸赤灑灑獨脫無依底麼出來共相證據恕中慍禪師住瑞巖白椎竟乃云諸佛出世是第二頭祖師西來是第三首饒你向威音那畔別立生涯百草頭邊全明殺活布袋裏老鴉子未知有出身一路在作麼生是出身一路楚石琦禪師住福臻白椎竟乃云早是第二義了也餉間便是第三義然當爐不避火迸新長老今日性命在諸人手裏一任橫拖倒拽重賞之下必有勇夫有麼有麼住鳳山開堂云寶印當空妙重重錦縫開不費纖毫力提掇鳳山來放行則萬象回春把住則千峰寒色且道把住好放行好試出來道看本覺開堂云現成公案不用安排無孔鐵鎚有什麼限稍知觸淨便好商量光孝開堂云言迹之興異途之所由生直截根源底出衆相見鐵關樞禪師普載開堂云火雲燒碧空長街氷片片具眼底衲僧何妨出見笑隱欣禪師集慶開堂白椎罷乃云第一義諦明如杲日寬若太虗萬彚森然纖塵不立明今舉古無非節外生枝立主立賓何異虗空釘橛然聖旨建寺諸官臨筵不可只恁麼休去還有共相激揚底麼南石琇禪師住靈巖白椎竟乃云龍象圍繞燈燭煒煌一會靈山儼然未散還有共相證據者麼住徑山白椎竟乃云舉不顧即差互擬思量何劫悟還有超然獨脫不落此轍者麼月江印禪師住育王開堂云若論第一義諦譬如虗空體非群相而不拒彼諸相發揮莫有向虗空裏釘橛者麼未入院當道請就別剎開堂提綱大愚芝禪師筠州府主李密諫請就上藍開堂問答畢乃云問話且止山僧道薄人微素無德行叨承密諫諸官僚同伸堅請升於此座上答皇恩國祚永安法輪常轉且道法輪作麼生轉欲得會麼須彌山上倒翻身却來堂中疊足坐阿呵呵是什麼飯籮裏坐却受餓和泥合水與麼過上士聞之熙熙下士聞之肯可子細思量却成口過要會麼一六三四二直言曲七一桃李火中開黃昏候日出久立尊官伏惟珍重楊岐會禪師興化寺開堂若有問話者請出來諸供養中法供養最勝若據祖宗令下祖佛潛蹤天下黯黑豈容諸人在者裏立地更待山僧開兩片皮雖然如是且向第二機中説些葛藤繁興大用舉必全真既立名真非離真而立立處即真者裏須會當處發生隨處解脫此喚作閙市裏上竿子是人總見你道金不博金一句且作麼生道還有人道得麼試出來踣跳看如無山僧今日失利但某此際榮幸伏遇知府龍圖通判駕部洎諸官僚請住雲蓋道場可謂諸官願弘深廣為國忠臣建立法幢上嚴帝祚然願諸官壽齊山嶽永佐明君作大股肱為佛施主諸院尊宿在會信心世世生生共營大事久立珍重雲峰悅禪師赴翠巖師在上藍開堂問答畢乃云問話且止佛法正論非競辨而可求擊揚鏗鏘以摧異學諸祖之道豈其然乎所以一大藏教不能自詮十方諸佛不能提唱輝騰今古逈絶見知圓滿十虗寧有方所只為情生智隔想變體殊雖終日行而不自覺是似勞他先聖回首塵勞曲開方便方便即有還證明得麼若也證明得便能隨機利物應化無方出沒卷舒人間天上雖然如是即不得向衲僧門下何故笑破他口圓悟勤禪師奉敕赴雲居到南康軍當道先請開堂以祖佛為𣗖準與祖佛作師以人天為梯航與人天作眼忽若不倚一物孤逈逈峭巍巍千聖莫能知萬靈沒照鑑截斷一切不涉廉纖把斷世界不漏絲髮人天衆前如何剖露若向箇裏上絶攀仰下絶己躬等間如金翅鳥劈海直取龍吞似獅子兒出窟妖狐絶迹當鋒略露不免道箇山是山水是水僧是僧俗是俗開慈悲方便門留通途受用底忽若轉山不是山水不是水僧不是僧俗不是俗到箇裏還有出身處麼若有出身處便可以高揖釋迦不拜彌勒坐斷毗盧頂不稟釋迦文束虗空作拄杖也打他不得合百千萬聚雷作一喝也驚他不動且道此人畢竟如何親近只如今各各當陽不背不向不立一絲毫頭解路不作一纖塵機關正當恁麼時把斷乾坤一句作麼生道雕弓已挂狼煙息萬國歌謠賀太平復云龍床角頭親賜得天上雲居古道場安樂樹邊藏拙訥更無佛法可商量既無佛法却舉箇古人公案記得神鼎山諲禪師開堂示衆云山僧行腳也無正因只待向東京城裏聽一兩本經論於古寺間房且恁麼過時不謂行到汝州葉縣被一陳業風吹到首山曲彔木床上見箇老和尚當時把不住禮却他三拜直至如今悔之不得師云者老漢參到生鐵鑄就處窮到無絲毫解路時所以向鐵壁銀山斬釘截鐵若不知有向上宗乘爭解與麼道然雖如是檢點將來二祖少林也禮三拜忽若水乳不分金鍮不辨有條攀條無條攀例山僧元豐末年為疑著箇祖師西來意十數載江表逢見大善知識便投誠咨參玄妙理性棒喝機關直是費盡工夫終無箇休歇去處及到海會遇見箇老和尚被他腦後一槌從此喪却目前機去却胸中物直至如今也分疏不下且道與古人是同是別還委悉麼羚羊挂角千峰外更有羚羊在上峰大慧杲禪師紹興七年赴徑山七月二十一日於臨安府明慶開堂拈香祝聖垂語問答畢復有數僧競出師乃約住云假使大地草木盡抹為塵一一塵有一一口一一口具無礙廣長舌相一一舌相出無量差別音聲一一音聲發無量差別言詞一一言詞有無量差別妙義如上塵數衲僧各各具如是口如是舌如是音聲如是言詞如是妙義同時致百千問難問問各別不消徑山長老咳嗽一聲一時答了乘時於其中間作無量無邊廣大佛事一一佛事周遍法界所謂一毛現神變一切佛同説經於無量劫不得其邊際便恁麼去閙熱門庭即得若以正眼觀之正是業識茫茫無本可據祖師門下一點也用不著況復鉤章棘句展露言鋒非唯埋沒從上宗乘亦乃笑破衲僧鼻孔所以道毫氂繫念三途業因瞥爾情生萬劫鎖聖名凡號盡是虗聲殊相劣形皆為幻色汝欲求之得無纍乎及其厭之又成大患看他先德恁麼告報如國家兵器不得已而用之本分事上亦無者箇消息山僧今日如斯舉唱大似無夢説夢好肉剜瘡檢點將來合喫拄杖只今莫有下得毒手者麼若有堪報不報之恩共助無為之化如無倒行此令去也驀拈拄杖云橫按鏌鎁全正令太平寰宇斬癡頑卓一下喝一喝復舉王常侍一日訪臨濟同到僧堂內常侍曰者一堂僧還看經否臨濟曰不看經常侍曰學禪否臨濟曰不學禪常侍曰經又不看禪又不學畢竟作甚麼臨濟曰總教伊成佛作祖去常侍曰金屑雖貴落眼成翳又作麼生臨濟曰我將謂你是箇俗漢師云臨濟老漢握一柄金剛王寶劍氣衝宇宙天下橫行等間被者官人輕輕一拶便見氷消瓦解且道者官人有甚長處聽取一頌世出世間希有事顯發須憑過量人只將補袞調羮手撥轉如來正法輪久立衆慈伏惟珍重師紹興二十六年赴育王十一月二十三日於明州報恩光孝禪寺開堂宣疏拈香祝聖白椎垂語問答罷乃云佛法要妙離言説相離文字相離心緣相不可以有心求不可以無心得不可以語言造不可以寂默通如塗毒鼓聞著則腦門百裂似猛火聚近之則燎却面門實謂壁立萬仞勦絶聖凡假使智如鶖子辨若維摩與三世諸佛同時出來也須入地三尺有如是自在有如是威神只許老胡知不許老胡會到者裏如何啓口然官不容針私通車馬放一線道却有商量驀拈拄杖卓一下云還聞麼一切障礙即究竟覺得念失念無非解脫成法破法皆名涅槃智慧愚癡通為般若又卓一下云太陽溢目萬里不挂片雲古佛與露柱相交新羅共占波鬬額即不問汝諸人只如馬祖道即心是佛作麼生商量還委悉麼太平本是將軍致却許將軍見太平復卓一下復舉西天國王問波羅提尊者曰我欲作佛不知何者是佛尊者曰見性是佛王曰師見性否尊者曰我見佛性王曰性在何處尊者曰性在作用王曰是何作用我今不見尊者曰今現作用王自不見王曰於我有否尊者曰王若作用無有不是王若不用體亦難見王曰若當用時幾處出現尊者曰若出現時當有其八王曰八處佛性當為我説尊者曰在胎曰身處世名人在眼曰見在耳曰聞在鼻辨香在舌談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂王聞是言心即開悟師云敢問法筵大衆且道西天國王悟得佛性耶悟得精魂耶若道在八處悟得只是精魂若離八處却喚甚麼作佛性於斯薦得皇恩佛恩一時報足若薦不得育王今日為諸人下箇注腳良久云鸑鷟麒鱗俱是瑞旃檀薝蔔一般香天童和尚再白槌云諦觀法王法法王法如是師召大衆云記取天童和尚語師又於明州育王受敕再住徑山到臨安景德靈隱寺開堂問答罷乃云問話且止縱饒問處如百川競注答處似巨海吞流直得維摩結舌鶖子無言於本分事上了無交涉且道本分事上合作麼生提持乃舉拂子云還見麼又擊禪床云還聞麼聞見分明是箇甚麼當今聖主於此得之以妙明心印印十方華藏世界海只在一塵中於一塵中垂衣治化演出無量無邊廣大如虗空不可思議殊勝功德益利法界一切有情所謂聖壽廣大如虗空不可思議聖量廣大如虗空不可思議聖德廣大如虗空不可思議聖學廣大如虗空不可思議乃至聖智聖慧聖慈聖聰皆悉廣大如虗空不可思議只者不可思議底亦不可思議都盧只在一塵中皆聖心之常分非假於他術滿朝文武諸貴官得之以妙明心印向各各當人腳跟下一印印定更無秋毫以為透漏所謂王事民事一一明了一一無差然後卷舒自在縱奪臨時皆吾心之常分非假於他術今日一會若僧若俗若男若女若貴若賤得之各以妙明心印印之則隨其根性悉得受用一一明了一一無差皆吾心之常分非假於他術且道徑山長老得之又作麼生還相委悉麼惟憑一滴曹溪水遍界為霖報吾皇即將上來舉揚般若所有一毫之善祝延今上皇帝聖壽無疆恭願堯仁廣被齊日月之盛明湯德彌新並乾坤之久固皇太后中宮皇后大內天眷伏願同明般若正因悉獲金剛種智復舉波斯匿王問佛勝義諦中還有世俗諦否若言其有智不應一若言其無智不應二一二之義其義云何佛言大王汝於過去龍光佛所曾問此義我今無説汝亦無聞無説無聞是名一義二義師召大衆云明明向道尚自不會豈況蓋覆將來今日或有人問徑山勝義諦中還有世俗諦否若言其有智不應一若言其無智不應二一二之義其義云何只向他道元首明哉股肱良哉是名一義亦名二義正當恁麼時還有向上事也無良久云任大也須從地起更高爭奈有天何久立衆慈伏惟珍重入院後當請開堂提綱臨濟玄禪師府主王常侍與諸官請師開堂問答畢乃云此日法筵為一大事故更有問話者麼速致問來你才開口早勿交涉也何以如此不見釋尊云法離文字不屬因不在緣故為你信不及所以今日葛藤恐滯常侍與諸官員昧他佛性不如且退喝一喝云少信根人終無了日久立珍重雲門偃禪師廣主命師出世靈樹開堂曰莫道今日謾諸人好抑不得已向諸人前作一場狼籍忽遇明眼人見成一場笑具如今避不得也且問你諸人從上來有甚事欠少甚麼向你道無事已是相埋沒也雖然如是也須到者田地始得亦莫逞口快亂問自己心裏黑漫漫地明朝後日大有事在你若根思遲回且向古人建化門庭東西看是箇甚麼道理你欲得會麼都緣是你自家無量劫來妄想濃厚一期聞人説著便生疑心問佛問法問向上向下求覓解會轉沒交涉擬心即差況復有言有句莫是不擬心是麼莫錯會好更有甚麼事珍重清涼益禪師初開堂日中坐茶筵未起四衆先圍繞法座時僧正白師曰四衆已圍繞和尚法座了師曰衆人却參真善知識少頃升座大衆禮請訖師謂衆曰衆人既盡在此山僧不可無言與大衆舉一古人方便珍重便下座神鼎諲禪師開堂云齋會已具僧俗已集問答已畢佛法成辦只將此著上祝今上皇帝聖壽無疆便下座白雲端禪師云昔日靈山會上世尊拈花迦葉微笑世尊道吾有正法眼藏分付摩訶大迦葉次第流傳毋令斷絶至於今日大衆若是正法眼藏釋迦老子自無分將什麼分付將什麼流傳諸人分上各各自有正法眼藏每日起來是是非非分南道北種種施為盡是正法眼藏之光影此眼開時乾坤大地日月星辰森羅萬象祇在目前不見有毫氂之相此眼未開時盡在諸人眼睛裏已開者不在此限未開者山僧不惜手為諸人開此法眼藏看乃竪起兩指云看看若見得事同一家其或未然不免重説偈言諸人法眼藏千聖莫能當為君通一線光輝滿大唐須彌走入海六月降嚴霜法華恁麼道無句得商量既滿口説了為什麼無句得商量喝一喝云分身兩處看海會開堂云善言言者言所不能言善迹迹者迹所不能迹每日開口動舌無非是言作麼生説箇言所不能言既喚作言即便是迹作麼生説箇迹所不能迹到者裏一大藏教用一點不著到者裏一大藏教字字用得著為什麼先用不著後又却用得著且道誵訛在什麼處不見道千峰勢到嶽邊止萬派聲歸海上消自古自今向其間鑽仰者如稻麻竹葦實端的透徹者百中無一二若果然透得十二時中不妨慶快應機接物利樂有情盡乾坤星辰日月盡大地草木叢林都作一箇出入遊戲之場古者道玉轉珠回佛祖言精通猶是污心田老盧祇解長舂米何得黃梅萬古傳山僧在庵中亦有示徒直下雖然沒許般透如未盡活還難海門昨夜狂風起無限波瀾一掃乾恁麼地先與人開却路然後兩手掇向人前伶俐底不用絲毫氣力便提得去還有麼若提不去敢問諸人十二時中應用施為分賢別愚是是非非是箇什麼保寧勇禪師開堂云問答已周何不散去既不然者更引些葛藤向淨地上作一場狼藉去也正法眼藏亘古亘今祖祖密傳印印相可語言路絶思慮情忘一切群生各具斯事然難信之法措者還稀上上之機方能湊泊若湊泊得去便與三世佛祖有情無情悉皆同參無自無他非前非後有何生死可出佛道可成不假多劫修行彈指悉皆具足行住坐臥任運施為見聞覺知隨緣應用睡來合眼飯來開口寒即向火熱即取涼既到者箇平實田地匹上不足匹下有餘若是祖宗門下客直須向火𦦨裏藏身微塵裏走馬東涌西沒同死同生爍迦羅眼不能窺千手大悲把不住裂破毗盧印掃盡衲僧蹤然雖如是劍閣路危終易度趙州關險大難行但仁勇生而且昧長又寡聞雖挹宗機擬終深藪比奉知府龍圖特垂台命闔府采僚同賜僉俞命某繼此道場實增忝幸敢將上善仰延宸算傍祝府僚伏願知府龍圖早升陛闕榮陟鼎槐運使郎中亟聞漕最殊被帝恩運判都官英聲遐播清職驟躋通判駕部闔府采僚理狀彌光亨衢驟進更願今辰席上外府尊官永心腹於王家常眷隆於釋寶又承僧職大師蔣山清涼和尚同垂象駕共建法筵諸多檀越惟願常臻福慶永賁佛乘復云大化無為道太平閻浮日月轉分明豐年野老謳歌甚在處嘉禾合穗生久坐尊官伏惟珍重五祖演禪師四面山開堂日更有問話者麼若無雙泉今日向第二義門放一線道與諸人相見和泥合水一上且要釋迦彌勒動地雨花文殊普賢觀音勢至各踞一方助佛揚化皆務本事器量堪任雙泉不免也入一分共説東家杓柄長西家杓柄短任從春草青青炎光爍爍秋樹葉零冬氷片薄何故如是且要諸人順時保愛復拈起拄杖云古人道拈起也天回地轉放下也草偃風行四面即不然拈起也七穿八穴放下也錦上鋪花且道還有為人處也無良久云來年更有新條在惱亂春風卒未休黃梅東山開堂日適四祖師叔白槌云當觀第一義只如第一義且作麼生觀要會麼三世諸佛若無第一義將什麼化度有情西天四七唐土二三乃至天下老和尚若無第一義將什麼建立宗風只如當今聖帝若無第一義將什麼統御天下知郡學士知縣宣德合座尊官若無第一義將什麼為民父母乃至在會施主若無第一義將什麼崇敬三寶然雖如是也須各各自悟始得雪竇顯禪師雪竇開堂云人天普集合發明箇什麼事焉可互分賓主馳騁問答便當宗乘去廣大門風威德自在輝騰今古把定乾坤千聖只言自知五乘莫能建立所以聲前悟旨猶迷顧鑑之端言不知宗尚昧情識之表諸人要知真實相為但以上無攀仰下絶己躬自然常光現前箇箇壁立千仞還辨明得也無未辨辨取未明明取既辨明得能截生死流同踞祖佛位妙圓超悟正在此時堪報不報之恩以助無為之化雲峰悅禪師法輪開堂日且住具住大象既消希音杳絶旁通實化開拓權門於是三藏五乘對機設教猶國家兵器不得已而用之爾後達磨西來單傳心印一花五葉分布寰中大似持聾作啞何故况你諸人各有一段事耀古騰今通廓等於太虗明淨同乎皎鏡現在可驗固是瞞人眼不得且何者是諸人眼還驗得麼若也驗得塵沙諸佛三乘十二分教六代祖師天下老和尚盡向諸人眼裏百雜碎若驗不得前是案山後是主山復云此日一會固非小緣匝地普天孰不欣慶更不敢祝贊皇風回向諸僚何故古人道吾禱久矣豈况當今聖主賢臣者哉久立大衆伏惟珍重上方益禪師開堂日問答罷左右顧視云黃面老周行七步腳跟下正好一錐碧眼胡兀坐九年頂門上可惜一劄當時若有箇為衆竭力底衲僧下得者毒手也免得拈花微笑空破面顏立雪齊腰翻成轍迹自此將錯就錯相簍打簍遂有五葉芬芳千燈續𦦨向曲彔木上唱二作三於楖栗杖頭指南為北直得進前退後有問法問心之徒倚門傍牆有覓佛覓祖底漢庭前指柏便喚作祖意西來日裏看山更錯認學人自己殊不知此一大事本自靈明盡未來際未嘗間斷不假修證豈在思惟雖鶖子有所不知非滿慈之所能辨不見馬祖一喝百丈三日耳聾寶壽令行鎮州一城眼瞎大機大用如迅雷不可停一唱一提似斷崖不可履正當恁麼時三世諸佛祇可旁觀六代祖師證明有分大衆且道今日還有證明底麼良久云劄真淨文禪師聖壽開堂日問答畢乃云問話且止祇知問佛問法殊不知佛法來處且道從甚麼處來乃垂下一足云昔日黃龍親行此令十方諸佛無敢違者諸代祖師一切聖賢無敢越者無量法門一切妙義天下老和尚舌頭始終一印無敢異者無異即且止印在什麼處還見麼若見非僧非俗無遍無黨一一分付若不見而我自收遂收足乃喝云兵隨印轉將逐符行佛手驢腳生緣老好痛與三十棒而今會中莫有不甘者麼若有不妨奇特若無新長老謾你諸人去也故我大覺世尊昔日於摩竭陀國十二月八日明星現時豁然悟道大地有情一時成佛今有釋子沙門克文於東震旦國大宋筠陽城中六月十三日赫日現時又悟箇甚麼以拂子畫一畫云我不敢輕於汝等汝等皆當作佛下座保寧開堂日欲識佛性義當觀時節因緣時節既至因緣自會大衆今日一會要知麼是大衆成佛時節淨緣際會大丞相荊國公及判府左丞施宅舍園林為佛剎禪門固請大善知識開演西來祖道所以教外別傳直指大衆即心見性成佛大衆信得及麼若自信得及即知自性本來作佛縱有未信亦當成佛但為迷來日久一乍聞説誠難取信以至古今天下善知識一切禪道一切語言亦是善知識自佛性中流出建立而流出者是末佛性是本近代佛法可傷多棄本逐末背正投邪但認古人一切言句為禪為道有甚干涉直是達磨西來亦無禪可傳惟只要大衆自悟自成佛自建立一切禪道况神通變化衆生本自具足不假外求如今人多是外求蓋根本自無所悟一向客作數他人珍寶都是虗妄終不免生死流轉大衆今二相公特建此大道場作大佛事出大衆生死流轉復大衆本來廣大寂滅妙心開發本來神通大光明正法眼藏但迷則長居凡下悟則即今聖賢大衆言多去道轉遠笑他明眼道人衆中莫有明眼道人麼今時佛法混濫要分邪正使大衆不墮邪見作人天正眼有麼良久云我終不敢輕於汝等汝等皆當作佛下座圓悟勤禪師蔣山開堂云曠劫來事只在如今威音那邊全歸掌握頭頭物物成現明明了了無差獨用宏機全提祖印設使奮逸群作略施竭世樞機未免節外生枝水中捉月所以諸佛出世罕遇作家祖師西來承虗接響向上一路千聖不傳學者勞形如猿捉影到者裏不拘格式不躡前蹤不昧當機如何舉唱明眼漢沒窠臼本分事絶羅籠幸遇帝道平平皇風蕩蕩祝嚴聖壽為國開堂台斾光臨皇華作證鐘山頂上寶公塔前八字打開分明顯示去遂拈起拄杖云還見麼諸佛搆不著祖師提不起千日並照萬鏡臨臺不隔纖毫當陽薦取且不涉諸緣一句作麼生道八方霡霂無為化萬國歌謠樂太平東京天寧開堂日問答畢乃云問話且止大衆祕密妙嚴深機莫能考究淨圓超證諸聖無以擬倫靈山單傳正音少室密付的旨洞明如杲日寬曠若虗空把斷諸法無遺蔭覆群靈有作頂門上如如不動腳跟下了了常知今朝幸遇祝聖開堂對衆分明剖露遂拈拄杖卓一下云大衆還知落處麼諸佛心髓祖師淵源十成八字打開遍界全彰勝相纖洪長短黑白方圓一一絶羅籠處處無回互澄澄湛湛密密堂堂無深可深無妙可妙是故佛佛授手惟授此心祖祖相傳惟傳此妙上根種智略請回光可以千眼頓開可以萬緣透脫豈不見阿難問迦葉世尊傳金襴外別傳何物迦葉召阿難阿難應諾迦葉云倒却門前剎竿著三要印開十方通透直得王舍城裏萬壽堂前瑞氣凝九重祥光朝鳳闕一一發輝正法眼藏傳持涅槃妙心了也且當陽不昧一句作麼生道太平瑞氣無邊表航海梯山仰聖朝以此開堂一毫善利上祝今上皇帝聖壽伏願金輪永固寶祚殊昌四海樂文明萬陶至化復舉昔有僧問投子如何是一大事因緣投子云尹司空與老僧開堂師云投子古佛叢林中推其得逸群之辨得朴實頭道用看其等間拈掇不妨世法佛法打成一片雖然如是惜其不甚寬廓今日忽有人問天寧如何是一大事因緣即對他道手握金輪清四海聖躬彌億萬斯年金山開堂大道絶中邊至真離言説諸佛莫能提祖師莫能傳透聲透色絶遮欄蓋地蓋天無向背豈止棒頭取證喝下承當直饒千眼頓開未免依草附木到者裏要須是針劄不入風吹不到把斷要津不通凡聖底始得是故靈山會上廣額屠兒放下屠刀云我是千佛一數大集會中大力魔王云待一切衆生盡皆成佛了然後發菩提心豈不是龍象蹴踏獅子嚬呻敵勝驚群蘊大丈夫意氣始可承當擔荷所以道殺人不眨眼底立地成佛立地成佛底殺人不眨眼還他過量人提持過量智發明過量機展演過量用正當恁麼時向過量境界中作麼生道還知麼仰祝聖君無量壽河清海晏樂升平密庵傑禪師烏巨開堂上堂祖師心印狀似鐵牛之機去則印住住則印破森羅萬象明暗色空情與無情一印印定更無絲毫透漏更無絲毫走作更無絲毫起滅更無絲毫動搖如金博金似水洗水了絶異緣逈超諸有以此壽聖人則天長地久以此祝賢守則伊尹周公以此安樂生民以此康福天下以此播揚大教以此扶竪正宗雖然如是且道印子即今在什麼處良久擊拂子云雕弓高挂狼煙息萬國歌謠樂太平復舉保壽開堂公案師云二尊宿美則美矣若要扶臨濟正宗俱各欠一頓棒在且道那裏是他欠處具擇法眼者試定當看中峯希聲禪師開堂雲生大野霧鎖長空三草二木悉歸獅子吼露滴庭莎盡稱無邊妙相猿啼鳥噪皆談不二圓音乃拈拄杖曰無邊妙義盡在山僧拄杖頭上若也會得可謂應時應節若不會萬年松在祝融峯卓一下別峯寶印禪師開堂升座云世尊初成正覺於鹿野苑中轉四諦法輪憍陳如比丘最初悟道後來真淨禪師初住洞山拈云今日新豐洞裏祗轉箇拄杖子遂拈拄杖著左邊云還有最初悟道者麼若無丈夫自有衝天志莫向如來行處行遂喝一喝下座若是印上座則不然今日向鳳凰山裏初無工夫轉四諦法輪亦無氣力轉拄杖子祇教諸人行須緩步語要低聲何故欲得不招無間業莫謗如來正法輪獅子端禪師章丞相子厚請開堂升座俞秀老撰疏敘師生平事迹曰推倒回頭躍翻不托七軸之蓮經未誦一聲之漁父先聞師聽僧官宣至此以手耶揄曰止止乃坐引聲吟曰本是瀟湘一釣客自東自西自南北大衆雜然稱善師顧衆笑云我觀法王法法王法如是下座玉泉皓禪師因張無盡請開堂日衆官畢集師升座顧視大衆曰君不見良久又云君不見張操蜀音曰和尚見皓應聲曰但得相公見便了下座雲居祐禪師開堂問答罷乃曰新啓法筵人天會集稀逢難遇正在此時還更有乘時適變底衲僧麼出來與汝證據良久曰不出頭者是好手雖然如是道林今日已向平地上喫交了也賴遇金粟大士有不二法門放一線道道林方解開布袋頭足可以施展家風向無佛處稱尊便乃指點三界目視四維偃仰堯天高歌舜日舉音王調唱菩薩蠻奏沒絃琴含太古意當是時文殊休惆悵普賢謾沉吟任是千聖出頭異口同音也不消一劄久立珍重佛心才禪師開堂示衆曰百千三昧門無量福德藏放行也如開武庫錯落交輝把住也似雪覆蘆花通身莫辨使見之者撩起便行聞之者單刀直入箇箇具頂門正眼人人懸肘後靈符拂佛祖見知作叢林殃害憶得寶壽開堂日三聖推出一僧寶壽便打三聖云與麼為人瞎却鎮州一城人眼去在且如乾元今日開堂或有僧出來山僧亦打不惟此話大行且要開却福州一城人眼去在何也劍為不平離寶匣藥因救病出金瓶欽山普初禪師開堂上堂良久曰舉揚宗旨上祝皇基伏願祥雲與景星俱現醴泉與甘露雙呈君乃堯舜之君俗乃成康之俗使林下野夫不覺成太平曲且作麼生是太平曲無為而為神而化之灑德雨以雱霈鼓仁風而雍熙民如野鹿上如標枝十八子知不知哩哩囉邏囉哩拍一拍下座
