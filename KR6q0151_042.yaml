body:
  text: 武林十八㵎理安禪寺住持婁東行悅集開爐提綱高峰妙禪師開爐上堂竪起拂子云者些火種自靈山傳至西峰已得二千二百三十餘載今日幸遇開爐特為諸人拈出以拂子吹一吹乃擲下云照顧燒却眉毛開爐上堂三千世界作爐百億須彌為炭生鐵鑄就禪和炙得通身紅爛正恁麼時莫有軃得過底麼左右顧視云嗄將謂水不能溺火不能焚元來總是一隊爛額焦頭漢中峰本禪師開爐示衆世界濶一丈古鏡濶一丈你還知蒲團上一箇吞不下吐不出底無義味話頭也濶一丈麼者裏一肩荷負得去便可喚火爐作古鏡喚古鏡作世界都無異致如其未爾火爐與古鏡世界與話頭相違不止三千里何以如此蓋能所分別作障礙覿體如銀山鐵壁之堅只此便是生死輪回根本故楞嚴謂根塵同源縛脫無二識性虗妄猶若空華由塵發知因根有相相見無性同於交蘆者裏無你動步處無你著眼處昔安楞嚴讀到知見立知即無明本知見無見斯即涅槃雖破句讀之其桶底當下脫落直得七穿八穴洞見老釋迦心肝五藏直下喚古鏡作火爐不妨洞照森羅萬象喚火爐作古鏡不妨薰炙氷霜面皮洗盡見塵絞乾情浪無第二念無第二人喚南作北敲東擊西死柴頭上爛發心華水底輝騰赤焰冷灰堆裏撥出火種毛端盤結青煙一切處和氣藹然一切處陽春燠若信手拈來安有一毫剩法與人為知為解者哉年來佛法無靈往往將根塵識妄認作真心說得宛然了無交涉記得儒勸學有詩謂擊石乃有火不擊元無煙人學始知道不學非自然此說雖曰訓蒙於禪學分上說得恰妙何以知然謂石中有火不以智巧擊之引之則終於不遇也今人惟知石中有火未曾施半錢智巧之力擊之終日指此冷石說火之用說到光然落地依前只是塊石頭要覓一點火為用了不可得此是不肯死心做工夫以求正悟惟記相似語言而說禪者是也更有一等闡提人聞說石中有火急碎其石欲取其火乃至碎抹為塵終不得火却不責不以智巧求之便乃不肯信石中果有真火此是不信自心成佛之凡夫也此說且置何謂智巧勉向第二門頭立箇喻子首以信根為石次以無義味話頭為擊石之手又以堅固不退轉志願之鐵打箇火刀乃以精進勇猛不顧危亡之力向動靜閒忙中敲之擊之使不間斷又必待無量劫中蒙佛祖授記般若種性乾草驀忽相承是謂智巧也引起一星子延燎不已直教三千世界化為焦焰復何難哉捨此智巧未見有燒物之火無緣而自出也記得百丈令溈山撥火溈撥之不得丈躬撥得之謂溈曰爾道無者箇聻直下還著得智巧也無聊說一偈十方世界火爐濶冷灰堆裏深深撥得一星兒遽喜歡今古拈來閙聒聒諸禪流休抹撻燎却眉毛莫便休或不如斯遭凍殺唯庵然禪師開爐上堂暖氣相接正在斯時深深冷灰裏撥著星兒之火向死柴頭上發機燎起亘天烈𦦨燒却舜若多神面皮敢問諸人作麼生回避擲拄杖下座開爐上堂十月風高作寒色今朝正值開爐日長途多少未歸人祖父田園俱喪失何如白鷺鷥翹足溪邊立毛長骨瘦歷風波那論有食與無食諸兄弟也要大家知此消息且道是什麼消息歸堂喫茶元叟端禪師開爐上堂舉雪峰云三世諸佛向火焰上轉大法輪雲門云火焰為三世諸佛說法三世諸佛立地聽應庵云三世諸佛為火焰說法火焰燒殺三世諸佛師云三大老一人鼻孔遼天一人眼睛突出一人腳跟不點地諸人若也揀辨得出鳳山今日開爐其或未然前頭大有雪霜在開爐上堂舉雪峰示衆云世界濶一丈古鏡濶一丈玄沙問云火爐濶多少峰云如古鏡濶沙云者老漢腳跟未點地在師云古鏡即是火爐火爐即是古鏡不是雪峰老漢爭得頭正尾正鷲峰今日忽有人問火爐濶多少只向道隨家豐儉呆庵莊禪師開爐上堂舉趙州和尚指火示僧云我喚作火你不得喚作火師云趙州老老大大剛要挑灰弄火雲居則不然相共圍爐燒火向主賓道合自忘言橫川珙禪師開爐上堂僧出云丙丁童子來求火師云歸去生柴帶葉燒乃云古鏡濶一丈火爐濶一丈火焰為三世諸佛說法三世諸佛立地聽你諸人長連床上立地聽黃龍新禪師開爐示衆舉雪峰道三世諸佛向火焰裏轉大法輪雲門道火焰為三世諸佛說法三世諸佛立地聽雪峰雲門交互爭輝薪盡火滅三世諸佛向甚麼處聽莫戀白雲深處坐切忌寒灰燒殺人石屋珙禪師開爐上堂法昌和尚道法昌今日開爐行腳僧無一箇惟有十六高人緘口圍爐打坐福源不與麼道福源今日開爐炭墼也無一箇五湖四海禪和衲帔蒙頭打坐不是冷眼旁觀免見挑灰弄火寬心寧耐到春來屋角梅花香朵朵上堂十月初一日開爐諸方說寒道熱福源一味尋常不會安排施設深深埋兩箇炭團滿滿堆一爐黃葉莫嫌火種無多只要暖氣相接放下重簾密糊窗縫誰管你屋上濃霜庭前深雪但得自家屋裏一團和氣外邊冷言冷語不須聽由他自歇諸禪德本色住山人且無刀斧痕笑隱欣禪師開爐上堂住院慚無福冬來事事無家貧羞見客炭少未開爐壁破添泥補窗虗缺紙糊西來祖師意勘破老臊胡開爐上堂火爐頭話無賓主中峰一一為君舉揑不成團擘不開貴似黃金賤如土放兩拋三是幾多五五元來二十五月江印禪師開爐上堂東邊是知事西邊是頭首師子兒哮吼龍馬駒𨁝跳火爐濶一丈古鏡濶一丈古佛塔廟前面南看北斗鐵關樞禪師開爐謝靈山闍黎上堂拈拄杖只者火種靈山會上付囑天寶向沉埋之秋撥開紅焰暖熱叢林撥一撥云見麼者裏蹉過凍殺闍黎愚庵及禪師開爐上堂今朝十月初一門外寒風凜溧待歸暖處商量何似當陽拈出驀拈拄杖云火爐濶一尺古鏡濶一尺三世諸佛出不得六代祖師出不得天下老和尚出不得上堂諸方今日開爐未免與諸人說些火爐頭話以拂子作吹火勢云喚作火燒殺你不喚作火凍殺你無文璨禪師開爐謝耆舊踏田上堂趙州無賓主話田地穩密底開口便道著信腳便踏著若是東西不辨南北不分未免被人侵疆越界薦福門下總是田地穩密底人拈起香匙放下火筯一一天真因甚如此公驗分明開爐上堂寒涕垂頤圍爐打坐說什天之高地之大最好笑是老楊岐拈起死柴頭未開口時先話墮傑峰愚禪師開爐上堂天寒歲晚孤峰上此道寥寥孰與論旋補荷衣消白日頻燒榾柮到黃昏宗風且莫留人世佛法應無繼子孫賴有鄰封來送供人間何處不稱尊恕中慍禪師開爐上堂楊岐和尚示衆云薄福住楊岐年來氣力疏寒風凋敗葉猶喜故人歸囉囉哩拈起死柴頭且向無煙火山僧雖忝末裔要且不與同塵薄福住鞔峰多嗔還少喜此日話開爐火種無些子報諸人休擬議大家收足上蒲團今歲立春在年裏了庵欲禪師開爐上堂今朝十月旦開爐無獸炭倒轉死柴頭光明何燦爛三世諸佛在此轉大法輪六代祖師在此聯芳續焰天下老和尚在此各立門庭光光相羅如寶絲網大用現前清機歷掌有功者罰無功者賞引水澆蔬五老前披簑側笠千峰上喝開爐上堂舉丹霞燒木佛公案乃云山僧當時若作院主待他道既無舍利更請兩尊燒之便與踏向火中免見千古之下引得一類學語之流隨例道大用現前不存軌則喝一喝南石琇禪師開爐上堂趙州和尚示衆云老僧三十年前在南方火爐頭有箇無賓主話直至如今無人舉著且道如何是無賓主話若向者裏會得一大藏教是甚拭瘡疣紙雖然若喚作無賓主話玄沙道底下座開爐請藏主維那兼明首座設齊月西堂至上堂往來不往來是藏不是藏機先解洞明依然未諦當拈起金鎚放下鈯斧要知有實有權挂眉間劍借香積飯灼爾能奪能縱雖然未是火爐頭話且如何是火爐頭話今朝初一明朝初二天真則禪師開爐上堂寒冬冷月到來也大家祇得補破遮寒若向針頭線後透得管取工夫自然成片且道工夫成片後如何以手托起云如意寶珠元自具無勞撥火再尋氷開爐上堂今朝是開爐日普請東西兩序知悉若不是饆饠湯餅大家打些麵喫下簾攏粘戶隙拾竹柴烘衲頭扒草火當炭墼阿呵呵甚奇特且道作麼生是不通風縫受用底一句子挂拂子作烘手勢云你也烘我也烘深藏穩便度隆冬朝宗忍禪師開爐上堂把住繩頭結百千萬億為一大網大開爐鞴盤鎔瓶叉釧為一金密密綿綿古往今來無可擬堂堂赫赫上天下地莫能儔直得千聖躋攀無路萬靈景仰無門魔外潛蹤狐狼絶蹟且道具甚麼神通得恁麼自在衲帔蒙頭萬事休此時山僧都不會下座牧雲門禪師開爐上堂今日開爐諸人還識開爐底意麼霜花點白山寮各下暖簾楓葉飛紅將見堅氷踵至通方上士鑒在機先得旨歸根去天寒人寒滴水滴凍隨流認得性無喜亦無憂不假炭煤宏開爐鞴直下化鈍鐵作良金鎔頑銅成法器妙手雖呈大功不宰驅溈山水牯直入欄圈打疏山木蛇橫鑽泥土且道甚麼時節是他出頭分莫看水草嫌枯淡好聽春雷換甲鱗下座弘覺忞禪師上堂天童寺裏開爐以虗空為爐床四大部洲為爐腳須彌盧為火筯七金山為炭團其餘森羅萬象日月星辰赤縣神州山川人物為引火黃葉且道火種聻以拄杖劃一劃云饒你向者裏薦得透脫分曉及乎施用未有其方也則是箇守死善道要得發焰聯輝正未可在當恁麼時發焰聯輝一句作麼生道喝一喝云八萬四千非鳳毛三十三人入虎穴開爐上堂佛法無多子久長難得人山僧昔在茲山以不辦久長之念住凡四周寒暑散席他往東住天台南住於越西住吳興北住青齊已經十有一載無端遭人抑逼還復歸領住持則巖頭雲老室內氷冷正當今日開爐作麼生得接𦦨連輝去拱手云著力全在諸弟兄冬至提綱十一月真淨文禪師上堂冬後一陽生乾坤解通變衲僧莫守株彼此丈夫漢日日天真活人人自可見如何都不顧隨他物所轉喝一喝下座雲峰悅禪師冬至上堂節令屆書雲山家何所論一輪才出海萬類盡沾恩以拂子擊禪床下座雪竇顯禪師冬至上堂相逢不拈出舉意便知有早是不唧𠺕漢更亂踏步向前實謂苦屈諸禪德看他先覺未離兜率已降閻浮未出母胎度人已訖若言周行七步目顧四方天地之間唯我獨尊尚有人不放伊過如今巧說異端不肯荷負真可哀愍所以道天魔外道是辜恩德漢聲聞二乘是自欺誑人你見如此不平之事便合憤悱驅將去喝將去隨例道我不知我不會者般底苦海裏有什麼出頭時白雲端禪師上堂今朝至節一陽生於此日拈起拄杖且道者箇作麼生便恁麼搆得且恁麼應時納祐若數至大年朝前頭大有雪在所以承天十度發言九度休何謂如此當門不必栽荊棘後代兒孫惹著依雖然如是三十年後太公釣魚五祖演禪師冬至上堂少年天子此日拜郊林泉之士遠望歌謠萬歲萬歲便下座冬日上堂達磨西來事久多變後代兒孫門風無限攪擾身心一團麻線白雲今日都通截斷大衆一百單五近清明上元定是正月半圓悟勤禪師大禮令節上堂七日來復各歸至盡之本一陽生起聿見天地之心徹底闢重玄當陽闡正眼直得萬國共慶四海同歡福聚一人位隆無極有箇奇特應時應節因緣舉似大衆還委悉麼皇帝有敕大赦天下佛鑒勤禪師上堂世尊有密語迦葉不覆藏乃曰你尋常說黃道黑評品古今豈不是密語你尋常折旋俯仰拈匙把筯祇揖萬福是覆藏不覆藏忽然瞥地去也不可知要會麼世尊有密語冬到寒食一百五迦葉不覆藏水泄不通已露贓靈俐衲僧如會得一重雪上一重霜泐潭準禪師冬至上堂五九四十五聖人作而萬物覩秦時𨍏轢鑽頭尖漢祖殿前樊噲怒曾聞黃鶴樓崔灝題詩在上頭晴川歷歷漢陽戍芳草萋萋鸚鵝洲可知禮也君子務本本立而道生道生一一生二二生三三生萬物驀拈拄杖起身云大衆寶峰何似孔夫子良久曰酒逢知己飲詩向會人吟卓拄杖下座虎丘隆禪師上堂靈機密運日月旋流四象推遷一陽來復化育之本匝地普天草木昆蟲悉承恩力且作麼生是化育之本良久云一氣不言含有象萬靈何處謝無私復舉僧問南院日月交謝寒暑迭遷如何是不涉寒暑者院云紫羅抹額繡裙腰僧云向上之機今已曉中下之流如何解會院云炭庫裏藏身師云問既有宗答亦驚群雖然如是南院只解觀根逗器應病與藥虎丘更資一路或有僧問日月交謝寒暑迭遷如何是不涉寒暑者對他道前村深雪裏昨夜一枝開待他又問向上之機今已曉中下之流如何解會對他道買帽相頭懶庵鼎需禪師至節上堂二十五日已前群陰消伏泥龍閉戶二十五日已後一陽來復鐵樹開花正當二十五日塵中醉客騎驢騎馬前街後街遞相慶賀物外閒人衲帔蒙頭圍爐打坐風蕭蕭雨蕭蕭冷湫湫誰管你張先生李道士胡達磨應庵華禪師冬至上堂君子道長小人道消衲僧活計不在兩頭有般癡漢便問未審在什麼處似者般底不打更待何時且道寶林恁麼道還有過也無試定當看密庵傑禪師冬至上堂日南長至慶無不利石筍暗抽條寒巖增暖氣東村王老半醉半醒林下道人沒巴沒鼻驀拈拄杖云若人於此徹根源勝似燃燈親授記擲拄杖下座冬至日入新衆寮上堂天不言四時行地不言萬物生聖人不言垂衣拱手萬國來王衲僧不言移凶星為吉曜揑大地作伽藍裁長補短革故鼎新便見玲瓏八面峭峻十方坐斷溪山包羅風月且入門一句作麼生道一陽來復後瑞氣自騰騰物初禪師上堂一冬二冬你儂我儂暗中偷笑當面脫空雖是尋常茶飯誰知米裏有蟲夜來好風吹折門前一株松光孝徹禪師冬日上堂羊頭車子推明月沒底船兒載曉風一句頓超情量外道無南北與西東所以劫前消息非口耳之所傳格外真規豈思量之能解須知佛佛祖祖了無一法為人子子孫孫直下全身荷負既已萬機寢削自然一糝不留湛湛之波碧水冷涵於秋色靈靈之照霽天淨洗於氷輪宛轉旁參叶通兼帶夢手推開玉戶翻身撥動機輪正令才行又見一陽萌動化工密運俄驚三世變遷雖則默爾無言爭奈熾然常說無遷無變今朝拈置一邊有故有新且道如何話會諸人還委悉麼群陰消剝盡來日是書雲谷隱靜顯禪師冬至上堂運推移日長一線且道佛法長多少自曰九九八十一諸人還會麼若無人會山僧為你重說偈言九九八十一日南長至日運既推移大家相委悉非為世諦流布且要應時納祐參玉泉皓禪師冬至示衆運推移布裩赫赤莫怪不洗無來換替典牛游禪師至節上堂運推移日南長至布裩不洗無來換替大小玉泉無風起浪雲巖路見不平直下一鎚粉碎遂高聲曰看腳下石屋珙禪師冬節上堂昨夜陰回陽復爻曉來湖岸見氷消皇官日影喜添線胡地筍長梅破梢春漏一痕舒柳眼雲拖五色束天腰明明空劫已前事不是虗言誑爾曹冶父川禪師上堂群陰剝盡一陽生草木園林盡發萠唯有衲僧無底鉢依然盛飯又盛羮東叟頴禪師上堂拈拂子畫一畫云伏羲發天地之祕未明者消息又點三點云瞿曇示圓伊之形未明者消息者消息如何辨的不見道冬至乃書雲物擊拂子天目禮禪師上堂云黃鐘才起時九數從頭數相將幽谷鶯啼次第雕梁燕語田父祭勾芒叢祠敲社鼓農父狎牛郎村姑教蠶婦光陰老盡世間人冬至寒食一百五密印民禪師冬至上堂舉玉泉皓和尚云雪雪片片不別下到臘月再從來年正月二月三月四月五月六月七月八月九月十月依前不歇凍殺饑殺免教胡說亂說師曰不是罵人亦非贊歎高出臨濟德山不似雲居羅漢且道玉泉意作麼生良久曰但得雪消去自然春到來雪巖欽禪師冬至上堂謝橫舟相訪曉天月白古岸舟橫一陽來復吾道大亨直得千年晉柏樹與千年陶公井起來叉手當胸互相慶賀道且喜寒氷發焰枯幹花開堂前露柱也懷胎高峰妙禪師冬至上堂良久云一陽來復萬物咸新恭惟盲龜跛鱉鬼怪妖精莫問前長後短大家扶起破沙盆冬至上堂世間動不動法皆屬陰陽遷變驀拈拄杖云惟有山僧木上座能為萬象主不逐四時凋乃靠拄杖云無形木寂寥千巖長禪師冬至上堂六陰已極一陽生佛道還同世道亨惟有祖師門下客依前日午打三更無用寬禪師冬至上堂陽隨陰轉陰隨陽滅氣數循環轉轉不歇索性不顧危亡盡力一棒打徹喝一喝云便是臨濟德山也是馬後落節下座元叟端禪師冬至上堂開口道著舉步踏著十箇有五雙因甚不知落處冬至月頭賣被買牛冬至月尾賣牛買被不覺日又夜爭教人少年至節上堂群陰剝盡一陽復生千卉萬彚無不發生拈拄杖云拄杖多年挂屋壁夜來頭角也崢嶸冬至上堂靈機廓徹萬法無私智鑑洞明十虗無間轉一陽出六陰之內驅六陰入一陽之中塵塵普應剎剎全彰道泰時清民康物阜拍禪床云五色祥雲連鳳闕一輪紅日耀龍樓呆庵莊禪師冬至上堂魯公臺上書雲是世法不是佛法慈明堂前揭榜是佛法不是世法徑山門下佛法世法拈放一邊施主今日辨供堂中大有胡餅一任諸人橫咬竪咬冬至上堂舉洞山掇退果桌話師拈云當斷不斷反招其亂若是徑山見他道過在什麼處便與掀翻果桌亦使洞山知有向上爪牙今日兒孫不致寂寥雖然也須腳踏實地始得拈拄杖不向藍田射石虎何人知是李將軍卓拄杖下座愚庵及禪師上堂冬至前後砂飛石走草木叢林作獅子吼群陰剝盡一氣潛回一亦莫守萬法無咎驀拈拄杖云拄杖子吞却山河大地置而不問且道馬大師自從胡亂後因甚三十年不少鹽醬卓拄杖金輪天子同草店家風別無文燦禪師冬至上堂至日書雲雲作何色眼裏無筋青黃赤白冬至上堂僧問疏山如何是冬來意山云京師出大黃師頌云京師出大黃價直極相當未曾識道地枉自費商量鐵關樞禪師冬至上堂六陰剝左卓拄杖云獅子峰撐天拄地一陽復右卓拄杖云將軍峰拄地撐天中間卓拄杖云三箭定天山至節舉趙州問寰中般若以何為體中云般若以何為體劍輪揮處日月沉輝長水請益琅琊清淨本然云何忽生山河大地琊云清淨本然云何忽生山河大地寶杖敲時乾坤失色若是皮下有血底向二大老未開口前薦得群陰剝盡何曾動著一絲毫一陽來復未免眼中重著屑時節至兮理自彰梅到骨寒香破雪了庵欲禪師冬至上堂一冬二冬叉手當胸逢場作戲遇緣即宗打瓦鼓應黃鐘風從虎兮雲從龍下座上堂化育之本物我同途生佛之元古今不易所以雪峰道盡大地撮來如粟米大拋向面前漆桶不會打鼓普請看卓拄杖云六爻未動群陰塞一氣潛回萬彚新上堂節序推遷又見一陽來復靈光洞耀依然體露真常撥開向上玄關突出眼睛鼻孔釋迦彌勒猶是他奴且道他是阿誰擊拂子云嶺梅殘雪後雲𩯭未梳時笑隱欣禪師冬至上堂群陰剝盡一陽復生四時運行萬物資始直得護龍河上化日舒長觀稼亭前祥雲五色城市笙歌鼎沸士女遊觀山堂鐘鼓深沉衲僧禪寂真諦俗諦不二佛法世法混融所以道知一切法即心自性成就慧身不由他悟鑄法鐘提法器挂鐘鳴鐘施鐘應庵華禪師新鑄鐘上堂有大智人具大知見啓大爐鞴奮大鉗鎚然後示大機顯大用於二百日中成此大法器住大解脫門亘千萬億劫震大圓音空明暗相以此津濟四生以此梯航九有以此祈祥懺罪以此息苦停酸以此揭示頂門正眼以此流通佛祖慧命直得星飛電捲山色凝光鳳舞鸞翔龍馳虎驟豈不見玄沙和尚道直似秋潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事苟能於此洞明便見玄沙老子即今向紫霄峰下拭眼堂前騎聲蓋色坐斷十方脫或未然塞却耳根分明聽取無用寬禪師正覺寺挂鐘父母未生一點子洪爐烹煉轉精神當陽挂起打一下天上人間播好音連打二下云上祝吾皇萬萬春山茨際禪師為雲居印心院主挂鐘師云祗樹林內忽鐘聲撩倒阿難悟本真今日山僧重擊著阿誰會得證圓聞乃擊鐘三下云若將耳聽終難會眼裏聞來方始親大溈智禪師初居秀州之西庵一日普淨院範鐘成請鳴鐘曰長子羅睺羅遵受如來敕撞鐘發大機阿難圓信入我今撞此鐘見聞獲大益上徹三千界下透無窮極塵劫逈寥寥太空常寂寂息苦與停酸皆承此恩力應庵華禪師傳法寺智都僧正請鳴鐘師示衆云頑銅鈍鐵美玉精金大冶紅爐一模鑄就不假毗沙門天王神力豈從須彌頂𩕳上持來器重千鈞樓高百尺啓圓通三昧發清淨妙音直須眼處承當莫向耳邊領略鑊湯爐炭不用吹而自滅刀山劍樹何待喝而後摧昏夢頓除沉迷了悟萬象森羅俱作舞大千沙界一時聞大衆且道末上一槌落在甚麼處劫石有消日洪音無盡時弘覺忞禪師為新鐘發聲大冶煅成真法器那堪高躅聳人天聲光自此長輝赫佇聽洪音遍大千天隱修禪師居士施銅鐘薦考妣請小參師拈槌指鐘云者鐘彼為薦父母又乞山僧說法山僧無法可說記得東坡居士有鐘銘偈云有鐘誰為撞有撞誰撞之三合而後鳴聞所聞為五缺一不可得汝則安能聞汝聞竟安在云云大小東坡說義理禪山僧則不然驀舉鐘槌云還見麼復敲鐘三下云還聞麼者裏會得一超直入如來地其或未會更聽一偈鐘聲一擊頓超然薦拔先靈出陰纏今日老僧親指示管教步步踏青蓮挂板法語挂鐘板密雲悟禪師挂板叢林號令佛祖鉗椎今朝懸向堂前輕輕擊著直令人人頓斷命根雖然如是更有一人且道具何面目高著眼始得山茨際禪師挂板叢林號令佛祖紀綱懸起也有眼皆見擊著也有耳咸聞既見既聞直下是觀音入理之門當處即善財功圓之際雖然如是且不落聲色一句作麼生遂擊板云騎聲蓋色甚分明弘覺忞禪師挂鐘板逈無依倚處立卓縱橫窈絶機宜中翕張變態化裁妙天然之矩矱動寂露法王之根苗所以把住則烈日霜飛四溟無水泄放行則寒氷𦦨發大地忽陽和正當今日權衡佛祖高聳人天即置斬新條行新令一句又作麼生道遂擊一下云霹𮦷一聲喧宇宙心華開遍少林春石雨方禪師寶壽挂鐘板舊日規模一任梅花連夜發斬新條令豈容客子帶回春銅頭鐵額底到此也須重鍛龍驤虎驟底不妨依教奉行今有密言有誰唱和良久曰無則仰勞二上座去也遂擊鐘板挂木魚提綱無用寬禪師梁山挂木魚上堂不似魚不似蜃爍破虛空鉢盂安柄饑逢王膳不能餐香積國門施號令喝一喝云倒騎廊廡日日敲禹門一跳風波高卓柱杖一下云照顧眉毛便下座製法鼓提綱白雲演禪師新鞔法鼓上堂多載頑皮擊不響新皮才動震天雷無滯莫言隨勢去有聲誰謂不平來何也雙眼聽不聞雙耳不見一條平坦路是誰沒方便大慧杲禪師新鞔法鼓歲旦上堂新歲擊新鼓普施新法雨萬物盡從新一一就規矩普賢大士欣歡乘時打開門戶放出白象王遍地無尋處拈起拄杖云惟有者箇不屬故新等閒開口吞却法身擲下云是甚麼千年桃核裏元是舊時仁恕中慍禪師新鞔法鼓上堂只與麼散去已遲三刻那更指東畫西說黃道黑明眼人咬牙有分雖然有條攀條無條攀例不見鹽官示衆云虗空為鼓須彌為椎什麼人打得掘地深埋南泉云王老師不打者破鼓是精識精法眼別云王老師不打班門弄斧靈巖新鞔法鼓以木為身以皮為面要打便打要歇便歇且無許多勞攘只是不得聞著聞著則喪身失命且誰是喪身失命者床下爛蒲鞋籬根禿苕菷天真則禪師製法鼓上堂此鼓震若雷霆懸如日月震旦國中擊動兜率天宮普說塵塵說剎剎說熾然說道八臂那吒撲帝鐘金剛腦後三斤鐵海門坐斷閫外乾坤却笑禾山輕漏泄從此泉石增輝無不歡悅切切切箇箇圓聞俱透徹以拂子擊空云鼕鼕鼕
