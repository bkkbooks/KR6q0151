body:
  text: 武林十八㵎理安禪寺住持婁東行悅集名德受請借座陞座提綱楊岐會禪師在筠州九峯受楊岐請陞座問答罷乃云更有問話者麼試出眾相見楊岐今日性命在你諸人手裏一任橫拖倒拽為什麼如此大丈夫兒須是當眾決擇莫背地裏似水底捺葫蘆相似當眾引驗莫便面赤有麼有麼出來決擇看如無楊岐失利師纔下座九峯勤和尚把住云今日喜遇同參師云同參底事作麼生峯云九峯牽犁楊歧拽耙師云正當與麼時楊岐在前九峯在前峯擬議師拓開云將謂是同參元來不是雲峯悅禪師在同安受翠巖請陞座云山僧今日平地喫交了也你等諸人還知敗闕麼然官不容鍼私通車馬拍禪床下座雪竇顯禪師在靈隱受翠峯請眾請陞座天下絕勝之覺場靈隱導師之廣座暫借卑僧陞陟實愧非材豈敢於五百員衲子前提唱佛祖抑揚古今衒耀見知恥他先作假饒說得天雨四華地分六震於曹溪路上一點使用不著何以行脚高士有把定世界圅葢乾坤底眼誰敢錯悞絲毫其知有者必共相悉玉泉皓禪師在鹿門受大陽請陞座某在鹿門十年不曾飲鹿門一滴水嚼鹿門一粒米汝若不會來大陽為汝說破擕拄杖下座報本存禪師在天衣受請上堂吳江聖壽見召住持進退不遑且隨緣分此皆堂頭和尚提耳訓育始終獎諭若據今日正令當行便好一棒打殺那堪更容立在座前雖然如是養子方知父慈名德受請借座當晚小參提綱雲峯悅禪師在同安受翠巖請當晚小參問答畢乃云莫更有作家禪客本分衲僧何妨出來共相證據有麼布袋裏盛錐子不出頭來也大好大凡扶竪宗乘亦須是箇人始得若未有奔流度刃石火電光底眼睛不勞拈出臨濟大師與德山坐次德山云今日困濟云老漢寐語作麼山擬拈棒濟便掀倒禪床師云奇怪諸禪德看此二員作家一拶一捺略露風規大似把手上高山然雖如是未免旁觀者哂且道誰是旁觀者喝一喝擊禪床下座名德借座辭眾提綱雲峯悅禪師離同安辭眾上堂山僧道慚荒薄德揣無堪豈謂使命遐飛僧徒雲請此葢堂頭和尚友於情深發揮道廣但勵履氷之志敢忘報德之誠而又翠巖一行專使限近四十餘人數日之間頗多喧聒其於感愧併集山懷兼此者一行參隨高德既蘊成人之美更敦尅志之心其如䟦涉長途各希愛護然出家達士以利人為己任動若行雲止猶谷神豈有心於彼此情繫於動靜者哉既無心於彼此亦無繫於去來所以紜紜自彼於我何為如是則冀諸上人高橫金錫輕捲雲袍明日遂行胡往弗利三門炷香法語入院炷香佛事密庵傑禪師蔣山指三門無礙解脫門重重寶樓閣不勞斂念八字打開信脚便行自然聲和響順若也躊躇便見撞牆撞壁雪巖欽禪師龍興指三門盡大地是箇院子且道門從何入八字打開青天白日護聖三門跨通方閫域示竭世樞機以手加額云是阿誰仰山三門我此潑天門戶大地一網俱收若是祥麟瑞鳳從教戴角擎頭然雖如是總過者邊著唯庵然禪師伏龍聖壽三門未跨龍門脚踏實地已跨龍門脚踏實地驟步云一聲霹𮦷風雲起元叟端禪師鳳山指三門無盡藏神通門無盡藏解脫門今日向者裏八字打開蝦蟆跳上梵天蚯蚓驀過東海笑隱訢禪師中天竺三門一彈指頃開樓閣門黃河九曲水出崑崙無文燦禪師薦福指三門紅藕當門綠楊繞路新薦福八字打開了也者裏入得天下橫行華藏指三門無箇入處奔走殺人有箇入處礙塞殺人彈指一下云重關擊碎了也入之一字甚處得來恕中慍禪師廣福三門入門一句有甚難見動著機關東扇西扇喝一喝瑞巖三門盡大地是解脫門把手拽不入雪峯與麼道瑞巖不與麼道喝一喝愚庵及禪師徑山指三門天下徑山天下龍門吐吞日月圅葢乾坤南石琇禪師光孝三門法門廣大到者方知紅霞穿碧落白日繞須彌萬壽山門無門法門一超直入逐電驊騮追莫及鐵關樞禪師普載三門大解脫門如地普載信步便入了無內外石屋珙禪師指三門豁開戶牖當軒者誰喝一喝楚石琦禪師天寧三門閙市門頭來千去萬入寺看額能有幾人復云是什麼便入鳳山三門東門西門南門北門門門有路路頭在什麼處五鳳樓前本覺三門蟄戶未開龍無龍句打破虗空全體顯露復云步光孝三門無門之門不入而入雲垂四野水滿雙湖若要天下橫行親到一回始得了庵欲禪師開福指三門我此法門直出直入中下之流自望不及喝一喝本覺指三門門門有路達者猶迷捩轉天關是誰知有喝一喝靈巖指三門撥開向上關掃蕩聖凡轍萬古乾坤一朝風月呆庵莊禪師雲居指三門大啟重關全提正令水赴雲趨金舂玉應徑山指三門我此法門天寬地濶汝等諸人於中出入須知有向上關棙子始得喝一喝月江印禪師育王指三門大解脫門八字打開了也彈指下喝總不消得用彰俊禪師普慈三門百千神通門百千妙用門總落第二義如何是第一義彈指一下箬庵問禪師金山三門玉殿瓊樓瓊樓玉殿百億化門門門有眼直得八字打開波濤潑面到者裏更須進步大眾看便入漏澤三門惟此一門而復狹小但能得入地濶天寬且作麼生入喝一喝牧雲門禪師棲真三門佛語心為宗無門為法門還有人入得此門者麼顧眾云蛇無頭而不行興福指三門石橋東鎻古㵎西來佛祖門戶今古洞開還見麼祥麟及瑞鳳盡入此山來佛殿炷香法語密庵傑禪師蔣山佛殿燒香因我得禮你窮源親到底禮拜了燒香自倒還自起雪巖欽禪師龍興佛殿碧玉盤中珠宛轉琉璃殿上月徘徊是什麼人境界其或未辨端由且看新長老拈起坐具大展三拜光孝佛殿釋迦已滅彌勒未生於此二千年內有法誰說有令誰行雲門鼻直德山眼橫仰山佛殿東土小釋迦指佛云看來即是你敢問夢升兜率天宮說離四句絕百非明什麼道理齊之以禮元叟端禪師資福佛殿玉毫徧照十方金色普輝千界便禮拜恕中慍禪師瑞巖佛殿佛是家裏人直下會得玄沙道底了庵欲禪師開福佛殿世尊拈花迦葉微笑賴有文殊與普賢熨斗煎茶不同銚本覺佛殿性覺妙明本覺明妙脫却鶻臭衫卸下膱脂帽靈巖佛殿世尊三昧迦葉不知一會靈山儼然猶在呆庵莊禪師徑山佛殿燒香三世諸佛即今向香煙起處放光現瑞轉大法輪狸奴白牯呵呵大笑露柱燈籠呵呵大笑唯庵然禪師聖壽佛殿法報化身總是者箇畢竟以何為驗泥多佛大便禮拜用彰俊禪師普慈佛殿不著佛求不著法求是什麼語話惟有佛菩提是真歸仗處便禮拜瑞巖佛殿即心即佛非心非佛心在者裏佛在什麼處提起坐具幾乎當面蹉過楚石琦禪師福臻佛殿城東老母不願見調達比丘常怒嗔信手拈一炷香也是冬行春令天寧佛殿是你是我撒土撒沙同門出入生死冤家鳳山佛殿黃金殿上釋迦老子不合向者裏屙展坐具云且禮拜葢覆却本覺佛殿佛者覺義覺的是誰西天移來此土藕絲牽著須彌光孝佛殿還識佛麼面如滿月目如蓮天上人間咸恭敬鐵關樞禪師普載佛殿說著佛字潄口三年何故清平世界切忌訛言愚庵及禪師徑山佛殿顧左右云插一莖草建瓊樓玉殿拈一莖草作丈六金身山上有鯉魚井底有塳塵笑隱訢禪師中天竺佛殿二千年前你有伎倆我無伎倆二千年後我有伎倆你無伎倆何故入水見長人南石琇禪師普門佛殿佛身無為不墮諸數烏龜稽首須彌柱徑山佛殿佛者覺義覺者何義頭上是天脚下是地靈巖佛殿佛無去來應緣即現展坐具大眾莫言不見佛朗性禪師疎山佛殿盡空界是箇寶殿畢竟那箇是佛喝云出頭天外看誰是我般人天童佛殿法報化身之乎者也齊之以禮天上天下石屋珙禪師佛殿因我得禮你自倒還自起鵓鳩樹上啼意在麻畬裏密雲悟禪師天童入院至古佛殿基云虗空作殿日月為燈且道是甚麼人境界還會麼設或未會且看新長老撒開坐具大展三拜箬庵問禪師金山佛殿因我得禮你惡口小家成群作隊文殊自文殊普賢自普賢兩兩不成三三非是今日新長老要現大人之相展具九拜漏澤佛殿德山折却者裏扶起泥土塊放光明山僧大展具作禮晦曇承禪師佛殿拈香云不是法身報身化身亦非金像木像土像當陽突出難知萬古人天榜樣遂展具三拜林臯豫禪師佛殿古釋迦新長老面面相看甚為恰好雖然禮從外來也缺者三拜不得遂展具作禮弘覺忞禪師佛殿佛者覺義杖林山下竹筋鞭三脚驢子弄蹄行麻三斤殿裏底大者如兄小者如弟且道是甚麼義一劈華山成兩路萬年流水不知春牧雲門禪師佛殿文殊騎獅子普賢騎象王釋迦老子坐寶華臺各自稱尊山僧既入者保社未免也露些子神通展坐具云是甚麼佛殿三面好山中一所空王殿喝退麻三斤打開乾屎橛甚處與古佛相見以坐具打圓相云交朝宗忍禪師佛殿拈坐具云拜即是不拜即是既是故人何須特地遂拜伽藍堂炷香法語能仁元禪師初住福嚴入伽藍堂見土偶甚夥不覺失笑遂炷香小庵小舍小叢林土地何須八九人若解輪番來打供免教碎作一堆塵是夕神致夢于山前檀越願如所戒唯庵然禪師聖壽伽藍正直聰明聰明正直顯正摧邪憑誰之力喝一喝佛朗性禪師疎山伽藍我有六通你有五通且道如何是那一通汗馬無人識重論葢代功南石琇禪師靈巖指土地云妙通乾坤回幹造化總不出者些子何故滴酒落地千神皆醉報恩伽藍虗而靈寂而妙天無私葢日無私照楚石琦禪師土地堂龍王殿赫赫厥聲濯濯厥靈前朝鳳闕萬古龍庭雨過吳山插漢青密雲悟禪師土地堂拈香云伽藍神叢林主一瓣香兩手舉便燒箬庵問禪師金山伽藍殿真不掩偽曲不藏直我出你圈繢不得你出我圈繢不得弘覺忞禪師伽藍通身徧界不曾藏出入先知有甚妨須待後來添一分不如當面為燒香土地堂禍不單行福無雙至叢林殃害惟我與你相逢拍手上高臺一任波旬冷眼視牧雲門禪師伽藍古寺高林仰惟垂護潭影山光左鑒右顧且顧箇甚麼千年常住一朝僧剔起靈峰照夜燈祖堂炷香法語唯庵然禪師聖壽祖堂你者一隊全無巴鼻六耳同謀有甚良計用彰俊禪師瑞巖祖堂以心印心以法傳法一犬吠虗千猱啀實達磨不會禪六祖不會道所傳心法甚處得來鐵關樞禪師普載祖堂馬頷驢腮釘觜鐵舌四七二三證龜成鼈楚石琦禪師云總是者一隊漢佛法不到今日不是者一隊漢佛法不到今日且道是肯他不肯他本覺祖堂達磨師不是祖半夜下闍浮日輪正卓午光孝祖堂一花五葉起必有因且道從什麼處起岸上蹏踏蹏水中嘴對嘴愚庵及禪師普慈祖堂昆明池裏失却劍曲江江頭撈得鋸須彌峯頂浪滔天大洋海底蓬塵起大小祖師口門無齒恕中慍禪師廣福祖堂栗棘蓬金剛圈拋來擲去此土西天瑞巖祖堂心心相同眼眼相矚一等陳年爛葛藤六六依然三十六南石琇禪師報國祖堂建立叢林傳佛心要赤脚穿皂靴露頂戴蓆帽報國祖堂四七二三單傳直指南山起雲北山下雨徑山祖堂拜起收坐具云祖祖傳持只者一著耀古騰今填溝塞壑佛朗性禪師疎山祖堂此土西天千七百烏豆換却人眼睛而今大地咸屏跡皷腹高歌自太平天童祖堂從上宗師建法社東家作驢西家馬鼻孔穿來只等閒太白一欄都收下密雲悟禪師祖堂云西天四七東土二三盡在者裏默默商量箇事今日一時捉敗且道以何為驗插香云以此為驗箬庵問禪師金山祖師殿西天東土者一隊老凍儂討甚巴鼻問上座要為祖師出氣拈香云一二三四五晦曇承禪師祖師堂迦毗香至及梁累及平人不可量今日令行壽量寺鼻孔齊穿一炷香弘覺忞禪師祖堂靈山密付囑分布在西東流𦦨一何長千燈續莫窮炷香云