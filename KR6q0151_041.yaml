body:
  text: 武林十八澗理安禪寺住持婁東行悅集立秋日提綱七月密庵傑禪師立秋上堂一葉落天下秋風高雲淡水碧空浮達磨不會接手句少林空坐冷啾啾叵耐雲門垛根漢復於頭上更安頭記得僧問雲門達磨九年面壁意旨如何門云念七師喝云果然只在者裏良久復云勘破了也法石空禪師立秋上堂千家樓閣一霎秋風祇知襟袖涼生不覺園林葉落於斯薦得觸處全真其或未然且作寒溫相見斷橋倫禪師立秋上堂德山低頭夾山點頭俱胝竪起手指頭玄沙𡎺破腳指頭提起拄杖云都來不出山僧拄杖頭何以見得卓拄杖云一葉落天下秋愚庵及禪師秋日示衆叨據名藍海上洲慙無道福繼芳猷宗綱委地方堪憫聖德如天未易酬好把靈符懸肘後莫將間事涴心頭金風昨夜飄梧葉地北天南又早秋開旦過提綱八月天目禮禪師上堂諸方今日旦過堂開盡皆容受福泉深山牢關把定一迹難登且道放開即是把定即是王郎衫袖濶鄭老帽簷高中秋日提綱真淨文禪師上堂今朝八月中秋正是月圓當戶所謂盲者不見非日月之咎故經云是法平等無有高下迷者自迷悟者自悟大衆當知不得莽鹵五祖演禪師中秋上堂中秋月中秋月古今盡謂尋常別別不別皎皎清光遍大千任從天下紜紜説圓悟勤禪師中秋上堂秋半西風急當空月正圓蕭蕭木葉落湛湛露珠懸嘹唳衝雲鴈凄清抱樹蟬頭頭渾漏泄切忌覓幽玄大慧杲禪師中秋上堂人有心看月月無心照人有無成一片方始得惺惺驀拈拄杖卓一下云者箇不可不惺惺擲下云若知撲落非他物始信縱橫不是塵中秋上堂舉仰山與長沙玩月次山以手指月云人人盡有者箇只是用不得沙云却是請汝用山云作麼生用沙近前一踏踏倒仰山山起來云直下是箇大蟲師云皎潔一輪寒光萬里靈利者葉落知秋傝者忠言逆耳休不休已不已小釋迦有陷虎之機老大蟲却無牙齒當時一踏豈造次驀然倒地非偶爾衆中還有緇素得二老出者麼良久云設有也是掉棒打月或菴體禪師中秋上堂天上中秋月人間半夜燈不辜黃面老何愧黑衣卿正按乾坤濶旁提星斗明朝昏門大啓飲慶生平壽寧道完禪師上堂古人見此月今人見此月此月鎮常存古今人還別若人心似月碧潭光皎潔決定是心源此説更無説咄法泉佛慧禪師中秋上堂畫一圓相以手拓起云諸仁者還見麼團團離海嶠漸漸出雲衢諸人若也未見莫道南明長老措大相却與寶華王座上念中秋月詩若也見得此夜一輪滿清光何處無投子普聰禪師中秋上堂寂住峰頂葉落歸根明月堂前金風玉露且道深秋一句作麼生道良久云古往不知何處去後夜依前月到下座泐潭景祥禪師中秋上堂靈山話曹溪指放過初生斫頭底未問龍眠老古錐昨夜三更轉向西正當恁麼時有人問如何是月向明暗未分處道得一句便與古人共出隻手如或未然寶峰不免依樣畫樣應箇時節乃打一圓相曰清光萬古復千古豈止人間一夜看虎丘隆禪師中秋日上堂云摩竭掩室毗耶杜詞斯皆理為神御故口以之而默豈曰無辨辨所不能言也放出陝府鐵牛觸殺嘉州大象撞透天關掀翻地軸看看磕破諸人髑髏還有識痛癢者麼良久云萬山不隔今宵月一片清光分外明劍門分禪師中秋上堂八月十五中秋節月滿長空光皎潔還見麼拍禪床云劍門者裏不是天機輕漏泄蓋是老婆心太切大衆尋光弄影沒交涉下座羅漢南禪師上堂禪不禪道不道三寸舌頭胡亂掃昨夜日輪飄桂花今朝月窟生芝草阿呵呵萬兩黃金無處討一句絶思量諸法不相到靈隱淳禪師中秋上堂吾心似秋月碧潭清皎潔乃喝云寒山子話墮了也諸禪德皎潔無塵豈中秋之月可比虗明絶待非照世之珠可倫獨露乾坤光吞萬象普天匝地耀古騰今且道是箇甚麼良久云此夜一輪滿清光何處無寓庵潛禪師中秋上堂去年人看中秋月今年人看中秋月今年人是去年人去年月是今年月還有人向者裏著得一隻眼麼若也著得徑山分半院與伊住其或未然歸堂喫茶一作大慧雪巖欽禪師中秋上堂暈入靈犀胎含老蚌正好修行正好供養有人於此拂袖便行腳跟下已喫三十拄杖何以見得禪歸海經歸藏中秋上堂非闕不知圓非圓不知闕圓闕本相因本無圓與闕既無圓闕是汝諸人向甚處見月竪拂子云團團離海嶠漸漸出雲衢打圓相此夜一輪滿清光何處無中秋上堂好供養好修行拂袖便去也不多爭何故此夜一輪滿清光何處無中峰本禪師獅子巖東岡幻住庵中秋示衆云天上月水中月光漾漾與誰説今宵幸遇中秋節記得靈山話曹溪指南泉玩寒山比將謂廣寒殿裏別無人元來總是弄巧翻成拙竹影篩金瑤階積雪盡謂一輪光皎潔那知今夜圓後夜缺有箇譬喻試聽説三十夜止有一夜圓此圓時如諸禪德之精勤勇猛也三百六十夜止有一夜是中秋此中秋之月如諸禪德於精勤勇猛中打成一片之時也奈何精勤時少懈怠時多又奚止於一暴十寒而已哉雖三百六十夜遇此良宵其或癡雲驟起迷霧橫陳覿體暗昏昏依舊沒交涉無始時來總是恁麼蹉過昔人有喝火口號謂日間閙炒炒夜間靜悄悄可惜好光陰一時都過了照顧火燭時聞者多有警省本上座對此中秋之月亦有箇口號勉為大衆舉似天上月月月二十九夜缺只有今夜圓莫教雲霧攝攝不攝眨得眼來天又明寬著程途且待三生六十劫石屋珙禪師中秋上堂初三月十五月缺時無圓圓時無缺圓缺不相干清光常皎潔昨夜蟾宮雨露多天風吹落黃金屑中秋上堂黑月難見白月易見黑白未分已前眼見何如心見所以道見見之時見非是見見猶離見見不能及卓拄杖云昨夜蟾宮桂子開好風吹下天香來昭王白骨埋青草無人為掃黃金臺中秋謝藏主上堂天上月正圓人間月方半諸人恐未知打鼓普請看道是如來藏裏摩尼珠又似賓頭盧尊者手中琉璃碗比也不可比辨也不可辨天風吹露濕桂花香浸雲邊廣寒殿笑隱欣禪師中秋上堂舉盤山道心月孤圓光吞萬象光非照境境亦非存光境俱亡復是何物師云盤山好箇心月孤圓又道復是何物惜乎話作兩橛報國不是將官物作自己人情也要諸人同一受用玉露暗飄無景樹金風微動夜明簾木人鞭起泥牛吼不許蒼龍臥碧潭恕中慍禪師中秋謝侍者上堂一痕未吐千聖罔測其由三五正圓萬像莫逃其質長沙與仰山一踏南泉拂袖便行諸人還會麼犀牛扇子無頭角拈起清風遍大千古梅友禪師中秋上堂衲僧家沒來由天不管地不收杖頭挑日月隨處逞風流業海深無底隨流輥入流還有得知時節底麼莫問渠儂知不知一輪明月挂中秋南石琇禪師中秋上堂有進有退有主有賓有權有實有照有用眼目人天綱維法社者箇是衲僧分上事三家村裏臭老婆左塗右抹十字街頭廖胡子東倒西擂且道是什麼人分上事良久此夜一輪滿清光何處無無文璨禪師中秋謝修造進嚴耆舊上堂土木場中輥一回平生己眼豁然開廣寒宮殿無關鑰撞破髑髏歸去來中秋上堂拍禪床云山僧今日豁開廣寒宮殿千門萬戶六通四闢普請盡大地人穩步而升操三寸戈與萬人敵雖然仙桂第一枝畢竟誰折得鐵關樞禪師中秋上堂缺月圓月半明半暗吞月吐月全放全收拂子打圓相一點光吞萬象秋楚石琦禪師中秋上堂天地未分時高低覆載何在日月不到處光明照燭無偏真箇是描不成畫不就昨夜三更白如晝中秋上堂舉雲巖掃地次道吾云何得大區區生巖云須知有不區區者吾云與麼則第二月也巖竪起帚云者箇是第幾月吾拂袖出去雲門云奴見婢殷勤師云雲巖竪起帚道吾便出去總是第二月那箇是不區區者此夜一輪滿清光何處無中秋上堂貴買朱砂畫月算來枉用工夫純將白粉塗成要且未是真月文殊道但一月真中間自無是月非月竪拂子云本無偏照處剛有不明時中秋上堂一月普現一切水一切水月一月攝盡大地是水阿那箇是月盡大地是月阿那箇是水你若不信錢塘江裏少哩中秋上堂天上月圓人間月半古人道赫日猶虧半烏沉始得圓且那一半落在甚麼處更深夜靜共伊商量中秋上堂鳳山説何似萬象説八月十五夜月最親切八月十八日潮更直截聞不聞瞥不瞥嘉州大象喫蒺藜陝府鐵牛流出血了庵欲禪師中秋上堂舉馬祖與西堂百丈南泉玩月公案師云言氣相投機感相應古今盡謂玩月話奇特殊不知馬大師憐兒不覺醜若也據令而行者一隊弄光影漢總好與本分草料免見門戶寂寥拍禪床云禹力不到處河聲流向西上堂好箇中秋節莫言無供養風吹丹桂花清香滿天上諸人眼裏也飽耳裏也飽鼻裏也飽只恐肚裏不飽若得肚裏飽去則不疑佛不疑祖不疑天下老和尚拈出袖裏金鎚打開光明寶藏不涉凡聖路岐便是渡河香象喝一喝中秋上堂久矣不上堂口邊生白醭侍者來燒香請法拈出秦時舊𨍏轢金剛腦後下一鎚空裏磨盤生八角寒山撫掌笑呵呵夜來月向西邊落喝一喝中秋客至上堂靈山指月曹溪話月馬祖百丈西堂南泉玩月盤山道心月孤圓光吞萬象光非照境境亦非存光境俱亡復是何物癩馬繫枯樁洞山道光境未亡復是何物黑牛臥死水育王師翁云月在水中撈不上徒勞𭣟碎水中天夜深山寺開門睡月自飛來在面前用盡自己心笑破他人口本覺今日中秋靈山上客垂訪適值滿天風雨既無可修行又無可供養終不拂袖便行未免相與憑危欄倚曲檻推出手面一輪直是清光萬里三關不立開鑿人天四句頓除光揚祖道擊拂子云八萬四千非鳳毛三十三人入虎穴重陽日提綱九月真淨文禪師上堂先上座煮黃栗粥供養禪衆喫了總飽地挂起鉢盂知恩方解報恩三十年後不得辜負趙州老直饒當下見得倜儻分明不隨古人言語所轉各證無生法忍得大解脫須知三年一閏九月重陽是何宗旨喝一喝下座天童朴禪師重陽上堂牛皮鞔露柱露柱啾啾叫鐙籠佯不知虗明還自照殿脊老鴟吻聞得呵呵笑三門側耳聽就上打之繞譬如十日菊開徹阿誰要阿呵呵未必秋香一夜衰尉斗煎茶不同銚石門雅禪師重陽示衆茱萸鮮嫩菊花香暢殺陶家醉倒郎我輩泛觴雖絶分東籬間玩也無妨大衆間玩即不無且道眼在什麼處知有底眉毛眼上橫未諳者紅黃裏亂走阿呵呵今日元來九月九喝一喝永泰覺禪師上堂金風淅瀝玉露凄清菊解香苞稻懸嘉穟時清道泰野老謳歌處處登高人人歡樂諸禪德祇如林間衲子豈不知時若也燕默忘形昧他光景翠微深處不逐四時一炷旃檀無恩不報拍禪床下座月頂輪禪師重陽上堂重陽何物助僧家籬菊枝枝盡發花不學故侯將伴飲為君泛出趙州茶只此一杯醒大夢盧同七碗謾矜誇良久曰便請卓拄杖一下寓庵潛禪師菊旦上堂今朝九月初九天色半晴半雨衲僧鼻孔眼睛切忌和泥合水乃顧視大衆惺惺直是惺惺伶俐不妨伶俐等間問著十人五雙不知落處不見道事因叮嚀起一作大慧羅漢南禪師示衆𩖼𩖼籬根菊正黃妙談西祖意琅琅不知誰解聞斯語堪為宗門立紀綱便見羅漢拂子展大神通化作文殊普賢觀音勢至穿過諸人髑髏必也盡知來處可謂於出入息中供養恆沙諸佛若也不知分付德山臨濟擊一擊愚庵及禪師九日上堂舉大茅示衆云欲識諸佛心但向衆生心行中識取欲識常住不遷義但向萬物凋落處會取師云古人言不虗發發必全真衆生現行無明煩惱業識茫茫作麼説箇諸佛心秋變冬凋春生夏長萬物榮謝無有停息又如何説箇不遷義三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新拍禪床云汾陽和尚來也切忌錯下注腳重陽上堂舉真淨和尚云九日無白醪飽餐黃栗糕十日有黃菊催人打禾穀五更鐘未鳴鄰雞已數聲相逢不下馬各自奔前程師云逸格風流通身文采老雲庵美則美矣若約衲僧分上猶欠勦絶在山僧效顰亦有一偈舉似大衆非圖邁古超今且要應時應節九日無白醪萸茶滿碗澆十日有黃菊涼飈動林麓五更鐘未鳴過鴈兩三聲更欲求玄旨迢迢十萬程上堂舉白雲示衆云金蕊叢叢帶露新采來烹茗賞佳辰浮杯何必須宜酒但有清香自醉人開福道白雲老人大似巧媳婦做出無麵餺飥惜乎知味者少開福效顰亦有一偈重陽黃菊未成花落帽無勞憶孟嘉但得青山長在眼不妨流水去無涯師云白雲開福大似徐六擔板各見一邊徑山見處也要諸人共知時移節換是尋常過了重陽又一陽人事自生今日意黃花只作去年香笑隱欣禪師重陽上堂中峰用處沒疏親道合寧論主與賓却笑汾陽強分別重陽九日菊花新鐵關樞禪師重九上堂九月九醭生口茱萸茶菊花酒三世諸佛不知有無文璨禪師重九上堂天地一東籬萬古一重九黃花三兩枝東湖隨分有逢人不拈出只麼空雙手醉殺天下人不是茱萸酒千巖長禪師上堂九月九家家盡喫茱萸酒堪笑山居道者家兩枚豆粽塞却口太寒酸無可有八角磨盤空裏走却有些兒勝俗人日日面南看北斗了庵欲禪師重九客至上堂兩兩不成雙三三自成九本色住山人何處尋窠臼卓拄杖云離四句絶百非驢前馬後莫亂針錐九日上堂三四五六七八九碧眼胡僧不知有三更收得夜明符天曉起來成漏逗籬下黃花爛熳開龍山落帽霑風埃令人長憶龐居士天上人間不可陪阿呵呵會也麼若也不會山僧更道兩句去也石頭一箇住山斧古往今來稱獨步馬師胡亂三十年誰道少鹽還少醋喝一喝上堂舉白雲示衆云金蘂叢叢帶露新采來烹茗賞佳辰浮杯何必須宜酒但有清香自醉人師云白雲老人大似巧媳婦做出無麵餺飥惜乎知味者少開福效顰亦有一偈重陽黃菊未成花落帽無勞憶孟嘉但得青山常在眼不妨流水去無涯九日進退頭首上堂今朝九月九萬物隨時候滿泛茱萸茶何用菊花酒畢竟醉兀兀不似長醒醒諸人若也信得及便見堂中上座決有長處知得堂中上座決有長處便知釋迦老子橫説竪説直説曲説四十九年重重敗闕知得四十九年重重敗闕便知興化堂前饡飯吹香克賓維那全鋒敵勝知得克賓維那全鋒敵勝便知古雪竇抑揚有準韓大伯笑裏藏刀知得抑揚有準笑裏藏刀便知國師三喚侍者三應將謂我孤負汝却是汝孤負我雖然且道節文在什麼處擊拂子云閃電爍開千聖眼好山多在太湖中重陽永福子有和尚歸上堂開甘露門據甘露室令諸衆生食甘露味永福和尚即其人也茲者龍歸舊窟鳳返丹山草木叢林頓增光彩本覺法弟何幸如之所謂物宜求新人宜求舊無端陳蒲鞋手握赤梢鯉倒跨三腳驢跳出雲峰破桶篐中揚聲大叫云欲上座你只見錐頭利不見鑿頭方豈不聞佛法大事靜退小節山僧被渠一問直得無言可對無理可伸只記得汾陽和尚道三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新喝一喝下座湛然澄禪師上堂三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新此汾陽老人與臨濟大師共箇鼻孔毫毛竅穴一些子也不異無端後來有箇老宿將三玄三要逐句解説曰體中玄句中玄玄中玄雖則眉目活肖以東塔看來直是埋沒祖宗賺誤後賢何也不見百丈云六句內會取三句外用得若一句作一句説長老自墮地獄不干學人事若三句作一句説學人自墮地獄不干長老事驀拈拄杖云喚作拄杖是人天有句不喚作拄杖是聲聞無句亦有亦無非有非無是菩薩中道句若乃如是逐句指點則拄杖子入地獄如箭射然拄杖子還向你諸人曾道箇什麼來以其無恁麼事所以能穿過你諸人髑髏透入你諸人眼睛你諸人也須各各善知回互始得復竪起拄杖云看看今日是重陽節澄長老無可説大家邀往煙雨樓把手登高望秋色遂以手作急招勢云來來欲窮千里目更上一層樓牧雲門禪師重九上堂九月重陽節風俗愛登高登高必須山登山須到頂而今時節祖庭秋晚叢林凋零求箇到頂底絶少你須知得上山路也得若知得上山路不向中路止息要到頂也不難設或連上山路也不解儘你將常熟山繞百匝千匝千年萬年每日只見撞牆撞壁又烏知宇宙之寬天地之大而今一衆幸同住山中上山路最近遂拈拄杖指云若解驀直去便可傲睨天外同賞重陽其或未然遙知兄弟登高處遍插茱萸少一人石雨方禪師上堂操一葉之扁舟是第一義泛鑑湖之曉月是第一義拈妙香而氤氳是第一義散天花以怡悅是第一義法筵龍象衆在什麼處去也移彤山向天華天華不大移天華向彤山彤山不小沒絃琴彈得者頭頭合拍籬邊菊賞得底處處成歡雖然若是陶淵明何須賦歸去開爐提綱十月真淨文禪師開爐上堂凡夫色礙二乘空礙菩薩色空無礙目前萬象森羅理事融通自在僧堂又添暖火十方高人共會不必更分彼此同是一真法界喝一喝下座保寧勇禪師開爐上堂今朝十月一爐簇無煙火削髮披緇流競向爐邊坐霜清天乍寒水冷氷未鎖不知天上與人間更有阿誰過似我拍手大笑下座法昌遇禪師開爐日以一力撾鼓升座曰法昌今日開爐行腳僧無一箇唯有十八高人緘口圍爐打坐不是規矩嚴難免見諸人話墮直饒口似稱鎚未免燈籠勘破不知道絶功勳枉用修因證果喝一喝但能一念回心即脫二乘羈鎖偃溪聞禪師開爐上堂舉趙州和尚示衆云老僧三十年前在南方火爐頭有箇無賓主話直至如今無人舉著師云森羅萬象明暗色空日夜舉揚趙州古佛不是不知只為貪程太速長翁淨禪師開爐上堂召衆打圓相云箇是天童火爐近前則燒殺退後則凍殺忽有箇漢出來道合作麼生㘞火爐動也超化藻禪師開爐上堂雪滿寒窗燒盡丹霞木佛氷交野渡凍殺陝府鐵牛直得寒灰發𦦨片雪不留任運縱橫現成受用諸禪德要會麼衲帔蒙頭坐冷暖了無知圓悟勤禪師開爐上堂三世諸佛向火焰裏轉大法輪熱發作什麼火焰為三世諸佛説法三世諸佛立地聽也須照顧眉毛若是聊聞徹骨徹髓信得及見得徹直下與三世諸佛同生同死與火焰同起同滅當處解脫得大安隱衲被蒙頭便是箇清涼世界苟或未然只知事逐眼前過不覺老從頭上來開爐上堂乾茆近火理合先燋滴水氷生事不相涉倘或透生死明寒暑融動靜一去來直得意遣情忘如癡似兀然後乃可飢則喫飯健則經行熱則乘涼寒則向火雖然如是趙州道我在南方二十年有箇無賓主句直至如今無人舉得且無賓主話火爐頭如何舉得還委悉麼衲被蒙頭萬事休此時山僧都不會瞎堂遠禪師開爐上堂天無門地無壁葫蘆棚上種冬瓜兩手扶犂水過膝跳金圈吞栗棘氈拍板對無孔笛屈屈獨腳山魈解雙躍去年冬裏無炭燒今年定是無火炙飢時飢到眼睛黃窮時窮到赤骨立屈屈且道屈箇甚麼叵耐監寺副寺維那典座直歲等却與泥水匠商量放出兩頭鴟鶻咬殺佛殿脊或庵體禪師開爐上堂暑往寒來十月朝開爐著火擁雲袍斷將不涉廉纖句勘破當年噇酒糟會麼風頭稍硬暖室商量漢語難明胡言易辨妙峰孤頂犬競髑髏善法堂前鬼爭漆桶説甚面壁九年耳聾三日胡餅是饅頭烏龜成白鱉東西十萬南北八千元來只在鼻頭尖摸著通身汗如雨開爐上堂舉五祖演和尚示衆云難難幾多般易易沒巴鼻好好催人老默默從此得過得者四重關了泗洲人見大聖焦山老漢也有此説難難放過軟頑易易多添瞌睡好好和衣便倒默默有筋有骨過得四重關了屋裏販楊州其或猶豫未決更聽一頌夤緣過夏又經冬難易當知好惡同肚裏飢瘡無括擾爐中生炭滿空紅挑灰弄土非相許濶論高談豈相容疊足跏趺描不就眼空煙景振宗風應庵華禪師開爐上堂三世諸佛吞却火焰火焰燒殺三世諸佛一盲引衆盲相牽入火坑棒打不碎底填溝塞壑刀斫不入底臥雪眠霜作世諦商量也得作佛法流布也得渾圇吞却三十年後有人索飯錢在直饒爛嚼白湯咽下未免粘牙帶齒且道蔣山為人在什麼處爛研巴豆三千顆瀉盡諸方五味禪雪巖欽禪師開爐上堂死柴頭上有無煙火水晶宮裏烈焰燒空舜若多神眉鬚自墮拈拄杖云拄杖子聞與麼道是信耶是不信耶卓拄杖云雙破開爐上堂不冷不熱爐鞴半真半假金鍮鑄作瓶盤叉釧却成品字柴頭且道與趙州無賓主話相去多少疑則別參開爐上堂火冷灰寒炭又無大家兀坐嘴盧都冷灰堆裏忽豆𪹼大地通紅火一爐世界與麼濶火爐與麼濶則不問且道香匙火筯大小長短相去多少不得動著
