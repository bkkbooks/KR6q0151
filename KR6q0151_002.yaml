body:
  text: 武林十八㵎理安禪寺住持婁東行悅集降香到提綱圓悟勤禪師秦魯國大長公主降香請升座天高無極無極有尊地厚無垠無垠有主鏡萬象方寸懷六合胸中發大機顯大用是故乃祖乃佛或拈華或面壁或行棒或行喝或詞辨縱橫或寂寥無說周旋往返只明此箇無為宗旨所以人人分上各各壁立萬仞無一絲毫移易虧缺豈不見道譬如帝力不棄一民不謂不知而不容不謂知之而含育到箇裏啓無為之化行不言之教各各頂天履地飲泉水貴地脉正當恁麼時還委悉麼一穗寶香天上降金輪皇億萬斯年金山仲禪師皇后遣中使降香為皇帝祝延聖壽上堂法本無說隨事應機心本絶形遇緣即現古今如是凡聖同途蓋衆生迷妄不知遂成流轉故能仁頓忘情見了達根源不從外求亦非內得所以佛佛授手祖祖相傳道貫一乘宗分五派臨濟則賓主互換韶陽乃顧鑑全超溈仰則父子相投曹洞乃君臣慶會清凉法眼直指惟心建立門風各張鋪席包含萬象該括大千冥冥不混於色聲蕩蕩豈妨於語默把定則十方坐斷虎踞龍蟠放行則千聖出興風行草偃助堯仁政化祝睿算延鴻降伏衆魔普利羣有然雖恁麼猶涉程途且道正令當行如何理論良久云一氣不言含有象萬靈何處謝無私密庵傑禪師降御香到上堂天地合其德日月合其明四時合其序風以時雨以時國泰時平民康物阜萬姓四民合其一心熙熙焉陶陶焉一人有慶兆民賴之是故林下禪人居於四民之外二六時中據德山棒擔睦州板驅耕夫牛奪饑人食拈一莖草作丈六金身將丈六金身作一莖草卷舒自在縱奪臨時堪報不報之恩共助無為之化復舉肅宗皇帝問忠國師如何是十身調御國師道檀越踏毗盧頂上行前日開堂次僧問如何是十身調御山僧對他道垂手過膝諸人且道山僧與麼答他與國師是一是二若道是一語言參差若道是二佛法豈有兩般畢竟如何大海若知足百川應倒流佛日嶽禪師哲宗皇帝遣中使降香師登座問答罷乃曰此箇法門不在筌蹄豈干問答直饒盡十方剎土抹為微塵一一微塵盡為衲僧各如滿慈鶖子窮天玄辨竭世樞機到者裏一點用不著何以故生佛圓融自他平等人人鼻孔遼天各各壁立千仞蓋不知真隨妄轉法逐緣遷自昧靈光枉投異趣所以破有法王運無緣慈駕三乘舟楫渡五性波瀾翻戀澄潭月影靜夜鐘聲故使懷州牛喫禾廬陵米價長又不免勞初祖達磨逗器支那教外菱花不磨甎鏡衣中驪頷不數他珍未挂古帆見成公案由是悟取無悟底面目迷是不迷底鄉關三際無私十方洞暢自家田地枯木生枝古廟香爐寒灰再𦦨莫不一切語言文字資生産業皆與實相不相違背若然者無影樹下合同船漁翁鼓舞中有黃金充一國野老謳歌共樂升平同躋壽域自是天長地久海晏河清且道共樂升平一句作麼生道良久曰羅浮打鼓韶州舞久立珍重佛陀遜禪師哲宗皇帝遣中使降香師升座問答罷乃曰傳持此事豈以搖唇鼓舌馳騁言鋒而可議然於方便門中事無一向是故文殊以無住為本曹溪以無念為宗無念之宗為萬法之宗無住之本為萬法之本衆生棄本逐末背覺合塵一失其源迷而不復故祖師西來不立文字特唱宗乘只教諸人明見自性與佛同壽歇則菩提不從人得佛言我於然燈佛所無一法可得然燈佛方與我受記若有一法可得然燈佛即不與我受記如是舉唱猶是化門且不落化門一句作麼生道冬無寒臘下看復曰諸仁者道非隱顯遇緣即宗法無去來因時而會若緣時而未會雖佛祖亦何為且張祖席創立叢林豈一僧之所能必假國王大檀越為之護助佛日乃可光揚自昔京城未聞是道先帝始建法幢延四海之高流為一時之大事故今日佛道如此之盛皇帝陛下少踐丕圖早聞妙法不忘佛記克紹前芳遂令山野之人獲預朝廷之命即將此開堂善利上祝聖壽無疆伏願舜日與佛日齊明堯風與祖風竝扇萬無事時當熙盛之年四海晏清人樂升平之化久立珍重佛印清禪師哲宗皇帝遣中使降香師登座問答罷乃拈拂子召大衆曰還見麼手中拂子層層為諸人放百種寶光復擊禪床曰還聞麼座下猊臺句句為諸人演一乘了義諸人若向者裏悟得則曠大劫來我人業識當體煙滅灰飛現前身世根境塵勞徹底氷融雪泮便見靈山正法眼藏昭昭溢目全彰少室涅槃妙心晃晃通身獨露譬如演若悟鑑中面目元來只是己頭亦如力士護額上圓珠到了不從他得如斯則無量神通三昧塵塵本爾圓成恆沙諸佛法門念念一時具足諸仁者有能恁麼搆去便謂立證無生不待僧祗而成正覺如今要見無生麼良久云一氣不言含有象萬靈何處謝無私中峰本禪師延祐六年九月初六日駙馬太尉瀋王王璋奏奉聖旨御香入山謁師於幻住庵翼日請師就師子正宗禪寺升座大道無為大功不宰大善無跡大位不居一切處海印發光千萬古金枝挺秀訪圓通大士於潮音洞裏買石得雲饒修如意輪期於明慶寺中移花兼蝶至香風奏四天之樂梵音轟大地之雷二千載已現國王五百劫常為世主一大藏教隨機運轉百千善行任意發揮祝萬歲於九重保三韓於上國此是太尉瀋王海印居士尋常行履處只如今日偕行宣政院使平章相國王子從官高登天目下視人寰且佛法相應一句如何指陳匝天匝地祥雲起無古無今瑞氣騰某道行全虧病衰滿體隈藏巖穴惟待殞亡記六載前伏承太尉瀋王書下逮謂得旨南來首謁補陀次登天目今年之夏忽聞王車從至杭繼臨海岸親見十二面滿月慈容於潮音洞裏約山僧見處又却不然其觀世音聖相當數年前最初發一念時而滿月慈容當處與王之兩目如鏡照鏡自爾凡舉一念則一觀音示現舉百念則百圓通現前所現之聖容隨念起處竟莫知幾千萬身豈特王心為然自車從離京之日自此而南三千五百里驛程若聞若見俱使知有補陀巖人人心中皆具現觀世音菩薩之慈容此又豈數量可知耶如是無剎不現之身皆含裹於王之最初一念而其應現又不止於今日將見亘百千世後傳王之躬詣補陀巖使觀世音自在神通光明世世增長其無作妙用殊勝功德未易以算數知也今乃與宣政院使平章相國及王子宰相尚書侍郎舍人宣使一行官從同時會集尋奉王旨謂一衆俱欲聞向道之說若使一一請問未免詞繁俾升此座普為衆說記得先師高峰和尚三十年深居此山每以一箇萬法歸一一歸何處話教人默默提起密密咨參但不使間斷亦不為物境之所遷流亦不為愛憎順逆情妄之所障蔽惟以所參話頭蘊之於懷行也如是參坐也如是參參到用力不及處留意不得時驀忽打脫方知成佛其來舊矣者著子是從上佛祖了生脫死之已三昧惟貴信得及久遠不退轉更無有不獲其相應者所以古宿有謂但辦肯心決不相賺今日太尉王與宣政平章相國王子從官皆是夙承佛記遠種靈根而華茂果圓相逢此際豈非一時慶會千古因緣者哉又記得教中有謂若人欲識佛境界當淨其意如虗空且淨意如虗空置之不問還識佛境界麼如一香一華一幡一幢非佛境界官殿樓閣園林浴池非佛境界乃至光明殊勝等俱非佛境界本上座今日忍俊不禁指似去也山高水深是佛境界日上月下雲騰鳥飛是佛境界明暗色空壞空成住三途六趣九有四生爐炭鑊湯諸惡苦趣是佛境界諸仁者還信得及麼當知佛境界充遍故衆生境界亦復充遍離佛境界外別無衆生境界舍衆生境界外別無佛境界所謂佛境界者極而言之迷則佛境界俱是衆生境界悟則衆生境界俱是佛境界如楞嚴謂如我按指海印發光汝暫舉心塵勞先起此說豈有定體耶謂海印者廣周法界不於印外別容有一法而得安住一切諸法皆海印之真光含攝諸塵圓裹三際此印隨佛心量建立無異無別不增不減而衆生罪亦復如是但悟迷之有間也使我廣說循環莫盡恐稽王聽不欲詞繁記得昔日趙王訪趙州和尚州不下禪床乃問王曰會麼王云不會州曰自小持齊今已老見人無力下禪床道尊德備須還趙州不下禪床師法有在無端末後垂示大似偷心未忘不妨使人疑著爭似幻住以三千六百丈天目山為禪床行則與王共行坐則與王共坐或有人問其中事若何聽取一偈圓通示現潮音洞幻住深棲天目山至竟不能逃海印嘉聲千古播人寰受師號紫衣提綱智門祚禪師因李都尉奏師紫衣到日上堂問話且止斯日皇恩且道自何而降老僧本志弊衣遮幻質糲食補饑瘡無何都尉聞天榮頒紫服著且又違本志不著又負天心挂不挂且致你道祖師挂什麼衣若也委悉許上座終日耆衣未曾挂著一縷絲終日喫飯未曾咬著一粒米若不委悉看老僧今日披衣去也遂乃披衣雪竇顯禪師受師號上堂禪家流還如戰將見鬭勇健索不來即便擒下雖一朝之作爭似借水獻華唱太平歌好夜雨山草滋爽籟生古木閒吟竺仙偈勝於嚼金玉蟋蟀啼壞牆苟免悲局促道人優曇華迢迢遠山緑是知道無不在誰云間然故天有道以輕清地有道以肅靜谷有道以盈滿君有道以敷化故我今上皇帝金輪統御睿澤滂流草木禽魚無遠不及巖野抱疾之士俄承寵光此生他生無以云報賢守司封高扶堯舜下視龔黃襲千載之雅風鎖萬之春色佇當明詔別振休聲二車屯田諸廳朝宰不敢飾辭褒讚仲尼言云吾禱久矣圓悟勤禪師鄧樞密奏到紫衣師名上堂大道絶遮攔其誰趣向虗空無背面何處雕鐫逈出威音王高超毗盧頂直得絶塵絶跡離相離名海口莫能宣佛眼不見其奈巖中宴坐諸天雨華淨室掩關梵音慰諭遠稟一人洪造特資宰輔陶鎔椹服師名薦臻巖穴既爾從天降下理應直下承當泉石光輝林巒增秀風行草偃水到渠成由是擊開解脫門顯示正法眼調無生曲唱太平歌樂無為之化去也還委悉麼優鉢羅華開嗅著無香氣名自樞密府恩從九天至草木生光輝麟龍不為瑞誓奮鐵石心仰答丘山惠佛照光禪師淳熙四年正月二十四日特賜佛照禪師號領衆門迎敕黃歸寺升座拈香祝聖畢乃云當陽目擊直下知歸左右逢源七通八達著著有出身之路頭頭具透脫之機有時神出鬼沒換斗移星有時八字打開兩手分付恁麼也得不恁麼也得恁麼不恁麼總得我為法王於法自在放去收來有何罣礙直得龍驤虎驟鳳翥鸞翔奇特中奇特殊勝中殊勝正當恁麼時且道知恩報恩一句作麼生道吾皇萬萬年復舉黃檗和尚示衆云汝等諸人盡是不著便底恁麼行腳何處有今日還知大唐國裏無禪師麼師著語云打草要蛇驚時有僧出衆云只如諸方聚徒領衆又作麼生檗云不道無禪只是無師師云黃檗眼觀東南意在西北檢點將來未免面皮厚三寸且道靈隱恁麼批判意在什麼處從前汗馬無人識只要重論蓋代功月江印禪師陀羅麻室利皇后賜紫衣上堂迦葉上行衣輪王髻中寶得來本自無心披處長短恰好且如何是報德酬恩底句昨夜日輪開桂花今朝月窟生芝草玄極頂禪師明太祖高皇帝賜紫衣謝恩上堂內使傳宣出紫宸賜衣何幸及微臣金襴照耀天人喜白氎鮮明雨露新光寵山林回佛日逼除霜雪布陽春餘生受用流傳遠萬歲宗門沐至仁千巖長禪師受紫衣上堂陳年布裰破毸毸新製金襴天上來裹得虗空無少䞉山河朵朵笑顏開尼淨智光禪師受紫升座拈香祝聖問答罷顧視大衆曰若論說禪說道則諸大禪師已說了也教山僧到者裏說箇甚麼即得豈不見先德道千種言萬般解只要教君長不昧然雖如是畢竟如何遂以法衣覆頂良久云衲帔蒙頭萬事休此時山僧都不會便下座通載云彼時諸禪長老同在御前受紫因命資次說法而光受當其末聖主請提綱圓悟勤禪師今上皇帝在籓邸時請升座金剛心真華藏界濶一佛出世千佛擁衛一華開敷萬華周匝現殊勝因作奇特事可以保安家國可以入聖超凡惟仗不思議神通難思微妙作用車不橫推理不曲斷豈不見昔日波斯匿王問釋迦老子聖義諦中還有世俗諦否若言其有智不應一若言其無智不應二一二之義其事云何釋迦老子道大王汝於龍光王佛時曾問此義吾今無說汝亦無聞無說無聞是真聖義諦是名一理二義一二之義其事如是釋迦老子頂𩕳放光肘下懸符於百千萬億境界中提起當陽一著諸人還證據得麼若證據得按頭獲敕如證據不得伏聽處分正當恁麼時如何放開一線道觸處現神通復舉昔日有一王者往見西天祖師既相見已遂命祖師說法祖師云大王來時好道去如來時師拈云佛法即是世法世法即是佛法以直道而行風行草偃山僧有箇小頌至簡至易最尊最貴往還千聖頂𩕳頭世出世間不思議彈指圓成八萬門一超直入如來地大慧杲禪師今上皇帝在建邸遣內知客入山供養羅漢祝聖請升座欲識佛性義當觀時節因緣時節若至其理自彰敢問大衆作麼生是自彰底理舉起拂子云還見麼又擊禪床云還聞麼聞見分明是箇什麼若向者裏提得去皇恩佛恩一時報足其或未然徑山打葛藤去也復舉起拂子云看看無量壽世尊在徑山拂子頭上放大光明照不可說不可說又不可說佛剎微塵數世界於諸世界中轉大法輪作無量無邊廣大佛事其中若凡若聖若正若邪若草若木有情無情遇斯光者皆獲無上正等菩提所以諸佛於此得之具一切種智諸大菩薩於此得之成就諸波羅密辟支獨覺於此得之出無佛世現神通光明諸聲聞衆洎夜來迎請五百阿羅漢於此得之得八解脫具六神通天人於此得之增長十善修羅於此得之除其憍慢地獄於此得之頓超十地餓鬼傍生及四生九類一切有情於此得之隨其根性各得受用無量壽世尊放大光明作諸佛事已竟然後以四大海水灌彌勒世尊頂與授阿耨多羅三藐三菩提記當於補處作大佛事無量壽世尊有如是神通有如是自在有如是威神到者裏還有知恩報恩者麼若有出來與徑山相見為汝證明如無聽取一頌十方法界至人口法界所有即其舌只憑此口與舌頭祝吾君壽無間歇億萬斯年注福源如海滉漾永不竭師子窟內産狻猊鸑鷟定出丹山穴為瑞為祥遍九垓草木昆蟲盡歡悅稽首不可思議事喻若衆星拱明月故今宣暢妙伽陀第一義中真實說大覺璉禪師皇祐二年十二月十九日仁宗皇帝詔至後苑齊於化成殿齊畢傳宣效南方禪林儀範開堂演法又宣左街副僧録慈雲大師清滿啓白滿謝恩畢乃啓白曰帝苑春回皇家會啓萬乘既臨於舜殿兩街獲奉於堯眉爰當和煦之辰正是闡揚之日宜談祖道上副宸衷謹白師遂升座拈香祝聖問答罷乃云古佛堂中曾無異說流通句內誠有多談得之者妙用無虧失之者觸途成滯所以溪山雲月處處同風水鳥樹林頭頭顯道若向迦葉門下直得堯風蕩蕩舜日高明野老謳歌漁人鼓舞當此之時純樂無為之化焉知有恁麼事便下座天眷請提綱圓悟勤禪師喬貴妃請上堂一句全提千差併會一華開現萬福來臻往復無間而有源動靜不移而常寂處處是佛頭頭是道若也深信得及更不假他人餘力直似壯士屈伸臂頃全出此機若動若靜若出若處殊勝中現殊勝奇特中現奇特更非外緣全承渠德所以道天人群生類皆承此恩力若識此恩動止作為百千變現悉不落虗正當恁麼時一句作麼生道當陽遍界無回互千重百匝轉光輝喬貴妃娘子請為法真和尚病起上堂鷲峰單提向上機千靈不謀而會合少室密傳正法眼萬象不融而圓通契印相投緣因相入神功如天地之覆載妙智若日月之照臨沙界等平略無向背有大解脫士證大解脫道闢大解脫門示大解脫事今現攢簇不得底病直教千聖覓起處不見諸佛衆生皆有是病諸佛若病即非衆生衆生若病即非諸佛是故以衆生病故示有此疾由茲王舍城人各各稟頂上光悉來問病而是大士隨求顯示令其萬仞壁立以至衆生病盡大解脫士亦安既安之後有大檀越作大法施建大法幢演大法義雨大法雨一一交羅重重無盡正當恁麼時應時應節一句作麼生道還委悉麼靈苗增秀氣瑞草發祥光復成一偈示病維摩元不病問疾文殊初不來建大法幢啓大施頓令千眼一時開喬貴妃設千佛會上堂千華顯瑞應萬善積靈臺廣闢解脫門大開無價藏舉揚正法眼表示千佛因直得偏界絶籠羅當陽無取捨透聲透色亘古亘今有具大信根修菩薩行發難思願力啓清淨莊嚴建大道場具列珍羞一香一華一茶一果同法性等太虗塵塵剎剎千佛放光如理如事十方普應所以大匠無繩墨良材無曲直紅輪爍太虗遍界皆輝赫一華開一佛出世一塵舉一佛成道主伴交參森羅顯煥集無涯福祿祝睿算無疆正當恁麼時作麼生道室內千燈相照耀天邊寶月更清圓大內貴妃請上堂一句子出於千聖頂門一妙機發於無盡寶藏逈無依倚杳絶端倪非色非心非如非異盡虗空窮法界都盧是箇大解脫門你諸人浩浩地於中出入還覺寒毛卓竪麼若向腳跟下一念不生全體顯露則淨裸裸活鱍鱍要行即行要住即住要用即用要休即休不指第二頭不落第二見到者裏亘古亘今凝然寂照若踏著去透脫生死是甚閒事能以無漏根力建法幢立宗旨衣被一切羣靈盡未來際無有窮盡正當恁麼時且道承誰恩力還委悉麼五蘊山頭無相佛放光動地廓周沙頌云一心無住著遍界法王家崇成無漏福端坐寶蓮華大內慶國夫人請上堂處處真無回互塵塵爾有鑑覺萬象以不見而見萬法以不聞而聞不見見其見逼塞虗空不聞聞其聞包含萬有離却見不見聞不聞別有一段奇特事要須是箇大解脫機大解脫用然後方能歷落起處全真豈不見僧問雲門如何是塵塵三昧門云鉢裏飯桶裏水又僧問如何是諸佛出身處門云東山水上行一等是箇時節朴實頭處直是朴實頭孤危峭峻處直是孤危峭峻正當恁麼時將箇什麼提持將箇什麼眼目辨別還委悉麼試玉須經火求珠不離泥復頌云此心含法界明契本來人千祥如霧集萬善若雲臻宗藩請提綱圓悟勤禪師鄆國大王請上堂至理自調然千華曾現瑞無在無不在十方即目前若是利根上智一舉便解承當既能截斷衆流可以超今冠古以如是智以如是力以如是心以如是願明同杲日寬若太虗所以道譬如虗空體非群相而不拒彼諸相發輝又道若人欲了知三世一切佛應觀法界性一切惟心造蓋此清淨本元離去離來離聲離色若以真實正見契寂如如雖二六時中不思不量無作無為至於動靜語默夢覺之間無不皆是本地風光本來面目現諸祥瑞現諸奇特皆是從無量無邊劫海薰習種智從清淨微妙根智如是應現正當恁麼時如何無相光中千佛現一道清虗亘古今復舉釋迦老子靈山會上說大般若舍利弗於佛前問須菩提夢中說六波羅密與覺時是同是別須菩提云此義幽深吾不能說此會中有彌勒大士次補佛處可往問之彌勒云誰為彌勒誰是彌勒者師拈云還委悉麼一句當機萬緣寢削更聽一頌夢中說法覺無殊妙用神通不出渠誰是誰名總彌勒祥光起處現心珠莘王請升座大衆以佛見佛無異見以法說法無別說佛法聞見總現成當陽直下全超越當陽一著非佛非法非見非說非有非無非異非如寬若太虗明如杲日所以三世如來於此示生於此修行於此悟道於此成佛全不由他獨承渠力只如今千聖頂𩕳上拈出了也不以眼見不以耳聞不以言宣不以心知正當恁麼時須是箇人始得所以道大人具大見大智得大用舉一明三告往知來正當恁麼時不涉寅緣一句作麼生道還委悉麼楚澤蓂開五百歲蟠桃暗長一千年復頌云一塵才舉一剎現一華開時一佛生克證金剛得長壽六根晝夜放光明濟王請升座以無漏根作奇特事以解脫智種金剛緣不於他處現身長在頂門獨露非心非佛非異非如等閒拈一莖草作丈六金身等閒說一句可以當金剛寶劍人人皆稟此用各各悉稟此心若能返照回光便是毗盧正體豈不見波斯匿王問釋迦老子云我昔未成佛誨見迦栴延咸言此身死後斷滅我雖值佛心猶狐疑此身念念遷變不知有不遷變者於是釋迦世尊謂波斯匿王言爾雖知遷變不停還知身中有不變者否王合掌白佛云我實不知佛言大王汝年幾歲見恆河水王言我生三歲時見佛言如今云何王言經今六十二年見與三歲時無異佛言大王汝面雖皺皺者為變而此見精性未曾變變者受滅不變者元無生滅釋迦老子向千聖頂𩕳萬仞峰頭指出金剛性不變不易湛寂凝然堂堂顯露由是波斯匿王識其本心敢問大衆只如今一切人皆見山僧升堂且道此見從何而得與威音已前空劫那畔是同是別若見得無異無別則見現前正當恁麼時一句作麼生道覿面擊開無盡藏頭頭涌出夜明珠復云濟國大王具大根器有上乘種性生為帝子身極貴榮不忘諸佛付囑知有此大因緣垂神教典深識果因凡所施為心源洞照所以此之作善因緣行陰隲保其富貴長久福祿彌隆有福修福若大海之納衆流惟利根種智之人具如是作用只此便是普光殿無相身為盧舍那萬行因華圓果海福源洪注溢天河真覺添禪師元祐初游京師徐國大王聞師道風一日遣使召師入宮升座毗盧遮那實性與汝等諸人本性無別從曠劫來輪轉法界於受生中無本無末無去無來無性無相無古無今纖塵不立毫髮難存無正法之可分何象末之為間故知法界衆生無成無壞自性本源是佛然雖如是據衲僧門下天地懸殊既有生而有滅復有去而有來正像末法既無差性相昭然而可覩於其中間無有成佛無不成佛於般若藏無所間然直饒三世諸佛六代祖師天下老和尚神通過於鶖子辨智勝於滿慈到者裏也須結舌亡鋒良久曰國令已傳清宇宙人人各賀太平年詔汰提綱文殊道禪師宣和改元下詔改僧為德士上堂祖師西來事今朝特地新昔為比丘相今作老君形鶴氅披銀褐頭包蕉葉巾林泉無事客兩度受君恩所以道欲識佛性義當觀時節因緣且道即今是甚麼時節毗盧遮那頂戴寶冠為顯真中有俗文殊老叟身披鶴氅且要俯順時宜一人既爾衆人亦然大家成立叢林喜得群仙聚會共酌迷仙酹同唱步虗詞或看靈寶度人經或說長生不死藥琴彈月下指端發太古之音棊布軒前妙著出神機之外進一步便到大羅天上退一步却入九幽城中祇如不進不退一句又作麼生道直饒羽化三清路終是輪回一幻身法海立禪師因朝廷有旨革本寺為神霄宮師升座良久乃謂衆曰都緣未徹所以說是說非蓋為不真便乃分彼分此我身尚且不有身外烏足道哉正眼觀來一場笑具今則聖君垂旨更僧寺作神霄佛頭上添箇冠兒算來有何不可山僧今日不免橫擔拄杖高挂鉢囊向無縫塔中安身立命於無根樹下嘯月吟風一任乘雲仙客駕鶴高人來此呪水書符叩牙作法他年成道白日上升堪報不報之恩以助無為之化祇恐不是玉是玉也大奇然雖如此且道山僧轉身一句又作麼生道還委悉麼擲下拂子竟爾趨寂詔復披剃提綱圓悟勤禪師僧復披剃謝恩罷升座天中之天聖中之聖處域中之大超方外之尊執寶籙以臨民覆金輪而御極廓清六合亭毒萬方聿降綸言重興佛法遂使普天釋子復換僧儀歸本笏於裴相公納冠簪於傅大士重圓應真頂相再披屈㫬田衣俄傾之間追還舊觀皇恩崇重倍萬丘山草木之微云何圖報輒傾肝膽少出毫芒大衆先佛有頂𩕳一機如擊石火似閃電光祖師有末後一句吞栗棘蓬跳金剛圈可以敵勝驚群可以轉凡成聖騰今現古蓋色騎聲如今對衆拈來不犯從前露布還委悉麼洪鈞妙力先天地覆載恩歸大聖人披剃當晚小參重圓僧相復方袍優鉢羅華未易遭恩重丘山何以報輒提綱要一秋毫盡十方世界若長若短若縱若橫以至香水海不可說不可說無邊剎海盡在箇一秋毫有時現無邊身東涌西沒南涌北沒中涌邊沒作無量無邊神通變化也只不出此一秋毫有時冷啾啾地如枯木朽株寒灰死火一念萬年萬年一念也只不出此一秋毫乃至作為無量無邊殊勝奇特難行苦行轉化一切成佛作祖亦不出此一秋毫諸人還知此一秋毫麼若知去未開口已前未舉意已前生佛未兆已前空劫已前好薦取既薦得則卷而懷之任任運運如兀如癡不妨是一箇沒量大人如或未然却須返照回光若動若靜若住若行若坐若臥須是究他根源始得父母未生已前父母既生之後六根四大三百六十骨節完具寒時知寒熱時知熱饑時知饑飽時知飽以至頂天履地含齒戴髮盡承此箇恩力且道此箇恩力如何趣向還知麼一氣不言含有象萬靈何處謝無私文殊道禪師復僧上堂不挂田衣著羽衣老君形相頗相宜一年半內閒思想大抵興衰各有時我佛如來預讖法之有難教中明載無不委知較量年代正在於茲魔得其便惑亂正宗僧改俗形佛更名字妄生邪解刪削經文饒鈸停音鉢盂添足多般矯詐欺罔聖君賴我皇帝陛下聖德聖明不忘付囑不廢其教特賜宸章頒行天下仍許僧尼重新披削實謂寒灰再焰枯木重榮不離俗形而作僧形不出魔界而入佛界重鳴法鼓再整頽綱迷仙酹變為甘露瓊漿步虗詞翻作還鄉曲子放下銀木簡拈起尼師壇昨朝稽首擎拳今日和南不審祇改舊時相不改舊時人敢問大衆舊時人是一箇是兩箇良久曰秋風也解嫌狼藉吹盡當年道教灰大梅英禪師詔復天下僧尼師獨無改志至紹興初晨起戴樺皮冠披鶴氅執象簡穿朱履使擊鼓集衆升座召大衆曰蘭芳春谷菊秋籬物必榮枯各有時昔毀僧尼專奉道後平道復僧尼且道僧尼形僧作麼生復取冠示衆曰吾頂從來似月圓雖冠其髮不成仙今朝拋下無遮障放出神光透碧天擲之於地隨易僧復提鶴氅曰如來昔日貿皮衣數載慚將鶴氅披還我丈夫調御服須知此物不相宜擲之舉象簡曰為嫌禪板太無端豈料遭他象簡瞞今日因何忽放下普天致仕老仙官擲之提朱履曰達磨擕將一隻歸兒孫從此赤腳走借他朱履代麻鞋休道時難事掣肘化鵬未遇不如鵾畫虎不成反類狗擲之橫拄杖曰今朝拄杖化為龍分破華山千萬重復倚肩曰珍重佛心真聖主好將堯德振吾宗擲下拄杖斂目而逝大慧杲禪師被旨還僧謝恩罷拈香祝聖畢乃就座云青氈本是吾家物今日重還舊日僧珍重聖恩何以報萬年松上一枝藤遂拈起拄杖云一枝藤在者裏且報恩一句作麼生道若也道得粉骨碎身未足酬一句了然超百億其或未然山僧不免為諸人道破長將日月為天眼指出須彌作壽山
