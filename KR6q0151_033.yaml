body:
  text: 武林十八澗理安禪寺住持婁東行悅集謝西序頭首提綱首座書記藏主知殿侍者真淨文禪師謝主首上堂實際理地不受一塵佛事門中不捨一法乃拈拄杖云不是一法又捨箇什麼佛事也三德六味施佛及僧法界人天普同供養受供養則不無還知滋味也無若不知分付與首座復敲香臺云五千餘軸言言異一一龍宮海藏來遂擲下云實際理地不用安排分付與藏主佛朗性禪師敘謝頭首上堂布毛才吹化現無邊華藏世界金槌在握縱擒一切諸佛如來撲碎茶甌金聲玉振挈漏燈盞耀古騰今兔角丈橫挑大千日月龜毛拂運轉塵剎法輪物物圓通頭頭具足還見佛國山𨁝跳撞破汝諸人鼻孔擢瞎汝諸人眼睛麼喝一喝春風夏雨應時來李白桃紅次第開敘謝頭首上堂是善是惡一切俱忘凡聖情盡即大道場冬樹花發炎月氷霜拈法界用易短為長以太虗口吞吐十方大衆委悉麼良久云圓超空色摩尼寶開鑿人天沒限量卓拄杖噓一噓下座笑隱欣禪師謝頭首上堂看看臘月二十五雲門一曲憑誰委打鼓當陽普請看萬象森羅齊起舞西序叢林喜得人沖霄鸞鳳看高舉進退威儀揖讓時就中一喝分賓主且道那箇是賓那箇是主喝一喝甜瓜徹蒂甜苦瓜連根苦南石琇禪師謝頭首兼祈雨上堂靈利衲僧轉轆轆地對賓客側身而立結衆緣化炭化糧聽欄雞鼓翅而鳴看茶瓢從地𨁝跳卓拄杖云夜來江上雨分作萬家流五祖演禪師謝首座上堂椎破蟠桃核得見其仁捋斷驪龍鬚得遇其寶雖然如是也未是好手黃帝失玄珠於赤水使智索之而不得使離朱索之而不得使契詬索之而不得乃使罔象直饒罔象得之亦未是好手爭似今日與大衆同使一箇通事舍人雖然如是也只得一半謝首座上堂彌勒看不見釋迦説不得恁麼尊貴生日用無差忒得不得識不識三德六味味逾多千古萬古為規則雲外岫禪師謝首座知客藏主上堂以拂子打圓相云摩訶衍法離四句絶百非又打一圓相云禮之用和為貴先王之道斯為美又打一圓云摩尼珠人不識如來藏裏親收得大衆見麼所見不同互有得失天童者裏毋固毋必覺源曇禪師謝前堂首座上堂楊岐宗風坐南泉鉢位佛祖命根衲僧巴鼻卓拄杖云東頭買賤西頭賣貴雪巖欽禪師謝首座維那上堂人天眼目佛祖綱維千差萬別一以貫之如何見得克賓法戰不勝南泉斬却貓兒千巖長禪師謝首座上堂舉五祖和尚云槌破蟠桃核得見其仁捋斷驪龍鬚得遇其寶雖然如是未是好手爭如我伏龍山中天章首座也不槌碎蟠桃核頭頭應用皆仁也不捋斷驪龍鬚處處全彰其寶呼釋迦彌勒為竈下之奴拈丈六金身作一莖之草吹毛一拂血濺梵天珊瑚樹林紅日杲杲雖然如是也只得一半下座元叟端禪師謝首座維那上堂金槌未動以前大地山河百雜碎玉麈未揮之際森羅萬象盡交參殷人以柏周人以栗家住海門東黃昏候日出謝首座藏主侍者上堂開口道著子過新羅舉步踏著猢猻入布袋趙州會下二僧相推不肯作第一座義出豐年南泉道王老師與汝往來者是藏儉生不孝忠國師云將謂我孤負汝元來汝孤負我爛泥裏有刺中天竺快便難逢一時掀翻了也會則天高東南不會則地傾西北上堂謝首座東弗于逮打鼓西瞿耶尼説禪南贍部洲喫飯北鬱單越噇眠鐘樓上念讚床腳下種菜勝首座道猛虎當路坐摘楊花摘楊花用彰俊禪師謝首座知客侍者直歲上堂索犀牛扇子無風起浪問眉間挂劍平地干戈二俱莫涉別有條章撲碎玻璃盞子拈起無柄钁頭淺鋤明月深種白雲時時歌堯舜之風日日樂羲皇之化且知恩報恩一句作麼生道九萬里鵬才展翼十千年鶴便翱翔笑隱欣禪師謝書記藏主侍者上堂臨濟三玄三要指鹿為馬黃龍佛手驢腳喚金作鍮一大藏教是切腳三千剎海一浮漚吾孤負汝汝孤負我劍去已遠刻舟奚求休休青山歸未得又過一年秋雪巖欽禪師上堂謝囦道講師復巖藏主一心三觀一句三玄曾無彼此休分教禪回途復妙也枯木巖前差路窮囦極流兮海底紅塵亘天只如一大藏教是箇切腳畢竟切什麼字卓拄杖云十卜千千唯庵然禪師謝藏主維那上堂天無門地無戶俊快衲僧一任來去藏裏摩尼照徹十方洞裏桃花千葩競吐假劫外之春風應今時之律呂海神夜半看鮫珠眼光挂在扶桑樹喝一喝石屋珙禪師謝藏主上堂今朝八月一十五樹凋葉落金風露野狐窟宅梵王宮狗子尾巴書卍字大藏小藏從何來拈拄杖云盡從者裏流將去等間道箇鉢囉娘截斷古今間露布了庵欲禪師上堂一大藏教是箇切腳畢竟正文無人道著你要識正文麼上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也衆中忽有箇衲僧出來道恁麼提唱實謂聞所未聞山僧不免分付維那明窗下安排忽若更道恁麼提唱料掉沒交涉山僧亦未免分付明窗下安排何故直鈎釣鯨鱉曲鈎釣龜鱉金雞啼上玉闌干別有佳聲繼前哲喝一喝上堂一大藏教束之高閣長期短期無繩自縛莫更紛紛紜紜直須灑灑落落楊岐一頭驢只有三隻腳潘閬倒騎歸跌殺黃番綽五味拈來饡稱錘別有香風滿寥廓喝復舉道吾和尚云高不在絶頂富不在福嚴樂不在天堂苦不在地獄相識滿天下知心能幾人大慧和尚云高在絶頂富在福嚴樂在天堂苦在地獄誰知席帽下元是昔愁人師云二大老一人高高處觀之不足一人低低處平之有餘唱教門中足可觀光若約衲僧門下猶欠悟在本覺又作麼生但將飯向無心碗自有人提折腳鐺石屋珙禪師謝殿主淨頭上堂一身清淨則多身清淨一世界清淨則多世界清淨東司頭臰氣佛殿裏蓬塵從什麼處得來以手掩鼻云又有一點也鐵關樞禪師謝殿主上堂如何是佛殿裏底悉哩蘇盧蘇盧悉哩江國春風吹不起鷓鴣啼在深花裏擊拂子覺源曇禪師謝侍者上堂文遠當年侍趙州東司説法未輕酬回光一念分明處午夜霜清月滿樓謝東序知事提綱知事監院都監寺維那典座五祖演禪師謝主事上堂文殊張帆普賢把柁勢至觀音共相唱和嬴得雙泉鬧中打坐打坐即不無且道下水船一曲作麼生唱囉邏哩囉邏哩俗氣不除虎丘隆禪師謝知事上堂萬里浮雲捲碧天年年此夜十分圓令人轉憶寒山子説似吾心恰宛然所以道欲明恁麼事還他恁麼人若是恁麼人須明恁麼事便能以此心相照以此心相知扶持野老無盡家風成就叢林萬世基業其把定也離念絶塵更無滲漏其放行也光生瓦礫和氣靄然高低普應前後無差且道此人成得箇什麼邊事還委悉麼將此身心奉塵剎是則名為報佛恩謝知事頭首上堂鋒芒未露如天普蓋古帆未挂似地普擎所以道天不言四時行焉地不言萬物生焉萬物生則遷謝不停四時行則寒暑流轉各居其位去寒時大家寒熱時大家熱是法住法位世間相常住無一法不為妙用無一物不為真如處處真無回互塵塵爾絶承當須是其中人方能恁麼去便能橫身擔荷翊贊叢林自利利他得大解脫其或未然好事不須頻話會留將和氣暖丹田育王諶禪師謝知事上堂尺頭有寸鑑者猶稀稱尾無星且莫錯認若欲定古今輕重較佛祖短長但請於中著一隻眼果能一尺還他十寸八兩元是半斤自然內外和平家國無事山僧今日已是兩手分付汝等諸人還肯信受奉行也無尺量刀剪遍世間志公不是間和尚應庵華禪師謝知事上堂一喝分賓主照用一時行要會箇中意日午打三更祇如一喝未施已前還有賓主也無既分之後那箇是賓那箇是主者裏緇素得出賓則始終賓主則始終主祇如賓不是賓主不是主且一喝落在什麼處橫按鏌鎁全正令太平寰宇斬癡頑天目禮禪師謝知事上堂擔荷山門非止一事官府莊司山園田地呷醋咬薑量茶數米金不博金水不洗水因甚如此楊岐驢玄沙虎真淨文禪師謝監院上堂身是光明幢心是神通藏大衆各自照顧抖擻精神而今現定僧也如是俗也如是釋迦也如是彌勒也如是還有人信得及麼若信得及不為分外若信不及亦不虧欠信與不信光明幢神通藏各自參堂去下座圓悟勤禪師謝監寺上堂滴水氷生百了千當鐵作脊梁骨金鑄堅實心荷負叢林贊弼知識典刑可法直下撲實頭底且道是什麼人相逢相見呵呵笑更有春風春又春謝監院上堂舉藥山一日語雲巖云與我喚沙彌來巖云和尚喚他作什麼山云我有箇折腳鐺子要伊提上挈下巖云恁麼則與和尚共出一隻手也師云道頭知尾舉一明三山僧有箇小頌一步濶一步一著高一著提折腳鐺兒施阿伽陀藥須彌土一撮滄溟水半杓快意唱巴歌過屠門大嚼石屋珙禪師謝都寺冬齋并維那上堂一遍一切一切遍一香積世界以香飯為佛事南閻浮提以音聲為佛事東勝神州打槌西瞿耶尼普請懷州牛喫禾益州馬腹脹粗餐易飽細嚼難飢只恐不是玉是玉也大奇圓悟勤禪師謝維那直歲上堂烹金琢玉須資作者鉗鎚荷教扶宗必仗本分兄弟交為肘臂互作主賓便可以顯大機發大用布慈雲灑甘露駕慈航觀斷岸超生死越涅槃令他天下衲僧頂門上放光腳跟下歷落箇箇如龍如虎人人玉轉珠回非唯扶竪叢林亦乃流通正眼豈不是奇特事敢問大衆奇特一句作麼生道妙舞更須誇遍拍三臺須是大家催應庵華禪師謝維那上堂舉興化問克賓維那汝不久為唱道之師賓云不入者保社化云會了不入不會不入賓云總不與麼化便打乃云克賓維那法戰不勝罰錢五貫設饡飯一堂至來日齋時化自白椎云克賓維那法戰不勝不得喫飯即便趕出雪竇云克賓要承嗣興化罰錢出院且置却須索取者一棒始得棒既喫了作麼生索得雪竇要斷不平之事今夜與克賓維那雪屈以拄杖一時打散師云大小雪竇與克賓雪屈要且無合殺下座恕中慍禪師謝維那侍者上堂金椎一擊電掣飇馳紙襖潛書珠回玉轉東頭買貴西頭賣賤拈得鼻孔打失眼睛拈拄杖出頭天外看誰是我般人五祖演禪師謝典座上堂白雲嵌枯老漢要喫無皮餕餡典座取巧安排一任衆人咂噉良久云羊羮雖美衆口難調謝典座上堂變生為熟雖然易衆口調和轉見難鹹淡若知真箇味自然飢飽不相干謝典座上堂小繩錢貫大繩井索日急要用笊籬木杓雖然破家具應用有處著著錯南北東西水灑不著謝列職雜務提綱化主莊主監收謝兩序黃龍南禪師因化主歸上堂世間有五種不易一化者不易二施者不易三變生為熟者不易四端坐喫者不易更有一種不易是甚麼人良久云聻便下座真淨文禪師化士歸上堂諸州丐士經年去次第歸來復納疏打鼓普請共證明今朝九月二十五大衆證明則不無須知鉢盂飯粒粒皆辛苦鉢裏飯滋味大衆總知歸宗道今朝九月二十五又且如何良久乃呼侍者參退請諸郡化主喫茶喝一喝長安化主歸上堂大衆一兩絲一匹絹一一盡從蠶口現口中吐出濟人間衲僧如何總不薦若也薦家家門裏含元殿喝一喝下座謝月化主上堂靈山話月曹溪指月聖壽今朝謝月且道與古人誰親誰疏莫有人辨得麼若也辨得將此身心奉塵剎是則名為報佛恩若辨不得無角鐵牛眠少室生兒石女老黃梅笑殺栽松道者參五祖演禪師謝街坊上堂街坊昨日將一把沙到方丈前一見老僧劈面便撒賴遇老僧先見衫袖一遮並不方事今朝舉似大衆不敢隱藏何故賞伊膽大下得者箇手腳忽有人問白雲為什麼只恁休去不見道老不以筋力為能然雖如是賓主歷然月庵果禪師謝供頭上堂解猛虎頷下金鈴驚群動衆取蒼龍穴裏明珠光天照地山僧今日到此讚歎不及汝等諸人合作麼生竪起拂子云眨上眉毛速須薦取擲拂子下座龍門遠禪師賢席頭納疏上堂一葉飄飄水上歸姑蘇春色照巖扉坐禪片石重來看却笑山雲拂蘚衣所以沉空滯寂之士名為貪著小乘混世同塵之人謂之圓通之侶不捨道法而現凡夫事豈是植種於空現前日用是大總持門一一親得其力如斯之旨事可量哉昔日黃梅散席道在老盧坐折連床湖南最盛古今榜樣作者同知進止合儀動靜可法況龍門新興保社意在求人衆手陶金誰是得者有麼有麼令人思百丈解踏馬駒行參夢庵信禪師化士歸上堂冒暑經寒已逾半載艱辛受盡且喜歸來而今粥飯現成一衆皆承渠力方見禪人歲寒道義心口相應若非自肯承當安得如斯用意用意則不無且道承當箇什麼良久云若不得流水還應過別山參應庵華禪師化主請上堂法身無相而諸相顯然法眼無瑕而群機洞照所以一塵入正受諸塵三昧起德山入門便棒臨濟入門便喝至於歷代祖師撩鈎搭索露布葛藤無不精徹淵奧通證十虗塵塵爾剎剎爾念念爾時有西蜀比丘希慧從那伽大定安詳而起不離是定入諸塵勞門成就一切衆生行願海此心既辨克就今辰營備齋羞供養釋迦如來五百十六應真大阿羅漢且道釋迦老子還來也無若道來即今在什麼處若道不來又供養箇什麼諸人向者裏得透便與釋迦老子同一心知同一眼見同一受用其或未然歸宗更下箇注腳但願東風齊著力年年吹入我門來密庵傑禪師街坊納疏上堂去年第一會水陸街坊今年羅漢第一會裏納疏識得去年人便是今年事今年與去年非新亦非故攂鼓共證明眉毛俱卓竪北鬱打三更西瞿日未暮其施汝者不名福田供養汝者墮三惡道還會麼行到水窮處坐看雲起時復舉僧問趙州如何是不錯底路州云明心見性是不錯底路師云趙州眼觀東南意在西北大似狐狸戀窟有甚快活處忽有問徑山如何是不錯底路只向他道家家門裏透長安呆庵莊禪師化主回上堂禪子臨川化導歸入門一笑展雙眉破微塵出大經卷打鼓槌鐘報衆知正與麼時且道功歸何所昨夜春回空劫外覺華香綻不萌枝箬庵問禪師謝化主上堂本是無緣薄福僧自慚綿力住崚𡾓斷巖壁立雲千尺不羡人間販名大衆且道有緣好無緣好自有一雙窮相手不輕祗揖等間人五祖演禪師謝莊主上堂一不做二不休不風流處也風流若要公私濟辨好看露地白牛真淨文禪師謝莊主監收上堂參玄上士味道高人於動靜日用間百事現成受用具足一一要知來處所以古人云譬如大地何物不從地之所生諸佛唯指一心何法不從心之所立洞山分野地之所生或麥或麻或豆或稻然非其人則不能成辨安立既有安立得不勞乎神用然神用雖勞粒粒不落別處且道落在什麼處遂拈拄杖擲下召大衆云見麼阿誰無分知來處麼若知可謂不風流處也風流五祖演禪師謝監收上堂人之性命事第一須是欲得成此先須防於若是真人天目禮禪師謝麥監收上堂山前麥熟翁媼歡呼收拾歸來其中有麵饅頭䭔子前年別今日思量笑殺人恕中慍禪師謝來蘇莊監收上堂山僧昨遣數員宿將征諸未服既徯我來蘇一鼓而下直得風以時雨以時嘉穀登庶民樂今當還師振旅奏凱論功坐亨太平之時玄弼真君忍俊不禁不覺手之舞之足之蹈之於一毫端上揚聲而歌曰台州仙高一伯紅蓮青江口白蝦殼來歸兮連子格且道是什麼曲調乃云飯飽弄箸應庵華禪師謝知事頭首上堂大丈夫漢脊梁硬如鐵在乎進退之間初無喜難之色其退也古寺間房焚香清坐究竟乃新報佛恩德其進也公於心明賞罰使紀綱不墜表帥得人各應其宜然後據虎頭收虎尾第一句下明宗旨蔣山雖然痛下毒手全身擔荷要在當人正恁麼時且道不失其序一句作麼生道玲瓏八面活鱍鱍千古萬古振家聲密庵傑禪師謝知事頭首上堂一新一舊跳出窠臼一出一入胡餅裏呷汁一擒一縱開眼作夢一照一用鱔魚走入麻油甕所以道若論此事直須揮劍若不揮劍漁父棲巢古人與麼大似將錢買李子只從赤邊咬且道結角在什麼處驀拈拄杖卓一卓下座謝知事頭首上堂敘謝之餘復有何事其進也風行草偃水到渠成其退也玉蘊荊山其價愈重且道不落進退一句作麼生道油煎石磉盤風吹毛毬走虗空背上白毛生拈得鼻孔失却口喝一喝下座元叟端禪師謝兩序上堂靈機廓徹智鑑虗圓固無動寂之殊豈有久新之異拈起也十日麗天放下也百川赴海後先齊致左右逢原正恁麼時如何三界炎敲爍金石蒲團永日自寥寥長翁淨禪師謝新舊兩班上堂開無間地獄現閻羅大王聚夜叉一部列牛頭兩行與其進者劍樹上猛火進用與其退者刀山裏寒氷退藏且道理會甚事叵耐飯飽弄箸判斷屎急尿床其或未然花柳春風入戲場呆庵莊禪師敘謝兩序上堂打開寶藏運出家珍普濟群生悉令充足金剛圈栗棘蓬總是間家潑具只如遇賤則貴逢低則高不傷物義一句合作麼生饡飯從教香馥郁紙衣莫使墨淋漓佛朗性禪師謝兩序上堂漏燈盞提上挈下鑑地輝天白日夢升兜率宮熾然説法遍十方世界是摩尼寶藏盡情收拾將來一槌號令從頭穿却人天遵依永為標榜普報四恩齊資三有一燈既然燈燈無盡衆生界盡真燈不泯過現未來作諸佛事大衆委悉麼卓拄杖喝一喝云龍得水時添意氣虎逢山色長威獰箬庵問禪師謝兩序上堂著草鞋住院負栲栳為人動若行雲止猶谷神初無心於彼此豈有意於去來所以綱宗在握賞罰惟公正令當行進退有序其進也高山可仰其退也湛水長間若有一絲毫情存繫戀便屬泥犁渣滓金剛圈栗棘蓬吞得跳得須是其人且開先啓後果滿功圓一句作麼生道橫擔楖栗千峰上已有人提折腳鐺謝兩序上堂進一步風颼颼雨颯颯腳下泥深三尺退一步孤逈逈峭巍巍法堂前草深一丈荊棘林中下腳易月明簾外轉身難知進知退知安知危有始有終有結有解權衡濟上宗風鑑別今時露布通身肩荷傑立化門肝膽橫披胸襟獨邁是則明如杲日要須各建玄猷樹大廈非一木之支濟巨川豈一人之力今日絲綸收處風月猶新敬謝諸仁共相展布牧雲門禪師冬至謝兩序上堂欲識佛性義當觀時節因緣寒來暑往秋收冬藏雲騰致雨露結為霜六陰極處一陽乃生一陽既生謂之長至山中自春初到冬尾樵山耕田栽園種地執運勞力有煩衆兄弟道用今日肆筵設席炊杜田飯瀹本山茶普同供養貴圖聚頭崖壑戮力叢林臘月火燒山明取衲衣下事種田博飯喫免得浩浩説禪若能恁麼真是金生麗水玉出崑岡山僧口喃喃地道箇謂語助者焉哉乎也總不虗設雖然如是且道團圞頭一句作麼生道路遙知馬力歲久見人心沙彌得度垂示執刀付衣係大衆章恕中慍禪師與沙彌落髮世尊在雪山以金刀自剪丕顯如來頂相汝既不能吾為汝剃落前聖後聖其揆一也鐵關樞禪師光淵源三人落髮拈來三寸鐵除去末後結腦後放圓光淵源同皎潔落髮一斬一切斬有甚無明草剃髮云珊瑚樹頭日杲杲落髮父母非我親諸佛非我道一法不留存方堪為種草二人剪髮十八非遲十七非早坐斷兩頭萬機俱掃剪髮云頭陀石被莓苔裹弘覺忞禪師沙彌剃落恆沙劫種出家因優鉢今開火內莖髮斷青絲除愛結虗空背上白毛生驅象駕請長纓一舉九天雲外步等間踏倒法王城沙彌剃落金刀剪斷無明髮露出娘生舊頂門莫謂毀形虗事褫人天何處不稱尊沙彌剃落何似生遼天鶻萬里雲只一突是渠因甚得與麼活卓卓地直下一刀俱斬斷更無毫髮可容留沙彌剃落僧寶誰云滄海珠盡虗空界濟無餘德瓶甘露應常滿名稱方宜勝丈夫尼本然剃落狻猊才出崛威猛蕩寰區獨跨大方步豈為格量拘然而舍金輪之寶位子夜踰城脫珍御之龍衣青山斷髮何以佛佛道同乎還會麼要作人天真榜樣信然脫俗是良謨恕中慍禪師付衣提起云此衣竪窮三際橫亘十方從上老宿莫不披之提持正印宜善護持令法久住弘覺忞禪師付衣大士胎衣變九條多生法御應常調今朝三事全披得好作人天正法橋付衣千生未易聞名字一旦通身服九條青嶂外何逍遙三尺龍泉光照膽萬人叢裏奪高標付衣柔和忍辱不虗褫消瘦青蓮衆患離名字六師曾未曉佛同稟受祖同持勤加護攝威儀虗空疊作紅蓮座火聚開為白藕池付衣袈裟著體豈尋常誓鎧全披好自將寶杖一揮三界靜髻珠親解法中王付衣入斯室著斯衣量才補職如是因如是果法爾當然祇如信受奉行時合作麼生橫身三界外獨脫萬機前付衣錦衣公子休誇富天上六銖未足多一縷龍免金翅難好教慈覆遍娑婆付衣歸卷金襴去深藏定水涯為標千聖格所以待龍華況復割煩惱而得消瘦之名離染著而被青蓮之號服之者忍辱增進持之者功德無邊可不頂戴遵奉也邪提起衣云還見麼莖縷蘸乾生死海何人出得者袈裟
