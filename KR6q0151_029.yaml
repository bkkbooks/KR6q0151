body:
  text: 武林十八㵎理安禪寺住持婁東行悅集請藏經提綱經函迎經開經閲經焙經補經曬經楚石琦禪師新贖藏經上堂舉雪峰一日普請搬柴次路逢一僧乃擲下一段柴云一大藏教只說者箇後來真如哲云一大藏教不說者箇師云只者箇是什麼說與不說且諸人向什麼處見二大老中嶽能竪起拂子云提起則如是我聞放下則信受奉行師云若作佛法商量眉鬚墮落真淨文禪師施主捨大藏經函上堂世出世間法立處皆相參舉天便有地舉北便知南舉僧便見俗舉聖便明凡以新當見舊以經方顯函宜哉一一法所立皆雙兼雙兼不涉二所立無不堪此大解脫門智者乃深諳故石頭禪師云當明中有暗勿以暗相覩當暗中有明勿以明相遇明暗各相對比如前後步乃拈拄杖云且道是明是暗跳得出也大奇跳不出且在明暗裏只者明暗也大難明遂擊香桌下座箬庵問禪師迎藏經到山示衆玉軸金函古佛心萬年長祝聖明君林泉幸荷沾恩澤永日寥寥謝太平開藏示衆毗盧寶藏八字打開半滿偏圓一句具足盈龍宮溢海藏總在者裏還有委得底麼鯨吞海水盡露出珊瑚枝朝宗忍禪師開藏上堂捧起經云始自鹿野苑終至跋提河其間大小頓漸半滿偏圓盡在者一毫頭上所以道摩尼珠人不識如來藏裏親收得遂打開云我今對衆打開時一會靈山難辨別休辨別一切數句非數句與吾靈覺何交涉直須言外度迷情破塵出經能事畢其或未然一任長期短期尋行數墨尋到臨末稍頭依舊一卷是一卷一帙是一帙何故聻五千餘卷非文字四十九年未曾說下座愚庵及禪師閲藏上堂終日看經經頭一字因甚不識常年喫飯千粒萬粒從一粒生因甚不知卓拄杖云打破兩重關泗州人見大聖竺雲曇禪師焙經上堂海藏靈文經天緯地琅函玉轉塞壑填溝如來不說說敲出鳳凰五色髓迦葉不聞聞擊碎驪龍頷下珠火𦦨為三世諸佛說法義天朗耀揭坤維三世諸佛向火𦦨上說法字腳不留空法界兜羅線裏玉轉珠回文武火中星移電捲行行鑄出黃金字朵朵花開白玉蓮湛寂凝然應真不借只如經歸藏禪歸海又作麼生五千餘卷瘡疣紙一衆傳來耿夜光弘覺忞禪師請諸禪補書大藏上堂三轉法輪於大千其輪本來常清淨天人得道此為證三寶於是興世間三寶既興乾坤夷廓天人得道萬類昭蘇是故照燭昏衢法為明炬津梁險道法為輿橋高登彼岸法為舟航眼目人天法為開鑿諸仁者法利無窮贊揚莫盡則置只如威音那畔空劫已前未有三寶名字之時佛在法先耶法在佛先耶若法在佛先誰為宣說之人若佛在法先尚昧進修之路者裏得迸開隻眼親見佛法根源則法自本來法非從佛而流布佛自本來佛非因法而禠成非因法而禠成則未離兜率早降王宮未出母胎度人已畢非從佛而流布則始從光耀土終至跋提河如是二時間未曾說一字恁麼則周金剛將青龍疏鈔一炬焚燒小釋迦目大般涅槃盡皆魔說復有何過其或未然一毫頭上重宣出月指從教萬古標營建提綱劈草開基立磉竪柱劍門分禪師斬草云皎皎明明非缺餘千差萬別莫能拘卓庵斬草壺山頂笑問時人見也無呆庵莊禪師開寺基示衆昨日開荒地請諸人剗却荊棘除却瓦礫本來基址已見分明只有中間樹子無人得山僧今日未免別行方便利刀剪盡繁枝葉鈍钁深鋤邪倒根實地工夫成一片住山鈯斧子無痕元叟端禪師普慶請開山上堂法身無相融攝十虗法眼無瑕包羅萬象淨裸裸絶承當赤灑灑無空闕如天普蓋似地普擎直得一為無量無量為一小中現大大中現小於一毛端現寶王剎坐微塵裏轉大法輪正恁麼時還有與子愚能長老相見者麼若也見三十棒一棒也不較若也不見三十棒一棒也不較何故知恩方解報恩復舉世尊因地中布髮掩泥公案師云適間禪客問一句來老僧答一句去可謂徹頭徹尾苟或遲疑更聽一頌無上寶王剎當機誰解看然燈才舉手長者便標竿解起天人敬能摩星斗寒埋頭火宅者今古自顢頇無用寬禪師太平乳山大佛殿立石磉劄腳埋根永不移擎天拄地用施為看他結頂誵訛處萬古清風播四維劍門分禪師竪柱云法門傑出梁棟高鎮群生福基不屬陰陽得失不屬凡聖是非以拄杖拄云八面四方承此力茫茫宇宙幾人知林皋豫禪師佛殿竪柱上堂此事如搆大廈相似是柱作柱是梁作梁全憑良匠權衡在手規矩方圓無不中的今日夾山古蹟佛殿新成護法光臨三門增色非惟叢林仰賴十方諸佛異口同音高聲讚歎道佛子住此地則是佛受用常在於其中經行及坐臥喝一喝下座上梁提綱無用寬禪師大覺上梁突出機先一著徹頂如何撈摸看他越樣施為超過毗盧樓閣輕輕置在上頭一任橫拈竪握大衆見麼聖壽無疆萬民安樂三門上梁法界全彰大施門未曾舉起早驚人眉毛睫上威音國雨順風調賀聖明太湖大殿上梁撐天拄地立門庭信手拈來用處親玉殿瓊樓一莖草普天匝地放光明良久云起蓋覆黃金丈六身淨戒寺鐘樓上梁者箇大梁誰敢摸索進則無門退之則錯輕輕置之頂𩕳頭四面清風動寥廓大衆見麼無用與你拈起向上一著喝正覺寺大殿上梁今日弘開正覺門巍巍佛殿鎮乾坤一梁一柱天然好突兀虗空四海尊大衆見麼玉殿瓊樓草一根梵音千載祝皇恩太湖選佛場上梁正令單提向上機當頭一著有誰知太湖吞却虗空了正是心空及第歸夢庵信禪師大殿上梁升座側金布地功名遠疊木如山利益高箇事若非斤斧手何緣海岸鎮波濤永寧如斯建立全仗斤斧而成若論福報人天決定風行草偃還委悉麼報佛只憑三寸舌逢人傾盡一生心敘陳罷師復云寶殿成功首尾不過一載同心共力敢言獨比無雙今朝慶贊會齊緇素竝臻於此山僧隨時應節且要混俗和光適來因見拋梁豈免隨波逐浪所謂法不孤起仗境方生觸處圓成隨宜建立敢問諸人且道即今建立箇甚麼不見道拋梁東禪門別是一家風爐爇沉煙滄海岸願王聖算永無窮拋梁西少林節上轉生枝一花五葉開敷後結果圓成處處奇拋梁南善財當日謾咨參踏破草鞋歸計日千峰依舊色如藍拋梁北趙州庭柏人難識青蒼多愛歲寒心認著依前還不得拋梁上佛事門中無一向夜義魔黨與修羅龍天八部皆歸仰拋梁下一片堅牢無縫罅地神捧出聳天心永鎮滄溟歌聖化大衆四方上下俱周遍也乃畫一圓相云且如者箇饅頭又向什麼處拋要知落處麼如今普施諸人去覿面相呈不覆藏咬著始知滋味好百千萬劫轉馨香挂寺額提綱圓悟勤禪師蔣運使寄雲居山三大字仍請升座云法法圓融心心虗寂大包無外文彩已彰細入無間眼莫能觀所以道萬法是心光諸緣惟性曉本無迷悟人只要今日了今日便與麼坐斷報化佛頭喚什麼作心喚什麼作性恁麼說話已是截斷諸根了也且作麼生是截斷諸根處放一線道通箇消息還委悉麼大旱得甘雨大熱得清涼復有頌云衆峰盤屈屋耽耽天上泓澄雨碧潭渴驥怒猊三大字高蹤千古振名藍笑隱欣禪師挂立寺額示衆金輪天子之敕帝釋梵王之宮金榜昭回雲漢銀鈎盤屈蛟龍朝夕百靈拱護人天萬福攸同社稷山河鞏固天曆永保帝躬江南諸道行御史臺欽奉聖旨以集慶路興龍潛邸改建大龍翔集慶寺今辰挂立敕賜牌額住持臣僧某望闕謝恩祝延今上皇帝聖躬萬歲萬歲萬萬歲欽惟陛下聖哲生知神武天縱臨馭八極察民物之微情掃蕩群𠒋復祖宗之正統故自即位薦降休祥海水不溢而百川安流歲時告豐而五穀大熟至若光武復漢猶崇赤伏之符肅宗保唐尚刻中興之頌皆誇一時之虗美未有今日之聖明爰作蓮宮開八荒之壽域載揚竺典壯萬世之丕圖用答神庥以祈民福臣僧既已對衆敷揚復進一偈上天寶書祈雨露金陵潛邸舊江山九重閶闔香雲近對越天威咫尺間落成提綱海會演禪師歸新僧堂上堂十月今朝初一新搆雲堂已畢聖衆已得安居雅麗全勝舊日於中受用之時凡百互相愛惜願存古佛家風三有四恩獲益慶懺別有上聞具位題名立石敢勸遠近諸檀越記取摩訶般若波羅密忽有箇出來道長老不妨好文章乃云咄白雲口裏道誰敢道不好夢庵信禪師祖師閣畢工如義道者感夢送到諸散祖師四十軸因升座云虗空裏釘橛誰信有之平地上生堆目前可驗永寧無一錢建閣建立而倐忽鼎新閣中無一像可歸不期而聖師自至仰瞻殊相箇箇古怪清奇共慶遭逢人人手舞足蹈歎之不已欣悟交懷從前慕德之心一時放下今則遍參知識寸步不移名山異嶽休更他遊總向此中坐觀風彩莫非因緣會遇時節使然故得閣就功成聖賢萃於茲矣還相委悉麼鑿池不待月池成月自來千巖長禪師新建僧堂上堂竪拂子召大衆云本來無一物赫赫動乾坤擬議不來時迢迢十萬里無明者裏只有一口劍劍下有分身之意亦有出身之路你若向活鱍鱍處著倒我便教你性命不存你若在淨裸裸處坐地我便教你雲生腳下直須人境俱奪殺活同時自然海晏河清日上月下何故宏開選佛場心空便作狀元郎傳來只箇無文印桂子香中舉手忙乃喝云文生也汝諸人是拖白是末名是頭名良久云龍生金鳳子衝破碧琉璃復云茲承天龍禪寺無用貴首座偕生首座入山設齊俵襯持大道平長老香請曰今春蒙松江蔡媽媽李氏淨心施財建新僧堂完備請和尚向彼中開堂說法與淨心相見師曰諾於是撾鼓升堂集衆而告之曰無明以十方世界作一箇僧堂行與諸人同行坐與諸人同坐乃至語默動靜折旋俯仰未嘗與諸人有絲毫間隔所以雪峰云僧堂前與汝相見了也汝若頂門具眼便見無明與淨心在僧堂前相見汝若更道在天龍僧堂前相見在伏龍僧堂前相見我也知你是箇瞎漢不惜眉毛復示一頌處世界無所著圓陀陀光爍爍大中大窄中窄李氏淨心雖女流宛有丈夫之作略針鋒上拄須彌盧微塵中現寶王剎天龍道用不盡添得伏龍背地哂赤肉團上壁立千仞阿呵呵哩哩囉東家作牛西家作馬衲僧鼻孔一時穿眼光爍破四天下復召大衆云是甚麼石屋珙禪師入新僧堂上堂直為柱曲為梁規中圓矩中方匠氏取材之良也歸其圓泯其方捨其短取其長主人立法之妙也所以福源僧堂建柱石于丙子之孟春畢斧斤于戊戌之重九六窗炯炯洞一色之虗明萬瓦鱗鱗絶三種之滲漏低頭不見地還他擔板禪和仰面不見天却許蒙頭衲子老竹溪豈止一生行願憍陳如頓增萬倍威光遵行百丈叢林壯觀千年常住直得十方諸佛異口同音宣說偈言佛子住此地則是佛受用常在于其中經行及坐臥又有龐居士說箇頌子讚歎云十方同聚會箇箇學無為此是選佛場心空及第歸然雖如是其奈張無盡忍俊不禁出來道汝等諸人即解樹頭喫果子不知樹曲彔殊不知作此堂者有損有益居此堂者有利有害者般說話也怪伊不得何故人無遠慮必有近憂此事且拈放一邊祇如衲僧自己分上得力句子作麼生道良久饑餐渴飲渾無事聽雨聽風閒打眠長翁淨禪師新起妙嚴慶懺升座推倒多年老鼠窠掃空平地笑呵呵從頭架起生頭角蓋覆驢牛不厭多今朝成就大緣千古發揮大事且道如何斫額任他門外客到家還我箇中人復舉文殊問無著近離甚麼處著云南方殊云南方佛法如何主持著云末法比丘少奉戒律殊云多少衆著云或三百或五百師云春風勾引鷓鴣啼著問文殊此間佛法如何主持殊云聖凡同居龍蛇混雜著云多少衆殊云前三三與後三三師云平地波瀾鈎鐵船者兩轉語要與諸方眉毛撕結更有兩轉語要與諸方點眼或三百或五百銅錢鐵錢省數足陌前三三與後三三蘿蔔芋嬭淺貯滿擔諸方忽然眼開決定拍手大笑笑箇甚麼不笑巴義便笑杜撰雖然笑者還稀忽有人問天童多少衆便向他道新起妙嚴誇第一一齊都在畫圖中劍門分禪師建千眼大悲殿上堂靈筵今古絶依附普天匝地從教舉南無大悲觀世音咄咄何曾在別處南無大悲觀世音大通大願接迷情口口念來知幾幾何如菩薩現全身觀音菩薩鎮長在寶殿興崇無窒礙上答皇恩無盡齡情與非情同一會楚石琦禪師建萬佛閣上堂一拽石二搬土發機不用千鈞弩無邊樓閣滿虗空曠大劫來誰是主誰是主須辨取最好一梁對一柱便下座箬庵問禪師進新齊堂示衆古德不赴堂蝦為子曲侍者云和尚不曾出入因甚莊上喫油糍事因叮囑起教伊問莊主大似詐明頭侍者才出門莊主謝臨屈兩彩一賽山僧今日將古人一副肺膽盡情揭露為諸人應箇時節驀拈拂子巍巍堂堂輝輝煌煌晨時有粥齊時有飯汝諸人切忌違時失候設或有箇違時失候底山僧也不罰伊但喚行者多與他一杓殘盆菜汁若受用得著也許伊向磬山門下提瓶挈鉢喝一喝擊拂子鑄鑊提綱結竈進火虎丘隆禪師謝鑄鑊街坊上堂渠無面目底千聖不敢近方解入林不動草入水不動波變大地作黃金攪長河為酥酪寸絲不挂通身無影像便能入荒田不揀信手拈來頭頭上顯物物上明收放臨時更無滲漏所以道諸方說禪浩浩地爭如我栽田博飯喫直饒居士深懷樂施也未免剜肉成瘡簡點將來未忘取捨南泉打破粥鍋雖然光前絶後因甚衆人之物將為自己受用如今要全舊日家風須是重新鑄造雖然一動一靜一進一退總未有事在畢竟作麼生還會麼有意氣時添意氣不風流處也風流劍門分禪師結竈示衆云家常爐竈箇中開一味馨香養道胎頓絶諸方膻臭氣飽地笑咍咍山茨際禪師繼隱庵進火示衆借得嶽山南一片縛成茅屋伴雲閒今朝拈起無煙火朵朵晴峰開笑顏法座成提綱南石琇禪師法座成示衆劫初有箇寶華座孰謂今朝始作成為念衆生猶未了故將隻手特經營聲聞欲上心先怯列祖高升話大行謂是法空還不得從來佛道絶途程月江印禪師法座新成上堂大衆此處即是毗盧遮那如來所處憍尸迦須彌山頂善法之堂此座即是普光明藏獅子之座此蓋即是寶積長者所獻之蓋遍覆三千大千世界此座高出八萬四千由旬其堂高一十六萬由旬一一軒窗一一欄楯一一莊嚴藏交光相羅如寶絲網如普賢毛孔如彌勒樓閣諸佛剎海一一現前無壞無雜所謂諸佛曾來入此堂是故此堂最嚴淨諸佛曾來入此座是故法座最吉祥諸佛曾受此寶蓋是故此蓋最殊特須知此堂此座此蓋不從天降不從地涌皆從我山中牧石老禪根本智中之所流出竪窮三際則三際圓融橫亘十方則十方通暢擊拂子虗空可量風可繫無能盡說佛功德漢月藏禪師法座成上堂巖巖獅座涌堂中老衲披衣坐法空跨下狻猊忽返擲一聲哮吼見威雄喝一喝曰獅子踞地吼佛祖倒身走出頭天外看只有萬峰叟喝一喝建寶塔提綱上塔珠寶索相輪塔告成楚石琦禪師建寶塔上堂僧問昔日南泉和尚因趙州問云如何是道泉云平常心是道如何是平常心師云敲氷取火掘地覓天進云大好平常心師云我不如你你自會得好乃云問既不弱答得又奇你道契二大老不契二大老還有道得者麼試出來道看如無人道自道去也一分奉釋迦牟尼佛一分奉多寶佛塔南石琇禪師雙塔壽寧禪寺上塔珠誦法華經請升座師拈香祝聖畢乃云此法非思量分別之所能解惟有諸佛乃能知之上是天下是地喚甚麼作此法若向者裏領略得去便見靈山一會儼然未散其或未然徑山未免畫蛇添足去也須知此法頭頭上顯物物上明無一塵不是此法顯現之處無一時不是此法出生之時所以世尊得之從兜率降王宮逾城出家苦行成道住世七十九年說法三百餘會末後拈花示衆以正法眼藏獨付飲光諸祖得之各立化庭共揚法道或立一心三觀或說十玄六相或只直指單傳或設三玄五位聖天子得之仁及四海化及萬騶虞忽現而黃河澄清暘谷來朝而虞淵入貢百僚得之坐朝堂而揚政化燮陰陽而撫黎庶金湯吾教柱石家住持一源禪師得之不動聲色檀施雲歸重修寶塔不日成之現前大衆得之不勞跬步入此道場六萬餘言若建瓴水施財施力若見若聞無不是此法施設無不是此法圓成雖然若喚作此法則落聖解不喚作此法則墮凡情且作麼生即得拈拄杖云拄杖子聞得出來對衆決斷去也卓拄杖無二無二分無別無斷故大衆正恁麼時因齊慶讚一句如何舉似紫旃檀塔六七級紅萏花三四枝唯庵然禪師上塔頂寶索上堂鈎鎖連環連環鈎鎖覿體全彰眼眼相顧其橫也穿却虗空鼻頭其竪也鎖住須彌鐵柱親從惡辣鉗上煅煉得來豈比尋常麻纏紙裹箇是谷瑤居士壯觀浮圖騰今亘古底作也雖然如是且道高懸倒挂一句如何舉似四簷平定香雲繞萬世光華佛日長無用寬禪師泗洲大聖塔安相輪突出虗空大法輪合尖頭上鎮乾坤煌煌照燭威音外颯颯清風散月明大衆見麼倒騎瓠子咬崑崙楚石琦禪師怡雲居造石為佛塔成上堂舉教中道若人以真金日施百千兩不如暫入寺誠心一禮塔理上偏枯若人靜坐一須臾勝造八萬四千塔寶塔終久化為塵一念至心成正覺事上偏枯直饒理事雙亡正偏不立要見多寶釋迦則未可在還委悉麼龍袖拂開全體現象王行處絶狐蹤建壽塔提綱定塔基開塔基立塔石竪塔心開塔閉塔了庵欲禪師秀峰長老募緣建塔至上堂舉玄沙侍雪峰行次峰指面前云者一片地好造箇無縫塔沙云高多少峰顧視上下沙云人天福報不無和尚若是靈山授記未夢見在峰云你又作麼生沙云七尺八尺師云一人平地上掘坑一人虗空裏釘橛後來琅琊云家肥生孝子國霸有謀臣師云隨風倒柁漢今日秀峰長老正要造箇無縫塔遠遠過我不免贈箇塔樣良久云會麼高而無上廣莫可極淵而無下深不可測浩浩波光重重山色一道清虗亘古今八面香風惹衣裓擊拂子下座天如則禪師道友曾貫之為定水西原塔基示衆我與諸佛祖同樂亦同苦同死同時埋同坑無異土雖然恁麼就中也有些子不同處老僧今日預先分付下土掩壙時諸人著眼看伏死不伏埋從來是者漢無用寬禪師太湖開塔基示衆徹底掀翻是何基址深深插一神鍬直要徹骨徹髓喝聲云亘古亘今長江大水立普同三塔石示衆塞破虗空無縫罅當頭一點太誵訛看他劄腳埋根去潭北湘南會也麼冶父寺竪塔心示衆突出虗空一點無昂霄聳壑出紅爐通身不受人埋沒赫赫隹聲播五湖真淨文禪師開馬祖塔日上堂放過一著落在第二有利無利不離行市家家門外緑楊垂不獨春風折桃李馬祖堂開二月初二觸目遇緣法門大啓不如歸去來良久向什麼處去馬祖堂中燒香罷僧堂裏喫茶閉馬祖塔上堂祖宗門下總有關棙子應機接物有開有閉苟開而不能閉喪家失計閉而不能開誰辨往來或開而能閉也不妨遊戲閉而能開也重重善財或不開不閉時又作麼生大衆僧堂裏隨例軟餅䭃頭橫咬竪咬喝一喝下座請行橋法語元叟端禪師行新廣度橋神機密用妙應無方示險處津梁作中流砥柱橫身宇宙直教通地通天平步雲霄說甚度驢度馬七凹八凸由此坦平萬別千差從茲融會成一方之勝槩壯千古之雄基慶衍皇圖輝騰佛日正恁麼時腳跟下縱橫十字一句作麼生道驟步云無邊法界華嚴藏共踏毗盧頂上行愚庵及禪師行重建行春橋師召衆云大橋雄跨石湖濵捨舊圖新喜落成萬國車書通達道三吳城郭展修程溪山出色增佳勝簫鼓行春樂太平不動腳頭登彼岸十方一路要分明好諸仁者還他力量人辦此奇特事功夫妙密機用縱橫易深險成坦途架虗空為平地高高處觀之不足低低處仰之有餘可以津濟四生可以梯航九有直得輝騰佛日慶衍皇圖牧謳樵唱共履康莊馬載驢駝咸臻實際正與麼時且平步丹霄高超物表一句作麼生道遂驟出云塵塵剎剎無留礙直踏毗盧頂上行千巖長禪師婺州通濟橋成請行橋大衆會麼風清月朗地平天成廉訪司相公洎文武官員已為諸人說法了也西峰雙林及諸尊宿已為諸人說法了也只將萬萬歲石橋上祝吾皇萬萬歲恁麼則統十方世界是一座通濟橋不獨通濟婺州一城人通濟天下人去也巍巍功業千古不磨汝諸人人人常光現前箇箇壁立千仞釋迦不前彌勒不後行不行到不到要且不干別人事老僧到來也只因齊慶讚何故當空架起蒼龍脊不怕雙溪水流急踏上高高高處看東西有路通南北南北既通東西有路作麼生是諸人最初一步喝看腳下行至橋那邊復云婺州橋是趙州橋今日大家行一遭不獨度驢并度馬人人平步上青霄長翁淨禪師謝造橋上堂去那邊去來者裏來中間絶壑斷崖且道如何相接以拂子作彎橋勢曰看依稀金磴濶倣佛彩虹彎人從橋上過又作麼生松蘿景裏開天巧翰墨光中入畫圖開田并謝提綱白雲端禪師因興道者開田回示衆三載區區弄水泥捎裙劈褲又扶犂滿倉收稻方歸院一任禪和韗肚皮且道韗底是禪是飯乃云因風吹火用力不多山茨際禪師開田示衆云者一片田地從上來分付多少時矣只為兒孫不肯拋家撒業馳逐外遊致令祖父田園荊棘年生草茆日長山僧今日將原本契書揭示諸人須要諸人各各急著精彩認取者片田地斬無明草除邪見林然後放兩拋三深耕淺種披簑帶月挈耙連雲到此不妨改禾莖為粟柄變土塊作黃金都盧只在者片田地上顯現大衆正恁麼時且道承誰恩力乃以钁頭𡎺地三下云幾度賣來還自買為憐松竹引清風愚庵及禪師中秋謝開田耆舊上堂僧問百丈示衆云汝為我開田了我為汝說大義有僧開田了便問開田了也請和尚說大義丈展兩手且道是說不說師云一舉四十九進云恁麼則天人群生類皆承此恩力師云汝分上作麼生進云和尚今日開田功昭百世學人請和尚說大義畢竟如何展演師云爛泥裏有刺僧禮拜師乃云百丈開田說大義大舒兩手龍峰開田謝主事豈可空然擊拂子云一片月生海幾家人上樓楚石琦禪師看田回上堂舉溈山問仰山云何處來仰云田中來溈云田中有多少人仰插鍬叉手而立溈云今日南山大有人刈茅仰拽鍬而去雪竇云諸方咸謂插鍬話奇特大似隨邪逐惡據雪竇見處仰山被溈山一問直得草繩自縛去死十分妙喜云仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣師云幸是無事被妙喜老漢念一道真言直得天左旋地右轉
