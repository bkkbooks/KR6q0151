曰試以喻明有人失去徑寸之珠雖百千兩金不足與較其價之輕重使此珠不獲雖萬死莫酬其尋求之心鏤之肺肝刻之心膂形之夢寐貫之見聞念念不忘孜孜不捨一日不獲則一日之念不休一年不獲則一年之心不廢愈不見愈精勤益不獲益勇鋭乃至情消想竭思苦神窮寒暑兩忘寢食俱廢積年纍歲正於無可捉摸處驀忽入手圓陀陀光漾漾其三十年馳求之心一時頓息是謂悟也其尋覓此珠於心勦形瘵之際豈非參乎忽頓現此珠於神明意朗之頃豈非悟乎苟不因參尋之難安有此悟獲之喜也與論至此忽被箇傍不甘底一喝喝散惟見鐙自是鐙火自是火樓臺突兀車馬交馳華敷井井金蓮𦦨續條條玉燭胡張三黑李四萬人海裏醉扶歸查沙鬼大齊郎百戲場中狂未歇正恁麼時且不涉悟迷共樂升平底句如何舉似琉璃滿腹藏明月菡萏渾身放寶光無文璨禪師元宵上堂竪拂子云肥不剩肉瘦不露骨動地放光明眼睛烏律律山僧見了未免合掌讚歎道箇不是心不是佛不是物佛國白禪師上堂過去已過去未來且莫算正當現在事今朝正月半明月正團圓打鼓普請看大衆看即不無畢竟喚甚麼作月休於天上覓莫向水中尋法泰禪師上堂今朝正月已半是處燈火繚亂滿城羅綺駢闐交互往來遊玩文殊走入閙籃中普賢端坐高樓看且道觀音在甚麼處震天椎畫鼓聒地奏笙歌竹泉林禪師元宵上堂今朝上元節雪霽見晴春梵剎鐙千點長空月一輪鼓鐘喧靜夜歌管閙比鄰總是圓通境何須別問津上堂古杭管內靈隱名山肇建於東晉咸和年間慧理法師為第一祖今日上元令節諸處放燈知事直歲各各照管風燭下座藏叟珍禪師元宵上堂春雪寒春宵短古佛心破燈盞正法眼乾紙撚抖擻精神只管看看到北斗西移南斗東轉上元依舊正月半天目禮禪師元宵上堂三五元宵節燒鐙奪夜寒滿城人共賞徹曉恣歌歡燃鐙古佛閧閧地更無一人識他且道廣壽還識也無乃云不識不識元宵上堂昨夜摩騰法師遍點蓮燈助佛光明直得善信真人失却光彩太白龍王出來道我從龍種上尊王佛時便住此山未聞有者箇消息於是空中打箇閃電變作滿天黑風暴雨還委悉麼我見鐙明佛本光瑞如此元叟端禪師元宵上堂并謝監收浴主維那千粒萬粒從一粒生只者一粒從甚處生千鐙萬鐙從一鐙起只者一鐙從甚處起識得一鐙千鐙萬鐙鐙鐙不疑識得一粒千粒萬粒粒粒無礙三腳驢子弄蹄行踏破無邊香水海拈拄杖卓一卓頂門也少者一槌不得上元上堂盡大地是一碗鐙三世諸佛六代祖師天下老和尚在鐙影裏橫尸露骨進一步築碎釋迦腦門退一步踏折達磨脊梁不進不退坐在臨濟德山鼻尖上且作麼生得平展去良久云海枯終見底人死不知心定慧式禪師元宵上堂一月初圓百川澄影一燈發彩萬炷流輝月無留影之心燈無傳輝之念若得如是可以處於喧譁入乎塵俗運大悲光於沙界開普門眼於生靈豈惟觀音大士三十二種妙應無方具縛凡夫一一皆能開正法眼雖然如是也須是斬釘截鐵漢始得其或不然靜處薩婆訶恕中慍禪師元宵上堂天上月圓人間燈晃曠劫來事不隔纖塵有佛處不得住無佛處急走過元宵請後堂首座上堂曠大劫來燈一碗照天照地幾人知要看不盡傳持處兜率宮中夢覺時月江印禪師元宵上堂今朝正月十五處處村歌社舞曲彔床上老僧隨分說佛說祖雪峯輥毬禾山打鼓驚起東海鯉魚吞却南山猛虎報諸人休莽鹵我見鐙明佛本光瑞如此用彰俊禪師元宵上堂燃燈前色空明暗兩無偏燃鐙後大地山河顛倒走正燃鐙萬別千差一道明火照火兮如白晝光吞光也見真鐙擊拂子下座元宵上堂鐙明佛以一光散作百千萬億光謂之現瑞瑞巖以百千萬億本光聚作一光亦謂之現瑞古今日月古今山河古今光明古今祥瑞且道鐙明佛光與瑞巖之光是同是別廣南除夜納凉五臺六月下雪楚石琦禪師元宵上堂烈𦦨爐中撈得月此月了無圓缺大洋海底剔金鐙此鐙不屬晦明正當正月十五日天上人間標不出黑似漆明如日自古自今誰得誰失皆吾心之常分非有假於他術喝一喝元宵上堂今朝正月半鐙月光撩亂目前無一物打鼓普請看復云刺破眼元宵上堂一切月以一月為真一切鐙以一鐙為體一即一切一切即一一從甚麼處起洎合錯下注腳元宵懺會上堂有一人具大闡提作無間業捨戒定慧行貪嗔癡栽蒺䔧於三有田中種荊棘於一真地上乃至謗佛毀法破和合僧寧可永劫沉淪不求諸聖解脫直待一切衆生成佛盡乃發阿耨多羅三藐三菩提心未審此人如何懺悔良久鑊湯爐炭吹教滅劍樹刀山喝使摧元宵上堂始賀大年朝又當正月半看看百草長急急三春換世事密如麻光陰忙似鑽杖頭窟磊子舉動令人羡村歌社舞鬬施呈直截示人人不薦了庵欲禪師元宵上堂鏡鏡交輝燈燈相燭境智互融事理俱備喚作華藏性海正是平地揚波直饒盡乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提時節便恁麼去法堂前何止草深一丈放過一著有箇商量山門新舊知事隨年進退因時請得首座表率維那舉唱洗光佛日重整頽綱見前諸德一一循規守矩人人舍短從長信手揭開釋迦老子青蓮華眼徐步踏著達摩大師生鐵脊梁有底碩學飽參與汝證據無底良辰美景與汝敷揚以拂子畫一畫云好事不須頻話會留將和氣暖肝腸元宵進退兩序上堂十五日已前明中有暗十五日已後暗中有明正當十五日明暗雙忘體用俱寂譬如千鐙洞照一室光光交羅各不相借且道是知事分上事頭首分上事諸人分上事莫有道得底麼拈拄杖卓一下云蟭螟睫上放元宵狸奴倒上菩提樹元宵進退兩序上堂以字既不成八字亦不是侍者參得禪畢竟誰相委三腳驢子弄蹄行八臂那吒闌不住覺皇殿上慶賞元宵妙觸宣明成佛子住擊拂子云相逢不飲空歸去洞裏桃花解笑人復舉藥山謂雲巖云與我喚沙彌來巖云和尚喚他作甚麼山云我有箇折腳鐺子要伊提上挈下巖云與麼則與和尚共出隻手應庵和尚云藥山道頭雲巖知尾雖然頭尾兩全要且不識羞恥師云老應庵只知其一不知其二然儉生不孝義出豐年彼時藥山一箇折腳鐺子只消雲巖提上挈下已自有餘較之本覺今日若非兩班賢佐協力扶持便見灰寒火冷以故不蓄莖虀粒米直教來者飽齁齁地去豈不出他古人還委悉麼雪後始知松柏操事難方見丈夫心元宵上堂釋迦老子道一人發真歸元十方虗空悉皆消殞五祖和尚道一人發真歸元十方虗空築著磕著若向築著磕著處會得只會祖師禪不會如來禪若向悉皆消殞處會得只會得如來禪要且未會祖師禪山僧道一人發真歸元十方虗空性相平等且道是祖師禪如來禪喝一喝云一釋迦二元和三佛陀自餘是甚麼碗脫丘元宵上堂若論此事正如一燈分為千鐙鐙鐙相續無有窮盡在東則為知事在西則為頭首在方丈則為住持在閒寮則為耆舊至於三條椽下七尺單前經行坐臥卷舒出沒莫不以此鐙而為佛事一明一切明一用一切用重重主伴歷歷交參無黨無偏無新無故只貴現成受用到頭不涉安排任是疥狗泥猪少他一分不得擊拂子一氣不言含有象萬靈何處謝無私元宵南山和尚至上堂盡法界是一真鐙遍塵區是一佛剎靈利漢一踏踏翻非惟可以觀光上國獨步大方便乃控佛祖宏機廓人天幽跡好大衆頭峭五嶽眼生三角左刮龜毛右截兔角焦尾忽乘雲雷飛金毛亂觸日月落月裏仙人巧畫眉九逵擺動黃金鐸喝一喝元宵上堂十五日已前明不見暗十五日已後暗不見明正當十五日譬如一室中然一鐙外懸十鏡鐙鏡交輝重重無盡喚作境智互融事理俱備不妨奇特若約衲僧分上正是抱橋柱洗澡把放船有甚共語處豈不見臨濟會下兩堂首座相見同時下喝直是賓主歷然若也見得非惟慶快平生光揚宗眼便可向高高峯頂行船深深海底走馬利劍提來斬萬機將報不平繞天下喝愚庵及禪師上堂今朝正月十五開却千門萬戶斬新舊日風規掃蕩陳年露布良久云春暖畫堂多富貴夜深鐙月兩相宜元宵上堂人人自有光明在看時不見暗昏昏既是自己光明因甚看時不見驀拈拄杖敲燭臺云一鐙發千光千光一鐙見上堂十五日已前春雨如膏十五日已後春光似箭正當十五日管絃沸月宣和氣鐙火燒空奪夜寒拈鐙籠來佛殿裏將山門安鐙籠上一切智智清淨無二無二分無別無斷故驀拈拄杖云三歲孩兒抱花鼓莫來攔我毬門路天真則禪師元宵上堂元宵月正圓因甚道月半盞子撲落地楪子成兩片直得鬱藍天上樂奏升平娑竭海中金鰲鼓舞帝網重重發現百千日月交輝總與麼薦得早是隨他光影轉且道畢竟如何擊拂子云醉乘白鶴登雲闕夢跨青鸞入絳宮酒醒眼開俱不見閒花野草自春風石屋珙禪師元宵謝東班殿主并無念西堂上堂進以禮退以禮天地與我同根萬物與我一體爛生薑陳皂角舊笊籬破木杓東頭賣賤西頭賣貴有利無利不離行市夜來無位真人提金剛圈點飛龍馬走遍四天下却與寰中和尚在蟭螟眼裡共賞元宵天曉起來依然即在赤肉團上卓拄杖一下云我見鐙明佛本光瑞如此元宵上堂山堂兀坐思悠悠節令推遷莫暫留新歲始聞歌鼓吹元宵又見挂鐙毬心田荊棘參天長業海波濤滾底流不向死前先畫䇿草根從自鎖枯髏元宵上堂南閻浮地以音聲為佛事十方俱擊鼓十處一時聞福源寺裏上堂西林寺裡一一聽得西林寺裏念佛福源寺裡一一聽得讚歎也獲一分功德毀謗也獲一分功德一即一切一切即一鸚湖市上做元宵因甚東家點鐙西家暗坐你也理會不得我也理會不得冷水浸冬瓜大家相淈𣸩天隱修禪師元夕上堂然鐙佛為汝諸人授記去也以拄杖右邊卓一下釋迦牟尼過者邊著復以拄杖左邊卓一下慈氏世尊過者邊著且道今當第幾以拄杖中間卓一下誰取正眼著擲拄杖下座箬庵問禪師元宵解制上堂來底自來去底自去水上葫蘆按捺不住是則蝦蟆跳上天不是則大蟲吞却虎是與不是互相鈍置碧眼黃頭何本可據無繩自縛去死十分有眼如盲調絃膠柱何似生遼天鶻萬里雲只一突鬼爭漆桶夜相揩本光照見鐙明佛二月閉罏日提綱雪嶠信禪師罷罏上堂一二三四五六七萬仞峰頭獨足立良久云一期過了堂中不見一箇半箇且喜太平十字街頭撞著馬相公與你索飯錢你作麼生抵對喝一喝春風日日到園林夜夜面南看北斗牧雲門禪師罷罏上堂孟冬十月記開罏看看逗到上元時雖然村落無鐙火別有光明一段奇諸人若也尚留觀聽古南未免從胸卍字涌出寶光殷勤相送驀拈拄杖云者木上座又道不必不必何故擲下云家家門前火把子
