body:
  text: 武林十八㵎理安禪寺住持婁東行悅集五參提綱住持五參提綱僅集禪燈諸錄餘者浩繁不及具載六祖能大師上堂謂眾曰諸善知識汝等各各淨心聽吾說法汝等諸人自心是佛更莫狐疑外無一物而能建立皆是本心生萬種法故經云心生種種法生心滅種種法滅若欲成就種智須達一相三昧一行三昧若於一切處而不住相彼相中不生憎愛亦無取捨不念利益成壞等事安閒恬靜虗融澹泊此名一相三昧若於一切處行住坐臥純一直心不動道場真成淨土名一行三昧若人具二三昧如地有種能含藏長養成就其實一相一行亦復如是我今說法猶如時雨溥潤大地汝等佛性譬諸種子遇茲霑洽悉得發生承吾旨者決獲菩提依吾行者定證妙果南陽忠國師上堂禪宗學者應遵佛語一乘了義契自心源不了義者互不相許如獅子身中蟲夫為人師若涉名利別開異端則自他何益如世大匠斤斧不傷其手香象所負非驢能堪上堂青蘿夤緣直上寒松之頂白雲淡泞出沒太虗之中萬法本閒而人自閙師與紫璘供奉論議師陞座奉曰請師立義某甲破師曰立義竟奉曰是甚麼義師曰果然不見非公境界便下座南岳思禪師示眾曰道源不遠性海非遙但向己求莫從他覓覓即不得得亦不真扣氷古佛上堂四眾雲臻教老僧說箇甚麼便下座馬祖一禪師上堂汝等諸人各信自心是佛此心即是佛心達磨大師從南天竺國來至中華傳上乘一心之法令汝等開悟又引楞伽經文以印眾生心地恐汝顛倒不自信此一心之法各各有之故楞伽經以佛語心為宗無門為法門夫求法者應無所求心外無別佛佛外無別心不取善不捨惡淨穢兩邊俱不依怙達罪性空念念不可得無自性故故三界唯心森羅萬象一法之所印凡所見色皆是見心心不自心因色故有汝但隨時言說即事即理都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此意乃可隨時著衣喫飯長養聖胎任運過時更有何事百丈海禪師上堂靈光獨耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛盤山積禪師上堂心若無事萬法不生意絕玄機纖塵何立道本無體因體而立名道本無名因名而得號若言即心即佛今時未入玄微若言非心非佛猶是指蹤極則向上一路千聖不傳學者勞形如猿捉影上堂夫心月孤圓光吞萬象光非照境境亦非存光境俱亡復是何物禪德譬如擲劍揮空莫論及之不及斯乃空輪無迹劍刃無虧若能如是心心無知全心即佛全佛即人人佛無異始為道矣上堂禪德可中學道似地擎山不知山之孤峻如石含玉不知玉之無瑕若如此者是名出家故導師云法本不相礙三際亦復然無為無事人猶是金鎖難所以靈源獨耀道絕無生大智非明真空無迹真如凡聖皆是夢言佛及涅槃竝為增語禪德直須自看無人替代上堂三界無法何處求心四大本空佛依何住璿璣不動寂爾無言覿面相呈更無餘事珍重楊岐叔禪師上堂羣靈一源假名為佛體竭形銷而不滅金流樸散而常存性海無風金波自涌心靈絕非萬象齊照體斯理者不言而徧歷沙界不用而功益玄化如何背覺反合塵勞於陰界中妄自囚執馬頭藏禪師上堂知而無知不是無知而說無知南泉願禪師上堂然燈佛道了也若心相所思出生諸法虗假不實何以故心尚無有云何出生諸法猶如形影分別虗空如人取聲安置篋中亦如吹網欲令氣滿故老宿云不是心不是佛不是物且教你兄弟行履據說十地菩薩住首楞嚴三昧得諸佛秘密法藏自然得一切禪定解脫神通妙用至一切世界普現色身或示現成等正覺轉大法輪入涅槃使無量入毛孔演一句經無量劫其義不盡教化無量億千眾生得無生法忍尚喚作所知愚極微細所知愚與道全乖大難大難珍重上堂曰王老師自小養一頭水牯牛擬向溪東牧不免食他國王水草擬向溪西牧亦不免食他國王水草不如隨分納些些總不見得上堂道箇如如早是變了也今時師僧須向異類中行歸宗曰雖行畜生行不得畜生報師曰孟八郎漢又恁麼去也上堂文殊普賢昨夜三更相打每人與二十棒趁出院去也趙州曰和尚棒教誰喫師曰且道王老師過在甚處州禮拜上堂王老師賣身去也還有人買麼一僧出曰某甲買師曰不作貴不作賤汝作麼生買僧無對鹽官安國師上堂謂眾曰虗空為皷須彌為椎甚麼人打得眾無對歸宗常禪師上堂從上古德不是無知解他高尚之士不同常流今時不能自成自立虗度時光諸子莫錯用心無人替汝亦無汝用心處莫就他覓從前祇是依他解發言皆滯光不透脫祇為目前有物上堂吾今欲說禪諸子總近前大眾近前師曰汝聽觀音行善應諸方所問如何是觀音行師乃彈指曰諸人還聞否曰聞師曰一隊漢向者裏覓甚麼以棒趂出大笑歸方丈茱萸和尚上堂擎起一橛竹曰還有人虗空釘得橛麼時有靈虗上座出眾曰虗空是橛師擲下竹便下座大梅常禪師上堂汝等諸人各自回心達本莫逐其末但得其本其末自至若欲識本唯了自心此心元是一切世間出世間法根本故心生種種法生心滅種種法滅且不附一切善惡而生萬法本自如如黃檗運禪師上堂大眾雲集乃曰汝等諸人欲何所求以拄杖趂之大眾不散師却復坐曰汝等諸人盡是噇酒糟漢恁麼行脚取笑於人但見八百一千人處便去不可圖他熱閙也老漢行脚時或遇草根下有一箇漢便從頂門上一錐看他若知痛痒可以布袋盛米供養他可中總似汝如此容易何處更有今日事也汝等既稱行脚亦須著些精神好還知道大唐國內無禪師麼時有僧問諸方尊宿盡聚眾開化為甚麼却道無禪師師曰不道無禪祇是無師闍黎不見馬大師下有八十四人坐道場得馬師正法眼者止三兩人廬山歸宗和尚是其一夫出家人須知有從上來事分始得且如四祖下牛頭橫說竪說猶未知向上關捩子有此眼目方辨得邪正宗黨且當人事宜不能體會得但知學言語念向皮袋裏安著到處稱我會禪還替得汝生死麼輕忽老宿入地獄如箭我纔見汝入門來便識得了也還知麼急須努力莫容易事持片衣口食空過一生明眼人笑汝久後總被俗漢筭將去在宜自看遠近是阿誰面上事若會即便會若不會即散去珍重香嚴端禪師上堂僧問如何是直截根源師乃擲下拄杖便歸方丈上堂語是謗寂是誑語寂向上有路在老僧口門窄不能與汝說得便下座上堂問正因為甚麼無事師曰我不曾停留乃曰假饒重重剝得淨盡無停留權時施設亦是方便接人若是那邊事無有是處杭州天龍和尚上堂大眾莫待老僧上來便上來下去便下去各有華藏性海具足功德無礙光明各各參取珍重龜山具禪師上堂動容瞬目無出當人一念淨心本來是佛仍說偈曰心本絕塵何用洗身中無病豈求醫欲知是佛非身處明鑑高懸未照時黃州安禪師上堂言不落句佛祖徒施玄韻不墜誰人知得大慈中禪師上堂山僧不解答話祇能識病時有僧出師便歸方丈趙州諗禪師上堂如明珠在掌胡來胡現漢來漢現老僧把一枝草為丈六金身用把丈六金身為一枝草用佛是煩惱煩惱是佛僧問未審是佛誰家煩惱師曰與一切人煩惱曰如何免得師曰用免作麼上堂金佛不度爐木佛不度火泥佛不度水真佛內裏坐菩提涅槃真如佛性盡是貼體衣服亦名煩惱實際理地甚麼處著一心不生萬法無咎汝但究理坐看三二十年若不會截取老僧頭去夢幻空華徒勞把捉心若不異萬法一如既不從外得更拘執作麼如羊相似亂拾物安向口裏老僧見藥山和尚道有人問著但教合取狗口老僧亦教合取狗口取我是垢不取我是淨一似獵狗專欲得物喫佛法在甚麼處千人萬人盡是覓佛漢子於中覓一箇道人無若與空王為弟子莫教心病最難醫未有世界早有此性世界壞時此性不壞一從見老僧後更不是別人祇是箇主人公者箇更向外覓作麼正恁麼時莫轉頭換腦若轉頭換腦即失却也僧問承師有言世界壞時此性不壞如何是此性師曰四大五陰曰此猶是壞底如何是此性師曰四大五陰上堂纔有是非紛然失心還有答話分也無僧舉似洛浦浦扣齒又舉似雲居居曰何必僧回舉似師師曰南方大有人喪身失命曰請和尚舉師纔舉前語僧指旁僧曰者箇師僧喫却飯了作恁麼語話師休去上堂正人說邪法邪法悉皆正邪人說正法正法悉皆邪諸方難見易識我者裏易見難識上堂謂眾曰我向行脚到南方火爐頭有箇無賓主話直至如今無人舉著上堂至道無難唯嫌揀擇纔有言語是揀擇是明白老僧不在明白裏是汝還護惜也無時有僧問既不在明白裏護惜箇甚麼師曰我亦不知僧曰和尚既不知為甚道不在明白裏師曰問事即得禮拜了退別僧問至道無難唯嫌揀擇是時人窠窟否師曰曾有人問我老僧直得五年分疎不下又問至道無難唯嫌揀擇如何是不揀擇師曰天上天下唯我獨尊曰此猶是揀擇師曰田庫奴甚處是揀擇僧無語上堂兄弟若從南方來者即與下載若從北方來者即與上載所以道近上人問道即失道近下人問道即得道上堂兄弟莫久立有事商量無事向衣鉢下坐窮理好老僧行脚時除二時粥飯是雜用心處除外更無別用心處若不如是大遠在上堂謂眾曰你若一生不離叢林不語五年十載無人喚你作啞漢已後佛也不柰你何你若不信截取老僧頭去大茅和尚上堂欲識諸佛師向無明心內識取欲識常住不凋性向萬物遷變處識取陳尊宿上堂我見百丈不識好惡大眾纔集以拄杖一時打下復召大眾眾回首乃云是甚麼有甚共語處又黃檗和尚亦然復召大眾眾回首乃云月似彎弓少雨多風猶較些子上堂裂開也在我揑聚也在我時有僧問如何是裂開師曰三九二十七菩提涅槃真如解脫即心即佛我且與麼道你又作麼生曰某甲不與麼道師曰醆子撲落地碟子成七片曰如何是揑聚師乃斂手而坐大隨真禪師上堂此性本來清淨具足萬德但以染淨二緣而有差別故諸聖悟之一向淨用而成覺道凡夫迷之一向染用沒溺輪回其體不二故般若云無二無二分無別無斷故丹霞然禪師上堂阿你渾家切須保護一靈之物不是你造作名邈得更說甚薦與不薦吾往日見石頭亦祇教切須自保護此事不是你談話得阿你渾家各有一坐具地更疑甚麼禪可是你解底物豈有佛可成佛之一字永不喜聞阿你自看善巧方便慈悲喜捨不從外得不著方寸善巧是文殊方便是普賢你更擬趂逐甚麼物不用經求落空去今時學者紛紛擾擾皆是參禪問道吾此間無道可修無法可證一飲一各自有分不用疑慮在在處處有恁麼底若識得釋迦即老凡夫是阿你須自看取莫一盲引眾盲相將入火坑夜裏暗雙陸賽彩若為生珍重三平義忠禪師上堂今時人出來盡學馳求造作將當自己眼目有甚麼相當阿汝欲學麼不要諸餘汝等各有本分事何不體取作麼心憤憤口悱悱有甚麼利益分明向汝說若要修行路及諸聖建立化門自有大藏教文在若是宗門中事宜汝切不得錯用心僧問宗門中還有學路也無師曰有一路滑如苔曰學人還攝得否師曰不擬心汝自看馬頰山本空禪師上堂祇者施為動轉還合得本來祖翁麼若合得十二時中無虗棄底道理若合不得喫茶說話往往喚作茶話在僧便問如何免得不成茶話去師曰你識得口也未曰如何是口師曰兩片皮也不識曰如何是本來祖翁師曰大眾前不要牽爺恃娘曰大眾忻然去也師曰你試點大眾性看僧作禮師曰伊往往道一性一切性在僧欲進語師曰孤負平生行脚眼本生禪師拈拄杖示眾曰我若拈起你便向未拈起時作道理我若不拈起你便向拈起時作主宰且道老僧為人在甚處時有僧出曰不敢妄生節目師曰也知闍黎不分外曰低低處平之有餘高高處觀之不足師曰節目上更生節目僧無語師曰掩鼻偷香空招罪犯夾山會禪師上堂有祖以來時人錯會相承至今以佛祖言句為人師範若或如此却成狂人無智人去他祇指示汝無法本是道道無一法無佛可成無道可得無法可取無法可捨所以老僧道目前無法意在目前他不是目前法若向佛祖邊學此人未具眼在何故皆屬所依不得自在本祇為生死茫茫識性無自由分千里萬里求善知識須具正眼求脫虗謬之見定取目前生死為復實有為復實無若有人定得許汝出頭上根之人言下明道中下根器波波浪走何不向生死中定當取何處更疑佛疑祖替汝生死有智人笑汝汝若不會更聽一頌勞持生死法唯向佛邊求目前迷正理撥火覓浮漚上堂不知天曉悟不由師龍門躍鱗不墮漁人之手但意不寄私緣舌不親玄旨正好知音此名俱生話若向玄旨疑去賺殺闍黎困魚止濼鈍鳥棲蘆雲水非闍黎闍黎非雲水老僧於雲水而得自在闍黎又作麼生上堂聞中生解意下丹青目前即美久蘊成病青山與白雲從來不相到機絲不挂梭頭事文彩縱橫意自殊嘉祥一路智者知疏瑞草無根賢者不貴上堂金烏玉兔交互爭輝坐却日頭天下黯黑上唇與下唇從來不相識明明向君道莫令眼顧著何也日月未足為明天地未足為大空中不運斤巧匠不遺蹤見性不留佛悟道不存師尋常老僧道目覩瞿曇猶如黃葉一大藏教是老僧坐具祖師玄旨是破草鞋寧可赤脚不著最好上堂我二十年住此山未曾舉著宗門中事有僧問承和尚有言二十年住此山未曾舉著宗門中事是否師曰是僧便掀倒禪床師休去至明日普請掘一坑令侍者請昨日僧至曰老僧二十年說無義語今日請上座打殺老僧埋向坑裡便請若不打殺老僧上座自著打殺埋在坑中始得其僧歸堂束裝潛去上堂百草頭薦取老僧閙市裡識取天子上堂眼不挂戶意不停玄直得靈草不生猶是五天之位珠光月魄不是出頭時此間無老僧五路頭無闍黎九峰䖍禪師上堂諸兄弟還識得命麼欲知命流泉是命湛寂是身千波競涌是文殊境界一亘晴空是普賢床榻其次借一句子是指月於中事是話月從上宗門中事如節度使信旗相似且如諸方先德未建許多名目指陳已前諸兄弟約甚麼體格商量到者裏不假三寸試話會看不假耳試釆聽看不假眼試辨白看所以道聲前拋不出句後不藏形盡乾坤大地都來是汝當人箇體向甚麼處安眼耳鼻舌莫但向意根下圖度作解盡未來際亦未有休歇去所以洞山道擬將心意學玄宗大似西行却向東珍重涌泉欣禪師上堂我四十九年在者裏尚自有時走作汝等諸人莫開大口見解人多行解人萬中無一箇見解言語總要知通若識不盡敢道輪回去在為何如此葢為識漏未盡汝但盡却今時始得成立亦喚作立中功轉功就他去亦喚作就中功親他去我所以道親人不得度渠不度親人恁麼譬喻尚不會薦取渾崙底但管取性亂動舌頭不見洞山道相續也大難汝須知有此事若不知有啼哭有日在洛浦安禪師上堂末後一句始到牢關鎖斷要津不通凡聖尋常向諸人道任從天下樂欣欣我獨不肯欲知上流之士不將佛祖言教貼在額頭上如龜負圖自取喪身之兆鳳縈金網趍霄漢以何期直須旨外明宗莫向言中取則是以石人機似汝也解唱巴歌汝若似石人雪曲也應和指南一路智者知疏牛頭微禪師上堂三世諸佛用一點伎倆不得天下老師口似匾擔諸人作麼生大不容易除非知有餘莫能知泐潭牟禪師上堂僧問百丈捲席意旨如何師曰珍重便下堂德山鑒禪師上堂若也於己無事則勿妄求妄求而得亦非得也汝但無事於心無心於事則虗而靈空而妙若毛端許言之本末者皆為自欺何故毫𣯛繫念三塗業因瞥爾情生萬劫覊鎖聖名凡號盡是虗聲殊相劣形皆為幻色汝欲求之得無累乎及其厭之又成大患終而無益上堂我先祖見處即不然者裏無祖無佛達磨是老臊胡釋迦老子是乾屎橛文殊普賢是擔屎漢等覺妙覺是破執凡夫菩提涅槃是繫驢橛十二分教是鬼神簿拭瘡疣紙四果三賢初心十地是守古塚鬼自救不了巖頭奯禪師上堂吾甞究涅槃經七八年覩三兩段義似衲僧說話又曰休休時有一僧出禮拜請師舉師曰吾教意如字三點第一向東方下一點點開諸菩薩眼第二向西方下一點點諸菩薩命根第三向上方下一點點諸菩薩頂此是第一段義又曰吾教意如摩醯首羅擘開面門竪亞一隻眼此是第二段義又曰吾教意猶如塗毒皷擊一聲遠近聞者皆喪此是第三段義時小嚴上座問如何是塗毒皷師以兩手按膝亞身曰韓信臨朝底嚴無語雪峰存禪師上堂南山有一條鼈鼻蛇汝等諸人切須好看長慶出曰今日堂中大有人喪身失命雲門以拄杖攛向師前作怕勢有僧舉似玄沙沙曰須是稜兄始得然雖如是我即不然曰和尚作麼生沙曰用南山作麼上堂此事如一片田地相似一任諸人耕種無有不承此恩力者玄沙曰且作麼生是者田地師曰看沙曰是即是某甲不與麼師曰你作麼生沙曰祇是人人底上堂盡大地是箇解脫門把手拽伊不肯入時一僧出曰和尚怪某甲不得又一僧曰用入作甚麼師便打陞座眾集定師輥出木毬玄沙遂捉來安舊處玄沙備禪師上堂佛道閑曠無有程途無門解脫之門無意道人之意不在三際故不可昇沈建率乖真非屬造化動則起生死之本靜則醉昏沉之鄉動靜雙泯即落空亡動靜雙收瞞頇佛性必須對塵對境如枯木寒灰臨時應用不失其宜鏡照諸像不亂光輝鳥飛空中不雜空色所以十方無影像三界絕行蹤不墮往來機不住中間意鐘中無皷響皷中無鐘聲鐘皷不相交句句無前後如壯士展臂不藉他力獅子遊行豈求伴侶九霄絕翳何在穿通一段光明未曾昏昧若到者裏體寂寂常的的日赫𦦨無邊表圓覺空中不動搖吞爍乾坤迥然照夫佛出世者元無出入名相無體道本如如法爾天真不同修證祇要虗閑不昧作用不涉塵泥箇中纖毫道不盡即為魔王眷屬句前句後是學人難處所以一句當天八萬門永絕生死直饒得似秋潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事道人行處如火銷氷終不却成氷箭既離弦無返回勢所以牢籠不肯住呼喚不回頭古聖不安排至今無處所若到者裏步步登玄不屬邪正識不能識智不能知動便失宗覺即迷旨二乘膽顫十地魂驚語路處絕心行處滅直得釋迦掩室於摩竭淨名杜口于毗耶須菩提唱無說而顯道釋梵絕聽而雨花若與麼見前更疑何事沒棲泊處離去來今限約不得心思路絕不因莊嚴本來真淨動用語笑隨處明了更無欠少今時人不悟箇中道理妄自涉事涉塵處處染著頭頭繫絆縱悟則塵境紛紜名相不實便擬凝心斂念攝事歸空閉目藏睛纔有念起旋旋破除細想纔生即便遏捺如此見解即是落空亡底外道魂不散底死人冥冥漠漠無覺無知塞耳偷鈴徒自欺誑者裏分別則不然也不是隈門傍戶句句現前不得商量不涉文墨本絕塵境本無位次權名箇出家兒畢竟無踪迹真如凡聖地獄人天祇是療狂子之方虗空尚無改變大道豈有昇沉悟則縱橫不離本際若到者裏凡聖也無立處若向句中作意則沒溺殺人若向外馳求又落魔界只如向上沒可安排恰似焰爐不藏蚊蚋此理本來平坦何用剗除動靜揚眉是真解脫道不疆為意度建立乖真若到者裏纖毫不受指意則差便是千聖出頭來也安一字不得久立珍重長慶稜禪師上堂良久曰莫道今夜較些子便下座上堂撞著道伴交肩過一生參學事畢上堂淨潔打疊了也却近前問我覓我劈脊與你一棒有一棒到你你須生慚愧無一棒到你你又向甚麼處會皷山晏國師上堂良久曰南泉在日亦有人舉要且不識南泉即今莫有識南泉者麼試出來對眾驗看時有僧出禮拜纔起師曰作麼生僧近前曰咨和尚師曰不才請退乃曰經有經師論有論師律有律師有圅有號有部有帙各有人傳持且佛法是建立教禪道乃止啼之說他諸聖出興葢為人心不等巧開方便遂有多門受疾不同處方還異在有破有居空叱空二患既除中道須遣皷山所以道句不當機言非展事承言者喪滯句者迷不唱言前寧談句後直至釋迦掩室淨名杜口大士梁時童子當日一問二問三問盡有人了也諸仁者合作麼生明招謙禪師上堂金鋒敵勝罕遇知音同死同生萬中無一尋言逐句其數河沙舉古舉今滅胡種族向上一路啐猶乖儒士相逢握鞭回首沙門所見誠實苦哉拋却真金隨隊撮土報諸稚子莫謾波波解得他玄猶兼瓦礫不如一擲驀過太虗祇者靈鋒阿誰敢近任君來箭方稱丈夫擬欲吞聲不消一钁羅漢琛禪師上堂宗門玄妙為當祇恁麼也更別有奇特若別有奇特汝且舉將來看若無去不可將兩箇字便當却宗乘也何者兩箇字謂宗乘教乘也汝纔道著宗乘便是宗乘道著教乘便是教乘禪德佛法宗乘元來由汝口裏安立名字作取說取便是也斯須向者裏說平說實說圓說常禪德汝喚甚麼作平實把甚麼作圓常傍家行脚理須甄別莫相埋沒得些子聲色名字貯在心頭道我會解善能揀辨汝且會箇甚麼揀箇甚麼記持得底是名字揀辨得底是聲色若不是聲色名字汝又作麼生記持揀辨風吹松樹也是聲蝦蟇老鵶叫也是聲何不那裏聽取揀擇去若那裏有箇意度模樣祇如老師口裏又有多少意度與上座莫錯即今聲色摐摐地為當相及不相及若相及即汝靈性金剛祕密應有壞滅去也何以如此為聲貫破汝耳色穿破汝眼因緣即塞却汝幻妄走殺汝聲色體爾不可容也若不相及又甚麼處得聲色來會麼相及不相及試裁辨看少間又道是圓常平實甚麼人恁麼道未是黃夷村裏漢解恁麼說是他古聖垂些子相助顯發今時不識好惡便安圓實道我別有宗風玄妙釋迦佛無舌頭不如汝些子便恁麼點胸若論殺盜婬罪雖重猶輕尚有歇時此箇謗般若瞎却眾生眼入阿鼻地獄吞鐵丸莫將為等閒所以古人道過在化主不干汝事珍重安國球禪師上堂我此間粥飯因緣為兄弟舉唱終是不常欲得省要却是山河大地與汝發明其道既常亦能究竟若從文殊門入者一切無為土木瓦礫助汝發機若從觀音門入者一切音響蝦蟇蚯蚓助汝發機若從普賢門入者不動步而到以此三門方便示汝如將一隻折箸攪大海水令彼魚龍知水為命會麼若無智眼而審諦之任汝百般巧妙不為究竟水陸儼禪師上堂大眾集定師下座捧香爐巡行大眾前曰供養十方諸佛便歸方丈龍濟修禪師上堂具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即是凡夫凡夫若知即是聖人此兩語一理二義若人辨得不妨於佛法中有箇入處若辨不得莫道不疑好珍重上堂卷簾除却障閉戶生窒礙祇者障與礙古今無人會會得是障礙不會不自在溈山祐禪師上堂夫道人之心質直無偽無背無面無詐妄心一切時中視聽尋常更無委曲亦不閉眼塞耳但情不附物即得從上諸聖祇說濁邊過患若無如許多惡覺情見想習之事譬如秋水澄渟清淨無為澹泞無礙喚他作道人亦名無事人時有僧問頓悟之人更有修否師曰若真悟得本他自知時修與不修是兩頭語如今初心雖從緣得一念頓悟自理猶有無始曠劫習氣未能頓淨須教渠淨除現業流識即是修也不可別有法教渠修行趣向從聞入理聞理深妙心自圓明不居惑地縱有百千妙義抑揚當時此乃得坐披衣自解作活計始得以要言之則實際理地不受一塵萬行門中不捨一法若也單刀直入則凡聖情盡體露真常理事不二即如如佛上堂僧出曰請和尚為眾說法師曰我為汝得徹困也僧禮拜上堂仲冬嚴寒年年事運推移事若何仰山進前叉手而立師曰我情知汝答者話不得香嚴曰某甲偏答得者話師躡前問嚴亦進前叉手而立師曰賴遇寂子不會上堂今時人但直下體取不會底正是汝心正是汝佛若向外得一知一解將為禪道且沒交涉名運糞入不名運糞出汙汝心田所以道不是道上堂老僧百年後向山下作一頭水牯牛左脇下書五字曰溈山僧某甲當恁麼時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧畢竟喚作甚麼即得仰山出禮拜而退雲居膺代曰師無異號資福寶曰當時但作此相拓呈之新羅和尚作此拓呈之又曰同道者方知芭蕉徹作此相拓呈之又曰說也說了也注也注了也悟取好乃述偈曰不是溈山不是牛一身兩號實難酬離却兩頭應須道如何道得出常流仰山寂禪師住東平時溈山令僧送書并鏡與師師上堂提起示眾曰且道是溈山鏡東平鏡若道是東平鏡又是溈山送來若道是溈山鏡又在東平手裏道得則留取道不得則撲破去也眾無語師遂撲破便下座上堂汝等諸人各自回光返照莫記吾言汝無始劫來背明投暗妄想根深卒難頓拔所以假設方便奪汝麤識如將黃葉止啼有甚麼是處亦如人將百種貨物與金寶作一舖貨賣祇擬輕重來機所以道石頭是真金舖我者裏是雜貨舖有人來覓鼠糞我亦拈與他來覓真金我亦拈與他時有僧問鼠糞即不要請和尚真金師曰囓鏃擬開口驢年亦不會僧無對師曰索喚則有交易不索喚則無我若說禪宗身邊要一人相伴亦無豈況有五百七百眾耶我若東說西說則爭頭向前采拾如將空拳誑小兒都無實處我今分明向汝說聖邊事且莫將心凑泊但向自己性海如實而修不要三明六通何以故此是聖末邊事如今且要識心達本但得其本不愁其末他時後日自具去在若未得本縱饒將情學他亦不得汝豈不見溈山和尚云凡聖情盡體露真常事理不二即如如佛香嚴閒禪師上堂若論此事如人上樹口衘樹枝脚不踏枝手不攀枝樹下忽有人問如何是祖師西來意不對他又違他所問若對他又喪身失命當恁麼時作麼生即得時有虎頭招上座出眾云樹上即不問未上樹時請和尚道師乃呵呵大笑上堂道由悟達不在語言況是密密堂堂曾無間隔不勞心意暫借回光日用全功迷途自背芭蕉清禪師上堂拈拄杖示眾曰你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子靠拄杖下座上堂如人行次忽遇前面萬丈深坑背後野火來逼兩畔是荊棘叢林若也向前則墮在坑塹若也退後則野火燒身若也轉側則被荊棘林礙當與麼時作麼生免得若也免得合有出身之路若免不得墮身死漢上堂我年二十八到仰山參見南塔見上堂曰汝等諸人若是箇漢從娘肚裏出來便作獅子吼好麼我於言下歇得身心便住五載鹿苑和尚上堂展手曰天下老和尚諸上座命根總在者裏有僧出曰還收得也無師曰天台石橋側曰某甲不恁麼師曰伏惟尚饗芭蕉圓禪師上堂三千大千世界夜來被老僧都合成一塊輥向須彌頂上帝釋大怒拈得撲成粉碎諸上座還覺頭痛也無良久曰莫不識痛痒好珍重承天確禪師示眾正令提綱猶是揑窠造偽佛法祇對特地謾驀上流問著即參差答著即交互大德擬向甚麼處下口然則如是事無一向權柄在手縱奪臨機有疑請問資福邃禪師上堂隔江見資福剎竿便回去脚根下好與三十棒況過江來時有僧纔出師曰不堪共語芭蕉徹禪師上堂眼中無翳空裏無花水長船高泥多佛大莫將問來我也無答會麼問在答處答在問處便下座臨濟玄禪師上堂僧問如何是真佛真法真道乞師開示師曰佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆是空名而無實有如真正作道人念念心不間斷自達磨大師從西土來祇是覓箇不受人惑底人後遇二祖一言便了始知從前虗用功夫山僧今日見處與祖佛不別第一句中薦得堪與祖佛為師若第二句中薦得堪與人天為師若第三句中薦得自救不了僧便問如何是第一句師曰三要印開朱點窄未容擬議主賓分曰如何是第二句師曰妙解豈容無著問漚和爭負截流機曰如何是第三句師曰但看棚頭弄傀儡抽牽全藉裏頭人乃曰大凡演唱宗乘一句中須具三玄門一玄門須具三要有權有實有照有用汝等諸人作麼生會示眾參學之人大須仔細如賓主相見便有言論往來或應物現形或全體作用或把機權喜怒或現半身或乘獅子或乘象王如有真正學人便喝先拈出一箇膠盆子善知識不辯是境便上他境上作模作樣便被學人又喝前人不肯放下此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物祇隨學人問處即奪學人被奪抵死不肯放此是主看賓或有學人應一箇清淨境出善知識前知識辨得是境把得拋向坑裏學人言大好善知識知識即云咄哉不識好惡學人便禮拜此喚作主看主或有學人披枷帶鎖出善知識前知識便與安一重枷鎖學人歡喜彼此不辨喚作賓看賓大德山僧所舉皆是辨魔揀異知其邪正上堂有一人論劫在途中不離家舍有一人離家舍不在途中那箇合受人天供養上堂一人在孤峰頂上無出身路一人在十字街頭亦無向背且道那箇在前那箇在後不作維摩詰不作傅大士珍重示眾我有時先照後用有時先用後照有時照用同時有時照用不同時先照後用有人在先用後照有法在照用同時驅耕夫之牛奪饑人之食敲骨取髓痛下針錐照用不同時有問有答立賓立主合水和泥應機接物若是過量人向未舉已前撩起便行猶較些子上堂大眾夫為法者不避喪身失命我于黃檗先師處三度問佛法的的大意三度被打如蒿枝拂相似如今更思一頓誰為下手時有僧出曰某甲下手師度與拄杖僧擬接師便打興化獎禪師示眾我聞前廊下也喝後架裏也喝諸子汝莫盲喝亂喝直饒喝得興化向虗空裏却撲下來一點氣也無待我蘇息起來向汝道未在何故我未曾向紫羅帳裏撒珍珠與汝諸人去在胡喝亂喝作麼三聖然禪師上堂我逢人即出出則不為人便下座灌溪閒禪師上堂曰我在臨濟爺爺處得半杓末山孃孃處得半杓共成一杓喫了直至如今飽不饑上堂十方無壁落四畔亦無門露裸裸赤灑灑無可把便下座幽州空和尚上堂眾集有僧出曰擬問不問時如何師曰嗄僧便喝師曰㘞僧又喝師拈拄杖僧曰瞎師拋下拄杖曰今日失利僧曰草賊大敗便歸眾師以手向空點一點曰大眾還有人辨得麼若有辯得者出來對眾道看師良久曰頂門上眼也鑒不破便下座南院顒禪師上堂赤肉團上壁立千仞僧問赤肉團上壁立千仞豈不是和尚道師曰是僧便掀倒禪床師曰者瞎驢亂作僧擬議師便打上堂諸方祇具啐同時眼不具啐同時用僧便問如何是啐同時用師曰作家不啐啐同時失曰此猶未是某甲問處師曰汝問處作麼生僧曰失師便打其僧不肯後於雲門會下聞二僧舉此話一僧曰當時南院棒折那其僧忽契悟風穴沼禪師上堂夫參學眼目臨機直須大用現前勿自拘於小節設使言前薦得猶是滯殻迷封縱然句下精通未免觸途狂見應是從前依他作解明珠兩岐與你一時掃却直教箇箇如獅子兒吒呀地哮吼一聲壁立千仞誰敢正眼著著即瞎却渠眼時有僧問如何是正法眼師曰即便𭣟瞎曰𭣟瞎後如何師曰撈天摸地上堂舉寒山詩曰梵志死去來魂識見閻老讀盡百王書未免受捶拷一稱南無佛皆以成佛道僧問如何是一稱南無佛師曰燈連鳳翅當堂照月映娥眉面看上堂若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安帖於此明得闍黎無分全是老僧於此不明老僧却是闍黎闍黎與老僧亦能悟却天下人亦能瞎却天下人欲識闍黎麼右邊一拍者裡是欲識老僧麼左邊一拍者裏是上堂若是上上之流各有證據略赴箇程限中下之機各須英俊當處出生隨處滅盡如𪹼龜紋𪹼即成兆不𪹼成鈍欲𪹼不𪹼直下便揑上堂三千劍客恥見莊周赤眉橫肩得無訛謬他時變豹後五日看珍重首山念禪師上堂第一句薦得堪與佛祖為師第二句薦得堪與人天為師第三句薦得自救不了時有僧問如何是第一句師曰大用不揚眉棒下須見血曰慈悲何在師曰送出三門外問如何是第二句師曰不打恁麼驢漢曰將接何人師曰如斯爭柰何問如何是第三句師曰解問無人答曰即今祗對者是誰師曰莫使外人知曰和尚是第幾句薦得師曰月落三更穿市過問維摩默然文殊贊善未審此意如何師曰當時聽眾必不如是曰既不如是維摩默然又且如何師曰知恩者少負恩者多乃曰若論此事實不甚一箇元子脚便下座上堂三要得親切第一莫將問來問還會麼問在答處答在問處汝若將問來問老僧在汝脚底汝若擬議即沒交涉時有僧出禮拜師便打僧便問挂錫幽巖時如何師曰錯僧曰錯師又打汾陽昭禪師上堂謂眾曰汾陽門下有西河獅子當門踞坐但有來者即便齩殺有何方便入得汾陽門見得汾陽人若見汾陽人者堪與祖佛為師不見汾陽人盡是立地死漢如今還有人入得麼快須入取免得孤負平生不是龍門客切忌遭點額那箇是龍門客一齊點下舉起拄杖曰速退速退珍重上堂先聖云一句語須具三玄門一玄門須具三要阿那箇是三玄三要底句快會取好各自思量還得穩當也未古德已前行脚聞一箇因緣未明中間直下飲食無味睡臥不安火急決擇莫將為小事所以大覺老人為一大事因緣出現于世想計他從上行脚不為遊山翫水看州府奢華片衣口食皆為聖心未通所以驅馳行脚決擇深奧傳唱敷揚博問先知親近高德葢為續佛心燈紹隆祖代興崇聖種接引後機自利利他不忘先跡如今還有商量者麼有即出來大家商量僧問如何是接初機底句師曰汝是行脚僧曰如何是辯衲僧底句師曰西方日出卯曰如何是正令行底句師曰千里特來望舊面曰如何是立乾坤底句師曰北俱盧洲長粳米食者無貪亦無瞋乃曰將此四轉語驗天下衲僧纔見你出來驗得了也問如何是學人著力處師曰嘉州打大象曰如何是學人轉身處師曰陝府灌鐵牛曰如何是學人親切處師曰西河弄獅子乃曰若人會此三句已辯三玄更有三要語在切須薦取不是等閒與大眾頌出三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新上堂凡一句語須具三玄門每一玄門須具三要有照有用或先照後用或先用後照或照用同時或照用不同時先照後用且要共你商量先用後照你也須是箇人始得照用同時你作麼生當抵照用不同時你又作麼生湊泊上堂汾陽有三訣衲僧難辨別更擬問如何拄杖驀頭楔時有僧問如何是三訣師便打僧禮拜師曰為汝一時頌出第一訣接引無時節巧語不能詮雲綻青天月第二訣舒光辨賢哲問答利生心拔却眼中楔第三訣西國胡人說濟水過新羅北地用鑌鐵復曰還有人會麼會底出來通箇消息要知遠近莫祇恁麼記言記語以當平生有甚麼利益不用久立珍重上堂謂眾曰夫說法者須具十智同真若不具十智同真邪正不辯緇素不分不能與人天為眼目決斷是非如鳥飛空而折翼如箭射的而斷弦斷弦故射的不中翼折故空不可飛弦壯翼牢空的俱徹作麼生是十智同真與諸上座點出一同一質二同大事三總同參四同真志五同徧普六同具足七同得失八同生殺九同音吼十同得入又曰與甚麼人同得入與阿誰同音吼作麼生是同生殺甚麼物同得失阿那箇同具足是甚麼同徧普何人同真志孰能總同參那箇同大事何物同一質有點得出底麼點得出者不吝慈悲點不出來未有參學眼在切須辯取要識是非面目見在不可久立珍重葉縣省禪師上堂宗師血脉或凡或聖龍樹馬鳴天堂地獄鑊湯爐炭牛頭獄卒森羅萬象日月星辰他方此土有情無情以手畫一畫云俱入此宗此宗門中亦能殺人亦能活人殺人須得殺人刀活人須得活人句作麼生是殺人刀活人句道得底出來對眾道看若道不得即孤負平生珍重上堂良久曰夫行脚禪流直須著忖參學須具參學眼見地須得見地句方有相親分始得不被諸境惑亦不落于惡道畢竟如何委悉有時句到意不到妄緣前塵分別影事有時意到句不到如盲摸象各說異端有時意句俱到打破虗空界光明照十方有時意句俱不到無目之人縱橫走忽然不覺落深坑神鼎諲禪師上堂覺洞山曰貪嗔癡太無知賴我今朝識得伊行便打坐便槌分付心王子細推無量劫來不解脫問汝三人知不知師曰古人恁麼道神鼎則不然貪嗔癡實無知十二時中任從伊行即往坐即隨分付心王擬何為無量劫來元解脫何須更問知不知谷隱聰禪師示眾第一句道得石裏迸出第二句道得挨拶將來第三句道得自救不了上堂五白猫兒爪距獰養來堂上絕蟲行分明上樹安身法切忌遺言許外生作麼生是許外生底句莫錯舉廣慧璉禪師上堂臨濟兩堂首座相見同時下喝諸人且道還有賓主也無若道有祇是箇瞎漢若道無亦是箇瞎漢不有不無萬里崖州若向者裡道得也好與三十棒若道不得亦與三十棒衲僧家到者裏作麼生出得山僧圈䙡去良久曰苦哉蝦蟆蚯蚓𨁝跳上三十三天撞著須彌山百雜碎拈拄杖曰一隊無孔鐵鎚速退速退三交嵩禪師上堂文殊仗劍五臺橫行唐明一路把斷妖訛三世諸佛未出教乘網底游魚龍門難渡垂鈎四海祇釣獰龍格外玄談為求知識若也舉揚宗旨須彌直須粉碎若也說佛說祖海水便須枯竭寶劍揮時毫光萬里放汝一路通方說話把斷咽喉諸人甚處出氣石霜圓禪師上堂一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出乃竪起拄杖曰者箇是南源拄杖子阿那箇是經良久曰向下文長付在來日喝一喝下座上堂先寶應曰第一句薦得堪與祖佛為師第二句薦得堪與人天為師第三句薦得自救不了道吾則不然第一句薦得和泥合水第二句薦得無繩自縛第三句薦得四稜著地所以道起也海晏河清行人避路住也乾坤失色日月無光汝輩向甚麼處出氣如今還有出氣者麼有即出來對眾出氣看如無道吾為汝出氣去也乃噓一聲卓拄杖下座上堂道吾打皷四大部洲同參拄杖橫也挑括乾坤大地鉢盂覆也葢却恒沙世界且問諸人向甚麼處安身立命若也知得向北俱盧洲喫粥喫飯若也不知長連上床喫粥喫飯上堂一喝分賓主照用一時行要會箇中意日午打三更遂喝一喝曰且道是賓是主還有分得者麼若也分得朝打三千暮打八百若也未能老僧失利上堂夫宗師者奪貧子之衣珠究達人之見處若不如是盡是和泥合水漢良久曰路逢劍客須呈劍不是詩人莫獻詩喝一喝上堂我有一言絕慮忘緣巧說不得祇要心傳更有一語無過直舉且作麼生是直舉一句良久以拄杖畫一畫喝一喝上堂面西行向東北斗正離宮道去何曾去騎牛臥牧童珍重上堂春生夏長即不問你諸人脚跟下一句作麼生道良久曰華光寺主便下座上堂藥多病甚網細魚稠便下座示眾以拄杖擊禪床一下云大眾還會麼不見道一擊忘所知更不假修持諸方達道者咸言上上機香嚴恁麼悟去分明悟得如來禪祖師禪未夢見在且道祖師禪有甚長處若向言中取則悞賺後人直饒棒下承當孤負先聖萬法本閒唯人自鬧所以山僧居福嚴祇見福嚴境界晏起早眠有時雲生碧嶂月落寒潭音聲鳥飛鳴般若臺前娑羅花香散祝融峰畔把瘦笻坐磐石與五湖衲子時話玄微灰頭土面住興化祇見興化家風迎來送去門連城市車馬駢闐漁唱瀟湘猿啼嶽麓絲竹謌謠時時入耳復與四海高人日談禪道歲月都忘且道居深山住城郭還有優劣也無試道看良久云是處是慈氏無門無善財上堂祖師心印一印印空一印印水一印印泥如今還有印不著者麼試向脚跟下道將一句來設你道得倜儻分明第一不得行過衲僧門下且道衲僧有甚麼長處良久曰人王三寸鐵徧地是刀鎗喝一喝卓拄杖下座上堂天已明皷已響聖眾臻齊合掌如今還有不合掌者麼有即尼乾歡喜無則瞿曇惡發久立珍重上堂北山南南山北日月雙明天地黑大海江河盡放光逢著觀音問彌勒珍重瑯邪覺禪師上堂奇哉十方佛元是眼中花欲識眼中花元是十方佛欲識十方佛不是眼中花欲識眼中花不是十方佛於此明得過在十方佛於此未明聲聞起舞獨覺臨粧珍重上堂欲知常住身當觀爛壞體欲知常住性當觀拄杖子拄杖子吞却須彌須彌吞却拄杖子衲僧到者裡若也擬議劍梁落膊輪降款鐵作胸襟到海隅擊禪床下座上堂見聞覺知俱為生死之因見聞覺知正是解脫之本譬如獅子反擲南北東西且無定止汝等諸人若也不會且莫孤負釋迦老子吽上堂山僧今日為諸人說破明眼衲僧莫去泥裡打坐珍重上堂天高莫測地厚寧知白雲片片嶺頭飛綠水潺潺㵎下急東涌西沒一句即不問你生前殺後一句作麼生道良久曰時寒喫茶去上堂阿呵呵是甚麼開口是合口過輕舟短棹汎波心簑衣箬笠從他破咦上堂剪除狂宼掃蕩攙搶猶是功勳邊事君臣道合海晏河清猶是法身邊事作麼生是衲僧本分事良久曰透網金鱗猶滯水迴塗石馬出紗籠上堂承言須會宗勿自立規矩若人下得通方句我當刎頸而謝之上堂拈起拄杖曰山僧有時一棒作箇漫天網打俊鷹快有時一棒作箇布絲網摝蜆撈蝦有時一棒作金毛獅子有時一棒作蝦蟇蚯蚓山僧打你一棒且作麼生商量你若緇素得出不妨拄杖頭上眼開照四天下若也未然從教立在古屏畔待使丹青入畫圖上堂擊水魚頭痛穿林宿鳥驚黃昏不擊皷日午打三更諸禪德既是日午為甚却打三更良久曰昨見垂楊綠今逢落葉黃上堂進前即死退後即亡不進不退又落在無事之鄉何故長安雖樂不是久居上堂山僧因看華嚴金獅子章第九由心回轉善成門又釋曰如一尺之鏡納重重之影象若然者道有也得道無也得道非亦得道是亦得雖然如是更須知有拄杖頭上一竅若也不會拄杖子穿燈籠入佛殿撞著釋迦磕倒彌勒露柱拊掌呵呵大笑你且道笑箇甚麼卓拄杖下座上堂拈拄杖曰盤山道向上一路滑南院道壁立千仞嶮臨濟道石火電光鈍琅邪有定乾坤底句各各高著眼高著眼卓拄杖下座
