body:
  text: 武林十八㵎理安禪寺住持婁東行悅集歲夜提綱北禪賢禪師歲夜小參年窮歲盡無可與諸人分歲老僧烹一頭露地白牛炊黍米飯煮野菜羮燒榾柮火大家喫了唱村田樂何故免見倚他門戶傍他牆剛被時人喚作郎便下座真淨文禪師除夜小參一年將盡夜萬里未歸人今夜一衆盡是他鄉之子因何不歸阿呵呵直饒便歸得歸得亦無家正是諸人歸處歸得麼君不聞龐居士云十方同聚會箇箇學無為此是選佛場心空及第歸以拂子敲禪床便起雲峰悅禪師小參舉百丈歲夜示衆曰你者一隊後生經律論固是不知也入衆參禪禪又不會臘月三十日且作麼生折合去師曰灼然諸禪德去聖時遙人心淡泊看却今之叢林更是不得所在之處或聚徒三百五百浩浩地祇以飯食豐濃寮舍穩便為旺化中間孜孜為道者無一人設有十箇五箇走上走下半青半黃會即總道我會各各自謂握靈蛇之寶孰肻知非洎乎挨拶鞭逼將來直是萬中無一苦哉苦哉所謂般若叢林歲歲凋無明荒草年年長就中今時後生才入衆來便自端然拱手受他別人供養到處菜不擇一莖柴不搬一束十指不沾水百事不干懷雖則一朝快意爭奈三塗纍身豈不見教中道寧以熱鐵纏身不受信心人衣寧以洋銅灌口不受信心人食上座若也是去直饒變大地作黃金攪長河為酥酪供養上座未為分外若也未是至於滴水寸絲便須披毛戴角牽犂拽耙償他始得不見祖師道入道不通理復身還信施此是決定底事終不虗也諸上座光陰可惜時不待人莫待一朝眼光落地菑田無一簣之功鐵圍陷百刑之痛莫言不道珍重大慧杲禪師除夜小參今夜喚明朝作來年明朝喚今夜作去歲既稱來年今夜合來既號去歲明朝合去來年今夜不見來去歲明朝定不去既不來又不去業識茫茫無本據大圓鏡裏絶纖塵箇中豈著閒家具是則是別又別爍迦晃破秋天月龐公不昧本來身大似飛龍成跛鱉你諸人瞥不瞥靈利漢須看時節五九盡處又逢春衲僧腦後三斤鐵喝一喝密庵傑禪師歲夜小參年窮歲盡時或笑或顰眉飽者終日飽饑者終日饑惟有衲僧家不耕而食不蠶而衣孜孜矻矻如愚如癡忽聽忠言逆耳便見心動神疲禪和子禪和子不須疑或去或住總是父母未生時山僧恁麼告報未免鳳林叱之復舉頌云一年三百六十日今宵正是結交頭移身換步無多子六合清風來未休雪巖欽禪師歲夜小參年來年去去來不動乾坤歲舊歲新新舊一般時節蒼辨山風骨自露太湖水徹底無波冷冷落落哆哆和和門外雪消春水滑庭前玉立桂婆娑復舉北禪賢和尚烹露地白牛分歲公案師拈云活剝耕牛北禪是則好手其奈牆塹不牢被箇販私鹽漢子和贓捉敗天寧則不然今夜無可管顧諸人不免烹箇獨角泥牛炊無米飯唱無聲曲與諸人分歲忽有箇漢出來道有公人索和尚筋角便與和聲一棒何故有功者賞歲夜小參一言道盡萬法平沉一句全提千差合轍即心即佛非佛非心麻三斤乾屎橛我且與麼是汝諸人畢竟作麼生領解若能向未開口以前退步就己一踏踏著元來臘月三十日便是歲除夜更無奇特玄妙者也之乎乾坤一統清如鏡那箇男兒不丈夫除夜小參歲舊年新夜暗晝明未嘗移易日遷月化山青水緑依舊尋常小盡二十九大盡三十日也是鎮州蘿蔔漢地生薑休咬嚼沒商量梅花紙帳一爐香衲帔蒙頭春晝長復舉僧問古德年窮歲盡事如何德云東村王老夜燒錢師頌云春風陌上郎得錢隨手使貨物忽相當撞得恰好子高峰妙禪師除夜小參一年三百六十日看看逗到今宵畢十箇有五雙參禪禪又不知學道道亦不識只者不知不識四字正是三世諸佛骨髓一大藏教根源伶俐漢才聞舉著如龍得水似虎靠山天上人間縱橫無礙然雖如是點檢將來猶是者邊底消息若謂那邊更那邊一著子直饒西天四七唐土二三以至天下老古錘敢保未徹在山僧與麼告報忽有箇漢子心憤憤口悱悱出來道高峰高峰你有什麼長處開得者般大口只向他道來年更有新條在惱亂春風卒未休中峰本禪師除夜示衆四時與八節循環十二月今夜盡破除禪流瞥不瞥若瞥則陳年曆日不用檢尋不瞥則明日新條也須甄別東村王老化紙錢後巷竹聲俱𪹼裂窮神無地可送福運有天難接巖前枯木糝銀花庭際嫩條抽玉葉將謂陽春已發生子細看來盡是殘冬雪諸禪流還知今夜舊歲去不去明日新年來不來底消息麼如其未委往往以百年壽終喚作臘月三十夜地黑天昏胡鑽亂撞正此時也蒲團上生鐵脊骨尋常竪立不牢口唇邊無義味話平昔提掇不起況是年窮月盡日了時空再欲如之若何決定噬臍無及矣殊不知別有箇轉身路子直是奇特你但守取箇所參話不得放捨須信來朝更有新條在惱亂春風卒未休或謂傳燈録一千七百單一人皆是言外知歸迎刃而解初不聞有做工夫看話頭之說在此自年朝至歲暮其忉忉不絶口惟是說看話頭做工夫不但遠背先宗無乃以實法綴繫於人乎你說得也是一則老僧不具此驅耕奪食換斗移星之辣手其奈諸方不觀人之根性速於求人多是鑽腋插羽急欲其高飛遠舉奈何畫虎不成反類狗也此事大難其人謂看話頭做工夫固是不契直指單傳之旨然亦不曾賺人落草最是立腳穩當悟處親切縱使此心不悟但信心不退不轉一生兩生更無不獲開悟者如傳燈録中許多言外知歸之士焉知其不自夙生腳踏實地做來古者謂未見有天生彌勒者是也幻人見解止於此耳若要一超直入不為實法所綴明朝三百六十日又從頭起儘有光陰今夜權且收起葛藤珍重藏叟珍禪師除夜小參舉僧問古德年窮歲盡時如何德云依舊孟春猶寒師曰古德恁麼答話只怕諸人忘却今日忽有人問年窮歲盡時如何拈棒便打待他道因甚麼打某甲即向他道曰更要我道孟春猶寒那石門剛禪師歲夜謝道德首座順侍者看病小參歲事除年華畢尊莫尊乎道貴莫貴乎德覺即般若因順即菩提佛當知種豆不生麻因果自然明歷歷然雖如是且道如何見得八福田中看病第一石屋珙禪師除夜小參年亦窮月亦窮三十六旬窮伎倆破除全在五更鐘窮則變變則通尋常一樣窗前月才有梅花便不同三條椽下禪和子囊亦空鉢亦空拾得斷麻穿破衲不知身在寂寥中惟有福源拄杖子不屬陰陽造化功了無春夏秋冬自古自今撐天拄地同行同坐嘯月吟風又誰管你江湖滾滾日月匇匇等閒靠在禪床角一片雲中挂黑龍楚石琦禪師除夜小參善哉三下板知識盡來參既善知時節吾今不再三諸仁者一舉更不再舉今已再舉一聞更不再聞今已再聞頭頭上明物物上了如理如事亘古亘今不是涅槃心亦非正法眼恁麼恁麼三世諸佛只言自知不恁麼不恁麼六代祖師無啓口處設使言前薦得猶為滯殼迷封假饒句下精通未免觸途狂見今夜向紅爐上拾一點雪枯木上糝些子花與你諸人赴箇時節殘燈隨臘盡𪹼竹送春來復舉盤山云向上一路千聖不傳慈明云向上一路千聖不然妙喜云向上一路熱碗鳴聲師云三大老盡力道只發明得向下一路若是向上一路驢年夢見麼除夜小參作一句商量獅子吼野犴鳴不作一句商量野犴鳴獅子吼一時坐斷未許作家千里持來堪作何用盡乾坤大地無不說老婆禪爭知永祚若裏不打者鼓笛雲門大師云諸方老和尚道須知聲色外一段事者箇說話誑呼人家男女三間法堂裏獨自妄想未曾夢見我本師意旨在作麼生消他信施臘月三十日又須償他始得當時早有與麼說話如今是什麼時節師召大衆衆才舉頭師便喝復舉藥山一日謂雲巖云與我喚沙彌來巖云和尚喚他作什麼山云我有箇折腳鐺子要伊提上挈下巖云與麼則與和尚出隻手去也師云見與師齊減師半德見過於師方堪傳授雲巖當時也缺一著待他道我有箇折腳鐺子要伊提上挈下抽身便出雪後始知松柏操事難方見丈夫心除夜小參未達境惟心起種種分別達境惟心已分別即不生不生法中具足世間出世間法一立一切立一破一切破一放一切放一收一切收覿體全該當陽廓示方便喚作常住法身流出無邊諸三昧海文殊普賢大人境界德山臨濟向上提持此方他方齊成佛道有說無說俱轉法輪極三際為一時統十方為一剎二十四氣七十二候三百六十五日只在剎那悟之則當念圓明述之則永沉生死復舉保寧勇和尚示衆云世尊不說說迦葉不聞聞卓拄杖云水流黃葉來何處牛帶寒鴉過遠村師云青州梨鄭州棗大抵無過出處好愚庵及禪師除夜小參僧問芻狗吠時天地合木雞啼後祖燈輝一年光景今宵盡萬里更無人未歸見前一衆盡是他鄉之客即今歲盡年窮如何得便歸家去師云闍黎家在什麼處進云僧問藥山學人擬欲歸鄉時如何山云汝父母遍身紅爛臥在荊棘林中汝歸何所意旨如何師云愁人莫向愁人說進云僧云恁麼不歸去也山云切須歸去汝若歸去我示汝箇休糧方僧便請山云二時上堂不得咬破一粒米又且如何師云藥山老漢得恁老婆心切進云且那裏是他老婆心切處師云闍黎要問長老口啞那僧便退師云芻狗吠時天地合木雞啼後祖燈輝一年光景今宵盡萬里更無人未歸好大衆古人與麼道只要你直下識取自家城廓免見倚他門戶傍他牆剛被時人喚作郎久參先德不隔絲毫後學初機宜加審細豈不見僧問藥山學人擬欲歸鄉時如何山云汝父母遍身紅爛臥在荊棘林中汝歸何所僧云恁麼則不歸去也山云却須歸去汝若歸鄉我示汝箇休糧方僧便請山云二時上堂不得咬破一粒米若喚作箇休糧方正是還鄉曲謂是還鄉曲又道休糧方老藥山赤心片片憫物垂慈其奈十箇有五雙蹉過至竟不盡知歸逗到彌勒下生轉見流離孤苦長沙和尚道我若舉揚宗教法堂上草深一丈事不獲已向諸人道盡十方世界是沙門一隻眼雪峯又道盡大地撮來如粟米大到者裏不敢望汝別懸慧日獨振玄風但向古人鶻臭布衫上知些子氣息一年三百六十日一日朝昏十二時東廊上西廊下穿僧堂入佛殿總是到家時節轉山河國土歸自己轉自己歸山河國土如壯士展臂不假他力天上人間縱橫自在苟或未然烏飛兔走臘盡春回明朝慶賀新陽各各又添一歲莫將有事為無事爭是爭非空白頭除夜小參時節易過大年夜瞥爾到來心地未明諸仁者急著精彩萬法是心光諸緣惟性曉本無迷悟人只要今日了蘇武牧羊海畔長曰欣然李陵望漢臺邊終朝笑發東村王老夜燒錢忙者自忙閒者閒東方甲乙木一則三三則一趙州東壁挂葫蘆觀音院裏有彌勒復舉浮山和尚除夜示衆云老矣聊隨粥飯緣浮山無法與人傳夜深各自歸堂去放下情懷且過年浮山老人與麼提唱美則美矣要且無為人處徑塢輒賡一偈切希聽取海衆同居結淨緣少林消息本無傳寒來暑往誰相委荏苒浮生又一年古林茂禪師除夜小參黑蟻旋磨千里錯巴蛇吞象三年覺海壇馬子大如驢潘閬倒騎攧折角便與麼去知時識節歲盡年窮北禪烹露地白牛山僧也隨例顛倒直得神和道合賓主混融明朝慶賀新年各各起居輕利然雖如是只如多處添少處減趙州東壁挂葫蘆金剛手中八稜棒且道明甚麼邊事擊拂子云不是李將軍誰識南山虎除夜小參天高地厚歲盡年窮水遠山長奔南走北途路之樂不如在家背負肩擔有何利益直得乾坤坐斷一念萬年未能轉向那邊正是陰界裏活計到者裏懸崖撒手自肻承當大用現前總不干山僧事賓頭盧尊者應供走遍四天下與你衲僧分上有甚交涉晝升兜率夜降閻浮釋迦老子鼻孔因甚麼在者裏卓拄杖云文殊普賢也不得草草喝一喝除夜小參一年三百六十日為汝諸人徹困了也今夜年窮歲盡更須不惜口業時節遷流人事消長物我混同古今不易天左旋地右轉日東上月西落家家門前火把子人人手裏明月珠拈却門前案山子不妨潘閬倒騎驢復舉僧問古德云歲盡年窮時如何德云東村王老夜燒錢師頌云東村王老夜燒錢出草於菟角指天好是李將軍去後無人射得石頭穿除夜小參諸佛不出世祖師不西來佛法遍天下談玄口不開希有希有奇哉奇哉但得佛法遍一切處談玄口開不開總沒交涉山僧一年三百六十日不說諸佛出世不出世祖師西來不西來談玄之口開不開佛法一切遍不遍即今年窮歲盡從教笑殺旁觀直是無可與諸人說底諸人亦無聞底無說無聞周遍法界笑與不笑悉皆平等當明中有暗勿以暗相覩當暗中有明勿以明相遇驀拈拄杖云山河大地明暗色空總在山僧拄杖頭上若識得去拄杖亦不可得若也不識却還山僧自受用去也卓拄杖云家家門前火把子除夜小參達磨遺下一隻履老盧把住諸祖衣家家門前赫日月太平不用將軍威逢佛殺佛逢祖殺祖逢羅漢殺羅漢真淨老人自謂臨濟正傳黃龍的子七出八沒得大自由簡點將來正是無地頭漢金佛不度爐木佛不度火泥佛不度水真佛屋裏坐老趙州慈悲太殺曲設多方也是按牛頭喫草二大老相去數百餘年至提持綱要示小機關直是不隔一絲毫許山僧一年三百六十日未嘗不拈出箇一著子自是諸人根浮力淺不能踏步向前如就地彈相似雖然也不得容易了却卓拄杖喝一喝除夜莊上歸小參把斷重關在途中不離家舍放開線路在家舍不離途中從茲劫劫波波只守舊時行履上無攀仰下絶己躬明眼人前一場笑具去年底今年底明年底後年底外後年底老東山將無作有賣弄風流直饒劈腹剜心何異守株待兔保寧者裏拆東籬補西壁赤心片片只為諸人天寒歲晚莊上歸來古佛家風何曾缺少旃檀林葉葉清風滄海珠人人光彩便好刮龜毛於鐵牛背上截兔角於石女腰邊從教骨露皮穿且要與諸人分歲雖然且道與北禪相去多少擊拂子除夜小參却物為上逐物為下敲骨打髓指鹿為馬若作佛法商量入地獄如箭射豈不見臨濟在黃檗三度問佛法的的大意三度被打興化於大覺棒頭深明黃檗意旨且道是什麼語話白雲從年頭數到年尾從上若佛若祖無一箇不是依草附木若盡令而行盡大地直須荒却所以道隨汝顛倒所欲即今是臘月三十日明朝依舊慶賀新年山門頭佛殿裏禮拜燒香伏惟安置除夜小參拈起一句便是陳年葛藤諸人聞得也多見亦不少可謂如人飲水冷暖自知雖不可以告人終難謾於自己者條活路千聖共行古往今來摧邪顯正無不從此真實性中流出豈不見雲居舜老夫愛罵天衣懷和尚秀圓通為之不平一日舜老夫上堂秀出問云豈不見圓覺經中道舜老夫云大衆久立便下座歸方丈秀圓通云者老漢通身是眼罵得懷和尚也所謂隔山見烟便知是火至臨機應變處如俊鷹快搏擊自由諸人若善參詳管取頭正尾正勿謂今日不知又有來日今年不會更有來年不覺不知一歲又添一歲拈拄杖云拄杖子也添一歲卓拄杖云蝦跳不出斗除夕小參年窮歲盡水肅霜寒門前𪹼竹聲喧堂上燈光晃耀是四序遷流之日當三陽未肇之時諸人簇簇上來山僧口喃喃地露柱燈籠鬬爭光彩迦葉維衛共展神通諸佛無上妙門普請大家證入日不待火而熱須彌山上白浪滔天月不待風而涼畢鉢巖前清風滿座未有世界早有此性擺手入長安世界壞時此性不懷一舉四十九如斯舉唱足可流通其或根思尚遲便見和泥合水拍禪床云人窮不到金剛際未免區區役路途恕中慍禪師除夜小參拈拄杖云先佛性命後佛紀綱總在者裏是汝諸人從年頭至年尾觸目遇緣隨處明了何曾昧却開山彥和尚云主人翁惺惺著好不丈夫更有德山臨濟棒喝交馳雖則雷奔電激爭奈蟄戶未開畫拄杖乙巳歲君所司時令所屬善惡一畫畫斷直得木人發笑石女謳歌微塵數佛一時現前無邊剎土不離掌握各請歸寮穩臥明朝起來慶賀新年見僧賀僧見俗賀俗見狸奴白牯賀狸奴白牯還知有不受賀者麼卓拄杖三級浪高魚化龍癡人猶戽夜塘水復說偈云一年三百六十日日日塵勞事不同今夜勸君都放下管教明取少林宗除夜小參靈山會上少室巖前的的相傳將錯就錯德山小參不答話鈎頭有餌趙州小參要答話稱尾無星七十三八十四築著磕著礙塞殺人看看今夜是年窮箇箇明朝添一歲靈不在己聖不慕他檢點將來不是不是月江印禪師除夕小參絶學無為閒道人只管三十六旬為一歲不懼生死老和尚任他臘月三十日到來如鐘在待扣則鳴似鏡臨臺物來斯照老僧行年在坎窮鬼揶揄囊無繫蟻之絲厨絶聚蠅之糝塵說剎說熾然說無法可說內空外空畢竟空一切皆空凍鎖寒林燒盡丹霞木佛春回暖律喚醒陝府鐵牛萬人叢裏打謳儺百戲棚頭抽傀儡畢竟成箇什麼邊事擊拂子相逢不遇調羮手孤負梅花又一年南石琇禪師除夜小參不是心不是佛不是物千聖仰之莫及萬靈窺無門威音王已前風凜凜峭巍巍威音王已後淨裸裸赤灑灑臨濟喝下知歸了無交涉德山棒頭取證且過一邊直饒總不恁麼終非本色衲僧所以道我若真正舉揚法堂前草深一丈事不獲已向道諸人盡大地是箇解脫門盡大地是箇光明藏盡大地是箇金剛眼若作恁麼會蘇盧悉唎不作恁麼會悉唎蘇盧恁麼不恁麼總拈却悉唎蘇盧蘇盧悉唎截斷三路葛藤放下舊年曆日管取百城草偃四海浪平還委悉麼如王寶劍繇王意揮斥縱橫得自由除夜小參龍猛滿盛鉢水迦提擲下繡針德山隔江招手高亭橫趨而去朝鳴鐘暮擊鼓風動塵起鵲噪鴉鳴無一處不是者箇時節今當臘月三十夜敢問諸人還曾會麼有際天之雲濤方可容吞舟之魚有九萬里風乃可負垂天之翼復舉僧問古德年窮歲盡時如何古德云家家門底野狐兒家家門底野狐兒滯句承言盡墮疑庾嶺老梅春獨早花開不待曉風吹用彰俊禪師除夜小參𪹼竹聲前薦得餓狗喫牽黎椒盤頌裏悟來黑牛眠死水二俱不涉別有生機拈却炙脂帽子脫却鶻臭布衫腳跟下硬糾糾頂門上明皎皎總教作箇灑灑落落底沒量大解脫人陰陽不能變其質寒暑不能移其志日日是好日時時是好時又分什麼新年頭舊年尾雖然只如僧問古德年窮歲盡時如何德云東村王老夜燒錢可謂言中有嚮句裏呈機驀拈拄杖畫一畫一九二九相逢不出手三九二十七籬頭吹篳觱四九三十六夜眠如露宿住住若不喝住幾乎數過正月初一除夜小參一年將盡夜萬里未歸人咄寐語作麼即今簇簇上來兀兀立地面面相看眼眼相對阿那箇是未歸人樓上已吹新歲角聽不出聲底分明聽取窗前猶點舊年燈見不超色底端的見來是箇皮下有血誰家竈裏無煙說什麼到與未到歸與未歸雖然否極泰來結交頭一句子也要諸人知委拈拄杖卓一下梅蕚香傳春谷暖松風聲度夜堂寒無文燦禪師除夜小參威音王已前有本曆日無七十二候無二十四氣以天荒地老為一歲以松枯石爛為一日山僧遊乾闥婆城遇舜若多神親手授受叮嚀付囑後二千年當於薦福山中次第流布住院以來正月初一日輥到臘月三十日更無工夫說著今夜幸遇歲除拈起普示大衆去也展兩手云寒來暑往日遷月移盡在者裏可中忽一箇出來道陳年曆日不勞拈出不特顯叢林有人亦表自己參學眼目雖然如是我更問你從來臘月三十日為歲除夜今年因什麼却缺一日了庵欲禪師除夜小參年窮歲盡黃梅石女子母團圞日往月來少室鐵牛嘗甘水草嶺南獦獠唱巴歌聲聲總是無生調好大衆九衢人靜大野風清燈籠與露柱爭光耐重對金剛𨁝跳也無玄也無妙快活須明者一竅擊拂子云昨日街頭賣杏花一年春事都來了喝一喝除夜小參德山小參不答話人貧智短趙州小參要答話馬瘦毛長靈巖今夜小參有問即答無問即休終不將珍珠作豌豆糶却豈不見南泉和尚云王老師自小牧一頭水牯牛擬向溪東牧不免食他國王水草擬向溪西牧也不免食他國王水草不如隨分納些些總不見得雖然如是未免笑破衲僧鼻孔且道衲僧有甚長處還委悉麼一年三百六十日一日還他十二時禪客相逢只彈指此心能有幾人知復舉道吾和尚云鋒刀上𨁝跳微塵裏走馬勞勞去復來箇是知音者師云真點胸名不虗得檢點將來也只是三步四步未見七跳八跳在靈巖今夜分歲無可與諸人暖熱隨分也說四句燈籠拜露柱露柱拜燈籠明朝添一歲含笑舞春風笑隱欣禪師除夜小參山林城市喧寂何分世出世間聖凡不二所以道法隨法行法幢隨處建立茲山官寺先帝潛宮雖衲子於此安禪而官貴往來雜遝前日講習賀正朝儀規行矩步無非佩玉腰金武略文韜總是麒麟獬豸又見攢花簇錦發揚出格風光鬼面神頭展演當行旗鼓直得張公喫酒李公醉鍾馗解舞十八拍金雞唱曉石女遊春即事全真開舜若身中活眼借功明位現毗盧頂後神光一一蓋色騎聲一一超今邁古正與麼時如何是不涉見聞一句無目仙人能揣骨閙市相逢把手驚為亡者對靈提綱中峰本禪師為瞿運使霆發卒哭藥師道場對靈小參大道只在目前要且目前難覩欲識大道真體不離聲色言語只如都運相公昨自皇慶元年十二月二十六日捐館至今年四月初七日其一百日內鼓螺互應金石交宣豈非聲耶華果姿陳香燈羅列豈非色耶遍演金經廣宣玉偈豈非言語耶且聲色言語覿體全彰却喚甚麼作大道若以聲為大道聲自是聲若以色為大道色自是色若以言語為大道言語自是言語與麼分㭊將來古人話似作兩橛者裏檢點得出便見我都運相公與藥師如來握手共遊於一十二重清淨願海以衆寶光明而作佛事俾盡大地衆生不越一念俱成正覺到者裏既無聲色可求亦何言語可取總只是箇大光明藏如其不委更為下箇注腳良久云天共白雲曉水和明月流復舉石頭和尚問龐居士云子學道以來日用事作麼生居士呈偈曰日用事無別惟吾自偶諧頭頭非取舍處處沒張乖朱紫誰為號丘山絶點埃神通并妙用運水與搬柴且如何是日用事茲向第二門頭曲為注腳去也眼見色是日用事耳聞聲是日用事鼻嗅香是日用事舌噉味是日用事以至身覺觸意雜思是日用事乃至八萬四千諸塵勞應用等皆是日用事因甚麼說箇無別底道理雖則體用互陳萬塵交接一一皆是自心成就自心出生所以教中謂元依一精明分成六和合又云三界無別法惟是一心作以其見自心故雖一剎那頃泛應群緣會入一心曾無異致所以云無別也今之學道者往往向義路上以聰明之資一一領會自謂佛法無多子殊不知說箇自心早落情見於是龐居士謂惟吾自偶諧言偶諧二字直是注解不破穿鑿不入苟非具金剛正眼向聲色未彰已前一鑑鑑破物我未形之際一拶拶開自然頭頭上明物物上顯是謂偶諧者也其或未到者箇時節和箇偶諧俱成剩語所以云參須實參悟須實悟既到實參實悟之地則繁興大用舉必全真擬眨眼來劍去久矣者箇是老龐公棄家財於湘水跨諸祖門庭掠得些子汗臭氣便解為是發揮惟我都運相公即再世之龐居士也雖不效其棄家珍於水底却能轉為布施利益種種救援攝護方便等事而亦不妨其孜孜在道之心以至啓手足之際屏去血味及與玩好諸欲因緣惟單單舉箇所參話頭泊然而逝豈非多生薰習般若培植菩提而有如是操略耶既捐館已一百日內晝夜六時備陳佛事由是知相公雖天道人道皆不能以境緣攝取何則道念炳然豈肯為功名富貴諸殊勝事業之籠絡其不至佛地決知其終不已也因記得都運相公昔於至元辛卯二月十九登天目叩先師先師握竹篦問曰相公為遊山來為佛法來公答云為佛法來先師擲下竹篦曰會麼公云不會師曰不入虎穴爭得虎子本上座今日因齊慶讚重為舉揚為遊山來為佛法來舌頭拖地為佛法來將謂忘却擲下竹篦云會麼少賣弄不會明如杲日迅若怒雷不入虎穴爭得虎子醉後又添杯更有四句偈重為注腳為求佛法為遊山口縫才開落二三一十二重悲願海藥師燈現古優曇為趙承旨孟俯對靈小參大道在目前山是山水是水玄機超物表聖非聖凡非凡一念洞然萬緣廓爾水精宮秋容淡淡森羅萬象吞吐明月珠松雪齊灝氣沉沉屏几六窗交徹寶絲網無一物不彰至體無一事不演真乘莊周雖蝶悟枕邊敢保其當機罔措子韶固蛙聞月下未許其覿面施呈者一著子名不得狀不得即其知處已陷情圍事亦然理亦然與麼會時早沉識海所以道神光獨耀萬古徽猷入此門來莫存知解且不存知解底句如何指陳玉宇秋高無界限金園春事政敷腴恭惟翰林學士承旨松雪居士趙公受知於九重聖主名聞於萬里黎元官一品未足謂公之榮爵萬鍾未足謂公之貴蓋其道超物表性徹玄初空諸見於眼根了群情於意地者也某記大德甲辰歲首蒙公賢夫婦相延於武林官舍丁未秋訪公於霅城之新第至大戊申復會于西湖明年己酉再會於松雪齊凡一會聚與夫尺書往復未嘗不以本來具足之道未悟未明為急務每論到至真切處悲泣垂涕不能自已此蓋出自真情遠從多劫熏鍊純熟必期徹證不肯與泛泛者恃其辨聰漁獵聞見便以為得也自佛法流布東土士大夫咨參扣問敲唱激揚莫盛於唐宋而尤盛於皇元往往滯於情解昧於識度求其真參實究者不曰無之窮其所因最初被箇本來具足不假外求之說一印印定次以聰明之資直下領過自以為易不復究明不覺置之無事甲裏殊不知本來具足之說如麵在麥中飯居穀內或不加舂炊礱磨之勞徒知具足之虗談終莫能得止饑之實效猶儒家論仁義亦豈心外之物故孟子謂我固有之矣非從外得也然不有真履實踐之功顛沛造次孳孳不忘則亦徒有仁義之本心耳故吾佛祖謂本來具足猶古鏡之有光奈何失於護念其愛憎塵習不覺蒙蔽況是積生纍劫未經磨治徒稱具足之有光終於鑑照之無補一箇所參話即是磨鏡之良具正當磨時只知朝也磨暮也磨不必問鏡上之塵何日破除鏡內之光何時發現苟存此等待之心則愈障矣學佛之要惟憑一念但信得及處譬之磨鏡未有磨極而塵不消塵消而光不現者故我相公與魏國夫人雖身抱冠世之奇才而不為其所惑雖身嬰畢世之塵纍而不為其所障每於真參正念孜孜然兀兀然猶林下老衲寂爾忘緣未嘗少棄當知此箇正念不由教導不依勸請不因造作不屬方便乃是無量劫中於諸佛所深種菩提種子雖百千塵勞百千生死同時現前終莫能昧也此念既堅則其成佛作祖超生越死如壯士屈臂豈假他力人徒見公英聲茂實振耀古今而不知公六十九年凡施為舉措莫不以積劫之事繫于真情自餘皆借路經過遊戲設施爾既啓手足後人皆謂公之亡我獨見公精操正念獨抱天真於大寂滅大解脫法中與佛祖聖賢混合於一切智智清淨之表曾何古今彼此而有間隔此皆公深信本來具足不假外求之道其靈驗若此記得華嚴經偈有謂若人欲識佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙謂佛境界者即是本來具足不假外求之道是也原夫意根欲淨妄想欲離却不成本來具足矣但是所參之正念操之既精守之既密則其意根不待淨而自淨妄想不待離而自離至一切處不為一切法之所留礙其佛境界與松雪齊不即不離無異無別古所謂千山勢倒嶽邊止萬派聲歸海上消者是也又圓覺淨諸業障章中極言四相其四相之因首惟執我相我相既忘如樹根斷則枝葉不除而自凋矣故經云彼修道者不除我相是故不能入清淨覺還知我相麼佛境界是我相淨意根是我相乃至坐寶蓮華成等正覺入微塵裏轉大法輪是我相自有宗乘以來分科列段指性說心敲繩床搖麈拂縱橫放肆演唱激揚以至玉轉珠回神出鬼沒總不出者箇我相苟能除此我相之外安有所參之話所守之念所存之因所至之果直下如大火聚大風輪雖佛祖到來亦須退縮有分到者裏無位真人倒跨洞庭山遊戲三萬六千頃太湖直上兜率天與彌勒大士指白雪為青松荷葉團團團似鏡配青松為白雪菱角尖尖尖似錐混融物我以無痕超越死生而無作此說且置茲蒙大孝仲穆舍人以書入山謂先君問道二十年不料嬰此大變擬卒哭日內安厝東衡臨壙一語乞為舉似某以老病退臥巖穴惟我相公於湛寂光中自能照了今事不獲已勉為對衆引些葛藤以慰孝誠記得唐陸亘大夫問南泉弟子家中有片石也曾坐也曾臥還鐫作佛得麼泉云得亘云莫不得麼泉云不得不得大衆陸亘大夫問處放去何奢南泉和尚答時收來太儉須知問在答處答在問處狹路相逢了無回互雖然如是只如今日相公家中有一片石也不曾坐也不曾臥亦不要鐫作佛只要移置東衡原上蓋覆相公棺槨得與不得二俱屏除且道與陸亘大夫所見相去幾何良久云幻住忍俊不禁向無音韻中聊伸一偈南泉陸亘舌無筋圓覺華嚴語未真何似東衡原上月照空群象最相親玉芝聚禪師陸母沈太安人小祥五臺昆季請對靈小參智度菩薩母善心誠實男二俱不生滅一體鏡中圓我聞太安人常誦普門品性淨入圓通光明照無盡舉拂子云還見麼觀音大士乘此光明向山僧拂子頭上轉大法輪直得無邊世界六種震動八萬四千毋陀羅臂及諸清淨寶目一時普現交光映徹如寶絲網且道太安人六根既離六塵不偶如是神變又向甚麼處得來擲拂子云無口時時說無耳聞無歇夜半金烏飛不徹金剛腦門喫蒺藜海底泥牛眼流血
