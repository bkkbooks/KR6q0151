body:
  text: 武林十八㵎理安禪寺住持婁東行悅集佛降誕提綱報本黃龍南禪師佛誕上堂今日四月八我佛降生之日天下精藍皆悉浴佛記得遵布衲在藥山會裏充殿主浴佛之次藥山問汝只浴得者箇還浴得那箇麼遵云把將那箇來藥山便休大眾古人隨時一言半句亦無巧妙今人用盡心力安排終不到他境界眾中商量或云者箇是銅像那箇是法身銅像有形可以洗滌法身無相如何洗得藥山只知其一不知其二被遵公靠倒直得口似揙擔不勝懡㦬又云古德垂問只要驗人問汝那箇便道是者箇把捋那箇來正是隨聲逐色齩他言句上他圈繢藥山見伊不會所以便休又道藥山恁麼來早是無事起事好肉上剜瘡遵公不見來病却向灸瘡瘢上更著艾爝有云古人得了逢場作戲無可不可何高何低彼此知有自是後人強生分別如前所解葢不遇人一失其源迷而不復所以只憑識心思量計較以當宗乘殊不知有作思惟從有心起用此思惟辨於佛境如取螢火燒須彌山縱經塵劫終不能著是故行脚高人切須自看從上來事合作麼生畢竟將何敵他生死勿以少許浮麤識見自作障礙佛法不是者箇道理同安今日不避口業與諸人說破此二尊宿一出一入未見輸嬴三十年後不得錯舉開福道寧禪師浴佛上堂未離兜率已降王宮未出母胎度人已畢諸禪德日日日從東畔出朝朝鷄向五更啼雖然不是桃花洞春至桃花亦滿溪又道毗籃園內右脇降生七步周行四方目顧天上天下唯我獨尊大似貪觀天上月失却手中珠還知落處麼若知落處方為孝子順孫苟或未然不免重下註脚良久云曰天生伎倆能奇恠末上輸他弄一場圓悟勤禪師浴佛上堂一手指天一手指地末上一機衲僧巴鼻步步蓮華金盆澡洗西天東土共流傳至今處處澆香水良久云車不橫推理無曲斷下座雲峯悅禪師四月八日上堂教中道四月八是佛生之日放大光明照耀十方地涌金蓮華自然棒雙足東西及南北各行於七步分手指天地作獅子吼聲上下及四維無能尊我者後來雲門大師舉了云老僧當時若見一棒打殺與狗子喫却且圖天下太平師云奇恠諸禪德雲門雖有定亂之謀且無出身之路若也辯得許你頂門具一隻眼便下座龍門遠禪師浴佛上堂如來妙色身真實難藏覆不挂本來衣豈著娘生袴無憂樹下降生時南北東西行七步行七步度盡眾生無所度今辰四月初八我佛如來降生之日天下精藍煎湯浴佛佛則從諸人浴且道如何是佛要知麼佛名如來常在不滅有人見得山僧更不忉忉若無人見得山僧重說偈言昨日如來垂法雨今朝法雨洗如來了然一味無差別雲外青山朵朵開欲報如來深恩殿上重新浴過下座護國元禪師浴佛上堂者釋迦老子初生下來便作箇笑具一手指天一手指地云天上天下唯我獨尊後來雲門大師道我當時若見一棒打殺與狗子喫却貴圖天上太平尚有人不肯放過却道讚祖須是雲門始得且道那裏是讚他處莫是一棒打殺處是麼且喜沒交涉今日南明乍此住持祇得放過若不放過盡大地人竝皆乞命始得如今事不獲已且同大眾佛殿上每人與他一杓何故豈不見道乍可違條不可越例以拂子擊禪床下座大慧杲禪師浴佛上堂未離兜率已降王宮未出母胎度人已畢者箇是題目摩耶夫人毗藍園裏攀無憂樹右脇而生悉達太子直得九龍吐水沐浴金軀地涌金蓮以承其足者箇是序分以手指天地作大獅子吼上下及四維無能尊我者者箇是正宗育王今日專為流通去也遂拈拄杖卓一下云釋迦老子來也舉起云淨法界身本無出沒大悲願力示現受生已上四段不同收歸上科擲下云下座與大眾同到殿上再講經首嘔啊浴佛上堂九十七種大人相莊嚴微妙淨法身示現誕生出母胎為眾生故作佛事且作麼生是作底佛事良久云下座與首座大眾同入如來香水海助者老子轉大法輪浴佛示眾末後一句子聲前露倮倮葢天葢地葢聲葢色黃面老子得箇一著子便道未離兜率已降王宮未出母胎度人已畢及至初生則震動一切世界網便一手指天一手指地作大獅子吼道天上天下惟我獨尊為一大事因緣故開佛知見示佛知見悟佛知見入佛知見殊不知數千年後被箇跛脚阿師要一棒打殺與狗子喫貴圖天下太平且道釋迦老子過在什麼處莫是指天指地開大口麼莫是不合鼓弄人家男女麼莫是開佛知見示佛知見悟佛知見入佛知見麼若恁麼商量不惟謗他釋迦老子亦乃辜負雲門大師到者裏若知雲門落處即知自己落處且道落在甚麼處良久云萬古碧潭空界月再三撈摝始應知復舉僧問五祖如何是佛祖云露胷跣足如何是法云大赦不放如何是僧云釣漁船上謝三郎師云此三轉語一轉具三玄三要四料揀四賓主洞山五位雲門三句百千法門無量妙義若人揀得許你具一隻眼梁山遠禪師浴佛上堂舉藥山浴佛公案拈云者僧問處依稀越國髣髴楊州藥山答來眼似流星機如掣電檢點將來二俱不了若是山僧即不然當時纔見他問只浴得者箇且浴不得那箇但轉木杓柄與伊待他擬議之間攔面便潑假饒者僧有大神通具大智慧也無施展處敢問大眾者箇即且置喚甚麼作那箇下座佛殿燒香為你說破靈隱原禪師浴佛上堂舉藥山浴佛話師云者一箇那一箇一一從頭都浴過藥山布衲謾商量仔細看來成話墮成話墮轉誵訛拍禪床云武林春已老臺榭緣陰多浴佛上堂舉香嚴和尚云去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧錐也無眾中忽有箇漢出來問長老錯了也今朝四月八是佛生日如何舉此公案山僧只對道住持事繁下座妙峯璨禪師浴佛上堂今朝是如來降生之節天下緇流莫不以香湯灌沐共報洪恩為甚麼教中却道如來者無所從來既是無所從來不知降生底是誰試請道看若道得其恩自報若道不得明年四月八還是驀頭澆天童覺禪師浴佛上堂今日是釋迦老子降誕之辰長蘆不解說禪與諸人畫箇樣子祇如在摩耶胎時作麼生以拂子畵此相曰祇如以清淨水浴金色身時又作麼生復畫此相曰祇如周行七步目顧四方指天指地成道說法神通變化智慧辯才四十九年三百餘會說青道黃指東畫西入涅槃時又作麼生乃畫此相復曰若是具眼衲僧必也相許其或未然一一歷過始得應庵華禪師浴佛上堂德山拆却佛殿雲門一棒打殺麻三斤殿裏底杖林山下竹筋鞭三遭痛棒九到洞山若作佛法商量爛却舌頭不作佛法商量墮坑落塹到者裏黑漆拄杖有屈無叫處古廟香爐雖冷燒殺闍黎正恁麼時如何武陵春已老臺榭綠陰多浴佛上堂始從鹿野苑終至䟦提河用盡自己心笑破他人口至於拈花付囑達磨安心南北分宗曹溪列派向衲僧門下正如掘地覓天以拂子劃一劃云正當今日是我如來大師慶誕之辰天下叢林一年一度謂之浴佛若喚作浴佛喫棒有分若不喚作浴佛辜恩負義豈不見遵布衲浴佛次藥山遂問汝只浴得者箇要且浴那箇不得布衲云把將那箇來藥山便休去師云遵布衲當時若是箇漢待他道浴那箇不得使拈杓子劈面擲雖然也不得屈藥山何故不入虎穴爭得虎子佛生日上堂鐵壁鐵壁從來真實號之曰佛常在苦海中立風吹不入水灑不瀑棒打不入是故以本願力撈摝眾生不息雲門忍俊不禁打與狗喫此意深寂非語默可及四月八日是渠誕迹露柱燒香湯已畢大家送至龕室泥人揩背一拶骨出忽然怒發打瞎頂門眼一隻直至而今叫屈屈屈屈堪述休相憶清風匝地有何極咄咄咄焦山體禪師浴佛上堂年年浴佛在今朝目擊迦維路不遙果是當時曾示現宜乎惡水驀頭澆雪巖欽禪師浴佛上堂四月八生悉達九龍吐水浴金軀雲門一棒要打殺是大神呪是大明呪是無上呪汝等諸人還見黃面老子麼以拄杖一時打散佛生上堂一棒打不殺千古阿剌剌是阿誰兮名悉達更問如何兮四月八佛生日上堂東行西行指天指地盡謂如來降生我道魔王出世一棒打殺貴圖太平時當孟夏麥綠桑青浴佛上堂無憂樹下右脇誕生已是造妖揑怪那堪七步周行雲門一棒打殺未為剿絕看來只好活塟解脫無底淨坑依前日午三更佛生上堂九龍吐水七步周行雲門一棒打殺正是摩頂授記葛藤枝蔓重生擲拂子云從教徧地縱橫佛生上堂指天指地點胷點肋將謂六識未具初生孩兒元來通身是膽白拈正賊雲門老師道一棒打殺餵狗不妨奇特高峰妙禪師浴佛上堂舉世尊初生話乃云見怪不怪其怪自壞大眾會麼更聽一頌指天指地展戈矛直至如今戰不休假使群靈都殺盡一身還有一身愁佛誕上堂指天指地一棒打殺鴆屎砒霜合造毒藥颺在三千世界中不知那箇親遭著卓拄杖一下佛誕上堂呱聲未絕便稱尊攪得三千海嶽昬惡水一年澆一度知他雪屈是酬恩中峯本禪師浴佛日示眾大眾盡十方世界是無憂樹悉達太子即今下生一手指天一手指地諸人還見麼乃云天上天下惟我獨尊還聞麼如其不見不聞本上座嬴得熱瞞諸人去也碧芙蕖紅芍藥結成越樣花亭黑斑豆赤沙糖煎就異常香水鼠尾巴短長一尊佛相牛眼睛大小一柄杓頭普請諸人同時灌沐喚作報德有德皆報喚作酬恩無恩不酬然報德酬恩且置之不問只如二千年外九龍吐水所浴底與今日眾手所澆底是同是別若道同孤負釋迦若道別孤負自己且釋迦老子黃金面具生鐵心肝他管你孤負不孤負但是爾自己等閒孤負則未免虗生浪死極未來際安有解脫之期為諸人者一念子不能瞥地帶累者老漢捨兜率降王宮入母胎示人世造妖揑怪大抹高揮曲盡化儀老婆心切豈謂諸人逗到今日轉增迷倒沈酣憎愛結縛死生孤負萬端不可枚舉你還知三根椽七尺單一鉢香炊九條田服盡是者老漢積劫累世指天指地中流出更不肯奮起一片決定不退轉正志翻身跳上破蒲團猛提起箇無滋味話一踏到底豈更有別方便耶今日者箇浴佛之杓柄即是出生死險道之梯航斬輪轉根株之劍刃豈戲劇哉況是寶爐散薝蔔之雲蠟炬吐優曇之穗梵音宣而雷動森羅萬象共證圓聞禪影移而雨傾塵剎十方同躋正覺所以云未離兜率已降王宮未出母胎度人已畢直下安有一毫剩法與人為知為解涉見涉聞雖然只如四月初八日已前還有者箇消息也無不因刖足曾三獻那得連城價倍高千巖長禪師浴佛上堂摩耶今日產嬰孩剛道天宮降下來不是鷄窠生鳳卵分明象子出驢胎無明果向空中結三毒華從火裏開堪歎禍根深不拔叢林一歲一番災北磵簡禪師浴佛上堂一聲哇地便吒哩突出如斯大闡提此土西天起殃害堂堂洗土不成泥佛誕上堂汲井花水煑薔薇露清淨法身遭沾污良久云活戾世界一年一度無用寬禪師浴佛上堂無用震威一喝驚得虗空迸裂雲門大師脚短一棒打伊不殺太湖今日報恩一杓惡水澆潑喝一喝云下座去大殿裏諷經浴佛佛誕日上堂周行七步弄精魂殺活行藏手眼親末法兒孫重檢點毗藍園裏百花新大眾見麼天上天下惟我獨尊空費梁山水一盆擲拄杖下座古林茂禪師佛誕日上堂釋迦老子曠大劫來未甞入滅四月八日何曾降生若謂周行七步目顧四方指地指天作獅子吼正是謾你諸人豈不見遵布衲在藥山浴佛次山云汝只浴得者箇不浴得那箇衲云把將那箇來山便休去藥山鈎頭有餌不妨擲去拋來遵布衲脚下泥深未免東撑西拄檢點將來一人浴得者箇不浴得那箇一人浴得那箇不浴得者箇澹湖即不然者箇那箇總與一杓惡水何故功不浪施元叟端禪師浴佛上堂雲門當時一棒中峯今朝一杓只此報德酬恩一任諸方貶剝下座佛誕上堂舉應庵和尚頌云草本無端拈出來更加註脚放癡獃西天此土誰知己夜半優曇火裏開師云應庵與麼道大似看錮鏴著生鐵山僧別資一路要與黃面老子相見寶覺真空無是非是悲願弘深上下分指七十九年中妖怪從茲起瞎眼波斯滿大唐懵袋亂呈知幾幾佛誕上堂黃面老子初生下時一手指天一手指地周行七步目顧四方云天上天下惟我獨尊與麼說話如將金輪寶位直授凡庸其柰土曠人稀相逢者少雲門云我當時若見一棒打殺與狗子喫却貴圖天下太平因風吹火雪竇云徐行踏斷流水聲縱觀寫出飛禽跡畫虎成狸山僧恁麼抑揚意在於何珊瑚枕上兩行淚半是思君半恨君楚石琦禪師浴佛上堂一手指天已在言前一手指地莫教錯會天上天下可知禮也惟我獨尊口是禍門正當恁麼時如何委悉拈拄杖千古長如白練飛一條界破青山色浴佛上堂今日如來降誕之日灌沐金軀之時為復是有塵灌沐為復是無塵灌沐若道有塵灌沐與如來敵體相違若道無塵灌沐早是塗污了也畢竟如何可惜一盆湯浴佛上堂未有世界早有此性世界壞時此性不壞出世不出世成佛不成佛總是閒言語淨法界身本無出沒大悲願力示現受生恁麼說話正是俗氣不除且道喚作釋迦老子不喚作釋迦老子一舉四十九恕中慍禪師佛誕上堂明珠在掌隨眾色以分輝寶月當空逐千江而現影拈拄杖釋迦老子生也九龍吐水沐金軀地涌金蓮捧雙足眼有瞳人底謂我誑嚇閭閻皮下無血底謂我將鰕釣鼈卓拄杖觀音買胡餅笑倒金剛神呆庵莊禪師佛誕上堂瞿曇降誕是斯辰脫賺古今多少人恨殺雲門棒頭短虗空迸作一條痕浴佛上堂舉藥山浴佛話師云藥山能縱不能奪遵布衲能奪不能縱總未具超宗眼在黃龍南禪師云二尊宿一出一入未見輸嬴三十年後不得錯舉早是錯下名言徑山見處也要諸人共知今日殿中普請浴佛者箇那箇不得動著杓柄到手更莫顢頇擊拂子將此深心奉塵剎是則名為報佛恩鐵關樞禪師佛誕上堂毗藍園降生八十種隨好行作象王行吼作獅子吼拈拄杖雲門大師來也卓拄杖云阿爺阿爺愚庵及禪師佛誕上堂良久云釋迦老子生也蝦蟆蚯蚓同證法身露柱燈籠共相慶賀雲門大師道我當時若見一棒打殺與狗子喫成人者少敗人者多繫拂子下座佛誕上堂身口意清淨是名佛出世身口意不淨是名佛滅度三文錢娶箇黑老婆頭不梳面不洗知他是凡是聖月江印禪師浴佛上堂若人欲識佛境界當淨其意如虗空遠離妄想及諸趣令心所向皆無礙諸禪德拈起杓子便被杓子礙浴得者箇浴不得那箇便被那箇礙浴得那箇浴不得者箇便被者箇礙作麼生得所向皆無礙去向悉達太子未入母胎以前道將一句來浴佛上堂天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者此是釋迦世尊翹足三七日贊弗底沙佛偈超過彌勒九十一劫檢點將來好不丈夫只今莫有超釋迦越彌勒者麼設有也好與三十棒回向畢復云兜率宮中閒不樂却來生此苦娑婆指天指地成何事添得叢林攪閙多儱儱侗侗婆婆和和千年無影樹今時沒底靴南石琇禪師佛誕上堂東山五祖演禪師因僧問云如何是諸佛出身處五祖云東山水上行圓悟和尚云天寧則不然如何是諸佛出身處薰風自南來殿閣生微凉妙喜老祖聞得當下豁然大悟五祖圓悟恁麼提持鄭州出曹門妙喜悟去真州望長蘆徑山見處也要諸人共知諸佛出身處渾不用思惟早晨喫白粥如今肚又饑佛誕上堂未出母胎天左旋地右轉已出母胎天左旋地右轉僧問德山密禪師云佛未出世時如何山云河裏盡是木頭船僧云出世後如何山云者頭踏著那頭掀良久相逢說盡平生話依舊心肝不帶來了庵欲禪師浴佛上堂大眾還見釋迦老子麼未離兜率滿面塵埃既出母胎通身泥土饒你山河大地草木叢林盡為衲僧一一衲僧有無量杓一一杓中有無量香水海直從今日洗至窮劫還得淨潔也無者裏眼親手便倒轉杓頭便見垢相永離十方清淨其或未然釋迦老子有沒量罪過山僧有沒量罪過不干諸人事下座浴佛上堂釋迦老子未離兜率已降王宮好與三十棒未出母胎度人已畢好與三十棒本覺與麼判斷也好與三十棒釋迦老子過處本覺固自知之本覺過處諸人還知麼良久拍禪床云擕取詩書歸舊隱野花啼鳥一般春笑隱訢禪師浴佛上堂今朝四月八日天下叢林悉皆浴佛只如無邊身菩薩以竹杖量世尊頂丈六了又丈六量梵至天不見世尊頂相正與麼時且作麼生浴直得長干塔𨁝跳上非非想天撞倒百億須彌山掀翻無邊香水海杜順和尚歡喜踴躍說偈讚歎懷州牛喫禾益州馬腹脹天下覓醫人灸猪左膊上釋迦老子被他驀頭一杓隱身無地諸人隨例浴佛則不無且道杓柄長多少喝一喝天真則禪師浴佛上堂佛具清淨法身因甚年年四月八日將水灌沐諸人若向者裏透得本來與佛同生亦能作獅子吼其或未然莫怪海門泄漏且道作麼生泄漏天上天下惟我獨尊法舟濟禪師四月八日示眾舉藥山浴佛公案師云兩箇老漢閙浩浩者箇那箇分別不少山僧即不然待他道把將那箇來便與驀頭一杓管教他布衲渾身是水永劫不乾是事且置只如教中道如來法身淨若虗空汝等諸人一杓兩杓擬向甚麼處下手若有下手處不妨舉起杓頭若也不堪下手莫道一杓兩杓一滴也無著處舉杓云且道者一杓向什麼處下手便浴佛云智水湛然滿浴此無垢人玉芝聚禪師浴佛上堂欲知佛性義當觀時節因緣只如孟夏漸熱自釋迦老子降生以至今日無絲毫變異之相時節既無變異當知巍巍相好亦無絲毫變異無端向四十九年說心說性說頓說漸致令後代兒孫啐不丈夫者總被惡水澆却即今狹路相逢不妨眾等也各各與他一杓不見道得人一牛還人一馬捨身與受身誰是報恩者擊拂下座密雲悟禪師四月八日上堂唲聲一發獨稱尊引得兒孫惡水淋不是與人難共聚大端緇素要分明便下座箬庵問禪師佛誕日解制上堂師拈杖云釋迦老子生也卓拄杖云切忌動著錯且道是釋迦老子錯是山僧錯是諸人錯辨驗得者箇錯字出與你草鞋一緉其或未然且聽拄杖子為諸人判斷九龍吐水右脇降生豈不是釋迦老子周行七步目顧四方豈不是釋迦老子天上天下唯我獨尊豈不是釋迦老子既是釋迦老子釋迦老子即今在什麼處若道不是釋迦老子釋迦老子又在什麼處卓拄杖云風送野雲歸碧洞月垂滄海作明珠復卓拄杖下座佛誕上堂一手指天一手指地明如日黑似漆周行七步目顧四方軟如鐵硬如泥天上天下惟我獨尊幸自可憐生因甚雲門却要一棒打殺與狗子喫家肥生孝子國霸有謀臣佛誕上堂入山不避虎兕入水不畏蛟龍人天眾前不怕天下人檢責非為分外莫有恁麼人麼便請出來當場決戰佛未出世人人鼻孔遼天出世後因甚杳無消息此是古今辨龍蛇鍛凡聖別邪正析緇素底大關鍵透過底恁麼也得不恁麼也得恁麼不恁麼總得透不過底恁麼也不得不恁麼也不得恁麼不恁麼總不得所以學道須是鐵漢著手心頭便判直趣無上菩提一切是非莫管既一切是非莫管也不管是凡是聖不管是佛是魔不管是古是今不管是彼是此橫趨直入不顧危亡奮勇爭先逴得便用不妨有時示凡示聖有時現佛現魔有時舉古舉今有時分彼分此要且聖凡籠他不住佛魔繫縛他不著古今度量他不出彼此安置他不得然後頭頭應用左右逢源一任喚他是凡也得是聖也得是佛也得是魔也得是古也得是今也得是彼也得是此也得徧塵徧剎得妙隨流事是過量事人須過量人若是過量人自知過量事今日釋迦老子降誕之辰山僧雖則出他一頭地也不敢埋沒者老子一些子你看者老子纔出母腹開張大口一手指天一手指地周行七步目顧四方天上天下惟我獨尊若也親見者老子面目臨濟三玄三要也在裏許洞山五位君臣也在裏許雲門一鏃三關也在裏許溈仰九十六圓相也在裏許法眼心外無法也在裏許既一總在裏許跛脚阿師因甚要一棒打殺與狗子喫驀拈拄杖當爐不避火迸當言不避截舌祖禰殃及兒孫那怕銅頭鐵額放行也瓦礫生煇把住也黃金失色者條棒今日落在山僧手裏且要一擔擔却卓拄杖鐵牛對對黃金角木馬雙雙白玉蹄拈得一枝無孔笛逆風吹又順風吹復卓拄杖下座玉林琇禪師佛誕度僧上堂師云報恩新長老今年纔廿四黃面老瞿曇是吾最小子古往今來多少居曲彔床的大善知識凡於四月八日播弄瞿曇小老的矢臭氣則有分還曾夢見瞿曇的師麼若向者裏緇素得不論剃髮不剃髮不虗親到報恩若者裏緇素不得直饒新報恩親手為他剗草也未免對面白雲千萬里驀喝一喝下座佛誕上堂有一人佛之一字素不樂聞念佛一聲𠻳口三日有一人見佛歡喜禮拜讚歎種種供養一人恁麼一人不恁麼同到報恩來且道留那一箇即是有般漢便道功德天黑暗女有智主人二俱不受是者般的正好捉來朝打三千暮打八百何故大海若不納百川應倒流山茨際禪師佛誕示眾舉世尊初生話畢師云古今尊宿盡道雲門此語奇特謂是將此身心奉塵剎是則名為報佛恩若據東明今日簡點將來大小雲門只具一隻眼何故只管瞻前不管照後東明今日早五更起來燒一炷香獻一杯水連稱釋迦如來三聲復大展坐具九拜且不是應時及節亦非報德酬恩具擇法眼者試為我緇素看朝宗忍禪師浴佛上堂彌陀寺裏釋迦誕生僧俗堅請法座高陞諸佛菩薩一齊稽首穢土淨土一道均平所以周行七步而目顧指天指地以稱尊如來出世不為別事虗空大地更無別人大眾識取鈎頭意莫認定盤星自古真金不博金那堪屈己以從人即今便好猛提取莫待須臾水潑身下座弘覺忞禪師佛誕上堂世尊初生草本不勞拈出一手指天一手指地賣弄小孩兒周行七步脚跟未點地在目顧四方望空啟告天上天下惟我獨尊囚供死款雲門一棒打殺貪他香餌著他鈎天童恁麼判斷雖則相席打令猶是大嚼對屠門然既慶贊因齋何妨借花獻佛乃召云大眾世尊初生拈向一邊祇如雲門一棒且道打得他殺打他不殺若打得他殺西天東土瓦解氷消豈有今朝與麼事若打他不殺山僧不免更下毒手去也拽拄杖下座一時打散
