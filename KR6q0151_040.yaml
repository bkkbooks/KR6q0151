body:
  text: 武林十八㵎理安禪寺住持婁東行悅集寒食提綱三月雲峰悅禪師寒食日上堂諸上座還會麼冬至寒食一百五家家冢上添新土翻思拾得與寒山南北東西太莽鹵南泉不打鹽官鼓以拂擊禪床下座五祖演禪師寒食小參李白桃紅山青水緑雲橫洞口月皎長空只向者裏薦得法眼道月明幽室寒星分拱辰異便須瓦解氷消韶國師道通玄峰頂不是人間心外無法滿目青山亦須百雜碎何也盡乾坤大地不消一揑然雖如是事無一向今夜且放過一著慧遠海禪師上堂好是仲春漸暖那堪寒食清明萬疊雲山聳翠一天風月良鄰在處華紅柳緑湖天浪穩風平山禽枝上語諄諄再三瑣瑣碎碎囑付叮叮嚀嚀你且道叮嚀囑付箇甚麼卓拄杖曰記取明年今日依舊寒食清明真定府洪濟宗賾禪師上堂冬去寒食一百單五活人路上死人無數頭鑽荊棘林將謂衆生苦拜掃事如何骨堆上添土唯有出家人不踏無生路大衆且道向甚處去還會麼南天台北五臺參無文璨禪師清明上堂桃花無數李花無數若向者裏活眼不開平地上死人更是無數去年踏青人今年不來今年上墳底明年何處日月急如梭生死何定據謹白參玄人光陰莫虗度了庵欲禪師清明上堂冬至寒食一百五今朝正是三月六山又緑水又緑一聲款乃漁家曲山僧昨日偶爾郊行作得一偈舉似大衆華冠不整舍那衣禿帚還隨破畚箕五箇老婆三箇醜一雙紅杏換消梨下座法舟濟禪師清明示衆燕語鶯啼桃紅柳緑風月晴和春光滿目一般富貴江山却有兩般境界山僧雖則不管閒非也與諸人說箇間架有的笙歌鼎沸羅綺駢闐人醉處玉樓𥥆窕馬嘶邊翠草生煙有的向楸梧冢畔松柏塋前呼娘叫子劈地號天縱哽咽煩冤莫訴任揮淚悲苦難宣者兩般人樂者樂徹心源苦者苦入骨髓山僧者裏看來却好箇如幻法門一相三昧且如何是一相三昧卓拄杖云愁人莫向愁人說說與愁人愁殺人湛然澄禪師清明示衆緑滿園林翠欲流子規啼血正綢繆紙灰堆滿三尺冢哭倒斜陽恨未休大衆為人一世收成結果不過如是而已須知大千世界一丘冢去來生死總在裏許你以長河為酥酪祭獻此人他亦不受且道為甚聻山茨際禪師清明示衆春朝晴日望飛煙半是人家燒紙錢本有爺娘渾不識却看黃土哭蒼天鋪帳簟提綱四月雪巖欽禪師上堂鋪帳簟青碧紗廚凉簟氷鋪三伏暑威不到水晶宮闕不如敢問諸人畢竟與洞山道向鑊湯爐炭裏回避還有商量處也無卓拄杖云蚊子上鐵牛端午提綱五月真淨文禪師上堂今朝五月復端午隨衆生心解分布粽子雖然應所知要須一一知來處且道從什麼處來驀拈拄杖云若知拄杖子來處即知一切法來處所以隨衆生心應所知量循業發現只如大衆從什麼處發現一一分明在目前若知發現不妨奇特若也不知何名出家遂擲下云只者末後一著也大難會喝一喝下座五祖演禪師端午上堂今日端午節白雲有一道神符也有些小靈驗不敢隱藏舉似諸人一要今上皇帝太后聖躬萬歲二要合朝卿相文武百官州縣寀寮嘗居祿位三要萬民樂業雨順風調有箇符使却來報白雲道諸處盡去遍只為神通小不奈一件事何遂問他是甚事使云禪和子鼻孔遼天白雲向伊說莫道你我尚不奈何然雖如是澤廣藏山理能伏豹畢竟如何一抽三二添四黃牛角向天八腳垂過鼻急急下座端午上堂舉昔日有秀才造無鬼論論就才放筆有鬼現身斫手謂秀才云你爭奈我何白雲當時若見便以手作鵓鳩嘴向伊道谷谷孤圓悟勤禪師端午上堂新月如鈎輕雲映火山前麥熟筐裏蠶繅田夫戢戢栽苗柳岸垂垂之線風調雨順盜賊消禳我輩林下之人一餉非常慶快才作此語驀地有箇符使出來道山前諸處五瘟行疫病太甚欲就和尚覓箇神符往前驅逐山僧遂以拄杖畫一圓相與之瞥然不見逡巡却來道五瘟疫鬼已驅向他方世界去也只有一事待請益和尚此靈驗神符從何處得來山僧劈脊便打當下滅跡消聲因行掉臂成箇頌子五月五日天中節赤口毒舌盡消滅五月五日午時書放下蛇頭捋虎鬚龍門遠禪師上堂今日端午世間人釘桃符書門閫使萬邪不窺其戶百鬼不入其門世間人又使針燒炙採藥登山使萬病不干其體疫癘不入其身遂失聲叫曰阿㖿㖿阿㖿㖿盡大地人燒破皮肉教山僧受無限苦痛昔楚大夫以忠言不用沉于湘江後人哀之以竹筒盛飯繫五色絲祭之風俗至今流傳不斷遂嘔吐數聲曰世間人喫却米粽教老僧脹破肚皮大衆別人燒炙別人喫物為甚麼龍門長老受痛受飽未能情忘緣慮事出見聞於此門中遂為戲論豈不見先聖有言曰懷州牛喫禾益州馬腹脹天下覓醫人灸猪左膊上何也遠走不如近匍匐久立大慧杲禪師上堂今朝又是五月五大鬼拍手小鬼舞驀然撞著桃符神兩手椎胸叫冤苦艾人云休叫苦遂拈拄杖卓一下云只有一處堪回互回互不回互回而更相涉擲下云不爾依位住參端午示衆拈拄杖舉雲門大師道從上諸聖為甚麼不到者裏蓮華峰庵主道古人到者裏為什麼不肯住師云二尊宿拆東籬補西壁抱橋柱洗澡把放船即不無要且無為人底道理雲門即不然未到者裏教伊到已到者裏教伊頭破腦裂且道還有為人處也無良久云一二三四五虗空闕處補五四三二一當門書大吉好手揮斤去鼻泥衲僧機妙安能識驀然識百草頭邊露消息且作麼生是露底消息唵陪臨唵齒臨急急如律令卓一下上堂今朝五月五天降沛然雨艾人與門神聚頭相耳語且道說箇什麼雪竇禪師來一口吞佛祖上堂今朝又是端午節文殊善財忙不徹殺人活人藥不靈自添腦後三斤鐵驀拈拄杖卓一下云觀音妙智力能救世間苦遂擲下云是什麼鐵蛇鑽入土應庵華禪師端午上堂五月五日端午節好事當陽難掩塞歸宗突出拄杖頭閒神野鬼俱消滅砌下寒泉忽倒流嶺上白雲不敢白復舉文殊一日令善財採藥云是藥者採將來善財遍採無不是藥却來白云無不是藥者文殊云是藥者採將來善財拈一莖草與文殊文殊提起示衆云此藥亦能殺人亦能活人師云大小文殊被善財換却眼睛下座端午上堂一二三四五五四三二一從頭檢點來笑殺維摩詰帶纍李鬍子噴水髭鬚濕灑淨已周圓次念波羅密蔣山恁麼道千古誰人識識不識何處覓堪與叢林為軌則驀拈拄杖卓一卓云急急如律令敕或菴體禪師端午上堂天下今朝是端午元來覺報無門戶野鬼閒神枉出頭赤口白口空婆姆平居更不釘桃符號令只撾塗毒鼓若還耳見眼聞聲管取縱橫超佛祖密庵傑禪師端午上堂五月五日端午節陰雲靉靆甘雨未決君王降賜寶香林下祈求懇切孚祐龍善時節好將一雨潤焦枯匝地清凉消惱熱記得僧問乾峰十方薄伽梵一路涅槃門未審路頭在什麼處峰以拄杖子畫一畫云在者裏僧後請益雲門門拈手中扇云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾大衆乾峰搖頭雲門擺尾亘古亘今挂人唇齒徑山有條攀條拈拄杖擲下云會看雲雷殷地起兜率慧照禪師上堂舉拂子曰端午龍安亦鼓橈青山雲裏得逍遙饑餮渴飲無窮樂誰愛爭先奪錦標却向乾地上划船高山頭起浪明椎玉鼓暗展鐵旗一盞菖蒲茶數箇沙糖粽且移北鬱單越來與南閻浮提鬬額看擊禪床下座雪巖欽禪師端午上堂天悠悠雲悠悠輥底浪花翻雪競龍舟當是時也可笑三閭楚大夫正在死水裏浸殺浸不殺千古萬古湘江濶鐵關樞禪師端午上堂今朝五月五打動震天鼓竪拂子托出無底盤滿飣黃金黍禪流板齒無毛到此如何吞吐解吞吐達磨大師不是祖中峰本禪師端午示衆春秋夏五不書其月記史之人乃疑文闕闕不闕十字街頭石敢當恣向人前逞妖孽倒騎艾虎上高樓背挂神符施妙訣禁赤口消白舌收卷門門五色錢將謂無人能鑑別忽被無手法師劈胸搊住拽向蟭螟眼中却把真機多漏泄且漏泄底在甚麼處庭中一樹石榴花曉日照開如潑血千巖長禪師端午上堂夏日喫麥粥頭頂茅草屋東司雨淋淋無處可下足中有老頭陀豈可稱尊宿可憐諸禪和剛要相攢簇雖然無受用且喜相和睦健者共成褫病者奉水菽今朝端午節無酒又無肉擎出一杯茶滿泛菖蒲玉且道成得甚麼事人情若好喫水也甜唯庵然禪師端午上堂黃米粽喫一鉢菖蒲茶喫半甌箇是衲僧好時節大家相見飽齁齁縱橫自在自樂自由說甚仰山開畬溈山牯牛禾山打鼓雪峰輥毬總是小兒雜劇且非先德宗猷只如端午掩殃一句又作麼生目前無怪異不用貼鐘馗端午上堂諸方盡喫菖蒲茶唯我自酌青原酒儱儱鬨鬨發顛狂打落南辰連北斗擲拄杖下座南石琇禪師端午上堂是處人家懸艾虎靈巖但喫菖蒲茶莫言淡薄無滋味畢竟風流出當家了庵欲禪師上堂聞聲悟道見色明心鵲噪鴉鳴風動塵起癡人面前不得說夢僧問趙州如何是祖師西來意州云庭前柏樹子深山藏獨虎淺草露群蛇一年一度天中節細切菖蒲泛釅茶下座上堂五月五天中節不書符不揑訣放教心地坦然平百怪千妖自消滅豈不見文殊一日令善財採藥善財云無不是藥者文殊云是藥採將來善財拈一莖草度與文殊文殊接得示衆云此藥亦能殺人亦能活人天童華和尚云大小文殊被善財換却眼睛大衆應庵老人可使為百世宗師要且只知其一不知其二山僧道一手不獨拍兩手鳴摑摑擔板禪和氣食牛擡頭只道乾坤窄喝上堂時節不相饒今朝五月五東家釘桃符西家懸艾虎孤峰絶頂頭也須資一路拈起須彌槌且擊虗空鼓翻身躍倒鬼門關大地山河無寸土喝一喝下座廣慧寶琳禪師午節上堂今朝五月五百草靈苗誰不覩善財採藥與文殊殺活臨機互為主禪家流莫莽鹵眨上眉毛好看取信手拈來知不却甜者甜兮苦者苦元叟端禪師端午上堂五月五日端午節艾虎桃符總休說鳳山只箇金剛王百怪千妖俱殄滅江南兩浙春寒秋熱觀世音菩薩將錢買胡餅放下手却是生鐵午節上堂中峰今朝五月五且無桃符并艾虎當陽直截便知機妙用縱橫絶方所衲僧家休莽鹵甜瓜徹蒂甜苦瓠連根苦恕中慍禪師端午上堂龍牙和尚云學道先須有悟由還如曾鬬快龍舟雖然舊閣閒田地一度嬴來方始休大小龍牙見地不脫坐在者裏山僧不惜眉毛為他撥開一路便見功超一切道絶名言乃云迷悟從來總自由要須平地上行舟乾坤儱侗無今古千載清風卒未休就中忽有出來道瑞巖也是釘樁搖櫓阿呵呵將謂無人便下座端午上堂五月五日端午節競渡江頭歌管咽衲僧共啜菖蒲茶無限馨香生頰舌百病消除千妖殄滅文殊令善財採藥善財拈草度與文殊石上栽華文殊接得示衆云此藥亦能殺人亦能活人空中釘橛顧視左右云莫有與文殊善財作主底麼喝一喝用彰俊禪師端午上堂舉五祖端陽示衆云昔日有秀才造無鬼論論就才放筆有鬼現身斫手謂秀才云你爭奈我何白雲當時若見便以手作鵓鳩嘴向伊道谷谷呱拈云無鬼論就有鬼現形置之莫問五祖以手作鵓鳩嘴也是隨邪逐惡瑞巖家無白澤之圖亦無如是妖怪天目禮禪師端午上堂月屆蕤賓節臨重午不鬬龍舟不喧鼉鼓山中藥草信手拈來舉拂子云見麼亦能殺人亦能活人其或未然菖蒲浮苦茗角黍膩人牙擊拂子一下笑隱欣禪師端午上堂盡大地是藥信手拈來草文殊與善財一起復一倒當機解變通更問中峰老日中或饑或飽夜後蚊蟲獦蚤事事求如意日日添煩惱有事不如無事好楚石琦禪師端午上堂今朝五月五不打薅藝鼓荒却自家田味却家中主報諸人休莽鹵赤口白舌盡消除無位真人汗如雨端午上堂今朝五月五艾人騎艾虎南北東西走一遭回來說道大地衆生皆受苦所謂生苦老苦病苦死苦乃至五陰盛苦一切諸苦皆可醫惟有禪和子心病最難醫用不得砒霜石蜜甘草陳皮作麼生醫得我有一隻古方無有醫不得者僧問趙州學人乍入叢林乞師方便州云喫粥了也未僧云喫粥了也州云洗鉢盂去粥了洗鉢不用狐疑鯨吞海水盡露出珊瑚枝撫掌下座愚庵及禪師上堂五月五日端午節潦倒徑山無法說大家喫盞菖蒲茶一般滋味休分別分別則任汝諸人且道畢竟是何滋味良久云人情若好喫水也肥無文璨禪師端午上堂符不書藥不採起死禁不祥拈拄杖云幸有者箇在卓一下滿院薰風夏日長人在藕花香世界東叟頴禪師上堂撾動鼓衆期聚耳同聞目同覩超乾坤越今古夫何故如此五月五是端午笑巖寶禪師端陽日示衆舉大慧杲和尚上堂今朝又是五月五大鬼拍手小鬼舞驀然撞著桃符神兩手捶胸叫冤苦師云大衆大慧與麼道大似少箇禁方何謂向青天白日裏見神見鬼笑巖則不然今朝正是五月五雲從龍風從虎山僧要與十方現前諸大聖凡賭箇賭信手拈來百草頭甜者甜兮苦者苦拈拄杖云驀然突出者一條穿過從上諸佛祖是你現前諸人百樣具有為什麼唯少者一箇衆中忽有箇見義勇為漢憤地出來道和尚且莫寐語好若論者一箇敢道現前人人不缺半分毫師放下拄杖笑云汝宛不知矢上更加尖堆上重添土湛然澄禪師端午上堂五月五天中節赤口白舌盡消滅桃符艾虎插滿頭雄黃菖蒲和酒噎酩酊不知歲月移千妖百怪皆驅絶誰管魔來與佛來一齊都把腦門揭大衆何故如此不見道護生須是殺殺盡始安居要知殺底道理麼逞此良辰以艾葉為旗以菖蒲為劍以猛利心挺英雄膽不管是非得失聖凡真妄乃至貪嗔癡愛一切諸煩惱賊提起一刀兩斷直得淨裸裸赤灑灑圓陀陀活潑潑作箇世出世間大丈夫兄弟還有恁麼人真得恁麼地麼若不得恁麼地山僧有箇護身符子相送去也拈拄杖云看看太上老君急急如律令敕箬庵問禪師端陽上堂神鋒凜凜寶劍當關百怪潛蹤群妖屏跡初非造作不屬安排不歷功勳不繇途徑向前黯黑退後岌業一操直入覿體全提百折不回渾鋼鑄就山河大地是物明暗色空是物塵塵爾剎剎爾該括萬有統攝六虗喚甚麼作山河大地喚甚麼作明暗色空有時惺惺有時寂寂內外融徹表裏洞如到者裏三世諸佛與黧奴白牯同時得同時失同時照同時用汝諸人知有不知有威音那畔太煞現成今事門頭曾無異軌山僧不妨應時及節與諸人把手共行去也拈拂子云葵榴紅似火蒲艾緑如茵牧雲門禪師端午示衆五月五端陽節心月浴主作禪悅角黍雖然沒得嘗杜田米飯須防噎放下筯肚已飽當午日輪正杲杲拈來蒲劍斬蛇頭閒看兒童鬬百草善財手裏有一莖能殺人能活人不是尋常底藥草療諸病無不好只在山僧拄杖頭諸人不用別尋討弘覺忞禪師天中節請首座上堂孤忠未見喻君王抱憤尤甘沒楚湘火宅正炎迷出路寸心那得不回皇有般漢道三界若空華四生如夢幻本無能出之人亦無所出之處只要了空達幻覺夢而已山僧道善哉夢作麼生覺幻作麼生達空作麼生了齊著力莫央庠截如飛之箭浪舞跨海之龍舫高標奪得靈山錦方信男兒當自強喝一喝復舉文殊一日命善財採藥曰是藥者採將來善財遍觀大地無不是藥却來白曰無有不是藥者殊曰是藥者採將來善財遂於地上拈一莖草度與文殊文殊接得呈起示衆曰此藥能殺人亦能活人師云有效藥非靈無病方乃聖善財熱謾文殊文殊熱謾善財即置竪拂子云只者一莖草利害在甚麼處便能殺人亦能活人要識源達委麼問取堂中第一座青苗會提綱啓散附炙茄六月華藏通禪師青苗會上堂破一微塵出大經鳶飛魚躍更分明不將眼看將心看已是重敲火裏氷淹黑豆昧平生直須劫外話豐登繅成白雪桑重緑割盡黃雲稻正青大溈泰禪師啓青苗會上堂德山入門便棒平地生堆臨濟入門便喝無風起浪俱胝只竪一指未免顢頇雪峰輥出三毬小兒戲劇到者裏總用不著爭如六月三伏甘雨普滋水足東臯禾青南畝農夫鼓腹樵者高歌古佛家風儼然如在於斯會得共樂升平脫或未然只知事逐眼前過不覺老從頭上來月江印禪師青苗會上堂常啼菩薩賣却心肝學般若則易破一微塵出大經卷則難破一微塵出大經卷則易攝大千經卷入一微塵則難一掬之水可以漲滔天之浪一簣之土可以成九仞之山也不易也不難青山常伴白雲閒無文璨禪師看青苗經兼謝日首座上堂諸佛所說法要如稻麻穀粟一字一句咬嚼得破永絶饑虗受用不盡者般說話開先既遇上等人也要拈出展兩手云今朝正是六月一了庵欲禪師建會上堂山中二三日啓建青苗會開眼與合眼總是法性海三賢固不知十聖何曾會惟有主稼神證此大三昧各乘本願力普應衆生界衆生界無盡此願亦不退稽首毗盧師和南觀自在時有僧出云久響本覺元來是箇座主師云你只識座主要且不識本覺僧便問如何是本覺師劈脊便棒云烈焰豈容蚊蚋泊擲拄杖便歸方丈笑隱欣禪師啓青苗會上堂雨澤應期秋成可望信知道一雨普霑三草二木各遂其生一音演說大小根機各充其量直得山前廖胡子無著歡喜處高聲唱道五臺山上雲蒸飯佛殿階前狗尿天剎竿頭上煎䭔子三箇胡孫夜簸錢拈拄杖畫一畫云家無白澤之圖必無如是妖怪石屋珙禪師散會天得一以清地得一以寧聖人得一天下和平衲僧得一事事現成拈拄杖云拄杖子得一任運騰騰晚來縱步東湖上笑指禾苗一色青愚庵及禪師滿散上堂僧問藥山尋常不許人看經意旨如何云常轉如是經百千萬億卷云山一日看經次有問和尚不許人看經因甚却自看山云我只要遮眼又且如何云汝若看牛皮也須穿云和尚今日普請看經畢竟功歸何所云汙邪滿車甌窶滿篝乃舉教中道如來所演八萬四千法藏言教皆名為文離一切言音文字理不可說是名為義又云若諸經中文句廣博能令衆生心意踊躍名不了義若能宣說文句及心皆同灰燼是名了義山中今日滿散青苗勝會見前大衆一七日中披宣大藏依了義經不依不了義經一句一偈一字一義莫不格於天地感於神明悉使見聞心意踊躍且如何說箇文句及心皆同灰燼底道理雲門大師道直得觸目無礙祇得名身句身山河大地是名名亦不可得喚作三昧性海俱備猶是無風匝匝之波直得忘知于覺覺即佛性喚作無事人更須知有向上一竅在且作麼生是向上一竅拈拄杖汙邪滿車甌窶滿篝喝一喝恕中慍禪師青苗上堂依經解義三世佛冤離經一字即同魔說山中連日集衆看經用保禾苗但見白底是紙黑底是字既不離經自立亦不依經解義且道是佛說是魔說喝一喝笑隱欣禪師青苗會上堂改旦令辰恭惟首座大衆起居多福數日祈保青苗有煩諷經風雨以時天之道百穀生成地之利所以祖師道心地生諸種因事復生理果滿菩提圓華開世界起驀拈拄杖云拄杖子走到西天却歸新羅國裏去也卓一下云石牛攔古路一馬生三寅了庵欲禪師滿散青苗上堂佛以一音演說法衆生隨類各得解靈山會上退席五千逝多林中半聾半啞眼空四海必有商量心洞十方孰辨真倒卓拄杖云緑楊陰裏戴嵩牛芳草渡頭韓幹馬喝一喝下座保寧勇禪師炙茄齊上堂佛祖正令凡聖俱忘機智難明心境雙絶所以佛祖到者裏盡皆亡鋒結舌設有一言半句皆是為蛇畫足之談實際理中本無是事何謂只要諸人瞥地去不逐語言云返本還源去不涉岐路去踏破化成去截斷兩頭去歸家端坐去諸人何不向佛未出世時薦取祖師未來時薦取父母未生時薦取祇如父母未生時且自家作何面目委悉麼良久云團團古鏡無纖翳試請回頭一照看五祖演禪師炙茄會上堂六月三伏天火雲布都野松間臨水坐解帶同歡奲侶弄荷花賓朋傾玉斝紅塵事繁華碧洞何瀟灑重會在明年相期莫相捨白雲曾有約願結青蓮社
