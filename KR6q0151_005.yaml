body:
  text: 武林十八㵎理安禪寺住持婁東行悅集佛成道日提綱雪巖欽禪師臘八上堂黃面老子六載辛勤尋得鼻孔打失眼睛且道落在什麼處雪山午夜一天星佛成道上堂道本無形亦本無名未聞其壞安有其成黃面漢不合造妖揑怪指出夜半一星帶纍後代兒孫盡是哺糟啜醨倣倣佛佛至今醉夢不醒山僧拄杖子未免為諸人別開一隻眼作金雞報曉一聲卓拄杖云紅日升天萬國明介石朋禪師佛成道示衆六載將身草裏埋當時合眼幾曾開果然見得明星現未到門庭冷似灰偃溪聞禪師佛成道上堂錯錯六載草繩空自縛身了開得眼來天大曉古今天地古今日月古今星辰拍膝云劍去久矣切忌刻舟石屋珙禪師臘八上堂只在山中多少好無端走入閙籃來衆生福薄難調制一點明星是禍胎臘八上堂雪山高且深忍凍吞麻麥如此過六年仍然是快活無端覩明星剛言成正覺拂袖下山走也是低一著更云度衆生重重露拴素看他堂上勞何似山中樂錯錯年年有箇臘月八元叟端禪師臘八上堂未到雪山腳跟下好與三十既到雪山腳跟下好與三十夜半見明星腳跟下好與三十更有三十山僧自喫釋迦老子無分何也有功者賞佛成道上堂舉世尊於雪山夜覩明星豁然大悟乃云奇哉一切衆生具有如來智慧德相但以妄想執著不能證得師云者老和尚一時錯認魚目以為明珠直至如今翻成話靈鷲峰前明星爛爛與昔日雪山略無少異我此一衆莫有豁然大悟者麼良久云家無白澤之圖必無如是妖怪高峰妙禪師臘八上堂黃面瞿曇夜半成道正是喚奴作郎嬴得一場好笑山僧恁麼告報也是細姑嫌嫂楚石琦禪師上堂如來明星現時成道你道半夜裏磕睡的還見明星麼呆庵莊禪師上堂舉世尊覩明星公案師云我要問釋迦老子喚什麼作智慧德相喚什麼作妄想執著擬議不來劈脊便棒衆中還有與釋迦老子出氣者麼拈拄杖不敢望汝與釋迦老子出氣只是自己鼻孔摸索得著也好靠拄杖愚庵及禪師佛成道上堂舉趙州問南泉如何是道泉云平常心是道公案師云王老師過犯彌天將釋迦世尊六年雪山千苦萬辛所得無上大道等閒花擘殆盡合與二十拄杖當時趙州眼光爍破四天下面被熱瞞則且置今日衆中莫有為世尊拔本底麼如無隆教不是為他閒事長無明忝為遺教遠孫未免出隻手去也拽拄杖下座一時趕散恕中慍禪師臘八上堂一明一切明一了一切了豁開總持門諸法不相到六年冷坐舌上生茅夜覩明星眼中添翳以手拍禪床左邊云釋迦老子過者邊著就中若有識機宜別休咎底必然別有生涯下座上堂光透日月明暗不收智出聖凡賢愚不立雪山深處夜覩明星豁爾大悟螢火之光也敢問未悟以前向什麼處蹲坐既悟已後又向什麼處出頭通方作者試出道看良久云休休看看白却少年頭填溝塞壑無人會雲自高飛水自流無用寬禪師佛成道上堂六年雪山錯忽見明星錯走下山來錯錯錯假使九州之鐵也難鑄此一錯卓拄杖一下云大地含靈同成正覺下座中峯本禪師示衆玄玄絶待妙妙無依獨露真常全彰至體名不得狀不得雪老氷枯理無礙事無礙天荒地逈萬里雲收午夜四方星燦長空揭開威音那畔腦門圓陀陀光爍爍擉瞎髑髏背後眼孔淨倮倮赤條條勒回三萬劫風飛雷厲之神機突出五千軸海涌雲屯之寐詬大衆釋迦老子來也即今在諸人眼睛裏仰見明星頂𩕳上成等正覺你諸人還覺眉毛動也無如其未委各請歸堂唯庵然禪師臘八上堂明星一見出山來剛道娘生已眼開不是髑髏乾得徹爭知春色上桃腮用彰俊禪師臘八上堂晝見日夜見星大地衆生阿誰不曉釋迦老子揑目生花剛道於中有箇悟處二十一日杜口不言幸自可憐生四十九載脫空謾語著甚死急噓一聲下座了庵欲禪師臘八上堂日日佛誕生日日佛成道空裏無花折去難水中有月看來好賣狗懸羊一體三寶垢面蓬頭輥出時何異大蟲裹紙帽咄臘八上堂萬法是心光諸緣惟性曉本無迷悟人只要今日了咄哉老瞿曇討甚閒煩惱出山與入山自起還自倒夜來斗轉玉繩橫不覺全身墮荒草喝臘八上堂二千年前正覺山前明星現時釋迦世尊成等正覺二千年後本覺山中明星現時我此一衆成箇什麼喝一喝覺即了不施功定慧圓明不滯空東㵎水流西㵎水南山燒炭北山紅臘八上堂深山巖崖有什佛法冷坐六年全無合殺豁開正眼定乾坤十方世界阿剌剌喝一喝箭穿紅日影誰是射鵰人臘八上堂老胡三更失却牛天明起來拾得馬從茲要騎即便騎到處要下即便下佛殿上螭吻忍俊不禁肆口說禪不覺觸著山門頭金剛惡發把耐重子一摑撞倒金香爐下鐵崑崙踏翻鴛鴦湖不留涓滴却向山僧拂子頭上慶讚云佛道懸曠久受勤苦乃可得成喝云被山僧一喝直得懡懡㦬㦬依位而立下座臘八上堂正覺山前明星現時釋迦世尊與大地衆生一時成佛祖師門下蹉口道著佛字嗽口三日先行不到末後太過各與二十拄杖忽有一箇不顧危亡底漢出來道本覺與人判斷也合喫二十拄杖山僧却須分付明窗下安排何故佛滅二千年比丘少慚愧臘八上堂雪嶺六年弄巧成拙出得身來天寬地濶好事大家知今朝臘月八月江印禪師上堂我觀大地衆生具有如來智慧德相皆以妄想執著而不證得釋迦老子與麼道大似蟭螟蟲向蚊子眼睫上作窠向十字街頭叫道土曠人稀相逢者少檢點將來也是噇酒糟漢上堂二千年前臘月八黃面瞿曇雙眼活阿僧祇劫喫鹽多苦行六年添得渴凍不殺餓不殺腳頭腳底乾坤濶佛朗性禪師上堂煩惱頓息名為佛智三界無法故曰受記汝亦如是吾亦如是復高聲云釋迦老子出山來也便下座天真則禪師上堂晝見日夜見星登舟疑岸動揑目便花生瞿曇昔年到而不點則上座今日點而不到諸人還要見明星麼以拂子打圓相喝一喝箬庵問禪師佛成道上堂釋迦老子成道天下叢林恰好有飯開口便噇有䞋伸手便要大家一飽膨脝奉願施主年年到者一日不要忘了旁不甘底便去長老太無厭生山僧道得人一牛還人一馬你也莫錯會好拍手笑云等是共行山下路嶺頭各自看風煙擲拄杖云明星現也漆桶歸堂去佛成道解制上堂太陽溢目萬里不挂片雲歷盡閻浮腳跟何曾動轉塵塵三昧只在毫端點著便知毋勞露布伶俐漢向生佛已前薦得明如杲日湛若太虗千眼洞開一機頓現結也布漫天網打衝浪鯨鯢解也展萬里程縱摩天俊鶻溪山雖異雲月是同不妨竿木隨身到處逢場作戲且左右逢源一句莫有人道得麼自從踏破毗盧頂諸佛從教立下風佛成道上堂日不待火而熱月不待風而凉佛不待悟而成道不待修而證山是山水是水人是人物是物是法住法位世間相常住忽若形名未立朕兆未彰喚甚麼作山喚甚麼作水喚甚麼作人喚甚麼作物喚甚麼作迷喚甚麼作悟喚甚麼作衆生喚甚麼作佛若不知有爭能知有廓大千於方寸抉了義於微芒諸人知處山僧不知山僧知處諸人不知各各不相知各各不相借且道釋迦老子還有出頭分也無正覺山前明星現處輝天鑑地耀古騰今甚生驚異甚生奇特竪拂子云何似山僧拂子緩緩地出來道眼若不睡諸夢自除心若不異萬法一如黃金自有黃金價汝丈夫兮我丈夫驀喝云高著眼下座臘八上堂師云千鈞之弩不為鼷鼠發機萬里烏錐豈為盲龜驅馭尺水能興一丈波是人知有騎賊馬捉賊快便難逢打開寶藏紫羅帳裏撒珍珠汝諸人缺少箇什麼更說甚麼迷說甚麼悟說甚麼諸佛說甚麼衆生古今日月古今山河同一心知同一聞見既然如是釋迦老子二千五百年前向夜半明星現時忽然打失眼睛鼻孔且道是悟不悟者裏若沾他滴水便見墮坑落塹何故大丈夫須是向他頂𩕳上行方堪為他提瓶挈水方知者老子未出母胎時也在裏許出母胎後也在裏許汝諸人也在裏許山僧也在裏許且道拄杖子在裏許不在裏許驀卓拄杖云庭前石筍抽條也會見高枝宿鳳凰玉林琇禪師臘八上堂周穆王三年癸未臘八釋迦文佛覩見明星豁然悟道歎曰奇哉一切衆生具有如來智慧德相但以妄想執著不能證得崇禎十二年己卯臘八玉林道人望見青山不覺好笑顧左右云汝等各踏毗盧頂上行誰能拈些子妄想智慧誑謔山僧看拍案云阿呵呵好大哥上來也恁麼散去也恁麼今日行端行鎮剃度有齊供養大衆大家落堂喫了飽地要行便行要坐便坐下座朝宗忍禪師臘八上堂今朝正是臘月八釋迦老子眼睛瞎白日青天被鬼迷夜對明星將眼刮自家盲昧已堪憐引得群盲泥土撒一年一度閙鬨鬨盡未來際難合煞祇為當年遺禍根後來漆桶枝邊揠山僧忍俊不自禁謹對人天大衆前以拂子擲下云今為汝等連根拔且道拔斷後有何消息合掌云我不敢輕於汝等汝等皆當作佛喝一喝卓拄杖下座涅槃日提綱雪巖欽禪師二月十五日上堂若謂釋迦老子古已入滅又道佛身充滿於法界而常處此菩提座若謂釋迦老子本不曾滅面前觸目無非山河大地草木叢林桃紅柳緑燕語鶯吟畢竟那箇是釋迦老子驀召大衆衆回首乃云將謂瞌睡佛涅槃上堂就謝月溪侍者硯溪上人束布毛為筆借月溪為硯磨無煙墨向虗空中大寫如來入般涅槃四字正恁麼時點畫既成畢竟如何定當卓拄杖云將謂羲之楷法尤來張顛草書上堂岸柳搖金溪桃吐玉波旬無端起舞阿難平地悲哭因甚如此親見如來面目上堂焚三昧火自舉金棺阿難悲惱波旬喜歡總是如來清淨寂滅現前時節若謂明日即無今日即有何必瞞人自瞞直是令人大不甘上堂不生不滅之性溪桃映水而紅岸柳和煙而緑無去無來之相雪瀑噴空而下雲峰拔地而高我佛如來正大法眼無量祕密寶藏盡底打開一時分付了也只是道今日則有明日則無未可容易注破何也長憶江南春雨後夕陽影裏鷓鴣啼藏叟珍禪師佛涅槃上堂盡大地是紫磨金身諸人終日開眼見釋迦老子心肝舉步築著釋迦老子鼻孔說有說無是誑說生說滅是謗說即心非心是妄不誑不謗不妄春風吹落桃李花淡煙疏雨籠青嶂元叟端禪師上堂拈拄杖釋迦老子即今在山僧拄杖頭上放無量妙寶光明出無量妙寶音聲摩胸普告大衆云汝等諦觀吾紫磨金色之身今日則有明日則無瞻仰取足毋令後悔諸人若也諦信得及拄杖子功不浪施脫或未然釋迦老子入涅槃久矣擲下拄杖栯堂益禪師佛涅槃上堂擊拂一下彰聖今日將三十年前冷灰中𪹼出烏豆換老胡眼睛去也喝一喝云設有一法過於涅槃我此一喝不作一喝用靈隱原禪師佛涅槃上堂涅槃生死等是空花佛及衆生皆為剩語諸人到者裏作麼生會良久拍禪床云但見落花隨水去不知流出洞中春湛堂深禪師佛涅槃上堂兜率降生雙林示滅掘地討天虗空釘橛四十九年播土揚塵三百餘會納盡敗闕盡力布網張羅未免喚龜作鱉末後拘尸城畔槨示雙趺旁人冷眼看來大似弄巧成拙卓拄杖云若無者箇道理千古之下誰把口說且道是甚麼道理癡人面前切忌漏泄高峰妙禪師上堂周行七步猶成跡槨示雙趺豈易收微雨灑花千點淚淡煙籠竹一堆愁無文璨禪師上堂諸行無常是生滅法生滅滅已寂滅為樂釋迦老子死在者裏至今二千餘年未有能活之者薦福雖是臂長袖短試為諸人活看合掌云容顏甚奇妙光明照十方上堂今日則有明日則無天何高地何極謂吾滅度謂吾不滅度一箇死尸許多狼籍我觀靈山百萬大衆惟波旬却有丈夫氣息何故面赤不如語直石屋珙禪師佛涅槃上堂七十九年賣弄脫空二月十五一場合殺直饒藏得渾身未免露出雙腳百萬人天雲散水流丈六金身煙消火滅迦葉自歸雞足山魔王嫉妬心方歇諸仁者要見釋迦老子麼卓拄杖一下云遍地春風桃李花紅者自紅白者白正堂辨禪師上堂花開隴上柳綻堤邊黃鶯調叔夜之琴芳草入謝公之句何必聞聲悟道見色明心非唯水上覓漚已是眼中著屑擘開胸曰汝等當觀吾紫磨金色之身今日則有明日則無大似無風起浪全不知羞且道今日事作麼生好箇迷逢達磨不知誰解承當用彰俊禪師上堂古德道涅槃後有大人相釋迦老子涅槃了也大人相在什麼處以拂子打圓相還見麼容顏甚奇妙光明照十方我昔曾供養今復還親覲上堂形影一生苦樂隨至形影一滅苦樂何有靈山六年坐堆堆地是苦四十九年口吧吧地是苦摩胸告衆槨示雙趺是苦且道如何是樂老瞿曇燒作一堆灰了也諸人還知麼喝一喝月江印禪師上堂舉唐順宗問佛光滿禪師云佛從何方來滅向何方去既言常在世佛今在何處答云佛從無為來滅向無為去法身等虗空常在無心處帝大悅師云法身廣大等虗空生滅何須較異同夾路桃花風雨後馬蹄何處避殘紅上堂釋迦老子四十九年三百餘會大似幻師幻出山河大地草木叢林城邑聚落人畜草芥皆與實相不相違背末後還作幻虎還食幻師幻師既滅諸幻隨滅諸幻既滅幻滅亦滅良久拍禪床云雙林樹下少人行多子塔前閙如市楚石琦禪師上堂摩𮌎示衆云要見釋迦老子向者裏識取汝等善觀吾紫磨金色之身今日則有明日則無看者野狐精縮頭去過去諸佛亦如是現在諸佛亦如是未來諸佛亦如是卓拄杖云如是如是又卓一下云不是不是下座上堂二月十五中春節紅花白花相間發金棺不獨示雙趺花裏靈禽更饒舌說箇什麼喝一喝上堂末法比丘有三種執一人云如來決定在娑羅雙樹間入般涅槃執此為實纍他釋迦老子死了活不得一人云常在靈鷲山及餘諸住處執此為實纍他釋迦老子活了死不得一人云一切法不生一切法不滅若能如是解諸佛常現前活的釋迦老子便是死的釋迦老子死的釋迦老子便是活的釋迦老子執此為實正是大病世醫拱手總不與麼時什麼處與釋迦老子相見風暖鳥聲碎日高花影重呆庵莊禪師上堂舉世尊摩胸告衆公案師云瞿曇末上一場敗闕百萬億衆衆中更無一人有衲僧氣息諸人還見世尊以手摩胸麼水向石邊流出冷風從花裏過來香下座恕中慍禪師上堂今朝二月十五令人做盡腸肚疏山手中木蛇咬殺南山猛虎翻身觸破虗空好手應難修補捶胸只合哭蒼天發機須是千鈞弩拍禪床上堂古者道涅槃心易曉差別智難明與麼說話勞而無功世尊涅槃會上以手摩胸告衆云汝等善觀吾紫磨金色之身今日則有明日則無瞻仰取足毋令後悔有甚差別耶雲門大師拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾有甚差別耶以拂子畫一畫云人貧智短馬瘦毛長須知遠煙浪別有好商量了庵欲禪師上堂十五日以前諸佛不出世十五日以後亦無有涅槃正當十五日柳緑花紅山明水碧頭頭見劫外風光處處是大人境界只貴當陽坐斷直下知歸稍涉思惟便成剩法拍禪床云鄰牆難隔借來竹險浪不傾端坐船上堂如來不出世亦無有涅槃以本大願力示現自在法拈拄杖不是大願力卓拄杖不是自在法舉起也千身彌勒放下也隨處釋迦只為諸人眨上眉毛却入娑羅雙樹間去也靠拄杖見之不取千載難忘愚庵及禪師上堂衆生畢竟無生死諸佛何曾有涅槃一把柳絲收不得和煙搭在玉欄干南石琇禪師上堂釋迦老子從兜率天上託生大術胎中早是染却生死重病及乎降生便乃一手指天一手指地可見攢簇不得底逮見明星出現豁然悟道正是病眼見空花四十九年三百餘會廣說略說直說曲說顯說密說豈非熱睡饒譫語至於臨末稍頭摩胸告衆云善觀吾紫磨金色之身瞻仰取足毋令後悔若謂我滅度非我弟子若謂我不滅度亦非我弟子病入膏肓莫能療治非但世醫拱手便是耆婆神醫只得倒退三舍北山遠孫今日却要為他療治若療治不得後代兒孫永失恃怙若療治得便見紫磨金色之身巍巍堂堂煒煒煌煌觸處顯現擊拂子柳色黃金嫩梨花白雪香上堂不厭生死不求涅槃古廟香爐去一條白練去熱瞞海內參玄士笑倒階前石敢當鐵關樞禪師上堂說無說有覆水難收露足露胸腳忙手亂三千界內百億剎中黃面瞿曇通身紅爛是汝諸人扶持得起麼喝一喝笑隱欣禪師上堂身口意清淨是名佛出世身口意不淨是名佛滅度拈拄杖云且道即今釋迦老子是出世耶是滅度耶卓拄杖云同生不同死有我何用你金槨示雙趺放倒又扶起天真則禪師上堂梨花恰紅桃花恰白老聃生釋迦滅分明兩彩一賽論甚各年同月你道同我道別切切切雲門口過憑誰雪良久喝一喝無趣空禪師佛涅槃示衆釋迦老漢做了一生好漢末後對衆寐語若謂我滅度非吾弟子若謂吾不滅度亦非吾弟子汝等諸人作麼生道得一轉語便見雙林樹上枯水生枝敬畏庵前氷消瓦解有僧出曰和尚亦寐語師側耳作聽勢僧無對師曰者漆桶先期率衆財提綱弘覺忞禪師涅槃先期率衆財上堂云何得長壽金剛不壞身釋迦老子於塵點劫前以無量大神通大願海無邊方便智慧海難思難說出生功德諸波羅密海成就紫磨金色之身及至唱滅雙林摩胸告衆依舊今日則有明日則無且作麼生定當總為戰爭收拾得却因歌舞破除休
