也喫粥喫飯如何直下驗得他有之與無是之與非邪之與正若驗不出參學事大遠在喝一喝下座君山覺禪師上堂仰之彌高鑽之彌堅瞻之在前忽焉在後諸人還識得麼若也不識為你注破仰之彌高不隔絲毫要津把斷佛祖難逃鑽之彌堅真體自然鳥啼花笑在碧巖前瞻之在前非正非偏十方坐斷威鎮大千忽焉在後一場漏逗堪笑雲門藏身北斗咄寶華顯禪師上堂曰喫粥了也頭上安頭洗鉢盂去為蛇畫足更問如何自納敗闕良久高聲召大衆衆舉首師曰歸堂喫茶南華昺禪師上堂此事最希奇不礙當頭説東鄰田舍翁隨例得一橛非唯貫聲色亦乃應時節若問是何宗八字不著撇擊禪床下座上堂日日説時時舉似地擎山爭幾許隴西鸚鵡得人憐大都祇為能言語休思惟帶伴侶智者聊聞猛提取更有一般也大奇貓兒偏解捉老鼠上堂以拄杖向空中攪曰攪長河為酥酪蝦蟹猶自眼搭眵卓一下曰變大地作黃金窮漢依前赤骨力為復自家無分為復不肯承當可中有箇漢荷負得行多少人失錢遭罪再卓一下曰還會麼寶山到也須開眼勿使忙忙空手回龍牙才禪師上堂舉死心和尚小參曰若論此事如人家有三子第一子聰明智慧孝養父母接待往來主掌家業第二子𠒋頑狡猾貪淫嗜酒倒街臥巷破壞家業第三子盲聾瘖啞菽麥不分是事不能祇會喫飯三人中黃龍要選一人用更有四句死中有活活中有死死中常死活中常活將此四句驗天下衲僧師曰喚甚麼作四句三人姓甚名誰若也識得與黃龍把手並行更無纖毫間隔如或未然不免借水獻華去也三人共體用非用四句同音空不空欲識三人并四句金烏初出一團紅蓬萊卿禪師上堂有句無句如藤倚樹且任諸方點頭及乎樹倒藤枯上無沖天之計下無入地之謀靈利漢者裏著得一隻眼便見七縱八橫舉拂子曰看看一曲兩曲無人會雨過夜塘秋水深上堂杜鵑聲裏春光暮滿地落花留不住琉璃殿上絶行蹤誰人解插無根樹舉拄杖曰者箇是無根底且道解開華也無良久曰祇因連夜雨又過一年春何山珣禪師上堂𨍏轢鑽住山斧佛祖出頭未輕與縱使醍醐滿世間你無寶器如何取阿呵呵神山打鑼道吾作舞甜瓜徹蒂甜苦瓠連根苦谷山海禪師上堂一舉不再説已落二三相見不揚眉翻成造作設使動絃別曲告往知來見鞭影便行望剎竿回去腳跟下好與三十棒那堪更向者裏撮摩石火收捉電光工夫枉用渾間事笑倒西來碧眼胡卓拄杖下座龍翔圭禪師上堂萬機不到眼見色耳聞聲一句當陽頭戴天腳踏地你諸人祇知今日是五月初一殊不知金烏半夜忙忙去玉兔天明上海東以拂子擊禪床下座上堂明明無悟有法即迷諸人向者裏立不得諸人向者裏住不得若立則危若住則瞎直須意不停玄句不停意用不停機此三者既明一切處不須管帶自然現前不須照顧自然明白雖然如是更須知有向上事久雨不晴咄上堂僧問如何是祖師西來意師曰東家點燈西家暗坐曰未審意旨如何師曰馬便搭鞍驢便推磨僧禮拜師曰靈利衲僧祇消一箇遂曰馬搭鞍驢推磨靈利衲僧祇消一箇縱使東家明點燈未必西家暗中坐西來意旨問如何多口阿師自招禍雲居悟禪師上堂少林面壁懷藏東土西天歐阜升堂充塞四維上下致使山巍巍而砥掌平水昏昏而常自清華非豔而結空果風不搖而片葉零人無法而得咨問佛無心而更可成野蔬淡飯延時日任運隨緣道自靈畢竟如何日午打三更黃龍忠禪師上堂張公喫酒李公醉子細思量不思議李公醉醒問張公恰使張公無好氣無好氣不如歸家且打睡烏巨行禪師上堂佛説三乘十二分頓漸偏圓癡人面前不得説夢祖師西來直指人心見性成佛癡人面前不得説夢臨濟三玄雲門三句洞山五位癡人面前不得説夢南明恁麼道還免得遭人檢責也無所以古人道石人機似汝也解唱巴歌汝若似石人雪曲也應和還有和雪曲底麼若有喚來與老僧洗腳上堂舉趙州示衆云老僧除却二時齋粥是雜用心處師曰今朝六月旦行者擊鼓長老升堂你諸人總來者裏雜用心白揚順禪師上堂雞啼曉月狗吠枯樁只可默會難入思量看不見處動地放光説不到處天地玄黃撫城尺六狀紙元來出在清江大衆分明話出人難見昨夜三更月到窗上堂風吹茅茨屋脊漏雨打闍黎眼睛濕恁麼分明却不知却來者裏低頭立歸宗賢禪師上堂且第一句如何道汝等若向世界未成時父母未生時佛未出世時祖師未西來時道得已是第二句且第一句如何道直饒你十成道得未免左之右之卓拄杖下座護聖靜禪師上堂參學至要不出先南堂道最初句及末後句逶得過者一生事畢儻或未然更與你分作十門各各印證自心還得穩當也未一須信有教外別傳二須知有教外別傳三須會無情説法與有情説法無二四須見性如觀掌中之物了了分明一一田地穩密五須具擇法眼六須行鳥道玄路七須文武兼濟八須摧邪顯正九須大機大用十須向異類中行凡欲紹隆法種須盡此綱要方坐得者曲彔床子受得天下人禮拜敢與佛祖為師若不到恁麼田地祇一向虗頭他時異日閻老子未放你在道場辨禪師上堂猛虎口邊拾得毒蛇頭上安排更不釘樁搖櫓回頭別有生涯婆子被我勘破了大悲院裏有村齋上堂淨五眼湧金春色晚得五力吹落碧桃華唯證乃知難可測卓拄杖曰一片何人得流經十萬家上堂三祖道但莫憎愛洞然明白當時老僧若見便與一摑且道是憎邪愛邪近來經界稍嚴不許詭名挾佃上堂舉僧問投子大死底人却活時如何子曰不許夜行投明須到師曰我疑千年蒼玉精化為一片秋水骨海神欲護護不得一旦鰲頭忽擎出教忠光禪師上堂有句無句如藤倚樹放憨作麼及乎樹倒藤枯句歸何處情知汝等諸人卒討頭鼻不著為甚如此祇為分明極翻令所得遲東林顏禪師上堂欲識諸佛心但向衆生心行中識取欲識常住不凋性但向萬物遷變處會取還識得麼欲得不招無間業莫謗如來正法輪上堂仲冬嚴寒三界無安富者快樂貧者飢寒不識玄旨錯認定盤何也牛頭安尾上北斗面南看上堂一滴滴水一滴滴凍天寒人寒風動幡動雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾不出諸人十二時中尋常受用上堂圓通門戶八字打開若是從門入得不堪共語須是入得無門之門方可坐登堂奧所以道過去諸如來斯門已成就現在諸菩薩今各入圓明未來參學人當依如是法從上諸聖幸有如此廣大門風不能繼紹甘自鄙棄穿窬牆壁好不丈夫敢問大衆無門之門作麼生入良久云非唯觀世音我亦從中證上堂客舍久留連家鄉夕照邊簷懸三月雨水沒兩湖蓮鑊漏燒燈盞柴生滿竈煙已忘南北念入望盡平川中際能禪師上堂萬古長空一朝風月不可以一朝風月昧却萬古長空不可以萬古長空不明一朝風月且如何是一朝風月人皆畏炎熱我愛夏日長熏風自南來殿閣生微涼會與不會切忌承當薦福休禪師上堂言發非聲是箇甚麼色前不物莫亂針錐透過禹門風波更險咄龜峰光禪師上堂數日暑氣如焚一箇渾身無處安著思量得也是煩惱人者箇未是煩惱更有己躬下事不明便是煩惱所以達磨大師煩惱要為諸人吞却又被咽喉小要為諸人吐却又被牙齒礙取不得捨不得煩惱九年若不得二祖不惜性命往往轉身無路煩惱教死所謂祖禰不了殃及兒孫後來蓮華庵主到者裏煩惱不肯住南嶽思大師到者裏煩惱不肯下山更有臨濟德山用盡自己查梨煩惱鉢盂無柄龜峰今日為他間事長無明為你諸人從頭點破卓拄杖一下曰一人腦後露腮一人當門無齒更有數人鼻孔沒半邊不勞再勘你諸人休向者裏立地瞌睡殊不知家中飯籮鍋子一時失却了也你若不信但歸家檢點看開善謙禪師上堂壁立千仞三世諸佛措足無門是則是太殺不近人情放一線道十方剎海放光動地是則是爭奈和泥合水須知通一線道處壁立千仞壁立千仞處通一線道橫拈倒用正按傍提電激雷奔崖頽石裂是則是猶落化門到者裏壁立千仞也沒交涉通一線道也沒交涉不近人情和泥合水總沒交涉只者沒交涉也則沒交涉是則是又無佛法道理若也出得者四路頭管取乾坤獨步且獨步一句作麼生道莫怪從前多意氣他家曾踏上頭關上堂洞山麻三斤將去無星稱子上定過每一斤恰有一十六兩二百錢重更不少一犛正與趙州殿裏底一般祇不合被大愚鋸解稱鎚却教人理會不得如今若要理會得但問取雲門乾屎橛育王光禪師上堂七手八腳三頭兩面耳聽不聞眼不見苦樂逆順打成一片且道是甚麼路逢死蛇莫打殺無底籃子盛將歸昭覺辨禪師上堂毫氂有差天地懸隔隔江人唱鷓鴣詞錯認胡笳十八拍要會麼欲得現前莫存順逆五湖煙浪有誰爭自是不歸歸便得國清機禪師上堂單明自己樂是苦因趣向宗乘地獄劫住五日一參三八普説自揚家醜更若問理問事問心問性克由叵耐若是英靈漢窺藩不入據鼎不嘗便於未有生佛以前轉得身却於今時大官路上捷行闊步終不向老鼠窟草窠裏頭出頭沒若也根性陋劣要去有滋味處咬嚼遇著義學阿師遞相錮鏴直饒説得雲興雨現也是蝦蟆化龍下梢依舊喫泥喫土堪作甚麼上堂無隔宿恩可參臨濟禪有肯諾意難續楊岐派窮廝煎餓廝炒大海祇將折箸攪你死我活猛火然鐺煮佛喋恁麼作用方可撑門拄戶更説聲和響順形直影端驢年也未夢見焦山體禪師上堂舉臨濟示衆四喝公案乃召衆曰者箇公案天下老宿拈掇甚多第恐皆未盡善焦山不免四稜著地與諸人分明注解一遍如何是踞地獅子咄如何是金剛王寶劍咄如何是探竿影草咄如何是一喝不作一喝用咄若也未會拄杖子與焦山吐露看卓一下曰笑裏有刀又卓一下曰毒蛇無眼又卓一下曰忍俊不禁又卓一下曰出門是路更有一機舉話長老也理會不得疏山本禪師上堂久雨不晴戊在丙丁通身泥水露出眼睛且道是甚麼眼睛卓拄杖曰林間泥滑滑時叫兩三聲楚安方禪師上堂達磨祖師在腳底踏不著兮提不起子細當頭放下看病在當時誰手裏張公會看脈李公會使藥兩箇競頭醫一時用不著藥不相投錯錯喫茶去西禪需禪師上堂句中意意中句須彌聳于巨川句剗意意剗句烈士發乎狂矢任待牙如劍樹口似血盆徒逞詞鋒虗張意氣所以淨名杜口早涉繁詞摩竭掩關已揚家醜自餘瓦棺老漢巖頭大師向羌峰頂上拏風鼓浪玩弄神變腳跟下好與三十且道過在什麼處良久云機關不是韓光作莫把𮌎襟當等間上堂懶翁懶中懶最懶懶説禪亦不重自己亦不重先賢又誰管你地又誰管你天物外翛然無箇事日上三竿猶更眠東禪嶽禪師上堂達磨來時此土皆知梵語及乎去後西天悉會唐言若論直指人心見性成佛大似羚羊挂角獵犬尋蹤一意乖疏萬言無用可謂來時他笑我不知去後我笑他唐言梵語親分付自古齋僧怕夜茶上堂僧問如何是初日分以恆河沙等身布施師曰從苗辨地因語識人曰如何是中日分復以恆河沙等身布施師曰築著磕著曰如何是後日分亦以恆河沙等身布施師曰向下文長付在來日復曰一轉語如天普蓋似地普擎一轉語舌頭不出口一轉語且喜沒交涉要會麼慚愧世尊面赤不如語直大小嶽上座口似磉盤今日為者問話僧講經不覺和注腳一時説破便下座上堂啞却我口直須要道塞却你耳切忌蹉過昨日有人從天台來却道泗洲大聖在洪州打坐十字街頭賣行貨是甚麼斷根草鞋尖簷席帽西禪淨禪師上堂若欲正提綱直須大地荒欲來衝雪刃未免露鋒鋩當恁麼時釋迦老子出頭不得即不問你諸人祇如馬鐙裏藏身又作麼生話會上堂善鬬者不顧其首善戰者必獲其功其功既獲坐致太平太平既致高枕無憂罷拈三尺劍休弄一張弓歸馬于華山之陽放牛于桃林之野風以時而雨以時漁父歌而樵人舞雖然如是堯舜之君猶有化在爭似乾坤收不得堯舜不知名渾家不管興亡事偏愛和雲占洞庭薦福本禪師上堂高揖釋迦不拜彌勒者與三十拄杖何故為他祇會步步登高不會從空放下東家牽犂西家拽耙者與三十拄杖何故為他祇會從空放下不會步步登高山僧恁麼道還有過也無衆中莫有點檢得出者麼若點檢得出須彌南畔把手共行若點檢不出布袋裏老鴉雖活如死上堂釋迦掩室於摩竭淨名杜口於毗耶須菩提唱無説而顯道釋梵絶視聽而雨華大衆者一隊不唧𠺕漢無端將祖父田園私地結契各據四至界分方圓長短一時花擘了也致令後代兒孫千載之下上無片瓦蓋頭下無卓錐之地博山當時若見十字路頭掘箇無底深坑喚來一時埋却免見遞相鈍置何謂如此不見道家肥生孝子國霸有謀臣靈巖性禪師上堂勘破了也放過一著是衲僧破草鞋現修羅相作女人拜是野狐精魅打箇圓相虗空裏下一點是小兒伎倆攔腮贈掌拂袖便行正是業識茫茫無本可據直饒向黑豆未生已前一時坐斷未有喫靈巖拄杖分敢問大衆且道為人節文在甚麼處還相委悉麼自從春色來嵩少三十六峰青至今淨慈充禪師上堂世尊不説説迦葉不聞聞卓拄杖曰水流黃葉來何處牛帶寒鴉過遠村上堂舉卍庵先師道坐佛床斫佛腳不敬東家孔夫子却向他鄉習禮樂師曰入泥入水即不無先師爭奈寒蟬抱枯木泣盡不回頭卓拄杖曰灼然有不回頭底淨慈向升子裏禮汝三拜上堂三世諸佛無中説有莨𦿆拾花針六代祖師有裏尋無猿猴探水月去此二途如何話會儂家不管興亡事盡日和雲占洞庭昭覺淵禪師上堂曰鎔瓶盤叉釧作一金攪酥酪醍醐成一味如是賓主道合內外安和五位君臣齊透四種料揀一串放行則細雨濛濛秋風颯颯把住則空空如也誰敢正眼著且道放行為人好把住為人好復曰等間一似秋風至無意涼人人自涼華藏權禪師上堂禪禪無黨無偏迷時千里隔悟在口皮邊所以僧問石霜如何是禪霜云㼾甎又僧問睦州如何是禪州云猛火著油煎又僧問首山如何是禪山云猢猻上樹尾連顛大衆道無橫徑立處孤危此三大老行聲前活路用劫外靈機若以衲僧正眼檢點將來不無優劣一人如張良入陳一人如項羽用兵一人如孔明料敵若人辨白得可與佛祖齊肩雖然如是忽有箇衲僧出來道長老話作兩橛也適來道道無橫徑無黨無偏而今又却分許多優劣且作麼生祇對還委悉麼把手上山齊著力咽喉出氣自家知大溈鑑禪師上堂木落霜空天寒水冷釋迦老子無處藏身拆東籬補西壁撞著不空見菩薩請示念佛三昧也甚奇怪却向道金色光明雲參退喫茶去承天連禪師上堂拈拄杖曰諸供養中法供養最勝所謂法供養者山供養水水供養山僧堂供養佛殿佛殿供養僧堂諸人供養老僧老僧供養諸人良久曰供養已畢念普供養真言老僧忘却且教拄杖子念與諸人卓一下云靜處薩婆訶竺原元禪師示衆諸方為人抽釘拔楔解粘去縛我者裏為人添釘著楔加繩加縛了送向深潭裏待他自去理會隱靖岑禪師上堂今朝八月初五如事分明為舉嶺頭漠漠秋雲樹底鳴鳩喚雨昨夜東海鯉魚吞却南山猛虎雖然有照有用畢竟無賓無主唯有文殊普賢住住我識得你
