body:
  text: 武林十八㵎理安禪寺住持婁東行悅集元旦提綱師子端禪師新歲上堂新歲新春雪又濃森羅萬象盡皆同相逢莫認者般事筋斗全拋示祖風遂打筋斗下座無用寬禪師元旦上堂太湖梁山徹底掀翻一柄無用拂子擊開黃龍三關大衆各各起居多福卓拄杖一下云只看趙州無字不必東卜西卜下座元旦上堂太湖山上賀新年萬象森羅笑揭天驚得泥牛吞石虎塵塵剎剎自安然喝一喝云風調雨順祝皇元下座天如則禪師新年示衆憍陳如上座禾山殷打鼓牛尾巴說禪烏楖𣗖下語說禪云臘月三十昨日去正月初一今日來下語云夜暗晝明去是誰去天高地濶來是誰來獅林好箇上堂被他抄前說了只落得打箇問訊燒香喫茶仰山簡禪師元旦上堂新律才分霞光報曉天色欲暖還冷氣候似冬忽春蓋鴻蒙之象初升乃嚴凝之寒未退時須傾刻已屬東君勿此為勞共稱得歲剛有一人不在斯限天地無由蓋載寒暑豈得推遷日月莫諧照臨陰陽卒難變易若教此人受歲終是不甘時節到來又爭諱得且道受歲人與不受歲人兩家相見如何作賀良久曰寒隨一夜去春逐五更來唯庵然禪師歲旦上堂元正啓祚萬物咸亨驀拈拄杖云拄杖子昨夜抽條今朝吐蘂花開五葉香遍大千且道當得新年頭佛法也無卓拄杖喝一喝鐵關樞禪師元旦謝監寺上堂三世諸佛六代祖師天下老和尚竪拂子總在拂子頭上慶賀新元令旦普山將栗棘蓬普同供養吞一任吞吐一任吐吞不下吐不出未免喪身失命喝一喝石屋珙禪師歲旦上堂鐘樓上念讚床腳下種菜勝首座道猛虎當路坐福源者裏山門頭賀正歌唱佛殿裡祝聖諷經一種是聲無限意有堪聽有不堪聽諸人還曾檢點得出麼喝一喝下座歲朝上堂鏡清道新年頭佛法有明教道新年頭佛法無道是有也未必有道是無也未必無張公喫酒李公醉趙州東壁掛葫蘆元叟端禪師元旦上堂昨日喚今朝作新歲今朝喚昨日作舊年且如何是物不遷義擊拂子嶺上寒梅才破雪城邊楊柳已含煙元旦上堂舊﨟昨朝送新春今日迎九天騰瑞氣萬國靄歡聲笑隱欣禪師元旦上堂元正啓祚萬物咸新海宇歡呼人天交慶直得石女倒騎鐵馬踏破虗空木人鞭動泥牛耕翻碧落阿呵呵會也麼有意氣時添意氣不風流處也風流元旦上堂金剛正體露堂堂萬象森羅般若光泯去來機超當念無陰陽地理全彰木雞報曉啼深巷石女迎春出洞房共喜龍湖多瑞氣天風時送御爐香恕中慍禪師元旦上堂新年頭有一句子舉似諸人者一句子即是父母未生已前底句子不得向舉起處承當不得向意根下卜度但見皇風成一片不知何處是封疆元旦上堂新年頭佛法觸處皆現成憧憧賀歲客倒屣相歡迎笑指好天氣風日猶和明必定田稻熟鼓腹歌太平大衆忽遇上上人來又作麼生祗待青原酒趙州茶三杯兩盞醉臥煙霞大底風流出當家呆庵莊禪師元旦上堂天得一以清地得一以寧君王得一致太平衲僧得一滴水氷生拈拄杖只如拄杖子得一時如何直示新年頭佛法敲風打雨任縱橫靠拄杖正旦上堂一切無情皆有佛性晨朝起來慶賀新年法堂上撞著露柱禮他三拜有何不可安樂山神無端性懆鼓合點胸尊者在佛殿基上說是說非總與二十拄杖趂出趙州關外去也不見道三千條令主者施行元旦上堂新年頭不可與諸人葛藤德山棒臨濟喝拈放一邊你道趙州和尚使得十二時辰還有勘驗處也無擊拂子家家門前赫日月太平不用將軍威元旦上堂老僧未開口已前一切時一切處普光心印文彩全彰待汝著眼來早是塗糊了也今朝特為點出普請諸人證據驀拈拄杖卓一下云新年把筆萬事大吉靠拄杖下座天目禮禪師歲旦上堂昨朝殘雪今日新年互相慶賀禮數周旋惟有能仁到老不辨推遷舉頭天外看渾是舊山川楚石琦禪師歲旦上堂拈拄杖云山僧一條拄杖不曾胡亂打人今日新正開封去也釋迦老子達磨大師放過不可自餘之輩車載斗量利劍不斬死漢忽有人出來道長老聻劈脊便棒不是與人難共住大都緇素要分明靠拄杖下座歲旦上堂拈拄杖云新年頭有佛法拄杖子也未敢相許新年頭無佛法拄杖子也未敢相許離四句絶百非總是諸方舊話子拄杖子也未敢相許畫一畫元正啓祚萬物咸新歲旦上堂今年年是去年年年去年來知幾年昨日日是今日日日出日入非一日只箇無去來無出入年年是好年日日是好日四溟東海流般若波羅密歲旦上堂祖師道果滿菩提圓花開世界起拈拄杖云一花開也是桃是李今日新年頭昨日舊年尾識得本來人無憂亦無喜卓一下云處處緑楊堪繫馬家家門底透長安歲旦上堂舉香嚴云去年貧未是貧今年貧始是貧去年貧有卓錐之地今年貧錐也無真淨云去年富未是富今年富始是富去年富惟有一領黑黲布衫今年添得一條百衲袈裟歲朝抖擻呈禪衆實謂風流出當家師云香嚴貧未是貧奈何猶有箇渾身真淨富未是富家私未免俱呈露鳳山者裏不說富不說貧隨家豐儉沒疏親竪拂子收來兔角長三尺放去龜毛重九斤歲旦上堂半夜起來赴省堂焚祝焚祝了丞相府諸衙門人事人事畢即回殿堂行香撒沙呪土繞廊行道次第諸山報禮准備接官若作新年頭佛法會入地獄如箭射正旦上堂三百六旬之始二十四氣之初斗柄回春風光奪目或晝短而夜長或夜短而晝長或暑往而寒來或暑來而寒往花根本豔虎體元斑雖然不改舊時人未免人人添一歲召衆云祇者一歲添到盡未來際那裏洎在愚庵及禪師上堂元正啓祚萬物咸新井底蓬塵蔽日山上鯉魚拏雲且不涉時緣一句作麼生道拈拄杖云拄杖今朝添一歲拈來依舊黑粼皴了庵欲禪師上堂新年換舊年打破又完全衲僧雖不薦鼻孔已遼天看看蟭螟睫上放夜市大蟲舌上打鞦韆喝元旦上堂月生一三世如來從此出月生二突出如來祖師意月生三森羅萬象競頭參拍禪床云皇基磅礴三千界寶曆開端億萬年上堂元正改旦一句全提萬機休罷千聖不擕紫烟籠帝闕睿算與天齊上堂正旦值庚申成湯德日新皇元開鳳曆八萬四千春元旦上堂元正啓祚上馬見路萬物咸新觸處通津恭惟頭首大衆雖是死蛇却要活弄各各道體起居萬福獅子哮吼象王回旋虎拜稽首天子萬年用彰俊禪師歲旦上堂舊歲欲去未去之際新年欲來未來之時已是泄天機於言下露真智於衆前了也今日開端擊鼓集衆且道說什麼法即得良久大衆露柱大燈籠一歲燈籠大古佛一歲古佛大虗空一歲住住若不喝住幾乎數到自己便下座南石琇禪師元旦上堂元正啓祚萬物咸新年新月新日新時新大地山河纖洪動植一一俱新且道衲僧分上事還有新舊也無喝一喝下座玉芝聚禪師元旦上堂撇眼流光如箭急今朝又是正月一家家門上貼桃符大鬼小鬼都竄匿猶有一箇不順陰陽的漢古貌堂堂無朕迹明逾日黑逾漆鬱壘眼睛不及今日被山僧捉敗了也特與諸人報消息咄佛殿裏祝讚僧堂前雲集無趣空禪師元旦示衆今日是三百六旬第一日家家戶戶慶新年皇皇春令行天下合國羣臣祝聖延大明九重殿上八方司府堂前錦袍簇簇玉佩便便恭前鞠後俯仰周旋揚塵舞蹈萬歲聲喧威儀三百禮儀三千一時頓現若作國禮商量不唯背了如來此外更無佛法若作佛法領會不唯背了天子此外更無國禮畢竟作麼生始得禮法併致一道流通遂舉拂子鞠躬云皇圖鞏固帝道遐昌以拂子打一圓相云佛日增輝仁風永扇密雲悟禪師歲旦上堂新年新月新日新時長老又披新法衣拈衣云者箇是衣如何是法放下衣云九九百百張七趙八孟春猶寒不得露骨喝一喝下座箬庵問禪師元旦升座山僧有一句子去年不曾道前年不曾道先前年不曾道幸逢時節因緣豈可等閒拋却諸上座一總立定聽山僧為你舉似以拄杖橫按云大明國土中崇禎聖天子在上十五年過了歲序逢正今日是第一日元旦上堂首出庶物萬國咸寧朝來洗面摸著鼻一陳好風來戶清燈籠傾聽露柱側聆放出樵童牧竪縱橫敵勝驚群一任高高山頂立深深水底行大家把手樂升平且把手一句作麼生決定今年蠶麥熟羅睺羅兒與一文元旦上堂祖師心印狀似鐵牛之機去即印住住即印破孤峯凜凜赤手全提你才恁麼我不恁麼你不恁麼我却恁麼主賓互換權實雙彰是他伶俐衲僧自然緇素逈別忽若囫圇吞棗不免孤他先聖昧自己靈山河大地礙却眼光明暗色空填置胸臆栗棘蓬且作麼生吞金剛圈且作麼生跳臨濟三玄洞山五位翻成剩法所以道得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺藜之園到者裏忽有箇漢出來拈頭作尾拈尾作頭能為佛祖之師堪作人天之眼磬室拄杖兩手分付有麼元正咨祚萬物咸亨應時納祐慶無不宜喝一喝下座元旦升座徹骨徹髓坐斷千山截鐵斬釘整新一句以此報國以此福民以此利益群生以此展開家法直得龍吟霧起虎嘯風生萬象昭回森羅顯煥頭頭成現法法全彰洞明佛祖向上一機廓示人天正法眼藏放行也不動一絲毫把住也何曾匿光彩伶俐漢向者裏著得一隻眼便能荷負綱宗提持大法匡扶知識贊弼叢林拈芥子作須彌轉長河為酥酪慶一人之有道樂四海之宴清共助無為同明化日也不為分外且道正當恁麼時還有恁麼人麼卓拄杖云一點春和資氣力萬年松挺雪霜姿弘覺忞禪師歲旦上堂元正啓祚萬物咸新恭惟首座大衆各各道體起居萬福驀撫掌呵呵大笑云好笑好笑笑得人肚腸筯欲斷你道山僧笑箇甚麼昨夜四更頭大禹王成湯王周武王相共拜賀新正因即雲門山頂大晏昊天玉闕之宮酒半酣間武王起身勸飲行箇令子以新正即景席上生風為號勝者免飲負者罰酒於是載言曰天開於子地闢於丑人生於寅周正建子天統也商正建丑地統也夏正建寅人統也三才者天為首地次之人又次之商王負夏禹王大負當飲青州從事三大甌飛觥欲舉湯王曰寡人不應受罰易曰乾在坤上曰否坤在乾上曰泰然則周王固欲否而不欲泰乎夏禹王曰寡人亦不應受罰書曰天降下民作之君作之師夏正建寅所以便民事也是故顏淵問為子曰行夏之時不覺語高聲喧驚醒了山洞裏石陳摶底睡起來打箇呵缺矢口朗吟曰洞裏無雲別有天桃花如錦柳如烟仙家不會論冬夏石爛松枯又一年三后聞之無著慚惶處亟命車駕司回輦而去爾等諸人還曾得知也未喝一喝云除却華山陳處士誰人不帶是非行朝宗忍禪師元旦上堂拈香云此一瓣香祝延當今新帝聖壽無疆伏願清四海之妖氛大中興之德業問答不録乃云若論此事如老年底人與少年底人過節相似總是箇歲朝景況若是少年底人便覺自身與目前一切人境煥然一新即向來所厭所棄底亦頓改觀咸同慶賀欣喜無量正所謂說似人不得呈似人不得底境界若是老年底人經歷已多雖亦共相拜慶未免一切平懷所以道任從天下樂欣欣我獨不肯又道八十翁翁入場屋真誠不是小兒戲此便是從上最初末後底關節諸人若能透此兩關自然親見古人立地處雖然只如不老不少底人又似箇甚麼驀云新年頭佛法不可多說且待諸人透此兩關來更向你說下座立春日提綱長慶圓禪師立春上堂寒氣將殘春日到無索鐵牛皆𨁝跳築著崑崙鼻孔頭觸倒須彌成糞掃牧童兒鞭棄了懶吹無孔笛拍手呵呵笑歸去來兮歸去來煙霞深處和衣倒良久曰切忌睡著中庵空禪師春日上堂拈拄杖卓一下云先打春牛頭又卓一下曰後打春牛尾驚起虗空入藕絲裏釋迦無路潛蹤彌勒急走千里文殊却知落處拊掌大笑歡喜且道歡喜