body:
  text: 武林十八㵎理安禪寺住持婁東行悅集檀越特請普說大慧杲禪師錢計議請普說僧問昔日僧問楊岐和尚如何是佛答云三腳驢子弄蹄行未審意旨如何師云天上天下沒蹤跡進云只如威音王已前是甚麼人騎師云威音王已後是甚麼人騎僧擬議師便喝乃云威音王已前三腳驢兒𨁝跳威音王已後楊岐老人絶消息既絶消息却因甚麼三腳驢兒𨁝跳若也於斯明得方知威音王已前三腳驢兒果然𨁝跳若明不得楊岐老人一生受屈正當恁麼時如何是雪屈一句喝一喝云洎合弄險復云蘊聞上座今日代子虗來請為衆普說老漢曰說箇甚麼即得聞曰請和尚拈出楊岐金剛圈栗棘蓬布施大衆又曰如忠國師大珠和尚說法諸方大有疑其拖泥帶水不徑截說義理禪願和尚疏决真僞解大衆疑惑此亦是請普說檀越之意老漢曰諾所以大覺世尊初悟此事在摩竭提國三七日內無下口處自云我寧不說法疾入於涅槃信知說法之難豈同容易尋念過去佛所行方便力然後起道樹詣鹿苑隨衆生根器說一大藏教末後收因結果却云始從鹿野苑終至跋提河於是二中間未曾說一字只者便是楊岐所謂金剛圈栗棘蓬也直是難吞難透到者裏直下承當得了大法未明亦奈何不得敢問諸人何者名為大法金剛圈却如何透栗棘蓬却如何吞不見巖頭道若將實法繫綴人土亦銷不得况十方信施耶諸佛出世祖師西來無非只為你諸人作箇證明底主宰而已若有法可傳可授則諸佛慧命豈到今日故祖師云心地隨時說菩提亦只寧事理俱無礙當生即不生若會得此四句即透得金剛圈吞得栗棘蓬不須要明大法大法自明矣以至古人差別異旨因緣心性玄妙大法若明才舉起時便會得恰如磁石見鐵相似輕輕一引便動須是舉一明三目機銖兩點著南邊動北邊舉起時便明得而今諸方有數種邪禪大法若明只者邪禪便是自己受用家具好擊石火閃電光一棒一喝底定不愛說心說性者只愛機鋒俊快謂之大機大用好說心說性底定不愛擊石火閃電光一棒一喝者只愛絲來線去謂之綿綿密密亦謂之根腳下事殊不知正是箇沒用處弄泥團底漢看他前輩大法明底尊宿用處轉轆轆地如南陽忠國師大珠和尚是也唯楊文公具眼修傳燈録時將忠國師大珠和尚列在馬祖下諸尊宿之右將廣語所有言句盡入其中六祖下收忠國師語最多為他家活大門戶大法性寬波瀾闊難湊泊遮般法難說他禪備衆體如三喚侍者話喚作說老婆禪拖泥帶水得麼一日喚侍者侍者應諾如是三喚侍者三應師云國師三喚侍者何曾有辜負侍者三應甚麼處是辜負處國師曰將謂吾辜負汝誰知汝辜負吾師云平地起骨堆復云叢林中喚作國師三喚侍者話自此便有一絡索唯雪竇見透古人骨髓云國師三喚侍者點即不到師云灼然侍者三應到即不點師云却不恁麼將謂吾辜負汝誰知汝辜負吾謾雪竇不得師云誰道復召大衆云好箇謾雪竇不得雖然如是雪竇亦謾妙喜不得妙喜亦謾諸人不得諸人亦謾露柱不得玄沙云侍者却會雪竇云停囚長智師云兩彩一賽雲門道作麼生是國師辜負侍者處會得也是無端雪竇云元來不會師云雪峯道底雲門又云作麼生是侍者辜負國師處粉骨碎身未報得雪竇云無端無端師云垛生招箭法眼云且去別時來雪竇云謾我不得師云却是法眼會興化云一盲引衆盲雪竇云端的瞎師云親言出親口弘覺徵問僧云甚處是侍者會處僧云若不會爭解恁麼應覺云汝少會在又云若於此見得去便識玄沙師云慚惶殺人翠巖芝云國師侍者總缺會在師云猶較些子投子云抑逼人作麼雪竇云垛根漢師云理長即就復云唯有趙州多口阿師下箇得注腳令人疑著僧問國師三喚侍者意旨如何州云如人暗中書字字雖不成文彩已彰雪竇便喝師云且道者一喝在國師侍者分上在趙州分上隨後喝一喝復云若不是命根五色索子斷如何透得者裏過雪竇云若有人問雪竇雪竇便打也要諸方檢點師云作賊人心虗雪竇復有一頌云師資會遇意非輕師云此語有兩負門無事相將草裏行師云普州人送賊負汝負吾人莫問師云放待冷來看任從天下競頭爭師云即今休去便休去若覓了時無了時復云你要求玄妙解會只管理會國師三喚侍者話那裏是國師辜負侍者處那裏是侍者辜負國師處有甚麼交涉鵝王擇乳素非鴨類者箇便是國師用劍刃上事為復只者些子為復別更有在一日問紫璘供奉甚麼處來奉曰城南來國師曰城南草作何色奉曰作黃色國師乃問童子城南草作何色童子曰作黃色國師曰只者童子亦可簾前賜紫對御談玄你道國師說老婆禪拖泥帶水得麼為復只者些子為復別更有在一日肅宗帝請看戲國師曰檀越有甚心情看戲法雲圓通禪師曰且道國師在甚處著到妙喜敢問諸人且道圓通禪師在甚處著到於斯見得三老相去不遠肅宗帝又問如何是十身調御國師直拔向他道檀越踏毗盧頂上行更問甚麼十身調御諸人要見忠國師麼只在你眼睛裏開眼也蹉過合眼也蹉過既在眼睛裏為甚麼却蹉過妙喜恁麼道亦蹉過不少你更看他有箇無情說法話老漢尋常不曾說今日已是不識好惡不避口業盡情為諸人抖擻為他雪屈且不得作義理會僧問如何是古佛心國師曰牆壁瓦礫是師云恁麼答話若玄妙解路心不絶命根不斷大法不明決定不敢如此四楞塌地一棒一喝一挨一拶擊石火閃電光却易者般說話却難入作前所謂家活大門戶大法性寬波瀾闊命根斷方能如是僧曰牆壁瓦礫豈不是無情國師曰是僧曰無情還解說法否國師曰常說熾然說無間歇僧曰某甲為甚麼不聞國師曰汝自不聞不可妨他聞者也僧曰未審甚麼人得聞國師曰諸聖得聞僧曰和尚還聞否國師曰我不聞僧曰和尚既不聞爭知無情解說法國師曰賴我不聞我若聞則齊於諸聖汝即不聞我說法僧曰恁麼則衆生無分也國師曰我為衆生說不為諸聖說僧曰衆生聞後如何國師曰即非衆生師云奇哉你看他轉轆轆地不滯在一隅不負他來問賴我不聞我若聞則齊於諸聖汝即不聞我說法你喚作郎當得麼不是得諸佛諸祖心髓如何轉得你莫喚作無得失者箇是無得失中有得失有得失中無得失喚作入泥入水騎賊馬趕賊隊借婆帔子拜婆年難奈何又僧問發心出家本擬求佛未審如何用心即得成佛國師曰無心可用即得成佛師云者僧難容恰如箇鼠黏子相似者箇老子軟頑又撞著者僧軟頑黏住便問無心可用阿誰成佛國師曰無心自成佛成佛亦無心僧曰佛有大不可思議為能度衆生若也無心阿誰度衆生國師曰無心是真度生若見有生可度者即是有心宛然生滅僧曰今既無心能仁出世說許多教跡豈可虗言國師曰佛說教亦無心僧曰說法無心應是無說國師曰說即無無即說僧曰說法無心造業有心否國師曰無心即無業今既有業心即生滅何得無心僧曰無心即成佛和尚即今成佛未國師曰心尚自無誰言成佛若有佛可成還是有心有心即有漏何處得無心僧曰既無佛可成和尚還得佛用否國師曰心尚自無用從何有僧曰茫然都無莫落斷見否國師曰本來無見阿誰道斷僧曰本來無見莫落空否國師曰無空可落僧曰有可墮否國師曰空既是無墮從何立僧曰能所俱無忽有人持刀來取命為是有是無國師曰是無僧曰痛否國師曰痛亦無僧曰痛既無死後生何道國師曰無死無生亦無道僧曰既得無物自在饑寒所逼若為用心國師曰饑即喫飯寒即著衣僧曰知饑知寒應是有心國師曰我問汝有心心作何體段僧遲疑良久覓心與饑寒體段了不可得遂依實供通曰心無體段國師曰汝既知無體段即是本來無心何得言有僧曰山中逢見虎狼如何用心國師曰見如不見來如不來彼即無心惡獸不能加害僧曰寂然無事獨脫無心名為何物國師曰名金剛大士師喝一喝云好人不肯做却要屎裏臥僧曰金剛大士有何體段國師曰本無形段師云何不早恁麼道僧曰既無形段喚何物作金剛大士國師曰喚作無形段金剛大士僧曰金剛大士有何功德國師曰一念與金剛相應能滅殑伽沙劫生死重罪得見殑伽沙諸佛其金剛大士功德無量非口所說非意所陳假使殑伽沙劫住世說亦不可得盡者僧當下大悟如睡夢覺如蓮華開似者般底便是金剛圈栗棘蓬你若吞不得透不得不見古人行履處定起謗無疑透得者裏方能作大舟航不著此岸不著彼岸不住中流善知識下得者般腳手入得者般窠窟方始為得人師家若不具許多差別眼目如心性解路上得箇入處底定不愛擊石火閃電光却愛者般說話又却錯做實法會了如一機一境一棒一喝上得箇入處底定不愛者般說話又是錯會了真所謂所見不同互有得失教中所謂菩薩見水如甘露天人見水如琉璃凡夫見水是水餓鬼見水如膿血是也或有箇愛高禪底衲子出來道妙喜有如是等見耶即向他道逢人但恁麼舉所以正法眼藏中收僧問忠國師古德云青青翠竹盡是法身鬱鬱黃華無非般若有人不許云是邪說亦有信者云不思議不知若為國師曰此蓋普賢文殊境界非諸凡小而能信受皆與大乘了義經意合故華嚴經云佛身充滿於法界普現一切群生前隨緣赴感靡不周而恆處此菩提座翠竹既不出於法界豈非法身乎又般若經云色無邊故般若亦無邊黃華既不越於色豈非般若乎深遠之言不省者難為措意又華嚴座主問大珠和尚曰禪師何故不許青青翠竹盡是法身鬱鬱黃華無非般若珠曰法身無像應翠竹以成形般若無知對黃華而顯相非彼黃華翠竹而有般若法身故經云佛真法身猶若虗空應物現形如水中月黃華若是般若般若即同無情翠竹若是法身翠竹還能應用座主會麼主曰不了此意珠曰若見性人道是亦得道不是亦得隨用而說不滯是非若不見性人說翠竹著翠竹說黃華著黃華說法身滯法身說般若不識般若所以皆成諍論師云國師主張青青翠竹盡是法身直主張到底大珠破青青翠竹不是法身直破到底老漢將一箇主張底將一箇破底收作一處更無拈提不敢動著他一絲毫要你學者具眼透國師底金剛圈又吞大珠底栗棘蓬具眼者辨得出不具眼者未必不笑宗杲雖參圜悟和尚打失鼻孔元初與我安鼻孔者却得湛堂和尚只是為人時下刃不緊若是說禪病無人過得嘗思教中有一段因緣殃崛摩羅要千人指頭作華冠然後登王位已得九百九十九指唯少一指要斷其母指填數佛知其緣熟故往化之殃崛才舉意欲下刀取母指時忽聞振錫聲遂捨其母指而問佛教化一指曰既是瞿曇在此望施我一指頭滿我所願才舉刀世尊拽脫便去世尊徐行殃崛急趕不上乃高聲叫曰住住世尊曰我住久矣是汝不住殃崛忽然感悟投佛出家佛却令持鉢至一長者門其家婦人正值産難長者曰瞿曇弟子汝為至聖當有何法能免産難殃崛曰我乍入道未知此法待我回問世尊却來相報及返具事白佛佛告殃崛汝速去報言我自從賢聖法來未曾殺生殃崛當便奉佛語往彼告之其婦得聞即免産難師云者裏使棒使喝掀倒禪床引經教說理事擊石火閃電光夜半捉烏雞得麼因請益湛堂和尚才舉起此話湛堂曰你𭺗著我癢處者話是金屎法不會如金會得如屎曰豈無方便湛堂曰我有箇方便只是你剗地不會曰望和尚慈悲湛堂曰殃崛云我乍入道未知此法待問世尊未到佛座下他家生下兒子時如何我自從賢聖法來未曾殺生殃崛持此語未至他家已生下兒子時如何老漢當時理會不得後因在虎丘看華嚴經至菩薩登第七地證無生法忍云佛子菩薩成就此忍即時得入菩薩第八不動地為深行菩薩難可知無差別離一切相一切想一切執著無量無邊一切聲聞辟支佛所不能及離諸喧諍寂滅現前譬如比丘具足神通得心自在次第乃至入滅盡定一切動心憶想分別悉皆止息此菩薩摩訶薩亦復如是住不動地即捨一切功用行得無功用法身口意業念務皆息住於報行譬如有人夢中見身墮在大河為欲度故發大勇猛施大方便以大勇猛施方便故即便𭔏窹既𭔏窹已所作皆息菩薩亦爾見衆生身在四流中為救度故發大勇猛起大精進以勇猛精進故至此不動地既至此以一切功用靡不皆息二行相行皆不現前此菩薩摩訶薩菩薩心佛心菩提心涅槃心尚不現起况復起於世間之心師云到者裏打失布袋湛堂為我說底方便忽然現前方知真善知識不欺我真箇是金剛圈須是藏識明方能透得又有箇尊宿喚作洛浦和尚久為臨濟侍者濟每稱美之謂之臨濟門下一隻箭子便是欺負人游歷罷直往夾山頂卓菴經年夾山知乃修書遣僧馳到洛浦接得便坐却再展手索僧無對浦便打曰歸去舉似和尚僧回舉似夾山山曰者僧看書三日內必來若不看書此人救不得師云古人喚作撈摝人不知書中有甚閒言長語洛浦却吞他鈎線三日內果來夾山預令人伺其出菴便燒其居師云只者便是金剛圈浦不顧師云成佛作祖須是者般漢直造夾山方丈不禮拜乃當面叉手而立山曰雞棲鳳巢非其同類出去浦曰自遠趨風乞師一接山曰目前無闍梨此間無老僧浦便喝山曰住住且莫草草匆匆雲月是同溪山各異截斷天下人舌頭即不無闍黎爭教無舌人解語師云洛浦却低頭思量者一道真言理會不得被夾山劈脊便打穿了鼻孔遂承嗣夾山後來示衆道末後一句始到牢關把斷要津不通凡聖須知上流之士不將佛祖見解貼在額頭上如靈龜負圖自取喪身之本師云他悟後便解明他者一道真言者些子藥頭不問雲門下臨濟下曹洞下法眼下溈仰下大法若不明各宗其宗各師其師各父其父各子其子只管理會宗旨熱大不緊老漢在衆中時嘗請益一尊宿禪門中說有語中無語無語中有語尊宿為我引證云有語中無語路逢死蛇莫打殺無底籃子盛將歸喚者箇作有語中無語又喚作無語中有語如何是有語中無語路逢死蛇莫打殺如何是無語中有語無底籃子盛將歸只者一句便具此兩義路逢死蛇莫打殺是無語中有語無底籃子盛將歸乃是有語中無語謂既是死蛇更不消打殺又云如何是同中有異鷺鷥立雪非同色如何是異中有同明月蘆華不似他我如此說時你便會得了却濟得甚麼事似者般底莫要學大法明後舉一絲毫便一時會得恰似殃崛摩羅因緣湛堂說底方便我乍入道也使不著佛有神通也使不著既使不著因甚麼生下兒子若向者裏見得釋迦老子即是殃崛摩羅殃崛摩羅即是釋迦老子若也不會釋迦自釋迦殃崛自殃崛不干産難人家事乃合掌云即將上來舉揚般若所有一言一句契佛契祖底功德奉為計議錢公薦室安人呂氏伏願出此沒彼常為般若之親姻捨身受身永作菩提之眷屬召大衆云還委悉麼若欲直下便休去莫記我今說底喝一喝下座傅經幹請普說師云經幹道友妙喜初不相識去歲經由衡陽特來相訪一見便如故人蓋為信得此段大事因緣及何以故豈不見華嚴會上智首菩薩問文殊師利菩薩言佛子菩薩云何得無過失身語意業等事文殊答以善用其心則獲一切勝妙功德為說行住坐臥四威儀中一百四十大願謂之無濁亂清淨行大功德此功德皆從信地而發故文殊普為已發信心者作不請友以偈問賢首菩薩曰我今已為諸菩薩說佛往修清淨行仁亦當於此會中演暢修行勝功德賢首菩薩以偈答之其中曰以法威力現世間則獲十地十自在亦是說初發心從信地起之義末後善財到毗盧樓閣前彌勒為說一百二十種菩提心亦是此義其中有一種喻曰如獅子王哮吼獅子兒聞皆增勇健餘獸聞之即皆鼠伏佛獅子王菩提心吼應知亦爾諸菩薩聞增長功德有所得者聞皆退散亦是此義既有信根即是成佛基本忽地與現行相應便證阿耨多羅三藐三菩提如釋迦老子初在正覺山前舉頭見明星出現忽然悟道遂乃歎曰奇哉一切衆生具有如來智慧德相但以妄想執著而不證得謂上至十方諸佛下至六道四生含蠢蠕動於我悟處以平等印一印印定更無差別你看黃面老子才悟了便見得如此廣大然後興慈運悲於生死海不著此岸不著彼岸不住中流而能運載此岸衆生到於彼岸不住生死中流者箇道理亦不出自家信種所以無盡居士著海眼經題說佛成就云始覺合本之謂佛他雖是箇俗人然却見得徹識得根本謂始覺時從明星上起信忽然覺悟自性本來是佛大地有情更無差別無盡喚作始覺合本覺方始成佛參禪人能恁麼辨白得了然後休歇身心識取本來面目不要粗心古聖得了便於得處滅却生滅心亦不住在寂滅地謂之寂滅現前於寂滅地獲二殊勝一者上合十方諸佛與佛如來同一慈力二者下合六道衆生與諸衆生同一悲仰前所云興慈運悲救拔惡道是也衆生為不覺故輪轉生死先覺之士若無慈悲如何得衆生界空信知佛恩難報今日經幹道友請妙喜普說不獨為先考承事追修而已要與現前一衆說些禪病故柳子厚以天台教為司南言禪病最多誠哉是言天台智者之教以空假中三觀攝一切法教人把本修行禪無文字須是悟始得妙喜自十七歲便疑著此事恰恰參十七年方得休歇未得已前常自思惟我今已幾歲不知我未託生來南閻浮提時從甚麼處來心頭黑似漆竝不知來處既不知來處即是生大我百年後死時却向甚麼處去心頭依舊黑漫漫地不知去處既不知去處即是死大謂之無常迅速生死事大你諸人還曾恁麼疑著麼現今坐立儼然孤明歷歷地說法聽法賓主交參妙喜簸兩片皮牙齒敲磕臍輪下鼓起粥飯氣口裏忉忉怛怛在者裏說說者是聲此聲普在諸人髑髏裏諸人髑髏同在妙喜聲中者箇境界他日死了却向甚處安著既不知安著處則撞入驢胎馬腹亦不知生快樂天宮亦不知禪和子尋常於經論上收拾得底問著無有不知者士大夫向九經十七史上學得底問著亦無有不知者離却文字絶却思惟問他自家屋裏事十箇有五雙不知他人家事却知得如此分曉如是則空來世上打一遭將來隨業受報畢竟不知自家本命元辰落著處可不悲哉所以古人到者裏如救頭然尋師決擇要得心地開通不疑生死然有學而知之者有生而知之者那箇是學而知之者如僧問趙州學人乍入叢林乞師指示州云你喫粥了也未僧云喫粥了州云洗鉢盂去僧於言下忽然大悟當下休歇便知生死去處妙喜常說不易者僧有力量趙州將一百二十斤檐子一送送在他肩上者僧荷得一氣走一百二十里更不回頭如將梵位直授凡庸心裏便怗怗地興得慈力運得悲願此是學而知之者那箇是生而知之者如趙州作沙彌時同本師行腳到南泉值南泉臥次本師禮拜了趙州方禮拜南泉問云近離甚處州云近離瑞像泉云還見瑞像麼州云瑞像則不見面前只見臥如來南泉遂起問你是有主沙彌無主沙彌州云是有主沙彌泉云那箇是你主若是如今禪和家便近前彈指打箇圓相喝一喝拍一拍拂袖便行放出者般惡氣息你看他趙州緩緩地近前道孟春猶寒伏惟和尚尊候萬福泉乃喚維那云此沙彌別處安排次日却來問如何是道南泉也不行棒也不下喝也不談玄也不說妙也不牽經也不引論也不舉古人公案亦不說事亦不說理只實頭向他道平常心是道為他趙州已理會得平常心了便却問還假趣向也無泉云擬向即乖州云不擬爭知是道泉云道不屬知不屬不知知是妄覺不知是無記若真達不疑之道猶如太虗廓然蕩豁豈可於中彊是非耶趙州於言下千了百當南泉道道不屬知不屬不知圭峯謂之靈知荷澤謂之知之一字衆妙之門黃龍死心云知之一字衆禍之門要見圭峯荷澤則易要見死心則難到者裏須是具超方眼說似人不得傳與人不得所以圜悟先師說趙州禪只在口脣皮上難奈他何如善用兵者不齎糧行就你水草糧食又殺了你有一秀才問佛不違衆生願是否州云是才云弟子欲就和尚手中乞取拄杖得否州云君子不奪人所好才云某甲不是君子州云老僧亦不是佛又一僧問如何是祖師意州乃敲禪床腳僧云莫只者便是否州云是則脫取去又一僧問諸方盡向口裏道和尚如何示人州以腳跟打火爐示之僧云莫便是也無州云恰認得老僧腳跟又僧問如何是趙州州云東門南門西門北門僧云某甲不問者箇州云你問我趙州聻又僧問如何是道州云牆外底僧云某甲不問者箇道州云你問那箇道僧云某甲問大道州云大道通長安你不得作無事會不得作玄妙會不得作奇特會不得作平常會趙州不在無事上不在玄妙上不在奇特上不在平常上畢竟在甚麼處具眼者辨取者老漢有時云未出家被菩提使出家後使得菩提汝諸人被十二時使老僧使得十二時又云佛之一字吾不喜聞佛之一字尚不喜聞達磨灼然是甚老臊胡十地菩薩是擔糞漢等妙二覺是破凡夫菩提涅槃是繫驢橛十二分教是鬼神簿拭瘡膿紙四果三賢初心十地是守古冢鬼你既不到者箇田地是事理會不得也學人粗走大步便把一句子禪要祗對人且不是者箇道理所以妙喜室中常問禪和子喚作竹篦則觸不喚作竹篦則背不得下語不得無語不得思量不得卜度不得拂袖便行一切總不得你便奪却竹篦我且許你奪却我喚作拳頭則觸不喚作拳頭則背你又如何奪更饒你道箇請和尚放下著我且放下著我喚作露柱則觸不喚作露柱則背你又如何奪我喚作山河大地則觸不喚作山河大地則背你又如何奪有箇舟峯長老云某看和尚竹篦子話如籍沒却人家財産了更要人納物事妙喜曰你譬喻得極妙我真箇要你納物事你無從所出便須討死路去也或投河赴火𢬵得命方始死得死了却緩緩地再活起來喚你作菩薩便歡喜喚你作賊漢便惡發依前只是舊時人所以古人道懸崖撒手自肯承當絶後再蘇欺君不得到者裏始契得竹篦子話復說偈云佛之一字尚不喜有何生死可相關當機覿面難回互說甚楞嚴義八還悅禪人請普說僧問臨濟示衆云有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪如何是奪人不奪境師云三千里外絶誵訛進云如何是奪境不奪人師云拔出眼中楔進云臨濟道煦日發生鋪地錦嬰孩垂髮白如絲未審與和尚答底是同是別師云咬人屎橛不是好狗進云王令已行天下遍將軍塞外絶煙塵時如何師云適來猶自可而今更郎當問十方薄伽梵一路涅槃門未審王氏今日是生耶是死耶師云生耶死耶進云今古應無墜分明在目前師云抽却腦後箭進云只如十二時中不依倚一物人來師還接否師云喚甚麼作一物進云不可重說偈言師云礙塞殺人乃云生耶死耶非得非失不道不道有理有事若向有理有事處得箇入處只在教乘裏頭出頭沒若於非得非失處得箇入處敢保諸人十二時中未有安身立命處既未有安身立命處則不知王氏落處若知得王氏落處即知自己安身立命處且道王氏即今是生耶是死耶是不生耶是不死耶若道不生爭奈死何若道不死爭奈生何若道亦生亦死又是戲論說若道非生非死又是相違說直饒離四句絶百非直下如明鏡當臺明珠在掌胡來現胡漢來現漢當人各各腳跟下淨倮倮明歷歷生死如夢幻空華去來如浮雲水月猶未是徹頭處縱饒如實見得昔日之生本不曾生今日之滅本不曾滅亦是無夢說夢何以故生而不生鏡裏之形滅而不滅水中之月正當恁麼時那裏是王氏出身處若委悉得去王氏只今與諸人把手共行同入如來大寂滅海其或未然有寒暑兮促君壽有鬼神兮妬君福復云者箇是近悅上座為母王氏請妙喜老漢說法底意旨且法作麼生說不見道法不可見聞覺知若行見聞覺知是則見聞覺知非求法也見聞覺知既不可以入道莫是不見不聞不覺不知便是麼良久高聲云更是箇甚麼妙喜盡力說只說得到者裏此事决定不在言語上所以從上諸聖次第出世各各以善巧方便忉忉怛怛唯恐人泥在言語上若在言語上一大藏教五千四十八卷說權說實說有說無說頓說漸豈是無言說因甚麼達磨西來却言單傳心印不立文字語言直指人心見性成佛因何不說傳玄傳妙傳言傳語只要當人各各直下明自本心見自本性事不獲已說箇心說箇性已大段狼籍了也若要拔得生死根株盡切不得記我說底縱饒念得一大藏教如瓶瀉水喚作運糞入不名運糞出却被者些子障却自己正知見不得現前自己神通不能發現只管弄目前光影理會禪理會道理會心理會性理會奇特理會玄妙天似掉棒打月枉費心神如來說為可憐愍者古人凡有一言半句設一箇金剛圈栗棘蓬教伊吞教伊透若是箇英靈獨脫出情塵超理性者金剛圈栗棘蓬是甚麼弄猢猻家具祭鬼神茶飯蓋你不能一念緣起無生只管一向在心意識邊作活計才見宗師動口便向宗師口裏討玄討妙却被宗師倒翻筋斗自家本命元辰依舊不知落處腳跟下黑漫漫依前只是箇漆桶只如適來上座問奪人不奪境一段話只知冊子上念將來如法答他又理會不得問一段未了又問一段恰如村人打傳口令相似我今不惜口業為你諸人葛藤注解一遍臨濟一日示衆云有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪會麼良久左右顧視便下座者箇便是金剛王寶劍我昨日說底將蜈蚣毒蛇蝎子并諸雜毒貯在一甕裏你試將手就中拈一箇不毒底出來看若拈得出不妨於此事有少分相應若拈不出自是你根性遲鈍夙無靈骨也怪妙喜不得臨濟當時道者幾句閒言長語面目現在自是你不會看得出你若領得此意自從胡亂後三十年不少鹽醬鐘樓上念讚床腳下種菜之類不著問人一一自知下落古人垂箇方便豈是閒開口須知爛泥裏有刺當時有箇克符道者理會得臨濟意便出來問如何是奪人不奪境臨濟當時不知那裏得許多閒言長語鬬湊得恰好便道煦日發生鋪地錦嬰孩垂髮白如絲諸人還會麼煦日發生鋪地錦是境嬰孩垂髮白如絲是人此兩句一句存境一句奪人克符又作頌曰奪人不奪境緣自帶聱訛師云有甚麼聱訛擬欲求玄旨思量反責麼師云誣人之罪驪珠光燦爛蟾桂影婆娑師云何不早恁麼道覿面無差互還應滯網羅師云依稀似曲才堪聽又被風吹別調中此頌大槩在驪珠光燦爛蟾桂影婆娑之上蓋此兩句是境學者問不奪境擬欲求玄旨思量反責麼大意只是不可思量擬議思量擬議者人也蹉却覿面相呈一著子即被語言網羅矣克符此頌專明煦日發生鋪地錦所以有驪珠光燦爛蟾桂影婆娑之句乃是存境而奪人故曰覿面無差互還應滯網羅奪人之義醍醐毒藥一道而行具眼者方能辨別又問如何是奪境不奪人答云王令已行天下遍將軍塞外絶煙塵師云王令已行天下遍是奪了境將軍塞外絶煙塵是存人而不奪頌曰奪境不奪人尋言何處真師云也須閒處作隄防問禪禪是妄究理理非親師云好事不如無日照寒光淡山遙翠色新師云貧兒思舊債直饒玄會得也是眼中塵師云自起自倒你要會日照寒光淡山遙翠色新麼此兩句是境直饒玄會得也是眼中塵便奪了也其餘人境兩俱奪人境俱不奪盡是依語就學家問處答又問如何是人境兩俱奪答云并汾絶信獨處一方便有人境兩俱奪面目頌曰人境兩俱奪從來正令行師云已落第二不論佛與祖那說聖凡情師云買石得雲饒擬犯吹毛劍還如值木盲師云識法者懼進前求妙會特地斬精靈師云前箭猶輕後箭深正令既行不留佛祖到者裏進之退之性命都在師家手裏如吹毛劍不可犯其鋒又問如何是人境俱不奪答云王登寶殿野老謳歌頌曰人境俱不奪思量意不偏師云會麼是法住法位主賓言不異師云世間相常住問答理俱全師云添一毫不得減一毫不得踏破澄潭月師云猶有者箇在穿開碧落天師云勞而無功不能明妙用師云動著即錯淪溺在無緣師云却依舊處著者箇是適來上座請益底公案謂之四料揀你若要分明理會得臨濟意但向他當時垂示處看如何看山僧有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪若恁麼便是你若作山僧有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪便不是了也所以五祖師翁有言如何是祖師西來意庭前柏樹子恁麼會便不是了也如何是祖師西來意庭前柏樹子恁麼會方始是你諸人還會麼者般說話莫道你諸人理會不得妙喜也自理會不得我此門中無理會得理會不得蚊子上鐵牛無你下觜處須信古人垂慈則有法無法不垂慈道眼未開大法未明豈免向他人口裏覓禪覓道覓玄覓妙覓得了唯恐人知及至說時又恐說盡了末後無可說者箇是無限量底法你以有限量心擬窮他落處且莫錯只如世尊在靈山會上百萬衆前拈華普示獨迦葉破顏微笑何曾怕人知又何曾密室裏傳授來我者裏禪許你衆人聞不許你衆人會如上所解注者四料揀你諸人齊聞齊會了臨濟之意果如是乎若只如是臨濟宗旨豈到今日你諸人聞妙喜說得落將謂止如此我實向你道此是第一等惡口若記著一箇元字腳便是生死根本也你諸人諸方學得底玄中又玄妙中又妙是甚麼屎禪一向𡎺在皮袋裏將謂實有恁麼事莫錯諸上座你真箇要參妙喜禪盡將諸方學得底掃向他方世界百不知百不會虗却心來共你理會復說偈云無諸比丘名近悅為母王氏請普說妙喜便登曲彔床忉忉怛怛恣饒舌從來法本離言詮不假思量與分別說甚地獄及天堂四聖六凡俱泯絶縱有魔王欲作難金剛寶劍當頭截王氏養子要參禪只者一念永不滅彈指頓明諸法門釋迦彌勒齊超越還如塗毒鼓當軒一擊聞之皆腦裂無邊煩惱悉蠲除夙業舊殃湯沃雪末後一句為重宣凝然萬里一條鐵喝一喝下座孫通判請普說師云說法不應時總是非時語所以道未離兜率已降王宮未出母胎度人已畢李長者著華嚴論乃云此經決定是佛成道十日後說初於正覺山前從定而起因見明星忽然悟道便見自己本來面目信知時節若至其理自彰妙喜常思無量居士者一箇人不知幾百生中學般若來今生如此得大受用所注清淨海眼經說六成就謂如是我聞一時佛在云理無不如之謂是事無不是之謂如自來不曾有人如此說蓋為他見徹釋迦老子骨髓所以取之左右逢其原佛初生下一手指天一手指地云天上天下惟我獨尊所以云三界獨尊之謂我所謂我者非人我之我如孟子所謂萬物皆備於我也心動十方之謂聞蓋世間人皆以耳聞一切音聲唯普賢菩薩乃以心聞故經云心聞洞十方生于大因力多之所宗之謂一且如現前一千大衆從首座數起自一而之百自百而之千所以言一者多之所宗也一之所起之謂時者箇時便是妙心居士請妙喜為大衆說法之時也當知此時能該括十方三世乃至塵沙諸佛六道四生若凡若聖若草若木若有情若無情乃以拂子擊禪床一下云盡向者裏成等正覺無出此時也又云始覺合本之謂佛言以如今始覺合於本覺往往邪師輩以無言默然為始覺以威音王那畔為本覺固非此理既非此理何者是覺若全是覺豈更有迷若謂無迷爭奈釋迦老子於明星現時忽然便覺知得自家本命元辰元來在者裏所以言因始覺而合本覺如禪和家忽然摸著鼻孔便是者箇道理然此事人人分上無不具足昨日因與妙心居士說令叔尚書文章學問可謂儒林宗工但聞於此道自以為難往往士大夫只知所謂佛者千劫學威儀萬劫修相好乃至三大阿僧祇劫修而後成云何博地凡夫現行無明為富貴所折困何時與道相應才作是念是於心意識中便推出一座須彌山一障障了道眼不能明見本地風光本來面目正所謂所知不是障是障障所知近世士大夫多作此見如韓子蒼與某在臨川鼻孔廝拄著半年亦不自信每言此一段事吾輩但知歸向則可如何便要入手亦是自作障難或者更錯會先佛所言大通智勝佛十劫坐道場佛法不現前不得成佛道謂佛道之難成如此殊不知一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力釋迦老子才瞥地後便言奇哉一切衆生具有如來智慧德相但以妄想執著而不證得所謂妄想執著者正說著今時士大夫病痛先德所以指示一切人腳跟下無不圓成無不具足故有父不可以傳子臣不可以獻君之說蓋使自證自悟匪從人得所以不壞假名而談實相肇法師云寂兮寥兮寬兮廓兮分兮別兮上則有君下則有臣父子親其居尊卑異其位起教敘其因然後國分其界人部其家各守其位豈非是法住法位世間相常住者耶佛不云乎應以佛身得度者即現佛身而為說法應以宰官身乃至長者居士婆羅門比丘比丘尼身得度者悉現其身而為說法又曰應眼時若千日萬象不能逃影質應耳時若幽谷大小音聲無不足法門既如此殊勝奈何學者多不向此時節領覽乃爾自生退屈正是不信自殊勝甘為下劣人若是靈利漢便向者裏提得去方知道一塵才起大地全收一毛頭獅子百億毛頭現千頭萬頭但識取一頭且那箇是一頭不見南臺和尚聞版聲有頌云善哉三下版知識盡來參既善知時節吾今不再三復以拂子擊禪床一下云適來所謂盡向者裏成等正覺是真實義所以韶國師云如來於一切處成等正覺於刀山劍樹上成等正覺於鑊湯爐炭裏成等正覺於棒下成等正覺於喝下成等正覺然雖如是如人飲水冷暖自知豈不見善財童子至毗盧者那大樓閣前舉體投地從地而起作是念言此大樓閣是解空無相無願者之所住處是於一切法無分別者之所住處是以一劫入一切劫以一切劫入一劫而不壞其相者之所住處是以一佛入一切佛以一切佛入一佛而不壞其相者之所住處乃至不著一切世間窟宅者之所住處何謂世間窟宅便是於無上道自作障難者若執一切世間窟宅不能捨離則吾輩所謂長老者亦莫住院一向杜絶世故乃可得行此道如此則是壞世間相而談實相何道之有常愛東坡為文章庶幾達道者也縱使未至於道而語言三昧實近之矣人謂是五祖戒和尚後身而不知以何因緣中忘此意第亦暫時不著便者觀其作維摩畫像讚從始至終不死在言下其詞曰我觀衆工工一師人持一藥療一病風勞欲寒氣欲暖肺肝胃腎更相剋挾方儲藥如丘山卒無一藥堪施用有大醫王拊掌笑謝遣衆工病隨愈言其醫王遣去衆醫曰爾輩用藥都無是處衆工既去其病隨愈或問醫王君以何藥而病捐乎曰不出衆工之所用者但彼不善用耳故曰問大醫王以何藥還是衆工所用者我觀三十二菩薩各以意談不二門而維摩詰默無語三十二義一時墮我觀此義亦不墮維摩初不離是說者箇雖是死蛇解弄却活若彼三十二人所論真箇負墮時即是無言勝有言情知古人之意決不如此所以立箇喻云譬如油蠟作燈燭不以火點終不明忽見默然無語處三十二說皆光焰佛子若讀維摩經當作是念為正念我觀維摩方丈室能受九百萬菩薩三萬二千師子座皆悉容受不迫窄經中所載此是維摩居士不思議大解脫神通之力所以借座燈王取飯香積斷取妙喜世界如陶家輪如持針鋒舉一棗葉蓋真實之理不可以智知不可以識識故曰又能分布一鉢飯饜飽十方無量衆斷取妙喜佛世界如持針鋒一棗葉云是菩薩不思議住大解脫神通力我觀石子一處士麻鞋破帽露兩肘能使筆端出維摩神力又過維摩詰若言此畫無實相毗耶城中亦非實佛子若見維摩像應作是觀為正觀此是東坡說底禪豈不是言語到若非前世熏習得來爭解恁麼道所以妙喜之意亦欲尚書公於此事信得及妙心居士請持此語舉歸似令叔恐因妙喜之言直下信得及異日忽然噴地一發便乃截生死流據祖佛位做箇出世間沒量大人始不負妙喜相期之意妙心居士近日畫得入定觀音且以妙喜昔年所作讚題其上蓋在衡陽時因道友藺庭彥所請當年信意一筆寫成與維摩讚言語雖不同大意相似曰世間種種音聲相衆以耳聽非目覩一切音聲須以耳聽觀音却以眼觀故曰唯此大士眼能觀如何見得曰瞑目諦觀為佛事到者裏便轉了曰於眼境界無所取眼境界既取不得即眼界寂滅眼界既寂滅不可耳界不寂滅所以云耳鼻舌身意亦然善哉心洞十方空六根互顯如是義觀音菩薩以眼聞而普賢菩薩以心聞即此是互顯之義所謂互顯者眼處作耳處佛事耳處作鼻處佛事鼻處作舌處佛事舌處作身處佛事身處作意處佛事於意界中作無量無邊廣大佛事得恁麼受用自在了眼依舊觀色耳依舊聽聲乃至鼻舌身意一一依本分故曰眼色耳聲鼻嗅香身觸意思無差別適來所謂是法住法位世間相常住是也當以此觀如是觀取此為實成妄想到者裏又轉了曰若離妄想取實法展轉惑亂失本心本心既失隨顛倒不見大士妙色身云何顛倒眼見色隨色轉耳聞聲隨聲轉是謂衆生顛倒迷己逐物以逐物故不見大士妙色身無眼耳鼻舌身意此乃教有明文眼耳鼻等既無其體互顯之義依何而立故曰互顯之義亦寂滅亦無大士妙色身亦無種種音聲相佛子能作如是觀永離世間生死苦大凡文字須教說得行若說不行不成文章適來因論時節因緣所以說善財方立于樓閣之前早已讚歎許多殊勝之事然未能得入乃白彌勒菩薩言唯願大聖開樓閣門令我得入時彌勒菩薩前詣樓閣彈指出聲其門即開命善財入善財心喜入已還閉閉時如何便是觀音入流亡所底消息然後善財於樓閣中見百億四天下百億兜率陀天一一皆有彌勒菩薩降神誕生遊行七步觀察十方現為童子居處宮殿為一切智出家苦行降伏諸魔成等正覺梵王勸請轉正法輪升天宮殿而演說法劫數壽量衆會莊嚴所淨國土所修行願住持教法皆悉不同善財非但見彌勒菩薩一周佛事又自見其身住彼一切諸如來所亦見於彼一切衆會一切佛事以海印三昧一印印定更無秋毫以為透漏既見如是無量殊勝一切莊嚴自在境界已彌勒菩薩即攝神力入樓閣中又彈指作聲告善財言善男子起法性如是此是菩薩知諸法智因緣聚集所現之相如是自性如幻如夢如影如像悉不成就爾時善財聞彈指聲從三昧起於此時節忽然打失布袋然後彌勒示以如上境界無有去處亦無住處非寂非常遠離一切師召大衆云既是來無所從去無所至則雲門大師手中扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾又有甚麼過當知者箇時節具無量廣大智慧門無量神通門無量言詞門無量不可說又不可說一切佛菩薩自在受用門諸人若能如是信如是入方知先聖道過去一切劫安置未來今未來現在劫回置過去世乃喝一喝云若不喝住打葛藤直到明朝擊禪床下座
