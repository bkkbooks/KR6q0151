body:
  text: 武林十八㵎理安禪寺住持婁東行悅集請列職雜務提綱修造化主發化主監收五祖演禪師請修造上堂白雲今日權將大宋世界作一面碁盤先將東嶽泰山南嶽衡山西嶽華山北嶽恒山中嶽嵩山定却五方次將五臺峨嵋支提羅浮以為相助左畔則斜飛鴈陣右邊則虎口雙關遂舉手云且道者一著落在什麼處若知落處便為敵手若也未然白雲試通箇消息十九條平路爭功勢未休莫教一著錯敗子卒難收虎丘隆禪師請修造上堂如來三轉於大千趙州半藏亦如然其輪本來常清淨一念承當誰後先雖然也是箇英靈漢始得便乃橫身擔荷紹續宗風立吾家萬世不朽之功顯大丈夫兒特達之志抱荊山玉握靈蛇珠光耀叢林揮戈佛日直得龍吟霧起虎嘯風生象王行處絕狐蹤獅子窟中無異獸雖然如是且道應緣垂手一句作麼生道旃檀葉葉古風清吹落人間香馥郁五祖演禪師請化主上堂造化之功祖宗門下作天地發生之氣春夏秋冬決含靈顛倒之心甯樂我淨若據衲僧用處又且不然變大地為黃金攪長河為酥酪猶未稱白雲在忽有箇漢出來道似恁說話只是箇貪心不足漢自云道著參龍門遠禪師請化主上堂一竿一笠一蓑衣急水灘頭下釣絲鈎上錦鱗容易得蘆花深處月明歸復舉古人問三尊宿二龍爭珠誰是得者一云得即失一云老僧祇管看一云誰是不得者師云得即失著忙作什麼老僧祇管看看濟甚麼事末後一語誰是不得者若人會得祖師言句一大藏教自然不疑去還明得麼誰是不得者非取亦非捨馬載驢䭾時便是歸來也下座劍門分禪師請化主上堂萬代金輪王子孫糞衣綴鉢化朱門箇中消息許誰會多認枝頭落葉黃箇中非愚亦非智天上人間無有比金粟如來笑點頭落落英風振天地君不見劍門老等閒擲下深深餌不釣人間非與是又不見河沙諸佛為群生橫也竪也沒纖忌咄一曲太平春復秋十分高價未為酬天邊紅日豈虗出照世精明混眾流下座保寧勇禪師發化主上堂盡十方世界為一大陣若聖若凡種種異類出此不得釋迦為主將文殊作先鋒普賢為殿後陣勢既圓且道與什麼人相見良久云定光金地遙招手智者江陵暗點頭遂拈拄杖云如今盡在保寧拄杖頭上開甘露門示真實相展縮無礙縱橫自由還見麼若也見得真不掩偽若也不見分付諸方化主一任將向南州北縣扶過斷橋水伴歸明月村卓一下下座發化主上堂身披信施衣口喫信施食施者絕纖毫受者無蹤跡大施門正開百千及萬億信手拈將來切忌從他覓既不從他覓向信手處道將一句來有麼若無保寧自道去也一封書信通消息兩貼茶湯表信儀五祖演禪師發諸郡化主上堂荷眾諸禪流才能足機劃逢人定有錢見面寧無麥已是我家兒久為物外客溫柔一手擡剛硬雙拳搦牙爪一時全勝南山白額圓悟勤禪師住雲居發化主上堂火不待日而熱性相類風不待月而涼氣相合獨樹不成林單絲不成線建大廈非一木之能濟巨川非一棹之力所以道眾毛成毬聚鐵成𨨞要須內外相應賓主和融自然氣類相同羽毛相似正與麼時如何八萬四千非鳳毛三十三人入虎穴復有頌云三十餘員雲水客諸方分化力行持山門庶事渾依賴正是金毛奮迅時真淨文禪師因發化主上堂出家沙門當清淨自活以乞食為正命食不過分離憍慢故以乞法為正念增長智慧不滯寂故驀拈拄杖云你有拄杖子與你拄杖子你無拄杖子奪却你拄杖子於此薦得增汝智慧破汝憍慢火𦦨裏藏身淤泥中出現千手千眼大悲菩薩一任神通變化於此不薦有清泉兮恣汝飲有碧巖兮從汝棲切忌寒猿深夜啼發化主後上堂丐者月餘朝束裝有煩知事首座大眾一動一靜寧不有勞然則勞動若是道人分上無非佛事所謂往復無際動靜一源苟契神於動靜則無滯於往還心迹不生順逆何咎此則於心無心於事無事又何妨於動靜往還之勤其或得之者正乎心失之者亂乎性葢得失之自殊非動靜之有異乃拈拄杖擲下喝一喝下座上堂發化主舉王大王向雪峰會裏請晏監院住皷山雪峰謂眾曰有一隻聖箭子入九重城裏建立佛事去也有孚上座去中路截住問云承聞聖箭子入九重城裏去是否晏云是孚云忽遇三軍圍繞時如何晏云他家自有通霄路孚云與麼則離宮失殿去也晏云何處不稱尊孚遂回謂雪峰云聖箭子途中折了也峰云他道什麼孚舉前話峰云奴奴他語也得孚云和尚肐膊終不向外曲師云雪峰雖為一千五百人善知識受侯王供養福報因緣即不無若是佛法未在洞山則不然云和尚聖箭途中折了也云他道什麼師云待伊舉了拽拄杖打將出去一使孚上座於後作箇本色衲僧二與聖箭子出其鋒鋩三與禪門作箇真正宗匠為後人眼目諸禪德是也不是有眼者辨取良久云洞山也有三隻聖箭子各往一方作大佛事莫有作家戰將向途中截住將聖箭子總與摺折却來洞山手裏請棒喫有麼有麼若無明日普請向新豐亭上隨例喫茶相送洞山聰禪師發供養主示眾住持之道勞他十方高人且實際理地不受一塵佛事門中不捨一法葢為清眾之故所以忘勞然盡大地作一箇餬餅天下人盡得喫唯有深沙神不得喫怒發將蒺䔧杖一棒瓦解氷消劍門分禪師發化主上堂無拘繫笑嘻嘻惟佛與佛乃能知時光不管急如箭一鉢甘為賤乞兒賤乞兒何處去影分泉落無窮數水裏難尋月在天㘞百萬聖賢猶蹉過應庵華禪師請監收上堂古來為法老尊宿荷眾曾無有倦時況是年來衰落甚動為多與行相違應須痛念平生事著意披襟善護持顆粒果能無滲漏少林初不隔毫氂元叟端禪師請監收上堂山鄉每憂旱水鄉常畏潦付託既得人安用挂懷抱古人云千粒萬粒一粒生只者一粒甚處生歸堂喫茶愚庵及禪師請監收并謝雨上堂今朝八月初一天外雲收日出夜來灌門龍王見大神變降注大雨盡大地草木叢林稻禾菽粟皆得霑濟隆教寺裏普請監收箇箇得人一年三百六十日管取粥足飯足江南兩浙春寒秋熱下座恕中慍禪師請監收上堂兼謝天童藏主以字不成八字不是玲瓏巖頂白浪滔天萬工塘中蓬塵漲起分毫上定當升合裏論量收得來放得去隨緣剔脫觸處放光可以起臨濟正宗可以滅正法眼藏雖然若是箇中人聞與麼道直須洗耳有分且誰是箇中人面如滿月目如蓮天上人間咸恭敬舉名德兼法嗣立僧真淨文禪師上堂丹霞燒木佛院主眉鬚落又教中云未見自作他受他作自受若爾則禪門與教乘敵體相違故丹霞自燒木佛旁僧受殃未審此理如何莫有人明得麼良久云若無人唯澄公首座深明此理希諸高德旦暮親而扣之就而明之下座圓悟勤禪師舉杲首座立僧上堂鶻兒未出窠已有摩霄志虎子未絕乳已有食牛氣況復羽翼成況復爪牙備奮迅即驚群八面清風起一條脊梁硬似鐵一條白棒掀天地相與建法幢展衲僧巴鼻舉丹霞長老為人入室上堂大眾摩醯首羅揭示頂門正眼摩竭陁國全提向上鉗鎚壁立萬仞絕承當孤光爍破四天下所以道殺人刀活人劍將錯就錯上古之風規亦是今時之樞要和泥合水若論殺人刀不存毫末活人劍橫屍萬里須知殺中有活擒縱人天活中有殺權衡佛祖直饒說得殺活倜儻分明山僧更問你覓劍在正恁麼時見麼萬仞懸崖垂隻手高峰共唱太平歌復云趙州道趙州南石橋北觀音院裏有彌勒祖師留下一隻履直至如今覓不得諸人要知落處麼問取丹霞和尚舉泰首座立僧上堂大人具大見大智得大用一飛六月息一諾千金重滔天必江海崔嵬必山嶽先知覺未知先覺覺後覺打開無盡藏運出無價珍不依倚一物顯示本來人舉悟和尚立僧上堂只者是大似撒沙向眼中只者不是還如注水向耳裏直下無事平地陷人別有機關墮坑落塹且畢竟作麼生祇園屈曲流泉急鷲嶺巍峩雲出遲復云雲居開大洪爐不止烹佛烹祖但有一切持來烈𦦨堆中辨取是則當處平和不是切宜退步煅出金剛眼睛直得乾坤獨露雖然到者田地須知向上一路還委悉麼放將三聖瞎驢踢殺大雄猛虎大慧杲禪師舉本顏二首座立僧上堂驅耕夫之牛奪饑人之食趯翻大海水拳倒須彌盧生擒兕虎活捉獰龍猶未是衲僧本分事作麼生是衲僧本分事問取堂中二首座應庵華禪師舉西堂正法和尚立僧云西天四七唐土二三天下老和尚無不以此頂𩕳上一著流通正法眼藏顯示涅槃妙心是故雲夢之竹天下之勁也然而不矯揉不羽筈則不能以入堅堂溪之金天下之利也然而不鎔範不砥礪則不能以擊強矯揉羽筈鎔範砥礪既妙至人之用其赤手提持解黏去縛抽釘拔楔烹佛煅祖轉凡成聖亦不出此箇端由所謂善知識者是大因緣其斯之謂歟正當恁麼時如何竚看汗血八駿駒何啻日馳三萬里舉傑首座立僧上堂一棒一條痕一摑一手血臨濟老瞎驢至今猶未瞥須彌頂上浪拍天大洋海水無一滴偉哉本色人頂門亞三隻辨龍蛇百草頭擒虎兕一毫力穿大地人鼻孔坐斷衲僧搖舌雖然猶未撥動向上一竅在且作麼生是向上一竅問取堂中首座傑密庵傑禪師請前堂首座鶴林印和尚立僧上堂佛法無人說雖慧不能了去却上頭關面南看北斗虗空挂劍殺活臨時鞭起臨濟瞎驢放出五祖酸豏盡大地人亡鋒結舌扶竪佛祖正宗還他過量人能持過量事過量人已見過量事已聞且不涉言詮一句如何通信下座煩知事頭首大眾詣首座寮扣問天目禮禪師舉國清枯樁曇和尚立僧上堂謝三郎螺江釣魚郁山主眯水騎驢老盧負石蹋碓長慶坐破團蒲各人自守封疆好與三十拄杖只如閬州人說台州話又作麼生問取國清和尚箬庵問禪師舉昱首座立僧上堂眼裏不著沙耳裏不著水雖然俊俏衲僧寧免守株待兔眼裏著得須彌山耳裏著得四大海水橫來也著竪來也著一任象馬龍蛇拳踢蹴踏且道憑箇甚麼得到與麼地顧左右云問取堂中第一座弘覺忞禪師舉山幢懷大師立僧上堂萬里鼇鈎葢為獰龍而下釣千鈞之弩豈因鼷鼠而發機然道在人弘事無一向所以出群獅子天外吼音敵勝丈夫隨方導物磨礱臨濟吹毛劍倜儻楊岐栗棘蓬當可卷而懷之遇奇人則拈出眼光明爍四天下噫氣卷舒六合雲設若據令而行直得無位真人與他鏤明脊骨況乃入垂手任是大悲菩薩更為額上栽眉正恁麼時滅却正法眼即且置為我扶起破沙盆一句作麼生道倒將浩瀚西江水注作玲瓏妙密錘復舉葉縣省禪師云宗師血脉或凡或聖龍樹馬鳴天堂地獄鑊湯爐炭牛頭獄卒森羅萬象日月星辰他方此土有情無情以手畫一畫云俱入此宗此宗門中亦能殺人亦能活人殺人須是殺人刀活人須是活人句大眾要識殺人刀活人句麼問取前堂座元山幢懷大師下座立僧後秉命普說雪巖欽禪師道場立僧普說禪客出問云天氣秋高玉露垂庭前黃菊綻東籬臨濟德山施棒喝不問知音更問誰答云知音知後更誰知進云與麼則水向石邊流出冷風從花裏過來香答云閒言語進云如何是德山棒答云穿過你髑髏進云如何是臨濟喝答云還聞麼進云記得昔日臨濟和尚示眾道我有時一喝如金剛王寶劍有時一喝如踞地獅子有時一喝作探竿影草有時一喝不作一喝用此意如何答云從頭問將來進云如何是一喝如金剛王寶劍答云切忌傷鋒犯手進云如何是一喝如踞地獅子答云真箇可憐生進云如何是一喝作探竿影草答云不得面前背後進云如何是一喝不作一喝用答云却須參始得進云探竿影草驗來人一喝須教海嶽昏不是法王親的子等閒誰敢踏渠門云且緩緩進云只如釋迦世尊四十九年橫說竪說說不盡底事今夜座元禪師如何布施答云猶嫌少在進云選佛若無如是眼宗風那得到如今師拈起拄杖云只者是德山棒卓一下只者是臨濟喝伶俐漢向未舉已前一提提得水向石邊流出冷風從花裏過來香其或未然更煩拄杖子借德山鼻孔與臨濟出氣去也卓一下金剛寶劍卓一下踞地獅子卓一下探竿影草只如一喝不作一喝用與前三喝是同是別若謂是同臨濟大師未肯點頭在若謂是別爭柰被德山老漢一串穿却鼻孔畢竟德山臨濟二大老鼻孔與四十九年說不盡底相去多少乃靠拄杖復云既隆釋種須紹門風諦審先宗是何標格豈不見臨濟三度扣黃檗被六十拄杖如嵩枝拂相似又不見德山於龍潭吹滅紙燭處脫然悟去道窮諸玄辯若一毫置於太虗竭世樞機似一滴投於巨壑二大老可謂窮千聖之骨髓徹萬法之根源流芳後世垂範於叢林者矣今時參學道流又須帶些子眼筋破他古人敗闕處始得若也得破便見黃檗龍潭雖似金翅擘海直取龍吞要且未免作死馬醫臨濟德山是則不離當處獨跨大方其柰捨長就短埋沒己靈要稱百世宗師未得在道場門下不說破不破盡是在他頂𩕳上放屙底漢如今既在者裏聚首片時欽上座未免借堂上老人威光掀翻海嶽撞碎太虗也要大家證據雖然王令正嚴豈可攙行奪市今朝九月一打板坐禪首座謂之表率或恐一人半人新發意菩薩欲捕此道者未有入頭處未有下手脚處或工夫有間而不得成片段或少有歡喜不復加鞭以求正悟或已有悟門為悟所迷光影不脫礙正知見或為勝妙快樂所墮在解脫深坑轉身不得或於古今差別機緣有意味可以㗖者一一計較得行無意味難於咬嚼者又却分疎不下或為一切奇言妙句奧理玄文障在八識田中拋捨不下謂之雜毒入心如油入麵永取不出如今要得通上徹下一翻翻轉須是將一則古人沒意智底話頭如生冤家與之作對直是撲一交倒地始得若是未有者箇消息直饒行脚走盡天涯海角口裏記盡落索春秋打閒舖席一似賣狼虎藥只益戲論誑惑後昆自己衣單下半文不直底一著畢竟不曾摸著若是真箇卒地斷嚗地折底漢眼目動靜言語提持著去離泥水脫略窠臼一切處一切時只麼平帖帖地那裏恁麼生生獰獰吒吒沙沙道我無敵於天下者也者箇喚作西天九十六種之數誇張知解該抹聖賢望吾佛祖之道遠之遠矣若是具正因有志之士莫被者一種𡏖圾性地泛濫心源須信有正宗之下單傳直截之妙始得如趙州一箇無字真箇是一口吹毛利劍可以破疑團斷生死空萬法融古今只貴利根上智撥著便轉撩著便行然後不妨與趙州老漢同一眼目同一受用以至總萬別千差之要開千差萬別之門全賓全主全體全用全放全收全生全殺而總不外此矣若是性根遲鈍操舍不行却須竪起生鐵脊梁向長連床上厚著蒲團挺身而坐盡三百六十骨節與八萬四千毛竅併作一箇無字握兩拳頭撐兩眼睛一提提起便欲斬為兩段能如是著鞭如是用力何患乎不成片段何患乎不到頭似覺提不起時轉覺熱悶悶時與昏昏擾擾時却須全體一放放下翻轉身來就地略行數步於行處亦如是著鞭如是用力只當下別是一般精神又復翻身上蒲團挺身而坐則胸次中灼然如銀山鐵壁虗勞勞地靜悄悄地何處有一絲毫動相有一絲毫異相到者箇時節却不得守在者裏又須翻身下地如坐而行然後又復如行而坐晝若不足繼之以夜夜若不足繼之以旦翻來覆去提去提來不知不覺忽然拶透如貧得寶似闇得燈如雲開見日如水底火發盡十方剎海是箇大圓鏡盡十方剎海是箇自己謂之心空及第見徹父母未生前面目若說明大法透古今以盡佛祖之奧喻如入海方始插得脚前面洪濤際天巨浪沃日那裏更在那裏切不得聽人道悟是表顯之說箇事本來成現只消一笑知歸是則固是其柰隔壁摶謎青黃赤白長短方圓畢竟不曾親見被人掇在面前分明是差珍異寶却喚作瓦礫磚頭分明是瓦礫磚頭却喚作差珍異寶又不得聽人道參禪本是安樂法門那裏有許多生生受受勞勞攘攘只消默默提撕久久自契者箇喚作死水浸石頭永無醒動底分子又不得聽人道只者無字是箇繫驢橛子只消提來頓在面前牢牢把定繫住者一念子念頭純熟自然到家殊不知者一念子如燈焰焰如水涓涓眨得眼來千里萬里自非潑撒一回那裏被你把得定繫得住又不得聽人道只消於聞聲見色處領覧折旋俯仰處承當開口道著動步踏著六根門頭一道神光晝夜未曾間歇者箇喚作生死根本業識癡團急須斬作三段又不得聽人道從無住本立一切法本來無有山河大地明暗色空無佛無祖無眾生無凡無聖無善無惡無去無來無生無死者箇喚作豁達空撥因果莽莽蕩蕩招殃禍又不得聽人道坐斷主人翁不落第二見著衣喫飯不借他力山是山水是水僧是僧俗是俗是法住法位世間相常住似則也似是則未是如上所說竝是自作障礙自生退屈自暴自棄自殘自虐醫不得底偏僻之病除是下一服換骨靈丹出得一身白汗然後即知傷寒傷熱傷饑傷飽盡是大休歇大安樂田地與夫轉八萬四千毛病為八萬四千陀羅尼門是身是病是草是藥亦能殺一切人亦能活一切人臨時加減對症修方一切在我若是根本不牢元氣不足莫教被人下一粒巴豆便見通身發作面黑眼花一時性命都討不見若是識安危知休咎底漢但是醍醐毒藥與你對面一翻翻却於一毫頭別有通霄活路如今都是口耳傳習訛謬方書竝不見一人有神聖功巧之妙悞人多矣往往指見聞覺知揚眉瞬目為自己復引即心即佛與目前說法聽法一段歷歷孤明之語為證然後舉是風動幡動不是風動不是幡動却喚者箇作初機公案教你向者裏淘澄見地剔抉根源然後又舉栢樹子麻三斤乾屎橛之類喚作單頭淺近公案教你開口處識取話頭然後又舉玄沙未徹趙州勘婆之類喚作試金石子又喚作換眼睛烏豆然後又舉百丈野狐女子出定之類喚作宗門關鍵羅龍打鳳底鉗鎚然後又舉馬祖一喝巖頭末後句之類喚作向上爪牙衲僧巴鼻以至從上老凍儂一時垂慈利物之要莫不盡有印板上脫來底樣子教你從頭穿鑿從頭註解合著者箇樣子便喚作明大法透古今殊不知幸然自是一箇淨潔琉璃瓶子無端傾許多狼狼籍籍在裏了也抑不知從上若佛若祖與夫盡天下老和尚只是共一箇舌頭有時用一機千機萬機齊副有時道一句千句萬句合轍有時指千句萬句只是一機有時提千機萬機只是一句直得搖乾蕩坤葢天遮地如擊石火似閃電光搆得搆不得未免喪身失命那裏有你取意觀瞻將心凑泊底分又那裏似世間村秀才教小學自上大人讀到論語孟子毛詩周易一般若如是又何用九年面壁立雪齊腰只麼傳將去學將去便休將知箇事是出世間法須具出世間眼器量一肩擔取始得若只逐旋扭揑逐旋博量逐旋分別謂之以情意識測度如來不思議大圓覺海如取螢火燒須彌山終不能著縱饒築得一肚皮殘羮餿飯還有一點用得也無還瞞得一切人也無縱饒瞞得他人還瞞得自己也無縱饒瞞得自己還瞞得燈籠露柱也無既瞞不得未免被森羅萬象在冷地笑你在只如欽上座今夜恁麼口勞舌沸說七道八且道還出得者一笑也無若謂出不得未免亦是西天九十六種之數若謂出得其柰有旁觀眼在且道旁觀眼在甚麼處夜深久立伏惟珍重秉命入室後普說雪巖欽禪師入室後普說兄弟且在者裏聚首片時待為你扭揑鼻孔劈析太虗一上雖是好肉剜瘡畢竟刀子是鐵你還知一句中具三玄一玄中具三要麼又還知賓中有主主中有賓有時全賓是主有時全主是賓麼又還知殺中有活活中有殺有時全殺是活有時全活是殺麼又還知開口不在舌上麼又還知一手擡一手搦麼若也於此明辯不下緇素不行未免見人道是便道是道非便道非正謂矮子看戲隨人上下安知青布幕內元來有人者箇說話莫道你未有田地底人摸索不著只是參道者禪著青布衫漢十箇五雙渾侖吞棗莫說用意識搏量口耳沿習之輩隨語生解逐句穿鑿定矣須知道此逸格絕塵之妙不得思量擬議不涉見聞覺知又須知道人人具足箇箇圓成只為無量劫來為生死飄蕩無明業識蒙蔽不得現前不得受用如今要得向威音王以前一翻翻轉須是信道者一著子真箇是我本有之物決定不從人得然後盡父母所生之體天地所稟之氣併作一口吹毛利劍將自己一條窮性命斬作兩段颺在萬仞懸崖之下直得森羅萬象徹底平沉方謂之心空及第海印發光苟或外此直饒參得一肚皮築得一布袋臘月三十日未免手忙脚亂如落湯螃蠏某在無準癡絕會下時有箇朋友每每有一言半句膾炙人口於古人旁敲暗打處亦自盡知落著只是不曾做蒲團上自己工夫後來曾在諸方做藏主氣高行輩一日因打數頭閒官司搆架不徹為他人所勝因此鬱氣嘔血致一疾弗救於臨終時直得千生萬受求死不得死每見朋友來問疾便道我參禪平生不曾做蒲團上工夫不信有悟門只在冊子著倒將謂佛祖之道止於此矣今日到者裏一點也用不著勸你輩參禪莫如我一般須是做靠實工夫始得說了又眼淚下者箇便是不信有悟門底樣子死不知去處生不知來處所謂生死事大無常迅速轉眼便是來生忽然一息不來前路茫茫不知何往撞入驢胎馬腹中總不見得你輩初機晚進何不趂身強力徤打教徹去者裏孤峰絕頂爐鞴之所叢林溫煖百事現成香積供養殊勝若不向者裏打教徹去可謂孤負佛祖孤負檀信孤負師友孤負自己一朝不恰好打箇手蹉脚跌自己若不明白粒米莖虀悉用牽犂拽耙償他始得豈不見夏間許多亡僧各各燒作一堆灰送在三塔裏了如今在甚處安身立命還知麼若也不知豈不是死不知去處謂之死大即今眼眨眨地在者裏問箇父母未生前面目開口不得豈不是生不知來處謂之生大灼然生死事大須是把當一件無大至大底大事竪起生鐵脊梁討教明白始得十二時中莫雜用心莫只悠悠漾漾虗度時光須是打教成一片始得須是者一念子無絲毫間斷始得古者尚道看經看教是雜用心何況你白日起來只了逐東逐西七上八下為人事役役者哉古者又道參禪學道是雜用心參禪學道既是雜用心却教你向那裏用心喝一喝含元殿裏何須更問長安自是你一念馳求不歇棄了現成活計却欲登天入地別討生涯別求佛法所以做盡伎倆受盡辛勤轉加顛倒若能直下頓歇馳求一念則萬法當體寂滅萬法依舊熾然行也得坐也得著衣喫飯不是別人山青水綠夜暗晝明昏沉散亂生死涅槃總是自家縱橫遊戲得大自在法門無一法可棄無一法可取佛與眾生俱是假名殊無實義雖然你又須是己眼自開冷地一笑知道元在自己屋舍中當軒大坐始得若只逐旋扶籬摸壁傍人門戶又是認驢鞍橋作阿爺下頷則沒交涉矣如適來為兄弟舉話有一人半人開口不識語路踏步不知高低要登主人堂入主人室也恐未得在如今大事為你不得小事各自知當彼此不須敗闕牌且納還上方兩序進退提綱楚石琦禪師進退兩序上堂東邊底東邊去西邊底西邊去去去實不去生鐵稱鎚被蟲蛀來來實不來燈籠沿壁上天台且道不動尊居何國土一鏃破三關分明箭後路進退兩序上堂千尺絲綸意在錦鱗紅尾一聲霹𮦷要看攫霧拏雲隨時有卷有舒覿體無新無舊光揚法社輔弼宗門高蹈世表下視塵窟總是當人受用處還委悉麼龍袖拂開全體現象王行處絕狐蹤進退兩班上堂虎豹文章全歸爪牙之力鯤鵬變化必籍羽翼之功法社要在得人叢林自然增氣睦州佐黃檗楊岐輔慈明相與建法幢展衲僧巴鼻了庵欲禪師進退頭首上堂宗門中有四種賓主臨濟大師已嘗點出若也脚未跨門一一辨得非唯不久當作唱導之師抑且不謬為吾家種草其或奴郎不辨玉石不分要稱衲僧未得在豈不見忠國師睡次丹霞適至乃問侍者耽源云國師在麼源云在即在只是不見客霞云太深遠生源云莫道上座佛眼也不見霞云龍生龍子鳳生鳳兒遂去國師睡起源舉似前話國師打二十拄杖趂出丹霞聞云不謬為南陽國師師喝一喝云不解作客勞煩主人雖然不因夜來鴈爭見海門秋進退頭首并謝大雲長老上堂一椎便就揭開華藏十三重不假一槌抹過無邊香水海兩堂下喝賓主歷然照用同時與奪自在便見大雲彌覆六合清風甘澤順時百果成熟且結角羅文一句作麼生道趂時葢却屋乘時刈却禾輪納王租了皷腹恣謳歌笑隱訢禪師進退兩序上堂心空及第選佛何必選官荷負叢林為眾一似為己報國為法擇人量才授職如樂奏九成左右進退無不合度只如一喝分賓主照用一時行諸人作麼生甄別喝一喝九萬里鵬纔奮迅三千年鶴便翱翔挂鉢時請知事真淨文禪師因請知事上堂祖師門下燈燈相續心心相印一燈滅而一燈然一心隱而一心照故萬般之事須籍心明心若不明是事失準諸禪德要不失準麼僧堂裏大家著力虎丘隆禪師請知事上堂掩室摩竭杜口毗耶面壁九年黃梅夜渡簡點將來翻成計較殊不知日不待火而熱月不待風而凉雲從龍風從虎作無作為無為恁麼會得便能張法席毗贊叢林共建法幢流通正脉敢問大眾據令一句作麼生道祇園今古饒春色朵朵渾開薝蔔花請兩序圓悟勤禪師請兩序上堂獨掌不浪鳴獨樹不成林建法幢立宗旨須是互為賓主安貼家所以道我若坐時你須立我若立時你須坐我若孤峰獨宿你須偃息干戈我若天上人間你須三頭六臂然後可以光揚佛日且道浩浩之中如何辨主是處是慈氏無門無善財下座元叟端禪師請兩序上堂一心不生萬法無咎欲左即左欲右即右如頭之耳目如身之臂肘其進用也罔涉離微其退藏也豈存窠臼日午打三更面南看北斗愚庵及禪師請兩序上堂獨樹不成林兩手鳴摑摑老大小叢林各要知時節主事輔弼山門頭首贊揚佛法十方高人聚會究取當頭一著長老坐致太平手裏把箇木杓驀拈拄杖云諸人從朝至暮啾啾唧唧說黃道黑總在杓頭裏七出八沒且道杓柄長多少卓拄杖喝一喝全室泐禪師請兩序上堂夢往天宮說法是首座分上事演出一大藏教是藏主分上事客來須看賊來須打是知客分上事終日擇火拈香是殿主分上事三呼三應是侍者分上事作麼生是諸人分上事遂卓拄杖云但將飯向無心盌自有人扶折脚鐺
