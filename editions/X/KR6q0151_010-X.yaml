body:
  text: 武林十八㵎理安禪寺住持婁東行悅集五參提綱洞山价禪師上堂還有不報四恩三有者麼眾無對又曰若不體此意何超始終之患直須心心不觸物步步無處所常無間斷始得相應直須努力莫閒過日上堂有一人在千人萬人中不背一人不向一人你道此人具何面目雲居出曰某甲參堂去雲居膺禪師上堂舉先師道地獄未是苦向此衣線下不明大事却是最苦師曰汝等既在者箇行流十分去九不較多也更著些子精彩便是上座不屈平生行脚不孤負叢林古人道欲得保任此事須向高高山頂立深深海底行方有些子氣息汝若大事未辦且須履踐玄途上堂得者不輕微明者不賤用識者不咨嗟解者無厭惡從天降下則貧窮從地涌出則富貴門裏出身易身裏出門難動則埋身千丈不動則當處生苗一言迥脫獨拔當時言語不要多多則無用處上堂如人將三貫錢買箇獵狗祇解尋得有蹤跡底忽遇羚羊挂角莫道蹤跡氣息也無僧問羚羊挂角時如何師曰六六三十六曰挂角後如何師曰六六三十六僧禮拜師曰會麼曰不會師曰不見道無蹤跡上堂孤迥迥峭巍巍僧出問曰某甲不會師曰面前案山子也不會上堂僧家發言吐氣須有來由莫將等閒者裏是甚麼所在爭受容易凡問箇事也須識些子好惡若不識尊卑良賤不知觸犯信口亂道也無利益傍家行脚到處覓相似語所以尋常向兄弟道莫怪不相似恐同學太多去第一莫將來將來不相似言語也須看前頭八十老人入場屋不是小兒嬉不是因循事一言參差即千里萬里難為収攝葢為學處不著力敲骨打髓須有來由言語如鉗如夾如鉤如鎻須教相續不斷始得頭頭上具物物上明豈不是得妙底事一種學大須子細研窮直須諦當的的無差到者裏有甚麼䠄跣處有甚麼擬議處向去底人常須慘悚戢翼始得若是知有底人自解護惜終不取次十度發言九度休去為甚麼如此恐怕無利益體得底人心如臘月扇子直得口邊醭出不是強為任運如此欲得恁麼事須是恁麼人既是恁麼人不愁恁麼事恁麼事即難得上堂汝等諸人直饒學得佛邊事早是錯用心不見古人講得天花落石點頭亦不干自己事自餘是甚麼閒擬將有限身心向無限中用如將方木逗圓孔多少誵訛若無恁麼事饒你灒花簇錦亦無用處未離情識在一切事須向者裏及盡若有一毫去不盡即被塵累豈況更多差之毫釐過犯山嶽不見古人道學處不玄盡是流俗閨閤中物捨不得俱為滲漏直須向者裏及取及去及來併盡一切事始得無過如人頭頭上了物物上通祇喚作了事人終不喚作尊貴將知尊貴一路自別不見道從門入者非寶棒上不成龍知麼疎山仁禪師上堂病僧咸通年前會得法身邊事咸通年後會得法身向上事雲門出問如何是法身邊事師曰枯樁曰如何是法身向上事師曰非枯樁曰還許某甲說道理也無師曰許曰枯樁豈不是明法身邊事師曰是曰非枯樁豈不是明法身向上事師曰是曰祇如法身還該一切也無師曰法身周徧豈得不該門指淨瓶曰祇如淨瓶還該法身麼師曰闍黎莫向淨瓶邊覓門便禮拜青林虔禪師上堂祖師門下鳥道玄微功窮皆轉不究難明汝等諸人直須離心意識參出凡聖路學方可保任者不如是非吾子息白水仁禪師上堂老僧尋常不欲向聲前色後鼓弄人家男女何故且聲不是聲色不是色僧問如何是聲不是聲師曰喚作色得麼曰如何是色不是色師曰喚作聲得麼僧作禮師曰且道為汝說答汝話若向者裏會得有箇入處龍牙遁禪師上堂夫參玄人須透過祖佛始得新豐和尚道祖佛言教似生冤家始有參學分若透不得即被祖佛謾去僧問祖佛還有謾人之心也無師曰汝道江湖還有礙人之心也無乃曰江湖雖無礙人之心為時人過不得江湖成礙人去不得道江湖不礙人祖佛雖無謾人之心為時人透不得祖佛成謾人去不得道祖佛不謾人若透得祖佛過此人過却祖佛若也如是始體得佛祖意方與向上人同如未透得但學佛學祖則萬劫無有出期僧曰如何得不被祖佛謾去師曰道者直須自悟去始得乾峯和尚上堂法身有三種病二種光須是一一透得始解歸家穩坐須知更有向上一竅在雲門出問庵內人為甚麼不知庵外事師呵呵大笑門曰猶是學人疑處師曰子是甚麼心行門曰也要和尚相委師曰直須與麼始解穩坐門應喏喏上堂舉一不得舉二放過一著落在第二雲門出眾曰昨日有人從天台來却往徑山去師曰典座來日不得普請便下座欽山邃禪師上堂橫按拄杖顧覩大眾曰有麼有麼如無欽山唱菩薩蠻去也囉囉哩哩便下座金峯志禪師上堂老僧二十年前有老婆心二十年後無老婆心僧問如何是二十年前有老婆心師曰問凡答凡問聖答聖曰如何是二十年後無老婆心師曰問凡不答凡問聖不答聖襄州蘊禪師上堂琉璃殿上光輝而日日無私七寶山中晃耀而頭頭有據泥牛運步木馬嘶聲野老謳歌樵人舞袖太陽路上古曲玄音林下相逢更有何事梁山觀禪師上堂垂鈎四海祇釣獰龍格外玄機為尋知己太陽玄禪師上堂嵯峨萬仞鳥道難通劍刃輕氷誰當履踐宗乘妙句語路難陳不二法門淨名杜口所以達磨西來九年面壁始遇知音大陽今日也大無端珍重上堂諸禪德須明平常無生句妙玄無私句體明無盡句第一句通一路第二句無賓主第三句兼帶去一句道得獅子嚬呻二句道得獅子返擲三句道得獅子踞地縱也周徧十方擒也一時坐斷正當恁麼時作麼生通得箇消息若不通得箇消息來朝更獻楚王看上堂撒手那邊千聖外祖堂少室長根芽鷺倚雪巢猶自可更看白馬入蘆花上堂夜半烏鷄抱鵠卵天明起來生老鸛鶴毛鷹嘴鷺鷥身却共烏鵶為侶伴高入煙霄低飛柳岸向晚歸來子細看依俙恰似雲中鴈藥山昱禪師上堂山河大地日月星辰與諸上座同生三世諸佛與諸上座同參三藏聖教與諸上座同時還信得及麼若也信得及陝府鐵牛吞却乾坤雖然如是被法身礙却轉身不得須知有出身之路作麼生是諸上座出身之路道道良久曰若道不得永沉苦海珍重投子青禪師上堂召大眾曰若論此事如鸞鳳冲霄不留其迹羚羊挂角那覓乎蹤金龍不守於寒潭玉兔豈棲於蟾影其或主賓若立須威音世外搖頭問答言陳仍玄路旁提為唱若能如是猶在半途更若凝眸不勞相見上堂默沉陰界語落深坑擬著則天地懸殊棄之則千生萬劫洪波浩渺白浪滔天鎮海明珠在誰收掌良久卓拄杖曰百雜碎上堂孤村陋店莫挂瓶盂祖佛玄關橫身直過早是蘇秦觸塞求路難回項羽臨江何逃困命諸禪德到者裏進則落於天魔退則沉於鬼趣不進不退正在死水中諸仁者作麼生得平穩去良久曰任從三尺雪難壓寸靈松芙蓉楷禪師上堂晝入祇陀之苑皓月當天夜登靈鷲之山太陽溢目烏鵶似雪孤鴈成群鐵狗吠而凌霄泥牛鬭而入海正當恁麼時十方共聚彼我何分古佛場中祖師門下大家出一隻手接待往來知識諸仁者且道成得箇甚麼事良久曰剩栽無影樹留與後人看上堂纔陞此座已涉塵勞更乃凝眸自彰瑕玷別傳一句勾賊破家不失本宗狐狸戀窟所以真如凡聖皆是夢言佛及眾生竝為增語到者裏回光返照撒手承當未免寒蟬抱枯木泣盡不回頭上堂喚作一句已是埋沒宗風曲為今時通途消耗所以借功明位用在體處借位明功體在用處若也體用雙明如門扇兩開不得向兩扇上著意不見新豐老子道峯巒秀異鶴不停機靈木迢然鳳無依倚直得功成不處電火難追擬議之間長途萬里上堂拈拄杖曰者裏薦得盡是諸佛建立邊事直饒東涌西沒卷舒自在也未夢見七佛已前消息須知有一人不從人得不受教詔不落階級若識此人一生參學事畢驀召大眾曰更若凝眸不勞相見上堂良久曰青山常運步石女夜生兒便下座枯木成禪師上堂燈籠忽爾笑咍咍如何露柱亦懷胎天明生得白頭女至今遊蕩不歸來者冤家好歸來黃花與翠竹早晚為誰栽上堂知有佛祖向上事方有說話分諸禪德且道那箇是佛祖向上事有箇人家兒子六根不具七識不全是大闡提無佛種性逢佛殺佛逢祖殺祖天堂收不得地獄攝無門大眾還識此人麼良久曰對面不仙陀睡多饒寐語上堂歸元性無二方便有多門但了歸元性何愁方便門諸人要會歸元性麼露柱將來作木杓旁人不肯任從伊要會方便門麼木杓將來作露柱撑天拄地也相宜且道無落方便門一句作麼生道三十年後莫教錯舉寶峯照禪師上堂古佛道我初成正覺親見大地眾生悉皆成正覺後來又道深固幽遠無人能到㘞沒見識漢好龍頭蛇尾便下座上堂過去諸佛已入涅槃了也汝等諸人不應追念未來諸佛未出于世汝等諸人不要妄想正當今日你是何人參上堂伯夷隘柳下惠不恭君子不由也二邊不立中道不安時作麼生拈拄杖曰鴛鴦繡出從君看不把金針度與人上堂太陽門下妙唱彌高明月堂前知音葢寡不免舟橫江渚掉舉清波唱慶堯年和清平樂如斯告報普請承當擬議之間白雲萬里上堂本自不生今亦無滅是死不得底樣子當處出生隨處滅盡是活生受底規模大丈夫漢直須處生死流臥荊棘林俯仰屈伸隨機施設能如是也無量方便莊嚴三昧大解脫門蕩然頓開其或未然無量煩惱一切塵勞嶽立面前塞却古路上堂古人道墮肢體黜聰明離形去智同于大道正當恁麼時且道是甚麼人刪詩書定禮樂還委悉麼禮云禮云玉帛云乎哉樂云樂云鐘皷云乎哉石門易禪師上堂皓月當空澄潭無影紫微轉處夕陽輝彩鳳歸時天欲曉碧霄雲外石笋橫空綠水波中泥牛駕浪懷胎玉兔曉過西岑抱子金鷄夜棲東嶺於斯明得始知夜明簾外別是家風空王殿中聖凡絕跡且道作麼生是夜明簾外事還委悉麼正值秋風來入戶一聲砧杵落誰家大洪遂禪師上堂召大眾一拳拳倒黃鶴樓一踏踏翻鸚鵡洲慣向高樓驟玉馬曾於急水打金毬然雖恁麼爭柰有五色絲絛擊手脚三鑐金鎻鎻咽喉直饒鎚碎金鎻割斷絲絛須知更有一重礙汝在且道如何是那一重還會麼善吉維摩談不到目連鶖子看如盲長蘆了禪師上堂上孤峯頂過獨木橋驀直恁麼行猶是時人脚高脚低處若見得徹不別戶身徧十方未入門常在屋裏其或未然趂涼搬取一轉柴上堂道得第一句不被拄杖子瞞識得拄杖子猶是途路中事作麼生是到地頭一句上堂處處覓不得祇有一處不覓自得且道是那一處良久曰賊身已露上堂苔封古徑不墮虗凝霧鎻寒林肯彰風要鉤針穩密孰云漁父棲巢祇麼承當自是平常快活還有具透關眼底麼良久直饒聞早便歸去爭似從來不出門上堂幻化空身即法身遂作舞云見麼見麼恁麼見得過橋村酒美又作舞云見麼見麼恁麼不見隔岸野花香上堂還有不被玄妙汙染底麼良久曰者一點傾四海水已洗脫不下上堂窮微喪本體妙失宗一句截流淵玄及盡是以金針密處不露光𨦵玉線通時潛舒異彩雖然如是猶是交互雙明且道巧拙不到作麼生相委良久曰雲蘿秀處青陰合巖樹高低翠鎻深上堂轉功就位是向去底人玉韞荊山貴轉位就功是却來底人紅爐片雪春功位俱轉通身不滯撒手兦依石女夜登機密室無人掃正恁麼時絕氣息一句作麼生相委良久曰歸根風墮葉照盡月潭空天童覺禪師上堂黃閣簾垂誰傳家信紫羅帳合暗撒珍珠正恁麼時視聽有所不到言詮有所不及如何通得箇消息去夢回夜色依俙曉笑指家風爛熳春上堂心不能緣口不能議直饒退步荷擔切忌當頭觸諱風月寒清古渡頭夜船撥轉瑠璃地上堂空劫有真宗聲前問己躳赤窮新活計清白舊家風的的三乘外寥寥一印中却來行異類萬派自朝東大洪預禪師上堂舉船子囑夾山曰直須藏身處無蹤跡無蹤跡處莫藏身吾在藥山三十年祇明此事今時人為甚麼却造次丹山無彩鳳寶殿不留冠有時憨有時癡非我途中爭得知治平湡禪師上堂優游實際妙明家轉步移身指落霞無限白雲猶不見夜乘明月出蘆花真如會禪師上堂空劫中事自肯承當日用全彰有何滲漏正好歸家穩坐任他雪覆青山不留元字挂懷誰顧波翻水面且道正不立玄偏不附物一句如何舉似機絲不挂梭頭事文彩縱橫意自殊智通深禪師上堂來不入門去不出戶來去無痕如何提唱直得古路苔封𦏰羊絕迹蒼梧月鏁丹鳳不棲所以道藏身處沒蹤跡沒蹤跡處莫藏身若能如是去住無依了無向背還委悉麼而今分散如雲鶴你我相忘觸處玄雪竇宗禪師上堂人人有箇鼻孔唯有善權無鼻孔為甚麼無二十年前被人掣落了也人人有兩箇眼睛唯有善權無眼睛為甚麼無被人木槵子換了也人人有箇髑髏唯有善權無髑髏為甚麼無借人作屎杓了也遂召大眾曰鼻孔又無眼睛又無髑髏又無諸人還識善權麼若也不識是諸人埋沒善權其或未然更聽一頌㵎底泥牛金貼面山頭石女著真紅繫驢橛上生芝草不是雲靄香爐峰淨慈暉禪師上堂巢知風穴知雨甜者甜兮苦者苦不須計較作思量五五從來二十五萬般施設到平常此是叢林飽參句諸人還委悉麼野老不知堯舜力鼕鼕打皷祭江神上堂谷之神樞之要裏許旁參回途得妙雲雖動而常閒月雖晦而彌照賓主交參正偏兼到十洲春盡花凋殘珊瑚樹林日杲杲上堂皮膚脫落絕方隅明了身心一物無妙入道寰深靜處玉人端馭白牛車妙明田地達者還稀識情不到唯證方知白雲兒靈靈自照青山父卓卓常存機分頂後光智契劫前眼所以道新豐路兮峻仍皾新豐洞兮湛然沃登者登兮不動搖游者游兮莫忽速亭堂雖有到人稀林泉不長尋常木諸禪德向上一著尊貴難明瑠璃殿上不稱尊翡翠簾前還合伴正與麼時針線貫通真宗不墜合作麼生施設滿頭白髮離巖谷半夜穿雲入市上堂舉傅大士法身頌云空手把鋤頭步行騎水牛人從橋上過橋流水不流雲門大師道諸人東來西來南來北來各各騎一頭水牯牛來然雖如是千頭萬頭祇要識取者一頭師曰雲門尋常乾𪹼𪹼地錐劄不入到者裏也解拖泥帶水諸人祇今要見者一頭麼天色稍寒各自歸堂上堂舉風幡話師曰風幡動處著得箇眼却是上座風幡動處失却箇眼即是風幡其或未然不是風幡不是心衲僧徒自強錐針巖房雨過昬煙淨臥聽涼風生竹林瑞巖恭禪師上堂春風楊柳眉春禽弄百舌一片祖師心兩處俱漏泄不動步還家習漏頓消滅暗投玉線芒曉貫金針穴深固實幽遠無人孰辨別慚愧可憐生頭頭皆合轍不念阿彌陀南無乾屎橛無智癡人前第一不得說雲門偃禪師上堂我事不獲已向你諸人道直下無事早是相埋沒了也更欲踏步向前尋言逐句求覓解會千差萬別廣設問難贏得一場口滑去道轉遠有甚麼休歇時此事若在言語上三乘十二分教豈是無言語因甚麼更道教外別傳若從學解機智得祇如十地聖人說法如雲如雨猶被呵責見性如隔羅縠以此故知一切有心天地懸殊雖然如此若是得底人道火何曾燒口終日說事未甞挂著唇齒未甞道著一字終日著衣喫飯未甞觸著一粒米挂一縷絲雖然如此猶是門庭之說也須是實得恁麼始得若約衲僧門下句裏呈機徒勞佇思直饒一句下承當得猶是瞌睡漢時有僧問如何是一句師曰舉上堂三乘十二分教橫說竪說天下老和尚縱橫十字說與我拈針鋒許說底道理來看恁麼道早是作死馬醫雖然如此且有幾箇到此境界不敢望汝言中有響句裏藏鋒瞬目千差風恬浪靜伏惟尚饗上堂諸兄弟盡是諸方參尋知識決擇生死到處豈無尊宿垂慈方便之詞還有透不得底句麼出來舉看待老漢與你大家商量有麼有麼時有僧出擬伸問次師曰去去西天路迢迢十萬餘便下座上堂因聞鐘聲乃曰世界與麼廣濶為甚麼鐘聲披七條上堂舉一則語教汝直下承當早是撒屎著汝頭上也直饒拈一毫頭盡大地一時明得也是剜肉作瘡雖然如此汝亦須是實到者箇田地始得若未切不得掠虗却須退步向自己根脚下推尋看是箇甚麼道理實無絲毫許與汝作解會與汝作疑惑況汝等各各當人有一段事大用現前更不煩汝一毫頭氣力便與祖佛無別自是汝諸人信根淺薄惡業濃厚突然起得許多頭角擔鉢囊千鄉萬里受屈作麼且汝諸人有甚麼不足處大丈夫漢阿誰無分獨自承當得猶不著便不可受人欺謾取人處分纔見老和尚開口便好把特石驀口塞便是屎上青蠅相似鬬唼將去三箇五箇聚頭商量苦屈兄弟古德一期為汝諸人不柰何所以方便垂一言半句通汝入路知是般事拈放一邊自著些子筋骨豈不是有少許相親處快與快與時不待人出息不保入息更有甚麼身心別處閒用切須在意珍重上堂佛法也太煞有祇是舌頭短良久曰長也上堂一言纔舉千車同轍該括微塵猶是化門之說若是衲僧合作麼生若將佛意祖意者裏商量曹谿一路平沈還有人道得麼道得底出來僧問如何是超佛越祖之談師曰餬餅曰者裏有甚麼交涉師曰灼然有甚麼交涉乃曰汝等諸人沒可作了見人道著祖意便問超佛越祖之談汝且喚甚麼作佛喚甚麼作祖且說超佛越祖底道理看問箇出三界汝把將三界來看有甚麼處聞覺知隔礙著汝有甚麼聲塵色法與汝可了了箇甚麼椀以那箇為差殊之見他古聖不柰何橫身為物道箇舉體全真物物覿體不可得我向汝道直下有甚麼事早是相埋沒了也汝若實未有入頭處且獨自參詳除却著衣喫飯屙屎送尿更有甚麼事無端起得如許多般妄想作甚麼更有一般底如等閒相似聚頭學得箇古人話路識性記持妄想卜度道我會佛法了也祇管說葛藤取性過時更嫌不稱意千鄉萬里拋却父母師長作者去就者般打野榸漢有甚麼死急行脚去以拄杖趂下上堂故知時運澆漓代干像季近日師僧北去言禮文殊南去謂遊衡嶽恁麼行脚名字比丘徒消信施苦哉苦哉問著黑漆相似祇管取性過時設有三箇兩箇狂學多聞記持話路到處覓相似語句印可老宿輕忽上流作薄福業他日閻羅王釘釘之時莫道無人向你說若是初心後學直須擺動精神莫空記人說處多虗不如少實向後祇是自賺有甚麼事近前上堂我看汝諸人二三機中尚不能搆得空披衲衣何益汝還會麼我與汝註破久後到諸方若見老宿舉一指竪一拂子云是禪是道拽拄杖打破頭便行若不如此盡落天魔眷屬壞滅吾宗汝若實不會且向葛藤社裏看我尋常向汝道微塵剎土中三世諸佛西天二十八祖唐土六祖盡在拄杖頭上說法神通變現聲應十方一任縱橫汝還會麼若不會且莫掠虗然雖如此且諦當實見也未直饒到此田地也未夢見衲僧沙彌在三家村裏不逢一人驀拈拄杖畫一畫曰總在者裏又畫一畫曰總從者裏出去也珍重上堂聞聲悟道見色明心遂舉起手曰觀世音菩薩將錢買餬餅放下手曰元來祇是饅頭上堂乾坤之內宇宙之間中有一寶秘在形山拈燈籠向佛殿裏將三門來燈籠上作麼生自代曰逐物意移又曰雲起雷興上堂拈拄杖曰凡夫實謂之有二乘析謂之無緣覺謂之幻有菩薩當體即空衲僧家見拄杖便喚作拄杖行但行坐但坐不得動著上堂圅葢乾坤目機銖兩不涉世緣作麼生承當眾無對自代曰一鏃破三關上堂諸和尚子莫妄想天是天地是地山是山水是水僧是僧俗是俗良久曰與我拈案山來僧便問學人見山是山水是水時如何師曰三門為甚麼騎佛殿從者裏過曰恁麼則不妄想去也師曰還我話頭來上堂你若不相當且覓箇入頭處微塵諸佛在你舌頭上三藏聖教在你脚跟底不如悟去好還有悟得底麼出來對眾道看示眾盡十方世界乾坤大地以拄杖畫云百雜碎三乘十二分教達磨西來放過即不可若不放過不消一喝示眾真空不壞有真空不異色僧便問作麼生是真空師曰還聞鐘聲麼曰此是鐘聲師曰驢年夢見麼上堂平地上死人無數過得荊棘林者是好手時有僧出曰與麼則堂中第一座有長處也師曰蘇嚕蘇嚕上堂拈拄杖曰拄杖子化為龍吞却乾坤了也山河大地甚處得來示眾大用現前不存軌則時有僧問如何是大用現前師拈起拄杖高聲唱曰釋迦老子來也上堂要識祖師麼以拄杖指曰祖師在你頭上𨁝跳要識祖師眼睛麼在你脚跟下又曰者箇是祭鬼神茶飯雖然如此鬼神也無厭足上堂光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可子細點檢將來有甚麼氣息亦是病德山密禪師上堂我有三句語示汝諸人一句圅葢乾坤一句截斷眾流一句隨波逐浪作麼生辯若辯得出有參學分若辯不出長安路上輥輥地上堂與麼來者現成公案不與麼來者垛生招箭總不與麼來者徐六擔板迅速鋒𨦵猶是鈍漢萬里無雲青天猶在上堂舉臨濟示眾曰恁麼來者恰似失却不恁麼來者無繩自縛十二時中莫亂斟酌會與不會都盧是錯分明與麼道一任天下人貶剝師曰古鏡濶一丈屋梁長三尺是汝鉢鐼子濶多少洞山初禪師上堂言無展事語不投機承言者喪滯句者迷還得麼你衲僧分上到者裏須具擇法眼始得祇如洞山恁麼道也有一場過且道過在甚麼處南臺遵禪師上堂從上宗乘合作麼生提綱合作麼生言論佛法兩字當得麼真如解脫當得麼雖然如是細不通風大通車馬若約理化門中一言纔啟震動乾坤山河大地海晏河清三世諸佛說法現前於此明得古佛殿前同登彼岸無事珍重覺華照禪師上堂總似今日老胡有望然燈佛不如闍黎總似今日老胡絕望闍黎不如然燈佛于此明得大地微塵諸佛西天二十八祖唐土六祖天下老宿一時拈來山僧拄杖頭上轉妙法輪於此明不得百千諸佛穿你鼻孔西天二十八祖透過你髑髏還知麼若不知山僧與你指出良久曰山河大地有甚麼過久立珍重五祖戒禪師上堂佛病祖病一時與諸禪德拈向三門外諸禪德還拈得山僧病也無若拈得山僧病不妨見得佛病祖病珍重智門祚禪師上堂一法若有毗盧墮在凡夫萬法若無普賢失其境界正當恁麼時文殊向甚麼處出頭若也出頭不得金毛獅子腰折幸好一盤飯莫待糝椒薑上堂山僧記得在母胎中有一則語今日舉似大眾諸人不得作道理商量還有人商量得麼若商量不得三十年後不得錯舉上堂雪峯輥毬羅漢書字歸宗斬蛇大隨燒畬且道明甚麼邊事還有人明得麼試道看若明不得所以道斬蛇須是斬蛇手燒畬須是燒畬人瞥起情塵生妄見眼裏無筋一世貧洞山聰禪師上堂教山僧道甚麼即得古即是今今即是古所以楞嚴經道松直棘曲鵠白烏玄還知得麼雖然如是未必是松一向直棘一向曲鵠便白烏便玄洞山道者裏也有曲底松也有直底棘也有玄底鵠也有白底烏久立上堂晨鷄報曉靈粥後便天明燈籠猶瞌睡露柱却惺惺復曰惺惺直言惺惺歷歷直言歷歷明朝後日莫認奴作郎珍重洞山寶禪師上堂總恁麼風恬浪靜那裏得來忽遇洪波浩渺白浪滔天當恁麼時覓箇水手也難得眾中莫有把柂者麼眾無對師曰賺殺一船人上方岳禪師上堂旋收黃葉燒青煙竹榻和衣半夜眠粥後放參三下皷孰能更話祖師禪便下座育王坦禪師上堂千花競發百鳥啼春是向上句諸佛出世知識興慈是向下句作麼生是不涉二途句若識得頂門上出氣若識不得土牛耕石田擊禪床下座金山新禪師上堂世間所貴者和氏之璧隋侯之珠金山喚作驢屎馬糞出世間所貴者真如解脫菩提涅槃金山喚作𡱰沸碗鳴且道恁麼說話落在甚麼處故不是取舍心重信邪倒見諸人要知麼猛虎不顧几上肉洪爐豈鑄囊中錐雲居舜禪師上堂唯一堅密身一切塵中現蝦蟇蚯蚓各有窟穴烏鵲鳩鴿亦有窠巢正當與麼時為甚麼人說法良久曰方以類聚物以群分上堂三峽道無別朝朝祇麼說僧繇會寫真鎮府出鑌鐵上堂不長不短不小不大此箇道理是誰境界咄上堂聞說佛法兩字早是污我耳目諸人未跨雲居門脚跟下好與三十棒雖然如是也是為眾竭力上堂舉夾山道閙市門頭識取天子百草頭上薦取老僧雲居即不然婦搖機軋軋兒弄口㗻㗻上堂諸方有弄蛇頭撥虎尾跳大海劍刃裏藏身雲居者裏寒天熱水洗脚夜間脫襪打睡早朝旋打行纏風吹籬倒喚人夫劈篾縛起上堂雲居不會禪洗脚上床眠冬瓜直儱侗瓠子曲彎彎育王璉禪師上堂文殊寶劍得者為尊乃拈拄杖曰淨因今日恁麼直得千聖路絕雖然如是猶是矛盾相攻不犯鋒𨦵如何運用良久曰野蒿自發空臨水江燕初歸不見人參上堂太陽東昇爍破大千之暗諸人若向明中立猶是影響相馳若向暗中立也是藏頭露影漢到者裏作麼生吐露良久曰逢人祇可三分語未可全拋一片心參上堂世法裏面迷却多少人佛法裏面醉却多少人祇如不迷不醉是甚麼人分上事上堂言鋒纔擊義海交深若用徑截一路各請歸堂上堂應物現形如水中月遂拈起拄杖曰者箇不是物即今現形也且道月在甚麼處良久曰長空有路還須透潭底無蹤不用尋擊香臺下座上堂白日東上白日西落急如投壺閃寥廓神龍一舉透無邊纖鱗猶向泥中躍靈𦦨中休湊泊三歲孩童髽四角參上堂良久舉起拳頭曰握拳則五嶽倒卓展手則五指參差有時把定佛祖關有時拓開千聖宅今日者裏相呈且道作何使用拍禪床曰向下文長付在來日承天簡禪師上堂夫遮那之境界眾妙之玄門知識說之而莫窮善財酌之而不竭文殊體之而寂寂普賢證之以重重若也隨其法性如雲收碧漢本無一物若也隨其智用如花開春谷應用無邊雖說偏恒沙乃同遵一道且問諸人作麼生是一道良久曰白雲斷處見明月黃葉落時聞擣衣參上堂莫離葢纏莫求佛祖去此二途以何依怙江淹夢筆天龍見虎古老相傳月不跨五參上堂一刀兩段埋沒宗風獅子飜身拖泥帶水直饒坐斷十方不通凡聖脚跟下好與三十上堂拈一放一妙用縱橫去解除玄收凡破聖若望本分草料大似磨甎作鏡衲僧家合作麼生良久曰實九峯韶禪師上堂山僧說禪如虴蜢吐油揑著便出若不揑著一點也無何故祇為不曾看讀古今因緣及預先排疊勝妙見知等候陞堂便磨唇捋觜將粥飯氣熏炙僧人凡有一問一答葢不得已豈獨山僧看他大通智勝如來默坐十劫無開口處後因諸天梵天及十六王子再三勸請方始說之却不是秘惜祇為不敢埋沒諸人山僧既不埋沒諸人不得道山僧曾陞座參西塔殊禪師上堂黃梅席上數如麻句裏呈機事可嗟直是本來無一物青天白日被雲遮參慧力文禪師上堂建山寂寞坐倚城郭無味之談七零八落以拄杖敲香臺下座雲居億禪師上堂馬祖纔陞堂雄峯便卷席春風一陣來滿地花狼籍便下座玉泉皓禪師示眾曰一夜雨霶烹打倒蒲萄棚知事頭首行者人力拄底拄撐底撐撐撐拄拄到天明依舊可憐生天聖道禪師上堂不從一地至一地寂滅性中寧有位釋迦稽首問然燈仁者何名為受記便下座天衣懷禪師上堂須彌頂上不扣金鐘畢鉢巖中無人聚會山僧倒騎佛殿諸人反著草鞋朝遊檀特暮到羅浮拄杖針筒自家收取上堂衲僧橫說竪說未知有頂門上眼時有僧問如何是頂門上眼師曰衣穿瘦骨露屋破看星眠上堂大眾集定乃曰上來道箇不審能銷萬兩黃金下去道箇珍重亦銷得四天下供養若作佛法話會滴水難消若作無事商量眼中著屑且作麼生即是良久曰還會麼珍重上堂夫為宗師須是驅耕夫之牛奪饑人之食遇賤即貴遇貴即賤驅耕夫之牛令他苗稼豐登奪饑人之食令他永絕饑渴遇賤即貴握土成金遇貴即賤變金成土老僧亦不驅耕夫之牛亦不奪饑人之食何謂耕夫之牛我復何用饑人之食我復何餐我也不握土成金也不變金作土何也金是金土是土玉是玉石是石僧是僧俗是俗古今天地古今日月古今山河古今人倫雖然如此打破大散關幾箇迷逢達磨上堂鴈過長空影沉寒水鴈無遺蹤之意水無留影之心若能如是方解向異類中行不用續鳧截鶴夷嶽盈壑放行也百醜千拙收來也攣攣拳拳用之則敢與八大龍王鬬富不用都來不直半分錢參上堂髑髏常干世界鼻孔摩觸家風芭蕉聞雷開葵花隨日轉諸仁者芭蕉聞雷開還有耳麼葵花隨日轉還有眼麼若也會得西天即是此土若也不會七九六十三收上堂靈源絕朕普現色身法離斷常有無堪示所以道塵塵不見佛剎剎不聞經要會靈山親授記晝見日夜見星良久曰若到諸方不得錯舉參上堂夜來寒霜凜冽黃河凍結陝府鐵牛腰折盡道女媧煉石補天爭柰西北一缺如今欲與他補却又恐大地人無出氣處且留者一竅與大地人出氣參上堂虗明自照不勞心力上士見之鬼神茶飯中下得之狂心頓息更有一人切忌道著上堂光透日月明暗不收智出聖凡賢愚不歷所以道不用低頭思量難得良久曰是甚麼上堂青蘿夤緣直上寒松之頂白雲淡泞出沒太虗之中何似南山起雲北山下雨若也會得甜瓜徹蔕甜若也不會苦瓠連根苦上堂無邊剎境自他不隔于毫端且道妙喜世界不動如來說甚麼法十世古今始終不離於當念祇如威音王佛最初一會度多少人若是通方作者試為道看良久曰行路難行路難萬仞峯頭君自看上堂枯桑知天風海水知天寒金色頭陀見處不真鷄足山中與他看守衣鉢三千大喻八百小喻大似泥裏洗土塊四十九年三百六十餘會摩竭提國猶較些子德山臨濟雖然丈夫爭似𦋺賓國王一刀兩段如今若有箇人鼻孔遼天山僧性命何在良久曰太平本是將軍致不許將軍見太平喝一喝下座法昌遇禪師上堂汝若退身千尺我便當處生芽汝若覿面相呈我便藏身露影汝若春池拾礫我便撒下明珠直得水洒不著風吹不入如箇無孔鐵鎚相似且道法昌還有為人處也無良久曰利刀割肉瘡猶合惡語傷人恨不銷上堂春山青春水綠一覺南柯夢初足擕笻縱步出松門是處桃英香馥郁因思昔日靈雲老三十年來無處討如今競愛摘楊花紅香滿地無人掃上堂拈起拄杖曰我若拈起你便喚作先照後用我若放下你便喚作先用後照我若擲下你便喚作照用同時忽然不拈不放你向甚麼處卜度直饒會得倜儻分明若遇臨濟德山便須腦門著地且道伊有甚麼長處良久曰曾經大海休誇水除却須彌不是山上堂夜半烏鷄誰捉去石女無端遭指注空王令下急搜求唯心便作軍中主雲門長驅溈山隊伍列五位槍旗布三玄戈弩藥山持刀青原荷斧石鞏彎弓禾山打皷陣排雪嶺長蛇兵屯黃檗飛虎木馬帶毛烹泥牛和角煑賞三軍犒師旅打葛藤分露布截海颺塵橫山簸土擊玄關除徼路多少平人受辛苦無邊剎海競紛紛三界聖凡無覓處無覓處還知否昨夜雲收天宇寬依然帶月啼高樹雲居元禪師上堂寒寒風撼竹聲乾水凍魚行澀林疎鳥宿難早是嚴霜威重那堪行客衣單休思紫陌山千朵且擁紅爐火一攢放下茱萸空中竹橛倒却迦葉門前剎竿直下更云不會筭來也太無端參智海逸禪師上堂憶得老僧年七歲時于村校書處得一法門超情離見絕妙絕玄爰自染神逾六十載今日輙出普告大眾若欲傳持宜當諦聽遂曰寒原耕種罷牽犢負薪歸此夜一爐火渾家身上衣諸禪德逢人不得錯舉上堂古者道接物利生絕妙外甥終是不肖他家自有兒孫將來應用恰好諸禪德還會麼菜園牆倒晴方築房店籬穿雨過修院宇漏時隨分整兒孫大小盡風流慧林照禪師上堂頭圓像天足方似地古貌稜層丈夫意氣趯倒須彌踏翻海水帝釋與龍王無著身處乃拈拄杖曰却來拄杖上回避咄任汝神通變化究竟須歸者裏以拄杖卓一下法雲秀禪師上堂看風使帆正是隨波逐浪截斷眾流未免依前滲漏量才補職寧越短長買帽相頭難得恰好直饒上不見天下不見地東西不辯南北不分有甚麼用處任是純鋼打就生鐵鑄成也須額頭汗出總不恁麼如何商量良久曰赤心片片誰知得笑殺黃梅石女兒上堂山僧不會巧說大都應箇時節相喚喫椀茶湯亦無祖師妙訣禪人若也未相諳踏著秤鎚硬似鐵上堂秋雲秋水青山滿目者裏明得千足萬足其或未然道士倒騎牛參上堂寒雨細朔風高吹沙走石扳木鳴條諸人盡知有且道風作何色若識得去許你具眼若也不識莫怪相瞞參上堂少林九年冷坐却被神光破如今玉石難分祇得麻纏紙裹還會麼笑我者多哂我者少上堂衲僧家高揖釋迦不拜彌勒未為分外祇如半偈亡軀一句投火又圖箇甚麼良久曰彼彼住山人何須更說破長蘆夫禪師上堂召眾曰江山遶檻宛如水墨屏風殿閣凌空麗若神仙洞府森羅萬象海印交參一道神光更無遮障諸人還會麼良久曰寥寥天地間獨立望何極參梵言首座示眾南陽國師道說法有所得斯則野干鳴說法無所得是名獅子吼師曰國師恁麼道大似掩耳偷鈴何故說有說無盡是野干鳴諸人要識獅子吼麼咄開元孜禪師上堂衲僧家向針眼裡藏身稍寬大海中走馬甚窄將軍不上便橋勇士徒勞挂甲晝行三千夜行八百即不問不動步一句作麼生道若也道得觀音勢至文殊普賢祇在目前若道不得直須撩起布裙緊峭草鞋參上堂寒空落落大地漫漫雲生洞口水出高原若也把定則十方世界恍然若也放行則東西南北坦然茫茫宇宙人無數一箇箇鼻孔遼天且問諸人把定即是放行即是還有人斷得麼若無人斷得三門外有兩箇大漢一箇張眉握劍一箇努目揮拳參明因贇禪師上堂橫按拄杖曰若恁麼去直得天無二日國無二王釋迦老子飲氣吞聲一大藏教如蟲蝕木設使鑽仰不及正是無孔鐵鎚假饒信手拈來也是殘羮餿飯一時吐却方有少分相應更及墮在空亡依舊是鬼家活計要會麼雨後始知山色翠事難方見丈夫心卓拄杖下座西臺辯禪師上堂舉臨濟無位真人語乃召大眾曰臨濟老漢尋常一條脊梁硬似鐵及乎到者裏大似日中迷路眼見空花直饒道無位真人是乾屎橛正是泥龜曳尾其僧祇知季夏極熱不知仲冬嚴寒若據當時合著得甚麼語塞斷天下人舌頭西臺祇恁麼休去又乃眼不見為淨不免出一隻手狼籍去也臨濟一擔西臺一堆一擔一堆分付阿誰從教撒同諸方去笑殺當年老古錐中際遵禪師上堂咄咄咄井底啾啾是何物直饒三千大千也祇是箇鬼窟咄上堂昨夜四更起來呵呵大笑不歇幸然好一覺睡霜鐘撞作兩橛上堂禾山普化忽顛狂打皷搖鈴戲一場劫火洞然宜煑茗嵐風大作好乘涼四蛇同篋看他弄二鼠侵藤不自量滄海月明何處去廣寒宮殿白銀床咄上堂八萬四千深法門門門有路超乾坤如何箇箇踏不著祇為蜈蚣太多脚不唯多脚亦多口釘觜鐵舌徒增醜拈椎竪拂泥洗泥揚眉瞬目籠中鷄要知佛祖不到處門掩落花春鳥啼大中隆禪師上堂法無異法道無別道時時逢見釋迦處處撞著達磨放步即交肩開口即齩破不齩破大小大上堂夫欲智拔先須定動卓拄杖曰唵囌嚧㗭唎娑婆訶歸堂喫茶上堂觸境無滯底為甚麼擡頭不起田地穩密底為甚麼下脚不得譬如天王賜與華屋雖獲大宅要因門入乃曰門聻樊噲踏開真主出巨靈擡手錦鱗噴參資壽巖禪師上堂雲生谷口月滿長川樵父斫深雲漁翁釣沙島到者裏便是吳道子張僧繇無你下手處良久曰歸堂問取聖僧參上堂乾坤肅靜海晏河清風不鳴條雨不破塊春生夏長秋收冬藏者箇是世間法作麼生是佛法良久曰欲得不招無間業莫謗如來正法輪本覺一禪師上堂折半列三人人道得去一拈七亦要商量正當今日雲門道底不要別作麼生露得箇消息良久曰日月易流地藏恩禪師上堂竪起拳曰或時為拳復開曰或時為掌若遇衲僧有功者賞遂放下曰直是土曠人稀相逢者少上堂雨後鳩鳴山前麥熟何處牧童兒騎牛笑相逐更把短笛橫吹風前一曲兩曲參道場印禪師上堂韶石渡頭舟橫野水汾陽浪裏棹撥孤煙雲月無私谿山豈異一言合轍千里同風敢問諸人作麼生是同風底句良久曰八千子弟今何在萬里山河屬帝家法雲白禪師上堂離婁有意白浪徒以滔天罔象無心明珠忽然在掌以手打一圓相召大眾曰還見麼良久曰看即有分上堂拈拄杖示眾曰山僧住持七十餘日未曾拈動者箇而今不免現些小神通供養諸人遂卓拄杖下座元豐滿禪師上堂堪作梁底作梁堪作柱底作柱靈利衲僧便知落處驀拈拄杖曰還知者箇堪作甚麼打香臺一下曰莫道無用處復打一下曰參招提湛禪師上堂六塵不惡還同正覺馬上誰家白面郎穿花折柳垂巾角夜來一醉明月樓呼盧輸却黃金宅臂鷹走犬歸不歸蛾眉皓齒嗔無力此心能有幾人知黃頭碧眼非相識囉囉哩拍手一下下座長蘆和禪師上堂一二三四五六碧眼胡僧數不足泥牛入海過新羅木馬追風到天竺天竺茫茫何處尋補陀巖上問觀音普賢拍手呵呵笑歸去來兮秋水深資福明禪師上堂資福別無所補五日一參擊皷何曾說妙談玄祇是麤言直語甘草自來甜黃連依舊苦忽若鼻孔撩天逢人切忌錯舉參雲峯璿禪師上堂休去歇去一念萬年去寒灰枯木去古廟香爐去一條白練去大眾古人見處如日暉空不著二邊豈墮陰界堪嗟後代兒孫多作一色邊會山僧即不然不休去不歇去業識茫茫去七顛八倒去十字街頭閙浩浩地聲色裏坐臥去三家村裏盈衢塞路荊棘裏游戲去刀山劍樹劈腹剜心鑊湯爐炭皮穿骨爛去如斯舉唱大似三歲孩兒輥繡毬上堂僧問如何是西來意師曰築著額頭磕著鼻意旨如何師曰驢駞馬載曰向上還有事也無師曰朝到西天暮歸唐土曰謝師答話師曰大乘砑郎當僧退師乃曰僧問西來意築著額頭磕著鼻意旨又如何驢駞并馬載朝到西天暮歸唐大乘恰似砑郎當何故沒量大人被語脉裏轉却遂拊掌大笑下座雪竇寧禪師上堂百川異流以海為極森羅萬象以空為極四聖六凡以佛為極明眼衲子以拄杖子為極且道拄杖子以何為極有人道得山僧兩手分付儻或未然不如閒倚禪床畔留與兒孫指路頭開先宗禪師上堂一不做二不休捩轉鼻孔捺下雲頭禾山解打鹽官皷僧繇不寫戴嵩牛廬陵米投子油雪峯依舊輥雙毬夜來風送衡陽信寒鴈一聲霜月幽九座䆳禪師上堂九座今日向孤峯絕頂駕一隻鐵船截斷天下人要津教他揮篙動棹不得有箇錦標子且道在甚麼人手裏拈拄杖曰看看向道是龍剛不信等閒奪得始驚人中竺妙禪師上堂去年梅今歲柳顏色馨香喝一喝良久曰若不得者一喝幾乎道著依舊且道道著後如何眼睛突出
