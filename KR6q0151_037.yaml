一夏增一日也不得減一日也不得取不得捨不得不可得中祇麼得翠雲見處又且不然山僧行腳三十年來誰管他一日九十日也無得也無不得處處當來見彌勒且道彌勒在甚麼處金風吹渭水落葉滿長安古梅友禪師解夏上堂九旬禁足特地成錯三月安居無繩自縛布袋解開乾坤寥廓放去若龜毛收來懸兔角試將兩眼挂虗空一陳涼風生殿角鐵關樞禪師解夏上堂七月十五放出猛虎吼作金毛吞却佛祖大衆既是猛虎為甚作獅子哮吼上堂舉溈山問仰山子一夏作得箇什麼仰云開得一片畬種得一籮粟溈云子也不空過一夏施鴆毒於樽俎之間仰山問溈山和尚一夏作得箇什麼溈云日中一食夜後一宿仰云和尚也不空過一夏揮戈矛於笑談之頃召大衆云會麼兩箇駝子相逢著世上祇今無直人月江印禪師解夏云秋初夏末兄弟家東去西去如壯士展臂不假他力如獅子遊行不求伴侶蓋為人人腳跟下有條通天活路三世諸佛六代祖師天下老和尚與你把手共行豈不見雲門大師問洞山近離甚處查渡夏在甚處湖南報慈幾時離彼八月二十五雲門云放你三頓棒次日上方丈問云昨日蒙和尚放三頓棒不知過在甚處飯袋子江西湖南便恁麼去洞山於言下大悟雲門提出倚天長劍凜凜神鋒不易洞山放將赤身衝他白刃正與麼時如何金烏破琉璃殼玉兔挨開碧海門正法明禪師解制上堂林葉紛紛落乾坤報早秋分明西祖意何用更馳求若恁麼會得始信佛祖之道本自平夷大解脫門元無關鑰彌綸宇宙逼塞虗空量不可窮智不能測若也未明此旨不達其源任是百劫薰功千生煉行徒自疲苦了無交涉若深明此旨洞達其源乃知動靜施為經行坐臥頭頭合道念念朝宗祖不云乎迷生寂亂悟無好惡得失是非一時放却如是則誰迷誰悟誰是誰非自是諸人獨生異見觀大觀小執有執無己靈獨耀不肯承當心月孤圓自生違背何異家中捨父衣內忘珠致使菩提路上荊棘成林解脫空中迷雲蔽日山僧今日幸值衆僧自恣化主還山諸上善人得得光訪不可緘默隨分葛藤曲為今時少開方便也須是諸人著眼各自諦觀若更擬議尋思白雲萬里遂拈拄杖云於斯明得靈山一會儼在目前其或未然更待來晨分付正堂辨禪師解夏上堂十五日已前不得去少林隻履無藏處十五日已後不得住桂子天香和雨露正當十五日又且如何阿呵呵風流不在著衣多退庵休禪師上堂結夏時左眼半斤解夏時右眼八兩謾云九十日安居嬴得一肚皮妄想直饒七穴八穿未免山僧拄杖雖然如是千鈞之弩不為鼷鼠發機石屋珙禪師解制上堂有佛處不得住樓臺月色雲收去無佛處急走過池塘荷葉風吹破三千里外逢人不得錯舉朗州山澧州水四海五湖皇化裏腰包頂笠萬千千問著盡言山與水忽有不甘底出來道山但言山水但言水有甚麼過良久云未可全拋一片心逢人且說三分話解制上堂九旬同禁足自恣是今朝暮雨青燈寺西風白石橋孤身三事衲萬里一輕包若到溈山處須防笑裡刀解制上堂今朝七月十五凉風開我竹戶嶺上一片兩片白雲被他吹得七橫八竪輕飄飄浮逼逼欲散不散欲聚不聚老僧招手向白雲白雲白雲何不住到頭終是覓山歸流落天涯與途路喝一喝元叟端禪師解夏上堂四月十五日結拈拄杖左卓一卓諸方向者裏禁足安居七月十五日解拈拄杖右卓一卓諸方向者裏休夏自恣空劫前無佛名無衆生名結又結箇甚麼解又解箇甚麼靠拄杖便下座解夏上堂秋山削玉秋水磨銅南北東西活路通兩隻草鞋健如虎一條鍚杖獰如龍忽然撞著定上座道無位真人與非無位真人相去多少切忌無言滿面紅解夏上堂結却布袋頭萬象森羅沒出氣處解却布袋頭山河大地得大自在結也結了解也解了諸人一任東去西去前程忽有人問著輒不得道在中天竺過夏下座解夏上堂舉東山和尚示衆云百煉黃金鑄鐵牛十分高價與人酬庭前不有華含笑又是東山一夏休師云徑山隨氀㲣也有一頌老矣無心鑄鐵牛眼前隨分即相酬庭前葉脫西風起且喜凌霄一夏休楚石琦禪師解夏上堂今日解也南天台北五臺一任七縱八橫前程忽有人問永祚近日如何作麼生祗對但道來時不教某甲傳語管取坐斷天下人舌頭雖然者箇是永祚的那箇是上座的解夏上堂盡十方世界是箇真實人體菩提煩惱生死涅槃有為無為前聖後聖結制解制長期短期真實體上了沒交涉雪峰三到投子九上洞山末後鰲山店上打失鼻孔大隨參六十餘員善知識長慶坐破七箇蒲團興化於大覺棒頭深明黃檗意旨掀翻海嶽罷却干戈如將谷響千斤換得空花萬片威音那畔空劫已前但有言說都無實義穿却天下人鼻孔一句作麼生道大鵬展翅蓋十洲籬邊燕空啾啾復舉僧問雲門秋初夏末前程忽有人問未審對他道什麼門云大衆退後僧云過在什麼處門云還我九十日飯錢來師云放過即不可未審道什麼但對他道七十二棒翻成一百二十過在什麼處對他道你但喫棒我要者話行呆庵莊禪師解夏上堂聖制告圓正是今日諸方叢席說禪說道閙浩浩地我者裏孤逈逈峭巍巍縱有佛法誰著眼拍禪床下座上堂解夏之後東去西去南去北去直須向高高山頂立深深海底行若是閨閣中物捨不得未免墮坑落塹擊拂子當門更不栽荊棘免被人來惹著衣愚庵及禪師解夏進退兩序上堂有進有退有結有解左之右之風流儒雅鐘樓上念讚床腳下種菜勝首座道猛虎當路坐卓拄杖云一雨普滋三草二木解夏上堂四月十五日結却布袋頭十字縱橫底有甚數七月十五日解却布袋頭無繩自縛底有甚數喝一喝結也不可得解亦何曾有結解二圓離面南看北斗下座笑隱欣禪師解夏上堂禪人解夏東西去莫道腰包趂早凉三界炎炎如火宅不知何處是家鄉解夏上堂舉僧問九峰西天夏末多有得道果者未審此間有也無峰云有僧云是什麼人峰云頭戴午夜月腳踏黃金地師云西天此土不離寸步得道得果鳳縈金鎖我此一衆總不與麼不用修行也無功顆九十日中亦不虗過如今暑退凉生一任經行坐臥莫問祖師機緣總是野狐涎唾便是鶻眼龍睛也與從頭按過放出長沙老大蟲驚到嵩山破竈墮恕中慍禪師解夏上堂舉德山遠和尚夏滿上堂僧問九旬禁足今已滿自恣之儀事若何德山云猢猻趂蛺蝶九步作一歇僧云未審意旨如何德山以頌示之云兩箇兒童舁木鼓左邊打了右邊舞剎那變現百千般分明示君君記取拈云答也答了頌也頌了爭奈者僧未肯點首在靈巖路見不平要與德山相見自恣在今朝有華當面貼一句定誵訛猢猻趂蛺蝶蛺蝶飛無處尋空中打坐海底穿針驀拈拄杖顧視左右云衆中莫有因齊慶讚者麼卓拄杖休將閒學解埋沒祖師心上堂夏有解結法無定相有無之義空裏漚華南天台北五臺在諸人腳跟底踏著踏不著置而不說前程忽有問何處來切不得道瑞巖來教他疑三十年無文璨禪師解夏上堂舉老宿一夏不為師僧說話公案師頌云一言已出駟難追道了如何悔得來冷地被人相訐露牙關咬定口慵開了庵欲禪師解夏上堂佛歡喜僧自恣香象渡河截流而去有利無利不離行市拄杖頭邊別有天地卓拄杖喝一喝南石琇禪師解夏上堂圓覺能出一切法一切法未嘗離圓覺螻蟻知雨而封穴石𧉧應節而揚葩粘手粘腳底有甚數十字縱橫底有甚數解制施主捨禪床席并法衣上堂九夏安居纖魔不起一衆高人行藏輕利沉香井水飲者除渴潮田米飯食者不饑仰山燒畬種粟溈山夜寢晝餐百丈捲拜席向馬祖世尊以伽黎圍飲光良久夜來金氣應凉到竹床多壽昌經禪師解制上堂三月安居九旬禁是不求佛法僧豈為人天福說箇願一切衆生同證菩提大似父死呼公哭畢竟作麼生除是波斯能嚙鏃珍重破山明禪師解制上堂東風解凍百草萠芽行腳衲子似粟如麻拖泥帶水兮草鞋獰似虎混俗和光兮拄杖活如蛇向有佛處不可住無佛處急走過方稱英俊作家切不可向萬里無寸草處去虗度生涯大衆且如山僧者裏九旬禁足三月調心今日解制臨行一句作麼生道摘楊花摘楊花箬庵問禪師解制上堂神通妙用遊戲自如動靜去來無憂無喜塵劫非遠剎那非促布袋頭日日解開安樂神時時應現何必朝參彌勒暮謁釋迦俗諦義中真成勝諦火𦦨裏轉大法輪百草頭全彰祖印豁開頂𩕳截斷流機超出人天一頭地且隨緣不變大海納川一句畢竟作麼生道日長閒晝永春老緑陰多解制上堂舉三聖問雪峰透網金鱗以何為食峰云待汝出網來向汝道聖云一千五百人善知識話頭也不識峰云老僧住持事繁師云三聖雪峰把手向高高山頂立深深海底行是則同道唱和節拍相隨山僧者裏要且不然忽有問透網金鱗以何為食向他道今日解制更云一千五百人善知識話頭也不識但云善為道路且道與古人是同是別下座牧雲門禪師解制上堂上元時節天色晴霽天童者裏大開門戶放諸菩薩子出門遊戲一地二地三地四地五六地歡喜發光留不住地地增修要遠行剛剩第八不動地日月燈明佛忍俊不禁涌身高七多羅樹一一為他摩頂授記去者下坡不走快便難逢住者眉毛撕結鼻孔相拄去去去住住住菩薩子莫道病天童語話無憑據咄全室泐禪師解夏上堂今朝七月十五一句全賓全主解却布袋頭開一任東去西去無佛處急走過有佛處不得住三千里外逢人不得錯舉喝一喝東苑鏡禪師解制辭衆入山上堂孤亭獨望春山遠九曲清清日夜行且喜風光流不盡垂楊堤畔月初生大衆一結一解原是千古風規一住一行要且機緣有自山僧今日對衆分付拄杖子欲向千萬峰頭去也大衆再四勸請為法久住師曰大衆向我拄杖頭邊道得一句來山僧即住衆擬議師卓一卓曰從來共住無人識長嘯一聲歸去來下座鼓山賢禪師解制日上堂今日解制諸兄弟未免或東或西山僧有三句分付第一出門不得拖著死尸走第二到人家喫飯不得沾唇第三不得向萬里無寸草處住著若能不犯這三句他日燒一片香供養老僧未為分外若於三句有犯切莫道在真寂過冬珍重弘覺忞禪師解夏兼為檀越薦嚴上堂一霛真性豈假胞胎識想為緣致有形纍果若諸人從四月十五至今七月十五一期之內痛切如喪考妣急遽如救頭然髑髏裂破娘生面目全彰本有淨裸裸常光現前峭巍巍壁立萬仞則自然動無遺照舉必全真妙用難思神機莫測金錫振處空華之獄戶頓開寶杖敲時鏡象之蓮隨見作無邊如幻佛事度無量如夢衆生尤是教乘極則之談作麼生是衲僧親切為人一句洞岫庭山齊削玉七十二峰青到今嵩乳密禪師解制上堂師云欲知佛性義當觀時節因緣即今是甚麼時節溪柳垂金線山花展翠屏白雲青嶂裏深愜野僧情好個滿天和氣遍地春光傳不雕之心印演不說之靈章諸人倘如斯會得便知檀度大施門開將從上佛祖鉢袋子當陽拈出一任諸人東擲西拋恁麼也得落花有意隨流水不恁麼也得流水無情送落花恁麼不麼恁總得常憶江南三月裏鷓鴣啼處百花香下座
