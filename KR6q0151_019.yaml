麼也且隨方就圓然雖如是笑我者多哂我者少市戶請上堂摩竭室不掩方丈門再開不惜眉毛者橫身請入來乃云三界六道輪𢌞業鏡難藏好醜不須更滯他人盡是自作自受如今於諸人分上各自有一面業鏡子明歷歷地且道是好是醜試請𢌞頭自照看又外道問世尊今日當說何法尊云說定法次日復問說何法尊云說不定法道云昨日為什定今日為什不定尊云昨日定今日不定諸仁者是知佛法無有定相無不定相隨機施設一切臨時說有亦得說無亦得說定亦得不定亦得猶如太空蕩蕩無礙一任穿鑿縱橫自在如今若有人問保寧今日當說何法即云說不定法或次日問說何法即云說定法或問昨日為什不定今日為什定即云昨日不定今日定或問昨日不定事作麼生即云未曾再謝知府在或問今日定底作麼生即云市戶已作茶筵了謝畢乃云引退潛藏志未從世間何處可相容依前却入塵泥去物物頭頭露祖宗拍禪床下座五祖演禪師因齊上堂不寒不暖喜春遊士女傾心結預修自覺一生如幻夢始知百歲類浮漚子規啼處真消息芍藥開時野興幽此箇門風誰會得等閒白却少年頭桐樹郭宅請上堂桐林郭評事家門幸食祿性靜好吾宗溫良如美玉封疏請諸山營齊植洪福二人長老共談玄正值陽和二月天渴鹿飲溪氷作水野猿啼樹霧成煙黃梅路上多知己今日共乘般若船乘船即不無且道說箇什麼事幸遇三春明媚因行不妨掉臂囉邏哩囉邏哩乃拍手大笑云是何曲調萬年歡因齊上堂二月中春物象鮮盡塵沙界一般天蒼苔雨洗去冬雪野火風飄昨夜煙危嶺乍聞猿嘯日長江時見客乘船人生幾度逢斯景好是誠心種福田真淨文禪師因施主上堂佛以一音演說法衆生隨類各得解僧俗男女平等心一一皆同證法界夢菴信禪師因衆善友入寺請因緣設粥升座記得昔日甘贄行者入南泉寺設粥乃請南泉和尚念誦泉云為貍奴白牯念摩訶般若波羅密多甘贄便出泉粥後問典座甘贄在甚處座云當時便去也泉云打破粥鍋著師召大衆云甘贄設粥功不浪施南泉念誦不妨親切當時打破粥鍋如今諸人如何修設然雖如是只如諸人設粥忽然請山僧念誦且道回向甚麼即是若道為狸奴白牯又是隨他腳跟轉若道為燈籠露柱不免依樣畫猫兒若道為他增長福田又是掩人之德若只麼休去又乃施無所歸且道如何回向即是以拄杖卓一下云普同供養密庵傑禪師施主請上堂師據座顧視左右驀拈拄杖云今佛放光明助發實相義乃卓一下云希有諸比丘是中難比况復提起云還見蔣山拄杖子麼朝到西天暮歸東土向諸人道有世界以音聲為佛事有世界以香飯為佛事有世界以出入息為佛事復卓一下云且道者箇世界將什麼為佛事擲下拄杖云阿剌剌四方八面活鱍鱍楚石琦禪師楊府安人真如善住二居士入山齊僧上堂沙門釋子頭戴施主屋腳踏施主地口喫施主飯身著施主衣將什麼報答施主入道不通理復身還信施長者八十一其樹不生耳若終日喫飯不曾咬破一粒米終日著衣不曾挂著一縷絲行不見行立不見立十二時中不依倚一物不見施者不見受者亦無施物恁麼見解正是增上慢人別造地獄著你在總不恁麼時如何大衆歸堂喫茶去南石琇禪師施主設齊粥上堂繁興大用舉必全真維摩以一鉢飯飽三萬二千菩薩甘贄行者設粥南泉打破粥鍋且道是繁興大用不是繁興大用等閒認得東風面萬紫千紅總是春施齊田提綱疏山性禪師疏溪施主施齊田請上堂人人一坐具方圓儼今昔行坐不曾移歲寒消劫石更不屬陰陽又不輸糧役四至既分明契券親委悉復證者田地大自在休息那箇不具足受用無窮極如是布施汝如何不感激養十方佛種常生大智食轉施諸凡聖不思議功德不是有心求不是無心得須悟春風意莫認春山碧無上大因緣知恩念來歷因果既無差宜應全道力較彼來處功羮飯銅鐵汁驀然畫斷三輪虗空爭覓踪跡燈籠露柱秋收依舊山堆嶽積卓拄杖云柳絮隨風葵花向日供羅漢提綱無相真禪師供羅漢示衆應供真人著眼高海山來往不辭勞也知為瑞為祥處惹得天花上毳袍石梁方廣路非遙薝蔔堂中信手招尊者半千誰是主海天雲靜月輪高真淨文禪師供羅漢上堂方上人今日為施主供養羅漢且道羅漢來也無若來在什麼處若不來又供養他作什麼乃顧謂大衆云要識真羅漢麼元來總在者裏復召云方上座還見麼正好供養來無所從去無所至一一不生一一不滅性真妙明常住世間清淨本然周遍法界若也如是萬兩黃金亦消得若不如是滴水難消老僧隨例餐䭔子也得三文買草鞋上堂山門今日供養羅漢為十方檀越酬還心願亡者生天現存獲福召云大衆但祇隨例餐䭔子莫問人間短與長復拈起拄杖云我生已盡梵行已立所作已辦不受後有三界不奈伊何堪受人天供養者一隊少叢林漢總好與二十拄杖喝一喝下座供養羅漢上堂三界惟心萬法唯識未有一法不從心之所生心若滅也一切法滅所以過去心不可得未來心不可得現在心不可得三際既不有一心何所生大衆但盡浮想盡證阿羅漢浮想不盡總屬流浪生死喝一喝下座上堂今日供養羅漢夜來四方高人諷誦妙法蓮華經安樂行品一遍大衆作麼生是安樂行擬心早不安樂了也乃喝一喝云豈不是安樂行如何是透法身句北斗裏藏身豈不是安樂行如何是祖師西來意庭前柏樹子豈不是安樂行如何是超佛越祖之談糊餅豈不是安樂行以至僧俗大衆一一清淨光明住持豈不是安樂行乃至一佛二菩薩一一羅漢一一辟支佛無不清淨實相住持所謂安樂行也大衆唯有髻中寶珠不妄與之雖然不與你人人具足十二時中光明烜赫阿誰缺少還會麼歸堂喫茶去喝一喝下座供養羅漢上堂大衆一切法即諸佛法一切心即諸佛心一切語即諸佛語一切道即羅漢道法也心也語也道也且道是一也是二也是同也是別也二由一有一亦莫守一心不生萬法無咎楚石琦禪師因齊羅漢上堂風生古殿月轉回廊香煙合匝燈燭熒煌賓頭盧尊者應供四天下無一處不到還到此間麼此間是什麼所在說到不到合掌云三德六味施佛及僧便下座放生提綱雪竇顯禪師放白示衆朱冠青戢雪為毛不近鸞凰意亦高放你雲林莫回首如今何處是仙曹無相真禪師施主送魚放生示衆死水浸著未是作家大海番身不妨脫灑蘆山今日通一線道須貴各得自由休更貪他香餌信得及去千尺絲綸惹絆不住縵天大網誰敢羅籠一跳便過龍門不怕掀天動地遇大旱則為霖雨著意嘉惠生靈十千天子齊立下風怒海鯤鵬仰望不及良久云若到者箇田地不得辜負老僧中峰本禪師瞿運使卒哭藥師道場放生紅芍藥邊方舞蝶碧梧桐裏正啼鶯目前大道無遮障自是衆生沒路行由是今日藥師如來與近故少中大夫兩浙都運瞿公於一毫端上起大道場作百寶莊嚴佛事本上座因齊慶讚普為諸含識指箇路頭去也教中道三界無法何處求心心不可求法將安寄便見十方世界是清淨法身十方世界是藥師十二願海審如是有羽者聽其高飛有足者不妨遠舉帶甲者潛於深淵負鱗者縱於巨壑無一衆生不成正覺無一衆生不入圓明雖然如是只如古人道門裏出身易身裏出門難且道不涉易難如何是超然獨脫底句乃放生云衝開盡是通霄路透出無非解脫門箬庵問禪師西湖放生示衆南山起雲北山雨秋色滿湖鷗鵠舞驀然拄杖化為龍大地含生失本據連纍旁觀多少人捶胸叫屈稱冤苦山僧瞬目笑顏開剎那共入無生路還委麼我若向刀山刀山自摧折我若向地獄地獄自消滅拍手云透網金鱗休滯水摩雲俊鶻合冲霄湖舟放生升座師云縵天布網要入入不得要出出不得直饒轉得身來已是皮穿肉綻欲得搏九萬雲徙九萬里也須是不脛而走無翼而飛底始得良久云不貪香餌味始是碧潭龍今辰奉為闔城善信結社放生上祝皇圖祈消兵祲且天下太平干戈永息一句作麼生道聽取一頌鳶自飛兮魚自躍弋何慕也釣何驚共瞻一片湖山色仰沐皇恩浩蕩仁供法衣提綱白雲端禪師施主捨法衣云龍披一縷金翅不吞當時若一口吞盡豈不天下太平且道那箇是吞不盡底拈起法衣角示衆云者箇豈不是吞不盡底還見麼等閒挂在肩頭上也勝時人著錦衣真淨文禪師施主捨法衣上堂師云諸佛出世咸披此衣說法度人洞山今日亦披此衣說法度人遂拈起衣角召大衆云還有不受惡水潑者麼良久云月到天心白波歸海上清施主捨法衣上堂大衆諸佛法衣得之者出三界離五欲成大道度衆生遂舉衣云舉起也地獄停酸修羅息戰放下也帝釋搖頭諸天罷樂不舉不放十方法界情與無情同成佛道未審施法衣者成得箇甚麼良久云自從盧老收歸後須信人人總有之圓悟勤禪師施主捨法衣上堂云迦葉擕坐雞足峰老盧持過大庾嶺如今披向寶華座孤光逈逈高峰頂且道是同是別錦衣公子貴林下道人高應庵華禪師廣德軍趙中大施法衣請小參師乃舉教中道若以色見我以音聲求我是人行邪道不能見如來乃喝一喝云諸人還聞麼要且不是聲提起袈裟角云諸人還見麼要且不是色既不向聲色上辨向什麼處見如來若道二六時中一動一靜一語一默折旋俯仰處見如來即是認賊為子若道不向二六時中動靜語默折旋俯仰處辨正是癡狂外邊走到者裏若是明眼漢瞞他一點不得豈不見本仁和尚道尋常不欲向聲前句後鼓弄人家男女要且聲不是聲色不是色時有出問如何是聲不是聲仁云喚作色得麼曰如何是色不是色仁云喚作聲得麼且道為你說答你話若辨得出於佛法中不妨有箇入處雪竇拈云本仁也甚奇怪要且貪觀天上既非聲前句後從什麼處入師拈云雪竇到者裏盡其神通無插手處只如道既非聲前句後從什麼處入往往十箇有五雙蹉過還知薦福落虗麼一箭落雙鵰了智上人遠自廣德持判府中大回施俸資特就今辰齊僧營辦種種佛事及捨法衣一頂與山僧受用乃命小參舉揚正法眼藏涅槃妙心集此無涯上善並用祝陪台算并諸寶眷福壽延鴻不盡功德四恩總報三有齊資法界有情同圓種智判府中大雖未參識竊聞深知有此一段大事雖相去千有餘里而未嘗隔一絲毫許正所謂千里同風也既作宗門外護而又於此道不倦信知於過去無量塵沙劫中熏習得熟才出頭來一撥便轉豈在忉忉也然做工夫別無他術只要有大信根具大種智知有此事於二六時中行住坐臥處切切提撕看是什麼道理但恁麼推來推去推到無依倚處驀地撞著更不費絲毫氣力便是從娘肚裏出來底未嘗別有一物與你也與他從上佛祖同一受用正如斬一綟絲一斬一切斬如染一綟絲一染一切染前後際斷三祇劫空覓其虗空了不可得全體是箇金剛正體了無出沒在諸佛分上不曾添一絲毫在凡夫身中不曾減一絲毫如水洗水似金博金有時拈一莖草作丈六金身有時將丈六金身作一莖草擒縱自在殺活自由者箇話頭乃從昔靈山會上黃面老子處來佛佛祖祖以心契心至於今日未嘗有一絲毫許錯誤謂之正法眼藏涅槃妙心未有天地未有日月未有人倫已前此心亦逼塞虗空逮乎天地既分有日月人倫此心亦逼塞虗空所以道生也恁麼死也恁麼要且生死籠他不得何故為他著著有出身之路不見教中道若在長者長者中尊為說勝法若在居士居士中尊斷其貪著若在剎利剎利中尊教以忍辱若在婆羅門婆羅門中尊除其我慢若在大臣大臣中尊教以正法若在王子王子中尊示以忠孝若在內宮內宮中尊化正宮女若在庶民庶民中尊令興福力若在梵天梵天中尊誨以勝慧若在帝釋帝釋中尊示現無常若在護世護世中尊護諸衆生此蓋從清淨微妙根本智中廣發如是勝妙方便大解脫門又謂之金剛正體又謂之頂王三昧又謂之浮幢王剎海又謂之第一義至於楊岐和尚以金剛圈栗棘蓬揭示學者洞明少室直指之由其變通逸格超量得大自在與一切人抽釘拔楔解粘去縛令各各自證透頂透底要且不可以心知不可以識識長沙和尚道我若舉揚宗教法堂前草深一丈事不獲已所以向諸人道盡十方世界是沙門眼盡十方世界是沙門全身盡十方世界是自己光明盡十方世界在自己光明裏盡十方世界無一人不是自己我嘗向諸人道三世諸佛共盡法界衆生是摩訶般若光光未發時汝等諸人向什麼處委光未發時尚無佛無衆生消息既無佛無衆生消息且道大地山河日月星辰人畜草芥纖洪長短從什麼處得來還知落處麼天上有星皆拱北人間無水不朝東箬庵問禪師施主送法衣示衆師拈起法衣角云者箇是黃面老子遞代傳持底今日因甚却自信心檀越屋裏送來山僧既不囊藏被蓋索性對人天衆前一回舉似還知麼拈來不隔寸絲頭一片雲霞爛不收有意氣時添意氣得風流處且風流供法衣上堂蜀錦吳綾攢花簇巧爛紅妍紫溢彩增輝奪驪龍項下之光捋猛虎鬚邊之利衲僧家箇箇牙如劍樹口似血盆誰肯輸機納款所以道從天降下則貧窮從地涌出則富貴法王大寶現成自然不求而至入荒田不揀信手便拈來覿面互施呈舉一不舉二到者裏脫珍御服著斃垢衣得妙回途入廛垂手一句且作麼生道隨身竿木逢場戲百草頭邊見祖師侍者供法衣上堂披如來衣坐如來座行如來事三腳蝦蟆著錦襠風吹不動階前樹馬祖扭鼻野鴨子沒處去百丈捲席大用現前不存規矩堪笑南陽老國師負汝負吾成指注點即不到到即不點三十年後莫道金山者裏有屈無叫處
