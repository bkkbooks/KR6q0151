body:
  text: 武林十八㵎理安禪寺住持婁東行悅集五參提綱清涼益禪師上堂大衆立久乃謂之曰祇恁麼便散去還有佛法道理也無試說看若無又來者裏作麼若有大市裏人叢處亦有何須到者裏諸人各曾看還源觀百門義海華嚴論涅槃經諸多策子阿那箇教中有者箇時節若有試舉看莫是恁麼經裏有恁麼語是此時節麼有甚麼交涉所以道微言滯於心首嘗為緣慮之場實際居于目前翻為名相之境又作麼生得翻去若也翻去又作麼生得正去還會麼莫祇恁麼念䇿子有甚麼用處上堂曰出家人但隨時及節便得寒即寒熱即熱欲知佛性義當觀時節因緣古今方便不少不見石頭和尚因看肇論云會萬物為己者其唯聖人乎他家便道聖人無己靡所不己有一片言語喚作參同契末上云竺土大仙心無過此語也中間也祇隨時說話上座今欲會萬物為自己去蓋為大地無一法可見他又囑云光陰莫虗度適來向上座道但隨時及節便得若也移時失候即是虗度光陰於非色中作色解上座于非色中作色解即是移時失候且道色作非色解還當不當上座若恁麼會便是沒交涉正是癡狂兩頭走有甚麼用處上座但守分隨時過好珍重上堂盡十方世界皎皎地無一絲頭若有一絲頭即是一絲頭天台韶國師上堂古聖方便猶如河沙祖師道非風幡動仁者心動斯乃無上心印法門我輩是祖師門下客合作麼生會祖師意莫道風幡不動汝心妄動莫道不撥風幡就風幡道取莫道風幡動處是甚麼有云附物明心不須認物有云色即是空有云非風幡動應須妙會如是解會與祖師意旨有何交涉既不許如是會諸上座便合知悉若於者裏徹底悟去何法門而不明百千諸佛方便一時洞了更有甚麼疑情所以古人道一了千明一迷萬惑上座豈是今日會得一則明日又不會也莫是有一分向上事難會有一分下劣凡夫不會如此見解設經塵劫祇自勞神乏思無有是處上堂毛吞巨海海性無虧纖芥投鋒鋒利無動見與不見會與不會唯我知焉乃有頌曰暫下高峰已顯揚般若圜通遍十方人天浩浩無差別法界縱橫處處彰珍重上堂僧問承古有言若人見般若即被般若縛若人不見般若亦被般若縛既見般若為甚麼却被縛師曰你道般若見甚麼曰不見般若為甚麼亦被縛師曰你道般若甚麼處不見乃曰若見般若不名般若不見般若亦不名般若且作麼生說見不見所以古人道若缺一法不成法身若剩一法不成法身若有一法不成法身若無一法不成法身此是般若之真宗也諸上座相共證明令法久住國土安寧珍重上堂古者道如何是禪三界綿綿如何是道十方浩浩因甚麼道三界綿綿何處是十方浩浩底道理要會麼塞却眼塞却耳塞却舌身意無空闕處無轉動處上座作麼生會橫亦不得竪亦不得縱亦不得奪亦不得無用心處亦無施設處若如是會得始會法門絶揀擇一切言語絶滲漏曾有僧問作麼生是絶滲漏底語向他道口似鼻孔甚好上座如此會自然不通風去如識得盡十方世界是金眼眼睛無事珍重上堂僧問天下太平大王長壽如何是王師曰日曉月明曰如何領會師曰誰是學人乃曰天下太平大王長壽國土豐樂無諸患難此是佛語古不易今不遷一言可以定古定今會取好諸上座佛法不是者箇道理要會麼言發非聲色前不物始會天下太平大王長壽久立珍重清涼欽禪師上堂且住得也久立尊官及諸大衆今日相請勤重此箇殊功比喻何及所以道未了之人聽一言祇者如今誰動口便下座立倚拄杖而告衆曰還會麼天龍寂聽而雨華莫作須菩提幀子畫將去且恁麼信受奉行上堂某甲本欲居山藏拙養病過時奈緣先師有未了底公案出來與他了却時有僧問如何是先師未了底公案師便打曰祖禰不了殃及兒孫曰過在甚麼處師曰過在我殃及你百丈恆禪師上堂乘此寶乘直至道場每日勞諸上座訪及無可祇延時寒不用久立却請回車珍重上堂諸上座適來從僧堂裏出來腳未跨門限便回去已是重說偈言了也更來者裏不可重重下切腳也古人云參他不如自參所以道森羅萬象是善財之宗師業惑塵勞乃普賢之境界若恁麼參得與善財同參若不肯與麼參却歸堂向火參取勝熱婆羅門珍重永明潛禪師上堂佛法顯然因甚麼却不會諸上座欲會佛法但問取張三李四欲會世法則參取古佛叢林無事久立報慈言導師上堂凡行腳人參善知識到一叢林放下瓶鉢可謂行菩薩道能事畢矣何用更來者裏舉論真如涅槃此是非時之說然古人有言譬如披沙識寶沙礫若除真金自現便喚作常住世間具足僧寶亦如一味之雨一般之地生長萬物大小不同甘辛有異不可道地與雨有大小之名也所以道方即現方圓即現圓何以故爾法無偏正隨相應現喚作對現色身還見麼若不見也莫閒坐地羅漢仁禪師上堂報恩者裏不曾與人揀話今日與諸上座揀一兩則話還願樂麼諸上座鶴脛長鳧脛短甘草甜黃檗苦恁麼揀辨還愜雅意麼諸上座莫是血脉不通泥水有隔麼且莫錯會珍重報恩則禪師上堂諸上座盡有常圓之月各懷無價之珍所以月在雲中雖明而不照智隱惑內雖真而不通無事久立歸宗真禪師上堂諸上座見聞覺知祇可一度祇如會了是見聞覺知不是見聞覺知要會麼與諸上座說破了也待汝悟始得久立珍重棲賢圓禪師上堂出得僧堂門見五老峰一生參學事畢何用更到者裏來雖然如此也勞上座一轉了也珍重五雲逢禪師上堂諸上座捨一知識參一知識盡學善財南遊之式樣且問上座祇如善財禮辭文殊擬登妙峰謁德雲比丘及到彼所何以德雲却於別峰相見夫教意祖意同一方便終無別理彼若明得此亦昭然諸上座即今簇著老僧是相見是不相見此處是妙峰是別峰脫或從此省去可謂不孤負老僧亦常見德雲比丘未嘗剎那相捨離還信得及麼瑞鹿先禪師上堂大凡參學未必學問話是參學未必學揀話是參學未必學代語是參學未必學別語是參學未必學捻破經論中奇特言語是參學未必捻破祖師奇特言語是參學若于如是等參學任你七通八達于佛法中儻無見處喚作乾慧之徒豈不聞古德道聰明不敵生死乾慧豈免苦輪諸人若也參學應須真實參學始得行時行時參取立時立時參取坐時坐時參取眠時眠時參取語時語時參取默時默時參取一切作務時一切作務時參取既向如是等時參且道參箇甚人參箇甚麼語到者裏須自有箇明白處始得若不如是喚作造次之流則無究了之旨保明誠禪師上堂如為一人衆多亦然珍重堯峰暹禪師上堂冬去春來樓閣門開若也入得不用徘徊諸上座還向者裏入得也未若也入得所以古人道是處是彌勒無門無善財若也入之未得自是諸上座狂走更不忉忉久立珍重功臣如禪師上堂召大衆曰還知道聖僧同諸人到者裏麼既勞尊降焉敢稽留久立珍重晚參提綱百丈海禪師每上堂有一老人隨衆聽法一日衆退唯老人不去師問曰汝是何人老人答曰某非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某對曰不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身師曰汝問老人曰大修行人還落因果也無師曰不昧因果老人于言下大悟作禮曰某已脫野狐身住在山後敢乞依亡僧津送師令維那白椎告衆食後送亡僧大衆聚議一衆皆安涅槃堂又無病人何故如是食後師領衆至山後巖下以杖挑出一死野狐乃依法火葬師至晚上堂舉前因緣黃蘗便問古人錯祇對一轉語墮五百生野狐身轉轉不錯合作箇甚麼師曰近前來向汝道蘗近前打師一掌師拍手笑曰將謂胡鬚赤更有赤鬚胡藥山儼禪師晚參上堂衆集師曰今日請決疑上座在甚麼處其僧出衆而立師下禪床把住曰大衆者僧有疑便與一推却歸方丈趙州諗禪師晚參今夜答話去也有解問者出來時有僧便出禮拜師曰比來拋甎引玉却引得箇𡐊子臨濟玄禪師一日謂普化克符二上座曰我欲於此建立黃蘗宗旨汝且成禠我二人珍重下去三日後普化却上來問和尚三日前說甚麼師便打三日後克符上來問和尚前日打普化作甚麼師亦打至晚小參曰有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪德山鑒禪師晚參示衆曰今夜不答話問話者三十棒時有僧出禮拜師便打僧曰某甲話也未問和尚因甚麼打某甲師曰汝是甚處麼人曰新羅人師曰未跨船舷好與三十棒睦州陳尊宿晚參謂衆曰汝等諸人還得箇入頭處也未若未得箇入頭處須覓箇入頭處若得箇入頭處已後不得孤負老僧時有僧出禮拜曰某甲終不敢孤負和尚師曰早是孤負我了也又曰明明向你道尚自不會何況蓋覆將來又曰老僧在此住持不曾見箇無事人到來汝等何不近前時有一僧方近前師曰維那不在汝自領去三門外與二十棒曰某甲過在甚麼處師曰枷上更著扭汾陽昭禪師為并汾苦寒乃罷夜參有異比丘振錫而至謂師曰會中有大士六人奈何不說法言訖而去師密記以偈曰胡僧金錫光為法到汾陽六人成大器勸請為敷揚仙宗玭禪師久不上堂大衆入方丈參師曰今夜與大衆同請假未審還給假也無若未聞給假即先言者負珍重漳州羅漢院守仁禪師晚參師曰物物本來無處所一輪明月印心池便歸方丈五祖演禪師晚參舉德山云今夜不答話問話者三十棒衆中舉者甚多會者不少且道向甚處見德山有不顧性命者試出來道看若無山僧為大衆與德山老人相見去也待德山道今夜不答話問話者三十棒但向伊道某甲話也不問棒也不喫你道還契他德山老人麼到者裏須是箇漢始得況某甲十有餘年海上參尋見數人尊宿自為了當及到浮山會裏直是開口不得後到白雲門下咬破一箇鐵酸豏直得百味具足且道豏子一句作麼生道乃曰華發雞冠媚早秋誰人能染紫絲頭有時風動頻相倚似向階前鬭不休古今晚參上堂示衆之語甚多此舉先宗大槩餘不及録小參提綱四節真淨文禪師仰山結夏小參舉拂子云耶耶盡十方世界若凡若聖若僧若俗若草若木盡向拂子下成佛作祖無前無後一時解脫還有不解脫者麼設有命若懸絲又撫掌云知音者少所以此箇事論實不論虗參須實參悟須實悟若纖毫不盡總落魔界豈不見古人道平地上死人無數過得荊棘林是好手如今人多是得箇身心寂滅前後際斷一念萬年去休去歇去似古廟裏香爐去冷湫湫地去便為究竟殊不知却被此勝妙境界障蔽自己正知見不能現前神通光明不得發露或又執箇一切平常心是道以為極則天是天地是地山是山水是水僧是僧俗是俗大盡三十日小盡二十九此依草附木不知不覺一向迷將去忽然問他我手何似佛手便道是和尚手我腳何似驢腳便道是和尚腳人人盡有生緣處那箇是上座生緣處便道某是某州人是何言歟且莫錯會好凡百施為要平常一路子以為穩當定將去合將去更不敢別移一步怕墮坑落塹長時一似雙盲底人行路一條拄杖子寸步拋不得緊把著憑將去步步依倚一日若道眼豁開頓覺前非拋却杖子撒開兩手十方蕩蕩七縱八橫東西南北無可不可豈可一向倚他門戶傍他行腳有甚快活自己畢竟如何不見雲門道而今天下老和尚多是師承學解露布葛藤印板上打來模子裏脫出當人若是明去何不一切臨時又不見臨濟云我者裏是活祖師西來意把來便用立處皆真他不說古又如何今又如何者語得那語不得那裏是虗者裏是實你與我拈出絲毫許實底道理來看此蓋當人眼不開自無見處一向承虗接嚮百般忌諱自纏自縛直饒與麼說當下忽然見得倜儻分明去也是棺木裏瞪眼如今還有無師智自然智不與萬法為侶者烜赫底丈夫漢䶥䶥齖齖千變萬化見我恁麼胡言漢語便好近前驀口摑拽下椅子擲向三門外喝散大衆豈不快哉還有麼良久若無且看老僧騎案山跳入你諸人眼睛裏七顛八倒呵佛罵祖去也喝一喝下座楚石琦禪師結夏小參眨上眉毛早蹉過開得口來已話墮祖師關棙少人知遍界茫茫腳踏火聲前展演賺殺闍黎句後商量翻成途轍一踢踢翻大海水一拳拳倒須彌山猶未是性躁漢在何況起模畫樣詐啞佯聾斷妄攀緣求真解脫大似認髑髏作水買朱砂畫月驢年解休歇麼壽山不惜口業為你諸人點破竪拂子云還見麼者箇是文殊門若從文殊門入者山河大地牆壁瓦礫教你背塵合覺擊拂子云還聞麼者箇是觀音門若從觀音門入者松風㵎嚮鴉嗚鵲噪教你返本還源到箇裏證不動尊成無上覺更須知有頂門一竅還委悉麼麥秋晨氣潤槐夏午陰清復舉龐居士參馬大師不與萬法為侶是什麼人大師云待汝一口吸盡西江水却向汝道師頌云蓋天蓋地一句子馬師盡力提不起好笑青原接石頭逢人但問廬陵米結夏小參或有旃檀叢林旃檀圍繞或有荊棘叢林荊棘圍繞或有旃檀叢林荊棘圍繞或有荊棘叢林旃檀圍繞汝等諸人橫擔拄杖緊峭芒鞋者邊那邊東去西去在那箇叢林中若在旃檀叢林則是金毛獅子能縱能奪能殺能活若在荊棘叢林則是狐狼野犴不能縱不能奪不能殺不能活隨群逐隊怖死貪生椎殺千箇萬箇有什麼罪過且如五種叢林交互圍繞時喚作金毛獅子又是狐狼野犴喚作狐狼野犴又是金毛獅子畢竟喚作什麼能縱不能縱能奪不能奪能殺不能殺能活不能活又如何定當若定當得出許你天下橫行若定當不出九旬無解脫之期百劫受沉淪之苦復舉僧問趙州如何是咬人獅子州云皈依佛皈依法皈依僧莫咬老僧師云者僧也只是箇喋屎狗為甚麼趙州一見便撒屎撒尿彩奔齪家結夏小參摩竭陀國親行此令抵死要知換却性命設使懸崖撒手自肯承當絶後再蘇欺君不得也是棺木裏瞪眼鳳山者裏無許多事尋常只是九十日為一夏黃陳米飯苦益菜羮尊勝寺前疊疊青山不盡西興渡口茫茫白浪無窮行也任你行坐也任你坐出也任你出入也任你入卷舒自在彼此何拘却不許埋在聲色堆頭亦不許離他聲色總不與麼還作麼生錦衣公子貴林下道人高復有頌云拈却東山水上行薰風殿閣生微涼住山不費纖毫力自有人提折腳鐺呆庵莊禪師結夏小參一心不生萬法無咎汝等諸人發志參禪早是不著便何況聽他繩床上老宿說玄說妙舉古舉今以當宗乘遠之遠矣即今要與本地相應直須從前放下百不知百不會向生佛已前著一隻眼看是什麼忽然拶破虗空便見十方世界盡是圓覺伽藍何處更有山河大地來山僧與麼道也是作死馬醫若是超宗越格底衲僧著著自有出身之路拈拄杖大衆中還有超宗越格底衲僧麼卓拄杖泥牛昨夜遭塗炭直至如今不見蹤結制小參心如虗空界示等虗空法證得虗空時無是無非法從上佛祖莫不以此心法傳示將來作大佛事徑山只今以此心法為大伽藍十方法界若聖若凡同一安居平等性智驀拈拄杖卓一下云過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是住觀音菩薩將錢買胡餅放下手却是饅頭卓拄杖一下復舉趙州勘婆子話頌云臺山路上婆子勘破須他趙州我道全無巴鼻人言亦有來由恕中慍禪師結夏小參俊快底撩起便行似鶻提鳩腳跟下好與三十懵懂底三搭不回如魚止濼腦門上不銷一錐古今天地古今日月古今人倫好不增一毫醜不減一毫以大圓覺為我伽藍畫地為牢刑名斯著身心安居平等性智沉埋鬼窟塵慮尤多靈巖寺裏明日結夏今夜小參亦不說妙談玄亦不設期立限三條椽下七尺單前一任諸人橫眠倒臥渴飲饑餐管取心華發明照十方剎其或情存限量墮在見聞他時後日有人索飯錢在莫言不道復舉世尊在摩竭陀國說法是時白夏乃謂阿難曰諸大弟子人天四衆我常說法不生敬仰我今入因沙臼室中坐夏九旬忽有人來問法汝代我說一切法不生一切法不滅言訖掩室而坐頌云白夏時將至垂慈勉進修人天不敬仰歲月自遷流法法無生滅頭頭有放收九旬聊掩室恩大實難酬了庵欲禪師結夏小參季春已去孟夏到來衲僧分上不用安排豈不見道盡乾坤大地是沙門一隻眼盡乾坤大地是沙門全身何覺不圓何修不證所以大覺世尊二千年前靈山會上釘虗空中鐵橛開福山僧四月十五日與見前大衆駕平地上鐵船逆長風而把舷節清歌而扣舷卓拄杖云翡翠踏翻荷葉雨鷺鷥衝破竹林煙喝荊叟珏禪師結夏小參我此一宗正令全提如暴風卒雨鼓蕩無前石火電光追奔不及舉意即迷源擡眸已蹉過不是目前法莫生種種心縱汝三種互修尅期取證第二頭第三首萬拄千撐轉見氣急殊不知髑髏未具己眼先明呱地一聲千了百當然雖如是親證者萬無一二錯會者數有河沙用彰俊禪師結夏小參結却布袋口三世諸佛六代祖師天下老和尚眼不得妄視耳不得妄聽口不得妄言足不得妄舉一禁禁住無絲毫走作謂之圓覺伽藍九旬禁制醋甕中蟲子有什麼出頭分殊不知此道如淨日輪升太虗空無幽不燭如塗毒鼓輕輕一撾聞者皆喪雖然只如道居有破有居空破空二幻既空中亦不立畢竟喚什麼作塗毒鼓喚什麼作淨日輪喝一喝大丈夫兒合自由信腳踏翻知見窟結夏小參世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知商那和修三昧優波鞠多不知從上佛祖三昧既是各各不知且佛佛授受授箇什麼祖祖傳持傳箇什麼三月安居尅期取證證箇什麼東土衲僧還也奇特一箇箇氣宇如王擊碎圓覺伽藍截斷平等性智妙用縱橫無是不是山僧三昧諸人總知諸人三昧山僧總知大衆且道所知三昧是何形段聻拈拄杖卓一下智者聊聞猛提取莫待天明失却雞古林茂禪師結夏病起小參歲月不可把玩老病不與人期山僧十數日來寒熱交攻正覓起處不得何故身相離敗心如幻故身相既離心亦如幻佛病祖病其體亦然五祖和尚云病來又病皮黏骨抖擻起來無一物行不成步語聲低鼻孔依然高突兀五祖老人與麼說話只能自病不能病人既不能病人當攢簇不得之時即不能普入衆生身中全衆生之病既不能全衆生之病則業識茫茫無本可據大衆九十日內同此安居動靜寒溫自宜保愛結夏小參朱明啓候聖制斯臨四海高人罷搖金錫言無言而可及念無念以相應廓諸佛之妙明同十方而聚會所以龐居士到者裏破家散宅只守現成綿綿不漏絲毫直下斬釘截鐵道箇心空及第早是頭上安頭更言與他三世諸佛把手共行歷代祖師同心同德大似三家村裏不識羞老婆東搽西抹要事人相似有什麼奇特處只如豁開戶牖萬里不挂片雲坐斷圓覺妙場不離平等性智一句作麼生道蒲團時倚無他事永日寥寥謝太平結夏小參明當結制今夜小參舉一兩則古人機緣與諸人商量非惟截斷葛藤要且顯出各人自己參學眼目龐居士云十方同聚會箇箇學無為此是選佛場心空及第歸龐居士也甚奇怪只是俗氣未除既是心空歸向什麼處去無為又作麼生學然則一言易出駟馬難追若是德山臨濟門下棒折也未放過在所以山僧尋常與諸人道一切處不明面前有物直得觸目無滯達得一切法空正是面前去不盡底又不見雲門大師道平地上死人無數過得荊棘林是好手與麼說話大似將胡猻繫在露柱有甚快活既出得荊棘林又須入得荊棘林始得所謂入林不動草入水不動波然後縱橫得妙左右逢源轉地回天方有自由分只如者僧道與麼則堂中上座有長處也且道是出耶是入耶雲門云蘇嚧蘇嚧也是折錐探地明眼漢到者裏若作佛法商量正是平地死人不作佛法商量坐在荊棘林裏三千里賣却布單特為此事而來何曾夢見十方聚會選佛場開長期百二十日諸人若善參詳明取生佛未具已前透頂透底便是沒量漢也阿呵呵也大奇搖扇取凉伸腳打睡三萬六千日自倒還自起咄咄咄結夏小參法不孤起仗境方生明朝結制斯臨未舉西天法令今夜小參時至且開東山家筵囉囉招囉囉搖囉囉送義出豐年不是心不是佛不是物儉生不孝寸釘入木以大圓覺為我伽藍一句當天八萬法門生死路絶恁麼會得九十日內自然水到渠成別有商量萬煆爐中試看花飛雪片正恁麼時如何明明百草頭邊事不比楊岐栗棘蓬結夏小參教中道有大陀羅尼門名為圓覺流出一切清淨菩提涅槃真如解脫咄云釋迦老子是什麼熱碗鳴聲把他三世諸佛所得祕要法門一時潑撒了也至於三七日中思惟是事掩室摩竭不措一辭亦是未了公案我此一衆善觀者不以眼善聽者不以耳善言者不以言善迹者不以迹眼耳不有言迹俱忘能信自心悉皆是佛縱饒未信佛亦無殊麻三斤乾屎橛殿裏底亦不出此箇時節阿呵呵鐘樓上念讚床腳下種菜風動樹頭搖地肥茄子大喝一喝長連床上九十日內有粥有飯結夏小參時節遷流結制欣逢於此日光陰倐忽工夫不到不方圓諸人既善參詳山僧宜加勉勵示諸佛慈悲之方便顯衲僧正令之全提佛來也打祖來也打粉骨碎身未足酬秦地不收漢地不管直入千峯萬峯去廓神機於未兆懸智照於無私如斯九十日中一一珠回玉轉雖然如是只如柏巖開粥度夏仰山種粟燒畬畢竟明什麼邊事卓拄杖云一舉四十九結夏小參佛法無人說雖慧莫能了擊拂子云塵說剎說熾然說三世一切說釋迦彌勒文殊普賢登刀山入鑊湯飲洋銅吞熱鐵橫說竪說直說曲說窮盡未來無間歇是汝諸人十二時中還曾得聞也未若也聞得今夜人天衆前不妨露箇消息若也不聞亦不缺少所以箇事在諸佛分上不增在衆生分上不減迷則常居凡下悟則即為聖賢到者裏便好放出金毛獅子哮吼一聲驚天動地豈不見雲門大師道盡十方世界乾坤大地以拄杖畫一畫云百雜碎了也三乘十二分教達磨西來放過即不可若不放過不消一喝雲門只解步步登高不解隨機應變較之德山臨濟齊眉共矚同死同生截鐵斬釘能縱能奪何啻千里萬里且道臨濟德山有什長處不屬凡不屬聖不屬修不屬證不住有為不住無為黃河三千年一度清是汝諸人九十日內不得忘却平等性智擊拂子云雪峯道底無文燦禪師結夏小參孟夏漸熱仲夏極熱自有天地以至于今無一絲毫許差別若是有靈骨底衲僧才出母胎便解知時識節去隨芳草歸逐落花具足見聞覺知受用見聞覺知無生可護無制可結雖然要會孟夏漸熱易旻會仲夏極熱難要會仲夏極熱易要會孟夏漸熱難難難九十日中君自看復舉五祖結夏上堂結夏無可供養大衆作一家晏管顧諸人遂舉手云囉囉招囉囉搖囉囉送莫怪空疏伏惟珍重師拈云老東山龍肝鳳髓百味具足爭奈美食不中飽人餐結夏小參大華藏海渺無邊際江河溪㵎流入其中咸失本名魚龍蝦蟹游泳其中咸失本性三世諸佛於中成等正覺一切衆生於中流浪生死現前大衆於中成就無功用學拈拄杖卓一下云開先拄杖子一口吸乾了也三世諸佛一切衆生現前大衆畢竟向什麼處行履良久云曹溪波浪如相似無限平人被陸沉復舉香嚴云去年貧未是貧今年貧始是貧去年貧尚有卓錐之地今年貧錐也無師拈云還會麼正㧓著開先癢處結夏小參實際理地不受一塵南贍部洲本來清淨無端西天竺國有箇不識好惡底將一片爛麻皮結箇圈子安在平地經今二千餘年推不去拽不動遞代祖師大機大用如馬祖百丈正知正見如南陽大隨手段惡辣如德山臨濟眼目端正如趙州雲門也只是傍觀有分啞青天白日有恁麼事大唐國裏可殺無人薦福雖則與他同路行且不與他同處宿今夏兄弟在此相聚遇飯喫飯遇茶喫茶熱則乘涼困則打睡九十日內第一不得道著解結二字道著貶尚鑊湯爐炭地獄謹白復舉雲門問僧云今夏做什麼僧云和尚實問某甲即道門云做賊人心虗師拈云雲門等閒致一問者僧便作佛法祇對克由叵耐不知者跛腳阿師當時打殺佛與狗子喫底棒在什麼處來夜問取首座笑隱欣禪師結夏小參與麼與麼頭上安頭不與麼不與麼斬頭覓活德山小參不答話先行不到趙州小參要答話末後大過山僧尋常只管九十日為一夏熱則取涼饑來喫飯有時白雲高臥聽月下之疏鐘有時村市邏齊振雲中之金錫不作佛法商量亦非世諦流布阿呵呵頭上一堆塵腳下三尺土䶥䶥齖齖且過時莾莾鹵鹵河沙數復舉百丈再參公案師云以機奪機以的破的百丈親遭三日聾黃檗後來驚吐舌延平劍合兮寧窺牛斗之光芒陶壁梭飛兮不戀風雲之舊迹堪笑禪流眼似眉座中誰是仙陀客南石禪師結制小參明日結制今夜小參摩霄俊鶻便合乘時止濼困魚徒勞激浪高亭隔江望見剎竿橫趨而去腳跟下好與三十玄沙築破腳指遂云達磨不來東土二祖不往西天頂門上猶缺一槌自餘央央庠庠莾莾鹵鹵堪作什麼北山今夜且放一線道學道猶如守禁城晝防六賊夜惺惺中軍主將能行令不動干戈致太平古人恁麼說話正是老婆心太切不辭帶水復拖泥雖然且道誰是中軍主將莫是見聞知覺底麼莫是語言動靜底麼且喜沒交涉若向者裏承當得去何翅白衣拜相善財入樓閣香巖聞擊竹靈雲見桃花總不出者箇時節阿呵呵一即三三即一牧羊海畔女貞花拒馬河邊望夫石石擊赤赤土畫簸箕從教眼𥉌𭿇復舉古德偈云護生須是殺殺盡始安居會得箇中意鐵船水上浮圓悟老祖云且道殺箇甚麼殺衆生物命是凡夫見解殺六賊煩惱是座主見解殺佛殺祖是大闡提人見解衲僧分上畢竟殺箇什麼只知開口易不覺舌頭長解制提綱真淨文禪師解夏小參有問話者麼乃以拂子擊禪床云天地造化有陰有陽有生有殺日月照臨有明有暗有隱有顯江河流注有高有下有壅有決明王治化有君有臣有禮有樂有賞有罰佛法住世有頓有漸有權有實有結有解結也四月十五十方法界是聖是凡若草若木以拂左邊敲云從者裏一時結舉拂子云總在拂子頭上還見麼乃喝云解也七月十五日十方法界若草若木乃聖乃凡以拂子右邊敲云從者裏一時解舉拂子云總在拂子頭上還見麼乃喝云祇如四月十五已前七月十五已後且道是解是結舉拂子云總在拂子頭上還見麼乃喝云諸高德此三喝中有一喝是金剛王寶劍有一喝是踞地獅子有一喝是探竿影草若人一一辨得始見臨濟大師道出常情黃檗被掌大愚遭築雖相去三二百年許你親為嫡子然後大開不二妙門權諸祖道摧邪顯正扶宗立教整頓頽綱縱大知見耀大法眼不動本際決勝魔軍乃喝云更須知有一喝不作一喝用到者裏須是具爍迦羅眼向未屙已前驀提得去諸德且道提得箇什麼良久喝一喝下座圓悟勤禪師解夏小參年豐歲稔道泰時清唱太平歌樂無為化護生既滿蠟人愈氷秋色澄澄金風拂拂正當恁麼時說什麼釋迦彌勒文殊普賢德山臨濟向上向下有事無事直下一時坐斷直得風颯颯地人人分上壁立千仞各各面前飛大寶光且不落夤緣一句作麼生道𪋤峯頭倒卓石笋暗抽枝密庵傑禪師解夏小參竪起拂子還見麼敲禪床云還聞麼只此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分古人八字打開了也恁麼見得便見傑上座今夏九十日內入大光明藏中呼喚森羅萬象明暗色空情與無情上至非非想天下至空輪水際一切蠢動含靈盡向拂子頭上安居同時禁足不說佛不說祖不說玄不說妙不守蠟人氷不憐鵝護雪只是應時應節不失其宜大盡三十日小盡二十九饑餐渴飲任運騰騰佛界不收魔界不攝直得皇風蕩蕩帝道平平野老謳歌漁人罷唱而今一夏周畢驅遣各歸所止隨家豐儉長者長法身短者短法身逍遙自在任性方圓而無拘執衆中忽有箇衲僧出來道長老長老我行腳走遍天下每見善知識小參普說盡是攢花簇錦結角羅紋說得盛水不漏或大機大用驅耕夫牛奪饑人食呵叱列祖擠排先聖如風雷電捲看者不容眨眼今夜如此提持全無巴鼻全無滋味如蚊子上鐵牛相似直是無下嘴處也令人疑著到者裏如何對他即是棒將去得麼喝將去得麼莫是跳下禪床歸方丈得麼不然別將兩轉新鮮語答將去得麼如斯理論盡是諸方用過底藥方非但起人膏肓之疾不得益令增他重病既總不與麼如何即是而今向佛祖說不到處天下老和尚揚下不用底對他非唯對他且要聞者見者蕩盡胸中禪道佛法知見人人如獅子王吒沙地哮吼一聲壁立萬仞若他道使人疑著只對他道大疑之下必有大悟復舉僧問雲門大師初秋夏末前程有人問未審對他道什麼門云大衆退後僧云過在什麼處門云還我九十日飯錢來師云平如鏡面嶮若刀山者僧有破牢關底機謀雲門善用不戰屈人兵底手段雖然如是鼻孔在靈隱手裏雪巖欽禪師解夏小參無解無結猶是空中釘橛有修有證何異捕風捉月所以龍興一夏百二十日只與現前清衆早眠晏起淡飯粗茶如三家村裏田舍翁挈挈波波只與麼過不敢將一絲毫叢林規矩束縛諸人是汝諸人便與麼撒手撒腳拂踐得去十二時中不妨七穿八穴東倒西櫑逆順卷舒縱橫自在擊拂子云白雲更在青山外復舉溈山問仰山子一夏不上來仰云鋤得一片畬種得一籮粟溈云子可為不虗過仰云和尚如何溈云日中一食夜後一宿仰云和尚亦不虗過道了乃吐舌溈云寂子何得自傷己命師拈云溈山與仰山是則子傳父業足可觀光逗到下稍又却遞相矛盾可謂父不父子不子矣龍興今夏亦無所作亦不空過且道與古人是同是別井底蟾蜍吞却月解夏小參九旬禁足東廊上西廊下灼然寸步不移休夏自恣據此堂坐此座不妨走盡天下恁麼見得猶是露布葛藤未具透關眼在且作麼生是透關眼有向天地未形以前生佛既興以後知得落處者麼若有道林三百六十骨節從頂至踵被伊一時透其或未然後五日去到諸方且居門外解夏小參九旬禁足三月護生逗到功成行滿依前日午三更龍囦水風恬浪靜獺徑橋霧鎖雲橫去者自去住者自住坐者自坐行者自行因甚如此杖頭縱有通霄路且共扶持折腳鐺復舉夾山和尚示衆云閙市門頭識取天子百草頭上薦取老僧與麼說話正是妄認前塵分別影事若是端拱垂衣孤峯獨宿未夢見在汝等諸人要見夾山麼還識仰山麼竪拂子云一狀領過楚石琦禪師解夏小參諸仁者百了千當名為無事人若到諸方管取明窗下安排永祚者裏放過即不可何謂如此百了千當底猶在半途豈不見圓悟和尚道以世諦法接人去落在世諦法中以祖佛機接人去落在祖佛機中以向上拈提接人去落在向上拈提中以恁麼恁麼接人去落在恁麼恁麼中以不恁麼不恁麼接人去落在不恁麼不恁麼中以總不恁麼總不恁麼接人去落在總不恁麼總不恁麼中直饒萬里無片雲青天也須喫棒當知此事不從他處得來我王庫內無此刀此刀不離王庫內末後一句始到牢關把斷要津不通凡聖九十日末後句作麼生道朱夏火雲燒碧洞清秋危露滴金盤復舉僧問雲門樹凋葉落時如何門云體露金風師云者僧若道箇謝師答話雲門大師管取有理難伸山僧即不然樹凋葉落時如何拈起拄杖才佇思打下法堂免致諸方簡點解夏小參金風扇野素月流天遠水平鋪纖雲盡捲是處蟬聲噪晚連山木葉驚秋明明無覆藏歷歷絶滲漏高不在絶頂富不在福嚴樂不在天堂苦不在地獄諸仁者只如生死交謝寒暑迭遷解結相尋光陰似箭無位真人畢竟向什麼處安著披簑側笠千峯外別水澆蔬五老前復舉翠巖夏末示衆云一夏已來為兄弟說話看翠巖眉毛在麼保福云作賊人心虗長慶云生也雲門云關師頌云傑出叢林是翠巖舌元不動為誰談如今且喜眉毛在鐵額銅頭總未諳解夏小參報恩一夏說的諸人一夏參的須知說的不道一字參的不資一法不道一字說而無說不資一法參而無參參而無參真參說而無說真說所以道十方同聚會箇箇學無為此是選佛場心空及第歸大丈夫不可受人處分也心空及第壓良為賤成佛作祖愛聖憎凡總不與麼無繩自縛直下如獅子兒哮吼一聲狐狼野犴一時屏跡如塗毒鼓一擊遠近聞者皆喪九旬制滿又作麼生尋常恰似秋風至無意凉人人自凉復舉洞山與密師伯參鄂州哲禪師哲問曰闍黎近離什麼處山云湖南哲云觀察使姓什麼山云不得他姓哲云名什麼山云不委他名哲云還治事否山云自有廊幕在哲云還出入否山云不出入哲云豈不出入洞山拂袖便行明日哲入僧堂云昨日對二闍黎一轉語不稔今請二闍黎道若道得開粥相待過夏速道速道山云大尊貴生師云要會尊貴麼報恩不開者兩片皮諸人向什麼處摸索解夏小參平地上喫交郎當不少腳跟下嗟過笑殺旁觀即心即佛非心非佛此地無銀二兩俗人沽酒三升更有不唧𠺕底風前月下幾度沈吟海角天涯一生流浪西天以蠟人為驗我者裏以竹篦為驗喚作竹篦則觸不喚作竹篦則背速道速道擬議不來劈脊便棒復舉長慶云淨潔打疊了也却近前就我覓我劈脊與你一棒有一棒到你你須生慚愧無一棒到你你又向什麼處會雪竇云雪竇即不然淨潔打疊了也直須近前我劈脊與你一棒有一棒到你你即受屈無一棒到你與你平出但與麼會師云衆中商量道坐在淨潔地上必須打疊近前覓的喫棒有分覓的是病棒即是藥所以雪竇云有一棒到你你即受屈無一棒到你與你平出杜撰禪和如麻似粟殊不知二大老一箇掘地為坑一箇夷井塞竈皆欲坐致太平爭奈反招怪笑毗婆尸佛早留心直至如今不得妙解夏小參臨濟宗風直須辨主若不辨主有眼如盲所以道不容擬議斬全身始得名為主中主靈鋒寶劍常露現前擬犯鋒鋩橫尸萬里一等擔拄杖行腳還曾辨得主麼你若辨得主見他禪床上老漢才開口動舌背却法堂著草鞋便行較有些子衲僧氣息但與麼軟嫩嫩地無骨頭相似見人說有便著有說無便著無十二時中全沒主宰將什麼敵他生死消他信施埋沒自己屈辱先宗無過此人才方結制又見解夏日復一日歲復一歲待閻老子徵飯錢遲了何不及早回頭仔細尋思看是什麼道理髑髏常干世界鼻孔摩觸家風萬里神光頂後相直下會得轉凡成聖只在片時其或未然換手捶胸去在復舉外道問佛昨日說何法公案師頌云行盡江南數十程曉風殘月入華清朝元閣上西風急都入長楊作雨聲恕中慍禪師解夏小參達磨不來東土二祖不往西天水長船高泥多佛大翠巖一夏與兄弟東語西話唐喪光陰靈巖只管九十日為一夏鵝護雪蠟人氷鐵彈子者一火絡索總拈來拋向背後日不待火而熱月不待風而凉三家村裏臭老婆全無伎倆十字街頭醉翁子太殺風流目機銖兩底有甚數粘牙綴齒底有什數解夏小參安居制滿一念萬年布袋頭開百了千當天南地北無非圓覺妙場溪東溪西總是國王水草與麼與麼鋤得一片畬種得一籮粟不與麼不與麼日中一餐夜後一寢與麼不與麼不與麼却與麼拈出倚天長劍截斷露布葛藤直得上無攀仰下絶己躬常光現前壁立萬仞正與麼時是汝諸人還知者箇消息麼若也未知未免向淨潔地上拋沙撒土去也世尊初生下時一手指天一手指地周行七步目顧四方乃云天上天下惟我獨尊豈不是者箇消息西天四七東土二三或行棒或行喝或堂前輥毬或室中安水豈不是者箇消息自餘麻三斤乾屎橛庭前柏樹子後園驢喫草趙州勘婆話百丈野鴨話雖則三頭兩面萬別千差豈不總是者箇消息如斯理論俯狥機宜明眼人前是什寐語不見道向上一路千聖不傳學者勞形如猿捉影驀拈拄杖卓一卓云百雜碎沒窠臼拈得鼻孔失却口擬欲將身北斗藏應須合掌南辰後復說偈云夏罷抽單何處去勸君權息此時心諸方爐鞴如灰冷少室門庭似海深若要悟明超佛祖莫將知解當胸襟惺惺石畔堪行樂共聽松風演正音呆庵莊禪師解夏小參絶頂寥寥亂山矗矗不離當處即是道場何假對揚方稱佛事更說什麼長期短期尅念攝念摩竭提國早涉繁辭毗耶離城翻成剩語只如溈山問仰山云子一夏作得箇什麼蝦為子屈仰山云鉏得一片畬種得一籮粟有什共語處溈云子一夏可謂不空過何不與伊本分草料仰問溈云和尚一夏作得箇什麼不妨賣俏溈云日間一餐夜間一寢隨摟搜漢仰云和尚一夏可謂不空過互相欺瞞今夜忽有人問徑山一夏作箇什麼只向他道步步踏著實地且道是空過不空過拈拄杖畫一畫云鶴有九皋難翥翼馬無千里謾追風解夏小參目前無法法外無心心法俱忘理事交徹上無攀仰下絶己躬頭頭顯示真機物物全彰妙用如我按指海印發光汝暫舉心塵勞先起釋迦老子滿面慚惶汝但外息諸緣內心無喘心如牆壁乃可入道達磨大師一場漏逗大抵叢林以小參為家教汝等諸人每日著衣喫飯有什麼過七旬夏滿不妨去住自由老僧住持事繁更不叨叨嘮嘮擊拂子知恩者少負恩者多復舉翠巖夏末示衆云一夏與兄弟東語西話看翠巖眉毛在麼師云一夏東語復西話翠巖方便苦無多眉毛打失渾閒事爭免全身入草窠
