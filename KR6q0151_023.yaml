body:
  text: 武林十八㵎理安禪寺住持婁東行悅集拈敕黃法語開堂祝聖佛事圓悟勤禪師改昭覺為崇寧敕黃到開堂拈敕示衆云匝地普天皆承恩力九州四海悉稟威靈百千法門中殊特法門無量妙義中真實勝義如今從天降下不在眼目定動唇吻合開驗在目前一時薦取佛照光禪師開堂捧敕黃示衆天書親自日邊來一道神光遍九垓為瑞為祥恩力大直教枯木解花開舉起便知不妨慶快苟或未然重宣一遍天目禮禪師住淨慈捧敕黃云九重命下四海同欽山嶽歎呼禽魚起舞且物外道人因甚也被轉却順是菩提捧御香法語密庵傑禪師奉聖旨開堂賜御香師捧香示衆云中天頒降大地蒙熏聚為光明幢散作香水海輝騰佛日丕贊皇圖天上人間開佛知見奉聖旨就靈隱開堂賜御香師捧香示衆云御寶親封君王頒賜不是人間薰陸亦非海外旃檀持來價重娑婆爇處為祥為瑞光揚佛日仰祝皇圖山河大地發歡喜心蠢動含靈普薰正見拈劄付法語楚石琦禪師住本覺拈宣政院劄輥芥投針則易轉凡成聖非難不假他求盡在箇裏還見麼更聽知事宣白南石琇禪師住報恩劄付激濁揚清扶宗闡教澤廣藏山理能伏豹住徑山劄付權衡佛祖船筏群生兵隨印轉將逐符行呆庵莊禪師住雲居拈劄靈山付囑驗在今日佛法遍天下皇恩無盡時住徑山拈劄者一句子盡大地人受不用盡老僧今日感恩有分佛朗性禪師住疏山拈劄付國王大臣金城湯池外護何法未舉先知毛吞巨海芥納須彌住天童拈劄付君心佛心大法綱紀符到奉行草木化被為如來使當陽宣示愚庵及禪師再住徑山院劄拈起云前佛性命後佛紀綱總在者裏凜然如朽索之馭六馬危乎猶一髮之引千鈞若非大丞相赤手提持全肩擔荷何處更有今日諸人還委悉麼車不橫推理無曲斷拈公帖法語雪巖欽禪師護聖拈帖握乾坤於掌內運日月於胸中雖用孫武商君不犯之令與結繩之化元同如何見得半幅全封楚石琦禪師住福臻行宣政院帖孤峰頂上盤結草菴有口只堪挂壁十字街頭解開布袋入水方見長人因甚麼到恁麼地度帖云只將補袞調羮手撥轉如來正法輪笑隱欣禪師住集慶拈公帖示衆云一竿竹建精藍隨心具足八十頃布金地當處圓成今日諸官欽奉聖旨具疏敦請開山最初一句如何剖露金輪統御三千界玉曆延洪億萬春拈護法疏法語楊岐會禪師興化寺開堂府主龍圖度疏與師師才接得乃提起云大衆府主龍圖駕部諸官盡為你諸人說第一義了也諸人還知麼若知家國安寧事同一家若不知曲勞僧正度與表白宣讀且要天下人知龍門遠禪師天寧開堂當道度疏與師接得示衆云天不能蓋地不能載泄漏天機言言堪愛且道如何是堪愛之言良久云分明記取舉似作家遂度與表白真淨文禪師寶峰開堂日接得左司手中疏乃示衆云左司傳授烜赫現前泐潭把呈分明薦取薦與不薦却付表白表白擬接復收云不見道權柄在手縱奪臨時非但泐潭如是左司衆官神通變化各各具足却度與表白圓悟勤禪師開堂於知府手中接得疏呈示大衆云字字演無量義句句如優曇華佛祖鉗鎚人天標榜當陽拈出文彩已彰錦上鋪花請重宣過開堂判府延康度疏與師師接了云斷盡現成公案擲地金聲發明古剎家風耀天光彩出自大手筆顯示最上乘正欲四海普聞便請僧正宣過到南康軍開堂於知府手中接得疏示衆云見麼當陽顯示直截現成百匝千重七通八達一一宗師巴鼻頭頭向上宗乘直下承當猶較些子苟或未證却請僧正重為敷宣大慧杲禪師明慶開堂拈疏示衆云留守相公入善知衆藝三昧向毛錐子上放大光明不動舌頭演說四十二般若波羅密門已竟還信得及麼若信不及却請表白重新拈出令未聞者聞未信者信密庵傑禪師判府度疏與師師接得乃云窮諸玄辨若一毫置於太虗竭世樞機到底不離於正念復呈起疏召衆云正念生也且道其中事作麼生却煩表白宣讀判府安撫尚書度疏師接呈起云釋迦老子四十九年橫說正說說不到處總在箇裏流出包羅萬有囊括十虗如是信得皇恩佛恩一時報畢設或未然何妨道破楚石琦禪師住鳳山拈宣政院疏白雲出岫本自無心赤水求珠還他罔象萬般存此道一味信前緣住光孝拈行宣政院疏燮理陰陽旁通造化光輝佛日普扇真風還他大力量人成此大力量事召衆云高著眼笑隱欣禪師住中天竺拈院疏云箇是大丞相親受靈山記莂底句子付在山僧未聞者聞未見者見了庵欲禪師住靈巖拈院疏權衡在手與奪臨時政化宣流風行草偃石屋珙禪師拈廣教府疏云老瞿曇二千年前未了底公案珙上座今日就廣教府官手裏與他了却呈疏云所供詣實月江印禪師住育王拈廣教府疏揮魯陽戈重光佛日廣大教門斯為第一箬庵問禪師開堂拈疏寰中天子敕閫外將軍令一語定乾坤衲僧齊乞命拈府疏自是靈山秉囑願力不忘驀拶相呈甚生光怪回避不及潛匿無門好風相送處花雨又繽粉拈縣疏一向埋頭雲壑見面何似聞名如今信彩成輝貴在大家知有雲從龍風從虎聽價不聽聲一般是好手住磬山護法呈疏師接疏云親見親聞言端語的斬新揭露舊彩重輝顯正摧邪揀魔辨異須是箇般人方明箇般語且道是甚麼語維那試宣看護法疏寸絲尺錦澤媚川輝可知禮也玉轉珠回弘覺忞禪師拈疏云把住上大人顯揚丘乙己全憑者道真言若是箇拈頭識尾底直得毛錐未動前便可知禮也何須文彩全彰後依樣化三千雖然如是手執夜明符幾箇知天曉便請維那宣過拈方外交疏法語元叟端禪師方外疏杳杳冥冥其中有精恍恍惚惚其中有物未舉先知底固不在言只者錦標玉軸甚處得來塞却耳根分明聽取住徑山方外疏言言見諦句句朝宗西天昔日淨名老東土今朝龐蘊公楚石琦禪師方外交疏一句子無彼此以我為隱乎吾無隱乎爾恕中慍禪師方外交疏夫子鼻孔達磨眼睛總在者裏論其根本同出一源較其功德各具八百中間有些子誵訛今古無人道著度疏云殺人刀活人劍拈山門疏法語南石琇禪師住靈巖山門疏一句是一句渾不涉文采信知家裏言自然無內外山門疏是家裏人說家裏話山茶及時摘蒲鞋趂晴曬山門疏挂眉間劍拋栗棘蓬楊岐妙喜不謀而同恕中慍禪師住象山靈巖山門疏未入靈巖門諸人是主山僧是賓既入靈巖門山僧是主諸人是賓且賓主混融一句作麼生道金香爐下鐵崑崙了庵欲禪師山門疏有主有賓有酬有唱坐斷舌頭一椎兩當住本覺山門疏未入門來有一句子既到者裏半字全無畢竟如何蘇盧蘇盧佛朗性禪師山門疏若是家裏人不守渾崙庫百草頭邊建法幢雲從龍兮風從虎石屋珙禪師拈山門疏鍋子大小杓柄短長是家裏事何必論量弘覺忞禪師山門疏在君曰制在國曰令在使臣曰符信在山僧曰什麼佛祖聽權衡人天齊乞命拈諸山疏法語元叟端禪師住靈隱諸山疏提起云合郡宿德名員以此穿天下衲僧鼻孔西天四七出不得東土二三出不得楚石琦禪師兩浙諸山疏真不掩僞曲不藏直落霞與孤鶩齊飛秋水共長天一色拈諸山疏江南北浙西東同中有異異中有同野色更無山隔斷天光直與水相通會麼若也不會看取下面注腳南石琇禪師住普門諸山疏習學謂之聞絶學謂之鄰良久黃河九曲水出崑崙了庵欲禪師住開福諸山疏一佛出世各坐一華接影連輝互不相借拈三宗疏法語恕中慍禪師住瑞巖拈明州三宗疏祖意教意是同是別風清三佛地月朗四明山佛朗性禪師三宗疏東州販生薑大洋海底火通紅西縣賣皂角須彌頂上浪翻空小人隔壁異俗君子千里同風拈宗剎疏法語佛朗性禪師宗剎疏此是京剎諸位老和尚送人上樹底梯子畢竟如何判斷復云讚歎渠者亦多罵詈渠者不少知渠俱受俱不受大地山河日杲杲南石琇禪師宗剎疏建法幢於帝都扇真風於像運象王回旋獅子奮迅江湖疏法語南石琇禪師江湖疏古人道千里同風作麼生是同風句子定光金地遙招手智者江陵暗點頭江湖疏同心之言其臭如蘭龍蛇易辨衲子難顢了庵欲禪師江湖疏鐵心石腸河舌海口贊之則碓嘴生華毀之則佛面百醜贊毀不及處面南看北斗佛朗性禪師江湖疏汝恁麼來我恁麼地公論與愛憎同歸第一義楊花霜雪天白鷺恣同戲無文燦禪師江湖疏惡毒相識惡毒呪罵通身是口分疏不下度疏云首座遮掩則箇指座法語神鼎諲禪師開堂日指法座云未登此座化緣已畢諸人還委悉麼若委悉散去得也若不散去不免登於此座入方便品第二去也且不得怪山僧保寧勇禪師開堂日指法座云三世諸佛今古祖師盡在者裏轉大法輪了也却向諸人腳跟下過去還見麼若見眉毛眼睫常放光明若不見看看山僧步步入泥入水去也五祖演禪師海會開堂宣疏了乃云疏帖一時讀了若是具金剛眼睛底何必重說偈言雖然如是事無一向真淨文禪師開堂日宣疏罷乃云大通智勝佛十劫坐道場佛法不現前不得成佛道今日四衆圍繞佛法現前還得不得良久云欲行千里一步為初便登座宜翁觀禪師蘇州北禪開堂適當九日指法座云胸中一寸灰已冷頭上千莖雪未消老步只宜平地去不知何事又登高遂升座請主魏圯丞相聞之擊節不已雪竇顯禪師住翠峰法座顧視大衆曰若論本分相見不必高升此座乃以手指曰諸人隨山僧手看無量佛土一時現前各各仔細觀瞻其或涯際未知不免拖泥帶水遂升座圓悟勤禪師開堂指法座云三世諸佛於此轉法輪歷代宗師於此提祖印欲行千里一步為初不免起摸畫樣去也崇寧開堂指法座云大衆者一條路千聖共知徐行踏斷流水聲縱觀寫出飛禽跡且道如何進步要提無相毗盧印須向千峰頂上行住蔣山指法座云高高無外深深無際更不作禮須彌燈步步階梯全體是且道是箇什麼看看住天寧指法座云柔和忍辱衣諸法空為座既披此衣必據此座況佛佛祖祖藉此為梯為航見麼有條攀條無條攀例入院指法座云三萬二千獅子座爭及此箇曲彔木坐斷報化佛不涉聞見知揭起鷲嶺高風仰祝南山睿算還見麼看取令行時住雲居先就雍熙寺受敕指法座云借雍熙寶座提楊岐金圈直下現成分明薦取還委悉麼金剛正體露堂堂舉足無非大道場突立毗盧頂𩕳上更於何處禮燈王看看雲峰悅禪師上藍開堂指法座云還有不受人謾底麼有即出來推倒禪床喝散大衆然未是作家也且救得一半還有麼良久云既無人出來山僧今日不惜眉毛不免指鹿為馬翻日作月去也三十年後莫錯怪人好便升座龍門遠禪師天寧開堂指法座云古聖道為法來耶為床座來耶我為法來非為床座師咄云是何言歟大慧杲禪師徑山指法座召大衆云還見麼坐斷古佛路頭潛竄千妖百怪任是須彌燈王也須速禮三拜喝一喝再住徑山指法座云毗盧頂𩕳人人有志上頭行問著路頭十箇五雙不知去處諸人要識路頭麼良久云看雪巖欽禪師龍興法座百千佛祖向者裏屙潑天臭氣遍滿娑婆新龍興未免傾湘江之水洗教淨潔去也狼藉轉多住仰山法座寶鏡高懸寶華散亂固是人人知有且道須彌燈王畢竟說什麼法躍七踏八唯庵然禪師聖壽指座云進一步高一步踏到上頭全身獨露掣手云須彌燈王過那邊去元叟端禪師中天竺指法座從上老禿奴向者裏轟青天霹𮦷鼓平地波濤新長老別資一路去也驟步云一二三四五楚石琦禪師福臻指法座云為法來耶為床座耶摩霄俊鶻便合乘時止濼困魚徒勞激浪住天寧法座靈山堂已為諸人說法了也還聞麼若不聞未免為蛇畫足住本覺指法座陽春白雪唱高和寡村歌社舞到處合得著新本覺今日相席打令去也呆庵莊禪師雲居指座從上先德推此一位以為極則莊上座見得只是尋常恕中慍禪師住瑞巖法座平地上險崖孤峻處平易是古今尋常用底今日終不向者裏依模脫墼瞞汝諸人雖然見之不取千載難忘且坐斷毗盧頂頭一句作麼生道衆無語乃云洎合放過愚庵及禪師淨慈指法座云盡十方世界是普光明藏獅子之座諸佛衆生同起同坐因甚山僧今日特地高升只恐諸人昧其所自石屋珙禪師指法座云人天寶座曲彔木床我今要坐即便坐更不作禮須彌王便升座月江印禪師育王指法座云壁立萬仞不必高升合水和泥聊通一線了庵欲禪師住本覺指法座云高步毗盧頂不稟釋迦文是你諸人常行三昧山僧曲順時宜和泥合水去也佛朗性禪師天童指法座顧視大衆云千機萬機者一機千步萬步者一步坐斷十方獅子吼七通八達向上路喝一喝笑隱欣禪師住中天竺指法座云坐斷報化佛頭不落玄妙階級竇八布衫雲門念七住集慶指法座云抹過此土西天坐斷千差萬別就下平高看孔著楔南石琇禪師住萬壽法座顧視左右云會麼欲提無相毗盧印須向千峰頂上行住徑山指法座如來座者一切法空是看看平地波濤起法舟濟禪師天寧開堂指法座云曲彔木床寶華王座是恁麼人須恁麼坐喝一喝天隱修禪師法座前云最初一步踏著須向千峰頂上提持且道是甚麼人行履處高著眼遂升座密雲悟禪師開堂指法座云者便是大司理大護法於丁卯秋廬山開元寺撞倒底鐵山今對人天衆前扶起去也還見麼遂升座箬庵問禪師指法座云須彌寶座高廣無量無邊由旬拄杖子亦高廣無量無邊由旬且道向甚麼處著足一聲霹𮦷風雷起住漏澤指法座云步步登高易從空放下難從空放下有甚麼難步步登高且覓起處不得有條攀條無條攀例弘覺忞禪師詔住大內萬善殿奉旨開堂指座云兜率上升天王敷座不見道名稱如來聞十方諸吉祥中最無上昔曾處此摩尼殿是故此處最吉祥以手指云大衆看看百萬億欄楯階升百萬億天繒妙寶百萬億香光雲網百萬億殊勝莊嚴一一皆由我皇積劫修行百萬億阿僧祇善根功德所共成就于一念間於此殿中一時顯現了也還見麼遂升拈太上皇皇太后后妃皇太子兩宮天眷等香法語密庵傑禪師拈香此一瓣香恭為祝延光堯壽聖憲天體道性仁誠德經武緯文太上皇帝聖躬萬歲萬歲萬萬歲恭願堯仁廣被舜德彌新億萬斯年永隆睿算拈香此一瓣香恭為壽聖齊明廣慈太上皇后中宮皇后皇太子皇孫兩宮天眷莊嚴福算恭願壽山增峻福海彌深同明般若正因共植金剛種智中峰本禪師拈香云此香胚胎萬象化育兩儀仰祝皇太后萬歲皇后齊年太子千秋恭願天同覆地同擎海同涵春同育弘覺忞禪師拈香云此一瓣香毗藍園裏收來無憂樹下將出爇向爐中奉為昭聖慈壽恭簡安懿章慶皇太后次及內宮皇后伏願壽同山固福與天齊濬發長祥克昌厥後拈今上皇帝香法語真淨文禪師開堂拈香云此一瓣香恭為今上皇帝祝延聖壽萬歲萬萬歲伏願堯風永扇同日月之盛明湯德彌新共乾坤而久固夢菴信禪師開堂拈香云此一瓣香恭為今上皇帝祝延聖壽恭願御世比輪王之福統天為大梵之尊圓悟勤禪師崇寧敕黃到開堂拈香示衆云光吞萬象氣絶諸塵始從撥草瞻風以至入鄽垂手等閒不欲全彰切恐驚群動衆今日拈來奉為今上皇帝祝嚴聖壽住夾山拈香云此一瓣香奉為今上皇帝祝嚴聖壽萬歲萬歲萬萬歲伏願睿算等乾坤聖明逾日月龍圖鳳曆彌億萬年玉葉金枝亘百千劫天寧開堂此一瓣香奉為祝嚴今上皇帝聖壽伏願金輪長御極寶祚永昌隆拱北極以稱尊空芥城而彌固開堂拈香云大衆還見麼薰五分法身結五雲瑞彩爇向爐中奉為祝嚴今上皇帝聖壽萬歲萬萬歲伏願道齊堯舜德冠羲軒南山壽逾億萬年北極尊亘河沙劫住金山拈香云此一瓣香奉為今上皇帝祝嚴聖壽恭願文明齊二曜睿算等乾坤奪少康復禹跡之功成宣光興漢室之業萬歸聖化八表偃干戈雍熙寺受敕住雲居拈香云虗空世界未分超然馥郁華藏圓融已現特地氤氳戒定慧解脫知見所薰百千億無量殊勝所集爇向爐中上祝今上皇帝聖壽萬歲伏願道德邁昔五帝威靈超前百王聖壽等南山蘿圖齊北極二聖早還玉駕萬國俱賀升平永息干戈四民樂業大慧杲禪師徑山開堂拈香云此一瓣香恭為北闕之至尊上祝南山之萬壽中峰本禪師開堂拈香云此一瓣香虗空包不住大地載不起臣僧明本爇向寶爐端為祝延今上皇帝聖躬萬歲萬歲萬萬歲陛下恭願至聖至明如日如月惟福惟壽同地同天元叟端禪師開堂拈香云此香蟠根錯節在威音王佛以前續𦦨聯芳居迦文世尊之上爇向寶爐端為祝延大元世界主當今皇帝聖躬萬歲萬萬歲陛下恭願統百億香水海為一福海永永無窮聚百億須彌山為一壽山巍巍不動中天竺開堂拈香蘊盤古開天正氣仰之彌高鑽之彌堅均伯禹敷土大功涅而不緇磨而不磷爇向寶爐端為祝延大元世界主當今皇帝聖躬萬歲萬歲萬萬歲陛下恭願自西自東自南自北咸歸有截之區乃聖乃神乃武乃文永享無疆之祚住徑山拈香云此香蘊唐虞太和根本蕩蕩無能名焉協殷周至治馨香巍巍有成功也爇向寶爐恭為大元世界主當今皇帝祝延聖躬萬歲萬萬歲楚石琦禪師開堂拈香云此一瓣香天上天下世出世間竝屬照臨皆承恩力爇向爐中端為祝延今上皇帝聖躬萬歲萬萬歲陛下恭願乃聖乃神乃武乃文四海咸歌有道自西自東自南自北八方盡樂無為笑隱欣禪師奉旨開堂拈香云此香全體全用胚腪大化之初至貴至尊秀發九天之上價重甄叔迦寶芳騰優鉢羅華與物為春布陽和於大地應時現瑞開壽域於八荒爇向寶爐端為祝延今上皇帝聖躬萬歲萬萬歲陛下欽願乾元立極景星耀而泰階平天曆在躬聖人作而萬物覩與天齊壽萬國來賓南石琇禪師住報恩拈香云至尊至貴價重百億須彌為瑞為祥陰覆大千沙界虔焫寶爐端為祝延皇帝萬歲萬萬歲欽願堯仁天廣蕩蕩乎無能名焉湯德日新皓皓乎不可尚矣本支百世壽考萬年住徑山拈香云此香體鍾九五陽剛如金如玉葉覆大千沙界為蓋為雲名超優鉢曇花價重甄叔迦寶焫向寶爐祝延皇帝萬歲萬歲萬萬歲欽願壽同百億須彌福等三千剎海山如礪河如帶益固皇圖五日雨十日風仰歌聖化了庵欲禪師開堂拈香云此香結為寶絲網散作光明雲爇向寶爐祝延今上皇帝聖躬萬歲萬萬歲恭願文明齊北極壽算等南山弘覺忞禪師拈香云此一瓣香不自天生非從人得一本諸佛菩薩大慈薰種大悲植根大喜大捨之所灌溉滋培大願大力之所暢茂條達然後斷之以金剛智斧析之以方便慧刀爇向爐中結而為蓋則覆被大千散而為雲則潤流沙界端為祝延今上皇帝聖躬萬歲萬歲萬萬歲伏願功超三后道貫百王舞干羽而格有苗八荒順化垂衣裳而朝萬國天下歸仁拈省院臺憲郡縣文武官僚等香法語神鼎諲禪師開堂日拈香云此一炷香奉為府主學士合郡尊官伏願長光佛日永佐明君楊岐會禪師開堂日拈香云此一瓣香奉為知府龍圖駕部諸官伏顒常居祿位保寧勇禪師開堂拈香此一瓣香奉為闔國采僚文資武列伏願振謨猷乎遠大流勳業以綿長六軍常清萬姓永泰真淨文禪師開堂日拈香此一瓣香恭為報寧大檀越主特進相公判府左丞伏願舉族享於百祥小大增乎善慶更冀特進相公判府左丞兄兄弟弟長為佛法之塹牆子子孫孫永作皇家之梁棟此一瓣香奉為提刑大夫運判朝奉洎文武官僚常居祿位然提刑衆官總同二相公夙承佛記示作王臣佛法長興外護斯在以因向果皆成佛道五祖演禪師開堂拈香云此一瓣香奉為州縣官僚伏願乃忠乃孝惟清惟白永作生民父母長為外護紀綱圓悟勤禪師夾山開堂拈香云此一瓣香奉為權府通判朝清檢法在坐尊官諸衙勳貴伏願高遷祿位永固壽基天寧開堂此一瓣香奉為判府安撫侍講運使中大運判撿討提學刪定提舉大夫承受奉御兩廳通判大夫在坐勳貴伏願為風后力牧作稷卨夔臯副具瞻則八座三台簡帝心乃鹽梅霖雨開堂拈香云奉為判府尚書諸衙勳貴伏願膺一人簡在副四海具瞻為周邵甫申作臯夔益卨住金山拈香云此一瓣香奉為判府安撫延康通判學士合郡文武官僚伏願位隆盤石功濟維城居方面則魯衛晉齊陟巖廊則臯夔稷卨住雲居拈香左僕射相公兩府台佐合朝百辟今日臨筵洪儒碩學諸多勳貴伏願為霖為雨為楫為舟補袞乃仲山和羮即傳說開堂此一瓣香奉為判府府判運使殿撰通判大夫闔郡尊官在筵僚宷仍願乃忠乃孝為國為民為聖主之股肱作明時之柱石龍門遠禪師開堂拈香云此一瓣香奉為提刑學士權郡承議洎合郡尊官伏願嘉聲藹著善政日新頻承雨露之恩坐聽鹽梅之詔夢菴信禪師開堂拈香云此一瓣香奉為知府承議闔郡宷僚唯願壽齡堅久福海彌深常為大國棟梁永作法門衛護雲居元禪師西塞帥王公韶自以殺業重祈為澡雪請說法上藍師炷香云此香為殺人不眨眼上將軍立地成佛大居士衆稱善韶亦悠然意消中峰本禪師開堂拈香此香名高列國價重三韓奉為駙馬太尉瀋王廣資福壽伏願劫外乾坤榮金枝於帝苑寰中日月茂玉葉於王庭拈報謝香法語白雲端禪師開堂日拈香云奉為過現未來大覺海中普利於含生一切聖賢及生平所參見諸善知識衆古道友曾有一言一句布施我者師僧父母一切恩親咸皆報謝燒懷香法語以上諸香皆係燒香侍者逐一度上惟嗣法香住持當從懷中拈出自插爐中興化獎禪師開堂日拈香云此一炷香本為三聖師兄三聖師兄為我太孤便合承嗣大覺大覺為我太賒我於三聖處會得賓主句若不遇大覺師兄洎合誤却我平生我於大覺處喫棒得見臨濟先師在黃檗處喫棒底道理此一炷香供養我臨濟先師石門照禪師開堂拈香云西天二十八祖唐土六祖過去聖人盡得傳衣付法至唐代六祖之後得道者如稻麻竹葦不傳其衣只傳其法皆以香為信今日一瓣香為什麼人通信某甲雖不言大衆已委悉爇此一炷香去也神鼎諲禪師開堂日拈香云此香不是戒定慧香亦非旃檀沉水只是汝州土宜便燒云供養首山和尚以酬法乳楊岐會禪師開堂日拈香云大衆還知落處麼若也不知却為注破奉酬石霜山慈明禪師法乳之恩山僧不免薰天炙地去也便燒白雲端禪師開堂日拈香云且道為什麼人若有所為雪上加霜若無所為過莫大焉奉為先住楊岐後住雲蓋親見慈明來底老古錐誰知道今日向者裏拋三放兩去也真淨文禪師開堂日拈香云大衆此一瓣香還知落處麼更不覆藏直為先黃龍南禪師爇向爐中去也保寧勇禪師開堂拈香云大衆此一瓣香古今無價佛祖不傳且道從什處得來還知落處麼若也知得祇者裏參見真善知識若也不知爇向爐中供養我先住楊岐後住雲蓋會和尚雲峰悅禪師開堂拈香云大衆此一瓣香天不能蓋地不能載塵沙諸佛天下老師未敢正眼著諸人向什麼處摸索然官不容針私通車馬奉為先翠巖芝禪師五祖演禪師開堂拈香云此一瓣香得來久矣十有餘年海上雲遊討一箇冤讐未曾遭遇一到龍舒果遇其人方契憤憤之心今日對大衆雪屈須至爇却為我見住白雲端和尚從教薰天炙地一任穿過蔡州有鼻孔底辨取東山開堂拈香云此一炷香在舒郡二十七年三處住院諸人總知遂欲燒復云不得也須說破某十五年行腳初參遷和尚得其毛次於四海參見尊宿得其皮又到浮山圓鑑老處得其骨後在白雲端和尚處得其髓方敢承受與人為師今日熱向爐中從教薰天炙地有耳朵者辨取圓悟勤禪師住崇寧拈香云此一瓣香不從葱嶺帶來亦非胸襟流出在南中見三十餘員尊宿末後撞著箇老作家被他一槌擊碎今日對衆說破奉為現住蘄州五祖演和尚以酬法乳天寧開堂拈香云千佛出興何人酬價威音那畔誰辨端倪昔年白雲一句下承當今日潭城第三回拈出奉為蘄州五祖山第十二代故演禪師以酬法乳開堂拈香云昔年白雲堆裏最初一句截流今日人天衆前箇是四回拈出奉為蘄州五祖山第十二代演禪師爇向爐中以酬法乳龍門遠禪師開堂拈香云此一瓣香還知落處麼欲隱彌露在晦愈明本欲拋擲巖阿混於沙石苦為諸人敦逼不免細說來由奉為我先蘄州黃梅東山演禪師一爐爇却用陪法乳之恩聊表化儀雖然恩大難酬未免拋三放兩虎丘隆禪師開堂拈香云此一瓣香大有人疑著三十年出一叢林入一保社遇賤則貴遇貴則賤末後撞著箇無面目老子向命脉上一劄不覺從空放下如今不免對衆拈出奉為現住潤州金山佛果圓悟禪師大和尚用報法乳之恩大慧杲禪師徑山開堂拈香云此一瓣香著則眼睛枯嗅著則腦門裂遇貴則價重娑婆遇賤則分文不直今日對人天衆前爇向爐中奉為成都府昭覺禪寺先圓悟禪師大和尚用酬法乳之恩再住徑山拈香云此一瓣香在兜率天則曰仙陀婆在善變化天則曰奪意在阿那婆達多池邊則曰蓮華藏且道在徑山手喚作甚麼良久云非但圓悟老人看即有分便是三世諸佛出來也不敢正眼著便燒應庵華禪師開堂拈香云此一瓣香奉為先住宣州彰教後住平江虎丘山雲巖禪院隆和尚爇向爐中用酬法乳之恩一任天下衲僧敲甎打密庵傑禪師開堂拈香云此一瓣香收來久矣欲隱彌露今日人天普集不免從頭說破昔年行腳自江西回擬往四明方抵婺州智者却被旁觀兄弟錯指路頭撞入衢州明果山中見箇老和尚列列挈挈太煞不近人情既已將錯就錯禮了三拜直至於今悔之不及雖然如是冤有頭債有主爇向爐中供養末後住天童山第十八代應庵大和尚用酬法乳之恩瞎堂遠禪師奉詔住靈隱開堂中使降香祝聖罷拈香曰此一炷香天地莫能覆藏佛眼莫能窺測舉處滅胡種族拈來鈍置殺人纍我三十年荒草裏橫身至令一平生作箇不唧𠺕漢就中有些子謷訛對衆也須說破山僧二十年前被業風吹到岷峨山下荊棘林中撞著箇無孔鐵鎚被他一擊半醉半醒將謂啞却口一生開不得二十年後又被業風吹去濯錦江頭葛藤堆裏逢著箇焦尾白額是時親遭一口直得喪膽亡魂開得口至今受用不盡且道此香為二十年前見底知識即是為二十年後見底知識即是一鶴不棲雙木一客不煩兩家不見道先行不到末後太過而今賊身已露贓物現前奉為前成都府昭覺先圓悟禪師大和尚不重他對御談空橫行海上只重他胸中無物肚裏無禪爇向爐中用酬法乳夢菴信禪師開堂拈香云此一瓣香人天未委得處何來幸有證明徒勞祕惜奉為我前住楚州勝因戲魚堂靜和尚用酬法乳之恩高峰妙禪師住天目拈香云此一瓣香不假壺中日月亦非劫外春風幾番親遭毒手令得八面玲瓏如今放下也地搖六震拈來則塞破虗空且道不拈不放一句又作麼生喝一喝作女人拜爇向爐中供養前住仰山戴角披毛無鼻孔底老和尚用酬法乳之恩元叟端禪師開堂拈香云大慧師祖道寧以此身代大地衆生受地獄苦終不將佛法當人情徑山先師藏叟和尚一生不肯四天下人縱饒釋迦老子達磨大師到來也須退身有分山僧昔年在侍者寮兩年弄盡機關做盡伎倆直是沒湊泊他處所以知其為大慧嫡孫今有炷香供養他也要大家證明住天竺拈香云此香讚之則眼瞎耳聾謗之則口啞舌禿三世諸佛六代祖師一時現前也只瞻仰有分奉為前住徑山臨濟直下第十五世藏叟大和尚一向爇却無文燦禪師開堂拈香云此香著不得捉著不得棄舍不得冷地看來直是好笑大須三十年爇向爐中奉為前住慶元府阿育王大廣利禪寺笑翁大和尚用酬法乳之恩恕中慍禪師開堂拈香云古人出世拈香酬法乳也今人出世拈香酬世恩也慍上座總不然昔年行腳到紫籜山中參箇老布衲彼亦無法可授我亦無法可受只向無授受中拈出供養前住崑山薦嚴禪寺竺元道和尚不圖報德酬恩只要大家知委住瑞巖拈香云此香已是第二回拈出爇向爐中供養我前住崑山薦嚴禪寺晚年歸老紫籜峯頭西方廣院竺元大和尚用酬法乳之恩然冤家債主自有來由今日對人天衆前不妨重為洗雪一上山僧昔年在彼山中咨參者老和尚為看狗子無佛性話不破特去請益才開口被他一喝直得通身汗下因進呈一頌云狗子佛性無春色滿皇都趙州東院裏壁上挂葫蘆乃發笑曰恁麼會又爭得可謂前箭猶輕後箭深插香云縱有伯牙琴應難寫心曲西蜀顯禪師初印心于五祖演和尚開堂日乃拈紹覺白公香其詞曰一則罏鞴功精一則磨淬極妙二功竝著理孰為先不見道本重末輕當風可辨此香奉為紹覺和尚爇向爐中令教普天匝地填溝塞壑使天下衲僧無出氣處笑隱欣禪師開堂拈香云此香昔年大雄峰頂一句下承當今日鳳凰山中五衆前拈出奉為前住徑山後住大仰佛智禪師晦機大和尚用酬法乳之恩南石琇禪師開堂拈香云非從天上降來不是地中湧出三世諸佛莫覓其蹤天下衲僧難識其價還有知得落處者麼若也未知奉為前住萬壽行中大和尚一爐焫却未論報德酬恩且要盡大地人咸知氣息鐵關樞禪師開堂拈香云此一瓣香三世諸佛不敢酬價六代祖師何曾嗅著昔日石門關裏得來今對人天衆前拈出奉為浙西道鏌干山天池興化禪寺元翁大和尚用酬法乳之恩天隱修禪師拈香云殷勤古木林間埋沒白雲堆裏向無所得中得來在有修證處不證今日對衆拈出供養荊溪龍池山禹門禪院本師大和尚幻有老人以酬法乳湛然澄禪師拈香云正偏挾帶敲唱同時父子相逢君臣道合端為供養北京大覺堂上傳曹洞正宗第三十一代清涼慈舟念和尚聊酬法乳之恩箬菴問禪師磬山開堂拈香二十年前向者裏出二十年後向者裏入雖然出入有時其奈初無背向既無背向且道出底是入底是不惜眉毛向人天衆前燒一瓣香奉為即此磬山堂上傳臨濟宗第三十代上天下隱先師大和尚以酬法乳拈香云此一瓣香疑殺天下人不為過抹殺天下人不為毒昔時有本可據如今遍界不藏任他伶俐仙陀誰敢正眼覷著奉為前住荊溪磬山後住湖州報恩上天下隱先師大和尚以酬法乳嵩乳密禪師拈香云這一瓣香博嶺堂前密移一步瀛山書內坐斷同風刀斧斫不開恩深父子外方不敢論功歸臣相爇向爐中端為供養博山堂上無異先師大和尚用酬法乳
