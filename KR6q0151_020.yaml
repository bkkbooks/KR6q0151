body:
  text: 武林十八澗理安禪寺住持婁東行悅集供法帔提綱高峯妙禪師通寧智顏庵主送法帔至上堂裁蜀錦剪吳綾披白玉間黃金打成一片時針劄不入羅紋結角處線路難尋雖然只如西峯以諸法空為座以拄杖指帔云還著得遮箇麼靠拄杖云天香影散莓苔石五葉花開薝蔔林千巖長禪師因寧府施法帔上堂春雲乍卷春雨初晴花紅柳緑水碧山青紫燕黃鸝深談實相叢林草木盡作琴聲突出釋迦鼻孔豁開達摩眼睛只如今日齊郡夫人張氏德真所施一片法帔上有一卷心經喚作一卷心經又是一片法帔喚作一片法帔又是一卷心經金𦦨𦦨錦層層結角羅紋重重寶印縱橫十字朵朵珠瓔莊嚴既妙德相彌增一一從夫人心中流出一一於諸佛分上圓明老僧受了諸人無分諸人受了老僧無分不如打歸常住千年萬歲耀真燈耀真燈復何憑有時挂向華王座也勝諸方黑漆屏供寶蓋提綱佛眼遠禪師郭公朝散施寶蓋上堂舉木平和尚行腳時問洛浦一漚未發時如何浦云移舟諳水脈舉棹別波瀾木平不契遂問盤龍龍云移舟不辨水舉棹即迷源木平遂於言下大悟後住木平李王詔至金陵問道於他法眼有偈云木平山裏人貌古言復少相看陌路同論心秋月皎壞衲線非蠶助歌聲有鳥城郭今日來一漚曾已曉誠哉是言也作麼生明他向盤龍言下悟底事若有人問龍門一漚未發時如何龍門實難吐露良久遂云一漚未發時寶蓋向空垂瑞色飄飄起香風𩖼𩖼吹何勞輕舉拂不假略揚眉五百曾親獻如來印可之昔日毗耶離城五百長者子各持七寶蓋來詣佛所佛之威神令諸寶蓋合成一蓋遍覆三千大千世界諸人還信得及麼非但古人見今諸人皆有此一蓋還曾窺得著麼若窺得著步步莫非玄路言言盡轉法輪其或未然山僧雖老拙寶蓋助宣揚楚石琦禪師松林施主妙蓮居士項氏捨寶蓋入山上堂生心受施淨名早訶有法可説如來不許直得無物可施無法可説牢籠佛祖含育聖凡猶是半珠未為全寶到箇裏明如杲日寬若太虗千聖不擕萬機寢削塵塵爾剎剎爾念念爾法法爾盡十方微塵國土一時拈來著在針鋒上却從針鋒上流出一切智光明雲於其雲中現妙蓮華量等十方微塵國土合為一蓋內出百千佛異口同音而説偈言一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力説是偈已即入針鋒裏去也資冥請提綱五祖演禪師施主請上堂舉道吾與漸源往山下弔慰源拊棺問曰生耶死耶吾云生也不道死也不道源云為什麼不道吾云不道不道回至中路源云和尚須與某甲道若不道即打和尚去也吾曰打即任打道即不道源便打至院吾令潛去師云白雲今日忿氣不甘須要斷者公案道吾第一不解與身作主第二不能隨機入俗當初待伊問道生耶死耶但向伊道等歸院裏向你道當時若著得者語靈利漢一踏踏著大小大道吾和尚也又免得一頓拳頭有眼底仔細看安樂院主修齋上堂昨夜得一夢夢見臻公在天宮與帝釋對坐臻問帝釋曰天上有五衰相是否釋云此是佛之所説豈可妄言於是帝釋却問臻云我聞閻浮提有不持戒者是否臻云此是佛之所説豈可妄言良久臻云天宮雖樂不是久居遂下十八重地獄乃見閻王居正殿與地藏菩薩耳語臻便出門首見一青衣童鞠躬云東海龍王請伴諸羅漢齋臻遂赴齋回得數顆如意珠一時分付諸門人白雲被珠光一爍忽然夢覺以至今朝諸法乳為臻公設齋請白雲升座大衆且道昨夜夢底是適來説底是衆中盡是久參先德禪道之精若人辨得試出露箇消息看有麼有麼若無白雲又有箇古話釋迦老子在跋提河側般涅槃了迦葉始至繞金棺而哭於是世尊為現雙趺大衆且道般涅槃時是現雙趺時是乃云止止不須説我法妙難思諸增上慢者聞必不敬信圓悟勤禪師少保張丞相忌日請上堂大衆握佛祖鉗鎚控作家爐鞴烹煅古今驗證衲僧唯用向上一機金剛王寶劍臨濟祖師傳黃檗馬祖此箇機要向大河之北獨振正宗一喝分賓主照用一時行坐斷天下人舌頭奔走四海雲水以至乃子乃孫傳此正見用此真機若非大解脫人安能當陽證驗憶昔無盡大居士生平以此箇事為務遍寰海宗師無不咨參到兜率山下逢見老衲論末後句始得脫體全真言解道理一時脫却遂作偈云鼓寂鐘沉托鉢回巖頭一拶語如雷果然只得三年活莫是遭他授記來鏗金戞玉虎驟龍驤不妨具大機得大用以此正印印天下叢林善知識山僧昔在湖北相見與伊電卷星馳一言契證表裏一如居士功業書於竹帛遺德在於生民後來當此之日撒手那邊行止且道無盡居士向什麼處去還委悉麼大千沙界諸佛土剎剎塵塵現勝身復云盛德在生民四方共欽仰三教大宗師稱頭有銖兩七十九歲佛齊年是日霜風亘霄壤一聲振忽雷前星墮雲帳麒麟掣斷黃金鎖一躍直歸梵天上萬載千秋著遺想劉提舉請上堂般若智光破生死昏衢之暗金剛寶劍截結使纏縛之憂透脫處一念無多受用處通身具眼直得如天普蓋似地普擎如日普照如風普涼一絲不移纖塵不翳所以道一切法不生一切法不滅若能如是解諸佛常現前又道未達境唯心起種種分別達境唯心已分別即不生於分別不生法中認取不變不移無窮無盡清淨本然周遍法界本來自性若了得去於天地未分生佛未立乃至劫火洞然大千俱壞於中無一絲毫動搖無一絲毫起滅無一絲毫增減無一絲毫榮悴若能恁麼始知提舉朝議未嘗滅未嘗虧未嘗移未嘗去且獨超物外一句作麼生道九蓮開合處百寶自莊嚴久立珍重虎丘隆禪師滕樞密宅請升座世尊出世為一大事因緣祖師西來直指人心見性成佛所以道佛佛授手祖祖相傳便有教外別傳不立文字單提直截究本明宗令一切人離諸執著况此一事不以心思不以意想思慮知解盡是鬼家活計若是向上人赤條條地直向父母未生前承當却來者邊行履出生入死得大解脫要識諸佛出處麼現在諸人眉毛眼睫上轉大法輪演説摩訶般若離四句絶百非要識祖師西來意麼現在諸人六根門頭晝夜放大光明交光相羅如寶絲網以至山河大地草木叢林盡在諸人大光明中發現只如光未發時上無諸佛下無衆生消息是汝諸人向什麼處安身立命若也知得去處便知故摳密相公落處苟或未然萬古碧潭空界月再三撈摝始應知大慧杲禪師魏侍郎請升座寄居衢州常山縣持服魏矼謹施淨財入山修設仍命山野升於此座舉揚般若以此功德資薦先考致政宣教往生安養諸人還知麼者老居士便是和州三世接待底魏公也山僧大觀初行腳時亦曾到他家時侍郎尚幼今日作官為國家宣力皆乃翁陰德所致此翁平生極修學喜讀佛書從方外老衲遊精修梵行常以王梵志士饅頭頌作佛事以警悟流俗比見潘舍人所作行狀詳書其實聞疾已革有來問訊者亦以慈悲攝化不及世間一言啓手足時談笑自若跏趺而逝淨名所謂設身有苦念惡趣衆生起大悲心我既調伏亦當調伏一切衆生但除其病而不除法遂召大衆云魏公疾已革而能忍苦為諸來者隨宜説法足見學佛之驗今日幸遇在會諸人同此證明不免借渠鼻孔出氣要識法麼真如佛性菩提涅槃是要識病麼妄想顛倒貪嗔邪見是雖然如是離妄想顛倒無真如佛性離貪嗔邪見無菩提涅槃且道分即是不分即是若分存一去一其病益深若不分正是顢頇佛性儱侗真如畢竟作麼生説箇除病不除法底道理有般漢聞恁麼説便道即法是病即病是法但有言説都無實義順真如則顛倒妄想貪嗔邪見悉皆是法隨顛倒則真如佛性菩提涅槃悉皆是病恁麼見解莫道我披衲衣便是作他座主奴也未得在何故須知平地上死人無數灼然過得荊棘林者是好手不見古人云設有一法過於涅槃吾説亦如夢幻苟能於夢幻中如實而證如實而解如實而修如實而行以如實之法能自調伏起大悲心作種種方便復能調伏一切衆生而於衆生不作調伏不調伏想亦復不作顛倒想不作貪嗔邪見想不作真如佛性菩提涅槃想不作除病不除法想不作存一去一分不分想既無如是之想則一道清淨平等解脫徑山今日説此清淨平等解脫之法奉為持服魏矼追薦先考致政宣教伏願了惟心之淨土見自性之彌陀此界他方隨處快樂復召大衆云今既借渠鼻孔出氣已了而今徑山却將鼻孔為渠出氣去也喝一喝張侍郎請升座借人口説得底不干自己事自己𮌎襟流出底旁觀者有眼如盲有口如啞便恁麼領略得作禪狀元也不難直饒如是始入得徑山門未入得徑山室若入得徑山室禪狀元始用得著禪狀元才用得著儒狀元便用不著敢問大衆前面為甚麼用得著後面為什麼却用不著顧左右云還知徑山落處麼若知徑山落處禪狀元即是儒狀元儒狀元即是禪狀元即今拈却禪與儒且道當面一句作麼生道要知死底張宣教便是活底狀元爺朱舍人請升座僧問三世諸佛説了也和尚作麼生師云摩竭提國親行此令進云要且只今事不恁麼師云劍去久矣爾方刻舟進云也知和尚截斷天下人舌頭師云果然不恁麼進云道端白日青天開眼落人圈䙡便禮拜問釋迦彌勒猶是他奴未審他是阿誰師云你是一枚村夫進云切忌為他安名立字師云村夫有甚麼名字進云前言何在師云你道他畢竟是阿誰進云家無小使不成君子師云未免隨人腳跟轉問如何是佛法的的大意師云老僧無的的大意亦無如何進云既是無和尚甚處得者消息師云育王亦無者消息乃云只者消息三世諸佛説不及六代祖師傳不到既説不及又傳不到則釋迦彌勒亦是空名釋迦彌勒既是空名喚什麼作奴喚什麼作主喚什麼作生喚什麼作死喚什麼作古喚什麼作今既無生又無死既無古亦無今淨裸裸絶承當赤灑灑沒窠窟如是則盡十方世界無內無外是箇淨妙佛土是箇無上佛土是箇無等佛土是箇不可思議佛土是箇不可量佛土是箇不可説佛土既有如是佛土只如宮使舍人今請妙喜舉揚此段大事因緣追薦先妣太夫人俞氏且道在那箇佛土中良久云一塵一佛剎一葉一釋迦蔡春卿薦考請示衆舉洛浦示衆云孫臏收鋪去也有卜者出來時有僧出曰請和尚一卜浦云汝家爺死僧無語法眼代拊掌三下師云者僧沒興死却爺又被他人拊掌信知禍不單行福無雙至然洛浦善卜法眼善斷若子細思量爻象吉凶二老一時漏逗既占得火風鼎卦何故斷作地火明夷雲門即不然驀拈拄杖云孫臏門下死却郎罷連卓三下云會麼內屬艮宮再求外象又卓三下云千靈萬聖萬聖千靈莫順人情復卓一下云吉凶上卦密庵傑禪師施主追修請上堂諸佛未出世達摩不西來人人抱荊山之璞箇箇懷赤水之珠及乎五葉開敷千燈續焰便見生死交謝寒暑迭遷北里豪家昨日歌兮今日哭蔣山與麼告報大似移花兼蝶至買石得雲饒諸人若善參詳管取終日於聲色頭上坐臥聲色不能染污終日於生死界中出沒生死不能籠且據箇什麼道理便能如是驀拈拄杖云千聖不知何處去倚天長劍逼人寒雪巖欽禪師追嚴上堂第一義諦廓然本無對面者山摧海枯長憶江南啼鷓鴣追嚴上堂雷聲斷梅陰霧豁開突出先佛未形之相生住異滅難該洞庭山子青崔嵬高峰妙禪師薦亡上堂入我法中不論凡聖動靜施為咸遵舊令要明少室格外新條驀拈拄杖云未免借伊鼻孔出氣卓拄杖云開甘露門劃一劃云示甘露味大地衆生頓超十地惟有今辰覺成上座營齋報薦考妣二位亡靈不在其內何故擲拄杖云分明一對黃金骨不必旃檀入細雕楚石琦禪師薦亡上堂舉天衣懷和尚云百骸俱潰散一物鎮長靈百骸潰散皆歸土一物長靈甚處安南堂靜和尚云一物長靈甚處安長空雲散碧天寬蓮宮佛剎花無數眨起眉毛子細觀師云觀則不無喚什麼作一物喝一喝箬庵問禪師檀越資冥上堂師云生也不道死也不道快俊鷹趕不上迅雷疾電追莫及騰身抹過太虗空生鐵蒺藜當面擲春風嫋嫋春柳依依陌上桃花血濺眉殘紅流在釣魚磯驀拍禪床云話墮了也急著破史赤豹太史薦亡請上堂舉李都尉楊內翰與唐明嵩禪師問答次李云彌陀演化於西方達磨傳心于東土胡來漢現水到渠成五嶽鎮靜以嶸嶸百谷朝宗而浩渺一靈之性托境現形三有之中憑誰立命嵩云仙人無婦玉女無夫楊云尼剃頭不復生子嵩云陝府鐵牛能哮吼嘉州大象演摩訶李云側跳上山巔嵩云騎牛不著靴元叟端和尚云大小唐明牆塹不堅扄鐍不固致令他俗人有入室操戈之舉是你諸人且作麼生會擊拂子云白鷺下田千點雪黃鸝上樹一枝花師云端和尚也只知其一不知其二山僧今日大開門戶廣演懺摩赤豹太史入山薦先并薦亡室韓氏夫人此夜今時同垂法會大衆會麼山僧所供並是詣實下座史趾祥居士設薦殉難諸亡靈請升座世界未形乾坤未立佛生凡聖何處安名世界已形乾坤已立佛生凡聖各得其處所以道是法住法位世間相常住如何是是法竪拂子云者箇是拂子如何是法位擊拂子云喚作拂子也不得不喚作拂子也不得者裏著得隻眼天地由此而位萬物由此而育君得之而統御萬臣得之而匡扶九有父子兄弟夫婦得之而孝慈友睦敦於一門朋友得之而信義忠貞盟於方寸是千萬世不易之常理亘古今不磨之至性也此理一日不毀則世界一日不壞此性一息不泯則乾坤一息不移莫謂黃虞忽焉沒祇今何異劫初前山僧今日伏為護法史趾祥居士設薦赴義殉難諸幽魂特請升座舉揚上而國主藩王下而將吏胥役以及若憶若忘若耿於衷若逸於外同時異世自他不隔於毫端存沒升沉始終不離於當念歸根落葉體露金風奮氣揚眉身嬰白刃寶蓮華座方垂藥的的枝頭吐異香諸仁者還信麼不見教中道我若向刀山刀山自摧折我若向火湯火湯自枯竭我若向地獄地獄自消滅我若向餓鬼餓鬼自飽滿我若向修羅修羅自調伏我若向異類各得大智慧正恁麼時且薦拔諸魂作何趣向聽取一偈熱血化為功德水幽冤凝作妙香雲珊瑚枝上鈎明月碧落招回蜀帝魂拍禪床下座進督府為夫人金氏升座靈光獨耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛妄緣非實一切惟心心境若空一切妄緣從何而有其迷妄也妄見有生妄見有死於生死中起諸惡業造諸罪障其離妄也生如漚寄死若幻銷於本無生死中惡業本空罪障本淨所以古佛有言假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅如是則身也心也塵也境也罪也福也起也滅也等如幻故雖則等如幻故當其幻起一念忽住幻境時盡塵沙劫不可説不可説境界若愛若憎若恩若怨於衆生心中無不遍具當其忽起一如幻念忽悟如幻境時盡塵沙劫不可説不可説境界若愛若憎若恩若怨於無生心中便如日照太虗洞諸群暗如紅爐點雪有礙皆融則知等此一念其轉凡成聖轉迷為悟幻與如幻之不同便聖凡迷悟之逈異矣即今總督部院實翁大居士夙承願力此性不迷因其夫人仙逝千里馳書敦請山僧特臨淮甸親為對靈以舉揚資冥福以般若雪愆尤居士才舉此念時夫人已早登淨界了也一念淨則念念淨一人淨則多人淨一世界淨則多世界淨無邊剎境自他不隔於毫端十世古今始終不離於當念何祇夫人乘此一念空諸有漏淨諸有緣多生眷屬歷劫冤親無不乘此一念得證大解脫地得入大寂定門以至寰海一切有情群黎得因大總督此一念間各各悟身如幻悟心如幻悟境如幻則居士此念又自他俱利物我俱成下徹幽玄上超群際豈僅結一時般若之緣誠為塵劫菩提之種且道山僧今日高升寶座特為舉揚畢竟是幻耶非幻耶是妄緣耶是真際耶聽取一偈頓空有趣幻非幻爍破情緣空不空玉女已歸霄漢去不須惆悵五更風以拂子打圓相喝一喝下座吳母太夫人點主後升座橫按拄杖云雄雄坐斷溪山路百億須彌洞底寒八表自然歸正域死生夢幻不相干既不相干合須辨主若辨得去問如瓶瀉答似雲興竿木隨身逢場作戲迷錙銖於言下惑照鑑於微芒竭世樞機逞諸玄辨總是癡狂外走遍界髑髏人人有通天活路箇箇有劃地奇能增一些不得減一些不得明投暗合體用互宜隨他智如鶖子辨若滿慈於諸人分中了沒交涉臨濟三玄三要洞山五位君臣雲門一字關溈仰九十六圓相鬼門貼挂誑唬閭閻捩轉上頭關擲翻華藏界全超凡聖古今更不倚門傍戶赤肉團上突出無位真人自己胸中流出蓋天蓋地奴呼彌勒婢視釋迦自餘賣草鞋漢那討出頭處所所以事是恁麼事人須恁麼人醍醐上味為世所珍不遇其人翻成毒藥今日揭開腦蓋與諸人露布了也明明不異的的相承全賓即主全主即賓打破涅槃城同遊解脫海且一超直入一句作麼生道拈拄杖云青山不鎖長飛勢滄海合知來處高一喝卓拄杖朝宗忍禪師祈福并薦夫請上堂一者祈福二者薦亡一椎兩當舉世無雙既兩當因甚却無雙下不厭地獄上不欣天堂當陽突出露堂堂鷓鴣啼處百花香喝一喝遂舉金剛經云若見諸相非相即見如來師云大小世尊抱橋柱洗澡曹山則不然若見諸相非相即見諸相須知要見如來則易要見諸相則難若人道得不難不易句一生參學事畢卓拄杖下座沈制臺差官到山為薦陳亡將士請上堂假借四大為身箇中畢竟無我但能一念解脫管教法法全彰萬物皆備三界獨尊劍樹刀山化為烏有幢幡寶蓋起自何來所以道我若向刀山刀山自摧折我若向火湯火湯自消滅坐斷罪福路頭自然直下超越今日蓋為沈大司馬奉旨勦徭一載之內八排皆平今當奏凱之際忽興同體之悲差官齎資入山禮懺設齋命山僧升座説無生法以薦陳亡將士某某等衆須知法雨一施直達幽冥法音一聞即超極樂奮勦寇雄心披忍辱鎧而魔軍頓破封轉侯妄念操智慧刀而佛道立成然雖如是猶是大司馬下憫群情底意且上祝皇恩一句又作麼生八方霑霂無為化四海謠歌賀太平下座龍門遠禪師還東山省覲衆請小參暫下蓮峰輕屈指光陰倐爾又三年雖然不隔絲毫許爭似躬親到座前某伏自數日前陪從太平禪師象馭再登蓮嶠歸侍老師大和尚瞻禮慈容之間須知有相見底事敢問大衆作麼生是相見底事不可是你見我我見你是相見若恁麼全無佛法得力處何故世間諸趣彼此見存常在生死之中未有脫離之地所以雪峰和尚向人道望州亭與你相見了也烏石嶺與你相見了也僧堂前與你相見了也若據如斯指示豈待音容相接言氣相交始為相見諸高德夫為參學之士須實有去處始得還知麼如今敢道千里同風相見却易會對面相見却難知何故難知夾山老子道目前無闍黎座上無老僧諸來大衆盡在于此如何見得堂上老師大和尚在座與諸大衆證明作麼生見座上無老僧不可等間過却將為間事晝夜被見聞風所飄鼓根塵陰界諸入纏縛不得自由生死事大須得箇悟由入頭處始得雖然如是格外道人實遭怪笑何故須知有向上一著且待異日他時別為諸人點破因記得昔日南泉趙州二尊宿皆是道超物外名播寰中時有一僧往山中見一禪伯在盤陀石上卓庵而坐僧遂問曰南泉出世浩浩地何不往彼問訊空坐何為庵主曰莫道南泉出世佛出世我亦不去僧持此語見南泉泉大驚遂令趙州往驗看州到庵主處從東過西庵主不顧州又從西過東庵主亦不顧州遂當門立曰庵主你敗也庵主亦不顧遂拽下簾子而行庵主亦不顧大衆者一則因緣諸人作麼生委悉莫是趙州南泉不到庵主田地返被庵主勘破落他陷虎之機也無莫是庵主雖然並無受用臨機不解互換平地上死人也無諸仁者素非此理大凡行腳人須是道眼分明始得若道眼不明祇被南泉趙州庵主三人換却眼睛了也實無少許相應處若也道眼分明南泉趙州庵主便是上座更無異見也還相肯諾也無不見道曾經大海休誇水除却須彌總是塵久立大慧杲禪師自虎丘上雲居省覲秉拂夷門昔日呈家醜拈出無邊栗棘蓬今日甌峰孤頂上幸然無事又相逢相逢即且置其中事作麼生若有人道得一句便請各自歸堂若道不得打葛藤謾諸人去也諸佛未出世時有即今巴鼻一人人頂門上輝大寶光出世後消息全無一箇箇腳跟下縱橫十字有佛處不得住無佛處急走過拶著不來三千里外穿却鼻孔到者裏直饒置無邊剎境於一毛頭上只者一毛頭從甚麼處得來納百億須彌盧於一粒粟中只者一粒粟又向甚麼處安著如是則易不如是則難休於言上覓莫向意中求如是則難不如是則易識取鈎頭意莫認定盤星衲僧拄杖子拈得便行切忌向平地上釘樁搖櫓所以道神光不昧萬古徽猷入此門來莫存知解只如一大藏教説權説實説頓説漸説有説無乃至西天此土諸代祖師古往今來一切知識種種言語種種作用且道是知解耶非知解耶若定奪得出秉拂上座一場敗闕若定奪不出潑第二杓惡水去也喝一喝云是甚麼有照用無向背只許老胡知不許老胡會睦州一向擔板趙州貴買賤賣獨有三聖瞎驢至今遭人笑怪須彌山突出諸人額角邊大海水灌入諸人鼻孔裏即且置馬大師道自從胡亂後三十年不曾少鹽醬又作麼生商量還委悉麼多年曆日無人問驀地拈來愁殺人喝一喝復舉巖頭參德山才跨門便問是凡是聖山便喝頭便禮拜後有僧舉似洞山山云若不是奯公也大難承當巖頭聞云洞山老漢不識好惡錯下名言我當時一手擡一手搦師云猛虎不識穽穽中身死蛟龍不怖劍劍下身亡巖頭雖於虎穽中有透脫一路向劍刃上有出身之機若仔細檢點將來猶欠悟在只今還有為巖頭作主底麼出來與杲上座相見良久喝一喝拍一拍云洎合停囚長智玉泉曇懿禪師省大慧和尚於小溪慧為之升座乃舉雲門一日拈拄杖示衆云凡夫實謂之有二乘析謂之無緣覺謂幻有菩薩當體即空衲僧見拄杖子但喚作拄杖子行但行坐但坐總不得動著慧云我不似雲門老人將虗空剜窟籠驀拈拄杖云拄杖子不屬有不屬無不屬幻不屬空卓一下云凡夫二乘緣覺菩薩盡向者裏各隨根性悉得受用唯於衲僧分上為害為冤要行不得行要坐不得坐進一步則被拄杖子迷却路頭退一步則被拄杖子穿却鼻孔即今莫有不甘底麼試出來與拄杖子相見如無來年更有新條在惱亂春風卒未休正恁麼時合作麼生下座煩玉泉長老為衆拈出師登座敘謝畢遂舉前話云適來堂頭和尚恁麼批判大似困魚止濼病鳥棲蘆若是玉泉則不然拈拄杖云拄杖子能有能無能幻能空凡夫二乘緣覺菩薩卓一下云向者裏百雜碎唯於衲僧分上如龍得水似虎靠山要行便行要坐便坐進一步則乾坤震動退一步則草偃風行且道不進不退一句作麼生道良久云間持經卷倚松立笑問客從何處來通嗣書至提綱黃龍南禪師四祖演長老通嗣法書上堂山僧才輕德薄豈堪人師蓋不昧本心不欺諸聖未免生死今免生死未出輪回今出輪回未得解脫今得解脫未得自在今得自在所以大覺世尊於然燈佛所無一法可得六祖夜半於黃梅又傳箇甚麼乃説偈曰得不得傳不傳歸根得旨復何言憶得香山曾漏泄新婦騎驢阿家牽東山演禪師四面專使文詳持法嗣書到師於法座前受書拈起問專使云者箇是四面底闍黎底在什麼處使云驗在目前師云幾不問過遂升座云好事難逢何不出來大家唱和復云大衆四面長老有書對大衆前須當説過四面大漆桶詳師分半桶白蓮峰下開薰却我鼻孔且道為什麼如此無你出氣處資福專使持法嗣書至師於法堂上受書拈起問專使云本無名字什麼處得者箇來專使擬議師云因誰致得遂升座舉石頭問長髭什麼處來髭云嶺南來石頭云大庾嶺頭一鋪功德成就也未髭云成就久矣只欠點眼在石頭云莫要點眼麼髭云便請石頭垂下足髭便禮拜石頭云你見箇什麼道理便禮拜髭云如紅爐上一點雪師云紅爐一點雪知音瞥不瞥龜毛扇子扇泥牛一點血圓悟勤禪師峽州東山馳法嗣書到上堂靈山會上千葉騰芳少室峰前一枝獨秀生佛未具已見蟠根空劫那邊轉彰文彩渾崙擘不破撲鼻更馨香八面自玲瓏通身轉綿密箭鋒相拄針芥相投則且置獨脫一句作麼生道倐爾風雲會廓然天地春復云坐見東山振古風頂門眼正有全功操持臨濟金剛劍倜儻楊岐栗棘蓬鐵壁銀山須作用魔宮虎穴亦流通攝將香水無邊剎併入鉗鎚爐鞴中天目禮禪師翠巖真長老嗣書至上堂洪崖井邊翠巖寺裏山遮半月江礙斜陽不是諸佛眼睛亦非祖師巴鼻召專使云會麼歸去藤王閣上捲起珠簾看取十八灘頭煙波鼎沸愚庵及禪師善權通長老嗣書至上堂自從胡亂後三十年不少鹽醬雪後始知松柏操任汝非心非佛我只管即心即佛事難方見丈夫心有底便道江西信息通也大梅梅子熟也善權方便固當如是只如石頭道書亦不達信亦不通諸人如何話會直下道得鈯斧子未到你在法眷書至提綱真淨文禪師上堂謝黃檗先馳云分枝列派共闡宗猷祖令全提各隨機變灑黃龍之一雨枯木重榮繼斷際之遺蹤真燈再焰光我先覺以進後昆不任歡慶某無似之者何承先馳上人遠離鷲嶺深入洞山得得馳書敘其法乳過沐周勤仰荷弗已復拈拄杖召大衆云實謂雖與我同條生不與我同條死阿喇喇也大奇算來彼此丈夫兒睡則同床各自夢古今此理少人知少人知付先馳傳歸鷲嶺分明舉向師箬庵問禪師玉林和尚書至上堂隻羽翔天半雙眉亦暫舒寒風吹凜冽喜得故人書大衆且道書中説甚麼便下座嗣法師遺書至提綱圓悟勤禪師聞五祖訃上堂大庾嶺頭笑却成哭崇寧門下哭却成笑何故喫泉水貴地脈且要正眼流通宗風不墮所謂無常生死法與我不相干若能如是見不用哭蒼天既不用哭蒼天如何通信請大衆拈香兩彩一賽下座龍門遠禪師五祖演和尚遷化遺書至上堂昨朝六月二十六無角鐵牛生四足哮吼一聲人未知撼動天關并地軸隻履又西歸唱罷胡家曲可憐末後太分明無限清聲遍溪谷我先師出世四十餘年於舒靳二郡四坐巨剎垂慈苦口接物利生未嘗少暇於二十五日早升座告衆至晚淨髮歸方丈二十六日早安然長往自始及末從初至終盡善盡美真善知識清遠忝承提訓痛傷可量古人道將此深心奉塵剎是則名為報佛恩昔日大梅遷化上堂聞鼯鼠聲乃云即此物非他物汝善護持吾當逝矣我先師上堂告衆云富嫌千口少貧恨一身多以今校古絲毫無差諸人還知大梅東山二老子去處麼若知得則不辜負先師若也未知有寒暑兮促人壽有鬼神兮妬人福下座嗣法師遺書至舉哀拈香法語大慧杲禪師為圓悟和尚舉哀拈香指真云者老和尚一生多口攪擾叢林近聞已在蜀中遷化了也且喜天下太平雲門昔年雖曾親近要且不聞他説著箇元字腳所以今日作一分供養點一盞茶燒此一炷香薰他鼻孔即非報德酬恩只要辱他則箇召大衆云既不聞他説箇元字腳又無恩德可報何故特地作者一場笑具還委悉麼冤有頭債有主偶因失腳倒地至今怨入骨髓遂燒香虎丘隆禪師為圓悟和尚舉哀云釋迦已滅彌勒未生正當今日流通佛祖正脈委在我圓悟禪師大和尚直得七據寶剎統三界以為家四海馳聲作群生之眼目不謂法幢摧折佛日掩光後學無聞叢林失所雖然如是盡落今時何故豈不見道淨法界身本無出沒既無出沒師今不死我何疑惑大衆既然不死還知圜悟老人落處麼若也知得落處不勞指注儻或未然仰師之道地久天長却請真前大家燒香復指真云見麼拘尸城畔當時大事曾興濯錦江頭此時還循舊轍放光現瑞攝化歸真法海珠沉人天眼滅雖然如是恁麼中有不恁麼不恁麼中却恁麼便見無生死中示有生死無去來中而示有去來雖然要且無生死去來之相故我圜悟禪師大和尚禪河渺邈津濟無窮名動至尊道滿天下且能事已畢隻履西歸穩坐家堂末後一句作麼生道諸人若向者裏道得圓悟老人猶在若不然者與諸人道去也良久却顧侍者云道什麼遂舉哀我庵無禪師寂照和尚遺書至舉哀拈香妙喜五傳最光焰寂照一代甘露門等間觸著肝腦裂氷霜忽作陽春溫我思打失鼻孔日是何氣息今猶存天風北來歲云暮掣電討甚空中痕疏山性禪師全室和尚訃音至舉哀拈香三十三天天子死盡有哀情北鬱單越人死盡發歡聲有哀有喜總屬愛憎衲僧去就似火燒氷還知先師入何地獄出何類行有等便道今日不滅昔日不生且道疏山逆子如何報孝以手捶胸云波旬休息天下太平復舉哀云蒼天蒼天二親遺書至提綱荷澤會禪師一日鄉信至報二親亡師上堂自白槌曰父母俱喪請大衆念摩訶般若衆才集師復打槌曰勞煩大衆歸省受業提綱古靈讚禪師參百丈回受業業師集衆請升座師舉百丈示衆云靈光獨耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛受業師於言下有省大慧杲禪師歸受業衆請小參山僧昔為童子時一念知道出家好却因脫白此伽藍今日重來稱長老兵戈之後亡者多現前耆宿喜無惱以尊就卑離我人咸請舉揚無上道後生當發猛勇心四海求師宜撥草徑山奉勸語不虗辨口維摩須靠倒疏山性禪師歸溧陽弘溪受業衆請升堂擊拂子云還有識得先師面皮厚薄者麼既無看山僧追風捕影去也桑梓南徐金壇縣得業丹陽大聖院本是一箇無事人剛要參禪求正見幼年行腳到天目師子巖前親中毒諸方歷罷便歸來自云平生志願足蘭若高棲弘溪口傲雪披霜歲長久栽田博飯效古風始終不落他人後守株待兔五十年一味擔板少人緣狹路相逢李百八買帽相頭宿世冤八十六年世緣盡東涌西沒那伽定當頭一句孰與評坐斷乾坤無少剩思量解笑不解哭斷絃誰把鸞膠續荊棘林中示要津無影樹下吟風曲豈如寂滅自了漢須把真燈燭幽暗苦海無邊願再來重整中峰舊公案復舉南泉為馬祖齋次問衆云若道今日先師來以何憑據若道不來又是佛法無靈驗時洞山在座下出云有伴即來師云古人即不問且道先師今日來不來良久自代云新疏山髫齓時相見復顧大衆云委悉麼拈拄杖敲香卓喝一喝云先師來也便下座
