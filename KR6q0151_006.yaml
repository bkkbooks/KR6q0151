body:
  text: 武林十八㵎理安禪寺住持婁東行悅集達磨忌拈香法語尊祖千巖長禪師初祖忌拈香九年面壁坐斷天下人舌頭隻履西歸喪却自家窮性命吾本來茲土又喪不盡也傳法救迷情又坐不斷也既坐不斷喪不盡畢竟作麼生一花開五葉結果自然成鐵關樞禪師達磨忌拈香九年面壁者些滯貨發落不得賣金不是買金人斷臂安心剛受屈插香無端揣出虗空骨楚石琦禪師初祖忌拈香者漢西來特地癡呆不立文字虗張意氣直指人心轉見病深見性成佛翻成窠窟靈山直是不甘他牛糞燒香狗尿茶因甚如此祇為如此報德酬恩只者是愚庵及禪師初祖忌拈香對梁王廓然無聖此地無金二兩坐少林九年面壁俗人沽酒三升無影樹花敷五葉無煙火焰續千燈太平本是將軍建不許將軍見太平祖忌拈香雙耳帶金環兩眼如墨突行腳不逢人九年空面壁破邪師六宗異見亂世英雄傳上乘一心之印太平奸賊隻履翩翩何處歸一花五葉成狼藉顧左右云淨智妙圓體自空寂祖忌拈香萬里西來九年面壁前無釋迦後無彌勒單單遺下履一隻等閒賣弄價重連城奇特商量分文不直一番拈起一番新千古令人轉相憶呈香云休相憶今朝十月初五日呆庵莊禪師祖忌拈香來時缺兩齒去時留一履者箇老胡僧孟浪絶倫比乃喚云者裏還有祖師麼老僧與伊廝見則箇以香置罏云莫怪空疏伏惟珍重祖忌拈香梁王殿上將金博金少室峰前以楔出楔葱嶺那邊逢宋雲誰知弄巧翻成拙恕中慍禪師祖忌拈香破六宗之邪見傳上乘之妙法日鑿一竅七日而混沌死插香云無人知此意令我憶南泉天目禮禪師祖忌達磨祖師從西天來被流支打落當門板齒直過東震旦中尋討不見諸人還委悉麼至今千載後缺陷不關風了庵欲禪師祖忌拈香碧眼胡尊性急一語不投機闔國追不及少林面壁弄盡精神只消斷臂師僧三拜而立伎倆既盡心事亦休隻履西歸空棺示跡後代兒孫充滿中國莫不向今日燒牛頭栴檀之香具酥酪醍醐之食用伸追遠用報恩德正眼觀來何異棒漏巵以灌焦釜而終莫能濕所以開福比丘蒸雲門胡餅烹趙州釅茶雖然禮貌粗疏畢竟臭味相入祖忌拈香西天著不得東土著不得破六宗謾有多言對梁王全無朕迹坐久成勞忽轉身春風滿地華狼藉月江印禪師祖忌拈香跨水逢羊歷魏遊梁八九年冷坐全無巴鼻三五回中毒也好恓惶若謂是十萬里西來傳佛心印無鼻孔漢將什麼聞香南石琇禪師祖忌拈香者箇老胡渾無面目攪得支那天翻地覆不立文字分明曳尾靈龜直指人心蚤已畫蛇添足年年此日一爐香斷絃須是鸞膠續祖忌拈香在西天曾挫異見王到東土撞著梁武皇廓然無聖大似秦時𨍏轢鑽九年面壁正如喪車後藥囊雪中覓得一箇方始能破天荒從此惡毒滋長喚作五葉聯芳北山忝為末裔不知滿面慙惶一甌山茗一爐香家醜重重又外揚祖忌拈香達大道兮過量通佛心兮出度不與凡聖同纏超然名之曰祖只如大光和尚具甚麼見却道不是祖甜瓜徹蒂甜苦瓠連根苦笑隱欣禪師祖師忌拈香八百年前向者裏落節却贏得一著八百年後向者裏拔本却輸了一著且道是那一著一任天下衲僧貶剝祖忌拈香東土西乾無授受一華五葉自芬披兒孫豈敢超宗祖只要家風似舊時顧衆云達磨大師來也大衆同伸三拜佛朗性禪師祖忌拈香今日示終始活葬於熊耳三年隻履歸是你不是你魏國宋雲回葱嶺相耳語形神妙耶法爾如是一花五葉函蓋天地從來沒意智都在吾手裏便拈香百丈忌拈香法語佛朗性禪師百丈祖忌拈香再參馬大師祖視繩床角一喝不掩耳鷺鷥騎白鶴清規鑑得麼夜來巡火鐸全室泐禪師百丈忌拈香豎拂挂拂神出鬼沒併却咽喉捫空揣骨五百生來墮野狐鬍鬚赤對赤鬚鬍開山忌拈香法語雪巖欽禪師小釋迦祖師忌日拈香插鍬而立去死十分拔鍬便去弄鬼精魂山鳥山花笑殺人慚惶炷此一爐薰松隱然禪師開山和尚忌日拈香云巴陵三轉語未足酬恩楊岐作女人拜深為負德然上座總不恁麼何故字經三寫烏焉成馬恕中慍禪師空照忌拈香未見巖頭口似磉盤既見巖頭眼如木𣔻本然理拄地撑天何勞置問主人翁呼來喚去猶缺惺惺插香云相逢不下馬各自奔前程月江印禪師大覺和尚忌拈香代圓通應詔而起為九峰草疏而來對使者焚却龍腦之鉢創家堂如築黃金之臺此是大覺老人平生受用不盡底三昧雖相去二三百載而聲光煒燁猶百千之迅雷稽首僧伽真古佛鄮峰千古碧崔嵬無文璨禪師伏虎祖師忌辰拈香氣食萬牛風生萬籟有爪牙而不能藏伏有文章而不能韜晦若到薦福門下伏聽處分未為分外何故樹上安身法他未夢見在開山忌提綱大慧杲禪師開山忌日上堂今日一會是當山國一大覺祖師為諸人向一切處轉無上法輪全提底時節直得大地六種十八相震動出大音聲諸天音樂不鼓自鳴梵唄詠歌自然敷奏諸天寶華同時而雨正當恁麼時塵沙諸佛諸大菩薩諸阿羅漢天龍八部諸鬼神等各從他方而來集會咸生歡喜踊躍𫁉慶同時發聲而作是言善哉希有大覺祖師快說此法我等悉來共作證明證明即不無如何是此法良久云雲有出山勢水無投㵎聲恕中慍禪師開山散忌上堂法不孤起仗境方生今日是開山空照祖師入般涅槃之辰山僧將不可說不可說恆河沙世界作一筵席百億須彌山作一碗飯百億香水海作一碗羮聊陳供養正與麼時且將此筵席向什麼處鋪設若向世界上鋪設既此世界已成筵席豈世界外別有世界耶若向虗空中鋪設虗空無實相又作麼生鋪設若一向與麼休去又是顢頇佛性儱侗真如衆中莫有出來措置者麼如無老僧自出手去也竪拂子恆河沙世界百億須彌山百億香水海華簇簇錦簇簇總向拂子頭上鋪設不寬不隘無缺無餘大衆且道空照祖師還肯受此供養也無受與不受即且置你道他即今在什麼處安身立命擊拂子家家門前赫日月太平不用將軍威天目禮禪師宏智禪師忌日上堂夜明簾外寶鑑臺前元無兼帶豈有偏圓正恁麼時畢竟誰居正位古渡無人霜月冷蘆花風靜鷺鷥眠了庵欲禪師開山忌上堂平地上死人無數過得荊棘林是好手今朝三月十五正是夏前春後饒你不住兩頭當處也成窠臼拈拄杖即今慧禪師向拄杖頭上吹無孔笛鼓沒絃琴非唯戞玉鏗金直是移星換斗卓拄杖喝一喝嗣法師忌拈香法語楊岐會禪師為慈明忌日設齊衆集至真前以兩手握拳安頭上以坐具畫一畫打一圓相便燒香退身三步作女人拜首座云休揑怪曰首座作麼生座云和尚休揑怪岐曰兔子喫牛奶第二座近前打一圓相便燒香亦退身三步作女人拜楊岐近前作聽勢第二座擬議楊岐打一掌曰者漆桶也亂做晦堂心禪師南和尚忌云昔人去時是今日今日依前人不來今既不來昔不往白雲流水空徘徊誰云稱尺平直中還有曲誰云物理齊種麻還得粟可憐馳逐天下人六六元來三十六正堂辨禪師佛眼和尚忌拈香龍門和尚闡提潦倒不信佛法滅除禪道拶破毗盧向上關猫兒洗面自道好一炷沈香爐上然換手捶胸空懊惱遂搖手曰休懊惱以坐具搭肩上作女人拜曰莫怪下房媳婦觸忤大人好大慧杲禪師圓悟和尚大祥拈香指真云者箇川藞苴自來好打鬨閙處便入頭惡靜而喜動前年今日始歸家今日前年路不差乃顧示大衆云作麼生是不差底路要會麼一回飲水一回噎一瓣栴檀一碗茶便燒香圓悟和尚忌拈香者箇尊慈平昔強項氣壓諸方逞過頭底顢頇用格外底儱侗自言我能以木槵子換天下人眼睛殊不知被不孝之子將斷貫索穿却鼻孔鼻孔索頭既在徑山手裏要教伊生也由徑山要教伊死也由徑山且道以何為驗遂燒香云以此為驗應庵華禪師虎丘和尚忌拈香平生沒興撞著者無意智老和尚做盡伎倆湊泊不得從此卸却干戈隨分著衣喫飯二十年來坐曲彔木懸羊頭賣狗肉知他有甚憑據雖然一年一度燒香日千古令人悵轉深谷隱顯禪師仰山和尚忌拈香仰面不見天低頭不見地不知大仰來不來一炷栴檀表勤意笑隱欣禪師佛智和尚忌拈香者一著子不從人得豈假師傳雖是久從此老且無絲毫交涉二十年前空手把鋤頭步行騎水牛二十年後人從橋上過橋流水不流休休鳳棲不在悟桐樹一度西風一度愁佛朗性禪師全室和尚忌拈香怪先師最不可不會禪深肯我如此活埋人便好驀面唾冷地思量著合笑不合哭大衆今日以何為先師作忌師拈香便拜全室和尚忌拈香今日先師忌辰還有相知者麼不免對衆數理一上中竺徑山太虗釘橛兩住天界水中捉月此土西天波波不歇戴角披毛再出來大千世界廣長舌便燒香呆庵莊禪師芥室和尚忌拈香云巴陵三轉語大殺誇張楊岐女人拜徒勞賣弄徑山今日爇此枯木不是供養先師只要天下衲僧知有些子氣息遂插香召大衆云且道是甚氣息衆無語師哭云蒼天蒼天雪巖欽禪師無準和尚忌拈香巴陵三轉語大仰一甌茶有恩成怨恨無事是讐家杜䳌啼血染山花無準和尚忌拈香成龍者升天成蛇者竄草將謂隨一切性任其所適誰知憤憤悱悱却成煩惱集雲峰高日杲杲無準和尚忌拈香盡道先師今日死誰知今日是生朝不知却有何憑據紫柏黃檀一處燒高峯妙禪師雪巖和尚忌拈香昔年瞎却我眼今朝穿却你鼻冤冤相報無休莫若克己復禮遂插香以袖掩面作哭聲復以坐具搭左肩上作女人拜云非惟和光同塵免得遞相鈍置雪巖和尚忌拈香巴陵設忌三轉語西峰單單只一句那一句聻遂插香云逢人切忌錯舉雪巖和尚忌拈香阿師示寂來彈指恰八載將謂入黃泉面目儼然在大衆面目既在拈起香云莫是者箇麼插香云認著依前猶隔海雪巖和尚忌拈香咄哉老賊偷心未息石灰布袋到處成跡若謂子為父隱畢竟曲不藏直今日因齊慶讚未免乘時拈出中峰本禪師丹陽大同庵高峯和尚遠忌拈香臘月初一日老和尚遠忌新建大同庵也要效年例曇華處處開狹路難回避如是展家風曾不離世諦且如何是物外相看底句年年燒此一爐香白雲不在青山外石屋珙禪師及庵和尚忌日拈香有來由沒巴鼻建陽山西峯寺蒲團頭拾得底無眼無耳無頭無尾道是一塊兜樓嗅著又無香氣家醜不可外揚明人不作暗事及庵和尚忌拈香沒興相逢處西峯與建陽不平多少事盡在一爐香愚庵及禪師寂照忌拈香今朝八月初四日一句明明道不得合國人追不再來千古萬古空相憶徑塢雲深西湖水碧爇蒼松古柏作栴檀牛首之香擷蘊藻蘋蘩為酥酪醍醐之食聊旌遠諱斯臨倍覺感懷疇昔非關義重恩深口貴眼橫鼻直一度秋風一度愁地久天長有何極寂照忌拈香巴陵酬雲門之恩只憑三轉語儉生不孝楊岐為慈明設齊特作女人拜義出豐年徑山今日先師忌辰直是無可施設茗碗薰爐聊伸供養庶表不忘諸人且道不忘箇什麼便燒香無文璨禪師笑翁和尚忌併供養無準癡絶和尚以香指云玷辱無用是者老漢落賺薦福是者老漢諸人若也不信問取徑山兩翁看南石琇禪師熙怡和尚忌拈香碁盤石斫破腦門黑竹篦掀翻途轍殃及天下師僧何止楚淮閩浙恁麼傳持臨濟宗炎炎六月飄霜雪熙怡和尚忌拈香巴陵下三轉語苦瓜不堪待客楊岐作女人拜家醜何須外揚徑山者裏總不與麼爐香碗茗雖清淡也勝蒿湯備禮儀了庵欲禪師保寧和尚忌拈香出黃泉又入黃泉穴鼻無繩不受牽倒轉一枝無孔笛蘆花明月滿前川你諸人還知我老和尚落處麼卷四大海水於舌端不見涓滴置微塵剎土於毛孔囊括大千總謂其嫌白雲之語拙愛五祖之說禪夫豈善用黑豆之活法契鷲峯之正傳以香扣爐云相席打令飲水思源盤山會裏翻筋斗到此誰知普化顛天隱修禪師幻有和尚忌拈香大明國裏者老漢兒孫滿地盡道今日是忌日設供山僧則不然正是老漢大解脫底時節諸人還知落處麼若知得落處也許你門拈一分香便禮拜密雲悟禪師幻有和尚忌拈香當時巴陵為雲門大師設忌有三轉語高峰為雪巖和尚設忌只有一句悟上座今日為幻有和尚設忌一句也無何以舉起香云者是一句耶是三句耶插香云逢人切莫錯舉弘覺忞禪師密老和尚忌辰拈香去秋燭翦邗溝月今歲茶烹老范泉太白峰高常在望歸真誰道十三年大衆還信得及麼若信不及時𩖼𩖼栴檀爐內爇披襟試驗髑髏前箬庵問禪師磬山和尚忌拈香師指真云若不是問上座洎被者老漢埋沒一生今日却要向人天衆前拈一分香薰灼者老和尚鼻孔何故父為子隱即得子為父隱即不得牧雲門禪師天童和尚忌插香展具云昨夜上單時一陳肚裏痛思量老和尚十年不侍奉心有戚戚焉合眼不成夢尋常雖禮拜將輕曾博重新更住鶴林却又無些供只聽五更頭大雨風聲送點滴在階前濕處全無空山雞再四啼堂牖何空洞上了一杯茶看看眉毛動生平拄杖子羅龍還打鳳只今依舊在身傍冷地知他用不用三聲鼓了整伽黎頂禮而參煩大衆嗣法師忌日提綱五祖演禪師白雲忌上堂去年正當恁麼時多前年三件事今年正當恁麼時多去年七件事者十件事數不過者甚多何也去却七三存一事是去年說是今日急如箭黑似漆無言童子口吧吧無足仙人劈胸躍乃云交下座佛鑒勤禪師五祖周祥上堂去年今日時紅爐片雪飛今日去年時曹娥讀夜末後一句子佛眼莫能窺白蓮峰頂上紅日繞須彌鳥珊瑚樹鯨吞離水犀太平家業在千古襲楊岐龍門遠禪師東山和尚忌上堂先師當年末後句與人皮下挑出刺譬如六月日中氷銷鎔處處皆相似後來聽響各流傳更加一二與三四箇中孰是無耳人明見去來不生死先師老和尚某奉侍日久多蒙苦口提撕追遠之誠何可忘也聊設小供諸人且道先師還來也無若道來入滅十餘年如何見得來的道理若道不來又用設齊作甚麼道來也有誵訛道不來也有誵訛若為得無誵訛去還知得麼三箇渾崙鐵餕餡一雙無縫木饅頭久立五祖忌上堂趙州不見南泉山僧不識五祖甜瓜徹蒂自甜苦瓠連根自苦夢庵信禪師勝因戲魚靜和尚忌上堂斯辰七月四老人圓寂日升座繼餘風特此酬慈訓大法不流通巨恩若為報全提知有據豈敢惜眉毛今對大衆前未免揚家醜竪起拂子云還會麼當時若謂無分付如今拈出又何來乃擊禪床一擊下座慧通旦禪師佛性和尚忌上堂三腳驢子弄蹄行步步相隨不相到樹頭驚起雙雙魚拈來一老一不老為憐松竹引清風其奈出門便是草因喚檀郎識得渠大機大用都推倒燒香勘證見根源糞掃堆頭拾得寶叢林浩浩謾商量勸君莫謗先師好密庵傑禪師應庵和尚忌上堂劇劍軿虗空萬象鳴嚗嚗年年向斯辰令人倍發惡言者道子不談父德雖然家醜也要外揚者老和尚平生事過頭底九百自云著草鞋住院何苦如蚖蛇戀窟美則美矣帶纍不肖兒孫依模脫出贊歎者從他贊上非非想天毀謗者謗到空輪水際衆中莫有毀譽不動底麼出來與華藏相見有麼有麼良久擲下拄杖高聲云侍者收取拄杖嗣法師翁忌拈香法語愚庵及禪師圓悟大慧祖師同忌拈香隻手不獨拍單絲不成線兩箇五百文鬬凑合一貫雞啼白晝認頻呼小玉總墮聲塵薰風南來證諸條法身何曾夢見橫說竪說熾然說卷百億香水海於廣長舌本波瀾內空外空畢竟空攝有漏微塵國於事事無礙法界臭皮襪炙地薰天折竹篦鍧雷掣電擉瞎臨濟正法眼摵碎東山鐵餕餡陵滅宗風忤逆孫終不隨他腳跟轉香爇一爐茶傾三奠盞子撲落地碟子成七片玉林琇禪師幻有師翁忌日設供師指真云兀坐嘴盧都教人沒奈何箇老漢慣得其便者裏透得過的如龍得水似虎靠山有意氣時添意氣不風流處也風流而今大明國裏稱為師翁後裔者不啻百千萬億究竟得大機顯大用堪為嫡骨兒孫者能有幾人某上座初閲龍池語録見師翁云世間多少不平之輩務要別尋一箇人與我老釋迦比勝負較優劣還知我釋迦如來是何等一箇面目麼某上座便於此喪身失命將謂師翁面目只如是後來呈似先師和尚受他許多惡辣鉗錘方知見與翁齊減翁半德見過於翁方堪嗣續從此腳跟下自解作活計雖與師翁同條生不與師翁同條死師翁善為隱語云人還知我釋迦如來是何等一箇面目令某小瞎禿最初祇見師翁殺人刀未見師翁活人劍今日某上座不妨顯示令見者聞者知我祖師門下亦有殺人刀亦有活人劍顧視左右云若有問如何是我師翁真面目拈香云急著眼嗣法師翁忌提綱龍門遠禪師端師翁忌辰上堂昔人已乘白雲去此地空餘緑水流緑水一去不復返白雲千載空悠悠湖南舊說老楊岐失却金毛獅子兒江南江北無覓處龍門今日順風吹順風吹囉囉哩水急風高下釣磯大慧杲禪師五祖師翁忌上堂山前一片閒田地元來記得在叉手叮嚀問祖翁只為契券不分明幾度賣來還自買難為牙保人為憐松竹引清風喝一喝云乞兒見小利掃歷代祖塔拈香法語五祖演禪師入院五祖祖塔燒香以手指云當時與麼全身去今日重來記得無復云以何為驗以此為驗遂禮拜天目禮禪師到靈隱松源和尚塔頭拈香云破沙盆提不起眼瞎耳聾門風委地昔年撞到東湖褫剝家私到底後來各自西東我又誰能管你一瓣兜樓拜塔前畢竟無人是嫡傳山茨際禪師掃旵祖塔拈香師云者老漢二百年來在此藏身人天罔知佛祖難近今日腳下兒孫到來親遭看破且道以何為驗顧左右插香弘覺忞禪師掃笑巖祖塔拈香黃金骨瑣玉玲瓏鐵棘門栽不計重佛眼難窺吾祖意兒孫若敢妄流通拈香云即此用離此用蟭螟眼裏繡鴛鴦烈焰爐中飛彩鳳便燒掃歷代祖塔塔主請提綱密雲悟禪師到玄墓掃萬峰寶藏二祖塔請上堂今日不肖兒孫高升遠祖之堂不必更說偈言覿面為衆舉揚急著眼莫思量逴得便行真漢子人間天上本無雙卓拄杖下座箬庵問禪師到龍池掃祖塔萬如和尚請上堂師云昔年未見師翁面問上座却被師翁絆入葛藤窠裏沒頭沒腦及乎親見師翁一回師翁却被問上座絆入葛藤窠裏沒頭沒腦者段公案正要向明眼人前判斷今日既親到師翁法窟承堂頭法兄和尚為衆推出登師翁堂踞師翁座問上座豈敢掩耳偷鈴請諸仁者不吝慈悲為問上座判斷看若判斷得諸仁者合喫問上座手中三十棒若判斷不得問上座合喫我堂頭法兄和尚手中三十棒者兩頓棒有一棒堪與佛祖為師有一棒堪與人天為師若也不甘自救不了卓拄杖下座掃鶴林玄素禪師塔請上堂會即不會疑即不疑兩重公案土上加泥佛來也不著耆陀施妙藥無你棲泊處切忌隨流去牛頭橫出一枝箇是確然本據問上座於往昔劫中不知與者老宿有甚交涉登臨披歷遂感初心今日到來且道以何為驗卓拄杖復舉當山法嗣徑山國一欽禪師因馬祖令僧馳書到開緘一見圓相乃於圓相中著一點却封回忠國師聞云欽師猶被馬師惑後來雪竇明覺云徑山被惑且置若將呈似國師別作箇甚麼伎倆免被惑去有般道當時坐却便休亦有云但與畫破若與麼祇是不識羞敢謂天下老師各具金剛眼睛廣作神通變化還免得麼雪竇見處也要諸人共知祇者馬師當時畫出早是自惑了也師云馬駒踏殺天下人總出他圈繢未得雪竇自謂出一頭地因甚也掩耳偷鈴山僧今日因行掉臂略展風規不妨八字打開與諸人相見還知麼藕穿池面為荷葉笋過東家作竹林徑山盛禪師掃雲棲蓮大師塔塔主率衆護法請上堂師以如意畫圓相云會麼向上一路千聖不傳末後牢關直須親到達磨大師親稟不立文字教外別傳直指人心見性成佛之旨特特來我東土初遇梁武帝不契即渡江於少林面壁此時震旦義學相高多滯名相間有學者扣達祖宗旨皆是斥相指心中有不能領略者輒生嫉害乃至六遭服毒末遇神光斷臂于安心歸位之後始付其衣鉢并授楞伽經以為印心嗣是東土一花五葉遍燦寰區皆是親悟親證始得使此真宗不墜也或謂達祖既以不立文字直指人心何復以楞伽為印乎此正明一切佛語皆以心為宗旨不特楞伽是離文字法如能親悟心印則三藏十二部一切修多羅皆是離文字為宗旨也達祖斥相指心正以彼時教家執著名相不見心宗斥者斥其執相也非斥彼不當開闡教義也如能悟此心宗又何經律論觀淨諸教非直指之妙心哉不見我雲棲先大師最初發心即以生死大事而起疑情剃染之後即遍參諸方尊宿嘗于京師謁笑巖和尚求指示笑巖曰阿你三千里外來開示我我有甚麼開示你時大師言下有省因過東昌聞譙樓鼓聲乃悟其旨作偈曰二十年前事可疑三千里外遇何奇焚香擲戟渾如夢魔佛空爭是與非此後見法門師承大壞參學無真乃大權設教開戒律闡教乘標淨土而歸于心宗世人不知大師悟證之繇以大師乃教中圓人何必揑歸禪宗以亂其統又孰知大師乃先悟禪宗而後開諸教海收攝羣機而歸正覺也世間開戒闡教標淨者甚多未必皆悟道之後設施也獨太師於悟心之後弘法是以說戒戒即金剛戒性也設教教即妙明真心也立論論即直剖宗旨也標淨淨即全提佛心也挽近主法之人孰能如大師真參實悟而後舉揚宗旨振作玄機密用哉今之參學曾起二十年前可疑之事乎曾有於三千里外一聞譙鼓而不疑乎大疑大悟小疑小悟不疑不悟如今人疑也未疑安得有遇而且悟此奇特乎昔雲門湛和尚或問中嘗載大師宗門機用甚悉如拈外道問佛空生宴坐公案云若於良久處欲望開迷陰霾萬里宴坐邊擬聞般若說竟多時既然如是鞭頭得指空裏飛花者是箇甚麼參又拈自性西方惟心淨土云若直指自性不但過此娑婆十萬億國土為非也設箇自性已涉程途若實談惟心不但寶蓮金地種種莊嚴為非也說箇惟心早成垢穢你看大師如此起疑如此參悟如此拈提宗門向上機緣如此指示惟心淨土此豈與未悟心宗而代佛揚化敷文演義者所可比擬哉此正大師會通佛祖無門為法門宗旨使戒律經教論議止觀淨業皆歸禪宗不立文字教外別傳之旨庶使諸家義學不墮名相不昧佛語以明心宗為千聖不傳之密旨也此豈我後人強欲差排贊美大師而扭揑入禪宗者哉此蓋吾大師深念如來一代時教為後世分門別戶互相矛盾之弊故于悟心之後密移一步始能會通佛語諸教而歸于無門法門之心宗也不然達祖只須傳心不必以教為印也今日大師傳教而特會歸心宗真千古同心別傳無二也子小豫舌短何足以舉揚萬一但稟承大師法蔭今敬入山掃拜靈塔幸諸大護法及闔山耆舊尊宿命登此座辭不獲免強為贅疣誠慚愧無地罪過多端也還知此一舉揚底意旨麼親到須彌莫問山既遊大海休誇水下座祖塔塔主請提綱牧雲門禪師天童山掃塔請上堂太白峰頭千差坐斷清關橋下一脉常流雖為列祖道場固是先師重扶家業山僧昔預此會法乳親嘗今日重來墓木拱矣可勝悽愴雖然須知恁麼中不恁麼砂盆未破堂搆依然幸我堂頭法兄寅夕不倦流慈於此方廣座上劈開面門放出先師形相與諸人描邈直得鉢盂峰點頭玲瓏巖起舞正恁麼時敲唱雙行主賓互換且如何道得恰好底句良久云妙舞會須誇遍拍三臺須是大家催古雪哲禪師掃馬大師塔上堂甎鏡臺前打失娘生鼻孔滕王閣畔宏開選佛壇場踏殺天下英靈喚回空中野鴨掀翻窠堀截斷葛藤明大用顯大機電光石火較猶遲藏頭白海頭黑鐵眼銅睛皆罔測燈傳三十二葉道播四海九州腳下不肖兒孫昔日親遭毒手源遠流長則且置到者裡作麼生與祖師相見喝一喝云無縫塔中藏不得森羅景裏見全身受業師忌拈香箬庵問禪師先受業法雨大師忌拈香過橋遭攧糞掃堆拾得明珠擦背光生浴室裏捱開漆桶雖則父子同時簡點起來翻成分外爭似我法雨老人一生擔板坐斷諸佛路頭塊石孤松高拳獨枕若是今日是死掘地討天若道今日不死開眼作夢畢竟如何作女人拜云茶傾洞頂香爇雞蘇父忌提綱玉林琇禪師振陵太老師忌日上堂山僧昔日芟染蒙先磬山老和尚執刀三剃口占有云一子出家九族升天若不升天佛有妄言山僧出家來業已多載且道先師今日何在識得落處的出衆相見衆問話畢師乃云沙界通紅一團火箇中毫髮不容存森嚴明淨先翁面普示人間子若孫母忌提綱與化清禪師母忌上堂祖師門下佛法不存善法堂前仁義休說雖然如是事無一向竊聞哀哀父母生我劬勞欲報深恩昊天罔極髮膚身體弗敢毀傷此魯仲尼之孝也輪轉三界中恩愛不能捨棄恩入無為真實報恩者故我大覺世尊雪山苦行摩竭成道往忉利天為母說法此釋迦之孝也得大解脫運大神通手擎金錫掌拓龍盂詣地獄門卓然尋省見其慈母悲泣無量此目連之孝也作麼生是興化之孝良久曰興化今日不上天堂不入地獄於善法堂中燈王座上為母說法以報劬勞且道我母即今在甚麼處乃曰我母生前足善緣無勞問佛定生天人間上壽古今少九十春秋減一年下座敢煩大衆燒一炷香以助山僧報孝既是山僧之母為甚麼却煩諸人燒香不見道東家人死西家人助哀以手捶胸曰蒼天蒼天
