body:
  text: 武林十八澗理安禪寺住持婁東行悅集結制提綱節臘琅琊覺禪師結夏上堂汝等諸人在者裏過夏與你點出五般病一不得向萬里無寸草處去二不得孤峰獨宿三不得張弓架箭四不得物外安身五不得滯於生殺何故一處有滯自救難為五處若通方名導師汝等諸人若到諸方遇明眼作者與我通箇消息貴得祖風不墜若是常徒即便寢息何故踝形國裏誇服飾想君太煞不知時雲居祐禪師結夏示衆無相光中有一無位真人出沒三界流轉五道不捨十惡業不墮五陰身不除煩惱障不證涅槃不憎毀禁不敬持戒不經冬不過夏汝等諸人還知去處麼良久云九旬陽焰裏五分法身圓白雲端禪師結夏云安居之首禁足為名禁足之意意在進道而護生衲僧家有何生而可護何道而可進唾一唾唾破釋迦老子面門行一步踏斷釋迦老子脊骨猶是隨行逐隊漢未是本分衲僧如何是本分衲僧無限風流慵賣弄免教人指好郎君真淨文禪師洞山結夏上堂十方聚會三月一結息狂妄心除苦惱熱獲勝清涼證大寂滅到波羅岸出生死轍以此聖制故不虗設聲聞緣覺不見不聞三世諸佛祇可自知衲僧跳不出打在綣繢裏動即開眼尿床夢中説夢且向洞山門下九十日討箇活路上堂茲日夏首衆僧結制之晨泐潭山比丘克文與清淨大衆踞菩薩乘修寂滅行以大圓覺為我伽藍身心安居平等本際涅槃自性無繫屬故今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故離諸垢染清淨梵行若能如是所謂如蓮華不著水心清淨超於彼五祖演禪師四面結夏上堂云結夏無可供養大衆作一家宴管顧諸人遂擡手云囉邏招囉邏搖囉邏送莫怪空疏伏惟珍重海會結夏上堂此夏居白雲禪人偶聚會三月九旬中尊卑相倚賴粥飯與茶湯精粗隨分耐逐意習經書任運行三昧彼此出家兒放教肚皮大結夏上堂孟夏漸熱伏惟首座大衆尊候萬福却似夾竹桃花錦上鋪花遍地花莫眼花每年事例不用張查下座人事巡寮喫茶圓悟勤禪師結夏上堂高超十地不歷僧祇物我一如身心平等不與萬法為侶不與千聖同途歷歷常光現前處處壁立萬仞直饒透出威音已前猶是者邊事在及乎理隨事變應物應機或現十種他受用身或現三尺一丈六有時孤峰頂上目視雲霄有時淺草平田橫三竪四亦只是者邊事只如不動步而廓周沙界不起念而周遍十虗底人且道九旬三月還結夏也無雲在嶺頭間不徹水流澗下太忙生結夏上堂一塵含法界無邊子細檢點猶有空缺處在百億毛頭獅子百億毛頭一時現著實論量未是極則之談若論本分事大人具大見大智得大用設使盡無邊香水海越不可説不可説世界都盧是自己安居處舉一念超越無邊剎海猶未是衲僧行履處不犯鋒鋩不拘得失不落二見不在中間正當恁麼時如何山中九十日雲外幾千年結夏請上堂豁開戶牖當軒者誰無面目可見遍界不藏無形相可覩全機獨用以無面目而諸相歷然以無形相而十身具足解脫門廣啓選佛場宏開作不可思議功勳成無量殊勝奇特直得一為無量無量為一小中現大大中現小坐微塵裏轉大法輪猶未是衲僧本分事於中若得桶底子脫五色線斷目前無法心外無機則圓融一切無有所為成就諸法全體顯現且正當恁麼時不落功勛一句作麼生道三尺龍泉光照膽萬人叢裏奪高標雲居結夏上堂眼聲耳色不思議百草顛頭受用時表裏洞然無一事端能保護蠟人兒好日多同遇緣即宗法隨法行法幢隨處建立有世界以光明為佛事有世界以音聲為佛事有世界以香飯為佛事有世界以莊嚴為佛事有世界以寂默為佛事且道雲居以何為佛事不惜眉毛為諸人拈出行住坐臥動轉施為萬象森羅包含內外無一法不周無一事不圓到者裏著著盡是佛事則且置佛在什麼處委悉麼高高峰頂無消息深深海底沒蹤由復云九十光陰一撮子半千人在毫端中各各包含大千界全承渠力得雍容沒築磕絶行蹤萬里雖然無寸草德雲不下妙高峰結制上堂二千年前佛制諸方遵行為例九旬之內安間共作鬼家活計且是如何鬼家活計猢猻入布袋復云九旬結袋口安居解脫道水乳自和同萬緣無所撓栗棘蓬快吞金剛圈猛跳共透衲僧家頂𩕳上一竅龍門遠禪師結夏上堂揮戈佛日不西流照徹人間洞九幽從此安居無一事休將玄妙挂心頭結夏上堂龍門結夏勝諸方大地山河為舉揚若向九旬參得透更無佛法可商量結夏上堂龍門門下無凡客不假風雷自有奇三月進修從此始經行宴坐可思議三月安居九旬禁足稟如來之教旨乃釋子之清規橋彴津梁人間天上或垂手入鄽者未嘗離於此座觀心入定者亦常遊乎十方此豈可以有心知豈可以無心會苟能如是何生而不護何足而不禁覆被萬靈廣益群品或不由斯道者吾末如之何也下座虎丘隆禪師結制朱明啓候九夏初臨四海高人罷搖金錫心猿頓歇意馬休征戒潔滄海之珠性朗碧天之月纖塵莫染帝網交光離相絶名真機獨露正當恁麼時安居一句作麼生道誰知鷲嶺當年事一念回光尚宛然大慧杲禪師徑山結夏上堂此日諸方叢林莫不踞菩薩乘修寂滅行以大圓覺為我伽藍身心安居平等性智徑山又且不然從今日去九十日內與諸衲子共喫無米飯咬優曇根飲不濕水説睡夢語且道恁麼修行與諸方結制相去多少良久云將此深心奉塵剎是則名為報佛恩下座結夏上堂一年一度解一年一度結只是者箇事何須更多説不多説踏著稱錘硬似鐵雲門庵結夏示衆有句無句如藤倚樹孟八郎漢便恁麼去機不到語不副眼裏著得百千萬億須彌山耳裏著得無量無邊香水海機副語語投機眼裏著沙不得耳裏著水不得有般漢聞恁麼道便道見月休觀指歸家罷問程不知垂萬里鈎駐千里烏騅布漫天網打衝浪鯤鯨若是蝦蟆蚯蚓跛鱉盲龜徒勞上釣徒勞入網須是恁麼人方知恁麼事所以道殺人自有殺人刀活人自有活人劍有殺人刀無活人劍一切死人活不得有活人劍無殺人刀一切活人死不得死得活人活得死人便能刮龜毛於鐵牛背上截兔角於石女腰邊不作奇特商量不作玄妙解會何須九旬禁足三月護生謹守蠟人無繩自縛須知盡十方遍法界無有如針鋒許不是各各當人安居之處便恁麼去更有事在敢問諸人只如不死不活底人出來且作麼生殺作麼生活若殺不得活不得佛法無靈驗直饒殺得活得也未是作家於衲僧分上了無交涉且道衲僧有什麼長處良久云雖有一雙窮相手未曾低揖等間人喝一喝結夏示衆今日是衆僧結制之辰雲門庵比丘宗杲與赤肉團上無位真人現前清淨大衆以法界為伽藍同諸菩薩九十日內安居其中跳金剛圈吞栗棘蓬作夢中佛事降鏡裏魔軍三業清淨六根明潔身四威儀無諸過患懸契如來一百四十大願紹三寶種永不斷絶苟能如是修證如是安居是大丈夫漢是真出家兒不須謹守蠟人如鵝護雪其或未然趙州東壁挂葫蘆莫道不疑好拍禪床下座應庵華禪師結夏上堂橫按拄杖云住山僧某甲據菩薩乘修寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智老僧二千年前與十二大士同在光明藏中親聞如來金口叮嚀付囑向二千年後為末世衆生廣演斯要今正是時報恩不敢囊藏被蓋更為諸人八字打開去也以拄杖卓一下云先請文殊大士向山僧拄杖頭上為諸人説安居偈護生須是殺殺盡始安居要會箇中意鐵船水上浮次當山僧重説偈言去也文殊據虎頭山僧收虎尾中間諸菩薩隨例生歡喜復以拄杖卓一卓下座或庵體禪師結夏上堂十方聚會九夏同居柔和作衣法空為座隨處建立觸事而真容衆尊賢共成保社不逞摧邪顯正誰分舊住新歸飋飋松風寶蓮閣超今邁古寥寥江月朝宗亭激濁揚清明明古佛生涯一一道人活計祇如不虧實相賓主歷然一句作麼生道妙舞不須誇遍拍三臺須是大家催密庵傑禪師結夏上堂十四十五立規立矩十六十七無固無必以大圓覺為我伽藍身心安居平等性智黃面老子二千年前留一則公案直至於今毫髮不差靈隱移向十四日施展諸人還見麼還聞麼驀拈拄杖卓一卓云只此見聞非見聞無餘聲色可呈君箇中若了元無事體用何妨分不分喝一喝下座結夏上堂二千年前舊公案今日拈來重剖判任是鐵眼與銅睛也須更入紅爐煅衆中忽有箇不受人瞞底出來道盡大地是箇紅爐也煅某甲不破只向他道也知你向鬼窟裏作活計元叟端禪師結夏上堂二千二百五十年前光明藏中金口親曾付囑二千二百五十年後比丘行端其當顯示護生須是殺殺盡始安居會得箇中意鐵船水上浮結夏上堂中峰門下千歲巖前囊無繫蟻之絲廚乏聚蠅之糝茲者時當首夏憑何揭示玄徒説性説心行棒行喝是弄猢猻家具向上向下亦有亦無是諸方煎過藥滓三世諸佛與你豈殊六代祖師與你何別百千劫內謾自馳求十二時中何曾欠少變現普周法界收攝在一微塵寒暑固難變遷生死豈能拘綴但辦肯心必不相賺結夏示衆世道不古人根益微背本趨末甚多遡流窮源極少但言即心即佛不知心佛旨歸惟云藉教明宗不省教中玄要爭鋒唇吻懷寶𮌎襟拾瓦礫以當黃金指螢火而為陽燧甘馳求而靡怠竟劬瘁以何成輪回六道之中盤繞四生之內深所畏者良可憫焉三月安居由茲開創十方聚會從此進修若也外息諸緣自然內心無喘塵塵虗明湛寂處處廓徹靈通煩惱即是菩提障礙皆名解脫結夏上堂諸方禁足我者裏是事不足諸方護生我者裏逐旋營生諸方也怪中竺不得中竺也怪諸方不得結夏上堂十五日以前水長船高十五日已後泥多佛大正當十五日狸奴白牯情與無情身心安居平等性智復説偈云臘人還只爾鐵彈復何如夜短睡不足日長飢有餘楚石琦禪師結夏上堂今日結也憍陳如尊者領衆歸堂鉢盂口向天露柱腳踏地一要掃刮床帳防備蚊蟲二要曬朗蒲團免教搭濕三要熱時揮扇困時打眠切不得將禪道佛法貼在額尖上靈龜負圖自取喪身之兆九十日內作麼生薰風自南來殿閣生微涼復舉雲蓋安和尚問石霜萬戶俱閉即不問萬戶俱開時如何霜云堂中事作麼生安云無人接得渠霜云道也太煞道只道得八成安云却請和尚道霜云無人識得渠師云或有人問永祚萬戶俱開時如何向他道且喜到來你道與古人是同是別結夏上堂汝諸人見壽山搖唇鼓舌便擬聚頭鵮向意根下摶量及乎放出金剛圈揚下栗棘蓬十箇五雙吞跳不得此無他從前在髑髏裏妄想慣了又閨閣暖軟物未除卒遇惡辣鉗鎚便生退屈明明向你道此事不在言語上千經萬論可是無言語還使得偷心也無端的要死偷心不用九十日內參取結夏上堂衣食養壽命一日不可無糞掃敵寒暑粗糲療形枯昨日三春今朝九夏何不色身強健時撥教生死路頭明白要去便去要住便住誰障得你誰礙得你豈不俊哉豈不快哉且道生死路頭作麼生撥空手把鉏頭步行騎水牛人從橋上過橋流水不流若不會與你下箇注腳空手把鉏頭驟馬上高樓步行騎水牛閙處冷湫湫人從橋上過飯籮頭受餓橋流水不流撥火覓浮漚時不待人復舉圓覺經云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實師云若然者道有也得道無也得向上也得向下也得得也得不得也得數片白雲籠古寺一條緑水繞青山呆庵莊禪師結夏上堂九旬禁足今朝始特地升堂為指南一念不生三際斷百千諸佛是同參同參事則不問且道百千諸佛只今向什處安身立命擊拂子手執夜明符幾箇知天曉愚庵及禪師上堂舉僧問虎丘隆禪師九旬禁足意旨如何隆云理長則就師云九夏安居就理長徑山無法可論量桑疇雨過羅紈膩麥隴風來餅餌香無用寬禪師結夏上堂諸方結制有什巴鼻太湖梁山冷氷氷地二百箇鐵額銅頭無用分作兩處提起放下吞聲飲氣擬議之間頂門著地卓拄杖一下云法王法制結夏上堂以拂子召衆云不是心不是佛不是物也不散誕也不拘束一般茆草冷滑滑又漉漉太湖西梁山粥足與飯足諸兄弟正好向者裏拗折拄杖傾心露腹免致巡門逐戶風餐水宿忽然㘞地一聲亦不必笑亦不必哭八臂那吒納命不足喝一喝下座天目禮禪師結夏上堂衆生諸佛大地山河往古來今他方此土拈拄杖云盡在拄杖頭上禁足護生獨有一大闡提人不入者保社何故黃河三千年一度清結夏上堂七尺單前一蒲團地橫亘十方竪窮三際一切諸佛衆生多才少智虎膽狼心鼠肝蟲臂盡在裏許安居結制謂之平等性智大衆還知老僧不在裏許麼參雪巖欽禪師結夏以拂子打一圓相云以大圓覺為我伽藍安居有學無學萬象森羅發明所得非得平等性智於九十日中禁盡一切衆生之足而無住相斷盡一切衆生之命而無殺相乃至藏天地於一塵融古今於一念然後一塵塵各有一天地一念念各有一古今非延非促無自無他擊拂子云清茶淡飯衲僧家復舉臨濟問洛浦從上一人行棒一人行喝阿那箇親浦云總不親濟云親處作麼生浦便喝濟便打師拈云二大老雖是啐同時要且未會轉身句在忽有人問如何是轉身句顧侍者云牢記取結夏上堂護生須是殺自傷己命殺盡始安居難逃業鏡會得箇中意鐵船水上浮莫也是虗空釘橛鉢盂安柄仰山今日不遵古規且要別行條令作麼生一切尋常只據現定結夏上堂圓覺伽藍天是天地是地平等性智山是山水是水畢竟九十日內十二時中如何踐履青絹扇子足風涼高峰妙禪師結制上堂大限九旬小限七日粗中有細細中有密密密無間纖塵不立正恁麼時銀山鐵壁進則無門退之則失如墮萬丈深坑四面懸崖荊棘切須猛烈英雄直要翻身跳出若還一念遲疑佛亦救你不得此是最上玄門普請大衆著力山僧雖則不管間非越例與諸人通箇消息結制上堂西峰今年結夏有一奇特事不得不告報諸人且道是什奇特事龍蛇混雜凡聖同居結制上堂西峰今年結夏全然不成保社一日兩頓薄粥大家忍飢無暇雖有真如佛性菩提涅槃和聲擲拄杖云權且揚在獅子巖下結制上堂封却拄杖頭結却布袋頭大家團圞頭赤眼火柴頭嗄正是冤家共聚頭不妨頭上更安頭以拄杖打散結制上堂今年龍象頗多權作三堂結夏雖然名字不同是法本無高下中間有箇肉身菩薩現與諸人同結同修同眠同坐若也檢點得出説甚黃面瞿曇西來達磨不然且待七月十五却與諸人説破千巖長禪師結夏上堂諸方今日結夏千巖今日結舌良久云是同是別以手摑口云又成多説下座天如則禪師結夏示衆今晨四月十五諸方浩浩談禪不是結却布袋便是同泛鐵船者裏隨緣度日誰能掘地覓天飢來喫飯困來打眠只有一事不得向諸人道閻羅老子要算飯錢結夏示衆護生須是殺罪犯彌天殺盡始安居狼藉不少惟有生苕帚功不浪施掃斷葛藤露布任諸人坐臥縱橫十二箇時辰使教顛倒走與麼則尅期取證有何消息薰風自南來殿閣生微涼唯庵然禪師結夏上堂九十日包三大劫諸人直要徹根源會須撥轉當頭柁覺海乘風駕鐵船驀拈拄杖云柁根在者裏船在什麼處喝一喝結制上堂一二三四五六七金剛揑出稱錘汁七六五四三二一扶桑枝上懸紅日鷺鸞牽動鐵崑崙挨得虗空半邊側碧眼黃頭膽喪魂驚走入大圓覺海藏蹤遁迹浸爛鼻孔要且黈氣不得箇事且止只如諸人日用二六時中畢竟作麼生履踐良久云不因樵子徑爭到葛洪家結制上堂蠟人為驗始於今日九十日終推功辨的黃面瞿曇結住布袋頭百萬人天咸皆受屈松隱結制總不恁麼以手作搖櫓勢云山僧即今駕無底鐵船普請大衆同入大圓覺海遊戲去也喝一喝云看取定南針無文璨禪師結夏上堂百不知百不會飽喫飯熟打睡要得尅期取證須證如是三昧北澗簡禪師結夏上堂以大圓覺為我伽藍身心安居平等性智喫官酒臥官街當處死當處埋本來無位次何用強安排虗舟度禪師結夏上堂舉雲門和尚示衆云汝等諸人在此過夏山僧深不欲向你道惜取眉毛好師云雲門靈龜曳尾拂迹迹生靈隱即不然汝等諸人在此過夏山僧直截向你説口是禍門月江印禪師結制上堂雪峰領衆到浮江自失一隻眼西院留天平商量兩錯不惜幾莖眉雲峰有年無德也不留人過夏商量兩錯生風起草也不領徒諸方寄夏帶水拖泥也不探龍宮踏翻巨海也不入虎穴踢倒須彌只是飲水定渴喫飯療飢禪客相逢只彈指此心能有幾人知結制上堂麻三斤乾屎橛蠟人氷鵝護雪貓有歃血之功虎有起尸之德趙州親見老南泉臨濟未是白拈賊結夏琅琊點出五病西院商量兩錯井蛙不足以語東海夏蟲不可以語氷霜若是捎空俊鶻便合乘時止濼囦魚徒勞激浪是故從上若佛若祖天下老和尚莫不向刀山劍樹上鑊湯爐炭中成等正覺拔濟有情若約山僧看來也是稱鎚蘸醋喝一喝劍門分禪師懶庵和尚出隊領衆至結夏師升座壺山劍門今夏有煩釋迦彌勒為侍者文殊普賢為監廚觀音勢至作勸首衆阿羅漢為簥夫分司列局有規矩發機須是千鈞弩一一要須親透過斯晨結夏仲冬嚴寒胡言漢語若透不過舉足下步生生死死枉受輪回有不可説不可説之苦是則是也山僧有救苦安樂法門接待汝妙用縱橫絶無纖慮要知麼今朝四月十五日升座罷侍者請勸首引諸施主就西禪老師座前燒香大家喫茶去晦機熙禪師結制上堂以手作結布袋勢云南山今日結布袋口了也汝等諸人各各於中身心安居平等性智忽有箇衝開碧落撞倒須彌底莫道結子不堅密良久云漫天網子百千重癡絶沖禪師結夏上堂圓覺伽藍塵塵有路坐斷去來頓空今古那裏十三者邊十五後先不差毫髮許可笑黃面瞿曇至今不知落處虗堂愚禪師結夏上堂有一人日銷萬兩黃金同此聖制只是無人認得若有人認得許伊日銷萬兩黃金伊庵權禪師上堂今朝結却布袋口明眼衲僧莫亂走心行滅處解翻身噴喋也成獅子吼旃檀林任馳驟剔起眉毛頂上生剜肉成瘡露家醜默堂悟禪師結夏上堂最初一步十方世界現全身末後一言一微塵中深鎖斷有時提起如倚天長劍光耀乾坤有時放下似紅爐點雪虗含萬象得到恁麼田地天魔外道拱手歸降三世諸佛一時稽首便可以大圓覺為我伽藍於一毛端現寶王剎如是則朝往西天暮歸東土亦是禁足百花叢裏坐淫坊酒肆行亦是禁足雖然如是不曾動著者裏一步恁麼則九旬無虗棄之功百劫有今時之用堪報不報之恩以助無為之化此即是涅槃妙心金剛王寶劍敢問大衆作麼生得到者田地去如人上山各自努力石屋珙禪師結制上堂今朝四月十五日行腳師僧念頭息草鞋乾曬待秋風金錫罷遊留靠壁鸕偏愛守空池鳳凰豈肯棲荊棘平生肝膽向人傾相識猶如不相識結制上堂福源今日結制不得不為諸人議定第一從朝至暮舉足下足不得踏著常住地若踏著常住地定犯著波羅夷罪第二十二時中不得向鼻孔裏出氣若向鼻孔裏出氣定犯著波羅夷罪第三件事且莫説且莫説留在七月十五也未遲甕裏何曾走却鱉結制上堂四月十五日已前夜短睡不足四月十五日已後日長飢有餘正當四月十五日福源寺裏禪和子粥亦足飯亦足睡亦足遊戲圓覺伽藍安居平等性智敢問諸人因甚得到者般田地薰風入戶自生涼湖水到門非有意恕中慍禪師結夏上堂雲門云今月十五入夏也寒山子作麼生靈巖道今月十五入夏也黑漆桶作麼生旃檀叢林旃檀圍繞獅子叢林獅子圍繞衲僧鼻孔大頭垂金剛腦後三斤鐵了庵欲禪師結夏上堂本覺今朝結夏為汝約法三章一者日裏一餐二者夜間一寢三者山門頭佛殿裏東行西行不得踏破常住磚卓拄杖下座結制上堂一大藏教束之高閣長期短期無繩自縛莫更紛紛紜紜直須灑灑落落楊岐一頭驢只有三隻腳潘閬倒騎歸跌殺黃番綽五味拈來饡稱錘別有香風滿寥廓喝復舉道吾和尚云高不在絶頂富不在福嚴樂不在天堂苦不在地獄相識滿天下知心能幾人大慧和尚云高在絶頂富在福嚴樂在天堂苦在地獄誰知席帽下元是昔愁人師云二大老一人高高處觀之不足一人低低處平之有餘唱教門中足可觀光若約衲僧門下猶欠悟在本覺又作麼生但將飯向無心碗自有人提折腳鐺結夏上堂今朝四月十五隨分椎鐘擊鼓燈籠動地放光露柱掀天起舞揭開臨濟三玄抽却雲門一顧擊拂子發機須是千鈞弩傑峰愚禪師結制示衆六根不動千眼頓開一念才生萬機寢削擊碎祖師關棙掀翻大藏靈文不墮聲色二途不立有無知見當頭俱坐斷一性自間間何須更用三月安居九旬禁足晝參夜參茶裏飯裏使盡平生氣力用盡平生伎倆撑眉努目咬齒揑拳討得許多生受喫做甚麼其或未然太平元是將軍定不許將軍見太平結制示衆黃面老子二千年前立箇限局三月安居九旬禁足尅期取證戒殺護生致使諸方叢林於四月十五日結制謂之結却袋頭外不放入內不放出與麼修行驢年也未有箇出日石溪則不然四月十五結却布袋頭略通一線路從他入底自入出底自出去底自去來底自來何故畢竟水須朝海去到頭雲定覓山歸南石琇禪師結制上堂世尊掩室因沙窮則計拙東山設一家宴義出豐年北山者裏室不掩宴不設行則與諸人同行坐則與諸人同坐飢則飯困則寢自然踏著向上玄關顯示衲僧巴鼻洞山五位不用分張臨濟三玄何勞花擘正恁麼時如何是衲僧行履處拄杖且將間靠壁草鞋乾曬待秋風結制上堂以大圓覺為我伽藍身心安居平等性智開眼寐語護生須是殺殺盡始安居會得箇中意鐵船水上浮誑唬閭閻直饒總不與麼亦未是衲僧行履處且作麼生是衲僧行履處長短三期俱莫立飢來喫飯困來眠雖然切忌隨徑山舌頭轉笑隱欣禪師結夏上堂據菩薩乘修寂滅行同入清淨實相住持釋迦老子於明鏡中更加繪畫報國則不然有時三頭六臂變現大力魔王有時日面月面示應大悲千手眼三條椽下倒臥橫眠十字街頭縱橫遊戲卓拄杖云若無舉鼎拔山力千里烏騅不易騎結夏上堂舉天平依和尚行腳時參西院常云莫道會佛法覓箇舉話人也無一日西院遙見召云從依平舉頭西院云錯平行三兩步西院又云錯平近前西院云適來者兩錯是西院錯上座錯平云從依錯西院云錯平休去西院云且在者裏過夏待共上座商量者兩錯平當時便行住後謂衆云我當初行腳時被風吹到思明長老處連下兩錯更留我過夏待共我商量我不道恁麼時錯發足南方去時早知道錯了也雪竇頌云禪家流愛輕薄滿肚參來用不著堪悲堪笑天平老却謂當初悔行腳錯錯西院清風頓銷鑠復云忽有箇衲僧出云錯雪竇錯何似天平錯師云者一則公案叢林中商量者多決斷者少中峰今日為諸人斷看一人監主自盜一人賣賊放贓一人知而不肯各與三十拄杖何也速則易改久則難追雪嶠信禪師結制上堂四十年來恁麼行斬開碧落血腥腥其中果有希奇事獅子遊行不問程稽首燈王如來普願微塵國土衆生同入般若波羅密門且道般若波羅密門作麼生入舉拂子云鑑箬庵問禪師結夏示衆人皆苦炎熱我愛夏日長薰風自南來殿閣生微涼良久云大家在者裏驀拍禪床須信茫茫煙浪裏自然別有好商量結夏升座現成公案逈絶誵訛掉下腰包大事已辦佛祖説不到今日説到佛祖行不到今日行到直得德山臨濟喝似雷轟棒如雨點到者裏也只得退身三步十聖三賢罔措野狐潛無門你若錯腳踏著常住一片磚便見分身兩段何況較古較今説長道短鼓是煽非惑亂人家男女長期短限者邊那邊虗費草鞋消磨歲月閻老子面前他時打鬼骨臀且道是甚麼人承受山僧二十年前向水邊林下撞著箇無面目老漢水也不曾沾他一滴今日敢向人天衆前為者老漢出氣冤家路狹被諸上座逼定要山僧為衆結夏結夏且置你將山僧拄杖安置在什麼處莫動著動著則頭破腦裂卓拄杖云謹白結制上堂師云逼胡孫上樹畫虎成貍剝名品荔枝弄巧成拙今日三明日四枝上生枝咬破話頭裂碎鼻孔平地上坑陷人家男女直饒向未舉以前薦得猶為立地死漢諸兄弟幸不作者般蟲豸當陽直截一句作麼生道秋風秋雨寒侵骨爛葉堆雲且閉門結制上堂曲説直説塵説剎説三世一時説舌頭不出口明眼衲僧向者裏共出隻手貴圖宗風不墜師法有據若只循途守轍何祇埋沒生平九旬伊始聖制初成打頭不遇作家到底翻成骨董要不入者圈繢麼一句逈超千百億六月黃河徹底氷結制上堂一法不是有萬法不是無不説如來禪不明祖師意賓是賓主是主禮是禮樂是樂滿面春風潑畫欄梵王宮殿開深鑰坐享太平底也少伊不得提上挈下底也少伊不得其間設或半肯半不肯山僧只恁麼放過雲無心而出岫水盈科而或流遇高山而必止到大海而方休驀卓拄杖云長期短限渾間事要使人人盡徹頭結制上堂靈雲見桃花墮坑落塹香嚴聞擊竹接響乘虗現成田地一任縱橫十字荒田不揀草信手拈來是且道是箇甚麼天晴日出雨落地濕春山疊亂青春水翻空碧自是不歸歸便得見不成聞不及擬議不來還劈脊此時不直究根源更待當來問彌勒林臯豫禪師結制上堂今年結夏不尋常柴滿堆兮麥滿倉珍重五湖雲水客輕搖蒲扇足風涼喝一喝牧雲門禪師結夏上堂天童結夏草鞋高挂無內無外無高無下以大圓覺為我伽藍身心安居平等性智大衆以大圓覺為我伽藍則百億須彌百億日月百億四天下乃至華藏世界盡無邊香水海總出不得天童門限身心安居平等性智但只飢來喫飯困來打眠行但行坐但坐菩提煩惱生死涅槃智慧愚癡真如佛性當人腳跟下總不必動著正恁麼時如何黃鶯啼緑樹好聽箇中玄下座弘覺忞禪師結制上堂乃舉起拄杖云看看山僧拄杖頭上橫開寶剎畢集群宗就中請得毗盧遮那如來為堂頭和尚盧舍那如來為都監寺釋迦如來為化主文殊師利菩薩為首座彌勒菩薩為維那觀音菩薩為書記得大勢菩薩為副寺普賢菩薩為典座藥王菩薩為知藏藥上菩薩為典客無邊身菩薩為直歲寂根菩薩為知殿勇施菩薩為知浴慧上菩薩為侍者薩陀波崙菩薩為寮元地藏菩薩為堂主善財菩薩為參頭總十方三世盡空法界若凡若聖咸皆普入圓覺伽藍之內各各安居平等性智之中於是毗盧遮那如來為衆演法曰護生須是殺殺盡始安居會得箇中意鐵船水上浮文殊師利菩薩為秉拂小參曰十方同聚會箇箇學無為此是選佛場心空及第歸乃召云大衆如斯諦信得及去即今便與諸聖同參將來次補毗盧遮那如來為大和尚其或尚留觀聽稍涉遲疑則諸人自諸人拄杖子自拄杖子依舊去聖時遙正法將滅九十日內切須自著精彩好久立珍重天童奇禪師結夏上堂山僧二十年前偶一日冷地裏將三千大千世界所有衆生性命攝在一微塵裏並無一人得知所謂藏山於海藏舟於壑夜半有力者負去寐者不覺耳今日山僧普告大衆還信得及麼如信得及見得徹便好休去歇去如信不及見不徹不妨朝參暮參一朝參到無參處遂顧視左右云始知無處不家山
