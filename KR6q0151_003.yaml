body:
  text: 武林十八澗理安禪寺住持婁東行悅集國忌提綱報恩大慧杲禪師徽宗皇帝大祥上堂拈香罷乃就座云身從無相中受生猶如幻出諸形象幻人心識本來無罪福皆空無所住從上諸聖莫不皆從無所住處成就衆生於無所住處降神處胎十月於無所住處示現誕生於無所住處示現行七步於無所住處示現處王宮於無所住處示現出家於無所住處示現行苦行於無所住處示現坐菩提樹下成等正覺於無所住處示現降伏魔軍於無所住處示現坐道場轉法輪度有情於無所住處示現授諸菩薩阿耨多羅三藐三菩提記於無所住處作佛事已示現入般涅槃召大衆云從上諸聖既如是示現今日臣僧宗杲亦如是説法只將如是之法恭為徽宗聖文仁德顯孝皇帝顯肅皇后用嚴仙駕伏願不守自性普現塵中堅密身同彼上人住不思議解脫海下座天目禪師徽宗皇帝上仙上堂星辰日月佐乾穹覆冒坤維已大同十二玉樓人自去山河長在月明中笑隱欣禪師文宗皇帝聖忌滿散藏經上堂尊而無上高超象帝之先貴不可名坐斷毗盧之頂其體之大則容攝十虗其用之廣則包括萬類如月涵衆水無分淨穢之殊春在百花不見正偏之相妙有不有真空不空所以道無邊剎境自他不隔於毫端十世古今始終不離於當念擲大千於方外納須彌於芥中於斯見得便見文宗皇帝昔從佛地示現王宮撫治家乂安宗社化導已周復歸佛位寂然不動智普應於十方廓爾無私化已周於沙界臣僧與麼讚揚且道還契聖意也無良久云優鉢天香吹不斷又從兜率下閻浮復説偈云佛心覺照妙無遺包括乾坤轉化樞日應萬機常歷歷那伽大定自如如三千剎海毗盧藏百億山河帝網珠惟願不忘悲智力重開慧日照昏衢聖忌滿散藏經上堂掀翻寶藏不涉言詮頓悟經王寧拘文字所以道在聖同聖在凡同凡在天同天在人同人塵塵爾剎剎爾念念爾不動纖毫修證心一超直入如來地諸人若能如是披閲方可上承文宗皇帝神御頓轡圓覺妙場遊戲大華藏海住佛境界同佛受用或示千百億身四聖六凡群機齊赴或現三十二應河沙國土妙用全彰如是則祐我家福我黎庶功高莫報恩大難酬正與麼時且追嚴一句作麼生道良久云虗空可量風可繫無能盡説佛功德復舉梁武帝請傅大士講經士揮尺一下下座師云法筵龍象聽全提大士何煩按尺揮真俗混融猶有化君臣道合自無為風吹日炙毗盧藏鵲噪鴉鳴諸佛機三會龍華齊渴仰人間天上幾時歸聖忌滿散藏經上堂釋迦如來為一大事因緣出現於世四十九年宣揚正法化導群生至法華會上為諸弟子授記作佛始暢本懷然後入般涅槃示化儀之有終也如我文宗皇帝乘佛願輪纘皇正統靈樞密運廓清魔孽之封疆寶印全提紹繼祖宗之神器屢推義讓廣布仁慈宰輔效忠建大勳於伊呂嗣皇繼聖臻至治於唐虞八表歸仁萬樂業而奄棄臣民復歸佛位皇太后遣使頒降金帛看閲大藏經文上資聖駕佛化王化功歸一揆金輪法輪同轉道樞於一毫端現寶王剎當處圓成破一微塵出大經卷稱性演説其見色也頭頭彌勒其聞聲也處處觀音文殊於無差別智現有差別身普賢於有差別境入無差別定剎剎自然正受塵塵法爾禪那何處不成等正覺何處不轉大法輪何處非化導群生何處非入般涅槃又何福不臻何恩不報如斯提唱猶是教乘展演之談只如不落玄妙機關一句如何剖露良久云先皇功業垂無極聖子神孫億萬年復舉東印土國王請般若多羅尊者齋次王問云衆僧看經尊者緣何不看者云貧道入息不居陰界出息不涉萬緣常轉如是經百千萬億卷非但一卷兩卷師頌云是經常轉百千卷越聖超凡亘古今阿閣自便丹鳳宿澄潭豈怖臥龍吟江河淮濟同歸海叉釧瓶盤共一金縱有虗空廣長舌宣揚不盡聖恩深弘覺忞禪師毅宗烈皇帝小祥升座黃閣簾垂紫羅帳合體極尊貴未盡今時須知向上更有一人逍遙行鳥道擺手出玄途混迹類中華冠從教下却藏身炭裏寶殿一任苔生然而雖不存正位九州四海悉稟威靈雖不守大功匝地普天咸承恩力所以道有物先天地無形本寂寥能為萬象主不逐四時凋既不逐四時凋且道此人即今作麼生奉重隨緣觀自在何處不稱尊佛日嶽禪師建中靖國元年皇太后上仙被旨同六禪長老就文德殿升座乃曰最初説法者不知末後句末後説法者不知最初句最初句適來慧林禪師已為諸人説了也説則説了末後句且如何説若約三乘十二分教偏圓頓漸半滿一音不免執指為月入海算沙直似澄潭月影後夜鐘聲隨扣擊以發音逐波瀾而不散猶是生死岸頭事故乃菩提達磨觀象神州有大乘器所以泛杯千頃浪登陟萬重山首造於梁梁以果因有為之法而垂問達磨揭聖諦第一義而奉答梁主未契遂之嵩少九年面壁不立文字逈出三乘直指人心見性成佛當時神光二祖立雪斷臂得髓明心一花五葉結果自成六代傳衣後人得道自此東華方信有正法眼藏涅槃妙心中下隨根迷悟相半信知此事非大根大器不能領悟何以故見聞覺知是法法離見聞覺知便乃火聚當岐鐵山在路自然少室峰前壁立千仞曹溪路上水泄不通於其中間祖風不無凌遲頽綱亦將委地雖然如是法無定相道假時章建大法幢演大法義興此一大事因緣利樂有情不在他時須際會千佛前後知之今日幸遇大聖人出現於世廣大流布廓周沙界實千載之一遇至若堯舜禹湯端拱垂衣無為之化不為不至若乃開方便門示真實相十方嘉會四聚同延闢古佛之家風發含生之大本未可與今日同時而語何謂也釋提桓因與善現發明般若唯止真空波斯匿王為慶喜特指不遷猶存俗諦惟此教外別傳向上一著章顯當今豈非希有之緣應在震旦然溪山各異雲月是同同聲相應同氣相求方知此事無古無今無彼無此高而無上廣不可極淵而無下深不可測毛吞巨海芥納須彌在天同天在人同人在天則為日為月為照為明在人則為君為臣為忠為孝以此而推百億日月百億須彌百億四大海根身器界情與無情同一體性莫不仁者見之謂之仁智者見之謂之智百姓日用而不知其能會萬物於自己者其唯聖人乎由是燈燈續焰葉葉相承百千世月點慧燈光融三界十萬里星排祖幹涼蔭四生是知法輪再轉於支那帝日長輝於震旦始然者法無大小物無適莫皆被其光皆蒙其澤以至草木禽魚無遠不及祇如舍衛國王欲往靈山見佛敕諸臣僚山河大地草木叢林須同去見若一草一木不去吾則不得見佛大衆祇今乾坤之內宇宙之間山河大地草木叢林去亦不去來亦不來湛湛無私巍巍不動乃文乃武乃禪乃律同在九重天上慈德殿前同時見佛諸仁者見則不無且作麼生見良久云重瞳日月明無盡隆準山河秀有餘佛印清禪師皇太后上仙五七被旨演法於慈德殿登座問答罷乃曰適來淨因禪師云最初説法者不知末後句末後説法者不知最初句臣僧今當末後説法却奉為大行太后演最初句還知麼靈源湛寂物我皆如佛性情真聖凡同體彌淪千古廓徹太虗本絶去來何嘗生滅今日人天交接幽顯普臨皇風習習以和春帝日遲遲而育物萬乘正登於舜殿六禪齊仰於堯天奉為太后建此法筵指古佛心開正法眼於斯見得朱樓玉殿重重現清淨法身金闕瑤池處處露本來面目唯佛與佛同證同知伏惟珍重祈晴提綱天童朴禪師祈晴上堂久雨不晴半睡半醒可謂天地合其德日月合其明四時合其序鬼神合其吉凶遂喝曰住住內卦已成更求外象卓拄杖云適來擲得雷天大壯如今變作地火明夷雪巖欽禪師祈晴上堂久雨不晴浸爛衲僧鼻孔如何是衲僧鼻孔浮雲散盡碧天寬赫赫金盆海裏涌高峰妙禪師祈晴上堂天關久鎖不開容日夜滂沱鼓黑風以拂擊禪床一下云憤性一槌俱擊碎頂門迸出一輪紅湛堂準禪師祈晴上堂劄久雨不晴直得五老峰頭黑雲靉靆洞庭湖裏白浪滔天雲門大師忍俊不禁向佛殿裏燒香三門頭合掌禱祝呪願願黃梅石女生兒子母團圓少室無角鐵牛常甘水草喝一喝有甚交涉顧衆曰不因楊得意爭見馬相如祈雨提綱圓悟勤禪師祈雨上堂曹溪路上天高地厚少室峰前土曠人稀孤然危坐冷蕭蕭大野橫身風颯颯眼見則瞎耳聽則聾口説則啞雖然不出一毫端含吐十虗無向背既然有恁麼神通具恁麼作用為什麼乾燥燥地東海鯉魚打一棒忙忙匝地便為霖龍門遠禪師知府曾公舍人入山祈雨上堂舉劉禹端公問雲居雨從何來對云從端公問處來師云雨從何來不須尋討遍滿虗空拔濟枯稿定明妙應靈通知府舍人台造真箇是為雨為霖莫不為欣為好且問諸人是定明雨舍人雨百姓雨定當得麼良久卓拄杖一下云三下座真淨文禪師祈雨示衆云獅子不食雕殘快鷹那打臥兔放出臨濟大龍抽却雲門一顧遂拈拄杖云龍行雨至三草二木大溈泰禪師祈雨上堂火雲燒田苗泉源絶流注娑竭大龍王不知在何處以拄杖擊禪床云在者裏看看南山起雲北山下雨老僧更為震雷聲助發威光令遠布乃高聲曰鬨弄鬨弄石屋珙禪師祈雨上堂記得去年時五月火雲燒田天不雨家家插種望今年不料今年又如此偉哉公侯將相心憂民切切如憂己扣之龍神便感靈來此閻浮澍甘雨霈然不止三日霖天人群生悉歡喜敢問諸人且道承誰恩力以拂子擊禪床云蘇嚕蘇嚕㗭哩㗭哩師子端禪師祈雨上堂山澗水流如鑿開旱年祈雨為民災不知雲從何處起只見雨從頭上來無相真禪師慈溪邑侯祈雨請就龍潭示衆遮墺龍王現白龜應身何事出潭遲欲知利物及民處便好為霖濟早時衆市戶再祈雨請就龍潭示衆久旱山川若火焚神龍何忍臥淵深願興雷電重施雨以濟斯民渴望心無文璨禪師祈雨上堂一冬不雨一春不雨九土皆焦枯天高呌無路拈拄杖云開先拄杖子忽然變作空行龍王油然起雲霈然洪澍直得枯者榮甲者拆萌者吐卓拄杖一下云發機須是千鈞弩無用寬禪師祈雨上堂本自無生掣電揮星須彌倒卓雨似盆傾喝一喝下座愚庵及禪師祈雨看經上堂舉睦州看華嚴經次有僧問是甚麼經州云大光明雲青色光明雲紫色光明雲那邊是甚麼雲僧云南邊是黑雲州云今日定有雨師云睦州將錯就錯瞞者僧則易瞞普慈則難山門今日看經設有僧問是甚麼經只向道扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾豐年野老謳歌甚住處嘉禾合穗生下座恕中慍禪師祈雨上堂甘雨愆期田疇龜拆衲僧鼻孔焦熱生煙拈拄杖云拄杖化為龍向南閻浮提行雨去也山僧不可洗手奉功未免助其神力卓拄杖云急急如律令敕箬庵問禪師祈雨上堂萬里無片雲青天也須喫棒以拂子指云那邊雲生也擲拂子云一雨普滋弘覺忞禪師祈雨上堂拄杖子化為龍吞却乾坤了也山河大地甚處得來雲門老子只解瞻前不知顧後把將話頭打作兩橛殊不知山河大地即是拄杖子拄杖子元不異大地山河一切智智清淨無二無二分無別無斷故所以拄杖子有時把住山河光爍爍絶滲絶漏拄杖子有時放行大地黑漫漫倒嶽傾湫是則固是祇如拄杖子今日輪次山僧又且如何提掇舉起拄杖云拄杖子化為龍興雲吐霧彌覆乾坤去也炎蒸暑熱從甚麼處得來大衆山僧恁麼提掇還稱他雲門意旨也無稱與不稱則且置擲下拄杖云擔板休於潭影臥為霖且去潤焦枯三宜盂禪師祈雨上堂拈拄杖曰震法雷兮鳴法鼓山門頭彌勒開眉布慈雲兮灑甘露塔尖上商羊起舞四海龍王腦門裂三十三天叫冤苦雲鎖趙州關雨打雲門普拈起一毫端塵剎無焦土於此作佛法商量笑諸君從頭莽鹵所以者一著子大似龍王行雨不從龍王身出不從心出不自雲生亦非空有以不思議力時行雨事成熟穀稼繁長草木大衆既不從身心中出且道雨自何來卓拄杖曰赫連皇甫牧雲門禪師祈雨上堂十五日已前乾𪹼𪹼地十五日已後天作時雨山川出雲正當恁麼時如何溪北耕南田地上泥牛耕出古黃金謝雨提綱智門祚禪師謝雨示衆云數日好雨且道雨從甚麼處來若道從天降那箇是天若道從地出喚甚麼作地若更不會所以古人道天地之前徑時人莫強移箇中生解會眼上更安錐又云赫日裏我人雲霧裏慈悲霜雪裏假褐雹子裏藏身還藏得身麼若藏不得却被雹子打破你髑髏楚石琦禪師州中謝雨上堂正覺知見時知見即是心當心即知見知見即如今娑竭羅龍王出海繞須彌山三匝一頭直至梵天口吐黑雲遮却大千世界然後降雨於是梵王問云雨從何來龍王答云從問處來又問云問從何來龍王懡㦬而退起一陳猛風吹散黑雲依舊天晴日頭出顧視大衆云我適來道箇什麼衆無語乃呵呵大笑恕中慍禪師祈雨有應上堂信心生一念諸佛盡能知拈拄杖云諸佛在者裏信心在什麼處昨日焚香禱告今朝驟雨傾盆清涼熱惱蘇活枯苗畫拄杖不是信心所感不是諸佛降靈若也會得被我熟瞞若也不會長連床上有粥有飯無相真禪師謝雨衆請就龍潭示衆山僧多幸造靈祠却感龍天力護持上澤不知何以報重來聊以謝恩私弘覺忞禪師立秋并謝雨上堂三伏火雲中秋風動漻泬香芬十里荷衣搗千家月歷歷清秋令明明朱夏節夏秋曷以分智者善甄別大衆者裏合得甚麼語與此時相應去莫是月色水鋪地鴈聲秋滿空麼算來猶隔半月程莫是秋風吹渭水落葉滿長安麼眼前未有與麼事畢竟作麼生道得恰好去山僧者裏有一道依時及節不傷物義鑄古鎔今通上徹下底靈驗底真言只是諸人不得作佛法會不得作世法會但能至心聽受要會天地同根萬物一體有甚麼難乃合掌云易見龍王大易見龍王甘露連注龍王毗疏其梨那龍王會麼山中無六月一雨便成秋祈雪提綱五祖演禪師祈雪上堂一年只餘此月天道未嘗降雪奉告三界龍神各自遞相報説普天普地鋪銀且要應時應節更望大衆慈悲為念普賢菩薩畢竟作麼生摩訶薩應庵華禪師祈雪上堂夜來得一番雪子細思量有五件奇特事應時應節災殃殄滅能除惱熱衆人定疊又見老鴉頭白且道衲僧門下畢竟如何文殊疾走無邊方普賢眼裏重添屑謝雪提綱楊岐會禪師因雪示衆楊岐乍住屋壁疏滿床皆布雪珍珠縮却項暗嗟吁良久云翻憶古人樹下居因雪示衆雪雪處處光輝明皎潔黃河凍鎖絶纖流赫日光中須迸裂須迸裂那吒頂上喫蒺藜金剛腳下流出血保寧勇禪師因雪上堂瑞雪下殘臘和風生早春空將未歸意説向欲行人未歸意絶忌諱欲行人何疏親繞須彌山轉百千匝不知畢竟向甚處藏身拍禪床下座湛堂準禪師因雪上堂今朝臘月十夜來天落雪群峰極目高低白緑竹青松難辨別必是來年蠶麥熟張公李公皆欣悅皆欣悅鼓腹謳歌笑不徹把得雲簫繚亂吹依稀猶如楊柳枝又不覺手之舞之足之蹈之左之右之喝曰禪客相逢祇彈指此心能有幾人知雪竇顯禪師謝雪上堂雪覆蘆花欲暮天謝家人不在漁船白牛放却無尋處空把山童贈鐵鞭蔣山泉禪師因雪上堂召大衆云還有過得此色者麼良久云文殊笑普賢嗔眼裏無筋一世貧相逢盡道休官去林下何曾見一人洞山聰禪師因雪上堂春寒凝沍夜來好雪還見麼大地雪漫漫春風依舊寒説禪説道易成佛成祖難珍重真淨文禪師因雪上堂大地雪漫漫春來依舊寒説禪説道易成佛作祖難洞山則不然而今坐立一一成佛作祖何更有難有易遂拈拄杖云不可不成佛所以假言三十二八十也空聲拄杖子喚作成佛不是空聲釋迦彌勒文殊普賢不是空聲而今觸目遇緣萬別千差不是空聲都無實事佛法到者裏也要人承當有麼有麼乃擊香臺下座因雪上堂舉龐居士辭藥山因緣師云全禪客當斷不斷反招其亂且道全禪客當時合下得什麼語免被龐公折挫如今莫有扶持佛事者麼出來開發大衆眼目亦表自己參學身心如無老僧為你説破今日臘月初十山門街坊丐者入寮打疊忽有人間諸丐者已在寮中時又作麼生良久乃喝云相逢不下馬各自有前程大慧杲禪師因雪上堂買鐵得真金求雨得瑞雪五峯玉琢成千樹銀花結龍王降吉祥普賢呈醜拙三世如來祕密門今日一時都漏泄雖然如是者裏有一處可疑且道疑箇甚麼恐日出後一場漏逗因雪上堂臘月十五天降雪為瑞為祥無空闕文殊露出廣長舌普賢大士得一橛如何是那一橛看錮鏴著生鐵應庵華禪師因雪上堂即心即佛非心非佛不是心不是佛不是物冷水浸冬瓜大家廝淈𣸩雖然淈𣸩中却有箇分曉處驀拈拄杖云山僧夜來吟得箇山偈舉似大衆雪子落紛紛烏盆變白盆忽然日頭出依舊是烏盆忽有箇衲僧出來道長老長老此是雪詩乃對他道冬行春令便下座密庵傑禪師因雪上堂滿目紛紛呈瑞雪填溝塞壑誰辨別文殊無處頓渾身普賢失却真妙訣烏鴉變作白頭鴉鐵樹翻成銀線結報諸人瞥不瞥庭際無人立片時便是太平底時節喝一喝下座雪巖欽禪師因雪上堂寒風凜冽遙空下雪非特紅爐焰上莫覓蹤由逗入蘆花深處猶難辨別往往到者裏十箇有五雙盡道明一色邊事殊不知正是空中花眼中屑正恁麼時且道是天寒人寒下座巡堂喫茶中峯本禪師因雪示衆一片兩片飛入人間尋不見三尺五尺積向茅簷難辨的銀象三千界靈瑞身光有空皆遍玉龍八百萬敗殘鱗甲無地可埋梅花之恨獨深漁簑之歸未晚且道與蒲團禪板邊坐堆堆底人有何交涉古者道今日雪下叢林有三種僧一種向被位頭究明自己一種向經案上吟詠雪詩一種向火爐角説喫堂供此三種僧那箇合受人天供養合受不合受置之勿論諸禪德你還知結雨為雪凝水為氷底道理麼然結雨為雪固是造物變化宜乎不知如凝水為氷遽以流注之質頓成堅礙之形雖金石不可與較其固請以喻明之佛性猶水也以無量劫中迷妄之寒氣念念凝合由是結佛性之水為氷也且正當氷時未嘗不具佛性之水奈何迷妄之寒交結未化雖全體是水而不得為流注灌溉之用耳或不以智慧之日融之安有自化之理如是觀察向道之念可得而免諸或謂古人相逢彈指便解知歸豈必待奮神力下苦工而後然哉你殊不知或不曾奮神力下苦工於曩昔任你相逢彈破指頭也無你知歸之理未有一佛一祖不因智慧之日融化迷妄之寒氷而能復其佛性之水也今日一箇所參話信得及處靠得穩時豈非真智慧耶一旦工夫熟時節至千丈氷山也是水萬尋雪嶺也是水滔滔然流歸佛性之海任你空中積雪火裏生氷未聞凍合無邊之海諸禪德莫道本上座長於譬喻蓋法理如是也更聽一偈凍雲四合雪漫漫孰解當機作水看只為眼中花未瞥啓窗猶看玉琅玕無文璨禪師因雪上堂古人道若端的得一回汗出一莖草上現瓊樓玉殿山僧從前疑著此語今日看來果然因雪上堂捱到虗空粉碎時空花一任眼前飛若還別覓安心法客路漫漫何處歸呆庵莊禪師因雪上堂大地雪漫漫山深分外寒斷肱人不到面壁也無端大衆且道是祖師無端山僧無端拈拄杖擲下云無端無端愚庵及禪師因雪上堂驀拈拄杖卓一卓云乾坤大地一時粉碎了也十方諸佛六代祖師天下老和尚直得瓦解氷消獨有普賢菩薩具大神力現大神變歡喜踊躍喃喃説偈云雪子落紛紛烏盆變白盆忽然日頭出依舊是烏盆忽有箇漢出來道長老長老此是雪詩衲僧分上合作麼生只向道三冬多瑞雪鼓腹樂堯年月江印禪師因雪上堂白牛露地南泉無處尋蹤香象渡河普賢失其境界寒凜凜玉樓起粟白皚皚銀海生花古佛堂前燈籠起舞夜明簾外露柱交參顯揚少室家風揭示新年佛法太陽溢目依然水緑山青大地春回直得河清海晏拍禪床野老不知堯舜力鼕鼕打鼓樂豐年密雲悟禪師因雪上堂昨日青山今朝白雪衆兄弟好消息野鹿行人步步成迹唯有挂角羚羊絶氣息從來獵犬難尋覓高著眼始得
