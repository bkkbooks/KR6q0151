body:
  text: 武林十八㵎理安禪寺住持婁東行悅集為住持遷化佛事法語圓悟勤禪師為佛眼和尚秉炬如來涅槃日娑羅雙樹間放出三昧火闍維金色身有條攀條無條攀例故褒山佛眼禪師道播四海名聞九洲二十年間三據大剎退席褒嶺宴坐鐘山以平生所受用栗棘蓬驅耕夫之牛以楊岐所付囑金剛圈奪饑人之食傳持一大事提振向上機衲子雲從諸方景慕豈謂一彈指頃坐斷報化佛頭談笑之間遽失人天正眼今則乾坤廓落人境蕭條雪映高山風清大野圓頂後相放萬里神光大衆正與麼時還委悉麼看取亘天紅𦦨裏華發優曇大地春為佛真大師秉炬觸目菩提真解脫頂門正眼耀乾坤透得生死關廓然無起滅佛真大師生平滴水滴凍勇猛截鐵斬釘舉世重其為人聞見莫不欽歎內侍叢中跳出衲僧隊裏修行淵聖錫徽名皇后賜度牒驚群伏衆絶類離倫將謂萬里前程豈期百年頃刻今則翻身長往透出金圈栗棘蓬頂後圓光應現無生大火聚佛真佛真急著眼保雲程一炬紅光才舉處毗盧頂上任縱橫為範和尚秉炬忠臣不畏死故能立天下之大事勇士不顧生故能成天下之大名衲僧家透脫生死不懼危亡故能立佛祖之紀綱昭覺和尚神機峭拔智辨滔天肘臂下有符頂門上具眼奮喝散白雲底意氣操打破虗空底鉗鎚一歸錦官兩住雄剎闢開荊棘路坐斷是非關接物利生光揚佛日臨岐一著擺撥便行絶後光前頭正尾正如今既到者裏可謂世緣畢備末後殷勤坐斷路頭一堆猛火大衆且道畢竟向什麼處去舉火炬云烈焰亘天留不得當空寶月鎮長圓弘覺忞禪師為權和尚火干將獄底光衝斗一出豐城萬怪降天寶人間留不住空遺寒影寫澄江子不談父德師豈譽徒賢恐孤芳之不著將青史其遂湮唯我權公長老智足超宗仁能纘緒初臻覺岸高升太白之堂末到牢關深入山僧之室閒吸西江水涓滴無餘直接濟北流滔天有浪枝葉廉纖不帶瞬視全彰本色之人偷心毫髮靡容針錐痛下時流之疾一衲披十周寒暑半逐飛雲三門絶今世塵囂平堆古霰所以人天四衆欣戴真慈雲水方來雅推善導何意德生魔色豈期天喪豫躬苦海波心遽爾頓停慈擢琉璃地上無端撥轉夜船雲遮一帶峰巒巢迷歸鳥雪覆千灣蘆涇岸失行舟正當今日指窮於為薪火傳而不盡一句又作麼生道分形散體周諸國為瑞為祥遍九垓安骨育王元禪師為淡庵和尚安骨浙水東頭是故鄉黃金臺畔忽云亡雖當明月清霜重猶見秋花晚節香恭惟淡庵和尚道重山林名揚海宇儼先輩之典型作後人之規矩風雲際會早嘗出世於浮梁雨露駢繁屢覲天顏於帝所分座鐘山榮升玉几承遠召住大慈恩踞猊床肆談宗旨選官利人兼利己正宣一代而闡揚豈料數朝而已矣雖然不滅不生無彼無此青青翠竹盡是真如岌岌青山無非妙體今日歸來事若何全始全終切骨切髓千古安然夢庵裏弘覺忞禪師為權和尚安骨鯨吞水盡露瑚撐起枝枝桂影孤剎海三千澄後夜法身端坐大毗盧白雲斷處家山劫壺空中世界日月雙丸𢌞薄無繇正照旁臨虗閒六戶開張不受森圍翠繞簾垂黃閣逈帳合紫羅寒最妙最玄先聖獨推此位非偏非正諸佛罕處其中安下骨龕云且道者漢以何為功能儼然高踞雪𩯭霜眉從火出堂堂終不落今時起骨天隱修禪師為達本大師起骨歸入龍池塔海底泥牛銜月走崖前石虎抱兒眠吾兄既達元初本何故淹留在此間歸去來歸去來故山院裏絶塵埃相逢俱是舊相識管使吾兄笑眼開轉骨天如則禪師為報恩定長老中路轉骨道吾遷塔就石霜知子莫若父報恩移骨歸天目家富小兒驕雖然一種恩情爭奈兩家機軸撫骨云若不是定動衲僧俠路相逢放伊不過煆骨密雲悟禪師為豁然師弟煅骨以火炬指骨云縱然皮膚脫盡白骨也須火煅惟我師弟豁然却具者般體段以火炬打圓相云大衆會麼攛火炬云看弘覺忞禪師為玄玄其公煅骨皮膚脫落露真常那箇將身北斗藏火後依然還入煅精金要見十分黃惟我同參其公禪師叢林衛霍之臣知識蕭曹之佐始也受生陽羡飲光之中天降跡縣知佛日當興少焉脫白龍池耶舍之鹿苑皈投默計法輪定轉所以二十年事先師朝挈蓋暮提瓶恆隨步武五六處襄法社櫛甚風沐甚雨歷盡艱辛然則丹山出而毛骨權奇師窟遊而爪牙鋒利事應乃爾理實當然其奈智困於天刑神疲於物務兼之風雲未遘羽翮先摧後先師僅五周趨寂滅將一紀於戲泰嶽頽而群峰偃象王去而象子隨白日不移輪青山常舉足寒崖一歸臥嗟哉春復春今則其徒萃章輩深恐異草之橫生謀遷涅槃之大宅正當移身換步時如何道得越格超方句放下骨襯云紅爐一點清嵩雪梅放香林第一枝靈骨入塔應庵華禪師為此庵和尚入塔摩醯三眼洞徹無私末後全提今之是也故我此庵和尚平生擔板不受差排會盡物我一如透過生死窠臼履刀山劍樹如步紅蓮入鑊湯爐炭似登寶所全體是箇大解脫門更無一絲毫許外物化緣既畢借路經過火光三昧自焚軀烈焰亘天誰著眼黃陳靈骨五色璨然不昧高蹤斬新光彩今日安藏窣堵坐斷溪山萬木生風千江照月真燈烈焰少室增輝正恁麼時且移身換步一句作麼生道還知落處麼寶印當空妙重重錦縫開喝一喝密雲悟禪師為守元大師入塔以拄杖指塔云盡十方世界是箇無縫塔復敲塔門云且道者一縫作麼合煞以手舉露骨送入云請師兄塞却弘覺忞禪師為雲門雪大師入塔以拄杖指塔戶云大衆還知者一段因緣也未若也未知山僧不免借㜑帔子拜㜑年去也須彌頂上鐵圍龕內有空王月一函莫謂秋光淨如練佛來相見也垂簾且道當山堂頭和尚到此又作麼生瑚枝枝撐著月千古萬古衆同瞻撒骨毒海良禪師自遺撒骨法語云太湖三萬六千頃中有浮圖絶正偏今日遺骸歸去也碧天連水水連天安牌元叟端禪師為別谷和尚入祖堂白雲作叢林紀綱以達磨居中開山居左百丈居右天下依而行之絲毫無有紊亂別谷和尚在茲山為二十六代捐以此日居于此堂晨香夕燈其永無替愚庵及禪師為平山林和尚入祖堂召大衆云亭亭石塔東峰上此老初來百神仰福源浩浩起當湖千歲巖頭飛白浪宗鏡高懸二十年不啻焰光高萬丈翻身靠倒靈鷲峰雙樹悲風撼穹壤撲碎破沙盆滅却正法眼動靜絶行蹤去來無影象是謂眼空佛祖道重王臣年逾八秩五處住山平山老和尚指牌云湖光瀲灩山空濛覿體全彰大人相天童性禪師為前住當山第六十四代仁叟懷禪師生入祖堂大機大用闡單傳震動東南半壁天一句不言群象主威音王佛莫齊肩某德重叢林道通淵脉深得西印宗旨大弘廣慈世家照用則正眼洞明放行則真風卓邁發劈箭機以的破的鼓霹𮦷舌以空遣空所以人天自化外道歸降兩坐名山法輪大轉回澆漓之末運續無盡之真燈希年養高自他具足且最後一著還居正位畢竟作麼生道當陽提起破沙盆佛祖堂中稱獨尊佛涅槃日師送自牌位入祖堂捧牌位云三界都來總大夢十方世界一空洞為他恐墮斷常見又向虗空中鑿空箇漢行腳全無禪道罔措壞滅臨濟正宗籍沒大慧家世為伊正眼瞎却不能普振真風故自罪犯彌天今又預居祖席我且貶汝異類橫身西州作牛東州作馬銜鐵負鞍拖犁拽耙饒伊要騎便騎要下便下搖動尾巴天上天下也只是精靈業識好與一頓且道正位端居一句又作麼生喝一喝遂放牌位弘覺忞禪師送密雲先和尚入先覺堂先知覺後知先覺覺後覺從上佛祖莫不乘此願力而受生順茲化儀而趨寂所以我堂頭先和尚從無住本建最勝幢踞寂滅場現人間世風行六處草偃入埏金粟峰頭蹴踏千千龍象太白山裏變化億億鵾鵬今則法雨既周於此界慈雲將布於他方天台五百羅漢遮留不住此會百萬人天牽挽莫回遂獨步於南辰竟藏身於北斗既然如是因甚從前鼻頭繩索仍落在手裏正恁麼時且道把住即是放行即是海神知貴不知價留與人間光照夜尊宿遺書至提綱雲蓋智禪師黃龍死心和尚遺書至上堂法門不幸法幢摧五蘊山中化作灰昨夜泥牛通一線黃龍從此入輪𢌞龍門遠禪師黃龍山死心和尚遺書至上堂死心心已死心死死猶生拗折黃龍角翻身臥地行者老子從來翻著襴衫倒携席帽口頭粗慥肚裏柔和檢點叢林呵叱學者雖傳晦堂道愛用雲門禪以罵風罵雨為訓徒以種菜種蔬為作務興灾降禍少喜多嗔愚人見即攢眉智者點頭相許要去便去果然作家騰身元是莫徭人睡中失却死心老嗚呼哀哉法門不幸黃龍靈源和尚遺書至上堂昔開正續銘今示真歸告一路涅槃門行說皆親到明然臨濟燈妙唱黃龍道空海久澄虗雲濤方浩浩橫吞巨海高駕鐵船隱顯同源卷舒無際者其惟靈源乎禪師居究竟地住本覺境雖曰示生實無生而可示雖曰示滅實無滅而可示明明密密密密明明真化不移何妨出沒所以遺言作訓真告普聞能事始終一期云畢而某曩歲遊方之始邂逅龍舒許以半面之交氣投分感雖則荊山隱玉已遇良知爾後𧉻腹剖珠登舟獲劍歐峰再會素願尤諧歡洽妙期有同符節自初及此三十年間理契同風至音無間夫何遽別特示遽書感存念亡此情彌切雖然如是佛佛不思議不許長住世大衆審思惟畢竟祇者是然則子期既沒伯牙絶絃蓋傷其無知音爾況此至道離見超情莫逆於心夫何言也昔人問長沙南泉遷化向什麼處去沙云石頭作沙彌時參見六祖云不問石頭作沙彌時參見六祖南泉遷化向什麼處去沙云教伊尋思去師乃呵呵大笑云會麼水長船高泥多佛大共至靈前不勞觀聽蔣山佛鑑和尚遺書至上堂噁噁師兄師兄出在我前去復我先噁噁師兄師兄出在我前許我竝駕而齊肩去復我先使我隻翼而孤騫豈不念茲苦海群迷未度況乃五湖玄學負笈趨筵遽辭舟楫孰濟長川然佛法道理自有因緣此蓋衆生無祐薄福使然永違叢社法炬無傳我聞如來雙林示滅又聞達磨隻履西遷佛佛祖祖其道綿綿況我鐘山佛鑑法兄妙機無間出沒應緣去來生死吾何預焉而某於師門最為深契在鴈序手足相連義交金石氣薄雲天聽遺音而何忍念朽質以非堅同心共照夫復何言尚記得如來滅度阿難問迦葉曰世尊傳金襴外更傳何法迦葉曰阿難阿難應喏迦葉曰倒却門前剎竿著大衆若無者箇公案生死熾然白雲師翁道金襴之外復何傳弟應兄呼豈偶然倒却門前剎竿著免教伊舊倚牆邊大衆會得麼倚牆邊倚牆邊寂滅光中禮白蓮大慧杲禪師天童覺和尚遺書至受書云古人道末後一句始到牢關把斷要津不通凡聖舉起書云者箇是天童和尚末後把斷要津全提底消息還委悉麼如未委悉却請維那分明說破宣了遂升座云法幢摧法梁折法河乾法眼滅雖然如是正是天童真實說且道說底事作麼生知音知後更誰知密庵傑禪師木庵和尚遺書至拈香云大衆還識者尊慈麼雖與我同條生不與我同條死稔聞在七閩揚塵兼簸土凌篦宗風不奈何今朝喜見清平路清平路既見異竟如何茶傾三奠香爇一爐伏惟尚享靈隱佛海禪師遺書至上堂呼猿洞口虗空迸裂鴉飛不度如行如說三十三天撲帝鐘打刀須是邠州鐵喝一喝下座元叟端禪師天童雲外和尚遺書至上堂舉雲居膺和尚遷化次問侍者云今日是何日者云初三居云三十年後但云只者是遂乃端然告寂師云雲居得曹洞正傳為宗門百世師表末後全提因甚一場懡㦬擊拂子云無縫塔中雲匼匝不萌枝上月團圓愚庵及禪師育王石室和尚遺書至并入祖堂上堂五十三年弄巧成拙踏破虗空赤腳行萬象森羅笑不徹大衆箇是育王石室和尚末後為人底句子明如杲日寬若太虗權實照用俱備擒縱殺活皆全可以津濟四生可以梯航九有蚊子上鐵牛無你插嘴處卓拄杖云者裏見得無一處不睹慈容無一時不聞說法苟或未然少間下座普請諷經莊嚴品位香煙起處一任觀瞻笑隱欣禪師金山長溪和尚遺書至上堂大法既微賴宏於堪忍界內幻身雖沒當鼓舞於寂滅海中臨濟道不得滅吾正法眼藏大覺道我要付與一隻箭良由弘法心重愍物情深故有落草之談諸人還見金山垂手處麼鐵船無底踏翻去依舊東山水上行靈隱獨孤和尚遺書至上堂靈機絶待不涉去來妙用無方寧存軌則大梅聞鼯鼠聲埋沒自己普化索木直裰誑惑他人爭如我靈隱和尚隨緣施設不墮功勛七十四年光前絶後直得飛來峰起舞冷泉亭𨁝跳諸人還見此老涅槃後大人相麼落落橫身三界外堂堂獨步劫空前東林古智和尚遺書至上堂拈兔角杖敲出佛祖骨髓握吹毛劍掃蕩今古葛藤臨行道箇聽末後句烜赫虗空如臨濟滅却正法眼得三聖直下承當盤山告衆索傳真普化獨解翻斤斗龍翔與麼追悼衆中莫有換手捶胸者麼擊拂子云寥寥天地無知己不聽遺音空絶絃徑山和尚遺書至上堂昔妙喜祖到蔣山應庵和尚上堂云天下具大眼目尊宿惟法叔一人而已今我徑山法叔再世妙喜也小侄曾聞於朝請為茲寺開山而未果所願遺書忽臨如覩象駕之至堂堂正體儼金錫之橫肩琅琅法音聞虗空之振鐸四衆攀戀不勝哀感既是生死無間未免賓主相見去也傳家只箇金剛王留與兒孫作標格楚石琦禪師因龍翔曇芳和尚遺書至上堂心同虗空界示等虗空法證得虗空時無是無非法既無是法又無非法則諸佛成等正覺轉妙法輪入般涅槃如夢相似曇芳老子佛海禪師屢董名藍親承眷遇方辭徑塢即據龍翔末後光明全身舍利八斛四斗未足為多試拈一粒與諸人看竪拂子云海神知貴不知價留與人間光照夜擲拂子了庵欲禪師宣州天寧遺書至上堂鐵牛吼破雙溪月石女含笙悲不徹鶻眼龍睛總不知聾子親聞啞子說山僧二十年前親見草庭老子向萬仞崖頭拾得箇斷貫索到處穿他天下宗師鼻孔及乎應緣而出瑞世天寧水到渠成風行草偃又欲用此索穿他天下衲僧鼻孔化緣既畢奄爾真歸撒手那邊全無朕跡所以道聲前非聲色後非色蚊子上鐵牛無你下嘴處山僧今日不免倒行此令去也少間下座詣靈前燒一炷香點一盞茶欲與他穿了鼻孔何故喫拳須記打拳時報國希白和尚訃至上堂未達境惟心起種種分別達境惟心已分別則不生於不生法中獨露本來面目直是離相離名絶對絶待破塵破的透色透聲故我報國和尚得此三昧兩處住山單傳正印掃除邪解扶樹此宗能事既畢撒手那邊末後全提甚生光彩且道與他摩𮌎告衆槨示雙趺是同是別拍禪床云羚羊挂角千峰上更有羚羊在上峰仙巖仲謀和尚遺書至上堂杜城山頂打鳳羅龍黃池水邊張蝦釣鱉逗到衣錦還鄉一味斬釘截鐵如今傀儡線索斷五色祥麟步天岸有伴何妨却再來了却先師舊公案且先師公案作麼生了卓拄杖喝一喝弘覺忞禪師天童和尚斷七復聞顯聖爾密辨山久默二禪師訃音師為安靈設奠云平地西風起吹倒空王殿亦有善法幢以次相傾澱慧命尚縣絲人天胡可戀子細思量著無如衲僧便海底泥牛已絶蹤草鞋不用行鄉縣休云世界何寥寥須信皇封成一片好衲僧薦不薦於此猶未達根源香燒一炷茶三奠捶𮌎只得哭蒼天魔王拍手恣歡忭護法遺書至提綱密庵傑禪師施司諫訃音至上堂風行草偃水到渠成信腳與麼來雲收霧捲是處皆春信腳與麼去空澄海湛物我一如所以道去來不以象動靜不以心如是則塵塵剎剎普現威權蓋色騎聲纖塵不立羅籠不肯住呼喚不回頭古聖不安排至今無轍跡且道司諫施公即今在什麼處良久云黃粱才夢斷竺國一花敷復說偈云昔年相見談真諦今日升堂話去來一念廓然無向背春光鐵樹自花開請西序頭首提綱兩序恕中慍禪師請西序上堂如來藏中不留一法衲僧門下豈有多端靈樹和尚云我首座生也我首座行腳也一字不著畫會麼不見道客來無茶點蒿湯備禮儀月江印禪師請頭首上堂善哉三下板知識盡來參既善知時節我今不再三古人與麼道大似按牛頭喫草雲峰則不然善哉三下板收足上蒲團脊梁生鐵鑄透過祖師關一氣轉一大藏教背手拈却須彌山七處徵心無心可覓八還辨見無見可還夢入天宮猶未醒金雞飛上玉欄杆笑隱欣禪師請頭首上堂騰今耀古摩醯正眼洞明鍛聖鎔凡向上鉗鎚妙密定佛祖綱宗之句須是其人展主賓互換之機要求作者所以道作大廈非一木能成涉巨川豈一棹可濟直得照用同時星飛電捲人境俱奪玉振金聲正恁麼時諸人鼻孔在山僧手裏且道山僧鼻孔在什麼處擲拂子云一任橫拖倒拽請兩堂首座真淨文禪師請首座維那典座上堂三德六味施佛及僧香積廚中善調在手三世諸佛向砧槌上聲聲相應且道相應箇什麼良久云問取堂中第一座請首座典座及逍遙和尚來上堂不動真際為諸法立處昨日監院名今朝首座號緣應百千般立處頭頭妙典座把杓柄一一臨時料衆口若能調逍遙同一道諸法立處今已彰作麼生說箇不動真際底道理喝一喝下座請首座上堂一番新一番舊新舊相資要成就諸禪德且道成就箇什麼為成就佛事耶成就道場耶成就叢林耶若與麼成就豈有教外別傳乃拈拄杖云此為復是教內教外是新是舊不得喚作柱杖便成就取好遂擲下下座圓悟勤禪師請首座上堂合千差包萬有齊往來印古今混有無一生死舉不犯之令行不言之教齊不齊平不平於此建立於此辨明於此紀綱於此表帥何法不容何事不成何德不圓何心不契且風行草偃一句作麼生道為山登九仞捻土定千鈞元叟端禪師請首座上堂有際天之雲濤可容吞舟之魚有九萬里之風可負垂天之翼建法幢立宗旨苟非其人安任其事拍禪床云有意氣時添意氣不風流處也風流恕中慍禪師請首座上堂開鑿人天眼目挽回上古風規坐斷情塵意想不落玄妙機關斬新日月特地乾坤須是其人堪任其事靈樹虗第一座而待雲門蓋為此也拍禪床莫怪渠儂多意氣他家曾踏上頭關愚庵及禪師請昌國吉祥亨子元充首座上堂臨濟建立黃檗宗旨普化盡力成褫無端仰山道此人有頭無尾有始無終山僧昔年承乏海山子元橫身輔佐茲者備員宕寺又荷分座說法却不似仰山道此人有頭無尾有始無終也諦觀佛祖各各出興隨方化導莫不全賓全主全主全賓大用齊彰大機普應流通正法眼藏顯示涅槃妙心直得雲行雨施水到渠成還他過量人堪任過量事卓拄杖云龍得水時添意氣虎逢山色長威獰笑隱欣禪師請首座提點兼謝吉祥崇教二長老上堂擘開泰華巨靈謾逞其威百步穿楊由基未為中的所以接雲門嗣雪峰指臨濟參黃檗睦州眼裏無筋拽耙牽犁種田博飯楊岐腕頭缺力龍翔尋常不敢輕意用人不及用時以一當百如漢高不善將兵而善將將非惟紀綱叢林要作後來榜樣更有難弟難兄來往更酬迭唱不妨打鳳與羅龍龜毛結網三千丈牧雲門禪師請首座上堂日南長至節屆書雲天心復見扶陽抑陰紫羅抹額繡裙腰甚生標致赫赤布裙無來替換家無滯貨不發所以烹金琢玉須資作有鉗鎚荷教扶宗全仗本色兄弟揮佛日於西垂回狂瀾於既倒豈不是君子道長小人道消你大衆還見麼物宜求新樓前海棠花開却一朵兩朵人宜求舊即日堂中第一座少渠不得且阿那箇是第一座卓拄杖云蘇州有留首座圓悟勤禪師留首座上堂古道坦然真規不墜紀綱得所表帥得人內肅外寧安家樂業以大千界為一真境以十方佛同一舍那文殊普賢交光相羅觀音彌勒擎拳合掌臨濟德山互相贊成白牯狸奴了無向背可以演無生曲唱太平歌且超情離見一句作麼生道木人把板雲中拍石女含笙井底吹虎丘隆禪師留首座上堂田地穩密鬼家活計從空放下坐井窺天虎丘門下不說老婆禪只要諸人眼橫鼻直三十年後免得敲甎打瓦何故物宜求新人宜求舊不起於座現諸威儀且道出格一句作麼生良久云落霞與孤鶩齊飛秋水共長天一色請藏主侍者南石琇禪師請藏主維那侍者上堂一大藏教是箇切腳直指單傳秦時𨍏轢國師喚侍者淨地何必拋泥沙興化打克賓瘥病豈假驢䭾藥你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子請藏主侍者上堂少林心印觸處昭彰衲子生涯隨時施設側身對客原夢度茶擎叉輥毬卓牌打地一一全體全用著著邁古邁今十地菩薩尚顢頇四果聲聞應罔措徑山者裏又且不然含暉亭上聖滄溟凌霄峰頭挹南嶽愚庵及禪師請侍者諸山客至上堂一葉落天下秋法身須透閙啾啾定光金地遙招手智者江陵暗點頭喚侍者云三界唯心萬法唯識一句中具三玄一玄中具三要且道與上來說話相去多少良久云若也不會問取諸山和尚恕中慍禪師請侍者上堂趙州與文遠鬬劣不鬬勝老大不識羞相席還打令致使明眼人無由辨邪正邪正既不辨轉轉成毛病瑞巖百不能愛用無星稱稱起太虗空錙銖無缺剩以此為瑞為祥以此為坑為穽斷衲僧之咽喉續佛祖之慧命請東序知事提綱監寺提點典座真淨文禪師請知事上堂至道無難惟嫌揀擇豈可以親疏好醜擇而然後用之要用便用入到手中土作黃金拋來擲去滿目光輝也要衆人見諸德又作麼生不揀擇好醜而用之喝一喝下座笑隱欣禪師朝廷降給齊糧併請監寺典座上堂我本無心有所希求今此寶藏自然而至楊岐金剛圈十分光彩東山鐵酸餡百味具足若是知恩報恩不妨大家受用且道受用箇什麼幾片白雲橫谷口數聲寒鴈起滄洲令人苦憶寒山子紅葉斷崖何處秋了庵欲禪師請提點上堂楊岐栗棘蓬東山鐵酸餡多處添些子點即不到少處減些子到即不點萬機俱赴八面玲瓏一句全提風行草偃擊拂子龍得水時添意氣虎逢山色長威獰保寧勇禪師上堂十方梵剎事同一家量才補職買帽相頭衲僧家一日二時向長連床上開單展鉢拈匙把筯缺箇什麼糊餅䬪飥糖糕餕餡乃尋常茶飯雖然如是且道杓柄在什人手裏若也知得一任恣意餐啜若也不知今日請新典座密庵傑禪師請典座上堂舉夾山在溈山充典座溈山一日問今日堂中喫甚菜座云兩年同一春山云如法修事著座云龍宿鳳巢師云柄霸在手縱奪臨時敲磕將來百味具足其中只缺一味且道是油是醬若檢點得出華藏功不浪施其或未然更聽重下注腳輔弼宗門有老成一番提掇一番新咬薑呷醋知鹹淡便是叢林過量人元叟端禪師請典座上堂草木衰謝春至自榮衆生顛倒妄盡自覺僧問三平如何是有漏平云笊籬如何是無漏平云木杓亂走衲僧一任圖度
