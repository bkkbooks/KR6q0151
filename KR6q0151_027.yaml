body:
  text: 武林十八㵎理安禪寺住持婁東行悅集當晚小參提綱石屋珙禪師當晚小參現前一眾久在叢林謂之參禪謂之辦道殊不知一念未生已前更無別物纔擬心時錯了也雪峰和尚三登投子九到洞山如渴鹿趂陽焰不知費了多少脚頭如今要得現成直下自家看取復有何事無事切莫妄求妄求而得終非得也復舉南泉水牯牛公案師頌曰南泉放牧沒東西兩岸春風綠草齊總是國王家水土不如隨分納些些古林茂禪師開元入寺小參舉雪峰問德山從上諸聖以何法示人山云我宗無語句亦無一法為人後僧問雪峰云和尚見德山得箇什麼峰云我當時空手去空手歸五祖拈云如今說與透未過者有兩人從東京來問伊近離何處却云蘇州便問蘇州事如何伊云一切尋常雖然謾山僧不過何故只為語音不同畢竟如何蘇州菱邵伯藕師云從門入者不是家珍自己流來還同瓦礫老東山依模脫墼殊不知二大老正是食飽傷心雖然既是東京來因甚却說蘇州話永福入院小參紅塵閙市十字街頭百草頭邊孤峰頂上若作佛法商量入地獄如箭射直得萬機休罷千聖不擕聲前非聲色後非色檢點將來正是髑髏前妄想借使打破髑髏揭却腦葢躍倒須彌踏翻大海脚跟下推勘得出也是落七落八通方上士出格高人除非自有生涯終不守他窠窟現前大眾冀善參詳山僧二千里水陸間關來此聚頭不為別事復偈云處世行藏各有由老來誰不愛心休為圓鄮嶺先師話來結鄱陽衲子讐跛鱉但隨他逐浪錦鱗終是解吞鈎相逢試把家私展蜜菓時懸檗樹頭保寧入寺小參當軒大坐百帀千重一句全提該天括地佛眼不見海口難宣今古不同途凡聖罔測直得麒麟現瑞鳳凰來儀山色呈祥人煙雜遝其柰梁寶公蹉過達磨雖云觀音大士傳佛心宗畢竟不識者箇消息是汝諸人還猛省麼卓拄杖若不同床睡焉知被底穿復舉當山勇禪師示眾云大方無外大圓無內無內無外聖凡普會瓦礫生光須彌粉碎無量法門百千三昧拈拄杖云總在者裏會麼蘇盧蘇盧㗭哩㗭哩娑訶松源和尚拈云者老漢業識茫茫無柰船何打破戽斗師云老松源摟出心肝要且未見先保寧在山僧今日重為拈出會盡萬法一如拈却金圈栗棘也是泗洲人見大聖無文璨禪師住薦福當晚小參皷棹揚帆駕沒底船橫行海上神頭鬼面用無文印勘驗諸方二千里遠來住山單單地提持此事舉拂子云看看印文已露劃一劃錦縫已開若佛若祖若聖若凡盡向者裏一印印定直得盡乾坤大地風颯颯地眾中忽有一箇犯眾出來道長老你且莫要大驚小怪我在威音佛世已證是三昧又作麼生以拂子擊禪床下座了庵欲禪師住靈巖云只者是只者是金不博金水不洗水是句亦剗非句亦剗揭開萬里神光提出倚天長劍三登九到滯殻迷封撩起便行白衣拜相山僧今者椎碎蟠桃核得見舊時仁拽將師子峰與天平山鬬額且貴大家知有自餘七十三八十四癩馬繫枯樁黑牛臥死水有甚麼共語處拍禪床云好雨洗將殘暑去涼風吹得早秋來復舉僧問雲門佛法如水中月是否門云清波無透路僧云和尚從何得門云再問復何來僧云便與麼去時如何門云重疊關山路師云雲門善舞太阿著著有出身之路者僧貪觀白浪失却手橈靈巖不惜眉毛與汝拈却水除却月還見佛法麼喝一喝久立珍重南石琇禪師住萬壽云塵劫來事只在于今緇素駢集燈燭煒煌萬歲山從地而起雙石幢屹立層霄是禪月之道場蘇城之勝地殿堂虗敞煙雲蔽虧紅闌三百九十橋綠浪東西南北水頭頭顯露法法全彰黃面瞿曇何煩出世缺齒老漢安用西來天下善知識分宗列派各立門庭具驅耕奪食之機有摧邪顯正之用正眼觀來總不消得須知我此門中別無奇特只貴明自本心見自本性聞聲見色總是尋常喫飯著衣色色仍舊初不用希求勝妙以為有得豈不見大茅和尚示眾云欲識諸佛心向眾生心行中識取欲識常住不凋性向萬物遷改處會取古人恁麼說話多少現成多少明白今人不能洞曉葢是自生知解障却本有一段光明山僧今夜入門之始聚首之初終不肯說玄說妙愈增知解只將現成句子覿面拈出且作麼生是現成句子以拄杖卓一下復舉僧問趙州和尚云萬法歸一一歸何處州云我在青州做一領布衫重七觔者箇公案諸方據曲彔木床者往往皆曾拈掇多向此僧言下卜度貴易起疑不能於趙州未開口前一截截斷大似楚人認山鷄以為鳳獨有妙喜老子較些子甞有頌曰青州七觔衫盡力提不起打破趙州關元是自家的新萬壽效顰亦有一頌青州七觔衫年深黑如漆颺向屋角頭光明耀紅日住徑山云十字街頭紅塵浩浩孤峰頂上白雲依依不是目前法非耳目之所到不是靈山拈花之旨不是少室面壁之機不可以智知不可以識識不可以語言造不可以寂默通直得十方無影像三界絕行蹤正是黑山下活計設使掀翻宇宙打破虗空坐斷古今高超物表也知未出常情若是通方作者俊快衲僧別有出格神機焉肯循途守轍現前大眾自合知時山野遠離蘇城來此凌霄峰頂且道為什麼邊事良久從前汗馬無人識只要重論葢代功復舉臨濟示眾云我於先師處三度問佛法的的大意三度喫六十棒如蒿枝拂相似如今再思一頓誰為下手時有僧出云某甲下手臨濟拈棒度與僧擬接濟便打臨濟大似貧人思舊債者僧渾若餓狗喫縴𦃇雪竇道臨濟放處較危收來太速醉我落花天借他絃管裏笑隱訢禪師中天竺入院當晚小參凡夫色礙二乘空礙菩薩色空無礙拈拄杖云拄杖子列列挈挈不入眾數有時十字街頭橫挑布袋有時白雲景裏打雨敲風法隨法行法幢隨處建立有佛處不得住無佛處急走過三千里外一向全提畢竟如何話會卓拄杖云一六三四二直言曲七一桃李火中開黃昏候日出復舉南泉初入院大眾送歸方丈僧問端居丈室將何指示於人泉云昨夜三更失却牛天明起來失却火師云大小南泉和泥合水中峰則不然忽有問端居丈室將何指示於人即向他道拄杖子今日開封箬庵問禪師金山入院當晚小參機不到處萬境摐然境不留時一機獨現機境互用人法雙彰機境俱泯衲僧向什麼處出氣者裏著得隻眼人人常光現前箇箇壁立萬仞所謂據虎頭收虎尾第一句下明宗旨你面前無我我面前無你得路填路過橋拔橋騎賊馬捉賊刀萬人叢裏揭高標者回不是虗相識眨眼流沙萬里遙卓拄杖復舉當山達觀曇頴禪師僧問如何是長法身觀云拄杖六尺僧云如何是短法身觀云筭子三寸僧云恁麼則法身有二也觀云更有方圓在師云古人一期施設可謂四稜蹋地仔細檢點將來也是隨他語脉展演設或有人問山僧如何是長法身拄杖六尺如何是短法身劈脊便打恁麼則法身有二也擲拄杖云兵隨印轉將逐符行且道與古人是同是別更聽一頌萬疊長江浪裏游月隨漁父上扁舟釣竿收放憑吾手不計工程得便休顧左右云珍重牧雲門禪師天童入院小參舉雪峰示眾云望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也新天童則不然小白嶺與汝說法了也隱葢亭與汝說法了也萬工池與汝說法了也敢問諸人作麼生是小白嶺說底法作麼生是隱葢亭說底法作麼生是萬工池說底法久參先德試通消息後學初機直須仔細弘覺忞禪師當晚小參人人衣線下各有一坐具地生佛未彰早已開闢虗空壞爛湛爾獨存辟之乎大能仁一巨剎當許玄度舍宅為寺之日而此地不加增洎呂相國改寺為宅之時而此地不加減然雖無有增減而鐙明金殿燭與夫華笑玉樓人不大相懸隔耶向非德公長者呂氏亢宗盡底掀翻揮千金而不吝和盤掇轉化火宅為清涼則金屋長貯阿嬌碧池半流香膩而山僧與諸人又安得經行坐臥燕默禪思於此中也然則爾我衣線下地雖則富有萬德蕩無纖塵而七情擾擾六賊紛紛苟不直下親自識取常自守護勤自修葺力自莊嚴則如能仁之廢為民業者幾希求其頭頭皆寶所觸處有風光又安可得者乎不見東山演祖和尚道山前一片閒田地叉手叮嚀問祖翁幾度買來還自賣為憐松竹引清風清風徐引松竹交加受用則是天然受用畢竟如何得一肩承紹去萬古碧潭空界月再三撈摝始應知復舉世尊在靈山會上拈起一枝花以青蓮目普眎人天大眾惟迦葉破顏微笑世尊乃曰吾有正法眼藏涅槃妙心實相無相微妙解脫法門今付與汝汝當護持流通毋令斷絕師云從上祖禰不了至今殃及兒孫則且置且道靈山有付囑無付囑若道有付囑埋沒迦葉師兄若道無付囑爭柰孤負釋迦老子試問諸人作麼生道得出格一句良久喝一喝云千聖不知何處去倚天長劍逼人寒載住當晚小參提綱無文燦禪師載住當晚小參去去實不去是法住法位來來實不來世間相常住山僧屈指五載重到東湖荷盡已無擎雨葢春風猶在柳梢頭無一絲毫去來相無一絲毫新舊相見則與諸人共見聞則與諸人共聞箇中忽有箇漢出來道無文將常住物作自己用者固有之你也忒煞忒煞啞元來眾中有人在復舉德山小參不答話鈎在不疑之地時有僧出著了也山便打果然僧云某甲話也未問因甚打某甲不識痛癢漢山云你是什處人第二下鐵鎚來也僧云新羅人和聲送出山云未跨船舷好與三十棒雷聲浩大雨點全無大眾大小德山可惜龍頭蛇尾却引者僧向草窠裏頭出頭沒當時待他道某甲話也未問因甚打某甲脚跟下痛與三十何故為人須為徹愚庵及禪師載住徑山小參僧問大慧和尚昔日載住此山有云去是住時因住是去時果去住與果因無可無不可且如何是去是住時因師云五九盡日定逢春進云如何是住是去時果師云飯顆山頭逢杜甫進云去住與果因無可無不可還端的也無師云者裏是甚麼所在說去說住說因說果乃云去是住時因住是去時果去住與果因無可無不可喝者裏是甚麼所在說去說住說因說果說可說不可雖然如是者裏却有箇好處且道好在甚麼處良久云再理舊詞連韻唱村歌社舞又重新驀拈拄杖大慧祖師來也大慧好處山僧與麼舉似彼此共知好則好且道還有為人處也無愚庵固是無些子好處忝為大慧嫡孫也要與諸人露箇消息去住休論果與因拈拄杖云一回拈起一回新卓拄杖若知撲落非他物擲下拄杖始信縱橫不是塵復舉乾峰示眾云舉一不得舉二放過一著落在第二師云乾峰與麼道入地獄如箭射畢竟如何二由一有一亦莫守日午打三更面南看北斗為建寺檀越陞座提綱密庵傑禪師為太師循忠烈王陞座心生種種法生心滅種種法滅心法兩忘如撾塗毒皷聞者皆喪又如大火聚近之則燎却面門悟之者立地成佛迷之者永劫輪迴所以諸佛所說惟說此心祖師所傳惟傳此法靈山會上五百比丘得之自悟本心如夢如幻於夢幻中不見有我人眾生廣額屠兒得之拌下屠刀叉手云我是千佛一數大集會中大力魔王得之便道我待一切眾生成佛淨盡眾生界空無有眾生名字我乃發菩提心豈不是大丈夫能為大丈夫事於過量塵沙劫作過量殊勝佛事山僧今日以如是心說如是法普請大地眾生有情無情同入清淨大解脫門與太師循忠烈王為不請友同一眼見同一耳聞同一受用作廣大殊勝利益不可思議且憑箇什麼道理便能如是利劍拂開天地靜霜刀纔舉斗牛寒復舉世尊因地布髮掩泥獻花於燃燈如來燃燈見布髮處遂約退眾乃指其地云此一方地宜建梵剎眾中有一賢于長者持標插於指處云建梵剎已竟時諸天散花讚言庶子有大智矣師云大眾燃燈指處滴水氷生賢于插時天迴地轉於斯見得古釋迦不先今太師不後其或未然更聲重下註脚芟除荊棘建伽藍七佛常來此處參地久天長功不墜天花時復雨𣯶𣯶管待專使提綱恕中慍禪師謝專使上堂達磨大師十萬里西來要作箇馳書達信漢及乎面對梁王盡力只道得箇不識拈拄杖有賓有主有禮有樂手面分開白月團頂門撼動黃金鐸石屋珙禪師謝專使并三塔和尚首座都寺上堂睦州唆臨濟喫棒不是好心楊岐逼慈明晚參不是好心趙州訪道吾不是好心福源專使逼人住院且道是好心不是好心珊瑚枕上兩行淚半是思君半恨君月江印禪師謝育王專使上堂舉東山謝積善偈云積善山中人有膽如天大敢持居士書來覓空王座跨門不肯休看了方知道歸語晉江人大蟲褁紙帽雲峰亦成一偈玉几山中人老眼光爍爍遠持教曆文與我長柄杓柄長把不下還歸舊處著寄語甬東人莫莫莫莫莫留請兩序提綱保寧勇禪師留請兩班上堂橫身荷眾不顧危亡劄起布裙入泥入水分毫上定當升合裏論量拆東籬補西障若解與麼循塗守轍也可當風抵浪雖然如是猶未是咬猪狗底手脚作麼生是咬猪狗底手脚要會麼殺人不眨眼氣宇大於王天目禮禪師上堂東西兩序左右十人同建法幢共扶叢社且道文殊維摩還來證明也無月明照見夜行人擊拂一下雲外岫禪師留請兩班上堂以拂子打圓相云摩訶衍法離四句絕百非又打一圓相云禮之用和為貴先王之道斯為美又打一圓相云摩尼珠人不知如來藏裏親收得諸人還見麼所見不同互有得失天童者裏毋固毋必箬庵問禪師留請兩序陞座從上來事只在而今祇貴當人直下承荷更莫遲疑迴避不得處手眼通身目睛定動時白雲萬里扶持大樹接引後生拶入紅爐撥開烈𦦨方能發大機展大用立人天標準為法社弘規一撾毒皷拄杖勒回擲金剛圈拋栗棘蓬續臨濟將殘之緒起少林未墜之宗大非細事棒罰錢甘出院知恩方處報恩賊來須打客來須看等是共行山下路嶺頭須自看風煙來日不普請且莫展炊巾說甚如來禪祖師意一口吞盡何處更有閒言剩語在高聲喚侍者云分明記取三十年後此話大行莫有不甘者麼拈拄杖云龍得水時增意氣虎逢山勢長威獰下座請兩序上堂隔山見煙便知是火隔牆見角便知是牛伶俐漢一逴到手便能卷舒立方外乾坤縱橫挂域中日月多處添少處減明頭合暗頭合進退各有其時東西不失其序如斯標格足可觀光是者般人說者般話報謝出入提綱雪竇顯禪師到秀州百萬道者備茶筵請陞座山僧此者承鄞江太守之命俾赴雪竇住持再至嘉禾彌增嘉幸仍承百萬道者曲賜周勤仰荷之懷無以忘也兼勞廣命碩德抑令舉唱宗乘況達士相逢非存目擊若云言中有嚮句裏呈機猶曲為中下之流向本分衲僧遠之遠矣祇如適來僧問教外別傳一句對云三生六十劫諸人還知落處也無且鷺池鷲嶺海甸庵園三百法會之中甚處有者箇消息所以道三世諸佛不能自宣一代時教詮註不及除非知有莫能知之久立眾慈伏惟珍重大慧杲禪師到臨安縣當道請就海會寺祝聖開堂佛法至當不在問答處直饒問似普慧雲興答如普賢瓶瀉若不識其要妙只成戲劇之談於道有何所益據實而論盡是癡狂外邊走所以大覺世尊為一大事因緣故出現於世以種種微密善巧方便成就眾生開示悟入佛之知見起道樹詣鹿苑先為憍陳如等轉四諦法輪四十九年三百六十餘會隨眾生根器所宜次第開演令其各各聞法解悟出離生死末後臨般涅槃於人天百萬眾前拈華普示惟金色頭陀破顏微笑遂云吾有正法眼藏涅槃妙心分付於汝自是西天四七東土二三天下老和尚各各以心傳心相續不斷若不識其要妙一向溺於知見馳騁言詞正法眼藏流布豈到今日到者裏須是箇不求諸聖不重己靈底出格道人方能荷擔此箇大事且那箇是出格道人不見昔日江西馬大師遣西堂智藏馳書上徑山國一禪師國一開緘見一圓相遂索筆對智藏於圓相中點一點智藏罔措者箇豈非格外消息若作格外商量又却不是諸人且作麼生辯明時中如何受用適來知縣學士疏中有言馬師圓相遠緘千里之清規欽老機鋒點破一時之群惑群惑既破則人人脚跟下大事洞明大事既明則十二時中折旋俯仰彈指謦欬無非佛之妙用既是佛之妙用則不從人得既不從人得亦不在己躳既不在己躳則內不放出外不放入既外不放入則外息諸緣內不放出則內心無喘既內心無喘外息諸緣則一切智通無障礙既無障礙則一切智智清淨無二無二分無別無斷故正當恁麼時不是世間法亦非出世間法拽取占波國與新羅鬬額豈是分外雖然如是更有事在敢問諸人只如忠國師為甚麼却道欽師猶被馬師惑即今莫有定當得出底麼若定當得出許你諸人盡是出格道人其或未然徑山據款結案去也良久云在舍只言為客易臨筌方覺取魚難到寧國眾道友請陞座只者些兒住處是吾生長之地別去二十七年日月疾如彈指走徧天下叢林意圖出離生死報答父母重恩不是等閒遊戲平生得箇剛強方與佛祖出氣今朝依舊還鄉親戚百無一二道是昔人猶非道非昔人猶是莫作是非論量透過世間出世殷勤普勸諸人急著眼睛看取師子端禪師到華亭眾請上堂靈山獅子雲間哮吼佛法無可商量不如打箇筋斗便下座箬庵問禪師到寶興上堂卓拄杖云昔日溪山不改舊時面目宛然分明一段家風舉處全超途轍孤逈逈地卓絕寧彰七縱八橫了無畔岸不落今事門頭亦非威音那畔正如獅子一吼眾响皆絕好不資一毫醜不資一毫天人無路拱手歸降截群機思議之端挫物理不齊之軌超宗異目獨振宗猷共躅齊眉紹隆統系若不是恁麼人未免瞻前顧後所以道若向佛祖行說不到處踞地方敢向他佛祖頂𩕳上提持山僧二十年前向者裏打失一隻眼直得上無攀仰下絕己躳倒握太阿孤行湖海今日被眾檀護逼勒回來依然山是山水是水人是人物是物男是男女是女僧是僧俗是俗且道還有為人處也無還鄉一曲乘時唱會有知音暗點頭棲水大善寺卓去病仲期諸護法請陞座師云談玄談妙羅縠一重說道說禪白雲萬里三乘十二分教經有經師論有論師內聖外王百家諸子自是諸檀獲家常茶飯臨濟喝德山棒火上添油雲門餅趙州茶眼中著屑且道山僧今日將甚麼為人好彼自無瘡勿傷之也雖然如是拈拄杖云拄杖子忽然𨁝跳出來道今日一會若緇若素若老若少咸深諦信願聞法要請和尚普為大眾廣開方便令諸有情各各信入卓拄杖云還知麼水歸大海波濤靜雲到蒼梧氣象閒便下座玉林琇禪師到彌勒寺上堂卓拄杖云報恩新長老本來無住握根拄杖倒用橫拈把箇斗笠遮却一切人眼孔東西南北少有識者到者裏遇著同門老道兄瞞他不得被推向人前要某舉揚先師現成句子召眾云擲箇蒲團說法隨處驀喝一喝卓拄杖一下復倚杖云今日陞座於彌勒殿中更為大眾舉則古話當初布袋和尚亦與新報恩一般行脚常自述行由云一鉢千家飯孤身萬里遊後來為慈悲之故更有落草之談云彌勒真彌勒分身千百億時時示時人時人自不識咄哉者阿師慈則大慈悋亦少悋新報恩今日既與大眾有緣同此一會一發打開布袋更不露頭藏尾去也大眾諦聽彌勒真彌勒分身千百億額橫兩道眉面竪一箇鼻阿呵呵笑不輟掀起嘴唇片片皮露出牙齒許多骨展手云大家施我一文錢更有一句為君說十箇指頭八箇丫誰人平易誰奇特擲拄杖下座報謝回寺提綱楊岐會禪師參駕部歸上堂釋迦老子為先鋒彌勒大士為殿後眾中還有著力者麼出眾來與雲葢著力看如無雲葢自逞神通去也三五日出入相看首座大眾你且道於者裏還有隔礙底道理麼上座僧堂裏展鉢時與上座同展睡時與上座同睡立地時與上座同立地長者長法身短者短法身彌勒運用與去來何處有間隔雖然如是你且道雲葢在船頭在船尾眾中還有靈利底衲僧得見麼良久云人人盡道平地險登樓方覺遠山青參真淨文禪師出州回上堂山中城裏事不相知有一句子未敢泄機候遍到寮中一一當面分付直是臨時各各自著精彩莫教蹉過出州回上堂古人道去去實不去途中好善為來來實不來路上莫虧危古人見不透脫強生節目惑於後人洞山即不然來但言來去但言去有什麼過老僧入州途中晚便住曉便行又善為箇什麼歸來路上困便歇饑便飯又有什麼虧危今復林下與諸道人相見又有什麼事參退喫茶出外歸上堂歸來閏二月閴寂寶山中城隍耳目盡塵勞萬事空春水綠野花紅須信禪家道莫窮信手拈來一枝草臨機生殺任西東出外歸上堂古人所謂有物流動人之常情情若不生則老僧出入動靜無去來之作自然人事周徧又何妨遊戲神通藏法喜禪悅樂則與大眾同住如來寂滅海究竟覺喝一喝下坐保寧勇禪師莊上回上堂記得鵝湖和尚一日點淨後不赴堂遂入方丈裏睡齋後知事來白云和尚何不赴堂鵝湖云莊上喫油糍來晚間莊主到云今日謝和尚喫油糍大眾為復是神通妙用本體如然平地上剛然揑怪既不與麼又作麼生良久云者箇公案一任天下人批判保寧也無神通妙用亦無宿命他心院在江寧府莊屬宜興縣水路一千陸路四百孤舟野渡處處經過堤柳巖花時時間發前月出去昨日歸來莊上也不曾喫他油糍祇是炊白米飯煑野菜羮療飽充饑隨家豐儉然雖如是更有一般堪笑事米中粒粒徧生蟲參出歸上堂霜風浩浩葉紛紛曉入深村野老門相見但知俱默坐更無一事可談論良久云入山擒虎易開口告人難雪竇顯禪師歸寺上堂甚生標格還知也無諸禪德祖佛不能宣傳天地不能覆載二乘聞之膽裂十地到此魂驚其或達士切磋頗逢決戰一拶一捺略露風規句滯則岳立磨空源迷則雲橫布野所以先聖道一言纔舉千車同轍該括微塵猶是化門之說你衲僧合作麼生覬自知時便下座
