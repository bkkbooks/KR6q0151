body:
  text: 列祖提綱錄敘住黃梅四祖雙峰山東吳嗣祖沙門戒顯撰靈山拈華少室安心雖曰直指單傳不立文字而以楔出楔用兵止兵既於無言說中而藉言說即於無綱要中而有綱要故曰依經解義三世佛冤離經一字即同魔說不易之道也柰耳食者流膠滯陳說謂既稱向上眾流截斷惡藉文言又云既號宗門拈來便是豈有格則且援曹谿不識字為躲根捷徑由是邪正不分朱紫混雜群言淆亂瓦缶爭鳴言不涉典章事不合軌則街談俚語信采亂道蜀日雪反肆譏訶而宗門事大變矣呆翁悅和尚與余同土且共事有年既而法嗣南㵎旋從繼席道行四載痛念法門江河日潰砥柱無門佛祖慧命攸關端在說法乃裒集列祖法語分門析類輯成部帙自上堂小參示眾普說以至隨機拈示各有科條其見諸行事者千端萬緒一準大智老祖百丈清規綱舉目張各有部從題曰列祖提綱錄比類以觀如亞夫細柳之陣紀律精嚴如光弼入子儀軍壁壘一變俾末學晚進猶及見古德說法大全厥功匪細矣或曰禪貴胸襟流出稱性吐露今編列義類動成格則令剽竊之徒印板打來模子脫出不更與賊過梯乎余曰非也學家杜撰亂說只為不通綱要倘肯向此精研自然識法者懼如入清廟明堂見三代禮樂綿蕞倨侮自慙兒戲高者金章玉句剔骨刷髓次者亦規行矩步言不妄發狐犴喧囂得此大救懸之國門布之叢席豈不與統要聯珠五燈諸集共為宗門日月也哉康熙五年仲秋三日列祖提綱錄敘住金陵棲霞寺古閩嗣祖沙門大依撰吾宗自大智以下典模大備誠所云三代禮樂也洎南宋後稍凌夷衰微矣有明二百餘年岌岌於廣陵散熹廟間諸老先後高建旗鼓於江東南嗣而兩宗門下莫不家發豐城之劍人懷射斗之光但頺靡之餘叢席草創法紀未詳近一二老成留意舊章者亦既神而明之然綱要未經提揭而條理依舊參商予二十年前與呆翁和尚同參濟下尊宿每抗論及此葢不勝扼腕焉既而南北各師吳楚異域和尚久出世名藍為東南衲子所皈一日竟拂衣去抱特立之志走天下名山川廣搜博採二十年來而列祖提綱成自粤北歸首抵金陵過我攝山燒燈道故爰出是書命為弁首快意之餘焚香載讀如登百丈堂見聲鐘伐鼓千五百人濟濟蹡蹡載奔載拜也至於法言之超卓眼目之分明四百餘人如出一人四十餘卷不多一字集者之心力真鎔鑄古今矣或云禪貴妙悟文言其末規則奚為設若令世尊降天垂寶葢之重向紙錢灰裏坐臥舍花雨梵樂之供就厨房竹筒裏覔食則四十九年百萬人天將何所瞻依何所開悟耶抑思沛公之馬上終歸制度鵬舉之野戰還習陣圖安有到潼關云見天子外宮墻能富百官也是書也三百餘種三千餘則合上下古今人先型俱在目擊道存皆和尚之血心片片赤手提持倘或承言滯句播弄篇章帶累呆和尚沒量罪過而列祖亦沒量罪過也康熈七年正月上元日列祖提綱緣起武林十八㵎理安禪寺住持婁東行悅述宗門列祖之機緣拈頌禪燈諸錄載之詳矣宋元諸尊宿見後學罕能通究復為採摭機緣繫以拈頌別訂集本流布叢林使學者備考明辨易若指掌此真大法光明幢也其拈古集曰宗門統要頌古集曰頌古聯珠然統要又見續集聯珠亦見通集矣惟列祖陞座提綱語古今採集者闕如每遇叢林先輩咸為慨歎行悅人微道薄聞見陋狹勉承先輩之志借百丈清規住持日用諸事會集列祖提綱語二十年間蒐獵群䇿以事集言因言立事或今或古隨見隨書故無尊卑世次宗派異同僅如妙喜之正法眼藏其編次標題槩遵清規舊本所集古今提唱宗師四百餘人在臨濟至龍池幻祖下三世止曹洞至壽昌經祖下三世止雲門澄祖下二世止其溈仰雲門法眼及五宗前正傳旁出諸祖各收至燈錄止處提綱語三千餘則叢林所宜事務之要三百餘種命曰列祖提綱錄次四十二卷雖列祖提持佛法大綱旨要固不在茲而於唱道立言之體大略備矣庚子春因謝先南㵎院事乃擕是稿浪遊東感都督栗公性然并劉公新菴鳳菴兩護法喜流通大法捐資共為剞劂首倡雄郡郡伯陸公孝山葭州太尊閔公捷宇保昌邑侯李公集公及王公曼壽李公茂先張公徧菴蕭公聖至等解槖捐資翕然樂助板刻既成謹書緣起於右康熈五年十二月成道日提綱錄凡例是書大要以清規諸事為綱列祖提綱作目但從上列祖提持大法綱要本不合分門別類同世間事類備要等書柰有祖以來所遺微言妙句散漫不一學者縱欲博覽而禪門典籍未必盡備縱備未必盡諳先德說法大故因借清規住持日用諸事略詳其槩猶全鼎一臠大海一滴用被初機兼資閎覽聖節在至元重編清規中只詳啟建聖節上堂軌儀至如滿散除疏語外皆未詳也見圓悟諸祖俱有聖節滿散語愚恐至元以前古清規內有此成式不敢遽遺故立為滿散一種又見演祖諸師不分啟散而單名聖節者此一種似乎難頓只得從權亦立為正節如此等類是編常有大凡提綱之名但與清規九章相近即為編立若非切事應機與九章太不相合及雷同前輩者俱不載提綱篇首如先德單目上堂示眾不立別名者俱借五參一事統攝若九章內疊見而屢編者在五參晚參及四節小參內亦少收夏前告香普說在先德全部錄中不能多見又欲如清規法式者更是難得是編僅錄古林月江二尊宿語存其古意又特請普說單載大慧者彰其機辨縱橫波瀾浩大也是編無關宗派凡尊宿提綱有合於從上法式其言句又得簡古而開人眼目者槩收佛法住持日用陞座上堂小參普說等體在清規儀禮中久已詳明今時諸方往往訛傳混行甚至疊用二號者雖於化門無大關係殊欠典型故清規一書不可不時置案頭所以是編提綱篇首所載陞座上堂等名各依先德舊本槩不敢少有更異是編問答機緣一槩不錄主於提綱故也如就當機問答提唱者間載一二事遇提綱多者多收少者不妨一則所貴存其事耳如清規所載請主喪者為大方宗師舉遷化諸佛事內有唱衣時提衣佛事法語愚曾徧索古今缺如然提衣之名仍載諸目錄一以使後學知法門有此大體次待後來好古者補行餘悉類此提綱後凡有敘謝結座二種一槩不刪諸祖提綱或在大藏或在群書雖比事尋索按語較對而訛闕雷同之陋深知不免實愧心力逮盡獨智難週耳伏望大方明眼宗師曲垂刪正列祖提綱錄總目卷首敘緣起凡例卷一祝釐聖節啟建八則正節日三十一則聖節滿散六則景命四齋月旦十四則月望十則初八念三共二則改元登極共二則千秋節二則受勅奉旨共九則卷二降香到七則受師號并紫衣共八則聖主請陞座三則天眷請陞座五則宗藩請陞座四則詔汰三則詔復五則卷三報恩聖忌六則聖后忌二則祈晴四則祈雨十四則謝雨五則祈雪二則謝雪二十則卷四報本佛降誕六十則卷五佛成道三十三則佛涅槃二十七則涅槃日先期率眾財一則卷六尊祖初祖忌拈香二十則百丈忌二則開山忌五則開山忌上堂三則嗣法師忌拈香三十三則嗣法師忌上堂七則嗣法師翁忌拈香二則師翁忌上堂二則掃歷代祖塔拈香四則祖塔塔主請上堂五則受業忌拈香一則父母忌共二則卷七住侍日用上堂五參一百五十則卷八上堂五參七十則卷九上堂五參一百六十七則卷十上堂五參一百七十九則卷十一上堂五參三十則晚參八則小參結制三十七則卷十二小參解制十五則小參冬夜二十七則卷十三小參歲夜三十六則小參對靈五則卷十四普說告香二則普說夏前告香四則普說中夏一則普說特請一則卷十五普說特請五則卷十六普說特請三則念誦十四則水陸會六則卷十七肅眾十九則訓童行一則為行者普說一則受法衣一則病起十七則掩關五則啟關三則近待尊宿引座二十則卷十八迎待尊宿敘謝五十九則護法至敘謝二十五則到宗剎諸山三十則卷十九施主請陞座特請十八則慶生十則祈嗣四則飯僧九則施齋田一則供羅漢七則放生五則供法衣九則卷二十供法帔二則供寶葢二則資冥二十二則受煎點眾請法嗣小參兼秉拂共三則通嗣書至六則法眷書至二則嗣法師遺書至二則為嗣法師舉哀六則二親遺書至一則歸省受業三則卷二十一受請陞座拈衣五則拈勅黃六則拈護法疏七則拈公帖六則指法座五則登座垂語四則受請提綱二十六則再受請提綱二則受請當晚小參五則辭眾六則頭首受請住持引座十六則卷二十二頭首受請借座陞座五則頭首受請當晚小參一則頭首受請借座辭眾一則入院炷香佛事三門三十二則佛殿三十三則伽藍堂十二則祖堂二十二則據室三十五則到院上堂二十四則卷二十三開堂祝聖佛事拈勅黃三則捧御香二則拈劄付九則拈公帖四則拈護法疏二十則拈方外交疏五則拈山門疏九則拈諸山疏二則拈三宗疏二則拈宗剎疏二則拈江湖疏五則指法座四十二則拈祝太上皇皇太后等香四則拈祝聖香二十則拈護法香十一則拈報謝香一則燒懷香四十則卷二十四白椎後垂語四十三則請就別剎開堂八則入院後請開堂二十六則卷二十五入院日請開堂四十則卷二十六入院日請開堂八則載住入院十則當晚小參十六則卷二十七當晚小參十三則載住當晚小參二則為建寺檀越陞座一則管待耑使四則留請兩序五則報謝出入七則報謝回寺八則卷二十八報謝回寺十八則白眾出隊六則出隊歸二十則立聖像胎骨二則入腹臟三則開光明十則聖像成九則卷二十九請藏經一則捨經圅一則迎經開經共四則焙經補經共二則營建劈草一則開基立磉共三則竪柱二則上梁八則挂寺額二則落成九則鑄鑊一則結竈進火共三則法座成三則建寶塔一則上塔珠寶索共三則相輪合尖共二則建壽塔一則定基開基共二則立石開閉共三則請行橋并謝共五則開田并謝看共四則卷三十退院辭眾二十則退院載歸四則為住持遷化佛事入龕移龕共一則鎻龕四則法堂挂真三則舉哀二則奠茶湯三則大夜對靈小參二則起龕四則全身入塔四則闍維奠茶湯一則秉炬五則卷三十一秉炬四則安骨二則起骨轉骨共二則煆骨二則靈骨入塔三則撒骨一則入祖堂安牌五則估唱提衣缺法語下遺書尊宿訃至二十則兩序請西序頭首三則請兩堂首座十則留首座二則請藏主侍者共五則請東序知事一則請監寺提點共三則請典座三則卷三十二兩序請修造二則請化主五則發化主十則請監收四則舉名德兼法嗣立僧十四則立僧後秉命普說一則秉命入室後普說一則兩序進退五則挂鉢時請知事二則請兩序三則卷三十三謝西序頭首六則謝兩堂首座十則謝書記藏主七則謝知殿侍者共二則謝東序知事六則謝都監監院共五則謝維那三則謝典座三則謝化主十一則謝莊主一則謝諸莊監收五則謝兩序十則剃髮執刀垂示十則付衣垂示八則卷三十四大眾度僧上堂七則付戒八則辦道具鉢盂拄杖拂子共三則大挂搭歸堂四則名勝挂搭一則普請七則為亡僧鎻龕六則起龕十八則奠茶湯二則住持為亡僧秉炬四十則卷三十五住持為亡僧秉炬三十五則起骨三則煆骨三則入塔二十一則撒骨一則為尼起龕二則秉炬二則入塔二則為優婆塞起棺一則秉炬五則起骨一則入壙撒土十則點主一則為優婆夷起棺三則秉炬八則煆骨一則入塔三則撒骨一則點主一則建楞嚴會三則卷三十六節臘結制九十則卷三十七中夏十二則建盂蘭盆會一則解制七十五則卷三十八頭首四節秉拂結制四則解制二則冬夜二則歲夜三則住持謝四