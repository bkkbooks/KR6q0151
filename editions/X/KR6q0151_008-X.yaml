body:
  text: 武林十八㵎理安禪寺住持婁東行悅集五參提綱大愚芝禪師上堂大愚相接大雄孫五湖雲水競頭奔競頭奔有何門擊箭寧知枯木存枯木存一年還曾兩度春兩度春帳裏珍珠撒與人撒與人思量也是慕西秦上堂一擊響玲瓏喧轟宇宙通知音纔側耳項羽過江東與麼會恰認得驢鞍橋作阿爺下頷上堂竪窮三際橫遍十方拈起也帝釋心驚放下也地神膽戰不拈不放喚作甚麼自云蝦䗫上堂三世諸佛不知有狸奴白牯却知有乃拈起拂子云狸奴白牯總在者裡放光動地何謂如此兩段不同上堂大洋海底排班立從頭第二𩯭毛斑為甚麼不道第一𩯭毛斑要會麼金蘂銀絲成玉露高僧不坐鳳凰臺上堂眾集乃曰為眾竭力禍出私門便下座示眾擎起香合云明頭合暗頭合道得天下橫行若道不得且合却下座上堂沙裏無油事可哀翠巖嚼飯餧嬰孩他時好惡知端的始覺從前滿面埃擊禪床下座法華舉禪師上堂釋迦不出世達磨不西來佛法偏天下談玄口不開上堂鐘鳴皷響鵲噪鴉鳴為你諸人說般若講涅槃了也諸人還信得及麼觀音菩薩向諸人面前作大神通若信不及却往他方救苦利生去也上堂開口又成增語不開口又成剩語乃曰金輪天子勅草店家風別上堂三世諸佛口挂壁上天下老和尚作麼生措手你諸人到諸方作麼生舉山僧恁麼道也是久日樺來唇喝一喝上堂古者道我若一向舉揚宗教法堂裏草深一丈不可為闍黎鎻却僧堂門去也雖然如是也是烏龜陸地弄塵行上堂語漸也返常合道論頓也不留朕迹直饒論其頓返其常也是抑而為之浮山遠禪師上堂諸佛出世建立化門不離三身智眼亦如摩醯首羅三目何故一隻水泄不通緇素難辨一隻大地全開十方通暢一隻高低一顧萬類齊瞻雖然若是本分衲僧陌路相逢別具通天正眼始得所以道三世諸佛不知有狸奴白牯却知有且道狸奴白牯知有箇甚麼事要會麼深秋簾幙千家雨落日樓臺一笛風寶應昭禪師上堂十二時中許你一時絕學即是學佛法不見阿難多聞第一却被迦葉擯出不得結集方知聰明博學記持憶想向外馳求與靈覺心轉沒交涉五蘊殻中透脫不過順情生喜違情生怒葢覆深厚自纏自縛無有解脫流浪生死六根為患眾苦所逼無自由分而被妄心於中主宰大丈夫兒早搆取好喝一喝曰參上堂寶應門風險入者喪全身作麼生是出身一句若道不得三十年後達觀潁禪師示眾曰纔涉唇吻便落意思盡是死門俱非活路直饒透脫猶在沉淪莫教孤負平生虗度此世要得不孤負平生麼拈拄杖卓一下曰須是莫被拄杖瞞始得看看拄杖子穿過你諸人髑髏𨁝跳入你鼻孔裏去也又卓一下上堂山僧門庭別已改諸方轍為文殊拔出眼裏楔教普賢休嚼口中鐵勸人放開髂蛇手與汝斫却繫驢橛駐意擬思量喝曰揑揑參上堂山僧平生意好相撲祇是無人搭對今日且共首座搭對捲起袈裟下座索首座相撲座纔出師曰平地上喫交便歸方丈上堂三世諸佛是奴婢一大藏教是涕唾良久曰且道三世諸佛是誰奴婢乃將拂子畫一畫曰三世諸佛過者邊且道一大藏教是誰涕唾師乃自唾一唾上堂秤錘井底忽然浮老鼠多年變作牛慧空見了拍手笑三脚猢猻差異猴上堂五千教典諸佛常談八萬塵勞眾生妙用猶未是金剛眼睛在如何是金剛眼睛良久曰瞎上堂大眾集定有僧纔出禮拜師曰欲識佛性義當觀時節因緣僧便問如何是時節因緣師便下座上堂諸方鈎又曲餌又香奔凑猶如蜂抱王因聖者裏鈎又直餌又無猶如水底捺葫蘆舉拄杖作釣魚勢曰深水取魚長信命不曾將酒祭江神擲拄杖下座大寧寬禪師上堂少林妙訣古佛家風應用隨機卷舒自在如拳作掌開合有時似水成漚起滅無定動靜俱顯語嘿全彰萬用自然不勞心力到者裏喚作順水放船且道逆風舉棹誰是好手良久曰弄潮須是弄潮人喝一喝曰珍重上堂無念為宗無住為本真空為體妙有為用所以道盡大地是真空徧法界是妙有且道是甚麼人用得四時運用日月長明法本不遷道無方所隨緣自在逐物昇沉此土他方入凡入聖雖然如是且道入鄉隨俗一句作麼生道良久曰西天梵語此土唐言雲峰悅禪師上堂竿木隨身逢場作戲然雖如是一手不獨拍眾中莫有作家禪客本分衲僧出來共相唱和有麼時有僧出禮拜師曰依稀似曲纔堪聽又被風吹別調中便下座上堂普賢行文殊智補陀巖上清風起瞎驢趂隊遇新羅吉獠舌頭三千里上堂拈起拄杖曰掌鉢盂向香積世界為甚麼出身無路挑日月於拄杖頭上為甚麼有眼如盲直得風行草偃響順聲和無纖芥可留猶是交爭底法作麼生是不交爭底法卓拄杖下座上堂教中道種種取捨皆是輪回未出輪回而辨圓覺彼圓覺性即同流轉若免輪回無有是處你等諸人到者裏且作麼生辨圓覺良久曰荷葉團團團似鏡菱角尖尖尖似錐以拂擊禪床大乘遵禪師上堂上來又不問下去又不疑不知是不是是即也大奇便下座仁壽珍禪師上堂明明無悟有法即迷日上無雲麗天普照眼中無翳空本無花無智人前不得錯舉參翠巖真禪師上堂先德道此事如𪹼龜文𪹼即成兆不𪹼成鈍𪹼與不𪹼直下便揑上藍即不然無固無必虗空走馬旱地行船南山起雲北山下雨遂拈拄杖曰拄杖子變作天大將軍巡歷四天下有守節不守節有戒行無戒行一時奏與天帝釋乃喝一喝曰丈夫自有衝天志莫向如來行處行卓一下上堂舉龍牙頌曰學道如鑽火逢煙未可休直待金星現歸家始到頭神鼎曰學道如鑽火逢煙即便休莫待金星現燒脚又燒頭師曰若論頓也龍牙正在半途若論漸也神鼎猶少悟在於此且復如何諸仁者今年多落葉幾處掃歸家上堂臨陣抗敵不懼生死者將軍之勇也入山不懼虎兕者獵人之勇也入水不懼蛟龍者漁人之勇也作麼生是衲子之勇拈拄杖曰者箇是拄杖子拈得把得動得三千大千世界一時搖動若拈不得把不得動不得文殊自文殊解脫自解脫參上堂舉僧問巴陵如何是道陵曰明眼人落井又問寶應如何是道應曰五鳳樓前又問首山如何是道山曰脚下深三尺此三轉語一句壁立千仞一句陸地行船一句賓主交參諸人莫有揀得者麼出來道看如無且行羅漢慈破結賊故行菩薩慈安眾生故行如來慈得如相故武泉政禪師上堂黃梅席上海眾千人付法傳衣碓坊行者是則紅日西昇非則月輪東上參雙峰回禪師上堂南番人汎船塞北人搖擄波斯入大唐須彌山作舞是甚麼說話道吾真禪師上堂古今日月依舊山河若明得去十方薄伽梵一路涅槃門若明不得謗斯經故獲罪如是上堂獅子兒哮吼龍馬駒𨁝跳古佛鏡中明三山孤月皎遂作舞下座上堂舉洞山道五臺山上雲蒸飯佛殿堦前狗尿天剎竿頭上煎鎚子三箇猢猻夜簸錢老僧即不然三面狸奴脚踏月兩頭白牯手拏煙戴冠碧兔立庭栢脫殻烏龜飛上天老僧葛藤盡被汝諸人破了也洞山老人甚是奇特雖然如是祇行得三步四步且不過七跳八跳且道誵訛在甚麼處老僧今日不惜眉毛一時布施良久曰叮嚀損君德無言真有功任從滄海變終不為君通上堂古人道認著依前還不是實難會土宿頷下髭鬚多波斯眼深鼻孔大甚奇怪歘然透過新羅界上堂山前麥熟廬陵米價鎮州蘿蔔更有一般良久曰時挑野菜和根煑旋斫生柴帶葉燒上堂普化明打暗打布袋橫撒竪撒石室行者踏碓因甚忘却下脚上堂舉僧問首山如何是佛山曰新婦騎驢阿家牽師曰手提巴鼻脚踏尾仰面看天聽流水天明送出路傍邊夜靜還歸茅屋裏百丈政禪師上堂巖頭和尚用三文錢索得箇妻祇解撈鰕摝蜆要且不解生男育女直至如今門風斷絕大眾要識奯公妻麼百丈今日不惜唇吻與你諸人注破蓬𩯭荊釵世所稀布裙猶是嫁時衣大溈乾禪師上堂山花似錦文殊撞著眼睛幽鳥綿蠻觀音塞却耳際諸仁者更思量箇甚麼昨夜三更睡不著翻身捉得普賢貶向無生國裏一覺直至天明今朝又得與諸人相見說夢噫是甚麼說話卓拄杖下座廣法源禪師上堂若論此事切莫道著道著即頭角生有僧出曰頭角生也師曰禍事曰某甲罪過師曰龍頭蛇尾伏惟珍重定慧信禪師上堂若識般若即被般若縛若不識般若亦被般若縛識與不識拈放一邊却問諸人如何是般若體參堂去上堂泥蛇咬石鼈露柱啾啾叫須彌打一棒閻老呵呵笑參上堂鶯聲闌蟬聲急入水烏龜頭不濕鷺鷥飛入蘆花叢雪月交輝俱不及吽姜山方禪師上堂穿雲不渡水渡水不穿雲乾坤把定不把定虗空放行不放行橫三竪四乍離乍合將長補短即不問汝諸人飯是米做一句要且難道良久曰私事不得官酬上堂不是道得道不得諸方盡把為奇特寒山燒火滿頭灰笑罵豐干者老賊白鹿端禪師上堂摩騰入漢肉上剜瘡僧會來吳眼中添屑達磨九年面壁鬼魅之由二祖立雪求心翻成不肖汝等諸人到者裏如何吐露若也道得海上橫行若道不得林間獨臥以拄杖擊禪床一下福嚴宗禪師上堂世尊周行七步舉足全乖目顧四方觸途成滯金襴授去殃及兒孫玉偈傳來挂人唇吻風幡悟性未離色塵鉢水投針全成管見祖師九年面壁不見纖毫盧公六代傳衣圖他小利江西一喝不解慎初德嶠全施未知護末南山鼈鼻謾指蹤由北院枯松徒彰風彩雲門顧鑒落二落三臨濟全提錯七錯八若說君臣五位直如紙馬過江更推賓主交參恰似泥人澡洗獨超象外且非捉兔走鷹混迹塵中未是齩猪之狗何異逃坑墮壍正是避溺投罝如斯之解正在常途出格道人如何話會豈不見陶潛俗子尚自覩事見機而今祖室子孫不可皮下無血喝一喝淨因臻禪師上堂拈拄杖曰楖栗木杖子善能談佛祖聾人既得聞瘂人亦解語指白石為玉點黃金為土便恁麼會去他家未相許不相許莫莽鹵南街打鼓北街舞衡嶽能禪師上堂宗風纔舉萬里雲收法令若行千峰寒色須彌頂上白浪滔天大海波中紅塵滿地應思黃梅昔日少室當年不能退己讓人遂使舂糠答志斷臂酬心何似衡嶽者裏山畬粟米飯一桶沒鹽羮苦樂共住隨高就低且不是南頭買貴北頭賣賤直教文殊稽首迦葉攢眉龍樹馬鳴吞聲飲氣目連鶖子且不能為為甚如此諦觀法王法法王法如是石佛忠禪師上堂點時不到皂白未分到時不點和泥合水露柱𨁝跳入燈籠裡即且從他汝眉毛因甚麼却拖在脚跟下直饒於此明得也是猢猻戴席帽於此未明何異曲膳穿靴然雖如此笑我者多哂我者少大溈喆禪師上堂古佛道昔於波羅柰轉四諦法輪墮坑落壍今復轉最妙無上大法輪土上加泥如今還有不歷階梯獨超物外者麼良久曰出頭天外看誰是箇中人上堂阿剌剌是甚麼翻思當年破竈墮杖子忽擊著方知孤負我以拄杖擊香臺一下曰墮墮上堂捫空追響勞汝精神夢覺覺非復有何事德山老人在汝諸人眉毛眼睫上諸人還覺麼若也覺去夢覺覺非若也未覺捫空追響終無了期直饒向者裏倜儻分明猶是梯山入貢還有獨超物外者麼良久曰且莫詐明頭上堂白雲澹泞水注滄溟萬法本閒復有何事所以道也有權也有實也有照也有用諸人到者裏如何履踐良久曰但有路可上更高人也行上堂山僧本無積畜且得粥足飯足困來即便打眠一任東卜西卜上堂古德道一釋迦二元和三佛陀自餘是甚麼椀脫丘慧光即不然一釋迦二元和三佛陀總是椀脫丘諸人還知慧光落處麼若也知去許你具鐵眼銅睛若也不知莫謂幾經風浪險扁舟曾向五湖遊上堂拈起拄杖曰一塵纔起大地全收卓一下曰妙喜世界百雜碎且道不動如來即今在甚麼處若人識得可謂不動步而登妙覺若也未識向諸人眉毛眼睫裏涅槃去也又卓一下上堂拈起拄杖曰智海拄杖或作金剛王寶劍或作踞地獅子或作探竿影草或不作拄杖用諸人還相委悉麼若也委悉去如龍得水似虎靠山出沒卷舒縱橫應用如未相委大似日中逃影普融平禪師上堂山僧不會佛法為人總沒來由或時半開半合或時全放全收還如萬人叢裏冷地掉箇石頭忽然打著一箇方知觸處周流上堂舉盤山示眾曰似地擎山不知山之孤峻如石含玉不知玉之無瑕古人恁麼說話大似抱贓叫屈智海門下人人慷慨生擒虎兕活捉獰龍眼裏著得須彌山耳裏著得大海水遂拈拄杖曰不是向人誇伎倆丈夫標致合如斯卓拄杖下座慶善隆禪師上堂花簇簇錦簇簇鹽醬年來事事足留得南泉打破鍋分付沙彌煑晨粥晨粥一任諸人喫洗鉢盂一句作麼生會多少人疑著香山淵禪師上堂酒市魚行頭頭寶所鵶鳴鵲噪一一妙音卓拄杖曰且道者箇是何佛事狼籍不少上堂香山有箇話頭彌滿四大神洲若以佛法批判還如認馬作牛諸人既不作佛法批判畢竟是甚麼道理擊拂子無鑐鏁子不厭動搖半夜枕頭要須摸著下座無相真禪師上堂欲明向上事須具頂門眼若具頂門眼始契出家心既契出家心常具頂門眼要會頂門眼麼四京人著衣喫飯兩浙人飽暖自如通玄峰頂香風清花發蟠桃三四株黃龍南禪師上堂橫吞巨海倒卓須彌衲僧面前也是尋常茶飯行脚人須是荊棘林內坐大道場向和泥合水處認取本來面目且作麼生見得遂拈拄杖曰直饒見得未免山僧拄杖上堂說妙談玄乃太平之姦賊行棒行喝為亂世之英雄英雄姦賊棒喝玄妙皆為長物黃蘗門下總不用著且道黃蘗門下尋常用箇甚麼喝一喝上堂撞鐘鐘鳴擊鼓鼓響大眾慇懃問訊同安端然合掌者箇是世法那箇是佛法咄上堂有一人朝看華嚴暮觀般若晝夜精勤無有暫暇有一人不參禪不論義把箇破蓆日裏睡於是二人同到黃龍一人有為一人無為安下那一箇即是良久曰功德天黑暗女有智主人二俱不受上堂心王不妄動六國一時通罷拈三尺劍休弄一張弓擊禪床下座上堂道遠乎哉觸事而真聖遠乎哉體之即神乃拈拄杖曰道之與聖總在歸宗拄杖頭上汝等諸人何不識取若也識得十方剎土不行而至百千三昧無作而成若也未識有寒暑兮促君壽有鬼神兮妬君福上堂半夜捉烏鷄驚起梵王睡毗嵐風忽起吹倒須彌山官路無人行私酒多人喫當此之時臨濟德山開得口張得眼有棒有喝用不得汝等諸人各自尋取祖業契書莫認驢鞍橋作阿爺下頷上堂舉大珠和尚道身口意清淨是名佛出世身口意不淨是名佛滅度也好箇消息古人一期方便與你諸人計箇入路既得箇入路又須得箇出路登山須到頂入海須到底登山不到頂不知宇宙之寬廣入海不到底不知滄溟之淺深既知寬廣又知淺深一踏踏翻四大海一摑摑到須彌山撒手到家人不識鵲噪鴉鳴栢樹間上堂千般說萬般喻祇要教君早回去去何處良久云夜來風起滿庭香吹落桃花三五樹上堂拈拄杖曰橫拈倒用撥開彌勒眼睛明去暗來敲落祖師鼻孔當是時也目連鶖子飲氣吞聲臨濟德山呵呵大笑且道笑箇甚麼咄黃龍心禪師上堂大凡窮生死根源直須明取自家一片田地教伊去處分明然後臨機應用不失其宜祇如鋒芒未兆已前都無是箇非箇瞥爾𪹼動便有五行金土相生相尅胡來漢現四姓雜居各任方隅是非鋒起致使玄黃不辨水乳不分疾在膏肓難為救療若不當陽曉示窮子無以知歸欲得大用現前便可頓忘諸見諸見既盡昏霧不生大智洞然更非他物珍重上堂擊禪床曰一塵纔舉大地全收諸人耳在一聲中一聲徧在諸人耳若是摩霄俊鶻便合乘時止濼困魚徒勞激浪上堂不與萬法為侶即是無諍三昧便恁麼去爭奈絃急則聲促若能向紫羅帳裏撒珍珠未必善因而招惡果上堂有句無句如藤倚樹且任諸人點頭及乎樹倒藤枯上無衝天之計下無入地之謀靈利漢者裏著得一隻眼便見七縱八橫舉拂子曰看太陽溢目萬里不挂片雲若是覆盆之下又爭怪得老僧上堂若也單明自己不悟目前此人有眼無足若悟目前不明自己此人有足無眼據此二人十二時中常有一物蘊在胷中物既在胷不安之相常在目前既在目前觸途成滯作麼生得平穩去祖不言乎執之失度必入邪路放之自然體無去住上堂良工未出玉石不分巧冶無人金沙混雜還言無師自悟底麼出來辦別看乃舉拂子曰且道是金是沙良久曰見之不取思之千里上堂有時開門待知識知識不來過有時把手上高山高山人不顧或作敗軍之將向闍黎手裡拱手歸降或為忿怒那吒敲骨打髓正當恁麼時還有同聲相應同氣相求底麼有則向百尺竿頭進取一步如無少室峰前一場笑具上堂心同虗空界示等虗空法證得虗空時無是無非法便恁麼休去停橈把且向灣裏泊船若據衲僧門下天地懸隔且道衲僧門下有甚長處楖栗橫擔不顧人直入千峰萬峰去上堂一不向二不開翻思南嶽與天台堪笑白雲無定止被風吹去又吹來上堂過去諸佛已滅未來諸佛未生正當現在佛法委付黃龍放行則恍恍惚惚其中有物把住則杳杳冥冥其中有精且道放行即是把住即是竿頭絲線從君弄不犯清波意自殊上堂虎頭生角人難措石火電光須密布假饒烈士也應難懵底那能善回互手擎日月背負須彌擲向他方其中眾生不覺不知其中眾生騎驢入諸人眼裏諸人亦不覺不知會麼將此身心奉塵剎是則名為報佛恩上堂一漚未發古帆未征風信不來無人舉櫂正當恁麼時水脈如何辨的君不見雲門老垂手處落落清波無透路又不見華亭叟泄天機夜深空載月明歸莫怪相逢不相識從教萬古漫漫黑上堂馬祖陞堂百丈卷席後人不善來風盡道不留朕迹殊不知桃華浪裏正好張帆七里灘頭更堪垂釣如今必有辯浮沉識深淺底漢試出來定當水脉看如無且將漁父笛閒向海邊吹上堂風瀟瀟兮木葉飛鴻鴈不來音信稀還鄉一曲無人吹令余拍手空遲疑上堂鏡像或謂有攬之不盈手鏡像或謂無分明如儼圖所以取不得舍不得不可得中祇麼得還會麼不作維摩詰又似傅大士上堂夫玄道者不可以設功得聖智者不可以有心知真諦者不可以存我會至功者不可以營事為古人一期應病與藥則不可若是丈夫漢出則經濟天下不出則卷而懷之爾若一向聲和響順我則排斥諸方爾若示現酒肆婬坊我則孤峰獨宿且道甚處是黃龍為人眼雲居祐禪師上堂過去諸如來更不再勘現在諸菩薩放過即不可未來修學人謾他一點不得所以教中道若人欲了知三世一切佛應觀法界性一切惟心造雖然如是雲居門下正是金屑落眼上堂凡見聖見春雲掣電真說妄說空花水月飜憶長髭見石頭解道紅爐一點雪擊禪床下座上堂龜毛為箭兔用為弓那吒忿怒射破虗空虗空撲落傾湫倒嶽牆壁瓦礫放光明歸依如來大圓覺擊禪床下座上堂月色和雲白松聲帶露寒好箇真消息憑君子細看黃龍先師和身放倒還有人扶得起麼祖禰不了殃及兒孫擊禪床下座上堂一切聲是佛聲以拂子擊禪床曰梵音深遠令人樂聞又曰一切色是佛色乃拈起拂子曰今佛放光明助發實相義已到之者頂戴奉行未到之者應如是知應如是信擊禪床下座黃檗勝禪師上堂臨濟喝德山棒留與禪人作模範歸宗磨雪峰毬此箇門庭接上流若是黃檗即不然也無喝也無棒亦不推磨亦不輥毬前面是案山背後是主山塞却你眼睛拶破你面門於此見得得不退轉地盡未來際不向他求若見不得醍醐上味飜成毒藥上堂寂兮寥兮蟾蜍皎皎下空谷寬兮廓兮曦光赫赫流四海曹谿路上勦絕人行多子塔前駢闐如市直饒者裏薦得倜儻分明未是衲僧活計大丈夫漢須是向黑暗獄中敲枷打鎻餓鬼隊裏放火奪漿推倒慈氏樓折却空王殿靈苗瑞草和根拔滿地從教荊棘生開元琦禪師上堂虗空無內外事理有短長順則成菩提逆則成煩惱燈籠常瞌睡露柱亦懊惱大道在目前更於何處討以拂子擊禪床上堂四面亦無門十方無壁落頭鬔鬆耳卓朔箇箇男兒大丈夫何得無繩而自縛且道透脫一句作麼生道良久曰踏破草鞋赤脚走福嚴感禪師上堂古佛心祇如今若不會苦沉吟秋雨微微秋風颯颯乍此乍彼若為酬答沙岸蘆華青黃交雜禪者何依良久曰劄雲葢智禪師上堂緊峭離水靴踏破湖湘月手把鐵蒺蔾打破龍虎穴翻身倒上樹始見無生滅却笑老瞿曇彈指超彌勒上堂昨日高山看釣魚步行騎馬失却驢有人拾得駱駝去重賞千金一也無若向者裏薦得不著還草鞋錢上堂舉趙州問僧向甚麼處去曰摘茶去州曰閒師曰道著不著何處摸索背後龍鱗面前驢脚翻身筋斗孤雲野鶴阿呵呵報慈英禪師上堂師擲下拄杖却召大眾曰拄杖吞却祖師了也教甚麼人說禪還有人救得也無喝一喝保寧璣禪師上堂春雨微微百事皆宜禾苗發秀蔬菜得時阿難如合掌迦葉亦攢眉直饒靈山會上拈華微笑筭來猶涉離微爭似三家村裏老翁深耕淺種各知其時有事當面便說誰管瞬目揚眉更有一般奇特事末後一著更須知擊拂子下座四祖演禪師上堂主山吞却案山尋常言論拄杖子普該塵剎未足為奇光境兩忘復是何物良久曰劫火洞然毫末盡青山依舊白雲中清隱源禪師上堂先師初事棲賢諟泐潭澄歷二十年宗門奇奧經論玄要莫不貫穿及因雲峰指見慈明則一字無用遂設三關語以驗學者而學者如葉公畫龍龍現即怖積翠永庵主示眾山僧住庵來無禪可說無法可傳亦無羞珍異寶祇收得續火柴頭一箇留與後人令他煙𦦨不絕火光長明遂擲下拂子時有僧就地拈起吹一吹師便喝曰誰知續火柴頭從者漢邊煙消火滅去乃拂袖歸庵僧吐舌而去黃龍新禪師上堂深固幽遠無人能到釋迦老子到不到若到因甚麼無人若不到誰道幽遠上堂祖師心印狀似鐵牛之機去即印住住即印破祇如不去不住印即是不印即是金果早朝猿摘去玉華晚後鳳銜歸上堂行脚高人解開布袋放下鉢囊去却藥忌一人所在須到半人所在須到無人所在也須親到上堂拗折拄杖將甚麼登山渡水拈却鉢盂匙箸將甚麼喫粥喫飯不如向十字街頭東卜西卜忽然卜著是你諸人有彩若卜不著也怪雲巖不得上堂文殊騎獅子普賢騎象王釋迦老子足躡紅蓮且道黃龍騎箇甚麼良久曰近來年老一步是一步上堂清珠下於濁水濁水不得不清念佛投於亂心亂心不得不佛佛既不亂濁水自清濁水既清功歸何所良久曰幾度黑風翻大海未曾聞道釣舟傾上堂有時破二作三有時會三歸一有時三一混同有時不落數量且道甚麼處是黃龍為人處良久曰珍重泐潭清禪師上堂舉浮山遠和尚云欲得英俊麼仍須四事俱備方顯宗師蹊徑何謂也一者祖師巴鼻二具金剛眼睛三有獅子爪牙四得衲僧殺活拄杖得此四事方可縱橫變態任運卷舒高聳人天壁立千仞儻不如是守死善道者敗軍之兆何故棒打石人貴論實事是以到者裏得不修江耿耿大野雲凝綠竹含煙青山鎻翠風雲一致水月齊觀一句該通已彰殘朽師曰黃龍今日出世時當末季佛法澆漓不用祖師巴鼻不用金剛眼睛不用獅子爪牙不用殺活拄杖祇有一枝拂子以為蹊徑亦能縱橫變態任運卷舒亦能高聳人天壁立千仞有時逢強即弱有時遇貴即賤拈起則群魔屏迹佛祖潛蹤放下則合水和泥聖凡同轍且道拈起好放下好竿頭絲線從君弄不犯清波意自殊雙峰齊禪師上堂拈拄杖曰橫拈倒用諸方虎步龍行打狗撑門雙峰掉在無事甲裏因風吹火別是一家以拄杖靠肩顧視大眾喚作無事得麼良久曰刀尺高懸著眼看誌公不是閒和尚卓拄杖一下開先瑛禪師上堂談玄說妙譬如畫餅充饑入聖超凡大似飛蛾赴火一向無事敗種焦芽更若馳求水中捉月以拂子一拂云適來許多見解拂却了也作麼生是諸人透脫一句良久曰鐵牛不喫欄邊草直向須彌頂上眠以拂子擊禪床上堂彎石鞏弓架興化箭運那羅延力定爍迦羅眼不射大雄虎不射藥山鹿不射雲巖獅子不射象骨獼猴且道射箇甚麼良久曰放過一著法雲杲禪師上堂西來祖意教外別傳非大根器不能證入其證入者不被文字語言所轉聲色是非所迷亦無雲門臨濟之殊趙州德山之異所以唱道須明有語中無語無語中有語若向者裏薦得可謂終日著衣未甞挂一縷絲終日喫飯未甞齩一粒米直是呵佛罵祖有甚麼過雖然如是欲得不招無間業莫謗如來正法輪下座上堂拈拄杖曰歸宗會斬蛇禾山解打皷萬象與森羅皆從者裏去擲下拄杖曰歸堂喫茶湛堂準禪師上堂太陽門下日日三秋明月堂前時時九夏洞山和尚祇解夜半捉烏鷄殊不知驚起隣家睡寶峰相席打令告諸禪德也好冷處著把火咄上堂古人道不看經不念佛看經念佛是何物自從識得轉經人舉拂子曰龍藏聖賢都一拂以拂子拂一拂曰諸禪德正當恁麼時且道雲巖土地向甚麼處安身立命擲下拂子以兩手握拳叩齒曰萬靈千聖千聖萬靈上堂混元未判一氣岑寂不聞有天地玄黃宇宙洪荒日月盈昃秋收冬藏正當恁麼時也好箇時節尀耐雪峰老漢却向虗空裏打橛輥三箇木毬直至後人搆占不上便見溈山水牯牛一向膽大心麤長沙大蟲到處齩人家猪狗雖然無禮難容而今放過一著孝經序云朕聞上古其風樸略山前華堯民解元且喜尊候安樂參上堂僧問教中道若有一人發真歸源十方虗空悉皆消殞未審此理如何師遂展掌點指曰子丑寅卯辰巳午未一羅二土三水四金五太陽六太陰七計都今日計都星入巨蟹宮寶峰不打者皷笛便下座上堂大道縱橫觸事現成雲開日出水綠山青拈拄杖卓一下曰雲門大師來也說道觀音菩薩將錢買胡餅放下手元來却是饅頭大眾雲門祇見錐頭利不見鑿頭方寶峰即不然擲下拄杖曰勿於中路事空王䇿杖須還達本鄉昨日有人從淮南來不得福建信却道嘉州大象吞却陝府鐵牛喝一喝曰是甚說話笑倒雲居土地上堂祖師關捩子幽隱少人知不是悟心者如何舉似伊喝一喝曰是何言歟若一向恁麼達磨一宗掃土而盡所以大覺世尊初悟此事便開方便門示真實相普令南北東西四維上下郭大李二鄧四張三同明斯事雲巖今日不免傚古去也擊拂子曰方便門開也作麼生是真實相良久云十八十九痴人夜走示眾拈拄杖曰衲僧家竿木隨身逢場作戲倒把橫拈自有意思所以昔日藥山和尚問雲巖曰聞汝解弄獅子是否巖曰是山曰弄得幾出巖曰弄得六出山曰老僧亦解弄巖曰和尚弄得幾出山曰老僧祇弄得一出巖曰一即六六即一山便休大眾藥山雲巖鈍置殺人兩子父弄一箇獅子也弄不出若是準上座祇消得自弄拽得來拈頭作尾拈尾作頭轉兩箇金睛攫幾鈎鐵爪吼一聲直令百里內猛獸潛蹤滿空裏飛禽亂墜準上座未弄獅子請大眾高著眼先做箇定場擲下拄杖曰箇中消息子能有幾人知壽寧資禪師上堂諸方五日一參壽寧日日陞座莫怪重說偈言過在西來達磨上士處處逢渠後學時時蹉過且道蹉過一著落在甚麼處舉起拂子曰一片月生海幾家人上樓寶華鑑禪師上堂月圓伏惟三世諸佛狸奴白牯各各起居萬福時中淡薄無可相延切希寬抱老水牯牛近日亦自多病多惱不甘水草遇著暖日和風當下和身便倒教渠拽耙牽犂直是搖頭擺腦可憐萬頃良田一時變作荒草三祖宗禪師上堂架梯可以攀高雖升而不達河漢鑄鍬可以掘鑿雖利而不能到風輪其器者費功其謀者益妄不如歸家坐免使走塵壤大眾那箇是塵壤祖佛禪道黃龍清禪師上堂三世諸佛不知有恩無重報狸奴白牯却知有功不浪施明大用曉全機絕踪跡不思議歸去好無人知衝開碧落松千尺截斷紅塵水一溪洞山言禪師上堂吾心似秋月碧潭清皎潔無物堪比倫教我如何說寒山子勞而無功更有箇拾得道不識者箇意修行徒苦辛恁麼說話自救不了尋常拈糞箕把帚掣風掣顛猶較些子直饒是文殊普賢再出若到洞山門下一時分付與直歲燒火底燒火掃地底掃地前廊後架切忌攙匙亂筯豐干老人更不饒舌參退喫茶上堂一生二二生三遏捺不住廓周沙界德雲直上妙峰善財却入樓閣新婦騎驢阿家牽山青水綠桃華紅李花白一塵一佛土一葉一釋迦乃合掌曰不審諸佛子今晨改旦季春極暄起居輕利安樂行否少間專到上寮問訊不勞久立上堂臘月二十日一年將欲盡萬里未歸人大眾總是他鄉之客還有返本還源者麼擊拂子曰門前殘雪日輪消室內紅塵遣誰掃太平安禪師上堂有利無利莫離行市鎮州蘿蔔極貴廬陵米甚賤爭似太平者裏時豐道泰商賈駢闐白米四文一升蘿蔔一文一束不用北頭買賤西頭賣貴自然物及四生自然利資王化又爭生說箇佛法道理良久云勸君不用鐫頑石路上行人口似褒親瑞禪師上堂有佛世界以一塵一毛而作佛事令見一法者具足一切法故權為架閣有佛化內以忘言寂嘿為大佛事使其學者離一切相即名諸佛故好與三下火抄有佛土中以黃花翠竹而為佛事令覩相者見色即空故且付與彌勒有佛寶剎以法空為座而示佛事其行者不著佛求故勘破了勾下有佛道場以四事供養而成佛事使知足者斷異念故可與下載有佛妙域以一切語言三昧作其佛事令隨機入者不捨動靜故為渠裝載大眾且道於中還有優劣也無良久曰到者須知是作家參褒親諭禪師上堂新羅打皷大宋上堂庭前栢子問話燈籠露柱著忙香臺拄杖起作舞臥病維摩猶在床者老漢我也識得你病休訝郎當咄兜率恩禪師上堂落落魄魄是有居郭莽莽鹵鹵何今何古不重己靈休話佛祖扭定釋迦鼻孔揭却觀音耳朵任他雪嶺輥毬休管禾山打皷若是本色衲僧終不守株待兔參建隆慶禪師上堂始見新歲倐忽早是二月初一天氣和融擬舉箇時節因緣與諸人商量却被帝釋梵王在門外柳眼中努出頭來先說偈言裊裊颺輕絮且逐風來去相次走綿毬休言道我絮當時撞著阿修羅把住云任你絮忽逢西風吹渭水落葉滿長安一句作麼生道於是帝釋縮頭入柳眼中良久曰參兜率悅禪師上堂始見新春又逢初夏四時若箭兩曜如梭不覺紅顏翻成白首直須努力別著精神耕取自己田園莫犯他人苗稼既然如是牽犁拽耙須是雪山白牛始得且道鼻孔在甚麼處良久曰叱叱上堂常居物外度清時牛上橫將竹笛吹一曲自幽山自綠此情不與白雲知慶快諸禪德翻思范蠡謾泛滄波因念陳摶空眠太華何曾夢見浪得高名實未神遊閒漂野跡既然如此具眼衲僧莫道龍安非他是己好上堂無法亦無心無心復何捨要真盡屬真要假全歸假平地上行船虗空裏走馬九年面壁人有口還如啞參上堂夜夜抱佛眠朝朝還共起起坐鎮相隨語嘿同居止欲識佛去處祇是語聲是諸禪德大小傅大士祇會抱橋柱澡洗把纜放船印板上打將來模子裏脫將去豈知道本色衲僧塞除佛祖窟打破玄妙門跳出斷常坑不依清淨界都無一物獨奮雙拳海上橫行建家立國有一般漢也要向百尺竿頭凝然端坐洎乎翻身之際捨命不得豈不見雲門大師道知是般事拈放一邊直須擺動精神著些筋骨向混沌未剖已前薦得猶是鈍漢那堪更於他人舌頭上咂澹滋味終無了日諸禪客要會麼剔起眉毛有甚難分明不見一毫端風吹碧落浮雲盡月上青山玉一團喝一喝下座崇覺空禪師上堂十方無壁落四面亦無門淨躶躶赤灑灑沒可把遂舉拂子曰灌溪老漢向十字街頭逞風流賣惺惺道我解穿珍珠解玉版濄亂絲卷筒絹婬坊酒肆瓦合輿臺虎穴魔宮那吒忿怒遇文王興禮樂逢桀紂逞干戈今日被崇覺見一場懡㦬長靈卓禪師上堂曰三千劍客獨許莊周為甚麼跳不出良醫之門多病人因甚麼不消一劄已透關者更請辯看光孝清禪師上堂殺父殺母佛前懺悔殺佛殺祖不消懺悔為甚麼不消懺悔且得冤家解脫雪峰空禪師上堂一拳拳倒黃鶴樓一趯趯飜鸚鵡洲有意氣時添意氣不風流處也風流俊哉俊哉快活快活一似十七八歲狀元相似誰管你天誰管你地心王不妄動六國一時通罷拈三尺劍休弄一張弓自在自在快活快活恰似七八十老人作宰相相似風以時雨以時五穀植萬民安豎起拄杖曰大眾者兩箇并山僧拄杖子共作得一箇衲僧到雪峰門下但知隨例餐䭔子也得三文買草鞋喝一喝卓拄杖下座兜率照禪師上堂兜率都無伎倆也斆諸方榜樣五日一度陞堂起動許多龍象禪道佛法又無到此將何供養須知達磨西來分付一條拄杖乃拈起曰所以道你有拄杖子我與你拄杖子你無拄杖子我奪你拄杖子且道那箇是賓句那箇是主句若斷得去即途中受用若斷不得且世諦流布乃拋下拄杖雲巖遊禪師上堂馬祖一喝百丈蹉過臨濟小廝兒向糞掃堆頭拾得一隻破草鞋胡喝亂喝師震聲喝曰喚作胡喝亂喝得麼上堂象骨輥毬能已盡玄沙斫牌伎亦窮還知麼火星入袴口事出急家門上堂舉梁山曰南來者與你三十棒北來者與你三十棒然雖與麼未當宗乘後來琅瑘和尚道梁山好一片真金將作頑鐵賣却琅瑘則不然南來者與你三十棒北來者與你三十棒從教天下貶剝師拈曰一人能舒不能卷一人能卷不能舒雲巖門下一任南來北來且恁麼過驀然洗面摸著鼻頭却來與你三十上堂日可冷月可熱眾魔不能壞真說作麼生是真說初三十一中九下七若信不及雲巖與你道破萬人齊指處一鴈落寒空普賢素禪師上堂兵隨印轉三千里外絕煙塵將逐符行二六時中淨躶躶不用鐵旗鐵皷自然草偃風行何須七縱七擒直得無思不服所謂大丈夫秉慧劍般若鋒兮金剛𦦨非但能摧外道心早曾落却天魔膽正恁麼時且道主將是甚麼人喝一喝育王諶禪師上堂文殊智普賢行多年曆日德山棒臨濟喝亂世英雄汝等諸人穿僧堂入佛殿還知險過鐵圍關麼忽然踏著釋迦頂𩕳磕著聖僧額頭不免一場禍事上堂我若說有你為有礙我若說無你為無礙我若橫說你又跨不過我若竪說你又跳不出若欲叢林平怗大家無事不如推倒育王且道育王如何推得倒去召大眾曰著力著力復曰苦哉苦哉育王被人推倒了也還有路見不平劍相為底麼若無山僧不免自倒自起擊拂子下座道場林禪師上堂有漏笟籬無漏木杓庭白牡丹檻紅芍藥因思九年面壁人到頭不識者一著且道作麼生是者一著以拄杖擊禪床下座道場慧禪師上堂鍾馗醉裏唱涼州小妹門前祇點頭巡海夜叉相見後大家拍手上高樓大眾若會得去鎻却天下人舌頭若會不得將謂老僧別有奇特天童樸禪師上堂觀音巖玲玲瓏瓏太白石丁丁東東西園菜蟥似不堪食東谷花發却無賴紅且道是祖意教意途中受用世諦流布若辨不出雪峰覆却飯桶若辨得出甘贄禮拜蒸籠參上堂德山入門便棒臨濟入門便喝臨濟喝處德山棒頭耳聾德山棒時臨濟喝下眼瞎雖然一搦一擡就中全生全殺遂喝一喝卓拄杖一下云敢問諸人是生是殺良久云君子可入龍華高禪師上堂象王行獅子住赤脚崑崙眉卓豎寒山拾得笑呵呵指點門前老松樹且道他指點箇甚麼忽然風吹倒時好一堆柴
