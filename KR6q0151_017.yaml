body:
  text: 武林十八澗理安禪寺住持婁東行悅集肅衆提綱汾陽無德禪師一日謂衆曰夜來夢亡父母覓酒肉紙錢不免徇俗置以祀之事辦於庫堂設位如俗間禮酌酒行肉化紙錢訖令集知事頭首散其餘盤知事輩却之無德獨坐筵中飲啖自若衆僧數曰酒肉僧豈堪為師法耶腰包盡去惟慈明大愚泉大道等六七人在耳無德翼日上堂云許多間神野鬼祇消一盤酒肉兩陌紙錢斷送去了也法華經云此衆無枝葉惟有諸真實下座雪竇顯禪師因事示衆杜耳目於胎殼掩玄象於霄外而責宮商之異辨玄素之殊底是甚麼人還知麼那一箇者一箇兼本三人放過一著便下座因事示衆石本落落玉自碌碌古之今之一何𧬊速獅子不咬麒麟猛虎不食伏肉君不見洞庭孤島煙浪深木馬追風有人識因事示衆客從遠方來遺我徑寸璧中有四箇字字字無人識清涵鯨海寬冷射蟾輪窄今朝呈似看請道末後句雪巖欽禪師因事并謝首座十五日以前雷聲甚大雨點全無十五日以後時清道泰家國晏然正當十五日恭惟宿來各各道體起居萬福畢竟如何堂中首座人天眼目高峰妙禪師因事上堂水中鹹味色裏膠青決定是有不見其形竪拂子云見其形失却山前一村人眼睛天如則禪師因事示衆以拂子擊禪床左邊云莫認錯莫認錯通身是病通身藥擊右邊云莫錯認莫錯認通身是藥通身病竪拂云如今藥病兩忘諸人還見麼三錢賣却黑撈波打瓦鼓唱村歌隨處薩婆訶擲拂子下座廣德義禪師因事示衆才到洪山便跺根四方八面不言論他家自有眠雲志蘆管橫吹宇宙喧卍庵顏禪師因事上堂元宵已過化主出門六群比丘各從其類此衆無復枝葉純有真實如是增上慢人退亦佳矣麒麟不為瑞鸑鷟不為榮麥秀兩岐禾登九穗總不消得但願官中無事林下棲禪水牯牛飽臥斜陽擔板漢清貧長樂粥足飯足俯仰隨時筯籠不亂攙匙老鼠不咬甑箄山家活計淡薄常情不敬功德天誰嫌黑暗女有智主人二俱不受良久曰君子愛財取之以道洞山寶禪師因事上堂總恁麼風恬浪靜那裏得來忽遇洪波浩渺白浪滔天當恁麼時覓箇水手也難得衆中莫有把柁者也無衆無對師曰賺殺一船人慈受深禪師因事上堂古者道忍忍三世如來從此盡饒饒萬禍千殃從此消默默無上菩提從此得師曰會得此三種語了好箇不快活漢山僧祇是得人一牛還人一馬潑水相唾插嘴斯罵卓拄杖曰平出平出竹庵圭禪師住鴈蕩日其徒懼行規法深夜放火鞠為瓦礫之墟師竟就樹縛屋升座示衆云愛間不打禾山鼓投老來看鴈蕩山傑閣危樓渾不見溪邊茅屋兩三間還有共相出手者麼喝一喝下座洞山聰禪師因事示衆天睛蓋却屋乘乾刈却禾早輸王稅了鼓腹唱巴歌愚庵及禪師因事上堂舉古德道忍忍三世如來從此盡饒饒萬禍千殃從此消默默無上菩提從此得慈受深和尚云會得此三種語了好箇不快活漢師云老慈受錯下名言會得此三種語了好箇沒量大人還委悉麼堯舜不彰民自化相逢何必動干戈用彰俊禪師因事上堂世尊於華嚴會上度一童男法華會上度一童女於楞嚴會上度一淫涅槃會上度一殺大地衆生如恆沙數如此度之何日而了瑞巖者裏也不度童男也不度童女也不度淫也不度殺只教諸人行則任行住則任住坐則任坐臥則任臥熱則乘涼寒則向火衆中忽有箇出來道長老長老宗師家為人何得與麼怠墮只對他道我不敢輕於汝等汝等皆當作佛呆庵莊禪師因事上堂嗟末法惡時世衆生薄福難調制去聖遠兮邪見深魔強法弱多冤害聞説如來頓教門恨不滅除令瓦碎古人一期説話誰知驗在今日雖然從他謗任他非把火燒天徒自疲我聞恰似飲甘露消融頓入不思議且道是什麼人分上事拈拄杖敲香几云永嘉大師來也卓拄杖上士一決一切了中下多聞多不信壽昌經禪師因事上堂諸佛時常説法不須疑議猜詳是何法天地玄黃宇宙洪荒不論通宗透教祗貴直下承當承當箇甚麼雲騰致雨露結為霜蛟龍不宿死水猛虎豈行路旁透得者些關棙何須願往西方不問先佛後祖鼻孔一樣放光作麼生放光化被草木賴及萬方釋迦不肯泄破達磨九年覆藏峩峯不惜口業一下為君宣揚且道作麼生宣揚揮尺一下云罔談彼短靡恃己長便下座天隱修禪師因事示衆有志學道者必須決擇師承發明心地為要宜當竭力曲盡師法深蓄厚養然後隨緣闡化不拘方所若在學地中師承不擇邪正難分迷流逐隊妄認緣塵大法不明心地何達或者初發心時不知歸向三年兩載從而聞之漸漸慕之憤然發志腰包行腳撥草瞻風趣造林下依棲知識排入上輩固為道念非為求名位只欲幹辨本分一著而已原無薦上之心況有人我見耶然處稠人廣衆之中其間有先出家而名位卑下者有年少而先具戒者有年長而未具戒者不可以尊卑之位忽先後之分況此法門本來平等若識心達本當下與佛祖不別豈可持其先後執著名分妄爭人我徒喪光陰諸人要幹辦大事畢竟行履無有一毫自欺處才不孤負行腳之初心矣他日甚有得力決不相賺牧雲門禪師上堂古南箇村僧性燥多嗔罵佛法懶得説終日尋人打打打打上士笑呵呵下士便驚怕怕怕怕好事不出門惡事傳天下箬庵問禪師因事祖堂示衆法門授受誠非細故前佛性命後佛紀綱統系一人苟得其人則叢社何幸不得其人將見長師為徒無有出泥犁分豈非雖是善因而招惡果老汾陽一陌紙兩片肉斷送間神野鬼老僧者裏并不用一陌紙兩片肉若是間神野鬼斷然存劄不住何故近來例作禱鬼獻神誰甘淡薄老僧今日與諸人約法三章一知半見底請過一邊囫圇吞棗底且緩緩著無繩自縛去死十分與你草鞋一緉若是英俊道流高超獨步定不入他時流圈繢老僧昔日婆心錯失儘有數員禪客念其相依日久恐致為人誤賺收到座下豈期竟自罔然無知如鮮魚臭肉沿塗販賣誤賺後昆更妄付授追思切齒每嘗室中對諸人枚舉如斯等輩作老僧奴兒婢子尚不中用何況敢稱老僧法子已後如曾經記莂非親炙多年分座説法不許擅自受請離師何況付授違者追擯如曾經記莂總不得過量超師師命住山住靜本分自甘亦不失為真正衲子逆命違師不甘本分者追擯如曾經記莂行業有餘文彩粗陋刀耕火種了却一生敢保此人龍天自不敢昧不識利害妄刊語句流布者追擯已上數條皆老僧慟心疾首痛哭鼓攻諸仁者是豈老僧得已之陳也哉奉告諸仁者切須見賢思齊不賢自省昧心負德報亦匪輕泛泛之流向破驢脊上攢簇及時趂哄老僧正不敢攀留也不須惆悵臨岐句只箇真金不混沙卓拄杖訓童行規誨佛印禪師訓童行自小離於父母第一歸依佛祖寅朝禮念精專夜靜堂中莫語普請作務殷勤常住什物愛護一粒米重千斤日裏應身須顧觸事不要獐狂出言低聲慢舉出入束斂身心行步威儀詳序廊下逢僧問訊叉手旁邊待去既然捨却俗緣遵奉叢林規矩師長訓誨之時不得高聲辭欣白曰無事學書聖教經文記取謹慎遞相無事且莫欺瞞常住衣衫黑驂𫌁裰莫騁尖新鋒措仔細約束身心勿令世情染污深思六道輪回警䇿應當恐怖出家要秉佛言不信三途受苦小心侍奉師僧恭敬三寶福助童行上下謙和酒肉賭錢莫間話不要論量聖教時時思慕豈可虗度光陰死後將何憑據不惟辜負四恩一乃帶纍先祖辭親割愛投師本欲出塵濟度慷慨決志修行省察輪回不住萬劫得箇人身慚愧須知來處去除懶墮睡眠調伏身心寬從小戒行真實長大為僧堅固參禪報答佛恩誓願須求頓悟今生幸得出家不可遇而不遇念念不退善根心心長成覺樹若能如是修行必證菩提之路為行者普説肅師語雖不甚暢然不失訓行者之體且諸家為行者普説竟少故録普庵肅禪師為行者普説此中寶所非從妄想發生心地光明應化萬緣如是人心佛行佛行人心遇末劫則地獄現前逢明眼則彌勒境界為什麼如此所作無心自然契合不用皮毛滴酒二三載何事不圓終日杜門信施力財而未嘗少欠道非傲物欲顯天真佛豈背人法身普應若無靈感於物何異紙畫日頭若有應於群心杲杲炎光遍爍聖凡難辨龍蛇混雜以同居迷悟同光佛於衆生而一體悟則方通消息動靜法益群情迷時總屬夢遊生死無明顛倒夢中説夢迷覺不分醉戒醉人旁觀呵笑善男子欲求解脫依師戒定慧方成日久月深般若純熟心法現前由人努力不在遲疑今日雖安來朝難保人似浮根岸草水急難留且無可救之人誰作波心之主唯有真心廣佛本自不滅不生猶若虗空包含天地顯假名則無窮無盡建法幢則無量無邊二乘外道不通玄根境法中虗揑怪妄謂諸佛有可説卜度法身妄認識神更不求大悟了心一向愛他文字所以徒學多知返成謗教老僧若不了心與汝一般愚昧今幸具足元常意光無盡所以終日杜門怕逢醉漢有時苦口汝又不行朝夕而只是自瞞懶惰而怕見和尚不肯息心自悔廣作衆緣天龍嗔呵護教不肯一時業報現前難瞞衆目若是箇信佛依法修行之人為法忘軀寒灰冷月深思古德非少善而得見如來復想我身無一德而助資衆善假使十二時中懸腰墜石猶自妄意粗心直饒粉骨碎身箇裏難求良匠今則棄俗割愛忽遇斯人何不速辦精機信心實地步步依如念念不退究竟涅槃定歸實際與佛無殊天龍守護鬼神瞻依邪魔摧落千古而不墜玄風長劫而本光不動所遺言句自有護法傳持所立標宗劫火應不能壞如斯精妙事由一心舍短從長豈由他悟佛教則如標月指祖説如潑水示氷見月知光釋氷為水然後大感佛祖之恩殞命猶難酬報我迷心法經劫而不出塵勞今悟佛因見性而永脫生死拳拳在念豈不快哉安比十聖三賢二乘圓覺五蘊不空輪回不歇任你聰明超世不離三界循環假饒移山填海猶落非色界中雖然雷電奔馳不出五通陰界直饒橫衝直過也不出諸佛法身未解自己本元一切有為如幻直須幻盡覺圓具足實相將大地山河為自己以色空明暗顯真如指南柏以標心顧西松而露意方寸逈絶於能所大千無假一微塵受用身心不落有無知見為人拈舉非干聲色指人心如斯方是出家兒不誤後來之初學等觀今時聚此出家當求何事教汝持戒一行不持令汝澄心愈增嫉妬教汝擊鐘𮘗呪也無一字分明隨時逐隊鬨喧只欲打過教汝恭敬往來廣結歡喜衆緣汝又要自求間靜迷識沉神食氣不和自成病體諸事難為必竟變壞又入魔徒百千萬劫不遇善知識汝等今時遇我出家知汝來處亦知汝去處只似空花從空而有我不得全定汝作妖魔我著汝魔同歸魔道我若如是法身如猛火焰邪魔猶若氷霜汝定消洋法身常住亘古亘今永無變壞所以千佛萬佛只傳此心歷劫恆沙此宗不壞汝之業識雖聞不信後日明朝自當敗闕莫道良醫門下猶有病夫爐鞴完全尚存鈍鐵自是覆盆之下而不肯開張暗爛敗根斯光常在不從直訓役我多言若是善根何消如此各自努力但辦肯心一片時中究竟如是珍重受法衣提綱恕中慍禪師洪祐和尚送歸源法衣至上堂拈衣示衆云者箇是先歸源向異類中遺下皮可漏子日炙風吹而不壞刀斫鋸解而不開業力既重纍及不肖子亦入其群隊去也披云且道是驢是馬遂升座乃云夫為宗師者垂一機示一境如青天霹𮦷不容掩耳如十日並照無幽不燭如大爐鞴煅煉頑鈍如大醫王療種種病如大舟航運載一切有如是奇特如是作略然後方可據法空座傳持大法為人抽釘拔楔解粘去縛明頭合暗頭合據虎頭收虎尾若也向上論去尚恐埋沒宗風恥他先作那更婆婆和和淟淟涊涊撒土拋沙瞎學者眼豈堪稱譽天台那畔石佛山前有大智人把斷要津不通水泄提破沙盆索起遼天重價用黑豆法換盡大地人眼睛掀翻舊日條章裂破今時窠臼直得德山臨濟吞聲飲氣竺乾震旦逈絶行蹤灼然不落聖凡實謂大功不宰諸人還知落處麼經天緯地無多子扶樹單傳只一人復舉阿難問迦葉因緣師拈云世尊做盡生涯貴在後來承紹阿難太殺奢華迦葉亦成落魄靈巖今日承鴻祐木庵師兄持先師竺元和尚法衣到來但知頂受一語不敢問著何故不經一事不長一智病起提綱五祖演禪師病起示衆病來又病皮黏骨抖擻起來無一物行不成步語聲低鼻孔依前空突兀雪竇顯禪師病起示衆門掩還同歲月摧石窗經雨積莓苔一床枕簟淨名老時見斷雲孤月來應庵華禪師病起上堂法身病色身即是法身色身病法身即是色身如是次第自幼至老病至膏肓神醫拱手處萬病脫然直下正體如如更轉向那邊然後法隨法行法幢隨處建立故能顯示攢簇不得底病直教千聖覓起處不得普入一切衆生身內全衆生之病入大解脫門證無生法忍始可津濟四生梯航九有若不如是空病何為敢問諸人只如山僧許多時病且道與適來所説之病是同是別若道是同未見老僧在若道是別亦未見老僧在何故海枯終見底人死不知心黃龍死心禪師屬疾退居晦堂夜參竪起拂子云看看拂子病死心病拂子安死心安拂子穿却死心死心穿却拂子正當恁麼時喚作拂子又是死心喚作死心又是拂子畢竟喚作什麼良久云莫把是非來辨我浮生穿鑿不相干密庵傑禪師病起上堂一葉飄空萬木秋翻思光景急川流若人識得其中意坐斷千差向上頭山僧數日來似病不病似安不安似死不死方丈裏撒屎撒尿大開眼狂言寐語直是東西不辨南北不分求生不得求死不可釋迦老子為四生慈父三界醫王也覓此病起處不得正當此時若人救得山僧點一盞薄荷湯與伊濕口若救不得如人上山各自努力閻羅大王不是你爺他時打你鬼骨臀索飯錢去在莫言不道典牛遊禪師病起上堂舉馬大師日面佛月面佛後來東山演和尚頌云丫鬟女子畫娥眉鸞鏡臺前語似癡自説玉顏難比並却來架上著羅衣師云東山老翁滿口讚歎則故是檢點將來未免有鄉情在雲巖又且不然打殺黃鶯兒莫教枝上啼幾回驚妾夢不得到遼西白楊順禪師因病示衆久病未嘗推木枕人來多是問如何山僧據問隨緣對窗外黃鸝口更多只如七尺之軀甚處受病衆中具眼者試為山僧指出病源衆下語皆不契師自拊掌一下作嘔吐聲又云好箇木枕子佛心才禪師病起上堂一法有形該動植百川湍激競朝宗韶琴不鼓雲天淡想像毗耶老病翁維摩病則上封病上封病則拄杖子病拄杖子病則森羅萬象病森羅萬象病則凡之與聖病諸人還覺病本起處麼若也覺去情與無情同一體處處皆同真法界其或未然甜瓜徹蒂甜苦瓠連根苦心聞賁禪師病起上堂維摩病説盡道理龍翔病咳嗽不已咳嗽不已説盡道理説盡道理咳嗽不已汝等諸人還識得其中意旨也未本是長江湊風冷却教露柱患頭風石屋珙禪師病起上堂舉苕溪和尚示衆云吾有大病非世所醫後有僧問曹山未審是甚麼病山云攢簇不得底病又問一切衆生還有此病也無山云老僧正覓起處不得師云者僧是病過的人極是搜尋到頭髮尖裏也不放過若非曹山知他落處其他難為啓口復成一偈舉似大衆百骨酸疼攢簇難一番熱了一番寒覓他起處竟不得藥銚風爐盡打翻傑峰愚禪師因眼病上堂佛病祖病衆生病拈向一邊丹藥妙藥神仙藥除過一壁離却四大幻身且道那箇是病那箇是藥若向者裏薦得許汝諸人具一隻眼其或未然老僧分明指出病源與諸人看四大分散時向何處安身立命是有病無藥底句鎮州蘿蔔柏樹子乾屎橛麻三斤是有藥無病底句萬法歸一一歸何處趙州云我在青州做領布衫重七斤是藥病對治底句不是心不是佛不是物狗子佛性無是藥病雙忘底句為治衆生心中五欲八風煩惱塵勞妄想執著一切諸病一大藏教總是濟世醫方一千七百祖師公案盡是靈丹妙藥有病應服藥無病藥還祛衆中還有箇漢出來道和尚自身不能治何用治別人只向他道留得一雙青白眼笑看無限往來人無文璨禪師病起上堂諸人病是山僧病山僧病是諸人病諸人痛處山僧能忍山僧痛處諸人欲忍不能拄杖卓一下單方一服當下和平不必松根採茯苓恕中慍禪師病眼上堂山僧數日來病眼暗昏昏地直得東西不辨南北不分然於不分不辨處却有箇分曉僧問九峯如何是把定乾坤眼折筯攪龍門峯云把定在裏許乞兒弄飯碗僧云乾坤眼何在再犯不容峯云正是乾坤眼貴買賤賣僧云還照燭也無有甚失照燭峯云不借三光勢舌頭拖地僧云既不借三光勢憑何照燭喚作乾坤眼狗咬枯骨頭峯云若不恁麼髏髑前見鬼正是見鬼説話九峯長吹緩打自謂手段高強爭奈者僧久經行戶酬唱無虧若是把定乾坤眼總未見得今日不是攙行奪市蓋為病多諳藥性要識把定乾坤眼麼卓拄杖曙色未分人盡望及乎天曉也尋常楚石琦禪師病起上堂壽山不會説禪病起骨露皮穿判得閻羅老子一朝催討飯錢劍樹刀山未免鑊湯爐炭交煎更入驢胎馬腹不知脫離何年因什麼如此是他家常茶飯了庵欲禪師病起上堂昨日病前日病病病相尋無有自性坐斷淨名舌頭倒行摩竭正令擊拂子野狐窟裏産狻猊獼猴各佩軒轅鏡上堂東山演和尚云病來又病皮黏骨可殺驚人抖擻起來無一物却較些子行不成步語聲低描也描不成畫也畫不就鼻孔依然高突兀築著磕著好大衆古人發揮到無發揮處直是驚天動地邁古超今山僧一夏以來病來病去病得起來內不見有四大五陰外不見有山河大地上不見有諸佛下不見有衆生中不見有自己淨裸裸赤灑灑沒可把幸自可憐生無端侍者進退一段公案未了今朝月望拈香底拈香揖客底揖客濡毫底濡毫請法底請法直要山僧向太虗空中大書皇帝萬歲四字莫有為山僧代筆者麼舉起拂子云文明齊北極睿算等南山繫拂子下座密雲悟禪師病起升座云山僧六十有五數來不涉迷悟無端痢疾三年纍得通身骨露若人如是證明管取超佛越祖日用二六時中直教更無差互若能如是修行定證金剛堅固試看碓坊踏碓人終日未嘗移一步蘇州城有六座門門門有路通人路可惜無人簡點知其數便下座箬庵問禪師病起升座師云三百六十骨節八萬四千毛竅通身抖擻欲覓病起處了不可得風寒暑濕熱四面交逼時且道向甚麼處著到慣從五鳳樓前過手握金鞭賀太平忽有箇衲僧出來道和尚猶作主那山僧不覺手之舞之足之蹈之今日初起囈語猶未歇在喝一喝下座掩室提綱天如則禪師依圓覺上期一百二十日掩室安居書偈于門示衆平地牢關立一重佛來無路得相逢分明只在尋常處如隔千峰與萬峰見心復禪師掩關示衆稿木形骸百念灰溪猿野鶴苦相猜閉門獨掩青松雨笑口逢人亦懶開無趣空禪師掩關示衆三十餘年參禮請益十方宗匠問法皆云無説問佛皆云無相幸得無相無説不覺頓空伎倆追昔腳跟失却便宜今喜眉毛端在眼上從斯丟去草鞋即便拗折拄杖拍雙空手入玄關坐看陰陽消長偈曰窮子還歸長者宅善財參遍雜華林大千收拾毫端內推出虗空掩上門瑞白雪禪師為乘長老封關封住拄杖頭結定布袋口山河大地攪得一團明暗色空揑成一聚爐峰不挂片雲秦望豈帶煙色正恁麼時進關一句作麼生道良久云木人雲中拍氈板石女山頭唱茶歌石雨方禪師為尸行芥城封關海濶天空智者不居鐵壁銀山愚人不識然則如鏡照鏡不妨者邊那邊死限之心既固活埋之念須堅雖然欲知此話行須看三年後啓關提綱無趣空禪師啓關示衆自結玄關自活埋自吾閉也自吾開一拳打破玄關竅放出從前者漢來玉芝聚禪師啓關示衆丈室三年坐斷十方世界蒲團一念頓圓十世古今依稀彌勒樓中不妨開已復閉畢竟普賢界裏要看絶後再蘇所以道把住則乾坤失色放行則瓦礫生輝霄漢縱橫蒼檜豈容藏彩鳳風雷浩蕩碧潭寧許臥青龍然則放出關中主一句作麼生道咦開門日出西方卯萬象之中獨露身石雨禪師為正衡開關盡大地是箇關房本無出入只因迷故關上重關亦是迷上重迷之意今人只思尋悟全不知迷既不知迷悟從何得所以老僧常向人道迷有十分悟有十分今日開關豈屬迷悟聽取一偈有出入無門戶無開掩有封固若是香象截流機終不從他覓頭路乃舉鎖匙且道是甚麼試開看迎待尊宿引座提綱實性大師因同參芙蓉訓禪師至上堂以右手拈拄杖倚放左邊良久曰此事若不是芙蓉師兄也大難委悉便下座法昌遇禪師黃龍南禪師至上堂拏雲攫浪數如麻點著銅睛眼便花除却黃龍頭角外自餘渾是赤斑蛇法昌小剎路遠山遙景物蕭疏遊人罕到敢謂黃龍禪師曲賜光臨不唯泉石生輝亦乃人天欣悅然雲行雨施自古自今其奈爐鞴之所鈍鐵猶多良醫之門病者愈甚瘥病須求靈藥銷頑必藉金錘法昌者裏有幾箇躲根阿師病者病在膏肓頑者頑入骨髓若非黃龍老漢到來總是虗生浪死拈拄杖曰要會麼打麵還他州土麥唱歌須是帝鄉人保寧勇禪師因長蘆和尚來上堂金將火試水將杖試大衆祇如金不將火試水不將杖試還有人辨得麼若辨得是真也假也深也淺也若辨不得且分付與明眼人真淨文禪師隆慶長老來上堂大衆教中道佛滅度後為善知識者總是見佛來然則其為善知識者亦不可容易覩善知識者亦不可輕慢隆慶禪師斯之謂也老僧與知事首座大衆同增歡慶乃喝一喝云虎溪宗派龍山子孫吉州隆慶大啓禪門古人所謂從門入者不是家珍驀拈起拄杖云為是家珍為是外物大衆却請隆慶禪師決斷擲下拄杖下座雪竇顯禪師因宗上座至引座大衆今日雪竇宗上座乃是昔年太陽韓大伯具大知見晦迹韜光欲得發揚宗風幸願特升此座白雲端禪師中峰至云九九八十一幾人能解算兩箇五百文原來是一貫到者裏添得一文麼若有添得一文即便滿路光生出古今爭奈自古自今千箇萬箇祇愛足頭底白雲今日為汝添看乃云下座與知事首座大衆請中峰和尚升座一遍圓悟勤禪師請長蘆覺禪師上堂多子塔前分半座截斷衆流少林端拱歷九年壁立萬仞奮作家爐鞴施向上鉗鎚顯大用大機全生全殺與一切人抽釘楔解黏去縛令大地人各各如獅子兒奮迅吒沙踞地返躑所以道法王法力超群生常以法財施一切久積淨業稱無量導衆以寂故稽首夫如是則向萬仞懸崖垂手敲唱俱有百尺竿頭進步主賓互換正當恁麼時如何龍吟長霧起虎嘯乃風生復云撞著道伴交肩過一生參學事已畢今朝幸遇大導師寶華王座為拈出龍門遠禪師五祖和尚到上堂曹溪大師傳衣歸嶺南後來讓和尚得法授與馬大師馬大師接得百丈百丈得黃蘗黃蘗得臨濟臨濟得興化興化得南院南院得風穴風穴得首山首山得汾陽汾陽得慈明大師慈明大師接得一人楊岐和尚如今舉他得底事看此老子云我者裏如閙市裏上竿子相似是人皆見瞞你眼得麼楊岐老子後來接得端和尚一人此老子曾住此山來有頌云海底珠動時雲中月還現涼夜無狂風清光都一片端師翁後來接得先師一人先師有言曰祇從咬破一箇鐵餕餡直得百味具足此老子所以一生口硬好説硬話伏自先師付囑之後大法傳持以來末後東山一時分付今五祖堂頭和尚此日幸對人天廣衆請不吝慈悲重為顯揚使先宗有據吾道益明莫不大幸甘露和尚入山上堂達磨不來唐土地久天長二祖不往西天山青水緑龍吟霧起虎嘯風生秋雨垂空浮雲蔽日諸人有眼還見麼有耳還聞麼既具見聞何者是迷何者是悟何物為緣何物為對要知迷悟升沉理畢竟須還本分師先佛道身相屬四大心性歸六塵四大體各離誰為和合者大衆身心既乃如此現今復是何物近來參學之人盡皆奔馳語句舉論古今於本分事全不明了所以正宗淡薄道法澆漓幸遇和尚到來伏望震潮音示真旨抉重瞙顯衣珠四衆傾誠不勝虔請應庵華禪師烏巨山雪堂和尚到上堂臨濟三遭痛棒高安灘上知歸興化於大覺棒頭深明黃蘗意旨山中兄弟雖然不多各各病在膏肓若非師叔和尚到來明果豈敢妄通消息少間下座與知事頭首大衆同伸拜請伏望慈悲痛垂發藥萬杉和尚到上堂大底大小底小長底長短底短曲底曲直底直方底方圓底圓正底正邪底邪為復是佛耶是菩薩耶是羅漢耶是聖僧耶是鬼神耶是天仙耶我昔聞是法未嘗妄宣説是義非義是隨義墮非是非義非非義是隨句墮若作佛法商量達磨一宗掃土而盡不作佛法商量老僧活陷地獄是你諸人還緇素得出麼苟或未然少間下座同知事頭首攀請新萬杉和尚為衆説破徑山大慧禪師至上堂乃云我本無心有所希求今此法王大寶自然而至法王大寶既至汝等諸人急著精彩所謂見之不取思之千里豈不見大隋和尚道我參七十餘員善知識具大眼目底祇有一二其他盡具正知見在今天下具大眼目真善知識惟我法叔老師一人而已黑漆竹篦掀翻海嶽從頭打過雖是死馬醫就中要妙黃蘗打臨濟拄杖蔣山豈是無耶蓋為土曠人稀雲門一曲臘月二十五那在今朝十六日吹唱驀拈拄杖卓一卓云虗空可量風可繫無能盡説佛功德復舉頃在虎丘聞先師舉佛眼叔祖初作無為軍化士因道中著攧有箇省處歸來舉似師祖後令充知客因夜坐撥火忽然猛省雖然如是每至入室未能深入閫奧從容請益大師祖云我為你説箇喻子正如一人牽一頭牛從窗櫺中過兩角四蹄悉皆過了惟尾巴過不得師云者箇説話多年在肚皮裏信知在今天下無人理會得所以密之三寸苟非法叔老師到來小姪此生無因拈出敢問諸人既是大底過了如何尾巴却過不得且道誵訛在什麼處小姪今日對衆拈出供養我法叔老師大和尚惟願壽與趙州同年為佛法作大主張使天下衲僧洞徹此一段奇特大事下座同知事頭首大衆殷勤拜請伏望慈悲俯垂開示無用寬禪師天目中峰和尚至引座明明百草頭明明祖師意天目山古佛輝天并鑒地虎咬大蟲蛇吞鱉鼻擲拄杖云直下來也急著眼下座大衆懷香拜請幻住大和尚慈悲開示便下座千巖長禪師龜峯道源和尚至上堂作家相見豈在形言擊鼓升堂聊陳供養供養我龜峯和尚降尊就卑昔應庵敘謝大慧末句云虗空可量風可繫無能盡説佛功德即今下座同大衆拜請和尚尊慈開示恕中慍禪師瑞龍夢堂和尚至上堂大人具大見大智得大用黑漆竹篦掀翻海嶽芭蕉拄杖敲打虗空直得釋迦彌勒拱手歸降文殊普賢潛身無地所以道殺人須是殺人刀活人須是活人劍有活人劍無殺人刀一切活人死不得有殺人刀無活人劍一切死人活不得活得死人死得活人猶且墮在功勛埋沒宗旨豈不見芙蓉和尚一日訪同參實性大師性乃升堂以右手拈拄杖倚放左邊良久曰此事若不是芙蓉師兄也大難委悉便下座實性與麼道李向赤邊咬當茲季運袒肩擔荷赤手提持不涉廉纖斬釘截鐵惟我瑞龍師兄一人也勿謂土曠人稀祕而不泄惟願放開線道曲徇時宜使彼承言滯句者徹證直指單傳一段奇特大事顧不韙歟下座與首座大衆同伸拜請冀為敷揚楚石琦禪師靈隱竹泉和尚至上堂舉廣慧璉和尚道我在先師會中見舉竹篦問省驢漢云喚作竹篦則觸不喚作竹篦則背作麼生省近前奪得拋向地上云是什麼先師云瞎省從此悟入我道省驢漢悟則太煞悟要且未盡先師意旨師云大小廣慧恁麼道先師實有意旨那將一把火照看面皮厚多少下坡不走快便難逢若是向上提持還我竹泉師兄始得弘覺忞禪師通玄奇禪師至引座別峯不意却親遭力索無因見妙高豈是當頭多隱諱從來正打貴旁敲不見丹霞訪忠國師霞問侍者國師在不者曰在即在祇是不見客霞曰大深遠生者曰非但上座佛眼亦不見霞曰龍生龍子鳳生鳳兒國師睡起侍者以告國師乃打侍者二十棒遣出院丹霞聞得嘆曰不謬為南陽國師豈非丹霞旁敲故顯國師正打因顯國師正打始知毫無隱諱既知毫無隱諱自然大用現前霜威凜凜然後方可祖印高提吹毛橫按勦絶今時露布發揮從上家風激揚敲唱雙行驀劄主賓互換主賓互換也雲迷大野霧鎖長空敲唱雙行也韻出青霄風生滿座直得山河大地盡作琴聲草木叢林順方低向正當恁麼時作麼生是毫無隱諱底事卓拄杖云要會麼下座同申勸請通玄和尚普為諸仁分明指出化山三宜和尚至引座孟嘗門下珠履三千金谷園中繡襦八百安似我輩衲僧家借來香飯餉萬聖於同堂三變淨坊集分身於一處是故進一步則震動無邊世界網退一步則踏斷百億大風輪不進不退則正令當行十方坐斷便饒如是未是衲僧全體作用在諸人要見全體作用麼舉起拂子云看看空王佛多寶佛威音王佛大通智勝佛四萬同名同號日月燈明佛盡向山僧拂子頭上吹大法螺擊大法鼓演大法義作大佛事一一佛事周遍法界所謂一毛現神變一切佛同説盡於未來劫莫得其邊際倒握拂子云及乎倒轉柄來要且三世諸佛歷代祖師卒摸索頭腦不著何況諸人茄子瓠子那裏知得今朝幸遇化山和尚象駕光臨高垂天鑒下座同申勸請普為諸人委曲指示
