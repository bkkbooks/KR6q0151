body:
  text: 武林十八㵎理安禪寺住持婁東行悅集中夏提綱或菴體禪師中夏上堂赫日炎炎六月天虗空孟浪說新禪臨風有耳應難聽不落諸緣取次傳莫問東西坐斷妙高峰頂休分彼此平吞報化佛頭寒不愁寒色空無二熱不愁熱心境一如大禪佛旁若無人野盤僧身為逆旅灰心老衲未免攢眉杜口維摩也應冷笑且道笑箇甚麼有心用處皆為錯無意看時却宛然雪巖欽禪師中夏上堂前四十五日過去已過去後四十五日未來猶未來卓拄杖云正當今日且道還有過去未來之相也無更有一絲毫不去不來之相也無若向著裏定當得下五更洗面黃昏打睡齊時有報晨朝有粥朝朝相似暮暮一般其或未然報恩昨日預做中夏今朝擊鼓升堂使府迎奉觀音菩薩在設廳供養啓建祈晴道場中夏上堂前四十五日知進不知退後四十五日知退不知進正當今日進退兩忘季夏極熱薰風自凉卓拄杖云時聞一陳藕花香高峰妙禪師中夏上堂前四十五日何處去焦尾大蟲入閙市後四十五日何處來三腳驢子上高臺俊鷹快便合乘時跛鱉盲龜徒勞𨁝跳中夏上堂竪拂子召大衆云到者裏進前一步也不得退後一步也不得總不恁麼也不得畢竟如何不得不得中峰本禪師中夏示衆大衆四十五日前朝昏沉暮散亂四十五日後朝散亂暮昏沉正當今日在四十五日之中試把昏沉散亂來與老僧看既無你拈出處則真如菩提涅槃解脫亦無你拈出處莫說你拈不出便是於大寂定中喚起二千年外釋迦老漢來敢保其亦無拈出之理既拈不出你喚甚麼作昏散又喚甚麼作寂照直下聖凡情盡能所障空覿體無依當機絶待不見四十五日在前不見四十五日在後三際平等一道虗閒即今覓箇中夏亦不可得雖然此猶是途路中事若曰到家消息猶較西天十萬程諸禪德你最初立志要為生死大事不是說了便休須發起一片不顧生不顧死底決定志氣也不管你前四十五後四十五正當四十五不四十五𪹼𪹼地提箇所參話任你說是說非論長論短拍盲舉起拍盲打捱誰管今生打得徹打不徹直饒以熱鐵輪驅入刀山劍樹上一日走百千萬億匝要教把所參話須臾放下終不可得有此等志氣欲超過佛祖為不難矣從前做不到古人地位只是志願不真切立腳不穩當所以古人道過河須用筏學道須用志釋迦彌勒初無所長只是箇能立志願底凡夫耳昔僧問古德一念不起還有過也無德云須彌山且道與趙州青州布衫相去幾何如其未委此去四十五日後却來露箇消息萬峰蔚禪師中夏示衆達磨的的西來直指人心見性成佛且道性作麼生一喝於此直下疑團百雜碎便見青青翠竹顯真如柳緑花紅明皎潔風生虎嘯石龍吟燕語鶯啼為汝決衲僧家活潑潑滿懷撒出夜明珠獻寶波斯難辨別放倒和衣打覺眠一任天崩與地裂其或未然參楚石琦禪師中夏上堂前四十五日已過去後四十五日尚未來正當四十五日之中覓現在相不可得所以道過去心不可得現在心不可得未來心不可得此不可得亦不可得平生肝膽向人傾相識猶如不相識古梅友禪師中夏上堂九旬禁足又過一半心地未明如牽火鑽光陰莫虗度了却閒公案平地無端捉得賊老僧出來為汝斷用彰俊禪師中夏上堂舉黃檗因臨濟半夏上山問訊見黃檗看經濟云我將謂是箇人元來是箇唵黑豆老和尚住數日乃辭去檗云汝破夏來何不終夏去濟去暫來禮拜檗便打令其去濟行數里疑其事再回終夏拈云招之不來揮之不去是什麼人瑞巖若做黃檗待他再回棒折也未放在何故棒上不成龍無文璨禪師中夏上堂前半夏所作法門所修行願山僧已在西山為諸人演說後半夏所作法門所修行願山僧今在東湖為諸人演說東湖所作與西山不同西山所說與東湖不別指槐罵柳證龜成鱉憍梵鉢提側耳聽舜若多神驚吐舌了庵欲禪師中夏上堂前半夏已去後半夏未來正當今日謂之中夏大衆過去已往未來未至即今事作麼生莫是二邊俱莫立中道不須安麼者般說話是你諸人嚼過底殘羮剩飯因甚麼拶著十箇五雙鼻孔索頭在別人手裏且道利害在什麼處一翳在眼空花亂墜建盂蘭盆會提綱石雨方禪師盂蘭盆會上堂今日是目連救母地官赦罪之辰雲集懺悔亡者可以超生存者可以獲福此是世間父母也然出世間亦各各有箇父母他能長你法身養你慧命大衆還知麼者箇父母非形像可求非遠近可見非呼喚可應然衆中亦有父母俱喪者亦有父母俱存者且道又如何懺悔使他超生又如何保佑使他獲福還有定當得者麼拍禪床一下下座解制提綱洞山價禪師示衆兄弟初秋夏末東去西去直須向萬里無寸草處去始得又云只如萬里無寸草處作麼生去石霜圓禪師解夏上堂昨日作嬰孩今朝年已老未明三八九難蹈古皇道手鑠黃河乾腳踢須彌倒浮生夢幻身人命夕難保天堂并地獄皆由心所造南山北嶺松北嶺南山草一雨潤無邊根苗壯枯槁五湖參學人但問虗空討死脫夏天衫生披冬月襖分明無事人特地生煩惱喝一喝下座雲峰悅禪師解夏上堂日月易流光陰倐忽始見安居又當自恣此夏喜得大衆各各道體康安然出家之流曠達無礙初秋夏末或東去或西去出一叢林入一叢林忽有人問上座翠巖和尚今夏如何為人被他一問如何祇對莫道九九八十一莫道但得雪消去自然春到來莫道日出東方夜落西莫道合取狗口莫道下一喝撫一掌坐具驀口摵拂袖便行諸禪德如斯布露深屈翠巖既不然者別作麼生披露試對衆道看還有道得底麼衆無語師云若到諸方莫道我從翠巖來便下座大覺璉禪師解夏上堂秋風起庭梧墜衲子紜紜看祥瑞張三李四賣囂塵拾得寒山爭賤貴覿面相逢更無難易四衢道中棚欄瓦市逼塞虗空普天匝地是臨濟赤肉團上雪峰南山鱉鼻玄沙見虎俱胝竪指一時拈來當面布施更若擬議千山萬水復曰過白雲端禪師解夏舉洞山悟本禪師云初秋夏末直須向萬里無寸草處去有僧舉似瀏陽庵主主云出門便是草師云若見得庵主便見得洞山若見得洞山便見得庵主見洞山却易見庵主却難見為他不為住持之絆不見道雲在嶺頭閒不徹水流㵎下太忙生保寧勇禪師解夏上堂秋風才動布袋頭開來者自來去者自去江淮兩浙足有家風衡嶽廬峰更多幽致驅驅轆轆劫劫波波須知道不動如來未嘗舉步且道不動步一句作麼生道良久云適來堂裏來却歸堂裏去長慶安禪師解夏上堂汝諸人總來就安求覓甚麼若欲作佛汝自是佛擔佛傍家走如渴鹿趂陽𦦨相似何時得相應去汝欲作佛但無許多顛倒攀緣妄想惡覺垢淨衆生之心便是初心正覺佛更向何處別討所以安在溈山三十年來喫溈山飯屙溈山屎不學溈山禪祇看一頭水牯牛若落落入草便把鼻孔拽轉來才犯人苗稼即鞭撻調伏既久可憐生受人言語如今變作箇露地白牛常在面前終日露逈逈地趂亦不去汝諸人各自有無價大寶從眼門放光照見山河大地耳門放光領釆一切善惡音響如是六門晝夜常放光明亦名放光三昧汝自不識取影在四大身中內外扶持不教傾側如人負重擔從獨木橋上過亦不教失腳且道是甚麼物任持便得如是且無絲髮可見豈不見志公和尚云內外追尋覓總無境上施為渾大有珍重真淨文禪師解夏上堂此箇事學不得教不得傳不得須是當人悟始得悟得也可可地閒閒地了了明明地歷歷落落地一切神通變化悉自具足不用外求乃拈拄杖橫按云橫按鏌鎁全正令太平寰宇斬癡頑遂擲下良久喝一喝下座大溈哲禪師解夏上堂十方同聚會箇箇學無為此是選佛場心空及第歸慧先門下直拔超升不歷科目諸人既到者裏風雲布地牙爪已成但缺雷聲燒尾如今為你諸人震忽雷去也以拄杖擊禪床下座五祖演禪師解夏上堂一塵起大地收一葉落天下秋金風動處警砌畔之蛩吟玉露零時引林間之蟬噪遠煙別浦行行之鷗鷺爭飛絶壁危巒處處之猿猱競嘯又見漁人舉櫂樵子謳歌數聲羌笛牧童戲一片征帆孤客夢可以發揮祖道建立宗風九旬無虗棄之功百劫在今時之用如斯話會衲子攢眉不見道一塵不立始歸家若有纖毫非眷屬解夏上堂九旬三箇月彈指瞥然間忙者直然忙閒者直然閒事事無窮盡千古白雲山上堂三月安居今已滿九旬禁足事如何西天蠟驗聞聲久此土鵝珠說者多季運二千年遠意混流水乳積成河林泉開士齊弘護莫使墮頽著衆魔圓悟勤禪師解夏上堂秋光清淺秋露虗凝秋風颼飀秋色澄淨乃釋迦護生之功已畢實衲僧結制之法周圓若能內忘己見外了法空內外一如虗凝澄寂則全心即佛全佛即心與諸佛把手共行與祖師同得同用到箇裏更說什麼結更說什麼解二六時中淨裸裸赤灑灑終日著衣不曾挂一縷絲終日喫飯不曾咬一粒米所謂動若行雲止猶谷神豈有心於彼此那有像於去來觸處逢渠全機獨脫正恁麼時如何白雲本是無心物等閒出沒大虗空復云九十日功圓此日不須更驗蠟人來雖然萬里無寸草袋口今朝已解開解夏上堂圓覺伽藍豁開戶牖華嚴剎海大座當軒促百千億劫為一念豈止百二十日長期延一念作百千億劫寧論此世來生始見流金爍石俄然玉露垂珠時節不相饒物理有變復當時結夏普天匝地一時結此時解制普天匝地一時解結時初不相著解時初不相離到者裏通一線曉一機去你為你我為我長底長短底短清者自清濁者自濁於中也無去來亦無動轉浩然太均同歸一致然後放收擒縱得大解脫更喚什麼作你作我作長作短一時截斷且自恣一句作麼生道雲在嶺頭閒不徹水流㵎下太忙生解制上堂尋常一味無過朴實頭坐斷千差更須高著眼壁立萬仞處淨裸裸平田淺草裏峭危危當處平和拖泥帶水深挑痛劄犯手傷鋒欲得兩不相妨各請休機罷釣且九夏賞勞一句作麼生道險處豈嘗忘顧鑑縱行平地索隄防解夏上堂毫端寶剎寬濶優游十世鄰虗古今渺邈洞視不見徹聽不聞到者裏非止善財七日斂念設使文殊百劫運大智力起無邊神用亦不能見只汝諸人九十日間各各於中全體遊歷出沒卷舒縱橫收放八穴七穿東涌西沒儻忽於此知得諦當去不妨步步踏著實地心心契證平常苟或未然今日布袋口開還委悉麼良久云無謂清秋多勝致低回且復按雲頭龍門遠禪師解夏上堂以一粒芥子擊修羅窟於中晏坐九旬振六鐶錫杖登須彌盧直上安居三月倚長松而自誓臨緑水以經行周遊井邑則動止蕭蕭依處叢林則威儀濟濟豈論城隍聚落不分勝地寶坊心月孤圓神珠炳煥六門虗靜萬法咸如如此護生豈有生之可護如此持律豈有律而可持囊內蠟人通身雪冷誠堪慶賀喜何如哉解夏上堂毗目仙人執善財手頓見過去微塵諸佛及其放手宛然依舊龍門長老領諸大衆爰於此地結足安居及其解夏宛然依舊善財依舊處微塵諸佛含攝有歸大衆依舊處三月九旬斂收無迹還會麼毛端藏剎海芥子納須彌不離見聞緣超然登十地四生六道即心自性三途八難普現色身居華藏海之中住不思議之內如斯之旨乃吾輩之常分耳還信得及麼解夏上堂拈起拄杖卓一下云圓明了知不由心念抵死要道墮坑落塹畢竟如何乃靠拄杖下座嶽林真禪師解夏上堂古人道秋初夏末合有責情三十棒嶽林則不然靈山會上世尊拈花迦葉微笑正當恁麼時好與三十棒何故如此太平時節強起干戈教人吹大法螺擊大法鼓舉步則金蓮躞蹀端居則寶步巍峩梵王引道於前香華繚繞帝釋隨之於後龍象駢羅至今後代兒孫遞相放斆三三兩兩皆言出