body:
  text: 武林十八㵎理安禪寺住持婁東行悅集退院提綱白雲端禪師遊廬山圓通訥以院事讓師而訥處東堂未幾訥厭閒寂郡守至自陳客情太守惻然目師師笑唯唯而已明日陞座曰昔法眼禪師有偈曰難難難是遣情難情盡圓明一顆寒方便遣情猶不是更除方便太無端大眾且道情作麼生遣喝一喝下座負包而去一眾大驚挽之不可保寧勇禪師退院上堂百尺竿頭弄嶮𡾟是人平地為攢眉而今潦倒成無用高躡前蹤付與誰有道得者試道看良久云若無人道不如交與知府謝大眾畢復云江國名藍甲上遊夤緣於此繼焚修幻軀已是多衰病雪髮將看徧滿頭浮世百年猶不足旋風千匝尚難周今朝喜作神仙客遂性逍遙得自由圓悟勤禪師退院辭眾上堂未有長行而不住未有長住而不行為無為益無益梯航三有津濟四生是衲僧家本分事雖然時節到來一刀兩段要且鼻孔不在別人手裏所以道動若行雲止猶谷神既無心於彼此亦無象於去來如是則去來不以象動靜不以形豈不綽綽然有餘哉且道臨行一句作麼生道本是林下人却歸林下去下座道林辭眾上堂十虗同一漚寧分彼此大千同一塵豈有去來若能各人明見本心顯發妙用通天作略動靜一如帀地風光彼此無二住也浮雲凝於幽谷去也虗舟泛於長江去住本自圓成解脫更無異路如是則全起全滅全動全靜全去全來全收全放且出門一句作麼生道頭頭物物皆成現正眼當陽廓太虗復云三年承乏幸參陪道業荒虗愧不材赴詔直從天外去何時相與復徘徊退院上堂七處住持三十載今朝方作地行仙上蒙聖主從卑願亭毒之恩遠似天見可而進知難而退權柄在手舒放非他住既無心動亦非我所以二六時中與他同得同證同出同入豈有心於彼此何有象於去來所以道欲識佛性義當觀時節因緣時節若至其理自彰正當與麼時還委悉麼林間蕭散處世外一閒人復有頌云禪月昔年曾有語山僧師範作良謀如斯標致雖清拙大丈夫兒合自由蔣山辭眾云終日相逢長背面終朝背面却相逢途中不是途中事不動巍然達九重者箇消息唯許作家明暗同途主賓互用雖去似去而不去雖來似來而不來卓爾超然動靜曾無兩種所以道動若行雲止若谷神既無心於彼此亦無象於去來如是則去來不以象而確然去來動靜不以心而超然動靜在彼在此殊無間然一道清虗廓周沙界是以月上女出城舍利弗入城而舍利弗問云聖姊向什麼處去月上女云如舍利弗恁麼去舍利弗云我方入城汝已出城云何言如舍利弗恁麼去女云諸佛弟子當住何所舍利弗云諸佛弟子當住如來大解脫女云諸佛弟子既住大解脫所以我云如舍利弗恁麼去既得如來大解脫去而無去去迹入九重城裏毗贊聖化住而無住住蹤在深山白雲中坐斷天下人舌頭既住如來大解脫安有動靜去來之意正當恁麼時作麼生道九重城裏真消息一句無私徧九垓復云憶得曹山和尚辭洞山山云向什麼處去曹山云向不變異處去洞山云不變異處豈有去耶曹山云去亦不變異師云大凡衲僧佩肘臂下符具頂門上眼向一切萬境萬緣當頭坐斷豈不是箇無變異何故金剛正體湛寂凝然曹山雖得此意爭柰洞山憐兒不覺醜若是山僧待他道向不變異處去只向他道者漢未出門早變了也龍門遠禪師退褒禪寺上堂一去一來松上鶴半開半合嶺頭雲搘笻獨立千峰外惟把南山祝聖君雲峰高禪師陛辭南歸示眾我本深藏巖竇隱遯過時不謂日照天臨難逃至化復云衲被蒙頭萬事休此時山僧都不會大覺璉禪師皇祐中仁廟有詔淨因禪院召對數四後入便殿賜羅扇一把題元寂頌於其上及師問答頌詩書以賜之凡十有七篇至和中乞歸老山中乃退院上堂曰六載皇都唱祖機兩曾金殿奉天威青山隱去欣何得滿篋惟將御頌歸應庵華禪師退院上堂祖師心印狀似鐵牛之機去即印住住即印破有般漆桶便向不去不住處坐地無異蚊蚋以足欲探滄海之深淺其可得乎豈不見古人道世人住處我不住世人行處我不行不是與人難共住大都緇素要分明祗如死心和尚一日挾火示僧云若喚作火燒殺你不喚作火凍殺你是你諸人還緇素得出麼苟或未然珍重五湖雲水客笑看千嶂起風雷密庵傑禪師淳熈十年八月初三日乞退靈隱得旨上堂四年居此日波波累及禪和不柰何今感聖恩林下去一輪秋月照天河圓照本禪師以年老求歸哲宗帝從其請勅任便雲遊所至不得抑令住持因欣然退相國院陞座本是無家客那堪任意遊順風加櫓棹船子下揚州天目禮禪師退院上堂七十三八十四驀直示汝也是抑而為之何如靜處薩婆訶倚杖看雲度綠蘿恕中慍禪師退院上堂靈巖作主僅三年說法匡宗媿昔賢今日盡情都放下話頭不舉自完全大丈夫漢終不向淨潔地上坐殺葢其自有透脫一路所以道去來不以象動靜不以心塵塵普入剎剎全彰正與麼時且臨岐一句作麼生道擕取詩書歸舊隱野華啼鳥一般春石屋珙禪師退院上堂卸却項上鐵枷颺下手中木杓合眼跳過黃河騰身衝開碧落獅子趯倒玉䦨杆象王擺壞黃金索白雲兮處處相逢青山兮步步踏著喝一喝云舉頭天外看誰是箇般人南明元禪師在南明厭迎送退院示眾舉感鐵面頌云院是大宋國裏院州是大宋國裏州州中有院不容住何妨一鉢五湖游師云是則去住自由忒煞露風骨吾亦有頌休休休夕陽西去水東流惟有仰高雲勢遠搏風九萬過南州下座便行用彰俊禪師退院上堂拈拄杖我拄杖子隨方作主遇緣即宗古德道住則印去去則印住去住自由不妨奇特只如不去不住還有動靜之相否以拄杖卓一下總使銕輪頂上旋定慧圓明終不失喝一喝南石琇禪師退院上堂衲僧行履如火燒氷如箭離絃如雲出岫如月行天本無來而無去曷有象而有形圓悟老祖辭天寧有偈云幻軀將逼縱心年懶汩塵緣久世間憑仗護身箇符子強扶衰疾且歸山熈怡先師辭萬壽歸松林有偈云幻軀將逼縱心年松下經行石上眠珍重北山龍象眾普通年話幾時圓山僧今日辭徑山亦有一偈雖不能克紹祖父風烈却自胸中流出幻軀已及縱心年衰朽仍兼疾病纏宗教山門媿無補匡徒合讓後來賢佛朗性禪師退院上堂海上承恩兩度還七年道聚剎那間鐵枷項上輕拋下雲外天邊自在閒牧雲門禪師在極樂院退院上堂極樂極樂天涯海角舖子將收家私落索雪峰木毬普化鈴鐸搖搖打打捫捫摸摸仔細看來是何面目鐘鳴銅山崩劍舉蜀頭落還會麼雲門參見睦州會得秦時𨍏轢參退院載歸提綱圓悟勤禪師出城中退院回上堂大眾幸自無一星兒事剛然平地起骨堆費盡工夫只者是步隨流水却歸來恁麼也不得不恁麼也不得恁麼不恁麼總不得然後沒交涉正是此箇時節雖然如是他家自有通宵路嵩嵩南嶽與天台復云八臂那吒擎鐵柱翻身直入滄溟去逡巡忿怒撲帝鐘過犯彌天無雪處無雪處不免依前安舊所且正當恁麼時如何一文偷不得虗作沒良人大慧杲禪師退院載歸上堂去是住時因住是去時果去住與果因無可無不可喝一喝云者裏是甚麼所在說去說住說因說果說可說不可雖然如是者裏却有箇好處且道好在甚麼處良久云再理舊詞連韻唱村歌社舞又重新戲魚靜禪師退院回上堂游徧天下當知寸步不曾移歷盡門庭家家竈底少煙不得所以肩笻峭履乘興而行掣釣沉絲任性而住不為故鄉田地好因緣熟處便為家今日信手拈來從前幾曾計較不離舊時科段一回舉著一回新明眼底瞥地便回未悟者識取面目且道如何是本來面目良久曰前臺花發後臺見上界鐘聲下界聞以拂子擊禪床下座應庵華禪師退請載歸上堂釋迦老子道不著底句歸宗今日道著達磨祖師拈不出底機歸宗今日拈出從上佛祖百孔千瘡一切與諸人塞却便好各各安家樂業照管祖父田園自然時清道泰雨順風調吹無孔笛唱太平歌不妨快活平生雖然以世諦推之則有利有害若以佛法商量則無固無必所以道動若行雲止猶谷神既無心於彼此豈有象於去來去來不以象動靜不以心如是則法隨法行法幢隨處建立不免高挂鉢囊抝折拄杖且坐斷金輪峰一句作麼生道如斯標致雖清拙大丈夫兒合自由復舉南禪師出城還山有頌示眾云去時一溪流水送回來滿谷白雲迎一身去住非去住二物無情似有情師云南禪師好則好祇是愛便宜山僧也有一頌舉似大眾去時冐雨連宵去回來帶水又拖泥自怪一生無定力尋常多被業風吹為住持遷化佛事法語入龕移龕圓悟勤禪師為智海法真和尚入龕釋迦雙樹示寂偃臥吉祥法真智海告終端坐行上四十年道價七十一生緣德播寰中聲馳海外人天敬仰朝野傾崇比望永作梯航長光佛祖豈期忙中縮手閙裏抽身最後皇都大作佛事今則未埋玉樹先入雲龕公案現成須至一決大眾因行不妨掉臂伎倆不知帳樣為瑞為祥無邊無量請老和尚且出方丈鎻龕南石琇禪師為前慧日祺曇石鎻龕稽留峰前親見了幻左眼八兩慧日堂上握黑竹篦右眼半斤打破生死關坐斷涅槃路紫皇案前五色麟等閒掣斷黃金鎻箬庵問禪師為晦夫豫和尚鎻龕二十年來高提祖印橫行湖海倒握乾坤總生佛之樞機作人天之龜鑑剷盡野狐窟宅光揚濟上門庭五坐道場剎塵應現一期佛事報化全真末後一句收歸洞明從上的旨直得雲橫海嶽雪覆千山花落碧巖前猿歸青嶂裏猶未是老法兄親面目在且作麼生是夾山面目掩龕云急著眼弘覺禪師為雲門雪老和尚鎻龕拘尸那畔掩金容淚灑閻浮血染紅誰信碧霄雲散後長天萬里露秋空恭惟當山堂頭大和尚西河獅子長沙大蟲一鏃破雲門三關全身佩浮山九帶娘生鼻孔打失秦望山中空劫眉毛拾得禹門浪裏便爾呵佛罵祖在處為禍為殃長時擦風擦顛知他是凡是聖舌頭控爐鞴藥汞禪點著銷鎔口角擿金梭階前草織成錦繡本望長縣慧照何期遽斂春光庭柯慘鶴樹之容四眾見奢華之色今則雲龕既入玉戶宜扄金色頭陀合知端的搖鈴普化謾說神通喝一喝云體露金風須著眼身藏北斗許誰看牧雲門禪師為龍池和尚鎻龕聲前一句坐斷舌頭末後牢關不通凡聖古者道祖師心印狀似鐵牛去即印住住即印破恭惟我法兄堂頭和尚生平握此印拈此機踞此祖席慣打鯨鯢一期化畢西携隻履正法眼藏分付及門維摩云譬如一燈然於百千燈冥者皆明明終不盡雖然已涉建化門頭若也真實提綱無有佛涅槃無有涅槃佛則所謂不識金剛體却喚作生緣十方真寂滅誰在復誰行正恁麼時龍池老人在諸人頂𩕳上轉大法輪還會麼觸處現全身頂相終難覩擊香几云封法堂挂真大慧杲禪師為高菴悟和尚挂真拈真㡧示眾云蓮華峰頂真實說三塔歸來重泄機兩處路頭俱剔脫剎塵無不盡光輝光輝則是人知有且道高菴老人本來面目何在還委悉麼生佛未具世界未形直是眉目分明十分顯露有人向者裏識得便與此老把手共行不向㡧子上搏量名貌其或未然雲門不免隨例顛倒去也遂展開云還見麼者箇若是則有兩箇者箇若非當面蹉過不蹉過沒兩箇祖堂無位次安排癡兀軒中且閒坐無相真禪師為明真和尚挂真建水生緣四明為瑞耆年覩面呼喚不回正當今日賴有蘆山老叔頭與諸人相見展開真云見見之時見非是見一見不見常相見永使高風振祖堂皎如日面與月面佛眼遠禪師為四面璘和尚挂真虗空無相不拒諸相發揮寶鏡無形豈碍群形頓現相與形而常偽空與鏡而常真故即偽即真不生不滅大眾或若虗空頓消殞寶鏡不臨臺光境俱忘復是何物六十三年即且置且道即今四面老子在什麼處遂拈起真云生涯何所有今古與人傳舉哀圓悟勤禪師為佛眼和尚舉哀三十年行道海上第一人颯然恁麼去誰見不酸辛雖然如是須知佛眼未曾生未曾死未曾去未曾來正與麼時如何乃指龕云我與雪峰同條生不與雪峰同條死要知末後句分明普請大眾齊聲舉乃云哀哀應庵華禪師為佛智師伯雪堂師叔舉哀上堂舉大覺和尚順世謂眾云我有一隻箭子要付與諸人時有僧出云請和尚箭大覺云汝喚什麼作箭其僧便喝大覺打數棒歸方丈次喚其僧來問汝適來會麼僧云不會又打數棒擲下拄杖云已後遇明眼人分明舉似師云大覺平生用一隻箭子穿天下衲僧鼻孔因甚到者僧面前折却眾中莫有為大覺雪屈底出來與報恩相見有麼如無育王師伯薦福師叔亦未免喫報恩手中痛棒何故有功者賞奠茶湯恕中慍禪師為徑山南楚和尚茶龐公舉槖仰山撼樹二大老各展旗鎗殺活自在到我堂頭和尚面前總用不著何故萬仞龍門鳥飛不度南石琇禪師為江心澤中洲茶見了幻而悟無生是第二機向江心而啟密室是第三首且作麼生是第一機鞏縣茶瓶兩箇觜為前僧錄司左善世蘧菴和尚茶轉無上法輪于吳中如日當午罄無側影提毗盧正印於輦下猶風吹水自然成文鎔凡鍛聖只在剎那入死超生如同遊戲大眾還知蘧菴和尚平生妙用處麼縱橫手面與人別拈出蒿湯便是茶大夜對靈愚庵及禪師為靈隱平山林和尚對靈小參正法眼藏涅槃妙心廓三際以無去無來洞十虗而非中非外諸佛知之而獨用眾生日用而不知故我靈隱堂上平山和尚赤手提持袒肩擔荷權實照用俱備擒縱殺活皆全五處住山風行草偃王臣為之斗仰魔外為之氷消塵塵剎剎普見威權物物頭頭全彰奇特高超十地逈出三乘有時拈一莖草供丈六金身有時將丈六金身作一莖草於一毫端現寶王剎坐微塵裏轉大法輪出沒卷舒縱橫自在以此穿三世諸佛鼻孔以此換六代祖師眼睛以此坐天下善知識舌頭以此斷叢林衲僧命脉以此造無間業鑊湯鑪炭刀山劍樹碓搗磨磨為一切人抽釘楔解粘去縛以此開甘露門示甘露器令諸眾生入甘露室食甘露味機機透脫法法融通末後全提甚生光彩聲前非聲色後非色蚊子上鐵牛無你插觜處直得飛來峰起舞三臺西子湖動搖六震正與麼時是汝諸人還知老和尚落處麼卓拄杖云煩惱海中為雨露無明山上作雲雷復舉世尊涅槃會上摩胷告眾云汝等當觀吾紫磨金色之身瞻仰取足無令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子師云釋迦老子四十九年三百餘會說法如雲如雨大機大用千聖窺不及萬靈捫摸無由因甚逗到涅槃會上一箇渾身不解作主直至摩胷告眾普請觀瞻當時眾中忽有箇皮下有血出來道咄瞿曇瞿曇沒處去沒處去非惟進且無門退亦無路管取求生不得生求死不得死淨慈今夜不是壓良為賤檢點將來爭似我平山和尚五會說法高聳人天撒手去來斬釘截鐵拍禪床云踏碎虗空赤脚行十方世界阿剌剌佛朗性禪師為大塘乘禪師對靈小參最初機末後句空要津為君舉有格外相看者麼良久云幾度賣來還自買為憐松竹引清風不獨成熟佛祖田園且要存亡普濟只者一片無陰陽地四置固是分明諸人行住坐臥從劫至年從年至月從月至日從日至時從時至刻白淨儼然莫能動著至今虗豁豁明朗朗圓陀陀黑的的染污不得所以真際圅葢萬化一切自由此是乘公及諸人今昔行履底事汝等只緣自信不及向外馳求轉求轉遠轉急轉遲以至逗到今日總不干別人事敢問大眾即今為大塘乘公禪師莊嚴一句作麼生道擊拂子云落花三月節殘夢五更天復舉僧問大隨和尚劫火洞然者箇壞不壞隨云壞僧云恁麼則隨他去隨云隨他去僧持語問投子投云不壞僧云恁麼則不隨他去投云不隨他去僧云大隨道壞隨他去和尚為甚道不壞不隨他去投遙禮云大隨古佛其僧復參大隨隨已遷化復參投子投亦遷化師云書峰見處貴要大家知有大隨上大人丘乙己投子佳作仁可知禮雖然頭正尾正爭柰者僧一味不肯許他千了百當明眼人試辨看起龕無文璨禪師為南庵主起龕見了天童便躲跟佛來有口不能吞莓苔綠遍門前路坐看春風四十年無禪道可論無佛法可傳拾薪樵子無可尋之跡銜花飛鳥無可見之緣折脚鐺中爛煑乾坤清氣長柄杓內舀乾滄海根源了生死去來之如幻觀涅槃寂滅之現前回首鑑湖青山未老笑擕藜杖白首言旋者箇又是某人可見之蹤跡設若放濶步於藕絲孔中入正定於微塵影裏諸人又向甚處與此老相見閻浮樹在海南邊箬庵問禪師為晦夫和尚起龕坐斷天下路頭自是時流功幹密移一步作者難諳看先夾山和尚為諸人解開寶網步步登高去也且出門一句作麼生車不橫推理無曲斷且喜老法兄今日得著便弘覺忞禪師為雲門雪大師起龕來本自心往非有向步步絕行蹤通身無景象放開一綫道則從伊若不放開說甚南天台北五臺雙徑匡廬與鴈宕便饒打一筋斗過華藏莊嚴世界海那邊更那邊卓拄杖云又何曾離得者裏無陰陽地上所以我堂頭老人不動道場入大寂滅三昧海一坐百二十日為諸人真實提唱直得三世諸佛默然靜聽萬象森羅曲躳稽顙梵王帝釋主風神主空神主晝神主夜神身眾神執金剛神散花供養那容天魔外道之徒潛窺而側望然則摩竭令嚴誰敢關通但諸比丘比丘尼優㜑塞優㜑夷于叫不應山前成就一舖功德須大師點眼因行不妨掉臂請師且出方丈為五磊堂頭權和尚起龕玉殿未為尊珠樓何足貴突破萬重關不住青霄內以拄杖指云葢是者漢一生擔板死不回頭者也所以閙裏抽身於響順聲和之日急流勇退於風行草偃之時闔國人追不再來千峰萬峰直入𦏰羊角挂難尋迹南辰北斗披䘳打成一片皇封揑聚團圞世界立罷夜明簾外因退位以朝君照空古鏡臺前為轉身而就父無影樹頭舞鳳不萌枝上糝花即從伊畢竟公案如何結絕擊龕一下云驚起泥牛㖃夜月倒懸蘿壁上天台全身入塔大慧杲禪師遷佛智和尚入育王塔以手指穴云妙喜與師兄俱是圓悟子妙喜移住徑山師兄遷來在此雖與師兄同條生不與師兄同條死八兩與半斤青紅對碧紫正當恁麼時且歸根得旨一句作麼生道良久云師兄解唱泥牛吼師弟寧忘木馬嘶豁開頂上活人眼鄮山山下是真歸雪嶠信禪師為天童悟和尚入塔坐空千界月諸佛汝同儕鑿破青山面將身就活埋箬庵問禪師為晦夫和尚入塔剷開荊棘獨立乾坤推不向前約不退後團圞無縫卓絕寧彰眼裏耳裏鼻孔裏塵說剎說眾生說無非是老法兄自在三昧本地風光五十五年有恁麼事四處五會無恁麼事有恁麼事履鑊湯爐炭如登平地無恁麼事上刀山劍樹如駕慈航秉先師最初之囑繼夾山後起之塵疑殺天下衲僧作箇諸方眼目今日功能既畢門戶斬新窣堵高巍衝開碧漢且收因結果一句如何舉揚三山雄壓江湖勢一塔長懸萬古燈弘覺忞禪師為天童林野和尚入塔撲碎虗空閒景象一庵卓卓露當陽衘花鳥自難尋跡孰謂將身北斗藏所以道善知識者以形骸為幻泡以生死為郵傳其來也月印江波其去也雲收嶽面唯我法兄林和尚夙因深厚願力弘堅出德嶠之戶門渾身是膽下川勤之三峽就地生波食到口邊奪回洞山菓子不住迷悟超然獨步大方故能橫身十字街頭珠回玉轉垂手千峰頂上斗換星移揮七尺山藤那分凡聖布漫天羅網打盡魚龍一朝𨵙爾告終葢為化緣將畢今則塔從地湧頂合峰尖依常寂以歸真散慈雲而分布且道還有奇特事也無千古玲瓏嵒下寺一龕常照萬年燈奠茶湯靈隱原禪師為碧峰和尚闍維奠茶五臺山拾得來誠非凡種關西子沒頭腦却是靈根惟茲一味清茶蕩滌眾生熱惱只如則川拋下茶籃仰山撼動茶樹畢竟明甚麼邊事度盞云踏翻生死海靠倒涅槃城秉炬雲庵文禪師為法眼大師火時雨新霽泥方滑道忽躂倒大眾爭掖而起乃舉火把云法眼茶毗歸宗遭趺呈似大眾更無可說黃龍祖心寶覺禪師將入滅命門人黃太史廷堅主後事茶毗日隣峰為秉炬火不續黃顧師之得法上首死心新禪師曰此老師有待於吾兄也新以喪拒黃強之新執炬召大眾曰不是餘殃累及我彌天罪過不容誅而今兩脚捎空去不作牛兮定作驢遂以火炬打一圓相曰祇向者裏雪屈擲炬應手而爇無相真禪師為誠和尚火空花落影陽焰翻波夢覺知非靈明廓徹大眾知麼西堂禪師和尚太白峰前夢覺通玄頂上接人兩坐道場功成事辦化緣既畢放下佛祖鉗鎚呼喚不回失我人天眼目然真空不住大智無依何妨脫體提斯不礙重添光彩大眾且道作麼生為他添光彩舉起火把云還見者個麼百尺竿頭不知險七十六年如電閃去去青霄混此身何曾昧却者一點雪軒成禪師為太子少師廣孝姚公火君臣際遇少人知風虎雲龍共一時道德實能扶聖運秉忠挾術未為奇恭惟示寂太子少師封榮國恭靖公姚公尊靈博儒通釋邁古騰今託迹空門若璉嵩出於宋盡忠王室猶申甫生於周故能歷三台之階而乃冠百辟之首安享乎太平之世優遊乎耄耋之年杖䇿來朝方謝唱佛讚揚之聖製旋車言邁遂懷即心清淨之真歸皇上恩眷彌隆禮儀悉舉勳伐既書於史冊寵光覃耀於山林於此便見老國公無生而生處世皆遊戲三昧非滅而滅息緣得解脫神通到者裏又何妨別轉一機與老國公重圓舊話聻驀舉火炬云諸仁者還見麼錦袍玉帶金剛體烈焰光中不覆藏便擲
