body:
  text: 武林十八㵎理安禪寺住持婁東行悅集施主請升座提綱定州崔禪師州將王令公於衙署請升座拈拄杖曰出來也打不出來也打僧出曰崔禪聻師擲下拄杖曰久立令公伏惟珍重風穴沼禪師郢州李史君請升座祖師心印狀似鐵牛之機去即印住住即印破祇如不去不住印即是不印即是還有人道得麼時有盧陂長老出問學人有鐵牛之機請師不搭印師曰慣釣鯨鯢澄巨浸却嗟蛙步𩥇泥沙陂佇思師喝曰長老何不進語陂擬議師便打一拂子曰還記是話頭麼試舉看陂擬開口師又打一拂子牧主曰信知佛法與王法一般師曰見甚麼道理牧主曰當斷不斷反招其亂下座浮山遠禪師歐陽公請因棊說法乃升座若論此事如兩家著棊相似何謂也敵手知音當機不讓若是綴五饒三又通一路始得有一般底只解閉門作活不會奪角衝關硬節與虎口齊彰局破後徒勞綽幹所以道肥邊易得瘦肚難求思行則往往失黏心粗而時時頭撞休誇國手謾說神仙贏局輸籌即不問且道黑白未分時一著落在什麼處良久云從來十九路迷悟幾多人五祖演禪師郭朝奉祥正請上堂朝奉於法座前燒香云此一瓣香爇向爐中為光明雲遍滿法界供養我堂頭師兄禪師伏願於此雲中方廣座上擘開面門放出先師形相與諸人描邈何以如此白雲巖畔舊相逢往日今朝事不同夜靜水寒魚不食一爐香散白蓮峯師遂云曩謨薩怛哆鉢囉野恁麼恁麼幾度白雲溪上望黃梅花向雪中開不恁麼不恁麼嫩柳條金線且要應時來不見龐居士問馬大師不與萬法為侶者是什麼人馬大師云待汝一口吸盡西江水即向汝道大衆一口吸盡西江水萬丈深潭窮到底掠彴不是趙川橋明月清風安可比佛印元禪師郭公提刑請升座郭公拈香云覺地相逢一何早鶻臭布衫今脫了要識雲居一句玄珍重後園驢喫草召大衆曰此一瓣香熏天炙地去也師曰今日不著便被者漢當面塗糊便打乃曰謝公千里來相訪共話東山竹徑深借與一龍騎出洞若逢天旱便為霖擲拄杖下座公拜起師曰收得龍麼公曰已在者裏師曰作麼生騎公擺手作舞便行師拊掌曰祇有者漢猶較些子保寧勇禪師郭公提刑請升座郭公拈香云法鼓既鳴寶香初爇楊岐頂𩕳門請師重著楔師卓拄杖一下曰著楔已竟大衆證明又卓一下便下座兜率悅禪師漕使無盡居士張公商英按部過分寧請五院長老就雲巖說法師最後登座橫拄杖曰適來諸善知識橫拈竪放直立斜拋換步移身藏頭露角既於學士面前各納敗闕未免喫兜率手中痛棒到者裏不由甘與不甘何故見事不平爭忍得衲僧正令自當行卓拄杖下座圓悟勤禪師呂左丞請上堂云一句語全規矩應出毗虗印一種機截衆流透過祖師關若是明眼人已透過三千里其或尚留觀聽猶滯皮膚未免向第二義門重話會去也所以道知幻即離不作方便離幻即覺亦無漸次釋迦老子三世諸佛心髓一時頓現便恁麼承當全心即佛全佛即心心佛無二更疑箇什麼正當恁麼時作麼生道千古萬古黑漫漫填溝塞壑無人會陳大夫請上堂云有句無句初無兩端如藤倚樹打作一片樹倒藤枯忍俊韓盧呵呵大笑金毛獅子若是鐵眼銅睛當陽透便可以把斷要津不通凡聖終不向他語言裏作窠窟機境上受羅籠所以道言無展事語不投機承言者喪滯句者迷不落語言不立機關布漫天網打衝浪魚垂萬里鈎駐千里烏騅也須還他大達之士始得所以趙州勘破處為方便玄沙蹉過處驗作家雪峰輥毬雲門顧鑑睦州見成俱胝一指如生鐵鑄就通上徹下只要箇本分人忽若總不恁麼又作麼生委悉麼了取平常心是道饑來喫困來眠復頌云即心即佛開心印非佛非心蹈大方當處分身千百億普光明殿放毫光大慧杲禪師陳知縣請升座云祖師道通達本法心無法無非法悟了同未悟無心亦無法既無心又無法却喚甚麼作本法本法又作麼生通達黃面老子云心不妄取過去法亦不貪著未來事不於現在有所住了達三世悉空寂諸人還委悉麼若未委悉分明為諸人注破不住現在此名為定不著未來此名為慧不取過去此名為智亦謂之如來禪亦謂之祖師禪苟能於日用二六時中如是通達如是了悟則此定此慧此智一一如空無有邊際定慧智既無邊際則當人日用神通光明亦無邊際神通光明既無邊際諸波羅密諸解脫門亦無邊際波羅密解脫門既無邊際此無住心亦無邊際無住心既無邊際徑山今日以此無邊際心說此無邊際法奉為臣子陳亞卿祝吾君壽地久天長亦無邊際正當恁麼時依時及節一句作麼生道舉拂子云將此身心奉塵剎是則名為報我皇下座應庵華禪師嚴教授請上堂五百力士揭石義萬仞崖前撒手行十方世界一圍鐵虗空背上白毛生直饒拈却膱脂帽子脫却鶻臭布衫向報恩門下正好喫棒何故半夜起來屈膝坐毛頭星現衲僧前東山雲頂禪師九龍觀道士并三士人請上堂儒門畫八卦造契書不救六道輪𢌞道門朝九皇鍊真氣不達三祇劫數我釋迦世尊洞三祇劫數救六道輪𢌞以大願攝人天如風輪持日月以大智破生死若劫火㷊秋毫入得我門者自然轉變天地幽察鬼神使須彌鐵圍大地大海入一毛孔中一切衆生不覺不知我說此法門如虗空俱含萬象一為無量無量為一若人得一即萬事畢珍重千巖長禪師曹居士請升座婺州信士曹仁卿同合宅貴眷就寺設齊表䞋請老僧升座說法老僧曰諾會麼盡大地是箇老僧盡大地是箇法座更教老僧升什麼座說什麼法記得五六年前行橋時已曾到宅叨齊受䞋今日山中三四百衆喫齊受䞋人人歡歡喜喜只者歡歡喜喜增仁卿多少長福田仁卿多少壽量適來長老已為仁卿向法座上舉揚老僧只喫齊受䞋便了不用為蛇畫足自然水到渠成豈不見五祖演禪師云端坐受供養施主長安樂趙州云老僧在者裏坐地更說什麼佛法無明有條攀條無條攀例忽有箇漢出來道和尚你坐地分贓他日作箇什麼填還他施主去只向道不作牛兮定作驢因甚如此大丈夫異類中行不是差事古林茂禪師施主請上堂佛佛授手無邊剎境自他不隔於毫端祖祖相傳十世古今始終不離於當念向上一路千聖不傳直饒坐斷報化佛頭未免墮在聲色堆裏更向威音那畔獨振玄風空劫已前單明自己大似隔靴用拳頭抓癢有甚快活處所以道群靈一源假名為佛體竭形銷而不滅金流璞散而常存百姓日用而不知諸佛常知而獨用以獨用無私之旨常居乎有象之先以日用不知之心逈出乎真諦之表無前無後無古無今彼我混同聖凡不異正與麼時如何青山不鎖長飛勢滄海合知來處高擊拂子下座石車乘禪師司理黃元公等請上堂一句截流全心即佛萬機不到全佛即心到者裏心佛俱忘復是何物喝一喝甜瓜徹蒂甜苦瓜連根苦箬庵問禪師衆官請上堂隨波逐浪不遺一滴截斷衆流不存毫末一口吸盡西江不與萬法為侶且道是隨波逐浪截斷衆流龐居士道十方同聚會箇箇學無為此是選佛場心空及第歸大家在者裏豈不是心空及第且無為又作麼生學長江水上浪滔天明月清風安可比金大司空請上堂師云實際理地不受一塵萬行門中不捨一法若受一塵法輪從何而轉若捨一法佛事何由而興所以有力大人向劫濁苦海中為津為梁逆行順行總莫可測回天關轉地軸須是其人方能擔荷吹陽春於既燼樹福運於方興結一時殊勝之緣作千載賢良之合風雲際會敲唱乘時有此殊勝因成此殊勝緣具此殊勝願得此殊勝福不忘囑付舉起便知把手相呈一超直入且徹頭徹尾一句作麼生道全憑舉鼎調羮手撥轉如來正法輪慶生提綱圓悟勤禪師周侍御請上堂玄機透脫融萬象於目前至理高明會千差於物表一明一切明一見一切見一用一切用一說一切說直截根源當陽顯露若能於此洞達去自己腳跟下一段大事明於杲日寬若太虗可以修身可以見性可以祝一人上壽可以種未來勝因是故靈山拈花迦葉微笑少林面壁神光傳心於是中間如擊石火似閃電光須是奇特人方明本分事要知本分事還他奇特人只如今日奇特本分底一句作麼生道葵藿同傾仰高祝萬年春鄭太師請上堂乃云靈光未兆萬彚含太虗一氣既彰華開世界起過去諸佛現在諸佛未來諸佛皆同箇中出現若天若人若群生無不從是中流出以一處明百處千處光輝一機轉千機萬機歷落所以道淨法界身本無出沒大悲願力示現受生然而此悲此願此力若是宿稟靈根具超脫種智則才生下時已作獅子吼已具大神通至於若行若住若坐若臥或放行或把住無不皆從諸聖頂𩕳上縱橫十字乃至享福享壽享富貴多子孫悉承渠儂威力正當恁麼時一句作麼生道重重彰瑞氣一一湧金蓮復頌云威音已前靈苗秀到今光彩轉新鮮萬卉芬芳風景麗壽山高到大椿年大慧杲禪師榮侍郎生日請升座僧問楊岐一頭驢為什麼只有三隻腳師云你少喫水草進云恁麼則覿面相呈更無回互師云且莫詐明頭進云既是潘閬倒騎歸為什麼攧殺黃番綽師云非汝境界進云爭奈即今何師云且莫辜負老僧進云恩大難酬便禮拜師乃云楊岐一頭驢只有三隻腳潘閬倒騎歸攧殺黃番綽妙喜三十年前底注腳今日被者僧對人天衆前華劈一上不同小小直得楊岐和尚拍手呵呵大笑山河大地萬象森羅一時起舞當恁麼時且道是甚麼人證明所以道處處真處處真塵塵盡是本來人真實說時聲不現正體堂堂沒却身作麼生是堂堂正體未離兜率已降王宮未出母胎度人已畢豈不是堂堂正體若作堂堂正體會則辜負釋迦老子若不作堂堂正體會則辜負自己自己既辜負將甚麼與釋迦老子相見若向者裏撥得一線路方知釋迦老子在兜率天乘日輪香象降摩耶夫人胎只是示現箇生底時節以至一手指天一手指地云天上天下唯我獨尊也只是與一切人作箇示現生相底樣子若向者裏見得不獨為釋迦老子出氣亦乃與生身父母出氣不獨為生身父母出氣亦乃與一切有情出氣正當恁麼時且道承誰恩力良久云揮劍斫開人我易推山塞斷是非難博山來禪師魏國公徐六翁老居士誕日請上堂因緣所生法莊嚴世間相了彼性空者斯人具正眼諸昆仲心本無生從緣有生生緣勝故佛種亦勝法華經云佛種從緣起是故說一乘作麼生是說一乘底道理諸昆仲毫端斂法界之方滴水含滄海之濶無明全諸佛之智藏識潛增上之緣理應箭鋒事存函蓋不可以思議而得之者也諸昆仲茲因魏國六翁老居士華筵大誕之辰合郡衆居士於濟生庵中設此無遮大會為六翁居士祝壽且道將何為祝耶須彌耶滄海耶大地耶草木叢林耶若以須彌為壽須彌高而有頂若以滄海為壽滄海深而有源若以大地為壽大地厚而有輪若以草木叢林為壽草木叢林多而有盡惟以吾大圓覺中華藏界內香雲花雲幢幡雲音樂雲寶蓋雲若舉一若舉二若舉百若舉千乃致百千萬億數中隨拈一微塵許皆與有情無情等與毗盧遮那等皆可為居士祝壽也雖然如是不免為居士旁通箇消息作麼生是旁通底消息華藏界中才一念閻浮早已萬千年珍重箬庵問禪師慶誕升座今日是大玉太史不惜眉毛露頭露面底時節此老于二千年前靈山會上親受釋迦老子遺囑未離當處已到閻浮未出母胎已成正覺今日既不忘囑付山僧插一瓣香為伊證明還會麼若也會得便見目前山河大地若草若木若有情若無情同聲讚嘆以祝眉壽且道山僧拄杖子又如何慶讚卓拄杖一下云南山不斷𮑫葱翠東海方升爛熳霞巖壑久沾春富貴濛濛新雨潤林華施主誕日