body:
  text: 武林十八㵎理安禪寺住持婁東行悅集住持為亡僧秉炬起骨煅骨入塔撒骨恕中慍禪師為耐監寺火逼慈明晚參是死伎竪起火云火炎崑岡玉石俱焚耐烹煉者惟真金爾為受都寺火受得惡辣拳踢便解超生越死漏燈盞動地放光金剛圈分文不直烈焰堆中埋釣車釣得鯉魚長一尺為福維那火福城東際不異于今汝因甚向桶箍𪹼處方始死却伎倆滅却現行舉火云點火照看面皮厚多少為生都寺火楊岐對白雲發笑大似逼生蛇化龍總是死門俱非活路擲下火云我喚作火汝不得喚作火有提點火拈却漏燈盞放出本有靈光照破歷劫生死昏衢之夜月不待風而凉日不待火而熱為義都寺火汝雖出塵不明勝義是情執未斷汝雖年耄不達性空是大事未了即今四大已離未斷斷取未了了取楊岐擔子拗作柴燒烈焰堆中橫飛雪雹無文璨禪師為珠浴主下火家家門前火把子臨機應用無不可香水海裏動地放光生死路頭一時照破某人還見麼以火把打圓相云切忌喚作明珠一顆薑頭下火盡力事犁鉏無意除鬚髮老去志益堅生薑不改辣大地忽鉏翻一死不再活看看開先今日活汝去也擲下火把云火蛇劈面來虗空連底脫呆庵莊禪師為珍藏主火從門入者不是家珍三乘教典都無實義喚作火則燒殺你不喚作火凍殺你義藏主火與汝往來者是藏不與汝往來者亦是藏要明第一義諦切忌死他語下以火把打圓相云月不待風而涼日不待火而熱擲下火藥監寺火應病與藥據欵結案金剛圈栗棘蓬透不過吞不下總是死漢山前猛虎趂於菟火裏蝍蟟吞鱉鼻璣藏主火辨傾河漢文綴珠璣生死岸頭總用不著一大藏教是箇之字祖師西來是箇右字提起火云勝熱門頭參得透丙丁童子念摩訶鐵關樞禪師為超監寺火擊碎金圈超越生死白日青天火把子南石琇禪師為月維那新上座火綱維已經歲月不是新入叢林死生大事苟或未明且聽火𦦨為汝說法為茂知客火未悟客塵煩惱熾茂既了一真廓清宇宙直得死柴頭火𦦨揚真吼為淨上座火淨智妙圓體自空寂出生入死如火燒氷為達性空首座火鐘樓上念讚床腳下種菜直下了達生死無疑性空真火性火真空蟭螟吞却須彌峰為澄藏主火揚下柴瓣剎海波澄了知無佛無祖誰云有死有生泥揑金剛雲裏走筆描菩薩火中行為堂司庫行者淨守火碓房舂米是生死岸頭事廊下報衆是生死岸頭事作麼生出得生死二由一有一亦莫守火裏䳭鷯開笑口佛朗性禪師為天童妙監寺火者一交裏了生死無可道作得主中主論甚妙不妙抹過金剛圈常光淨悄悄以火把打圓相云會麼烈𦦨堆中急轉身向上別有通天竅為汝瓊都寺火一毫頭上瓊樓玉殿者邊那邊日面月面抹過楊岐三腳驢管甚生死急如箭大火堆中鍊一番堂堂正體金剛焰喝一喝為靈春都寺火一氣令初回春光遍大地放下漏燈盞生死若遊戲來來實不來去去本無去真空性火無生忍便是龍華最上記為恩極都寺火極濟慈定力豈有生死疾夜行莫踏白非水便是石公私總莫論擊碎無明窟以火打圓相云智火金剛身大千如日出石雨方禪師海火頭火一向你燒火今日火燒你但得火性空你性亦復爾海火頭會也未一陳無風波浪生智海雖深終見底弘覺忞禪師為達本火頭火冷竈著把火熱竈著把火如爾所作因還爾所得果知因達本體無生笑殺嵩山破竈墮為止休淨上座火一念回光父母未生誰是我四楞塌地真常獨露本來人況復知止能止知休即休古廟香爐去一條白練去雖受他家盂不更強安柄杷白醭華平堆口角黃獨飯爛嚼鐺中唯其掩息如灰故能死生若脫但只恁麼去恐守寒嵒異草青坐著白雲宗不妙山僧到此不免為你別轉一機欲待橫身三界內請參勝熱婆羅門攛下火苣便燒為印明都寺火難侵最是祖爺田九鼠三蛇任穴穿幾度洞然明劫火松風時到竹坡前所以古者道體竭形消而不滅金流朴散而常存此之是也恁麼更說甚麼三十年前河流東三十年後河流西要且世界成與者箇沒交涉世界住與者箇沒交涉世界壞空亦與者箇沒交涉且道者箇是甚麼攛下火苣云劈面來時親薦得當空寶印搭青天為瑞駝僧火誰云曲不藏直須信活中有死如今死了却活頂後神光萬里提起火苣云看看我見燈明佛本光瑞如此為惟凡禪人舉火不著凡情便聖情吳山楚水競崢嶸而今黃鶴樓拳倒鸚鵡洲前月正明急著眼好惺惺消息盡時全體見鐵蛇火裏嚼寒氷為恆徹禪人火般若如大火聚四面不可入般若如清涼池四面皆可入可入也沒處去不可入也沒處去祇如全身在裏許底又作麼生攃手那邊千聖外回途堪作火中牛為本具柴頭火羡爾出家晚行業多純恪雨落打草鞋晴乾圖得著職供㸑下薪日向青山斫右提拙斧芟左搓芒繩縛鳥道負將歸高低盡踏著三昧堂堂受用身由來本具妙明焯無端擔子折今朝慶快平生真灑落何似嵩山破竈墮豈爭普化搖鈴鐸阿呵呵樂不樂火裏蝍蟟吞大蟲萬里天邊飛一箬庵問禪師為聞副寺火從聞思修入三摩地掣斷黃金鎖通身百雜碎石火光中薦得親一聲長嘯清風起為澄侍者火竹林寺裏親見親聞底便是今日底石磬山中親證親據底便是今日底你不曾背我我不曾虧你從朝至莫執巾瓶一段聲光蓋天地八風吹不動毀譽莫能加抹過五須彌掀翻四大海驪龍頷下奪得髻珠猛虎鬚邊揮開毒手是則眼親手辨烜赫一時到頭脫鎖離鈎真能坐斷不謬為獅子窟中獅子誠所謂旃檀林裏旃檀汝事既圓豫心何憾到者裏透過末後重關百尺竿頭且道還有進步也無自從爍破昏衢暗遍界明明不覆藏遂投炬祖關依禪人火慧燈堂光輝遍界洗鉢池烈𦦨亘天依報正報具足莊嚴抹過諸方瞎禿禪不妨絶後光前自休禪人火教休不肯休荷衆曾竭力剔起兩莖眉不信有今日若也信得及死生何間隔竪起光明幢為君重著楔瀚堂禪人火瀚上座你從何處來却從何處去你底來處便是去處識得去處不負來處祇如無所從來亦無所去又作麼生看火發也無文燦禪師為議上座起骨向上一機滿眼滿耳如過風疾𦦨不容湊泊如倚天長劍不容擬議何故轉腦回頭橫尸萬里慧上人起骨慧日高懸普天匝地爍破佛祖眼睛揭示衲僧巴鼻雖然覿體全真認著依前不是何故差之毫氂失之千里高峰妙禪師為二正上座煅骨正上座兩不成雙一不成隻牙齒分明是具骨萬煅爐中色正輝泥牛觸碎蒼龍窟廣捨上座煅骨取不得捨不得正恁麼時如何委悉咄剔起眉毛火裏看分明一具黃金骨大慧杲禪師為益照二禪人入塔呈起左手骨云者箇是眉州益呈起右手骨云者箇是饒州照一人會禪一人會教雖然各自行畢竟同時到且道同時到底事作麼生誰家別館池塘裏一對鴛鴦畫不成為月禪人入塔捧起骨云靈山話月曹溪指月妙喜今朝捧月仔細窮究將來一時未得勦絶何以故却被者箇阿師盡把機關漏泄既漏泄看看又是中秋節無物堪比倫教渠自家說古梅友禪師為傳侍者入塔樹倒藤枯紅爐焰滅弄盡骨董更無漏泄打歸塔院氷清玉潔傳侍者掣開大地到牢關如淨琉璃含寶月恕中慍禪師為明都管入塔明知是者箇開口道不得明知不是者箇開口却道得坐斷兩重關天然露風骨百發百中聖箭離絃七穿八穴湘南潭北為君幾下蒼龍窟呆庵莊禪師為履首座入塔真實履踐的人出生入死如同遊戲且眉間挂劍時如何擬議不來髑髏著地南石琇禪師為因監寺入塔因妄有生因生有滅寂滅現前髑髏眼活菡萏花開栗棘蓬無縫塔中雲匌匝鐵關樞禪師為慈都寺入塔報慈隔枯骨汁金剛圈爛泥團揚下骨云澄潭不許蒼龍蟠高峰妙禪師為得意化主入塔得意忘言逆行順化常在途中不離家舍彈指一下云塔戶開了也遍界髑髏無處藏者裏全身俱放下中峰本禪師為謙西堂入塔號無礙住千頃寺徹骨窮來三十年每於佛祖結生冤巨靈揑碎虗空骨大用塵塵總現前恭惟某人獅子巖前參得一句蓮華峰頂似空合空蓮華峰頂悟得一機獅子巖前如鏡照鏡者邊那邊應用不缺千頃萬頃遇緣即宗拈却水火珠放下打草扇到者裏盡十方世界是金剛正體盡十方世界是無縫塔門出亦無礙入亦無礙且道不出不入一句作麼生舉揚鐵馬衝開青石門玉雞破黃金㲉鑑首座入塔末後一句子儞未跨滇一萬八千里路時已常說了也今日古鑑發光露出晴空閃電團團無縫塔門開收取眉間三尺劍雲南人弘知客入塔維那不在當汝打槌劈頭一下振起宏規掣開無縫塔擊破玉玻瓈正是全身放下時天如則禪師為大上座入塔盡大地是箇大上座盡大地是箇死髑髏盡大地是箇無縫塔且道門從那裏入喝一喝幻有傳禪師為衆靈骨入普同塔盡十方世界是箇無縫塔又向何所在覓入處出處因人妄計有出有入耳今日不管是張三底骨襯也不管是李四底骨襯也不管是徐五底謝八底舉拄杖指塔戶云總為我拈來都放在者裏安置忽憶釋迦老子云我觀三千大千世界乃至中間無有如芥子許地不是我捨身命處咦將此身心奉塵剎是則名為報佛恩箬庵問禪師為徹首座入塔尊貴一路天然自別徹尾徹頭何生何滅生鐵鑄就心肝渾鋼鍊成脊骨是汝尋常特立孤標人天表率撒開窮相手奮起遼天鼻雖然未展全威早已開花鐵橛笑香嚴上樹特地周遮嗤鷲嶺拈花空資餘力果然赤手承當不謬衲僧氣息山僧今日到者裏有口難揚有心莫測以拄杖打圓相云扶起叢林大法幢留與後人為準則弘侍者入塔狹路相逢驀遭熱喝燒却茅庵同出同沒撞倒須彌山渾身無處著未肯甘心便活埋幾度江南又江北且道山僧負你你負山僧投骨云大慟忽傾三日雨不風流處也風流永書記入塔人道我是生道上座是死山僧道我是死上座却活以何驗得指塔云入時值師五十誕辰玉禪人入普同劍峽險未是險瞿塘深未是深出一保社入一叢林摸他碗底高突兀瞰他戶牖難探捫今日忽然靠倒送歸萬丈淵坑以拄杖指塔云到處去來無朕迹不如者裏好安身弘覺忞禪師為惟凡禪人入塔少林即說得皮髓南嶽亦分眼舌心驀過湘南潭又北盡云一國充黃金提起骨襯云天童者裏要且不然凡聖目前齊包裹從教枯骨作龍吟石雨方禪師棲煙盤銘山鳴同入塔常寂光土凡聖同居土一手遮攔一手揭露棲煙盤銘山鳴三位覺靈既已共命同船從此不須回互要回互同氣相求同聲相和擲骨曰陊移寶壽舊普同霛骨入新普同塔如來禪祖師禪盡仗春風二月天東雲水西雲水鷓鴣啼落花飛去衆覺靈且莫動雖然不食空王俸也要大家知奉重擲骨曰送無相真禪師為京監院撒骨六十三年夢幻身箇中消息許誰親鐵牛耕罷翻身處觸破澄潭夜月新京監院早歲行腳遍歷諸方投老歸來隨緣任運非常灑落到底惺惺雖然去住自由爭奈者箇猶在是恁麼時諸人還知落處麼阿耨池心一派來電光照徹三千界比丘尼遷化請佛事起龕秉炬入塔元叟端禪師為妙淨潔長尼起龕見身無實是佛身山河大地逈絶異緣了心如幻是佛幻草木叢林更無別法故我某人現比丘尼身成大丈夫事拋玉樓金殿直趣此宗挺鐵壁銀山單明自己廓性天之雲翳蕩心地之塵昏透聲透色八面玲瓏亘古亘今十方通暢毋固毋必能柔能剛道契南北兩朝名滿東西二浙靈機活脫劉鐵磨未足觀光智鑑虗圓凌行婆亦須退步全體是個解脫大海全體是箇涅槃妙心無起滅可求無生死可出百骸潰散卓爾獨存四大分離湛然常寂正與麼時身裏出門即不問門裏出身作麼生毗盧頂上從來往安樂中任去留弘覺忞禪師為希庵尼起龕一番提起一番新固守玄關坐殺人沒北斗出南辰欲看飛龍千界外密移一步是通津大衆祇如推不向前約不退後底又且如何以拄杖擊龕一下云伸出鐵驢三隻腳倒騎玉象趂麒麟元叟端禪師為尼能上座火生緣既了能事既畢四大五蘊則且置性比丘尼轉一念成阿羅漢畢竟有何憑據擲下火云炎炎火一團觸著燒殺你弘覺忞禪師為本祐尼火四大分張後諸緣盡捨離涅槃山側望煙草正萋迷摧殘峻峭銷爍玄微髑髏乾盡娘生眼萬里神光頂後輝無用寬禪師為慈受道姑入塔示現閻浮童女身不曾錯認定盤星火中煅過猶光彩窣堵波中四季春箬庵問禪師為尼戒生入普同白玉琢成黃金鑄就百千諸佛共參隨普光殿上同擕手不是涅槃亦非後有放身命處絶蹤由依舊面南看北斗優婆塞遷化請佛事起棺秉炬起骨入壙撒土點主石門剛禪師為杜均玉起棺五十餘年一夢歸好人去速實堪悲寒梅帶露蘭江上也似愁人泣淚垂恭惟某人一州達士四海佳聲幼年紹叔父之箕裘壯歲勝祖宗之家業二男二女喜有室而有家一夫一婦宜曰壽而曰富豈期染膏肓之疾何遽罹肺腑之憂忽移夜壑之舟永別天年之數正謂花開雨驟月皎雲遮眷戚哀號妻兒痛苦堂上之孀親失所連枝之手足傷情便好以智慧刀割斷恩愛網踏開生死路跳出是非關返照回光悟本性無非佛性歸真捨妄了凡心即是聖心出火宅高駕大車向塵退轉一步卜陰宅當歸裏便請安然對溪山不異淨有何隔礙當著猛省更莫遲疑雖然如是且道出門一句得作麼生咦信腳出門皆大道此方他界任優游天目禮禪師為陳統制秉炬一作邊頭戰馬催幾番得勝凱歌回如今老大身無用臥聽城頭奏落梅忠腸易斷憤氣難摧末後一重牢寨南山為汝衝開陳統制快須齧鏃機前看火箭空中劈面來中峰本禪師為馮將仕秉炬現成公案絶安排無位真人笑滿腮吸盡太湖涓滴水寒梅樹樹待春開舉火把云某人八十年來只憑者箇起家立業勤倉儉廩積有餘仁居義路行無竭八十年來只憑者箇崇德慕善舉心曾不昧天真觸著通身是方便八十年來只憑者箇教子育孫挺挺群賢繼芳躅珊珊環珮振高門八十年來只憑者箇收因結果苞湯水面青溶溶善慶堂前花朵朵到者裏本來面目觸物純真自己家山不離跬步八萬四千毛竅與性空真火竅竅相通三百六十骨節與性火真空節節相拄垂光散為福德林流輝攝入光明戶且道者箇是何物聻以火把打圓相云團團轉作大圓鏡條條照出珊瑚枝盡大地人都不見只許馮公獨自知古梅友禪師無為居士火萬葉墜黃金千峰凜寒嶽翻身直上涅槃山畢竟以何為倚託從來鼻孔大頭垂出入行藏須摸索休摸索山頭石虎吼聲乾海底泥牛觸折角百千諸佛眼中沙一念不生成正覺是即是已畢竟如何是末後句覺通居士喏倒騎鐵馬上崑崙一任紅爐煉空殼高峰妙禪師為智光居士火以火打圓相云姑蘇水天目山總是維摩不二關烈𦦨光中回首處依稀倣佛似人間弘覺忞禪師人力林子佩火生涯白膊度朝曛荷衆常肩百二斤扁擔今朝親折却逍遙一似海天雲林子佩知也未由汝往因福不修生來日與苦相磕流離波迸幾多般怙恃無人誰覆蓋託叢林為倚賴朝斫青山莫負途通身白汗流滂沛命何慳孤且脆未登三十早夭亡豈是皇天真不惠聽我言休怨懟以火苣打圓相云唯此一事浩然均富不有餘貧不匱在汝躬無缺壞大威光火摩尼雨寶之時珍遍界劫可燒渠無礙不增不減自金剛身去身來常三昧肩上鍬手中耒喝一喝云者回盡付丙丁翁一筆勾消窮鬼債攛下便燒天如則禪師雲壑石萬戶起骨生則封侯䇿戰功死當廟食顯神聰撫骨云更從者裏翻身去佛國塵塵有路通某人英勇無敵沉靜有謀武略文韜自任緑林之馮異忠肝義膽每懷赤壁之周瑜朋友推其賢士卒感其惠奉王命剪除猺獞奮不顧身握兵權威震蠻荒聞者喪氣奏凱始傳於天上歸途忽厭於人間清湘院前打翻筋斗去吳松江上迎得骨函歸天地為之改容山川為之墮淚功既成矣死何憾焉合國稱為大丈夫二十四年從教似夢傳家賴有奇男子百千萬世可以流芳到者裏猛著精神別通消息裂開煩惱網擊破死生關幻形幻影有去有來似浮雲之出壑真性真明不遷不變如皎月之當空即此是自己根源即此是故鄉田地即此是安身立命處即此是成佛作祖時是則固是且道即今起骨還有祥瑞也無昨夜天風攪雪花為公灑掃西歸路無相真禪師為嚴百三三祕省入壙大衆故嚴百三三祕省文星孕彩廓徹四明將攀月裏高枝欲作人間霖雨時不我與遽逐逝波是憑脫體提撕要見本來面目蘆山今日豁開方便直指要津百三三祕省便恁麼徹底去一入一切一切入一獨步大方遊戲三昧然雖如是更須轉却一切處始得若一切處轉不得同死不同生若一切處轉得同生不同死正當恁麼時要會超生脫死句麼凜凜英風用無盡行看蘭玉靄家聲應庵華禪師為留守樞密大資掩土天高地厚海濶山遙發最上機示真實相故我留守樞密相公廓頂門正眼顯肘後靈符以此為國為民以此至忠至孝可謂大功不宰果見作家末後全提十虗坐斷無生田地有種有收般若舟航有津有濟直得高超物表獨蹈大方正恁麼時全身奉重一句作麼生道好須雲外看一劍倚天寒元叟端禪師為渤海月軒朱處士掩土盡十方世界是箇大光明藏從古至今無一法可增盡十方虗空是箇大解脫門從古至今無一法可減故我渤海月軒處士為一鄉之善士作三界之韻人其在儒也則儒苑之蓍龜其在佛也則佛門之牆塹雖示作有為事而不滅壞無為之相雖示學無為法而不分別有為之名雖示有功名富貴而不為功名富貴所拘牽雖示有塵勞業感而不為塵勞業感所汩沒拓本來田地顯自己家風以詩書振祖宗以禮義悅親友處夫婦如琴如瑟生子孫如鳳如麟行種種方便成種種因緣昔年全體與麼來蛇現酒中之影今朝全體與麼去鴻遺沙上之痕酒中蛇影既無實跡可留沙上鴻痕豈有真蹤堪戀七通八達了沒遮攔萬別千差都無罣礙正恁麼時歸根得旨末後光揚一句如何擎展一壞黃土蓋平生千古清風動巖穴千巖長禪師為樓清翁入壙天公豈可沒人情雨雪堆中揀得晴修福自然招福報生前死後顯光明大衆還見面前一片田地麼者是我清翁老人親手做得來底生也受用不盡死也受用不盡傳之子子孫孫亦復受用不盡現前諸人若能見樣學樣各請歸家做取者一片田地好不然山僧更為鋪花錦上世有英傑積善種德一句合頭千車共轍即日恭惟我故檀越清翁老朝奉智者國師種族義烏縣裏老成八十四年生生本不生行而能說說而行八十四年死死亦不死子又生孫孫又子三年之喪孝也今日之葬禮也天之清翁之清矣鄰上清釋梵之宮地之厚德之厚焉廓心地真常之境泥𡋯頭突出鼻孔髑髏中豁開眼睛觀色即空成大智不住生死觀空即色成大悲不住涅槃既不住涅槃又不住生死即今清翁老人全身奉重一句作麼生道以土撒云靈棺可掩名難掩路上行人口似只此告違伏惟珍重為樓文翁入壙生死世之常消長天之道人為萬物靈一老一不老恭惟故檀越文翁提舉樓公尊靈富壽雙全名行兼至八十五年前未有父母所生皮袋子八十五年後父母所生皮袋子終歸土裏八十五年中有見聞知覺有喜怒哀樂別尊卑分善惡事上種種有條理上頭頭無錯為井邑之老成成兒孫之家活聖世現長者之身人中奮大夫之作皆從皮袋子主人公做將出來如今主人公拋了皮袋子盛在棺材裏且道與父母未生前面目同耶不同耶一即三三即一千變萬化從中出金烏夜夜徹天飛朝朝湧起團團日世尊云身相屬四大心性歸六塵四大體各離誰為和合者老檀越者箇猶是生死岸頭事超生脫死一句又且如何拈土云大地都盧土一撮一撮土中天地濶天地只是一靈棺一對眼睛活潑潑回頭撞著自家底明月清風安可比耀古騰今只者是老人年尊伏惟安置天如則禪師為居竹曹公掩壙脫得生死要知落處落處既分明從空放下去放下後如何天開地闢現全身玉鳳夜棲無影樹某人梅渚參軍之子守齊教授之孫遠則武惠王以來歷代傳青史近則文恭公而下滿門無白丁人皆羡其盛哉公不以為榮也小試教庠之任厭吳江楓冷而拂袖便歸繼承省檄之招愛蒸溪竹居而掉頭弗起素行富貴富貴不淫無意功名功名自至左干戈右爼豆固未忘曹氏家聲朝詩酒暮琴書且願效晉人風度亦嘗刲股和羮以療大父之病亦嘗解衣推食以供寒士之需其待朋友也切切偲偲其待宗黨也磊磊落落儒學子弟仰之為文章巨公集賢縉紳號之以清逸處士平生萬事已足末後一機更高頂門露金剛眼睛著著見古人關棙筆底現法華寶藏頭頭顯自己家珍文字語言一無所礙涅槃生死兩不相妨從前只道出來出來速出來苦哉三界火宅到此方知歸去歸去好歸去儼然一會靈山既曰知歸爭奈有箇將不去底既將不去合與覆藏既曰覆藏有何證據撒土云化城寶所無分別寸土元來是寸金弘覺忞禪師為丸鐘黃居士掩土卓拄杖云者一片地從本已來體無向背境絶方隅開闢自生佛已前莊嚴在威音那畔非三災之可到豈四運之能遷良由田地穩密故名金剛王寶剎亦名無畏獅子幢其隱也三世諸佛侵欺不得其密也歷代宗師天下老和尚跨越無門今則山僧收將元本契書兩手付與丸鐘黃居士便請四稜著地全身放倒歸涅槃之大宅統法海以為家更無此界他方誰分客鄉流寓竹松引畔常露本地風光百草頭邊全彰腳跟大事直得如月臨秋水在處光輝似鴈過長空景沉無迹所以道處處真處處真塵塵盡是本來人真實說時聲不見正體堂堂沒却身敢問既沒却身又且如何是堂堂正體漢地不收秦不管倒騎驢子上楊州石雨方禪師為太常葛屺瞻居士點主山高為筆水長為墨先生之風描寫不及其天道也天何言哉其文章也文不加點雖然湖南夫子成千古風月依稀任主張優婆夷遷化請佛事起棺茶炬煅骨入塔撒骨點主無用寬禪師為孔氏夫人起棺無用之語都無定止覿面相逢喝聲道起為周安人起棺本無男女相四大假合就現身塵世中苦樂逆順受喝跳出生死關清風喧宇宙天隱修禪師為嚴道人起棺拈拄杖擊棺云迷從曠劫直至而今捨身受身輪回虗幻你若者裏薦得業障如山一擊分明百雜碎真性如海片時返照萬緣空其或未然再聽古佛偈云假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅既然如是出門一句作麼生道以拄杖指云薰風自南來且歸林下去元叟端禪師為聚淨人下火不是風動不是幡動此是盧行者坐斷人舌頭底句直下如大火聚近之則燎却面門高峰妙禪師為志足淨人火生不足死有餘灰飛煙滅露全軀便恁麼有何拘六月炎炎火一爐為志明道人火只遮一著子今古無傳授惟有明道人始終能保守鐵牛火裏翻筋斗無用寬禪師為慈山道人火擊破死關通身暢快哮吼一聲威音劫外擲火云山頭火發一彩兩賽為慈發淨人火水底火發燒虗空大地山河一夢中便向機先身得脫南山石虎咬清風為王氏慈道人火東村王大嫂和州買栲栳火急走家來一覺不知曉擲火云燒了箬庵問禪師為行珠優婆夷火摩尼久埋沒今朝光始燦爍破太虗空氷河發火𦦨薦不薦試入紅爐重煅煉高峰妙禪師為智藏淨人煅骨一大藏教全體是火若有嶺南靈骨便好赤身擔荷雖然更入紅爐重煅過古梅友禪師為榮道者入塔灰飛大野骨節還山𪹼地一聲始到牢關榮道者一點靈光非內外浮屠空鎖白雲閒石雨方禪師為法雷送母淨緣入塔白雲無跡緑水有源二俱不住誰是淨緣會得者男相女相悉歸安養不會者無縫塔裏暫爾偷安且道無縫塔又如何偷安昨夜花枝零落盡曉來依舊北風寒無用寬禪師為慈清道人撒骨一生一死孰能分骨節騰光耀頂門撒向洪波深水裏好似從前都不曾箬庵問禪師吳白涵居士請為太夫人點主師拈筆云大衆會麼此是從上若佛若祖不斷底血脉天人群生類皆承此恩力今日奉為吳母蔣太孺人當陽點出普令令子賢孫各知所自現前一衆共徹未見未聞一斷奇特大事乃點主云一葉花敷金色界萬山雲拱玉樓臺建楞嚴會提綱安居前淨因成禪師楞嚴會上堂拈拄杖曰清淨本然云何忽生山河大地看看富樓那穿過釋迦老子鼻孔釋迦老子鑽破虗空肚皮且道山河大地在甚麼處擲下拄杖召大衆曰虗空翻筋斗向新羅國裏去也是你諸人切忌認葉止啼刻舟尋劍龍翔圭禪師建會上堂見見之時見非是見見猶離見見不能及落花有意隨流水流水無情戀落花諸可還者自然非汝不汝還者非汝而誰長恨春歸無覓處不知轉入此中來喝一喝曰三十年後莫道能仁教壞人家男女淨慈象禪師建會上堂古者道一翳在眼空花亂墜拈拄杖曰淨慈拈起拄杖豈不是一翳在眼百千諸佛總在拄杖頭現丈六紫磨金色之身乘其國土遊歷十方說一切法度一切衆豈不是空花亂墜即今莫有向拄杖未拈已前坐斷得麼出來與淨慈相見如無切忌向空本無花眼本無翳處著到驀擲拄杖下座
