body:
  text: 武林十八澗理安禪寺住持婁東行悅集五參提綱楊岐會禪師上堂舉古人一轉公案布施大衆良久曰口祇堪喫飯上堂踏著稱錘硬似鐵啞子得夢向誰説須彌頂上浪滔天大洋海裏遭火爇參上堂楊岐一要千聖同妙布施大衆拍禪床一下云果然失照參上堂楊岐一句急著眼長連床上拈匙把筯上堂拈拄杖云一即一切一切即一畫一畫云山河大地天下老和尚百雜碎作麼生是諸人鼻孔良久云劍為不平離寶匣藥因救病出金瓶喝一喝卓一下上堂楊岐無旨的種田博飯喫説夢老瞿曇何處覓蹤迹喝一喝拍禪床一下上堂薄福住楊岐年來氣力衰寒風凋敗葉猶喜故人歸囉囉哩拈上死柴頭且向無煙火上堂雲蓋是事不如説禪似吞栗蒲若向此處會得佛法天地懸殊上堂擲下拄杖曰釋迦老子著跌偷笑雲蓋亂説雖然世界坦平也是將勤補拙示衆云身心清淨諸境清淨諸境清淨身心清淨還知楊岐老人落處麼河裏失錢河裏摝白雲端禪師上堂鳥有雙翼飛無遠近道出一隅行無前後你衲僧家尋常拈匙放箸盡道知有及至上嶺時為甚麼却氣急不見道人無遠慮必有近憂上堂乾坤之內宇宙之間中有一寶祕在形山大衆眼在鼻上腳在肚下且道寶在甚麼處良久云人面不知何處去桃華依舊笑春風上堂古者道將此深心奉塵剎是則名為報佛恩圓通則不然時挑夜菜和根煮旋斫生柴帶葉燒上堂江月照松風吹到者裏還有漏網者麼良久曰皇天無親上堂入林不動草入水不動波入鳥不亂行大衆者箇是把纜放船底手腳且道衲僧家合作麼生以手拍禪床曰掀翻海嶽求知己撥亂乾坤見太平上堂忌口自然諸病減多情未免有時勞貧居動便成違順落得清間一味高雖然如是莫謂無心云是道無心猶隔一重關示衆云泥佛不度水木佛不度火金佛不度爐真佛內裏坐大衆趙州老子十二劑骨頭八萬四千毛孔一時拋向諸人懷裏了也圓通今日路見不平為古人出氣以手拍禪床云須知海嶽歸明主未信乾坤陷吉人上堂釋迦老子有四弘誓願云衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成法華亦有四弘誓願飢來要喫飯寒到即添衣困時伸腳睡熱處愛風吹上堂古人留下一言半句未透時撞著鐵壁相似忽然一日得透後方知自己便是鐵壁如今作麼生透復曰鐵壁鐵壁上堂若端的得一回汗出便向一莖草上現瓊樓玉殿若未端的得一回汗出縱有瓊樓玉殿却被一莖草蓋却作麼生得汗出去自有一雙窮相手不曾容易舞三臺上堂絲毫有趣皆能進畢竟無歸若可當逐日退身行興盡忽然得見本爺娘作麼生是本爺娘乃云萬福便下座示衆云如我按指海印發光拈起拄杖云山河大地水鳥樹林情與無情今日盡向法華拄杖頭上作大獅子吼演説摩訶大般若且道天台南嶽説箇甚麼法門南嶽説洞上五位修行君臣父子各得其宜莫守寒巖異草青坐却白雲宗不妙天台説臨濟下三玄三要四料揀一喝分賓主照用一時行要會箇中意日午打三更廬山出來道你兩箇正在葛藤窠裏不見道欲得不招無間業莫謗如來正法輪大衆據此三箇漢見解若上衲僧稱子上稱一箇重八兩一箇重半斤一箇不直半分錢且道那箇不直半分錢良久云但願春風齊著力一時吹入我門來卓拄杖下座保寧勇禪師上堂山僧二十餘年挑囊負鉢向寰海之內參善知識十數餘人自家並無箇見處有若頑石相似參底尊宿亦無長處可相利益自此一生作箇百無所解底人幸自可憐生忽然被業風吹到江寧府無端被人上當推向十字路頭住箇破院作粥飯主人接待南北事不獲已隨分有鹽有醋粥足飯足且恁麼過時若是佛法不曾夢見上堂侍者燒香罷師指侍者曰侍者已為諸人説法了也上堂看看山僧入拔舌地獄去也以手拽舌云阿㖿阿㖿上堂相罵無好言相打無好拳大衆直須恁麼始得一句句切害一拳拳著實忽然打著箇無面目漢也不妨暢快殺人上堂秋風涼松韻長未歸客思故鄉且道誰是未歸客何處是故鄉良久曰長連床上有粥有飯上堂天上無彌勒地下無彌勒打破太虗空如何尋不得垂下一足曰大衆向甚麼處去也上堂若説佛法供養大衆未免眉鬚墮落若説世法供養大衆入地獄如箭射去此二途且道保寧今日當説甚麼三寸舌頭無用處一雙空手不成拳上堂古人底今人用今人底古人為古今無背面今古幾人知㖿鳴咿一九與二九相逢不出手上堂有手腳無背面明眼人看不見天左旋地右轉拍膝曰西風一陳來落葉兩三片上堂風鳴條雨破塊曉來枕上鶯聲碎蝦蟆蚯蚓一時鳴妙德空生都不會都不會三箇成群四箇作隊窈窈窕窕飄飄颻颻向南北東西折得梨華李華一佩兩佩上堂智不到處切忌道著道著則頭角生大衆頭角生了也是牛是馬上堂夜靜月明水清魚現金鈎一擲何處尋蹤提起拄杖曰歷細歷細示衆云有箇漢怪復醜眼直鼻藍鑱面南看北斗解使日午金烏啼夜半鐵牛吼天地旋山河走羽族毛群失其所守直得文殊普賢出此沒彼七縱八橫千生萬受驀然逢著箇黃面瞿曇不惜眉毛再三與伊摩頂受記云善哉善哉大作佛事希有希有於是乎自家懡懡㦬㦬慞慞惶惶藏頭縮手召云大衆此話大行何必更待三十年後示衆云釋迦老子四十九年説法不曾道著一字優波毱多丈室盈籌不曾度得一人達磨不居少室六祖不住曹溪誰是後昆誰為先覺既然如是彼自無瘡勿傷之也拍膝顧衆云且喜得天下太平示衆云真相無形示形現相千怪萬狀自此而彰喜則滿面光生怒則雙眉陡竪非凡非聖或是或非人不可量天莫能測直下搆得未稱丈夫喚不回頭且莫錯怪五祖演禪師上堂恁麼恁麼蝦跳不出斗不恁麼不恁麼弄巧成拙軟似鐵硬如泥金剛眼睛十二兩衲僧手裏稱頭低有價數沒商量無鼻孔底將甚麼聞香上堂難難幾何般易易沒巴鼻好好催人老默默從此得過者四重關了泗州人見大聖參上堂若要七縱八橫見老和尚打鼓升堂七十三八十四將拄杖驀口便築然雖如是拈却門前下馬臺翦却五色索方始得安樂上堂古人道我若向你道即禿却我舌若不向你道即啞却我口且道還有為人處也無四面有時擬為你吞却祇被當門齒礙擬為你吐却又為咽喉小且道還有為人處也無乃曰四面自來柳下惠上堂白雲不會説禪三門開向兩邊有人動著關捩兩片東扇西扇上堂千峰列翠岸柳垂金樵父謳歌漁人鼓舞笙簧聒地鳥語呢喃紅粉佳人風流公子一一為你諸人發上上機開正法眼若向者裏薦得金色頭陀無容身處若也不會喫粥喫飯許你七穿八穴上堂此箇物上柱天下拄地皖口作眼皖山作鼻太平退身三步放你諸人出氣上堂太平淈𣸩漢事事盡經遍如是三十年也有人讚歎且道讚歎箇甚麼好箇淈𣸩漢上堂有佛處不得住換却你心肝五臟無佛處急走過鴈過留聲三千里外逢人不得錯舉出門便錯恁麼則不去也種粟却生豆摘楊華摘楊華不覺日又夜爭教人少年上堂悟了同未悟歸家尋舊路一字是一字一句是一句自小不脫空兩歲學移步湛水生蓮華一年生一度上堂幸然無一事行腳要參禪却被禪相惱不透祖師關如何是祖師關把火入牛欄上堂山僧昨日入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪轉動行坐青黃赤白一一見了子細看時元來青布幔裏有人山僧忍俊不禁乃問長史高姓他道老和尚看便了問甚麼姓大衆山僧被他一問直得無言可對無理可伸還有為山僧道得麼昨日那裏落節今日者裏拔本上堂説佛説法拈槌竪拂白雲萬里德山入門便棒臨濟入門便喝白雲萬里然後恁麼也不得不恁麼也不得恁麼不恁麼總不得也則白雲萬里忽有箇漢出來道長老你恁麼道也則白雲萬里者箇説話喚作矮子看戲隨人上下三十年後一場好笑且道笑箇甚麼笑白雲萬里示衆祖師道吾本來茲土傳法救迷情一花開五葉結果自然成達磨大師信腳來信口道後代兒孫多成計較要會開花結果處麼鄭州梨青州棗萬物無過出處好示衆十方諸佛六代祖師天下善知識皆同者箇舌頭若識得者箇舌頭始解大脫空便道山河大地是佛草木叢林是佛若也未識得者箇舌頭祇成小脫空自謾去明朝後日大有事在五祖恁麼説話還有實頭處也無自云有如何是實頭處歸堂喫茶去示衆每日起來拄却臨濟棒吹雲門曲應趙州拍擔仰山鍬驅溈山牛耕白雲田七八年來漸成家活更告諸公每人出一隻手相共扶助唱村田樂粗羮淡飯且恁麼過何也但願今年蠶麥熟羅睺羅兒與一文示衆舉德山和尚因僧問從上諸聖以何法示人山云我宗無語句亦無一法與人雪峰從此有省後有僧問雪峰云和尚見德山得箇甚麼便休去峰云我當時空手去空手歸白雲今日説向透未過者有箇人從東京來問伊甚處來他却道蘇州來問伊蘇州事如何伊道一切尋常雖然如是謾白雲不過何故祇為語音各別畢竟如何蘇州菱邵伯藕雲蓋本禪師上堂高聲喚侍者侍者應諾師曰大衆集也未侍者曰大衆已集師曰那一箇為甚麼不來赴參侍者無語師曰到即不點上堂滿口道不出句句甚分明滿目不見山山疊亂青鼓聲猶不會何況是鐘鳴喝一喝上堂祖翁卓卓犖犖兒孫齷齷齪齪有處藏頭沒處露角借問衲僧如何摸索上堂橫按拄杖曰牙如刀劍面如鐵眼放電光光不歇手把蒺藜一萬斤等間敲落天邊月卓一下上堂去者鼻孔遼天來者腳踏實地且道祖師意向甚麼處著良久曰長恨春歸無覓處不知流入此中來上堂高臺巴鼻開口便是若也便是有甚巴鼻月冷風高水清山翠上堂以楔出楔有甚休歇欲得休歇以楔出楔喝上堂頭戴須彌山腳踏四大海呼吸起風雷動用生五彩若能識得渠一任歲月改且道誰人識得渠喝一喝云田庫奴壽聖文禪師上堂拈拄杖曰華藏木楖栗等間亂拈出不是不惜手山家無固必點山山動搖攪水水波溢忽然把定時事事執法律要橫不得橫要屈不得屈驀召大衆曰莫謂棒頭有眼明如日上面光生盡是漆隨聲敲一下上堂一叉一劄著骨連皮一搦一擡粘手綴腳電光石火頭垂尾垂劈箭追風半生半死撞著磕著討甚眉毛明頭暗頭是何眼目總不恁麼正在半途設使全機未至涯岸直饒淨裸裸赤灑灑沒可把尚有廉纖山僧恁麼道且道口好作甚麼良久曰嘻留取喫飯上方益禪師上堂拾得搬柴寒山燒火唯有豐干巖中冷坐且道豐干有甚麼長處良久曰家無小使不成君子開福寧禪師上堂秋日耀長空秋江浸虗碧傷嗟門外人處處尋彌勒驀路忽擡頭相逢不相識諸禪德既是相逢為甚麼不相識翦盡霜前竹臨溪不化龍上堂遍界不曾藏通身無影像相逢莫訝太愚癡曠劫至今無伎倆無伎倆少人知大抵還他肌骨好何須臨鏡畫蛾眉大隨靜禪師上堂君王了了將帥惺惺一回得勝六國平寧上堂舉臨濟參黃檗之語白雲端和尚頌云一拳拳倒黃鶴樓一躍躍翻鸚鵡洲有意氣時添意氣不風流處也風流師曰大隨即不然行年七十老躘蹱眼目精明耳不聾忽地有人欺負我一拳打倒過關東上堂自己田園任運耕祖宗基業力須爭悟須千聖頭邊坐用向三塗底下行淨因成禪師上堂崑崙奴著鐵袴打一棒行一步爭似火中釣鱉日裏藏氷陰影門翻魍魎虗空縛殺麻繩上堂鼻裏音聲耳裏香眼中鹹淡舌玄黃意能覺觸身分別氷室如春九夏涼如斯見得方知男子身中入定時女子身中從定出葵花隨日轉犀紋玩月生香楓化老人螟𧕅成蜾若也不知苦哉佛陀耶許你具隻眼萬壽素禪師上堂僧問劫火洞然大千俱壞未審者箇還