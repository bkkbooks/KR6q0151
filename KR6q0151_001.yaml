body:
  text: 武林十八澗理安禪寺住持婁東行悅集聖節啓建提綱祝釐圓悟勤禪師開聖節上堂頂天履地共荷皇恩含齒戴髮均承帝力神霄降慶真主示生傾萬國丹心祝一人聖壽當陽有路萬派朝宗一句無私輒輸肝膽還委悉麼皇圖齊北極聖壽等南山天申節開啓上堂五月天申節真人降中天萬國傾葵藿處處啓法筵雲居古道場共爇一炷煙龍圖鳳曆等乾坤睿算彌隆億萬年下座大慧杲禪師聖節上堂拈香罷忽雷震驟雨遂云震法雷擊法鼓布慈雲兮灑甘露即今法雷已震法鼓已擊慈雲已布甘露已灑事上也合理上也合事理既合且作麼生話會下座與大衆到大佛殿啓建乾龍聖節元叟端禪師聖節啓建上堂一佛出現千佛讚揚一華開敷千葉周匝一人端拱無為八表來朝萬入貢只如林下道人共樂升平同歸化育一句如何舉唱下座就大佛寶殿啓建天壽聖節恕中慍禪師啓建聖節上堂拈拄杖崇高不極廣博無涯是謂聖中之聖天中之天馭三光以照臨總萬宇而光宅無思不服有感必通畫拄杖擘開華嶽連天秀放出黃河徹底清啓建上堂心王不妄動六國一時通罷拈三尺劍休弄一張弓正恁麼時直得黃河清徹白日流輝金輪御而玉燭調麒麟出而鳳凰現普天之下用至道而不知懷生之倫荷大造而無謝且林下道人如何祝讚竪拂子只將者箇真消息仰祝吾皇億萬年了庵欲禪師上堂獅子吼無畏説百獸聞之皆腦裂香象奔波失却威天龍寂聽生欣悅左擊拂子云者箇不是獅子吼右擊拂子云者箇不是無畏説諸人耳在一聲中一聲遍在諸人耳不是寂聽生欣悅恁麼恁麼卷舒立方外乾坤不恁麼不恁麼橫縱挂域中日月恁麼中有不恁麼不恁麼中却恁麼下座詣大佛殿啓延天壽聖節上堂前佛性命後佛紀綱竪拂子云總在拂子頭上拈起也風生百谷放下也水肅千江今朝啓建聖節合作麼生舉唱擊拂子云臥龍才奮迅丹鳳便翱翔正節提綱五祖演禪師聖節上堂十二月初八日今上皇帝降誕之辰不得説別事乃高聲云皇帝萬歲皇帝萬歲真淨文禪師聖節上堂率土之土皆屬王土率土之民莫非王民今朝臘月八日當釋迦如來成道之辰是今上皇帝降誕之日所謂前聖後聖聖德共明人王法王王道同久應千年之慶運統萬國之歡心伏惟皇帝陛下萬歲萬萬歲復召衆云大殿上念佛祝延聖壽下座佛眼遠禪師聖節上堂皇帝以天下為家兆民為子父子一體天下一家王愛於民民敬於王愛敬既同王道無外所以佛言如民得王又云如民之王且王外無民民外無王王在民外民不受賜民在王外王道不廣如何曰民無知曰民如何曰王聖神曰王今上皇帝至神至聖為民父母天寧降誕之節日月星辰聯珠合璧江河淮濟激濁揚清乾坤造化草木蟲魚呈祥瑞顯奇特皆皇帝至德之所感致也伏願南山比壽北嶽齊齡永永萬年無窮無極遂下禪床作舞曰會麼山僧舞蹈揚塵萬歲萬歲萬萬歲下座虎丘隆禪師聖節上堂示現天宮補處身堯風舜日耀乾坤今朝共祝南山壽萬國來朝萬乘尊鐵關樞禪師聖節上堂乾坤大一統玉帛朝萬森羅同一舌起立合掌云萬壽無疆大慧杲禪師天申聖節上堂稽首能度諸世間無量殊勝福德聚金輪統御四天下普施羣生安隱樂還有知恩報恩底麼良久云一年三百六十日唯有今日最吉祥應庵華禪師聖節上堂聖諦第一義高而無上廣不可極淵而無下深不可測乾坤依此而覆載日月依此而照臨虗空依此而寬廣萬靈依此而變通故我林下道人依此學無為法悟無生忍且道報恩一句作麼生道一爐沉水一聲佛仰祝吾皇億萬年聖節上堂天上無雙日閻浮一至尊萬年松不老聖壽等乾坤聖節上堂時康道泰天清地寧一人端拱無為萬物各得其所普天率土無不承恩航海梯山均蒙雨露釋迦彌勒共樂升平文殊普賢咸揚正化塵塵剎剎曾現威光物物頭頭全彰正眼且道報恩一句作麼生道祇將一味無求法仰祝天申億萬年密庵傑禪師聖節上堂摩訶衍法離四句絶百非諸佛説不到拂子善提持乃舉起拂子云還見麼以此祝君壽壽算等須彌聖節上堂諸佛不説説祖師不聞聞留下一轉語千古鎮乾坤且道是那一轉語驀起恭身叉手云皇帝萬歲萬萬歲聖節上堂靈機廓徹妙叶無私智鑑洞明通途絶迹一切處現吉祥事不昧見聞覺知亘塵沙劫堅密身突出行住坐臥天上天下歌有道五湖四海樂無為林下道人將何報德多子塔前消息在一回拈出一回新天申聖節上堂心同虗空界示等虗空法證得虗空時無是無非法既無是又無非便乃以虗空為正體以恆沙國土為妙用以須彌不動之山為壽山以功德甚深之海為福海包羅萬有津濟四生實天中之天聖中之聖適當誕彌之月仰傾葵藿之誠一句全提千祥併集祝聖君壽地久天長會慶聖節上堂虗空可量風可繫無能盡説佛功德佛功德海既難量吾君聖壽亦如是聖節上堂日日是好日時時是好時惟有十月二十二吉星垂照最希可雪巖欽禪師聖節提綱萬化之源萬物之母德被河沙量包海宇聖中之聖主中之主慶會一時壽崇千古以坤自責月朗太虗以乾為子紅日卓午正恁麼時香藹金爐簾垂玉殿如何是蕩蕩無為之句卓拄杖云含弘光大品物咸亨復舉智度菩薩母容受一切法而無分別相師頌云一切法離分別相依前諸相自如如春風影裏乾坤大無限江山開畫圖乾會節提綱健行不息之謂乾萬法歸一之謂會會萬法歸自己者其惟聖人乎運乾德以位天者其惟至理乎理之至也本乎無作人之聖也體乎無為堯風蕩蕩兮舜日熙熙中峰本禪師聖節示衆大哉乾元至哉坤元一氣含容萬有民無得而名焉功高列聖之上德邁羣王之先蕩蕩乎用大巍巍乎體堅龍抱九重天上日真光垂照萬斯年大衆還知麼即日瑞分剎土春滿寰區大毗盧頂分身優曇鉢華吐𦦨以故天下稱之為聖人之佳節也但生植於天地之間者莫不被其澤惟我釋氏之流乃被其澤之尤者也何以為然蓋孤虗柔弱而不能自立也言孤則遠離親族不營世家言虗則寄食檀門棲遲林麓言柔則潛心空寂守節循規言弱則守護性真不與物競自非聖人不忘佛囑曲垂外護則僧園資具安敢自稱常住而不遭陵奪於他人之手乎由是吾儕安居暇食一時一刻咸出聖恩雖天覆地擎不足云喻使盡形求法終身向道至若忘軀畢命亦不足以酬其萬分之一豈容懈怠懶墮虗延白晝而更馳情於利欲者乎茲遇聖節曲引微忱以相勉勵記得後唐莊宗皇帝問興化和尚云朕收中原獲得一寶只是無人酬價化曰請陛下寶看帝乃引手舒幞頭腳化曰君王之寶誰敢酬價龍吟霧起虎嘯風生則不無莊宗興化若曰酬中原寶價至竟未曾定奪臣僧遙對天廷輒成一偈蓋天蓋地中原寶無古無今塞太虗價重乾坤酬未得佇看皇化越唐虞天目禮禪師聖節上堂天何言哉四時行焉地何言哉萬物生焉君何言哉萬方安寧風調雨若海晏河清正恁麼時如何野老不知堯舜力勾芒祭罷餉春耕聖節上堂坐琉璃殿垂夜明簾混然一體以難該冥應衆緣而無忒從上以來推尊此位且全身奉重一句如何舉唱妙叶羣機齊入貢從教諸道自分權楚石琦禪師聖節上堂舉無著與外道論義著云天下太平國王長壽外道杜口不能破師頌云義有河沙數不出者一句蚊子上鐵牛無你下嘴處無用寬禪師天壽聖節上堂威音王佛今朝示現德被蒼生光騰海甸不假揩磨不須煅鍊太湖臣僧聊通一線吾皇聖壽等乾坤赫赫神光普周遍便下座笑隱欣禪師聖節上堂下兜率降閻浮本迹不二御金輪宣正法權實全彰乘願示生隨機闡化靈樞密運躋吾民於安養之中寶鑑高提措四海於鈞陶之內故我林泉之下化日舒長鐘鼓清時玄風遠播三輪不住施受俱捐畢竟如何祝讚良久云無為功德不思議淨智妙圜體空寂聖節上堂化工密運納羣生於覆燾之中端拱無為躋四海於仁壽之域如華嚴海融攝三千世界似帝網珠交羅百億山河正與麼時如何是不涉誕生底句一氣不言含有象萬靈何處謝無私了庵欲禪師天壽聖節上堂摩醯正眼洞徹十虗迦陵仙音遍周沙界標三才而建立舉四海而安之纘列聖之丕圖膺靈山之付囑摧怨破敵運金剛輪發政施仁作獅子吼當流虹之瑞旦慶萬世之昌期然則蕢桴土鼓共樂升平堯舜之君猶有化在所以道向上一路千聖不傳萬仞崖頭縱橫得妙卓拄杖云將此身心奉塵剎是則名為報國恩天壽節上堂萬法是心光諸緣惟性曉本無迷悟人只要今日了且道了箇什麼良久云甲辰正月十一日大元天子降生時剎海塵毛咸稽首萬年松長萬年枝聖節上堂金剛正體洞徹十虗般若靈光該羅萬有昭昭於心目之間而相不可覩晃晃於色塵之內而理不可分與天地同一覆燾與日月同一照臨與山嶽同一穹崇與江河同一流注所謂佛佛授手祖祖相傳若聖若凡皆承恩力慶逢嘉運仰祝堯齡一句當陽如何舉唱劫石有銷日君恩無盡時資聖南禪師聖節上堂顧視左右曰諸人還知麼夜明簾外之主萬化不渝琉璃殿上之尊四臣不昧端拱而治不令而行壽逾百億須彌化洽大千沙界且道正恁麼時如何行履野老不知黃屋貴六街慵聽靜鞭聲蔣山泉禪師聖節上堂拈拄杖擊法座一下云以此功德祝延聖壽便下座用彰俊禪師聖節上堂麟鳳龜龍昨夜一時出現臣僧拄杖子見此休徵嘉瑞歡喜踴躍出來與無量壽世尊把臂交歡同聲慶贊拈拄杖大道虗玄天地先昆蟲草木悉陶埏神功普極三千界睿算超過億萬年以拄杖卓一下石屋珙禪師天壽聖節上堂箕翼長明地天長泰風不鳴條雨不破塊君乃堯舜之君俗乃成康之俗王母晝下雲旗翻海山四月蟠桃熟滿散提綱圓悟勤禪師散聖節上堂神霄真人降駕長生帝君御極神靈開旦夷夏欽風萬瑞咸臻千靈擁祐布羲軒無私之政追盤媧太古之風萬國赤子歌謠八表昆蟲鼓舞福流千界慶集一人林下禪人如何圖報共持清淨無為化仰祝吾皇億萬春散乾龍節上堂淵聖皇帝君臨萬國北狩未還乾龍節臨祝嚴睿算臣僧一句了無覆藏還委悉麼佛殿裏燒香散天申節上堂天上古佛人間至尊五月下降閻浮五月君臨萬國奮中興業清四海塵永固龍圖長堅鳳曆遙瞻北闕仰祝南山一句全提當機顯露還委悉麼建炎天子天申節聖壽彌隆億萬年無文燦禪師崇壽節滿散二千年前四月八日西天竺國親曾出現二千年後東震旦土依舊示生天上天下惟我獨尊前身後身一夢兩覺長育萬物如春行地照臨萬物如月行空承乾之運而無可見之功行坤之道而無可見之迹臣僧一坐六十小劫入思惟三昧經八十返求一語讚歎不可得求一語名狀不可得於不可得中乃見王母面授新熟蟠桃恭遇滿散未免和盤托出良久云太后舉觴今上拜九重春色異人間乾會節滿散昨朝方祝聖人壽今朝又祝聖人壽天地中間兩重人同時出現相前後扶桑樹頭紅日方升蟠桃枝上春風未老直得東湖番湖交口讚歎芝山閣山鞠躬稽首自有天地開闢以至于今如此盛事希有希有祝聖人福祝聖人壽祝聖人多男子顧視大衆云可中忽有人出來問聖人福聖人多男子不待問敢問聖人壽畢竟是多少竪起拂子云萬年松在祝融峰恕中慍禪師滿散上堂一年三百六十日惟有此日最吉祥黃河澄清聖人出文經武緯開明堂聖人既出天下太平無為而治不令而行南北風塵俱蕩盡熙熙萬姓歌黃唐景命四齋日月旦提綱圓悟勤禪師八月旦日上堂秋光清淺明明不退轉羣木蕭疏一一解脫道不出陰界可以遍歷浮幢王不立纖塵可以具足金剛智何況園裏菜青田中禾熟豈非歲稔時和心融境寂且不離向背一句作麼生道星河秋一鴈砧杵夜千家五月旦日上堂鐵樹𩰀鬆石牛哮吼火雲亘天長萬丈金烏普照大光明直得東海鯉魚振𩮻揚鱗南國波斯呈橈舞棹文殊普賢不敢説理説事德山臨濟不敢行棒行喝正恁麼時會麼拄杖擬吞三世佛燈籠百斛瀉明珠復云釋迦老子道若有一人發真歸源十方虗空悉皆消殞五祖和尚又云一人發真歸源十方虗空磕著築著山僧即不然若有一人發真歸源十方虗空錦上鋪花真淨文禪師上堂今朝十月一天下暖爐開衲僧頂門眼依舊蒙塵埃歲月既已往死生還到來床添新藁薦一任雪成堆遂拈袈裟角云大衆人人有分須是頂門眼開始得喝一喝下座大慧杲禪師上堂古者道了得一萬事畢今朝是九月一諸人作麼生了驀拈拄杖云不得喚作拄杖子便了取好既不喚作拄杖子作麼生了擲下云差之毫𨤲失之千里月旦上堂月生一鐵輪天子寰中敕月生二豐干騎虎入鬧市月生三蟭螟眼裏巨鱉翻驀拈拄杖云莫有同生同死底麼出來與徑山拄杖子相見良久云見義不為何勇之有擲下拄杖應庵華禪師月旦上堂召大衆云三日前五日後若不揮劍漁父棲巢明果有一轉語也要諸人共知犀因玩月紋生角象被雷驚華入牙下座雪巖欽禪師八月一日上堂方便門解脫門毗盧寶閣門以拄杖一擊八字俱開然雖如是只許向者裏暫時止宿一息一食而已若欲直指大休大歇大安樂田地前頭大有活路在蒙庵嶽禪師上堂臘月初歲云徂黃河凍已合深處有嘉魚活潑潑跳不脫又不能相煦以溫相濡以沫慚愧菩薩摩訶薩春風幾時來解此黃河凍令魚化作龍直透桃花浪會即便會癡人面前且莫説夢恕中慍禪師上堂今朝七月一屋角秋風動無上解脫門豁達無遮擁東來西來南來北來明窗下如法安排是佛是祖是聖是凡手面上等與一送有主有賓全體全用徹骨風流十八不共三千剎海夜沉沉妙高山色自孤聳石屋珙禪師七月旦日上堂人間秋十日湖寺便生涼竹色溪邊緑荷花鏡裏香即心猶未是作境謾搏量空劫已前事今朝為舉揚了庵欲禪師上堂小盡二十九大盡三十日從頭檢點來今朝二月一春山疊亂青春水漾虗碧寥寥天地間獨立望何極老明覺向者裏打開寶藏運出家珍其奈坐在尊貴中致使諸人當面蹉過喝一喝愚丘靜禪師月旦上堂月生一東巖乍住增愁寂紅塵世路有多端米倉儲無顆粒崖為伴泉為匹颯颯清風來入室山王土地暗中忙雲版鐘魚偷淚滴世人莫道守空巖亦有東籬打西壁靈耀良禪師上堂不知時分之延促不知日月之大小灰頭土面且與麼過山僧每遇月朔特地鬬釘家風抑揚問答一場笑具雖然如是因風撒土借水獻花有箇葛藤露布與諸人共相解摘看驀拈拄杖擊香臺曰參堂去別峰寶印禪師月旦上堂六月初一燒空赤日十字街頭雪深一尺掃除不暇回避不及凍得東村廖胡子半夜穿靴水上立月望提綱谷隱聰禪師月望上堂十五日已前諸佛生十五日已後諸佛滅十五日已前諸佛生你不得離我者裏若離我者裏我有鈎子鈎你十五日已後諸佛滅你不得住我者裏若住我者裏我有錐子錐你且道正當十五日用鈎即是用錐即是遂有頌云正當十五日鈎錐一時息更擬問如何回頭日又出圓悟勤禪師三月望日上堂云華殘雨過已度韶光風暖雲凝將臨夏景不逐四時凋變隨例七八五分更或削迹吞聲不免牽藤引蔓百草頭上則且置腳下泥深一句作麼生道春日晴黃鶯鳴密庵傑禪師月望上堂十五日已前開池不待月十五日已後池成月自來正當十五日吹無孔笛唱太平歌佛及衆生同聲唱和且道超羣拔萃一句作麼生道四海浪平龍睡穩九天雲靜鶴飛高上堂今朝六月十五祝聖升堂擊鼓木童火裏吹笙石女雲中作舞也大奇也大奇天無四壁地絶八維五湖四海來入貢衲僧聞見眼如眉喝一喝下座了庵欲禪師上堂今朝九月半萬事隨時變霜風刮地來木葉盡零亂古人道要識不遷義但向萬物凋落處會取是你諸人會也未若也會得旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月麗天而不周其或未然只知事逐眼前過不覺老從頭上來月望上堂十五日已前水向石邊流出冷十五日已後風從花裡過來香正當十五日火後一莖茅鐵蛇鑽不入喝一喝上堂昨日十四今日十五大法難明時光易度動則涉塵勞之境靜則沉昏醉之鄉動靜雙泯則落空亡動靜雙收則顢頇佛性到者裏須知有透脫一句始得拈拄杖云倒跨楊岐驢踏殺長沙虎擲下拄杖云三歲孩兒抱花鼓莫來攔我毬門路石田薰禪師三月望上堂但得本莫愁末喚甚麼作本喚甚麼作末松柏千年青不入時人意牡丹一日紅滿城公子醉山僧恁麼道若有不肯底是我同參圓極岑禪師月望上堂韓信打關未免傷鋒犯手張良燒棧大似曳尾靈龜既然席捲三秦要且未能囊弓裹革煙塵自靜我國晏然四海九州盡歸皇化自然牛間馬放風以時雨以時五穀熟萬民安大家齊唱村田樂月落參橫夜向闌報本利禪師月望上堂今日月望打箇糊餅供養大衆拈拄杖作圓相曰還識此餅麼不但恭養一人百千萬億人祇是一箇細嚼飽餐不得咬破雖然如是切忌麵生參初八念三提綱雪巖欽禪師上堂一夜雨聲滴滴元是簷前雪消冷地令人憶著相國寺裡芭蕉何也零零落落一似宜春臺上正月八日趕齋和尚底七條真淨文禪師上堂十月二十三天寒下暖簾昏黃一覺睡南海出榆甘改元登極提綱雪峰慧禪師建炎改元上堂天地之大德曰生聖人之大寶曰位今上皇帝踐登寶位萬國歸仁草木禽魚咸被其德此猶是聖主應世邊事王官降誕已前一句天下人摸索不著龍牙才禪師因欽宗皇帝登位衆官請上堂祝聖已就座拈拄杖卓一下曰朝奉疏中道本來奧境諸佛妙場適來拄杖子已為諸人説了也於斯悟去理無不顯事無不周如或未然不免別通一消息舜日重明四海清滿天和氣樂升平延祥拄杖生歡喜擲地山呼萬歲聲擲拄杖下座千秋節提綱愚庵及禪師千秋節冬至上堂千秋令節今朝是九九陽生第一爻四海陰霾俱解駮宕雲深處祝唐堯金山惟仲禪師皇太子韓國公頭晬之辰上堂妙高臺畔龍象駢闐化城閣前聖賢會合正是我皇植福之地乃為禪流選佛之場洞啓法門廣開要路悟之者頭頭顯道物物明心高蹈大方圓融至理迷之者重重昧性句句乖宗空自精勤終無了達苟能於斯一致畫斷兩邊不離當人便同正覺真可謂金輪統御玉燭遐明萬國賓從八方寧靜龍蛇出穴丹鳳來梧野老謠歌行人讓路堯風與祖風並扇舜日共佛日齊明奔波遊子徑歸家是處高人遊佛國然雖如是且龍生龍子底句又作麼生良久曰非但天神來密祐更資遐算助吾皇受敕奉旨提綱圓悟勤禪師在蔣山受敕升座寒巖枯木白雲堆散質何能中巨材豈為虗聲徹清禁紫微聖詔九天來既然事出意外要須直下承當所貴正眼流通仰祝無疆睿算直得昆蟲草木悉仰動地風光大地生靈咸霑唐虞睿澤處處和風遍野人人喜氣盈眸感覆燾無疆之恩荷一人生成之德正當恁麼時還委悉麼碧桃冉冉凝朝露紅杏蒙蒙映彩霞改昭覺寺為崇寧敕黃到開堂全機大用觸處現成溢目清光貫通今古一塵含法界一念遍十方盡大地是真實人總剎海為大解脫只在當人略回光相自著眼看可以克證無生頓超方便是故諸佛出世為一大事因緣祖師西來亦不出見性成佛只如今日奉皇帝敕建大伽藍賜額度僧祝嚴聖壽一場佛事耀古騰今判府旌斾光臨羣賢車蓋畢集四衆瞻仰萬姓歌謠為國開堂舉揚宗教山僧不敢囊藏被蓋其有諸佛説不盡底祖師提不起處對衆八字打開去也遂舉拂子云大衆還見麼擊禪床云還見麼見處透脫聞處精明一念返本還源即具頂門三眼萬里更無纖翳千聖齊立下風坐斷報化佛頭直得壁立千仞且道是什麼人境界雕弓已挂狼煙息萬里歌謠賀太平下座龍門遠禪師撥田劄子至上堂謝恩畢舉百丈和尚謂衆云你等為我開田我與你説一段大義衆開田了請師説大義百丈起來展手舒伸大衆古人得恁麼徑截還會他恁麼方便處麼百丈説大義辛勤事可知龍門無道理大衆絶狐疑帝力乾坤重君恩雨露垂有人相借問雲外略揚眉為什麼揚眉良久云萬古長春密庵傑禪師奉聖旨就本寺開堂上堂靈源不昧萬古徽猷入此門來莫存知解知解既不生如王寶劍殺活臨時舉一明三目機銖兩塵塵剎剎普現威權物物頭頭全彰正眼便見一塵含法界一句截千差於一毫端現寶王剎坐微塵裏轉大法輪高而無上仰不可及淵而無下深不可測自然風行草偃水到渠成不是神通妙用亦非法爾如然何故乃是當人從無量劫來現成受用境界契券分明直饒千佛出現各各放大寶光也侵占一星兒不得所以道一切法不生一切法不滅若能如是解佛法常現前以此壽聖人則天長地久以此祝賢佐則伊尹周公以此保國安民以此康福天下殊勝中殊勝奇特中奇特畢竟結角羅紋在什麼處天上有星皆拱北人間無水不朝東復舉僧問百丈大智禪師如何是奇特事百丈云獨坐大雄峰僧禮拜百丈便打師云百丈善能據虎頭亦能收虎尾雖然頭尾兩全至竟未徹源底今日忽有問靈隱如何是奇特事只對他道為國開堂僧若禮拜但云知恩方解報恩且道與百丈是同是別若揀得出平步青霄其或未然更聽一頌虎驟龍驤與麼來驀然平地起風雷棒頭正眼明如日凜凜清風廓九垓久立衆慈伏惟珍重奉聖旨就靈隱寺開堂上堂祖師心印狀似鐵牛之機去則印住住則印破不去不住當頭坐斷千眼頓開明如杲日寬若太虗不可以智知不可以識識人人具足物物圓成拈一機則千機萬機頓赴説一句則千句萬句流通譬如善舞太阿一不觸手二不墮地三不住空又如獅子筋琴撫之則羣音頓絶所以道大人具大見大智得大用攪長河為酥酪變大地作黃金普令一切有情無情不墮有為不住無為富貴不能驕貧賤不能困各各安其分守其當直得堯風蕩蕩帝道平平野老謳歌漁樵鼓舞且憑箇什麼道理便乃如是天高羣象正海濶百川朝復舉波斯匿王問佛勝義諦公案師云拓開天關踏翻地軸言言見諦句句朝宗還他過量人能提過量事於過量境界中作過量殊勝佛事雖然未免一處誵訛在今日忽有問徑山勝義諦中還有世俗諦否若言其有智不應一若言其無智不應二一二之義其義云何只對道日月光天德山河壯帝居太平何以報萬國盡歡呼久立衆慈伏惟珍重元叟端禪師大德七年八月二日護持聖旨到山領衆望闕謝恩罷上堂平生抱愚拙必意安林丘磐陀一片石松下聊優遊回鸞五色詔瞥爾來巖幽天恩浹肌骨淺薄將何酬願君為堯舜願臣為伊周金枝與玉葉光耀千千秋萬民贍粳稌四海銷戈矛竺仙正法眼如水常東流了庵欲禪師聖旨至上堂久晴不雨田夫皺斷眉頭久雨不晴衲僧浸爛鼻孔進一步撞倒百億須彌山退一步踏翻無邊香水海且截斷千差孤危不立一句作麼生道好大衆疊疊綸音下九天融融春意滿林泉一爐沈水一聲佛仰祝吾皇億萬年林泉倫禪師至元十八年十月二十日奉旨就大都大憫忠寺舉火焚燒道藏偽經除道德經外盡行燒毀師升座謝恩畢拈香云佛心天子憫衆生恐墮三途邪見坑箇裏了無偏黨處就中朱紫要分明所以道聖鑑無私天機莫測既來頌德敢不酬恩此香端為祝延大元世主當今皇帝聖躬萬歲萬歲萬萬歲伏願金輪與法輪同轉福越三祗舜日共佛日齊明壽延億劫次舉火云憶昔當年明帝時曾憑烈焰辨妍大元天子續洪範顯正摧邪誰不知嗟乎道教陰蠧佛書自古至今造訛揑偽益竊釋經言句圖謀貝葉題名謗毀如來贓誣先聖醜辭惡語何可言哉無蒂狂談實難遍舉始自張陵杜撰不尊老氏玄言謬作醮書兼集靈寶詐道從空而得妄言太上親傳用三張鬼法以誑惑愚夫設五運神符而魘姦匹婦以此觀之葛孝先徒搜要妙陶洪景謾述浮辭杜光庭白拈巧偷劫賊無異陸修靜外好裏弱説客何殊若非喫苦不甘爭肯説長道短鮑靜被誅猶可王浮招報非輕傅奕薑斌不堪齒録張生焦輩何足言論寇謙之口舌瀾翻損他利己林靈素機謀諂詐敗國亡家毀人祖兮定遭一時之辱滅賢良兮必招三世之殃因果無差報應有準嗚呼悲法琳不遇而遭貶嗟道世雖再而難為致令釋子傷心幸得皇天開眼恭惟我大元世主聖明皇帝陛下闢邪歸正去偽存真恐衆生永墮迷津今萬姓咸登覺路雪冤已竟感謝皇恩粉骨碎身莫能酬報遂以火炬打一圓相云諸仁者只如三洞靈文還能證此火光三昧也無若也於斯會得家有北斗經枉教人口不安寧其或未然從此灰飛煙滅後任伊到處覓天尊急著眼看普覺朋禪師嘉佑伍年奉旨斷還九里松集慶古路上堂山前一片間田地曠大劫來無界至今朝復又歸來坐斷腳頭并腳尾東也是西也是南北東西無不是畢竟酬恩作麼生十里荷花九里松直指堂前香一炷弘覺忞禪師順治十六年天使至召師上京問道上堂有大陀羅尼門明踰日月光量同真法界烈似金剛𦦨堅如持剎風是故名為正句亦曰居頂亦曰頂王三昧即者頂句其昧之自含生也則觸途成滯其章之自諸聖也則遍界光通不見祖師道國王長壽天下太平直得外道六師亡鋒結舌飲氣吞聲默無言説豈非天人羣生類皆承此恩力者耶大衆既承此恩合作麼生祇受龍袖拂開千聖眼金毛獅子奮全威喝一喝卓拄杖下座詔住大內萬善殿結制日奉旨開堂聖駕親臨特差內院官執香迎師升座師拈香祝聖問答畢乃云靈山密旨千聖同宣少室真宗萬靈共證其奈依稀越國者多倣佛楊州者衆正如入京朝聖主才到潼關即便休所以不覩廣大門風焉知威德自在拈拄杖卓一下云若向者裡一踏鴻門洞開兩扇則可謂腳跟不動身入帝鄉造託非他盡踏御園春色欽承有自無違咫尺天顏諸仁者宣德門前且無曲徑含元殿上覓甚長安然則把定乾坤奚煩顧佇流通正眼端在茲辰何故欣逢聖主隆吾道千載難忘此一時復云制結皇家禪安大內地爐掘深深之炕獸炭燒𦦨𦦨之煤欽差內院三員正副監司兩位禁城把斷密不通風閶闔牢關水無滲泄如此嚴切為汝諸人諸人合作麼生即得若作皮骨通身換難報我皇護念恩白椎云諦觀法王法法王法如是卓拄杖下座
