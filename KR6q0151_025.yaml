body:
  text: 武林十八㵎理安禪寺住持婁東行悅集即入院日請開堂提綱五祖演禪師海會入院開堂問答畢乃云問話且止夫第一義適來若於四面槌下薦得千聖不能近祖師言不到天下作者拱手歸降何也况第一義本來清淨不受諸塵如何說得同道方知今日放過一著向建化門中別作箇解話會是以紹先聖之遺蹤稱提祖令為後學之模範建立宗風若非當人曷能傳授謝詞不錄乃云陳謝既畢不可空然有一頌舉似大眾日暖風和花正開七重山鎻白雲堆飜思城市繁華處又出松門步一回夢庵信禪師萬壽入院上堂淵默難明旁求可顯即事造理隨處圓成雖萬變之有殊且一真而不別所以道青青翠竹盡是真如鬱鬱黃花無非般若既能如是何待三祇果滿萬行因圓漸證無生方成正覺便能高超世表獨步大方任運昇騰隨緣自在然後和光同塵周旋五趣出生入死接物應機利樂有情報恩酬德然雖如是且如皇恩聖德又作麼生報良久云一炷香雲騰碧漢願王聖壽與天齊是事且置某叢林日淺道業荒蕪只欲隨眾延時曷有利生之望茲者伏蒙軍使承議付以疏帖令於當寺住持實媿非才誠難當克即將此日開堂少善恭為祝延今上皇帝聖壽無窮玉葉金枝長芳永茂軍使承議闔郡宷僚惟願永佐聖君常居祿位諸院宿德僧職名員勤舊高人滿筵清眾舉郡檀那隨喜眾信伏願般若光中常相會遇久佇眾慈伏惟珍重雪巖欽禪師龍興入院上堂少林一曲五傳至于六祖山深水寒發太古之清音調翻南嶽九世至於慈明唱高和峻奏絕聽之希聲所以佛法盛於江西湖南然浩浩然不可得而名焉豈料三百年後土曠人稀道隨時變黃鐘大呂寂而不作鄭音衛嚮亦乃不聞欽上座固無長處既在浙江那畔被一陣業風吹到潭州城裏只得改聲換調向十字街頭重翻此曲去也且道是何節拍擊拂云萬年歡復舉趙州三佛師拈云揭示如來正體發明向上宗猷趙州固是好手只是不合強生節目新龍興見處又且不然金佛度爐木佛度火泥佛度水真佛𠰚切忌話墮忽有箇漢出來道你恁麼說正是強生節目拍膝一下將謂無人證明道林入院上堂老屋半千間啟煅聖煅凡潑天爐鞴烏藤六七尺振乃佛乃祖墜地宗綱風高月冷海濶山遙逆順卷舒縱橫在我有時恁麼有時不恁麼家家門首透長安恁麼也得不恁麼也得處處綠楊堪繫馬只如高超物表不墮見知畢竟如何是六國晏清一句寺門高開洞庭野殿脚插入赤沙湖復舉保壽開堂公案師拈云一收一放有主有賓葢是尋常茶飯就中保壽三聖猶較一著且如何見得若無舉鼎山力千里烏騅不易騎護聖入院上堂皇圖更統佛運亦新四海八蠻咸傾化日窮巖絕壑共舞陽春竪起拂子云直得拂子頭上百億毫端示現百億國土莫不梯山入貢率土來賓擊拂子一下云同轉如來正法輪復舉法燈開堂話師拈云跨竈起家法燈是則好手其柰自身不了殃及祖翁若是新護聖欲了先師公案別有人在且道是阿誰乃噴啑一下光孝入院上堂伏虎巖前駱駝橋畔有一句子去來不以象動靜不以心直得囊藏大地該抹古今三世佛望風斂影六代祖却步沉吟欽上座固是向文彩未彰以前和聲嚼碎忍俊不禁且聽拂子點頭自許臨風對月流出胸襟擊拂子云四海五湖歸至化更看比屋是黃金復舉興化和尚云三聖道逢人則不出出則便為人與化則不然逢人則出出則不為人師拈云二大老所謂一條拄杖兩人舁被天寧抝作兩橛了也以拄杖倚左邊云且聽各自平分仰山入院上堂日中一食夜後一息只得其體不得其用鋤一片畬下一籮種只得其用不得其體假使掀翻大地撥轉晨昏體用雙全人法雙泯在我臨濟門下正是萬里望崖州大遠在如何見得皇風蕩蕩皇天濶和煦發生晴晝長復舉興化道三聖云我逢人則不出出則便為人興化則不然我逢人則出出則不為人師頌云弄晴微雨濕春風柳自青青花自紅寄語遊人急回首謌樓不在畫橋東尼無著妙總禪師入院上堂宗乘一唱三藏絕詮祖令當行十方坐斷二乘聞之怖走十地到此猶疑若是俊流未言而喻設使用移星換斗底手段施攙旗奪皷底機關猶是空拳豈有實義向上一路千聖不傳學者勞形如猿捉影靈山付囑俯狥時機演唱三乘各隨根器始於鹿野苑轉四諦法輪度百千萬眾山僧今日與此界他方乃佛乃祖山河大地草木叢林現前四眾各轉大法輪交光相羅如寶絲網若一草一木不轉法輪則不得名為轉大法輪所以道於一毫端現寶王剎坐微塵裡轉大法輪乘時於其中間作無量無邊廣大佛事周徧法界一為無量無量為一小中現大大中現小不動步遊彌勒樓閣不返聞入觀音普門情與無情性相平等不是神通妙用亦非法爾如然於此倜儻分明皇恩佛恩一時報足且道如何是報恩一句天高群象正海濶百川朝尼妙道禪師開堂云問話且止直饒有傾湫之辯倒嶽之機衲僧門下一點用不著且佛未出世時一事全無我祖西來便有許多建立列剎相望星分派列以至今日累及兒孫遂使山僧於人天大眾前無風起浪向第二義門通箇消息語默該不盡底彌亘大方言詮說不及處徧周沙界通身是眼覿面當機電捲星馳如何湊泊有時一喝生殺全威有時一喝佛祖莫辨有時一喝八面受敵有時一喝自救不了且道那一喝是生殺全威那一喝是佛祖莫辨那一喝是八面受敵那一喝是自救不了若向者裏薦得堪報不報之恩脫或未然山僧無夢說夢去也拈起拂子云還見麼若見被見刺所障擊禪床云還聞麼若聞被聲塵所惑直饒離見絕聞正是二乘小果跳出一步葢色騎聲全放全收主賓互換所以道欲知佛性義當觀時節因緣敢問諸人即今是甚時節蕩蕩仁風扶化日熈熈和氣助昇平擲拂子下座松源崇嶽禪師上堂大凡扶竪宗乘須具頂門正眼懸肘後靈符只如寶壽開堂三聖推出一僧寶壽便打三聖道恁麼為人瞎却鎮州一城人眼去在寶壽擲下拄杖便歸方丈二尊宿等閒一拶一挨便乃發明臨濟心髓只是不知性命總在者僧手裏還有檢點得出者麼昔年覓火和煙得今日擔泉帶月歸無準範禪師住徑山入院上堂靈山指月曹溪話月遞代相傳證龜成鱉範上座尋常有一張口挂在壁上未曾動著今日無端入者行戶事到如今只得東簸西簸未免拈起多年曆日於中點出些子悞賺處說似諸人且要郭大李二鄧四張三知得江南兩浙春寒秋熱雖然如是黃河三千年一度清天目禮禪師廣壽入院上堂從上來事逈絕名模列祖出興卒難啟口迫不得已向第二義門拈椎竪拂棒喝交馳或擎叉或輥毬或拽石或搬土禮上座尋常橫草不敢拈竪草不敢踏今日被人推出不顧危亡露箇消息使諸人知道眉毛在眼上竪拂子云千峯勢到嶽邊止萬派聲歸海上消復舉玄紹二上座參烏臼臼問二上座發足甚處玄云江西臼便打玄云久知和尚有此機要臼云汝既不會後面箇僧抵對看紹擬近前臼便打云同坑無異土師云人人盡道烏臼用處如燒尾霹靂殊不知性命落在二僧手裏似敗陣將軍投戈散地愚庵及禪師隆教入院開堂海日高明海天空濶峰巒海湧樓閣天開頭頭無上妙門在在金剛正體諸佛出世以訛傳訛祖師西來將錯就錯一大藏教誑赫閭閻明眼衲僧自救不了但能無心於事無事於心便見堯風蕩蕩舜日熈熈天清地寧民康物阜山僧道薄人微遠承院命三江九堰航海梯山為國開堂舉揚宗旨無一絲毫瞞諸人諸人亦無一絲毫瞞山僧冀各存誠共相委悉復舉僧問百丈如何是奇特事丈云獨坐大雄峰僧禮拜丈便打師云大小百丈只好無佛處稱尊今日忽有問新隆教如何是奇特事但對他道汝等皆當作佛他若禮拜更向他道但辦肯心必不相賺普慈入院開堂道業無成愧昔賢行藏去住謾隨緣自憐宿債難逃避又向滄溟駕鐵船其柰大法陵遲時當象季新長老用盡神通又且如何施設敢請文殊普賢為普慈打篙搖魯勢至觀音張帆把柁見前勝流交相唱和但能同德同心自然無可不可不住此岸不住彼岸不住中流直教盡十方塵毛剎海愚癡下劣貧苦疲乏穢惡不淨眾生任運流入薩婆若海為依為怙正與麼時且風恬浪靜共樂清平一句又作麼生道竪拂子云天高群象正海濶百川朝淨慈入院上堂皇皇南宕勝覺塲奕奕永明高廣座山僧才疎德薄豈敢躋扳然遇緣即宗難為辭讓湖光瀲灩山色空濛廓示真如境界宗鏡高懸慧日朗耀張少室風規一一騰今煥古頭頭玉轉珠回直得釋迦彌勒共樂堯年文殊普賢同傾舜日雖然如是猶未撥動向上一竅在喝干戈才偃息四海樂昇平師復舉當山智覺禪師示眾云欲識永明旨門前一湖水日照光明生風吹波浪起師云諸人還見祖師麼卓拄杖云要識是非面目現在徑山上堂通上徹下逈絕羅籠匝地普天了無朕跡識不可識智莫能知一自拈花微笑面壁安心但見五葉流芳千燈續焰體究將來總是強生節目直饒上無扳仰下絕己躳常光見前壁立萬仞何異癩馬繫枯樁黑牛臥死水借使斬新日月逸格風規氷稜上度過九𨸰劍刃上拾得全身正好朝打三千暮打八百豈不見雲門大師道盡乾坤大地無纖毫過患猶是轉句不見一色始是半提須知更有全提時節雖然一向與麼去法堂上何啻草深一丈官不容針私通車馬五峰突兀雙徑回環大覺國師願力宏深孚佑龍王淨緣際會維禪林之首剎實天下之名山不妨與諸人高挂鉢囊抝折拄杖直得八方寧謐萬姓歌謠鴉鳴鵲噪總契真源風動塵飛皆明佛事揚不揚之正化報不報之深恩正與麼時且開堂祝聖一句如何舉似擊拂子黎元頓息三災劫睿筭延洪億萬春復舉僧問當山諲禪師掩息如灰時如何諲云猶是時人功幹僧云幹後如何諲云畊人田不種僧云畢竟如何諲云禾熟不臨塲師云諲禪師與麼答話勞而無功者僧若是箇漢决不依他作解後來應庵和尚道鳳閣香沉雪巢夜冷半窻明月和氣藹然正與麼時且道歸宗與徑山還有相見分也無喝直饒相見也是蝦蟆窟裏作活計要見四方八面逸格變通別著箇眼始得新徑山莫有長處麼拍禪床云敲出鳳凰五色髓擊碎驪龍明月珠千古華山山脚下只應潘閬倒騎驢久立珍重楚石琦禪師福臻入院上堂未離兜率已降王宮未出母胎度人已畢三世諸佛歷代祖師天下老和尚說心說性舉古舉今總是無風匝匝之波實情好與二十拄杖新福臻今日不是盡法無民打頭不遇作家到底翻成骨董人若相委悉拈却炙脂帽子脫却鶻臭布衫其或未然明朝後日大有事在復舉臨濟示眾赤肉團公案師云臨濟若無後語洎被打破蔡州雖然家有白澤之圖必無如是妖怪永祚入院上堂山僧昔在此山得度是箇脫白沙彌無端被人推出人天眾前稱為長老泥猪疥狗還避得麼今日掇向曲彔木床指東畫西是最初入門第一杓惡水到者裏事不獲已只得擘破面皮將些葛藤東葛西葛是以釋迦老子在正覺山前明星出時忽然大悟且道悟箇什麼山僧今日開堂說法又說箇什麼不免將第二杓惡水澆潑諸人去也拈拄杖卓一卓喝一喝復舉六祖風幡公案師云諸禪德風動幡動心動為你拈了也向什麼處見祖師上堂孤逈逈峭巍巍聖賢罔措活滾滾明落落周帀無餘有世界以光明為佛事有世界以莊嚴為佛事有世界以香飯為佛事有世界以音聲為佛事有世界以寂默為佛事且道報恩者裏以何為佛事以不可思議為佛事所謂諸佛出現不可思議眾生業果不可思議世界成壞不可思議此不可思議亦不可思議是故一為無量無量為一大中現小小中現大方一毫端現寶王剎坐微塵裏轉大法輪畢竟承誰恩力喝一喝復舉南堂云君王了了將帥惺惺一回得勝六國平寧師云雖然如是堯舜之君猶有化在大勳不豎賞一句作麼生秋風吹渭水落葉滿長安報國入院上堂三世諸佛橫說竪說不曾道著一字六代祖師全提半提不曾接得一人雖然不接一人各各眼橫鼻直雖然不道一字言言玉轉珠回雙放雙收同生同死全明全暗有殺有活德山入門便棒臨濟入門便喝睦州見僧便道現成公案資福道隔江見剎竿便回去脚跟下好與三十棒八十翁翁入塲屋真誠不是小兒戲你若對眾决擇分明山僧分付鉢袋子復舉白雲端和尚示眾云若端的得一回汗出便向一莖草上現出瓊樓玉殿若未端的得一回汗出縱有瓊樓玉殿被一莖草葢却師云拈却一莖草瓊樓玉殿在什麼處到江吳地盡隔山越山多本覺入院上堂百尺竿頭進一步海濶天寬萬人叢裏奪高標眼親手辦空劫已前自己即是日用自己日用自己即是空劫已前自己不可說不可說香水海浮幢王剎都盧在你眉毛眼睫上普光明殿本是盧舍那與文殊普賢觀音彌勒目連鶖子馬鳴龍樹一一為諸人演說心地法門了也還聞麼若聞去不妨隨處度生若不聞壽山入院事繁未有工夫與你說在復舉僧問曹山諸佛未出世時如何山云曹山不如僧云出世後如何山云不如曹山師云大小曹山口甜心苦或有人問壽山諸佛未出世時如何向他道好出世後如何好與他三箇好且聽一生參石屋珙禪師入院上堂把住也鋒鋩不露放行也十字縱橫水雲深處相逢却在千峰頂上千峰頂上相逢却在水雲深處今朝福源寺裏開堂演法昨日天湖庵畔墾土耕煙所以道法無定相遇緣即宗可傳真寂之風仰助無為之化正與麼時如何拈拄杖卓一下云九萬里鵬纔展翼三千年鶴便翱翔雲峰高禪師蔣山入院上堂世界未形乾坤泰定生佛未具覿體全真無端鏡容大士鷹巢躍出劈破面皮早是遭人描邈那更缺齒老胡不依本分遙望東震旦有大乘根器迢迢十萬里來意在攙行奪市直得鳳堂鼓響阿閣鐘鳴轉喉觸諱插脚無門合國難追重遭訐露新蔣山迫不得已跨他船舷入他界分新官不理舊事畢竟如何拍禪床云戍樓靜貯千峰月塞草閒鋪萬里秋徑山入院上堂五峰峭峙到者須是其人一鏡當空無物不蒙其照祖師基業依然猶在衲僧活計何曾變遷著手不得處正要提撕措足無門時方堪履踐直得山雲淡泞㵎水潺湲一曲無私萬樂業正恁麼時功歸何所車書自古同文軌四海如今共一家呆庵莊禪師奉勅住徑山入院開堂山僧道慚先哲跡混叢林任運度時貴圖藏拙何期京師宿德謬采虗聲俾預高僧之選叨蒙聖主之恩召對禁庭親承睿獎法衣特賜光揚少室宗風寵命載頒來主國一祖席教中所謂我本無心希求今此法玉大寶自然而至當此之時下情惟知忻感而已若曰闡揚佛法報答皇恩且佛法如何闡揚皇恩如何報答到者裏也要諸人共相知委擊拂子萬派千溪皆渤澥七金五嶽盡須彌復說偈曰親奉綸音出禁闈凌霄峯頂唱玄機報恩一句能相委選佛場中及第歸恕中慍禪師廣福入院上堂靈山奧旨少室真機日月不足喻其明虗空不足喻其廣巍巍獨運蕩蕩無私思之則差議之則錯五千四十八卷說食向人一千七百葛藤持蠡測海在今諸方莫不盡謂驅其耕奪其食貴圖宗風不墜殊不知正是救渴進火禦凍贈氷愈增其劇新靈巖與麼道不是壓良為賤取笑大家臂三折而知醫閱多人而曉相伶俐底不用如何若何便請單刀直入掃蕩攙搶坐享太平豈不快哉少涉遲疑白雲萬里復舉臺山婆子公案師拈云婆子如蟲蝕木偶爾成文趙州見義勇為翻成特地諸人還會麼雲收雨霽長空濶一對鴛鴦畫不成無文燦禪師薦福入院上堂天高地厚日盈月昃全提半提天地懸隔燦上座平生只會著衣喫飯聞人說佛法二字如風過樹頭如水澆頑石今日裂破面皮喚作長老也欲與諸人論說一上無端冐五六月大熱行二千里修途一時打失了也雖然賴有拄杖子在拈拄杖云拄杖子試說看卓一下清平世界切忌訛言復舉三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人師頌云弟兄財本不多爭共駕官船各自撐撐去撐來回首看依前不出蓼花汀了庵欲禪師開福入院上堂建法幢立宗旨拓開無上妙門顯示第一義諦天何寬地何窄青山不青白雲不白十字街頭醉翁子夢裏惺惺三家村裏臭胡猻甚生標格掀翻是非窠窟截斷凡聖蹤由德山棒頭全彰大用臨濟喝下脫體風流垂衣正裳聖天子繼唐虞之化修文偃武賢宰相霈霖雨之秋所以道一毛現神變一切佛同說經於無量劫不得其邊際喝一喝云將謂合有恁麼說話拈拄杖云拄杖子穿過諸人鼻孔即不問梁寶公騎佛殿出山門畢竟成得箇什麼事卓拄杖云千尺鯨噴洪浪飛一聲雷震清猋起復舉祖師云吾本來茲土傳法救迷情一華開五葉結果自然成五祖演和尚云達磨大師信脚來信口道後代兒孫都成計較諸人要會開花結果處麼鄭州梨青州棗萬物無過出處好師云提本分鉗鎚碎情解窠窟還他五祖老人要見開花結果處則大遠在諸人要會開花結果處麼拈却鄭州梨放下青州棗出門便是長安道久立珍重靈巖入院上堂石門𡾟險鐵關牢舉目分明萬仞高四十年中重到此始終不隔一絲毫好大眾湛湛湖光平開鏡面青青山色上插雲霄乃智積應現之方誠圓照嘉遁之所繼茲芳躅實愧非才不免向普賢毛孔寬著程途維摩掌中拓開世界直教四聖六凡重重普會風不鳴條雨不破塊天清地寧時康道泰報不報之深恩揚不揚之教化拈起鐵蒺藜驪珠盡擊碎千古萬古黑漫漫填溝塞壑無人會喝一喝月江印禪師育王入院上堂佛法徧在一切處一切山河及國土無他方此土之殊無過現未來之異雲門大師云你諸人擔鉢囊行脚不知有佛法佛殿上鴟吻却知有佛法上是天下是地日月星辰森羅萬象各依定位喚甚麼作佛法馬祖大師道我自從胡亂後三十年不少鹽醬喚作佛法得麼大梅云任你非心非佛我只是即心即佛喚作佛法得麼楊岐云金剛圈要你透栗𣗥蓬要你吞喚作佛法得麼東山五祖云我向白雲門下咬破一箇鐵餕餡直得百味具足喚作佛法得麼且喜沒交涉須知生佛未具已前八萬四千舍利光明常在你諸人面門出入自是諸人不覺不知當面諱却山僧到者裏說箇什麼即得所以道我若坐時你須立我若立時你須坐我若野干鳴你即獅子吼你若野干鳴我即獅子吼可以光揚佛日大振玄風建立法幢發揮宗旨即辰秋高氣清伏惟諸山和尚合山大眾各各起居輕利拈拄杖浙東山浙西水四海五湖皇化裏卓拄杖一下用彰俊禪師瑞巖入院上堂釋迦世尊未離兜率已自七錯八錯何況達磨航海東來其錯尤甚俊上座既是他家兒孫只得將錯就錯拈拄杖提向上機指其中事無過只要諸人明自本心證自本法驀忽一箇半箇心法雙忘解道穿山渡口虎咬大蟲剪月亭前蛇吞鼈鼻如此則三世諸佛六代祖師總在新瑞巖拄杖頭上乞命雖然祇如西天廣額屠兒放下屠刀道我是千佛一數且道是從本心中發現耶從本法中發現耶以拄杖畫一畫天上有星皆拱北人間無水不朝東復舉外道問佛昨日說什麼法佛云說定法又問云今日說什麼法佛云說不定法再問昨日定今日因甚不定佛云昨日定今日不定師拈云大小釋迦龍頭蛇尾忽有問新瑞巖昨日說什麼法只答道說法又問今日說什麼法亦答云說法但只與麼答去教他外道無入作處無凑泊處不見道無法可說是名說法季潭宗泐禪師於洪武元年戊申四月十五日住中竺入寺上堂金剛王劍橫揮千妖屏迹爍迦羅眼洞照萬物潛形到此卷舒在己殺活臨時直得千歲巖中天𨁝跳錢塘水東海逆流諸人還知也無遂竪拂子云庭前石笋抽條也會見高枝宿鳳凰復舉南泉初入院大眾送歸方丈僧問端居丈室將何指示於人泉云昨夜三更失却牛天明起來失却火師云大小南泉不惟瞞人亦且自瞞新天竺用處也要大家知有忽有問端居丈室將何指示於人劈脊便棒且道與古人是同是別卓拄杖下座石林鞏禪師住淨慈入院上堂橫眸碧漢萬國風清垂手紅塵千峰日出纔恁麼便不恁麼所以道我此法印為欲利益世間故說在所游方勿妄宣傳橫按拄杖云佛滅二千二百單六載沙門行鞏今於苕霅盡頭皷鐘清處顯示此印絲毫無有妄者卓拄杖云謹白笑隱訢禪師烏回入院拈花付法面壁安心列派分宗遞相鈍置拈拄杖畫一畫云一畫畫斷了也且喜天下太平然則兵隨印轉將逐符行新長老出世為人畢竟明什麼邊事不見保壽開堂三聖推出一僧壽便打聖云與麼為人非但瞎却者僧眼瞎却鎮州一城人眼去在壽擲拄杖便歸方丈斬釘截鐵發揮格外真機揑聚放開顯示當陽正眼直得龍吟霧起虎嘯風生一道神光貫通今古如斯舉唱猶涉程途且到家穩坐一句作麼生道三事衲衣青嶂外一爐沉水白雲中天竺入院上堂夫為宗師者提持綱要接物利生豈是細事況茲山千載名藍五天化境大丞相號令明肅出於至公山僧既已迴避無門諸人亦要知時識節拈拄杖云即心即佛非心非佛不是心不是佛不是物三千年黃河清五百載聖人出復舉僧問投子諸佛出世為一大事因緣和尚出世當為何事投子云尹司空為老僧開堂投子老人可謂應機施設不犯鋒鋩中峰不免因齋慶讚一髮繇來引萬鈞全肩荷負見當人通身手眼重拈掇枯木花開大地春集慶入院上堂釋迦世尊捨金輪而登佛位今上皇帝從佛位而御金輪收攝三千剎海於一印中具足八萬法門於一毫上如華嚴會上菩薩得無盡福德藏解脫門於一器中出生種種美味飲食又於眾會仰觀空中而雨種種珍寶隨眾生心悉令滿足然後得其寶者盡證法門食其味者咸成妙道無一塵而不具足佛事無一法而不圜滿正宗即今崇建寶坊闡揚法施諸天音樂不鼓自鳴梵唄詠歌自然敷奏十方菩薩咸集道場八部天龍同伸慶讚還有不歷化城徑登寶所者麼擊拂子云四海已歸皇化裏時清休唱太平歌復舉世尊與眾行次以手指地云此處宜建梵剎時天帝釋將一竿竹插地上云建梵剎竟世尊微笑師云帝釋為三十三天之主雖則一期施設其柰理事未備今上皇帝以興龍潛邸改創梵宮復命禪宗發揚向上宗旨與天帝釋所成功德何啻百千萬億倍縱使虗空為口讚歎莫窮臣僧借水獻花輙成一頌丈六金身一莖草璚樓玉殿恰相當交羅帝網山河景旋繞須彌日月光華雨晝飄龍座暖天風時送御爐香臣僧共仰恩光近五色祥雲擁帝旁南石琇禪師普門入院如來出世是擔屎漢祖師西來是賣卜人自餘德山臨濟雲門溈山雪峯玄沙南泉趙州各逞機鋒互分照用盡是販私鹽賊新普門者裏一時與他掃蕩何故幸逢堯舜世自合樂無為復舉僧問楊岐如何是佛岐云三脚驢子弄蹄行僧云莫者便是岐云湖南長老師云大小楊岐被者僧一問未免手脚俱露靈巖入院上堂正法眼藏亘古亘今般若真燈照天照地當陽無向背直下絕承當靈然獨露透色透聲廓爾現前絕聞絕見常在一切處不為一切處所拘非離一切時不為一切時所攝者裏見得無迷無悟非後非先百千法門無量妙義不假思惟悉皆具足建化法中斯為可矣若是衲僧門下直須向百尺竿頭濶步蟭螟眼裏藏身娑婆擲去他方妙喜拈來此土不知承什麼恩力得恁麼奇特良久慣從五鳳樓前過手握金鞭賀太平復舉妙喜竹篦話師云靈巖今日開堂不舉竹篦亦不分背分觸且道有何長處萬壽和尚復白槌諦觀法王法法王法如是便下座徑山入院上堂如來四十九年說法不曾道著一字達磨十萬里西來何曾遇大乘器自餘德山臨濟雲門趙州天下善知識設大機施大用盡是青天霹𮦷旱地波濤正眼觀來不直一笑雖然爐鞴之所多鈍鐵良醫之門足病人縱是舉一明三目機銖兩之士於毫毛未動之先便解承當早已不堪種草所以道言前薦得猶為滯殻迷封句下精通未免觸途狂見古人為誘接方來多向第二義門拋三放兩一向拖泥帶水山野曩於智積峰頂禪月山中曾開皂角燈心舖子聽他要者來買縱是法堂前草深一丈終不將佛法當人情三載之中於九重城內日與陶泓毛頴對談亦不煩略動一念今到凌霄峰頭更是不勞心力何故幸有吾通祖妙喜佛照寂照舊化儼存麻三斤乾屎橛不用提持黑竹篦碁盤石何須拈出人人鼻孔遼天箇箇腦門著地行則同行坐則同坐自然上古風規灼爾西來的意且喜四海八紘風恬浪靜含齒帶髮盡樂無為且道應時及節底句子作麼生舉拈起少林無孔笛等閒吹出萬年歡復舉保壽開堂公案雪竇拈云保壽三聖雖發明臨濟正法眼藏要且只解無佛處稱尊當時者僧若是箇漢纔被推出便掀倒禪床直饒保壽全機也較三千里師云保壽三聖發明臨濟正法眼藏直是斬釘截鐵爭柰承當者少雪竇既是權柄在手便合與者僧雪屈說什麼當時諸人還會麼若無舉鼎拔山力千里烏錐不易騎
