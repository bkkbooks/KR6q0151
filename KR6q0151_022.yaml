據室閉門打睡接上上機中下之流入園钁地若待竪拂敲床總是睦州道底喝一喝八棒對十三數來未到你據室白雲生按下碓嘴使開花客至無禮儀蒿湯便當茶然雖如是賣金終不和與沙入院提綱先德開堂必待朝命下或俟當道請方舉行故到院據室後但如尋常上堂而已楊岐會禪師入院上堂霧鎻長空風生大野百草樹木作大獅子吼演說摩訶大般若三世諸佛在你諸人脚跟下轉大法輪若也會得功不浪施若也不會莫道楊岐山勢嶮前頭更有最高峯保寧勇禪師入院上堂欲陞此座應須作禮須彌燈王且道須彌燈王在甚處又向什處作禮為復心存意想為復緣慮俱忘為復心境一如為復萬法空寂若與麼見解未出常流既不與麼又作麼生棒打石人頭嚗嚗論實事直饒博聞強識世智辯聰得大總持具無礙辯於祖師門下轉沒交涉所以此事不可以有心求不可以無心得不可以語言造不可以寂默通非得失是非緇素貴賤凡聖差降情量智解之所能及諸人到者裏如何即是若是大丈夫兒直下真不揜偽最親切處自肯方親山僧與麼道已是相埋沒了也如今莫有不受人瞞者麼良久云平生肝膽向人傾相識猶如不相識遂拈柱杖云無限雲山藏不得却擕藜杖入來千門萬戶俱敲徧今日分明卓鳳臺卓一下下座雪竇顯禪師翠峯入院上堂未來翠峰多人疑著及乎親到一境蕭然非同善財入樓閣之門暫時斂念莫比維摩掌中世界別有清規冀諸人飽足觀光以資欣慰五祖演禪師入院上堂舉祖師道吾本來茲土傳法救迷情一花開五葉結果自然成達磨大師信脚來信口道後代兒孫多成計校要會開花結果處麼鄭州梨青州棗萬物無過出處好真淨文禪師聖壽入院上堂青山綠水不能住白日紅塵却自歸而今避不得也且混俗和光灰頭土面笑他林下人也要笑若解笑甚奇妙十字街頭拈得箇破布衲襖抖擻塵埃示眾人好不好曉不曉從他肉案頭歌叫喝一喝云回頭轉腦歸宗入院上堂佛法要妙但歸其宗苟歸宗也自然無可不可一切成現海印發光今與大眾同已歸宗住平等本際敢問何者是宗何者是要妙良久云祇為分明極翻令所得遲雲峯悅禪師翠巖入院上堂山僧昔年曾到今日重來非唯人事增歡抑亦林泉加秀且道不傷物義一句作麼生道良久云天高東南地傾西北下座法輪入院法不孤起仗境方生道不虗行遇緣即應然通方之士舉必知歸游涉之徒何妨進步有麼良久云釣竿斫盡重栽竹不計功程得便休圓悟勤禪師夾山入院門下青山潑黛途中細雨如膏靈雲陌上桃花處處芳菲溢目香嚴巖畔翠竹時時撼影搖風直得一擊忘所知一見絕疑惑不免尚留觀聽未透色聲若能見無見之色聞無聞之聲撥轉路頭踏翻關棙句句超佛越祖塵塵耀古騰今處處離色絕名箇箇斬釘截鐵心外無法法外無心用王庫刀發千鈞弩壁立萬仞坐斷十方可以入大解脫門傳正法眼藏向堯時舜日共樂昇平鼓腹謳謌歸家穩坐且到家一句作麼生道但願春風齊著力一時吹入我門來復云昔傳明有通天作略跨海神機使無舌人說無義語收洛浦接青峰辨石霜賞佛日險崖句峻陷虎機深電激星飛珠回玉轉建茲寶剎風範具存而山僧庶事不才何以繼其高躅既辭讓不及轉透無門不免借一條路向無言處演言無事處生事無佛處現佛無祖處示祖且貴始末相符頭正尾正敢問諸人還見夾山老子麼莫從百草巔頭薦覿面無私亘古今蔣山入院上堂道不虗行如風偃草緣不虗應似鏡臨形若能於心無心於己無己於彼無彼於我無我蕩蕩廓周沙界皆非外物縱歷盡乾坤際悉在目前法隨法行法幢隨處建立理亦如是事亦如是況寶公道場梁時示化舒王福地聖世重興宏開選佛場宣唱大般若於其中間且作麼生是於心無心於己無己坐斷要津不通凡聖底一句三山半落青天外二水中分白鷺洲奉勅住天寧入院上堂入門便見更不容擬議尋思開口便說亦不復周由者也假使善財入彌勒樓閣尚資斂念普眼入普賢妙境亦借威神只如今直得八穴七穿四通五達一處透千處萬處通明一光明千光萬光普照且到家一句作麼生道風前有路超調御皷腹謳謌樂太平復有頌云本是山中人無能惟守拙豈謂有虗名遠達丹鳳闕降勅住天寧竹輿星夜發今朝親到來一句無言說別別金色頭陀曾漏泄雲居入院上堂耳聞不如眼見眼辨不如手親四百州天上雲居今之日竹輿親到巖巒回合林嶺崔嵬白雲深處見樓臺恍如別造一世界到箇裏亦不必窮玄說妙立境立機論性論心究理究事只如今人人分上一切坐斷正當恁麼時親到一句作麼生道佛祖妙玄窮徹底白雲深處好安居復云賜得雲居養病身半千衲子倍相親攀龍直上青天上投老依棲安樂神奉勅住金山龍遊寺入院上堂三十年前曾到此如今樓閣碧參差善財參處真消息誰識德雲閒古錐還有識得底麼未度瓜州時有一句子已與諸人道了也若以心思若以意識若以眼見若以耳聞則沒交涉直得七佛已前威音那畔薦得猶是話會在若委悉得更不用如之若何便請丹霄獨步苟或未然不免落第二義門去也江心一峯樓臺相映水面雙塔金碧交輝誠聖帝福田乃禪林上剎為琳宮為佛宇為淨土為穢建立法幢弘荷祖道若非今上皇帝睿聖文明深信此道安能首降韶書復此寶坊以為福地如今所以與諸人向此古道場中各得相見既到者裏直須念德修德知恩報恩若也如此則佛法付囑有在正當恁麼時一句作麼生道銀山鐵壁無回互草偃風行得自由大慧杲禪師入院上堂山僧未離泉州時已與諸人相見了也臨安府亦與諸人相見了也及乎來到山中擊動法皷坐立儼然眼眼相為甚麼却不相識只為分明極翻令所得遲奉旨住育王入院上堂舉南泉和尚新入院知事頭首請入方丈有僧問師歸方丈有何指示於人泉云昨夜三更失却牛天明起來失却火師云妙喜初住育王亦不曾失却牛亦不曾失却火或有人問師歸方丈將何指示於人只向他道饑餐渴飲閒坐困眠且道與南泉是同是別若也道得許你是箇衲僧若道不得三十年後却來方丈裏向你道便下座應庵華禪師處州妙嚴禪寺入院孤峯萬仞鳥道虗玄名利杳忘是非頓絕直得猿吟古木虎嘯幽巖碧落青霄道人活計雖然恁麼更須知有人境俱奪向上一竅乃竪拂云天上有星皆拱北人間無水不朝東明果入院善言言者言所不能言善迹迹者迹所不能迹言迹既盡猶是就理變通向衲僧門下未足觀光是故從上佛祖提持正印密付要旨若不具緇素大眼目如何跂及豈不見世尊在菩提樹下明星現時成等正覺爾時大地眾生同得同證於四十九年曲盡老婆心末後向百萬大眾前拈華獨有迦葉微笑便云吾有正法眼藏涅槃妙心分付摩訶大迦葉敢問諸人且道有分付無分付若道有分付則埋沒迦葉師兄若道無分付則辜負釋迦老子者裏若涇渭不分則靈山付囑遂為虗設正當恁麼時還有人道得麼若也道得明果價增十倍苟或未然雪後始知松栢操事難方見丈夫心復舉保壽開堂公案師拈云叢林中商量盡道保壽三聖是作家爐鞴本分鉗錘有甚麼交涉殊不知二老被者僧一拶直至而今扶不起今日莫有為二老雪屈底麼出來與明果相見有麼驀拈拄杖擲下云龍蛇易辨衲子難瞞上堂云天清地寧時康道泰摩醯正眼洞明肘後靈符光彩譬如善舞太阿終不自傷其手又如壯士展臂不借他力既爾水到渠成自然風行草偃豈不見古德道緣不虗應似鏡臨形若能於心無心於己無己於彼無彼於我無我塵塵壁立萬仞蕩蕩通徹十虗如是則法隨法行法幢隨處建立況饒城勝境伏虎道場因緣時節到來大家抝折拄杖且到家據令一句作麼生道鍛烹佛祖大鉗錘要與楊岐作頭底歸宗入院上堂一句子銅頭鐵額一句子半合半開一句子和泥合水揭示拈花要旨洞明少室家風掀翻今古葛藤坐斷明暗途轍苟能直下承當頓見本來面目不必覺城東際始見文殊樓閣門開方參慈氏一見一切見一聞一切聞一明一切明一用一切用豈不見昔日有僧辭歸宗宗問云向什麼處去僧云諸方學五味禪去宗云我者裏只有一味禪僧問如何是一味禪宗便打僧云莫打某甲會也宗云你作麼生會僧擬開口宗又打黃檗聞云馬祖出八十四員善知識箇箇屙轆轆地惟有歸宗較些子圓悟師翁道若非黃檗深辨端倪洎乎勞而無功師云二尊宿只解扶強不能扶弱若作一味禪入地獄如箭其或別有生涯何異鏤氷作玉且道節角在什麼處驀拈拄杖卓一卓喝一喝下座光孝入院上堂古佛家風遇古佛然後拈出大人境界見大人乃可顯揚今日朝斾臨筵人天普集古佛家風既展大人境界全彰揭示摩醯正眼洞明少室真機頓契佛祖不傳妙心開悟父母未生面目直下斬釘截鐵猶是把纜放船苟若說心說性未免和泥合水者條通天活路千聖共行萬靈同轍淨躶躶沒虗空赤灑灑無空缺雖居有為界示無為法而不滅壞有為之相雖居無為界示有為法而不分別無為之相如是則如鐘在扣之則鳴似鏡臨臺物來斯照於其中間應變萬差出沒卷舒得大自在祇如應真不借一句又作麼生雙溪源脉深無底濟物曾無有倦時復舉王常侍與臨濟至僧堂公案師云風行草偃葉落知秋臨濟雖本分鉗鎚常侍乃頂門具眼祇如今日判府殿撰正言入山與老僧相見雖無僧堂可至亦無佛法商量祇者便是出他一頭地處且道以何為驗以此為驗報恩光孝入院上堂當頭坐斷千眼頓開一句投機十方通暢以無邊虗空為正體以微塵剎海為妙用以清淨莊嚴攝懈怠以精進行願警昏迷雖然如是若也以為究竟向衲僧門下天地懸殊若也把斷要津於勞生界中未為好手祇如二途不涉如何通信諸人還會麼禪月尊者用盡神通毗耶老人願海尤大因緣時節既非偶然竹杖芒鞋今日親到殿堂修廣樓閣洞開百萬家和氣靄然恒河沙諸佛圍繞光孝堂前坐見鹽梅霖雨姑蘇臺上行看玉樹花開無量殊勝併集解脫知見普熏且道恁麼時畢竟功歸何所良久云頂門正眼分緇素天上人間不可陪復舉裴相國因入大安寺見壁間高僧畫像乃問主僧真容可觀高僧何在主僧無語相國云此間莫有禪僧麼主僧云近有僧至疑是禪僧相國召至乃理前話禪僧云請相公垂問相國云真容可觀高僧何在禪僧召相公相國應諾僧云高僧何在相國言下大悟禪者乃黃檗斷際禪師是也大眾黃檗布縵天網要打衝浪錦鱗裴相國坐籌帷幄不妨決勝千里諸人若也於此見得倜儻分明可謂今之古之苟或未然三尺龍泉光照膽萬人叢裏奪高標天童入院上堂風行草偃水到渠成正令既行十方坐斷若也向上論去語默不及處棒喝未施前總是依草附木漢事不獲已且作死馬醫所以道隨處作主遇緣即宗法幢隨處建立展臨濟三玄戈甲會曹洞五位君臣敲唱雙行殺活自在拈一莖草穿天下衲僧鼻孔布縵天網要打衝浪錦鱗是則是便與麼去達磨一宗掃土而盡驀拈拄杖畫一畫云劍為不平離寶匣藥因救病出金瓶以拄杖卓一卓復舉僧問當山第一代啟禪師云學人卓卓上來請師的的啟云我者裏一屙便了有甚麼卓卓的的僧云和尚恁麼答話更買草鞋行脚始得啟喚僧近前僧乃近前啟云老僧恁麼道過在什麼處其僧擬議啟便打師云啟禪師故是本分鉗鎚塞新天童口未得在者僧雖深入閫奧要且未具透關眼下座密庵傑禪師華藏入院上堂昔日文殊大士三處度夏一月長者家一月魔宮一月婬坊末後却歸世尊會中解制迦葉欲白槌擯出纔舉念見無量世尊無量迦葉無量文殊世尊云汝欲擯那箇文殊迦葉盡其神力槌不能舉後來尊宿拈云好一槌又却放過甘作小乘人師云尊宿與麼也是盲人摸象傑上座今夏蔣山結夏褒禪破夏華藏終夏且道與文殊是同是別若道是同許他具一隻眼若道是別也許他具一隻眼忽有箇不受人瞞底出來道長者也好淈𣸩只向他道淈𣸩中有箇分曉處急須聽取三處移場定是非頑心全不改毫氂胡言漢語憑誰會鐵額銅頭也皺眉靈隱入院上堂孤峰頂上目視雲霄未為究竟十字街頭和泥合水轉見周遮二途不涉別有生機一路如龍得水似虎靠山把斷要津不通凡聖猶落時人升降處而今坐立儼然見聞不昧箇箇負冲天氣槩人人懷赤水之珠到箇裏如何通信如何受用所以道是法住法位世間相常住如是則山河大地不礙眼光四聖六凡互為主伴坐見聲和響順萬法無差舉一明三目機銖兩橫該竪括縱奪臨時且到家一句作麼生道蒲團時倚無餘事永日寥寥賀太平
