body:
  text: 武林十八㵎理安禪寺住持婁東行悅集度僧提綱大眾圓悟勤禪師受季善友為僧上堂三界無安四生拘促欲脫愛網超步大方正應披忍辱鎧操智慧刀運上品心發殊勝志與蘊魔煩惱魔死魔共戰滅三毒破魔網始是大丈夫漢豈不見教中道三界無安猶如火宅眾苦充滿甚可怖畏又道是舍惟有一門而復狹小雖然狹小過去諸佛現在諸佛未來諸佛盡從箇裏出去且道畢竟如何良久云何似生遼天鶻萬里雲只一突眾道友為李道山披剃上堂頂門闡金剛正眼始辨大機殺人不眨眼底漢立地成佛方明大用直得如此猶只是吾門建法幢立宗旨趣向在且向上還有事也無若知有向上事去設使盡乾坤大地草木叢林一一現千百億釋迦身不消一揑至於傾懸河辯用嶮崖機盡四聖六凡一時軒豁提得將來不消一拶且道據箇什麼便恁麼所謂大人具大見大智得大用向無明窟子裏便放無量寶光向眾生境界中便作不思議事如丹霞相似才方舉起便知落處更不涉唇吻更不落言詮始似過他一箇聱頭便乃十分領略只如未剗草時在什麼處既要剗草與說戒兩手掩耳又落在什麼處過量人有過量事只如當機一句作麼生道數聲清磬是非外一箇閒人天地間復頌云丹霞剗草燒木佛宮使捨緣吹布毛驚群敵勝真獅子一釣須連十二鼇佛眼遠禪師行者落髮上堂露柱多年出家燈籠久已落髮佛殿堅持禁戒三門近得休歇大事本來平等無著清涼滿月度盡草木叢林一似陽和齊發下座大慧杲禪師為太學上舍生楊麟剃染上堂已著槽廠將錯就錯騎却聖僧不妨快樂龍象蹴踏非驢駝作堪笑諸方妄生穿鑿休穿鑿祥麟只有一隻角楚石琦禪師度僧上堂未出家時父母兄弟障你光明不得既出家了師僧道伴障你光明不得觀山翫水處拈香撥火處著衣喫飯處屙屎送尿處總是你光明發現處且如父母未生已前者一段光明在什麼處寶月當空圓聖智何山松檜不青青箬庵問禪師岸道者芟染陞座云教中道清淨行者不上天堂破戒比丘不入地獄拈拄杖云曼殊大士來也復靠云斷岸孤舟壁道者芟染陞座師云山花似錦水如藍見色聞聲莫被謾世出世間殊勝相分明覿面一毫端卓拄杖付戒提綱嵩嶽元珪禪師一日有異人者峩冠袴褶而至從者極多輕步舒徐稱謁大師師覩其形貌奇偉非常乃諭之曰善來仁者胡為而至彼曰師寧識我耶師曰吾觀佛與眾生等吾一目之豈分別耶彼曰我此嶽神也能生死於人師安得一目我哉師曰吾本不生汝焉能死吾視身與空等視吾與汝等汝能壞空與汝乎苟能壞空及汝吾則不生不滅也汝尚不能如是又焉能生死吾耶神稽首曰我亦聰明正直於餘神詎知師有廣大之智辯乎願授以正戒令我度世師曰汝既乞戒即既戒也所以者何戒外無戒又何戒哉神曰此理也我聞茫昧止求師戒我身為門弟子師即為張座秉鑪正几曰付汝五戒若能奉持即應曰能不能即曰否神曰謹受教師曰汝能不婬乎曰亦娶也師曰非謂此也謂無羅欲也曰能師曰汝能不盜乎曰何乏我也焉有盜取哉師曰非謂此也謂饗而福淫不供而禍善也曰能師曰汝能不殺乎曰實司其柄焉曰不殺師曰非謂此也謂有濫誤疑混也曰能師曰汝能不妄乎曰我正直焉能有妄乎師曰非謂此也謂先後不合天心也曰能師曰汝不遭酒敗乎曰能師曰如上是為佛戒也又言以有心奉持而無心拘執以有心為物而無心想身能如是則先天地生不為精後天地死不為老終日變化而不為動畢盡寂默而不為休信此則雖娶非妻也雖饗非取也雖柄非權也雖作非故也雖醉非惛也若能無心於萬物則羅欲不為淫福淫禍善不為盜濫誤疑混不為殺先後違天不為妄惛荒顛倒不為醉是謂無心也無心則無戒無戒則無心無佛無眾生無汝及無我孰為戒哉神曰我神通亞佛師曰汝神通十句五能五不能佛則十句七能三不能神悚然避席跪啟曰可得聞乎師曰汝能戾上帝東天行而西七曜乎曰不能師曰汝能奪地祇融五嶽而結四海乎曰不能師曰是謂五不能也佛能空一切相成萬法智而不能即滅定業佛能知群有性窮億劫事而不能化導無緣佛能度無量有情而不能盡眾生界是謂三不能也定業亦不牢久無緣亦是一期眾生界本無增減亘無一人能主其法有法無主是謂無法無法無主是謂無心如我解佛亦無神通也但能以無心通達一切法爾神曰我誠淺昧未聞空義師所授戒我當奉行今願報慈德効我所能師曰吾觀身無物觀法無常塊然更有何欲神曰師必命我為世間事展我小神功使已發心初發心未發心不信心必信心五等人目我神蹤知有佛有神有能有不能有自然有非自然者師曰無為是無為是神曰佛亦使神護法師寧隳叛佛耶願隨意垂誨師不得已而言曰東巖寺之障莽然無樹北岫有之而背非屏擁汝能移北樹於東嶺乎神曰已聞命矣然昏夜間必有諠動願師無駭即作禮辭去師門送而且觀之見儀衛逶迤如王者之狀嵐靄煙霞紛綸間錯幢旛環珮凌空隱沒焉其夕果有㬥風吼靁奔雲掣電棟宇搖蕩宿鳥聲諠師謂眾曰無怖無怖神與我契矣詰旦和霽則北巖松栝盡移東嶺森然行植師謂其徒曰吾沒後無令外知若為口實人將妖我晦堂心禪師開戒上堂我有大妄語對眾頻頻舉佛法陷平人不許去與取遂竪起拂子云者箇是佛耶是法耶你諸人作麼生去者箇非佛耶非法耶你諸人作麼生取若去不得又取不得你現前若僧若俗若男若女若長若幼豈不全身總在裏許還有跳得出者麼若也跳得出過在山僧諸人無分若也跳不出過在諸人山僧無分且道總不恁麼底人又作麼生少間於戒壇之上更與諸人道破下座瑞白雪禪師秉命授戒升座鳴尺云會麼此是千華座上盧舍那佛放大寶光光告千華上佛傳此心地戒品直至如今流在金粟峰頭上密下雲和尚處承和尚慈旨命雪上座為汝諸人聊通一線復鳴尺云會麼若也會得金風一夜雨箇箇髑髏新其或未會且將三皈十戒為汝等敷宣弘覺忞禪師為新戒付衣上堂昨晚南嶽與匡廬兩山爭論佛法一山道南嶽讓和尚乃曹溪嫡子一山道青原思大師實寶林正宗一山道廬陵米價傳千古一山道磚鏡磨穿古佛心互相競爭不已羅浮山聞得出來約住云莫爭莫爭饒你青原思大師南嶽讓和尚少不得從我嶺南者裏去山僧驀頭與羅浮山一棒天台合掌道善哉和尚打者一棒不妨透頂透底暢快殺人山僧遂與震威一喝咄縮頭去於是四山各各懡㦬而退拈起袈裟角云還見麼自從盧老收歸後須信人人總有之箬庵問禪師上堂本來面目全呈露一點無欺是戒源今日分明重舉似當陽直指不相瞞男是男女是女僧是僧俗是俗各各不相知各各不相借三世諸佛侵你一些子不得歷代祖師奪你一些子不得天下善知識添你一些子不得直下凜如氷雪通身皎若嚴霜人人獨自稱尊箇箇點胸點肋騎聲葢色邁俗超方便應如是信如是解如是行如是證於如是中建立於如是中利濟為人天佛祖之師作天下古今標榜須是恁麼人方成恁麼事到者裏風行草偃水到渠成歷歷孤明洞然瑩徹誰是能授者誰是得授者良久云一華五葉芬芳遍大地弘開火宅蓮牧雲門禪師新戒請上堂一法若有毗盧墮在凡夫萬法若無普賢失其境界出有無有條通天大路須菩提解之為空優波離持之為戒阿闍世王獲之證無根信勇施菩薩悟之入無生忍涅槃會上廣額屠兒放下屠刀道是千佛一數善來菩薩子依樣畫葫蘆即不無畫成後如何行履牽犂拽耙氣衝天露爪張牙得人怕阿呵呵是甚麼語話便下座上堂臘月初一逢二九紅日東昇光忽透空崖半夜起大風主山案山草木俱作獅子吼當恁麼時誰是久參誰是新戒馬大師即心即佛八字打開非心非佛全機獨露敢問諸人洗面時為甚麼摸著鼻孔過堂時把定匙筯還會麼早知燈是火飯熟幾多時道具提綱鉢盂拄杖拂子千巖長禪師因蔣居士施鉢盂上堂問話且止況此事不在語言文字上何謂也盡十方世界是箇鉢盂三世諸佛在裏許轉大法輪歷代祖師天下老和尚乃至一切有情無情總在裏許頭出頭沒汝等禪和家還跳得出麼若跳得出須彌南畔把手同行若跳不出長連床上喫粥喫飯茲承常州直心居士同令弟月堂居士委宏都寺送鉢盂五百副齋米五十石及䞋資種種供養登山俵散大眾請升於此座舉唱若舉麻三觔乾屎橛鋸解秤槌之類雖是本分家風於諸人分上了無交涉未免舉一兩則古話也要諸人咬嚼僧問楊岐天得一清地得一寧衲僧得一堪作甚麼岐云鉢盂口向天有問無明只向道披毛戴角又僧問洞山時時勤拂拭勿使惹塵埃為甚不得衣鉢山云直饒道本來無一物也不合得他衣鉢雪竇云他既不受是眼將來底必應是瞎還見祖師衣鉢麼若於此入門便乃兩手分付非惟大庾嶺頭一人提不起設使合國人來且緩緩將去師云洞山太尊貴生雪竇太慳悋生無明者裏則不然將來底是眼不受底是瞎禪和家箇箇腕頭有力不怕提不起不怕將不去何處更覓祖師即今兩手分付大眾無明與麼批判且道與古人相去多少還有證明者麼若證明得居士功不浪施若證明不得無明不惜眉毛復成一頌以拂子打圓相云大眾見麼大地渾圇黑漆鉢吞吐虗空口門濶白飯山堆疊疊來死人喫了都教活畢竟此功歸阿誰常州在家蔣菩薩老僧也只得一分大家有眼何曾瞎分付囊藏又展開千古萬古阿剌剌雪竇顯禪師因僧送拄杖上堂師拈拄杖云清峻孤根別有靈勢含山水自分明提來勝得豐城劍報盡人間兩不平復云大凡以平報不平是義烈常準以不平報不平為格外清規亦猶以智遣惑頗逢下士以智遣智罕遇作家要會兩不平麼諸人也沒量罪過雪竇也沒量罪過雪竇過自能檢責你者漆桶不打更待幾時以拄杖一時趂下恕中慍禪師謝明慶瑩中和尚惠竹拂上堂拈起示眾云凌雲勁節傲雪孤標結根於曠劫之先孕質於三乘之外一刀兩段不假思惟信手拈來神號鬼泣非麈尾之能齊豈龜毛之可比擊處而雷轟蟄戶竪時而劍倚長空馬師束手歸降百丈望風斂袵有如是之妙用有如是之神通汝諸人還知來處麼若也未知問取明慶和尚擊禪床下座大挂搭歸堂提綱名勝首山念禪師大挂搭歸堂上堂三春景謝朱夏將臨是禪子罷游之際幽窻挂錫之辰林下相逢合談何事良久云擬指千差路回光百萬程瑯琊覺禪師大挂搭歸堂上堂與麼來者上間安排不與麼來者下間挂搭向上人來獨自悽悽暗度江更有一人向什麼處著良久云釣竿斫盡重栽竹不計工程得便休珍重雪巖欽禪師上堂眾無多寡道絕方隅小中現大塵包太虗丁此末法荒涼之運南明只得扶起森羅萬象熾然常說抑下從上佛祖盡作參徒參則固是且道以誰為師且請歸堂挂搭上堂修造工夫已辦龍神土地亦安因甚水雲來往尚如月曉星殘山僧已是不禁冷淡未免總萬象於一堂同時挂搭與諸人朝暮同參卓拄杖云更添一單劍門分禪師新恩長老挂搭上堂長老為僧四十年者回退院來參禪藤條劈面鞭將去醉蝶難尋火裏蓮下座普請提綱應庵華禪師普請栽松上堂舉臨濟在黃檗栽松公案溈山問仰山黃檗當時祇囑臨濟一人別更有在仰云有祇是年代深遠不欲舉似和尚溈云雖然如是吾也要知但舉看仰云有一人指南吳越令行遇大風即止師云黃檗道雖然如是子日喫吾三十棒了也養子之緣固當如是臨濟正令雖行可惜向钁頭邊甘自活埋仰山見解未出常流豈止遇大風即止當時何不道直待虗空界盡此話方始大行豈不是頭正尾正蔣山今日捋下面皮要與諸人相見去也驀拈拄杖卓一卓云驚群須是英靈漢勝敵還他獅子兒普庵肅禪師普請上堂當時驢井如今井驢酒醒溪邊思往昔至今方覺彼區區空花解弄迷兒路蝶引癡蜂入網蛛誰是那頭能警叱回光返照越賢愚雲葢瓦鋪須子細筆端有口顯文殊咦珍重高峰妙禪師普請上堂禪不在參道不須悟動轉施為山嶽皷舞孟八郎漢便恁麼去爭似西峰搬石運土愚庵及禪師普請栽松上堂舉臨濟在黃檗栽松公案畢乃云諸人要做臨濟兒孫則且置只如黃檗道雖然如是子已喫吾三十棒了也且道臨濟當時過在什麼處應庵云養子之緣固當如是扶強不扶弱濟以钁頭打地三下復作噓噓聲為是啐同時為復別有道理普慈向者裏擬著箇眼也要諸人瞥地卓拄杖云雪後始知松栢操事難方見丈夫心箬庵問禪師普請示眾擔磚肩負重摘茶手攬香重底若辛苦馨香不久長難行難忍處滿路要生光共此雲堂裏休疑手脚忙有人識得偈意與他鈯斧住山玉林琇禪師普請上堂盤山道向上一路千聖不傳慈明道向上一路千聖不然大慧道向上一路熱盌鳴聲諸大老恁麼提持脚未點地在報恩則不然向上一路千聖同途今日山中乏糧禪侶托鉢明道蔡封翁同闔門諸上善人送資到山普請大眾好生出坡下座朝宗忍禪師上堂今朝十月初一日田家收割將畢未畢衲僧門下事如何靈祐初住荒村破院普請大家竭力揮拂子下座弘覺忞禪師普請栽松上堂若論此事如種樹相似揀擇欲精下手須確根宜其條直坎貴其寬容然後時之以雨暘資之以風露則自然由拱把以至合抱由合抱以至蔭覆人天雖然者邊底從你種祇如那邊底又作麼生栽驀召大眾眾舉首師云根生也復說偈曰怪來禪社日凋傷四望喬林卒就荒榦折薪樵知法弱根摧匠石占魔強幽棲鳥出無高託天外鶴歸失故翔欲起山門千載色請栽大樹作陰凉亡僧遷化請佛事鎻龕起龕奠茶湯天如則禪師為宗上座鎻龕燈籠㳂壁上天台且道明甚麼宗旨宗上座死却活句活却死句佛祖牢關鎻你不住恕中慍禪師為運監寺鎻龕靈機密運智鑑發輝直得三脚驢𨁝跳踏破虗空只者鎻子有甚用處南石琇禪師為淨上座鎻龕一念心清淨則生死永絕隨波逐浪句截斷眾流句圅葢乾坤句總不勞拈出弘覺忞禪師為圜通老宿封龕逝多國上賴相成又向何方展化輪只在阿閦兼妙喜人天無路問玄津恭惟圜通老禪宿法海聖賢隨宜應跡普門大士方便垂綸住世七十九年將及迦文之壽筭念周千百億所欲分布袋之多身釣絲一夜收竿拋盡雲山海月歸鳥幾多迷谷難尋苔徑華茵俊哉獅子之行逈而絕侶卓爾象王之步誰則為鄰掩龕云物外乾坤忘主管壺中日月自朝昏為印明都寺封龕法界不容身至真無相貌誰穵太虗空突開者一竅葢因妄有生因生有滅生滅滅已寂滅現前唯我印公都寺以廣大心運無私智力還普天寶所冀轉無上法輪坐此界分我人未免自生拘執然巨澤有乍興之波浪長空無積久之風雲瞥然一念回光自應千差坐斷況復換步趨無為之岸移身歸寂寞之鄉可謂爭之不足讓之有餘者矣正當恁麼時又且如何塵囂無復來芳徑賸有白雲隔隖封天如則禪師為文監寺起龕不立文字不涉程途正與麼時如何是文監寺出門句子一不得有二不得無倒跨楊岐三脚驢恕中慍和尚為聰西堂起龕某是黜聰明泯知見不懼生死底漢颺下住山鈯斧正好東行西行印藏主起龕毗盧正印文彩燦如不善用者動成窒礙平地上死人無數透過荊棘林是好手昇都寺起龕拗折聖箭子好箇昇平世界生老病死甚處得來放便倒扶便起星流電激三千里常都寺起龕愛惜常住如護眼睛底一念盡情放下了也涅槃臺上不用遲留勝熱門頭更須進步漢監寺起龕今朝一隊死漢送箇活漢透過金剛圈吞却栗棘蓬十方世界杳無消息雖然也是喪車後掉藥囊無用寬禪師為大善寺長老起龕曠大劫來只是一宗若聖若凡誰敢當鋒住山斧子輕拋下出門步步起清風正覺宗院主起龕拈杖云正覺一宗爍破虗空無用與渠親舉起出門且喜日輪紅天隱修禪師為成侍者起龕拈拄杖擊龕云吾徒通成可謂信心脫俗九載事師殷勤只者著子尚未惺惺涅槃臺上請汝先行且道正恁麼時是生耶是死耶生既未生生即無生死既離死死亦無死無死無生靈然獨存咦門外春風瀟灑去一回消息一回新聰侍者起龕行聰行聰十九如風偶然失脚滿盤盡空一空空到無空處返本還元總是同你若會得生來便去也不為夭你若會不得縱然百歲不為老即今會得便恁麼去以拄杖指龕云出去弘覺忞禪師為瑩維那起龕一蹋黃河水斷流山川行到路窮頭驂駿驥服驊騮揮鞭直出青霄外俯視塵沙界一漚人間天上何處得淹留霞屋應都寺起龕祇解恁麼去不解恁麼來者五步雖存七步不活既解恁麼來又解恁麼去還他朝遊西天暮歸唐土漢始得何故脚跟無綫如蓬轉信有渠儂得自由為鄂州惟凡禪人起龕平地上死人無數過得荊棘林方是好手大眾祇如荊棘林已過底又作麼生古佛放光留不住鐵牛無脚也須行為印明都寺起龕衲僧得力句不在南嶽定在天台印都寺你是海州人親從天台來就中得力句還曾拾著也未若也未曾山僧有箇妙法與你東西驀過三千南北倒回十萬乃喝一喝云到頭霜夜月任運落前谿為恒徹禪人起龕未得徹頭須索討箇入路不得入路過在全活尚未死既得徹頭須索討箇出路不得出路到底死了未曾活所以道門裏出身易身裏出門難若是脚下無私漢紅綫斷十景神駒過海南五色祥步天岸為止休淨上座起龕多年賦就還鄉曲欲唱人前恐脫空帶血連宵啼蜀魄歸思不禁上眉峰春去也綠滿叢夾路桃華風雨後馬蹄何處避殘紅為寶慶南源融禪師起龕春光無脚走閻浮鳥語華香遍界週芳草那堪迷古岸黃金索斷鐵牛頭忘管帶絕拘留信步天南仍地北更嫌何處不風流為霛章蘊禪師起龕水上東山行不住火中木馬驟清風為緣鼻斷黃金索八角磨盤任走空天如則禪師為聰上座湯去黜明苦口良藥衲僧有病在膏肓鎻斷咽喉吞不落聰上座汝今藥病兩忘一任吞却吐却恕中慍禪師為滿書記起骨茶滿肚文章通身擔板及乎挨拶將來直是皮穿骨露南匾頭自非慈明痛下毒手未免向泐潭死水裏浸殺人在畫樓沽酒處相要來喫趙州茶拄持為亡僧秉炬清規云鎻龕起龕等佛事維那稟首座商量可以依資輪請頭首為之惟秉炬必請住持舉佛事今時諸方亦命頭首恐非古道無相真禪師為靜維那火大眾還知靜維那麼嚴陵灘上父母生緣白葦峰頭易服而至蹉過如來頂寶滿肚風雷欲紹長者家財翅摩霄漢兩頭俱脫一事無成抱病來歸懸知不救老蘆山今日為伊出手令伊直下知歸火焰藏身彈指透過荊棘林瞥爾回頭倒騎鐘樓入佛殿試問大眾正與麼時還有照用雙行者麼涅槃一路非生滅火裏氷花著眼看圓悟勤禪師為亡僧火五蘊山頭涅槃路四方八面沒遮欄通身盡是金剛眼一粒靈丹火裏燃大慧杲禪師為彥維那火者箇上座了五蘊性空悟諸法無我纔覺四大乖違知是收因結果預于三兩日前洗浴剃頭親寫遺言問我乞一把火不顧頂後萬里神光豈戀目前玄關金鎻無明業識癡團一一從頭點過如此了事衲僧世間能有幾箇彥維那既恁麼更有一事須說破若到天台鴈蕩遊傳語嵩山破竈墮為法燈監寺火以火炬指龕云者箇是已滅底法燈復舉起火炬云者箇是無漏底智火無漏智火然法燈然也滅也無不可燈監寺還知麼灰飛煙滅後優曇花一朵為充禪人火人人皆有四大充禪獨有五大地水火風之餘更有一枚笠大此笠內空外空內外空包含欲界色界無色界說甚須彌鐵圍江河大海萬象森羅總在裏許無迫無隘而今四大已乖張唯有笠大鎮長在者笠大甚奇怪一唱兩唱三唱貴亦不賣賤亦不賣畢竟如何打與充禪同入火光三昧為超禪人下火山下麥黃蠶已斷一隊死人送活漢活人身似鐵金剛即今再入紅爐煅應庵華禪師為南書記火東湖莞嶺及歸宗燁燁騰輝爐鞴中鐵眼銅睛烹不破衲僧巴鼻好流通天目禮禪師為南禪值雨門首秉炬指南一路南北西東孟八郎漢便與麼去去則不無只如前面是夜叉羅剎後面是惡浪懸崖中間是陷人火坑到者裏又作麼生出門一陣雨滂澎元叟端禪師為定維那火一槌之下正眼豁開亘塵沙劫是箇大寂定門顧視左右云夜來何處火燒出古人墳為此上座火此虗妄身若無六塵則不能有火裏蝍蟟吞却山河大地了也今者妄身當在何處為道上座火道不在內亦不在外大海不宿死屍烈𦦨不存蚊蚋擲下火為定上座火那伽大定動寂常真生死去來如同遊戲劍刃上翻身火燄中走馬為玄首座火摧殘峭峻銷鑠玄微兜率宮中了無夢想勞生路上永絕驅馳火裏烏龜頭戴角翻身觸倒五須彌為泳掌財火秤盤上分斤定兩是汝筭筒邊橫千竪百是汝且道生死海中𣹢泳游戲是汝不是汝擲下火云烈焰堆中分明薦取高峰妙禪師為若瓊上座火舉炬云向者裏薦得拈一莖草即是瓊樓玉殿不然瓊樓玉殿即是一莖草擲下火云剔起眉毛火裏看明山都管火以火打圓相云者裏見得便見山即山水即水大洋海底火星飛天目峰頭波浪起不然擲下火云家家門前火把子法曇上座火汝名瞿曇佛名法曇分明舉似疑則別參擲火云大洋海裏火燒龕中峰本禪師為茂直歲火諸方直歲度火把與住持今日住持度火把與直歲且道是明甚麼邊事明日優曇花茂發淨飯王宮生悉達只從者裏便承當千古萬古阿剌剌宗監院火歸宗一味禪楊岐三脚驢兩重公案一句破除且道是那一句擲火把云臘雪堆中火一爐圓浴主火以火把打圓相云圓浴主見麼喚作圓相則背不喚作圓相則觸透過兩重關還他親眷屬蓮峰突出碓觜花杓柄兜翻獅子足香水沉沉徹底乾普請大眾齊刮目且道看甚麼擲火把云脫殻神龜飛上天無位真人火中浴祥柴頭火舉起火把云祥柴頭見麼萬朵祥雲匝地飄叢林枝葉半肩挑今朝匾擔兩頭折千日斫一日燒無用寬禪師為宗院主火四大本空都無罣礙火裏翻身一彩兩賽記寺主火記得的用不著無手人打殺虗空驚得須彌顛倒卓擲火云便向烈𦦨堆中放下龜毛兔角喝著古梅友禪師為德維那火興化當年打克賓仰山把火沒疎親遍參知識工夫切撒手便行眼有筋即此身離此身涅槃臺上火箭飛從教落葉又歸根天如則禪師為讓後堂火說法兜率宮讓他第一座翻身涅槃岸奪得最初機離四句絕百非烈𦦨唯中更發揮依維那火以火把打圓相云雲峰破桶箍依稀似者箇以火把打破云一擊百雜碎且道是甚麼性火真空性空真火淨首座火清淨妙法身本來無出沒以火指龕云者箇聻不是心不是佛不是物假名無位真人喚作叢林表率劫火洞然燒他不得嚴都寺火天童家法不嚴都寺兩箇燈盞南山知事得人直是一生擔板要見嚴都寺擔板處麼死柴頭上火通紅現出摩醯三隻眼讚首座火眉間挂劍可毀不可讚斬却猫兒可讚不可毀忽然讚毀雙行畢竟是何道理火燒南海波斯嘴瑞監寺火輝天鑑地一著子盞底漏油盛不起眉毛睫上火星飛爍破涅槃與生死舉火云諸人還見麼我見燈明佛本光瑞如此能上座火拖箇死屍來鼻孔不對口能所兩俱亡鰕跳不出斗擲火把云如今跳出了也水底火發燒虗空叢林盡作獅子吼龍上座火死水不藏龍汝還會也未汝若會試入火光三昧愚庵及禪師為燈都寺火舉火把云漏燈𧣴子照破歷劫生死昏衢盡十方世界是箇大涅槃門顧左右云夜來何處火燒出古人墳為清殿主火琉璃殿上荊棘參天勝熱門頭清風匝地擲火云郎當屋舍沒人修火官頭上風車子為嗣隆藏主火宗風欲嗣虎丘隆藏教掀翻氣吐虹二十七年全體現南山燒炭北山紅為乘提點火十方國土中唯有一乘法劫火洞然世界俱壞惟金剛圈不壞莫不便是者箇法麼舉火把云道得也是火焰上添草為瑞浴主火堅固法身濃滴滴地火不能燒水不能洗擲火云我見燈明佛本光瑞如此
