body:
  text: 武林十八㵎理安禪寺住持婁東行悅集解制提綱了庵欲禪師解夏小參昔本不曾結今也何須解解結本無心無縛無脫者恁麼恁麼森羅萬象徹底孤危大地山河通上嶮峻不恁麼不恁麼太陽門下日日三秋明月堂前時時九夏恁麼中有不恁麼不恁麼中却恁麼一切智通無障礙拈燈籠來佛殿裏將山門安燈籠上敢問大衆九十日內還得相應也未其或未然山僧却有箇方便驀拈拄杖卓一下云西風一陳來落葉兩三片復舉明招行腳時到泉州興教坦和尚處坦謂云行腳高士一人所在亦須到半人所在亦須到明招便問一人所在即不問如何是半人所在坦無語後來却令小師問明招如何是半人所在招云你要識半人所在麼也只是箇弄泥團漢應庵和尚拈云我聞獨眼龍果然只具一隻眼今日忽有衲僧問如何是半人所在劈脊便棒更問如何是一人所在便與趂出何故一不做二不休師云等是弄泥團漢應庵老人較些子復成一頌舉似大衆興教提持不受謾明招隨例弄泥團棒頭有眼明如日要識真金火裏看小參萬里無寸草出門便是草嘉州大象驀翻身陝府鐵牛驚絶倒逢人不出賣狗懸羊打破鏡來天荒地老是則金沙混雜非則玉石俱焚不有本分鉗鎚難明向上一竅卓拄杖云一曲少林無孔笛從來多是逆風吹小參秋風凉秋夜長三期已滿作麼商量以字不成八字不是黃牛角指天四腳垂過鼻我首座出世也我首座牧牛也我首座行腳也我首座來也是法住法位世間相常住威音已前道得正是第二句還我第一句來擊拂子云三要印開朱點窄未容擬議主賓分復舉僧問雲門秋初夏末前程忽有人問作麼祗對門云大衆退後僧云過在什麼處門云還我九十日飯錢來師云者僧貪程太速雲門薄處先穿有問本覺只向道十里長亭五里短堠過在什麼處勸君更盡一杯酒西出陽關無故人小參長期短期日面月面一毛端上乾坤石火光中閃電你有拄杖子與你拄杖子你無拄杖子奪却你拄杖子人平不語水平不流山僧三十年前海上參尋只是遇茶喫茶遇飯喫飯寒則向火熱則取凉朝悠悠暮悠悠不知白盡少年頭逗到被人推出住山把人杓柄寧免顢頇儱侗有時半夜穿針有時空中覓縫若非現前尊衆戮力贊成便見將東作西指南為北草滿法堂苔封古屋所以今夏堂中兄弟雖曰不多盡是諸方羅籠不住呼喚不回底漢掃除異見稠林拈却佛病祖病那更永福禪師在此輔車與脣齒相似卓拄杖云一曲少林無孔笛逆風吹了順風吹古林茂禪師解夏小參秋初夏末東去西去萬里無寸草處去出門便是草擬向什麼處去古人事不獲已開却通天大路又謂之清淨大寂滅海與諸人同出同入初無私毫差別彼我之相直下會得九十日內功不浪施明朝自恣之辰一任東去西去只不得向萬里無寸草處去何故蓋為諸人未曾踏著者一路子所以前頭大有事在雪峯云盡大地是解脫門把手拽不入雲門云盡大地是解脫門枉作佛法會却一處不通兩處失功兩處不通觸途成滯山僧道盡大地是解脫門過去未來現在三世諸佛盡在裏許汝諸人亦在裏許拈拄杖云拄杖子亦在裏許且道還有不在裏許者麼良久喝一喝云空將未歸意說向欲行人解夏小參九十日長期告滿二千年舊話重圓然則修證在人本無處所無縛無脫不即不離於此證中畢竟無證殺之與活盡屬菩提生與不生俱名般若南天台北五臺一切智智清淨無二無二分無別無斷故拈須彌山稱作十二兩海神知貴不知價拽占波國共新羅鬭額王母晝下雲旗翻看看古岸何人把釣竿復舉古人道九旬禁足魚遊網三月安居鳥入籠生殺盡時蠶作繭如何透得者三重師卓拄杖云將成九仞之山不進一簣之土解夏小參一夏九十日明朝事方畢修證既無功光陰盡虗擲雖然如是便與麼去也不孤負諸人豈不見昔有老宿一夏不與兄弟說話有僧云不敢望和尚說佛法得聞正因兩字也得老宿云若是正因一字也無道了叩齒云適來無端與麼道隔壁老宿聞云好一釜羮被兩顆鼠糞污却老宿牢關把斷水泄不通者僧不善其機上他鈎線若不得隔壁老宿與他注破幾乎虗度一生雖然且道者僧還肯也無後來雪竇和尚拈云誰家鍋裏無一顆兩顆入水方見長人山僧與麼告報也是官路販私鹽是汝諸人須是皮下有血始得畢竟如何不因夜來鴈爭見海門秋復舉先育王夜參云少室無門戶如何便得通夜深寧耐立聽我話西東師召大衆云也有權也有實也有照也有用只是不得恁麼會珍重解夏小參五祖和尚云一即三三即一牧羊海畔女貞花拒馬河邊望夫石石擊赤赤土畫簸箕從教眼𥉌眵五祖老人雖則大啓玄關要且無佛法道理保寧一夏與兄弟東語西話句句字字盡是透頂醍醐夏末秋初東去西去切不得孤負老僧何故千年田八百主甜瓜甜苦瓠苦坐斷上頭關超出佛與祖復舉文殊三處度夏迦葉白椎欲擯出即見有無量世界一一世界有一一佛一一文殊一一迦葉世尊問迦葉云汝欲擯那箇文殊迦葉罔然師云大小迦葉有頭無尾畢竟如何西天令嚴久立解制小參時光易失解夏斯臨砌畔蛩吟林間蟬噪金風扇野黃葉飄空只此見聞更無餘事直得九旬之內無絲毫虗棄之功歷劫無明當下氷消瓦解向上更有事在露出獅子爪牙其間別有商量未免當門按劍所以古人道譬如鴈過長空影沉寒水鴈無遺踪之意水無留影之心只者靈鋒阿誰敢擬太陽門下日日三秋諸人若善參詳管取功成果滿正與麼時如何萬機罷盡龜藏六一性圓明鶴出籠解夏小參三月安居尅期取證一念未生前拈却佛祖病是汝諸人二六時中還得相應也未若未得相應九十日飯錢放過也不妨只是不得道見保寧來豈不見雲門大師道直得盡乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提時節大小雲門舉話也不了臨濟云有一人常在途中不離家舍有一人常在家舍不離途中那一箇合受人天供養恁麼說話猶在半途既在途中說什麼家舍既在家舍便須忘却途中所謂道人行處如湯銷氷箭既離絃無返回勢有底道途中即是家舍家舍即是途中與麼見解也未夢見臨濟汗臭氣在不如他興化道我在南方行腳一遭拄杖頭不曾撥著一箇會佛法的却有衲僧氣息箇事如擊石火閃電光搆得搆不得未免喪身失命其間一箇半箇轉得身吐得氣當頭坐斷不受差排腳跟下推勘得來未免黑洞洞地良久云休休著甚來由春了夏夏了秋秋了冬無事晚來江上望三三兩兩釣漁翁南石琇禪師解制小參諸方提唱貴在出格才升堂小參便要舉入門便棒入門便喝話望州亭與汝相見話隔江招手話見僧便面壁話直使龍睛鶻眼莫能窺鶖子目連安能湊泊謂有宗師手段高則高矣妙則妙矣其奈法道衰微利根者少正如方木逗圓竅安能吻合徑山相席打令看風使帆不惜帶水拖泥一任諸方笑怪久參上士不在多言晚進初機莫嫌苦口出家人棄捨父母不顧奉養已為不孝是名教之罪人矣期在悟明心地續佛慧命廣度衆生如是則非便報答今生父母養育以成大孝直使纍世父母冤親俱獲解脫豈小可哉若只區區碌碌今日三明日四戒律不能持禪定不能習甚至傷風化玷宗社非但為名教罪人亦是法門之罪人矣一旦生死來到將何抵敵捨此報身難逃淪墜古人謂牢獄未是苦地獄未是苦袈裟下失却人身是為苦也藥石之言可不銘佩衆中忽有一箇出來道長老長老好合取臭口山僧只得向明窗下安排何故近代三吳并百越箇般作略眼中稀復舉九峯虔禪師因僧問西天夏末有人得道此間夏末還有得道者麼九峯云有僧云何者是九峯云頭戴午夜月腳踏黃金地今日忽有問徑山此間夏末有人得道麼徑山但答云無忽更問云何謂無便向他道箇箇眉毛橫眼上人人鼻孔大頭垂且道九峯是徑山是便下座笑隱欣禪師解夏小參萬機不到百匝千重一句全提七穿八穴萬里無寸草出門便是草瀏陽洞山前不遘村後不迭店中峯明日解制今夜一彩兩賽去也拈拄杖畫一畫云透過一字關摵碎三玄要狸奴白牯笑不休露柱燈籠皆𨁝跳因甚如此一家有事百家忙復舉溈山示衆云行腳高士直須向聲色裏睡眠聲色裏坐臥始得疏山出問云如何是不落聲色句溈山竪起拂子疏山云此是落聲色句溈山便歸方丈疏山不契遂辭香嚴嚴云何不且住疏山云某甲與和尚無緣嚴云有何因緣不契試舉看疏山遂舉前話嚴云某甲有箇話疏山云道什麼嚴云言發非聲色前不物疏山云元來此中有人乃囑香嚴云師兄向後有箇住處某甲却來相見溈山至晚問香嚴云問聲色話底矮闍黎在麼嚴云已去也溈云向子道什麼嚴云某甲亦曾對他來溈云試舉看嚴云言發非聲色前不物溈山云他道什麼香嚴云他深肯之溈山失笑云將謂者矮子有長處元來只在者裏此子向後設有住處近山無柴燒近水無水喫師云衆中商量盡道溈山用向上爪牙惜乎疏山失却一隻眼殊不知正是溈山失却一隻眼却被疏山勘破中峯恁麼道諸人還甘麼用彰俊禪師解夏小參秋江清淺時白鷺和煙島本無迷悟人只要今日了既是本無迷悟又要了箇什麼好諸禪德頂門正眼照古照今腦後神光無內無外雖則人人本具各各現前其奈妄想執著不能了此茲值聖制將圓僧欲自恣便從今日了將去不妨七穿八穴十字縱橫若了不去三十年後換手埵胸莫言不道解夏小參解却布袋口拔脫拄杖根朝遊天台莫往南嶽是你諸人分上事有佛處不得住無佛處急走過亦是你諸人分上事山河無隔礙光明處處通普賢菩薩乘此光明現神通百變從象口入從象鼻出從象耳入從象眼出諸人還知麼若也知皇恩佛恩一時報畢若也不知便請還常住九十日飯錢來咄爾密澓禪師小參洞山云秋初夏末各各向東去西去直須萬里無寸草去有曰出門便是草有曰直得不出門亦是草洞山老祖與二尊宿忘却自家四大五臟盡力提持恐人入草今日東山解制臘節初臨春氣未至正值燒痕滿界衆兄弟直須向乾茅叢裏信手拈來寸寸瓊枝縷縷玉葉不妨和身臥在荊棘林中纍地輥他十七八輥起來通身荊棘非但佛祖難親饒他舜若多神擬著則鮮血淋漓縱使臘月三十索債盈門難以近傍東山如是告報大似出客顛狂自露通身醜惡雖然也不錯舉冬夜提綱雪巖欽禪師冬夜小參并謝梅澗首座冬至月頭賣被買牛冬至月尾賣牛買被全提古佛規猷突出衲僧巴鼻可中一箇半箇不受人瞞才聞舉著剔起眉毛嗔叫吼地笑道二祖甘不丈夫斷臂求心埋沒自己殊不知深雪堆中自有澗底寒梅一樹清香𭥃旎卓拄杖云嗅得著只者是舉洞山道有一物黑似漆常在動用中動用收不得師云可煞自由過在什麼處師云兩手分付泰首座道過在動用中師云相隨去也若是護聖門下則不然有一物明似日不在動用中動用中無不得且道還有過也無若有箇漢出來道無山僧未免也拈出一顆斷江柑子聊陳薄供卓拄杖一下云莫怪空疏伏惟珍重冬夜小參陽升陰伏漢宮添一線之長日曖霜明魯史書五雲之瑞直得飛雪谷發寒氷光𦦨集雲峯抽石筍枝條君子道長小人道消鵬搏海運也九萬里而扶遙高峯妙禪師冬至舉僧問古德云一陽來復日長一線未審佛法長多少古德云長一線後有古德云一線長師拈云就窠打劫還他三老本分鉗鎚若謂佛法短長端的未夢見在今日忽有人問西峰佛法長多少只向他道東西十萬南北八千中峰本禪師冬至示衆乾三連坤六斷慈明揭堂上之榜文陽未復陰已消洞山掇座元之果桌兩重公案皎如白晝千年活計瑩若澄潭金毛獅子擺脫鐵鎖而奮迅遊行踏碎東西天目玉角麒麟掣斷錦蠅而軒昂步驟衝開前後溪山堅氷浮野水而不知春信寄寒梅而未覺夜後燈籠眼活朝來露柱心空共發揮劫外風規同指點寰中節令諸禪德還知麼你若道年年冬至喫齊歲歲一陽聽法鐵餕餡鐵蒺藜互相拋擲牛尾拂牛皮鼓撩亂激揚任你鼓兩片唇皮向曲彔床上說向天也得說向地也得說得陰消陽長也得說得陽消陰長也得我只管一日鉢盂兩度濕冬至寒食百單五是固是矣你還知只箇不管底正是生死根株無常羈鎖正未曾透脫在所以道此宗難得其妙切須仔細用心古今多少伶俐人向一色邊立定主宰一切處禪將去禪也禪得是你若不親向自己腳跟下卒地斷嚗地折一回殊不知和箇禪底亦不曾脫他輪回生死此事是博地凡夫立地便要向他佛祖頭上坐臥要於一剎那頃將他積劫根深蒂固底輪回生死連底一翻翻轉是謂大事因緣豈口出耳入而能及之者哉如果未相應且不要人別求方便但只於十二時全身放下單單靠取箇所參話頭日亦然夜亦然行亦然坐亦然生亦然死亦然乃至上刀山入劍林亦皆然更不生第二念只麼純一無雜挨拶將去久久純熟和箇亦然底同時脫略心空及第其在斯焉正與麼時喚一陽作六陰也得喚六陰作一陽也得喚全消是長亦得喚全長是消亦得喚不長不消即長即消總得可謂真正衲子本色道流遇緣即宗應時納祐又何一物能拘絆哉雖然還不喚今日作一陽來復得麼待別有消息時却來吐露久立恕中慍禪師冬至小參海寺荒涼巖巒攢拱門外寒潮浸月庭前古木號風人人眼見耳聞一一超今邁古戢玄機於未兆藏冥運於即化慈明揭榜堂前鬼門貼卦洞山掇退果桌欺陷平人若非智眼洞明盡作奇特話會所以道參禪須透祖師關學道要窮心路絶心路不絶祖關不透未免受他寒暑變遷生死籠拈拄杖云此土西天十萬程冬至寒食一百五復舉溈山示衆云仲冬嚴寒年年事運推移事若何仰山進前叉手立溈山云我也知你答者話不得却問香嚴你作麼生會香嚴云某甲偏答得者話乃叉手進前立溈山云賴遇寂子不會拈云溈山將引二子向氷枯雪老之時作一家宴熊掌駝峯下箸厭餵管絃鼉鼓聲徹雲霄遠近觀瞻莫不歆豔及乎分付家財依然却成吳越擊拂子當初只道茅長短斫却元來地不平至節小參古佛心只于今明月照幽谷寒濤助夜砧先德與麼吐露可謂千鈞之弩要待勍敵發機萬斛之舟不為坳堂創設若是滄溟上客閫外將軍捩轉船頭踏翻射垛自然中的於機先豈用瞻風於五兩所以道譬如獅子王哮吼獅子兒聞之皆增勇健不見洞山問興平云如何是古佛心興平云汝心便是洞山云雖然如是猶是某甲疑處興平云恁麼即問取木人去大衆者些子見不破踏不著饒伊辨如滿慈智如鶖子未免癡狂外邊走今夜正當群陰剝盡一陽來復之時聊與諸人聚話片時敢問諸人且洞山與麼問興平與麼答莫是將錯就錯借路經過麼莫是真實相為拳踢相赴麼如斯品論鄭州出曹門只如興平末後云恁麼即問取木人去此一轉語太煞慈悲多少人向者裏錯會有能於此撥開胸襟伸得口氣何止醍醐灌頂苟或未然陋巷不騎金色馬回來却著破襴衫楚石琦禪師冬至小參垂萬里鈎駐千里烏騅布漫天網打衝浪錦鱗如大力魔王道我待一切衆生成佛盡衆生界空無有衆生名字我乃發阿耨多羅三藐三菩提心廣額屠兒放下屠刀道我是千佛一數早是不唧𠺕更向長連床上坐長連床上臥眼盵瞪地殺不死羊相似萬年一念有什麼益不如泥猪疥狗却有出離之期明明向你道開口不在舌頭上要急相應來日是書雲復舉臨濟道萬法是心光諸緣惟性曉本無迷悟人只要今日了師云既無迷悟了箇什麼從前汗馬無人識只要重論蓋代功愚庵及禪師冬至小參群陰欲去未去之際一陽欲生未生之時伐鼖鼓以考鴻鐘會人天而提祖令今夜不說菩提涅槃真如解脫不說即心即佛非心非佛不是心不是佛不是物洞山掇退果桌祭鬼神茶飯阿誰肯喫慈明揭榜堂前弄猢猻家具笑殺傍觀叉手進前進前叉手奴見婢殷勤天寒人寒大家在者裏無孔鐵鎚魯公臺山書雲漢女宮中測日知時識節却堪持論自餘立機立境行棒行喝全鋒敵勝同死同生正按傍提橫來竪去和泥合水截鐵斬釘七十三八十四等是鬼家活計於諸人分上料掉沒交涉喝一年三百六十日四時八節春了夏夏了秋秋了冬不覺不知過了三百六十日明朝便是冬至前來許多絡索既是總用不著自己分上合作麼生喝點鐵化為金玉易勸人除却是非難冬至因事小參千載南屏古道場目前無法可商量群陰銷盡陽生也四海同瞻化日長如是則鐘鼓山林依舊太平氣象維新人人腳跟下輝大寶光箇箇頂門上開正法眼鵲噪鴉鳴深談實相牧謳漁唱共演真乘當頭坐斷八面玲瓏正令全提十方通暢有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪臨濟大師滿肚無明通身擔板要且費力不少居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實釋迦老子釘樁搖櫓抱橋柱洗浴有什快活處山前一片閒田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風老東山雖則熟處難忘却較些子忽有箇衲僧出來道長老長老恁麼也得不恁麼也得喝和泥合水漢不見道時人住處我不住時人行處我不行不是與人難共住大都緇素要分明復喝一喝復舉僧問古德萬境來侵時如何德云莫管他師云萬境來侵莫管他情塵瞥起便周遮大圓寶鏡明如日漢現胡來等不差古林茂禪師冬至小參霜凝氷凍陰極陽生日南長至吾道大亨拈拄杖云拄杖子橫山河大地一齊橫拄杖子竪山河大地一齊竪拄杖子不橫不竪山河大地自山河大地燈籠自燈籠露柱自露柱所以道是法住法位世間相常住只如雲門大師道拈燈籠向佛殿裏將山門來燈籠上蝦蟆𨁝跳上天蚯蚓驀過東海是常住耶非常住耶日東上月西沒循環三百六十幾箇解知窠窟窠窟不知絶毫絶氂庭前石笋抽條也會見高枝宿鳳雛復舉僧問靈雲如何是佛法大意雲云臨鴆砧臨鴆砧井底種林檎僧云學人不會雲云今年桃李貴一顆直千金大慧和尚云者箇公案自古至今無人拈出山僧不惜口業更為注破臨鳩砧井底種林檎今年桃李貴一顆直千金師云大衆靈雲答者僧話且道與臨濟在黃檗問佛法的的大意三度喫六十拄杖是同是別若道是同法無同相若道是別佛法豈有兩般常愛大慧云我者裏說蚌蛤子禪開著口便見心肝五臟只者便是雖然也是大都城裏撮馬糞漢冬至小參冬至一陽生寒食一百五葭管才驚暖律回嶺頭又見梅花吐時節不相饒昨日有人從燕京來說上都路上雪深一丈軍民馬匹凍死饑死動以萬計是汝諸人火爐頭打坐粥足飯足焉知有與麼事諸上座從上來事也須同前決擇古人拈一機示一境在你面前堆不前挽不後吞不下吐不出他時後日觸事面牆也道曾見保寧來即今三百六十骨節八萬四千毛竅明知是生死根本何曾昧却一絲毫許祖師云門門一切境回互不回互回時更相涉不爾依位住須彌山上𨁝跳大洋海底橫行針眼裏躍出衝浪錦鱗冷灰中撥起亘天烈𦦨直得如是也只是三家村裏賣草鞋底相識有甚用處然則官不容針私通車馬山深水寒日上月下跛驢踏倒摘茶輪草庵卸下琉璃瓦卓拄杖喝一喝云德山臨濟來也冬夜小參昨夜三更失却牛天明起來失却火東討西尋不見蹤元來賊是家親做是汝諸人還認得家親也無若也認得十二時中無纖毫過患不為物轉不為境礙不為凡聖所纏不為生死所縛隨分著衣喫飯自然坐斷報化佛頭祖師云心隨萬境轉轉處實能幽隨流認得性無喜亦無憂既不為物所轉不為境所礙如何又說心隨萬境轉轉處實能幽大抵參禪須要究理而參即今山不可喚作水水不可喚作山俗不可喚作僧僧不可喚作俗須是隨他境轉始得忽然山不是山水不是水僧不是僧俗不是俗你面前無我我面前無你夾山云目前無闍黎座上無老僧雲月是同溪山各異便是轉處實能幽也當知此性即是清淨廣大寂滅平等本際廓徹靈明通達萬法一切不疑本有之性無量劫來未曾變易陰消陽長冬去春來何曾昧却一絲毫許雖然如是也須實到者箇田地始得若也不實不要掠虗有佛處不得住無佛處急走過三千里外摘楊花開口不在舌頭上卓拄杖喝一喝復舉僧問徑山諲禪師掩息如灰時如何山云猶是時人公幹僧云幹後如何山云耕人田不種僧云畢竟如何山云禾熟不臨場應庵和尚云鳳閣香殘雪巢夜冷半窗明月和氣藹然正與麼時且道歸宗與徑山還有相見分也無見與不見即且置只如者僧與麼問還具眼也無其或未然雲藏無縫襖鳥宿不萌枝師云打鼓弄琵琶相逢兩會家九年人不識幾度過流沙冬至小參冬至一陽生拄杖長丈二擊碎破沙盆大地載不起三世諸佛窺無門歷代祖師無提掇處如今衲僧家道我向陰陽未剖世界未立已前便知有向上巴鼻婢視聲聞奴呼菩薩驅逐南泉趙州輕忽德山臨濟把他從上老宿埋向大屎坑裏殊不知簡點將來正是依草附木精靈也未夢見衲僧汗臭氣在前三後三一九二九黃牛角向天火裏蘆花秀忽然𦦨發氷河燒著帝釋鼻孔東海娑竭羅龍王惡發氣衝牛斗卓拄杖喝一喝冬節小參一生二二生三三生萬物井底紅塵蔽日山頭白浪滔天翻身百草頭邊跳出劫初田地智不到處切忌道著入水見長人我宗無語句亦無一法為人波斯入閙市以思無思之智返思靈𦦨之無窮釋迦老子與天帝釋相爭佛法甚閙雲門大師忍俊不禁來山僧拂子頭上呵呵大笑且道笑箇甚麼我笑釋迦老子二千年前不善輸機甘心受屈當時若下者一著免致笑殺旁觀畢竟如何卓拄杖云寒山拾得冬至重建寢堂小參豁開戶牖重新舊日規模當軒者誰坐斷聖凡途轍碧眼胡僧罔措釋迦彌勒猶是他奴燈籠露柱掀眉文殊普賢權作走使描不成畫不就撲落非他物花簇簇錦簇簇縱橫不是塵逴得便去山河并大地踏著便瞋全露法王身自古自今說玄說妙緇素不分者如稻麻竹葦就理就事變通逸格者能有幾人靈利漢沒窠臼知是般事便休且道知底是甚麼事寒來暑往陰極陽生庭前玉樹花開早也勝東山水上行卓拄杖喝一喝冬至小參形興未質山河大地甚處得來名起未名無位真人突出難辨頂門上時時顯現眼睛裏處處縱橫舉拂子云看看德山臨濟來也也有權也有實也有照也有用佛來也打祖來也打且道還曾打著也無豈不見興化道我在南方行腳一遭拄杖頭未曾撥著一箇會佛法底花根本豔虎體元斑子細簡點將來也是死水裏浸却及到大覺被脫下衲衣痛打一頓却言我在大覺棒頭方始深明臨濟先師在黃檗喫棒底道理者箇便是打著底樣子所以精金百煉要須本分鉗鎚山僧七五年前也曾舉此話來有云興化氣宇如王因甚向大覺棒頭方始發明臨濟在黃檗喫棒底道理我者裏拄杖子走遍四天下撥著一箇便是會佛法底他時後日免得遞相鈍置有底便道山僧只解扶強不能扶弱殊不知自有分付處兄弟時光可惜不易來此聚頭只知者邊那邊豈解知慚知愧古人小參謂之家教在今諸方大段不同須要起模畫樣方為格外提持暨乎本分商量未免麻纏紙裹從上諸聖豈無方便為人一千七百祖師機緣盡是控你諸人入處若要乾坤坐斷逸格超宗截鐵斬釘不通凡聖須是沒量大漢始得陰陽消長日月遷流𦦨發氷河花開碓觜大盡三十日小盡二十九總不干諸人分上事久立珍重用彰俊禪師冬至小參群陰欲剝未剝金烏冰得觜團圞一陽欲生未生玉兔凍得腳曲彔不可作佛法商量不可作世諦流布便與麼會三世諸佛六代開士天下老和尚入地獄如箭不與麼會三世諸佛六代開士天下老和尚入地獄如箭與麼不與麼總不會天在一粒粟中海在一毫端上浮幢王華藏界總在眉毛眼睫間三世諸佛六代開士天下老和尚無逃遁影處當與麼時喚什麼作陰喚什麼作陽然雖如是事無一向雲黃山頂有片無陰陽地不萌枝上開不萌花無影樹頭結無影果芳騰六合香噴大千為復是神通妙用為復是法爾如然拈拄杖畫一畫乾坤一合地胡餅日月兩輪天氣毬冬節小參慈明揭榜上一畫長下三畫短弄假像真玉泉布裩書千佛名書萬菩薩名弄巧得拙黃梅石女夜生兒兒生子子生孫匝地普天總是臨濟種草所以雙林會中一箇箇頭頂天腳踏地陰陽不能移寒暑不能變當與麼時也無運推移亦無日南長至然固如是未可如是試請從一九頭數到犂耙出時吽吽前頭大有寒在喝一喝了庵欲禪師冬至小參前佛性命後佛紀綱總在者裏把住則六陰充塞放行則一陽復生不說笋迸石頭不說花開鐵樹只教行者擊鼓小參且免諸人大家瞌睡委悉麼眼若不睡諸夢自除心若不異萬法一如拈須彌山稱作二兩東頭賣賤西頭賣貴任是本色衲僧到此也無辨處豈不見臨濟問黃檗佛法的的大意被打六十拄杖及至高安灘上便解知歸興化道我在南方行腳一遭拄杖頭未嘗撥著一箇會佛法底逗到大覺堂前卸下衲衣痛領一頓却言我於此時親見臨濟先師在黃檗喫棒底意旨諸禪德全鋒敵勝未是作家遺劍刻舟豈堪持論雖然若不藍田射石虎幾乎誤殺李將軍冬至小參坐立儼然賓主歷然百千法門同歸方寸河沙妙德總在心源直得無邊剎境自他不隔於毫端十世古今始終不離於當念又說甚運推移日南長至禪之與道拈放一邊妙之與玄置之一處山僧不作佛法商量諸人不作世諦流布明朝起來淨洗了面大佛殿上禮拜燒香依舊只是尋常事例縣橋頭李八伯半醒半醉不覺起來呵呵大笑且道笑箇什麼壁上安燈盞堂前置酒臺悶來打三碗何處得愁來復舉洞山冬夜掇退果桌公案師云太阿橫案凜凜神威寶鑑當臺澄澄光彩只如掇退果桌又作麼生雲自帝鄉去水歸江漢流冬至小參朕兆未分陰陽已具乾坤既剖萬彚茲彰水肅霜清風高木落突出無位真人一箇箇面前孤逈逈地新羅國裏打鼓大唐國裏上堂洗面摸著鼻啜茶濕却觜七十三八十四把拄雪峯趙州放過德山臨濟倒著襴衫舞柘枝萬仞崖前恣遊戲喝一喝冬至小參天地闔闢陰陽消長衲僧門下有甚伎倆放下拂子拈起拄杖佛來魔來總與一棒從教靈山會上退席五千善法堂前草深一丈且貴正眼流通作箇人天榜棒所以五六年來雖則與諸人眉毛廝結其實水米無交明朝節屆書雲不免合水和泥打開東山家燕先舉雲門胡餅次烹趙州釅茶然後掇出洞山果桌只如道有一物上拄天下拄地常在動用中動用中收不得且道是什麼物良久云粗餐易飽細嚼難饑復舉僧問風穴古曲無音韻如何和得齊穴云木雞啼子夜芻狗吠天明大慧和尚云者黃面浙子恁麼答話要做他臨濟兒孫也未得在或有問徑山古曲無音韻如何和得齊只向他道木雞啼子夜芻狗吠天明師云前行不到末後太過要見條理始終須是金聲玉振聽取一頌木雞啼芻狗吠兩箇老凍儂各長三尺古曲無音和得齊安用兒孫作臨濟喝一喝小參六爻沈伏一氣潛回雖是死蛇解弄也活拈一機而機機普應用一法而法法全彰廓人天未證之門揭佛祖不傳之妙浮幢剎外把斷要津賢聖劫中位居第一有一句到你不萌枝上緑覆層陰無一句到你無影樹頭花敷五葉別別細不容針大通車轍缺齒胡僧笑點頭衲僧眼裏添金屑喝一喝舟中值冬至小參一道虗明總是自家田地初爻既兆全彰劫外乾坤無去來動靜之殊無取舍是非之異可以騎聲蓋色可以隨流入流可以泛華亭半葉之舟可以盡澤國煙波之勝不舉任公之釣非同濠上之遊擊拂子云劈口一橈已傷鹽醋離鈎三寸休更回頭拍膝云永夜月明天在水鴈聲飛過白蘋洲無文燦禪師冬至小參丁一卓二道一句滴水氷生拋三放兩示一機崖崩石裂一切處解會不得一切處擬議不得所以寂子只解近前叉手香巖只解叉手近前要會運推移日南長至未在拈拄杖云拄杖子從來死獦狚地今夜忍俊不禁踊躍出來將乾坤大地一時吞却了也若向者裏會得果從無影樹頭結其或未然豆向寒灰𪹼出來復舉玉泉和尚示衆云運推移布裩赫赤不是不洗無來換替師拈云薦福當時若見即向他道少賣弄冬至小參滴水氷生未可歇去崖崩石裂正好進程直饒會得一線長要且未會長一線直饒會得長一線要且未會一線長所以鄉談相似州縣不同開先則不然擾擾匇匇晨雞暮鐘喚冬作夏喚夏作冬一線短長誰管得雪霜盡處是春風復舉僧問古德冬至後日長多少古德云長一線又問一古德日長多少古德云一線長師拈云一等共行山下路眼中各自別風煙月江印禪師冬至若論此事眨上眉毛早已蹉過鐵馬驟氷稜不涉唇吻道將一句來石牛欄古路戢玄機于未兆藏冥用於至化固是罕遇其人會萬物歸自己與天地而同根又是阿誰分上事諸方將謂仰山進前叉手香嚴叉手進前甚生極則殊不知大似楊廣失驝駝韓信臨朝底雲峯有年無德山寺荒涼幸而四海禪流來此相伴未免向八德池邊宏開瑤席紫羅帳裏暗撒真珠共慶書雲令節還委悉麼若教嫫母臨明鏡也道不勞紅粉施拈拄杖卓一下石屋珙禪師冬節小參洞山掇退果桌取舍未思玉泉不洗布裩固執難斷福源等是箇般時節就中却也不同梅放孤標依舊暗香浮動線添寒影又逢佳景迎春燈籠裹帽水底吹笙露柱著衫雲中作舞是汝諸人還委悉麼一百五日是清明清明更在寒食後
