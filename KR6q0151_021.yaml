body:
  text: 武林十八㵎理安禪寺住持婁東行悅集受請升座拈衣法語楊岐會禪師九峰受疏拈衣示衆云會麼若也不會今日無端走入水牯牛隊裏去也還知麼筠陽九曲萍實楊岐保寧勇禪師在蔣山受小疏僧呈法衣師提起身上袈裟云大衆且道者箇是那箇是若道者箇是爭奈那箇何若道那箇是爭奈者箇何却顧衆云如今不免對大衆前改頭換面捻一放一去也便卸袈裟披法衣五祖演禪師白雲受帖舉法衣云既是大庾嶺頭提不起為什麼却在者裏且道者裏底是那裏底是乃云擕瓶自汲清涼水却著袈裟作主人便披圓悟勤禪師照覺受請舉法衣云古人事不獲已挂弊垢衣如今推免不下入者群隊去也大庾嶺頭藏不得如今也要大家知太平勤禪師受請日五祖付法衣師受而捧以示衆曰昔釋迦文佛以丈六金襴袈裟披千尺彌勒佛身佛身不長袈裟不短會麼即此樣無他樣拈敕黃法語圓悟勤禪師在蔣山受敕拈起示衆云大衆見麼龍飛鳳舞降自九重佛祖綱宗盡在裏許却請維那對衆宣讀住金山師在乾明受敕拈起示衆云見麼拈時十日竝照舉處千界光輝九重天上降來宰輔手中親付更不敢囊藏被蓋請僧正一為敷宣住雲居師在金山受劄次日敕下拈敕示衆云九重城裏親宣賜一道神光爍太虗勝義諦中真勝義千華叢裏綻芙蕖一舉便知多少省力苟或未然更請宣過大慧杲禪師再住徑山於育王受請拈敕黃示衆云達磨不來東土二祖不往西天人人常光現前箇箇壁立萬仞且道者箇從甚麼處得來若知來處受用無窮其或未然却請維那分明宣過也要大家知有長翁淨禪師奉敕升住天童捧敕黃示衆曰雲開九天呈起曰看彩鳳銜出且道如何委悉急急如律令敕密庵傑禪師住徑山師在華藏受請捧敕黃示衆云鳳闕頒宣群生聳耳當陽拈出匝地普天喚回枯木龍吟別是一壺春色若也見得皇恩佛恩一時報畢其或未然却請維那分明宣過住靈隱師在徑山受請捧敕黃示衆云九重天上降來善法堂前拈出明如杲日寬若太虗光揚佛祖家風流通正法眼藏恁麼見得堪報不報之恩其或未然維那分明道破拈護法疏法語五祖演禪師四面山授疏示衆云兵隨印轉將逐符行請對尊官分明剖露住東山師在海會受請拈疏示衆云八十翁翁輥繡毬遂付維那圓悟勤禪師住金山受敕後次拈疏云毫端寶剎閫外威權有卷有舒有照有用字字珠回玉轉一一草偃風行雖然文彩已彰更請重新拈出應庵華禪師妙嚴受請判府左司度疏師拈示衆云此是判府左司兩手分付謂之無盡藏頂王三昧言言見諦句句朝宗若也知得更不重說偈言若也未知輒煩僧官對衆宣讀密庵傑禪師受請拈疏云諸佛說不到處祖師提不起時結角羅紋語言三昧盡從箇裏流出輝騰今古不墮斷常欲令四衆共知何妨重為說破拈疏云黃面老子二千年前靈山會上付囑國王大臣一則語流布天上人間綿綿不墜有眼者見有耳者聞聞見既通塞却耳根更須諦聽元叟端禪師檀越疏孤峯頂上天不知地不管因甚被者箇勾引出來過去阿僧祇劫與合府豪俊同修無上佛果菩提住鳳山在徑山楞伽室受請拈院疏此是宣政諸官當面所付謂之金剛祕密三昧魔外以之殄除正宗以之光顯拈公帖法語五祖演禪師白雲受帖拈起示衆云大衆只恁麼會得埋沒宗風過犯不小幸有現成公案請維那對衆宣讀住海會師在太平受帖拈起示衆云恁麼會去早是鈍漢何也若憑說五千四十八卷豈不是說若不憑說又如何辨白請維那分明拈出圓悟勤禪師住崇寧在昭覺初受六祖請拈帖示衆云幸自無事須要箇護身符子作麼然禍不入慎家之門且作麼生斷者公案會麼兵隨印轉請維那剖露住夾山師在天寧受請拈帖示衆云百草頭上薦取爭如箇裏承當既然符到奉行豈可當爐避火若也見得坐斷一切人舌頭苟或未然却請維那剖露住道林師在夾山受請拈帖示衆云大衆湖外有知音千里通消息透出威音王誰解知端的還知麼箇裏辨取苟或未然却對衆宣過密庵傑禪師在褒禪受華藏請拈帖云三回兩度推不去今日依前把不住不是時節因緣亦非人情之故既然如是因甚麼撞頭磕腦不見道順是菩提指座法語五祖演禪師白雲受帖指法座象王回獅子步儂家看著雙眉聚然雖如是事到如斯難為辭讓但有路可上更高人也行海會受請指法座云少間向上頭撒沙撒土去也真淨文禪師洞山受請宣帖罷乃云大衆諸佛出興於世總祇赴箇時節且道貧道今日赴箇什麼時節指法座召大衆云今古應無墜分明在目前圓悟勤禪師昭覺初受六祖請指法座云盡十方都是箇寶華王座長在裏許又何須特地車不橫推理無曲斷箬庵問禪師住金山在夾山受請指法座云借座燈王衲僧掩彩更上一層樓通身得自在一著高一著一步濶一步莫怪渠儂向上行他家自有通霄路登座垂語五祖演禪師太平受帖升座云祖令當行十方坐斷其中莫有不惜性命者麼出來與老僧相見圓悟勤禪師受請升座云蝸牛角上三千界雲月溪山共一家既爾業緣無避處不如隨分納些些一不做二不休還有共相建立底麼受夾山請升座示衆云鈎頭有餌句裏無私已泛扁舟放行綸線還有衝浪錦鱗麼受道林請升座數載碧巖藏拙訥幽深頗愜再南心業緣苦死相驅逼隨順還須過道林二途俱不涉底出來道看受請升座提綱保寧勇禪師在蔣山受小疏升座云夫參學人直須具頂門上眼超世英雄於一切人天衆前震法雷擊法鼓藏鋒露刃掣鼓奪旗吼獅子音作大佛事若能如是方有些子丈夫之氣山僧今日不惜眉毛入泥入水去也我佛世尊為一大事因緣故出現於世敢問諸德作麼生是一大事良久云五千餘卷詮不盡三世諸佛讚不及今古祖師提不起還委悉麼若委悉不動步超釋迦越彌勒又何必更命山僧向諸德前鼓兩片皮壓良為賤然雖如是不許夜行剛把火直須當道與人看乃云爐冶鉗鎚枉用工吹毛何必在磨礱靈光昨夜輝牛斗坐致升平宇宙中久立受帖日升座明珠歷掌別者還稀寶鏡當臺何人鑒照鋒前一路截斷衆流言下千差隨波逐浪所以展則大千俱遍不展則絲髮不存與麼語話猶是化門之說且道不落化門一句作麼生道道泰不傳天子令時清休唱太平歌謝了又云千峰壁立滑於苔不惜眉毛露出來直下早逾千萬里那堪此處更徘徊喝一喝下座真淨文禪師在洞山受聖壽請升座問答畢乃云更有問話者麼良久乃喝云昔日大覺世尊起道樹詣鹿苑為五比丘轉四諦法輪唯憍陳如最初悟道貧道今日向新豐洞裏只轉箇拄杖子遂拈拄杖向禪床左畔云還有最初悟道底麼良久云可謂丈夫自有衝天志不向如來行處行喝一喝下座五祖演禪師在白雲受請升座秋風颯颯玉露垂珠水碧山青蛩吟蟬噪圓通門大啓文殊普賢穿過汝諸人鼻孔自是汝諸人當面諱却復云諸佛不出世四十九年說未審說箇什麼祖師不西來少林有妙訣殃及子孫至今分疏不下更說什麼妙訣若人識祖佛當處便超越超越與未超越則且置你道祖佛即今在什麼處若無人道得山僧不惜眉毛與汝諸人拈出拍禪床一下師在太平受請升座法不孤起仗境方生明鏡當臺好醜自現久參上土言下知歸晚學初機當須子細是以古人道法無去來無轉動者輒成山頌舉似大衆觸目光明處處新其中那箇辨疏親祇園枝上千花秀一度芬芳一度春師在海會受請升座三處住持只者滋味者回冤家難為回避白蓮峰鼻孔海會山出氣雪竇顯禪師在翠峰受疏日洞庭檀越與明州專使相爭紜紜不已師乃升座普告大衆不須作閙事在況僧家也無固無必住則孤鶴冷翹松頂去則片雲忽過人間應非彼此殊源動靜乖趣今與諸人評議念三二年洞庭晦迹承四遠信心恩顧棲衆方諧舊轍藏教復乃新歸豈可知感頓忘遽致前邁誠為不可而又四明太守星馳介使輜重俄臨既已跋涉數州迢遞千里投誠苦逼一至於斯進退審詳不能自決敢問大衆住翠峰好往雪竇好於時衆僧高聲云往雪竇好師乃顧謂洞庭諸檀越云不用為訝宜各知時且佛法委自王臣兼住持亦以緣斷在彼在此本無間然希披疏文以塞來命便下座圓悟勤禪師住崇寧師在昭覺初受六祖請升座一向目視雲霄壁立千仞則孤負諸聖一向拖泥涉水灰頭土面則埋沒自己如今恁麼也得不恁麼也得且貴正眼流通還委悉麼直饒高步毗盧頂不稟釋迦文婢視聲聞奴呼菩薩底來也須亡鋒結舌自餘故是出頭不得所以道三世諸佛只言自知歷代祖師全提不起一大藏教詮注不及明眼衲僧自救不了若據本分草料猶是節外生枝不涉化門一句作麼生道陳雲橫海上拔劍攪龍門下座住夾山師在天寧受請升座目前無異草遍界絶遮欄域中日月斬新方外乾坤獨露直得龍天釋梵動地雨華妙德空生目瞪口呿行棒行喝拈向一邊雲月溪山放過一著一處透脫千處百處該通一機洞明千機萬機圓轉碧巖不離此處此處不離碧巖攝大千於毫端融芥塵於剎海銜華鳥過抱子猿歸湛寂凝然應真不借則且置只如無陰陽地上成得箇甚麼邊事萬卉正資和氣力碧巖先發一枝春復舉馬大師問藥山子在此許多時本分事作麼生山云皮膚脫落盡唯有一真實祖云據汝所見可謂協於心體而布四肢何不將三條篾束取肚皮隨處住山去山云某甲何人敢言住山祖云不然未有常行而不住未有常住而不行欲益無所益欲為無所為宜作舟航由是住山師云大衆古人得意之後不忘利生直入深山提持宗要山僧暗昧豈敢仰攀如是則更不用篾束肚皮却有箇折腳鐺子與方來共守寂寥若信得及不在忉忉或未諳詳聽取箇末後句高峯突兀倚天門青嶂虗閒可垛跟折腳鐺兒幸然在不妨擕去隱深雲雖然如是也須是大家出一隻手始得且道畢竟如何妙舞應須誇遍拍三臺須要大家摧住金山師在高郵乾明受敕升座大道無背面真機有卷舒撮大地如陶家輪運大千向針鋒上猶未是寰中正令閫外全威所以萬國仰瞻同歸舜日靈光一道共照皇家重興佛祖道場追還普天寶所正令全提主賓同用山僧今日得奉一人聖詔傍資宰輔威權共建法幢竪立宗旨楊子江心滔天輥浪妙峯孤頂舒卷閒雲是處著眼不前頂𩕳正令全現若是箇同得同用同殺同活底共一眼見共一耳聞同一口宣同一音演更無異緣亦無異見說什麼九十六種二十五有正要當頭辨取一時列在下風且如今日應時應節事作麼生道一句逈超今古格萬年仰祝聖明天住南康軍雲居真如禪院師於建炎丁未歲十一月初六日在鎮江浮玉山受劄子召赴行朝至十七日朝見登對移刻奉敕住雲居次日敕下時兩府并禁從就雍熙寺請師升座祇受敕文師云提金剛正眼闡向上宗乘報不報之恩能難能之事運臨濟金剛王寶劍喝下全彰用德山山形拄杖子覿面分付是則全是見則全見不落凡聖階梯直下頓彰己見既遇明眼作證又逢聖世昌時不敢被蓋囊藏直下分明舉似遂拈拄杖示衆云豈不見僧辭歸宗宗問什麼處去僧云諸方參五味禪去宗云我此間只有一味禪僧云如何是和尚一味禪宗便打黃檗聞之云馬大師出八十四人善知識問著一箇箇屙轆轆地只有歸宗猶較些子師云歸宗和尚束虗空為箇杖子向千聖頂𩕳上全提鎔瓶盤叉釧作一金攪酥酪醍醐為一味若不得黃檗明辨端倪洎險勞而無功雖然如是有條攀條無條攀例今日對諸人面前分明拈出還相委悉麼朝擊三千暮八百煅烹佛祖只憑伊復舉黃檗和尚示衆云汝等諸人盡是不著便底恁麼作略何處有今日也還知大唐國裏無禪師麼僧云只如諸方匡徒領衆又作麼生檗云不道無禪只道無師師云黃檗老漢能區能別能揀能擇擒虎兕定龍蛇即不無要且只明得當時事殊不知彼一時此一時若是山僧即不然汝等諸人盡是英靈豪傑底恁麼舉止須信有奇特事還知大宋國裏有禪師麼且道禪師即今在什麼處如今回避不及不免露箇面目去也乃云親蒙金口賜師名優鉢羅花火裏生圓悟如來無上見謳歌鼓腹樂升平應庵華禪師受妙嚴請升座寶劍揮空乾坤失色掀翻是非窠窟截斷生死根株有佛處不得住地久天長無佛處急走過河清海晏三千里外一句全提更無絲毫滲漏堪與佛祖為師作箇人天榜樣正恁麼時轉凡成聖一句作麼生道委悉麼萬古碧潭空界月再三撈摝始應知師受天童請上堂去年十一月笑別下鍾阜今年九月中行見朝天路去住既無心動靜非取與平生安樂法此意同誰語四明昔嘗到諸剎皆可數山川氣象雄麟鳳棲遲處今思昔日遊歲月二紀許豈謂臨晚景侯伯重相顧開緘讀來書丁寧見毫楮姑蘇二千石眼高照天宇我昔昧平生今見開心腑欣然樂與行方鳴集衆鼓先師未了底今日應須去敢問諸人如何是先師未了底驀拈拄杖卓一卓喝一喝下座密庵傑禪師住烏巨就本院受請升座適來未鳴鼓已前喚作傑上座而今升座已後喚作烏巨長老驟爾更其名易其號披毛戴角拖犁拽耙向異類中頭出頭沒既然業債難逃只得歡喜忍受恁麼見得徹去新長老出世事畢其或未然傑上座今日失利復舉三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人後來白雲和尚拈云二尊宿各有一處打得著且道那箇在前那箇在後師召大衆云白雲端和尚錯下名言殊不知二尊宿前不至村後不迭店直至於今翻成話霸何故字經三寫烏焉成馬下座師在華藏受徑山敕升座至化無私大千普應皇恩廣被巖谷生春雷動風行龍驤虎驟無量殊勝併集恆沙妙義全彰不歷化城直登寶所寶所既至遇緣即宗法隨法行法幢隨處建立移身換步物我一如各各不相知法法不相到且全身奉重一句作麼生道良久云天上有星皆拱北人間無水不朝東師住徑山受靈隱敕升座一處通千處百處一時通一處透千處百處一時透如開武庫錯落交輝又如大火聚著燎却面門如是則居方則方遇圓則圓拈一莖草作丈六金身拈丈六金身作一莖草坐斷情塵意想不落見聞覺知敲唱俱行十虗通暢且移身換步一句作麼生道薰風生閫外白日繞須彌師在平江元知府庵受天童請上堂舉應庵和尚受天童請日偈畢乃云山僧亦有一偈舉似大衆去年八月間得旨與安閒擺脫水雲性縱步到陽山元宅諸子弟欣然力追攀庵居三箇月開懷宇宙寬忽接四明信來書意盤桓天童虗法席使君語猶端迢迢遣專使不問路行難山僧臨晚景不敢自相瞞槌鼓樂與行四衆亦欣歡先師未了底應是起波瀾敢問大衆如何是先師未了底一回飲水一回噎臨濟德山俱汗顏東山空禪師受雪峯請上堂俊快底點著便行癡鈍底推挽不動便行則人人歡喜不動則箇箇生嫌山僧而今轉此癡鈍為俊快去也彈指一下曰從前推挽不出而今出從前有院不住而今住從前嫌佛不做而今做從前嫌法不說而今說出不出住不住即且置敢問諸人做底是什麼佛空王佛邪燃燈佛邪釋迦佛邪彌勒佛邪說底又是什麼法根本法邪無生法邪世間法邪出世間法邪衆中莫有道得底麼若道得山僧出世事畢如或未然逢人不得錯舉喝一喝下座德山瓊禪師受請日上堂作家撈籠不肯住呼喚不回頭為甚麼從東過西自代曰後五日看天童交禪師受請日上堂咄哉黃面老佛法付王臣林下無心客官差逼殺人莫有知心底為我免得麼若無不免將錯就錯便下座寶壽德禪師冬日在南華受請示衆曰新冬新寶壽言是舊時言若會西來意波斯上舶船牧庵忠禪師樞密柳公仲古鎮長沙以法輪起師從於衆望師掉頭不顧復以勝業虗席必欲迎致檄諸禪勸請師聞而宵遁追蹤至定明蘭若撾鼓于堂致師于座緇素羅拜踰時不已師慨然說偈曰咄哉黃面老將法付王臣林下無心客官差逼殺人昔聞其言今見其事便下座箬庵問禪師在竹林受金山龍游禪寺請升座宗乘一唱三藏絶詮亘古亘今輪槌不動風行草偃水到渠成自然時節因緣滿目全彰殊勝同殺同活同縱同奪同照同用同主同賓提持向上玄猷共展衲僧巴鼻有意氣時添意氣增些子不得不風流處也風流減些子不得增不得處減些子減不得處增些子便見法隨法行法幢隨處建立如盲龜值木如香象渡河波浪滔天全身出沒截流而過深淺隨宜楊子江心揚化日妙高峰頂露針錐何曾略假外求只在竿頭進步正當恁麼時兵隨印轉將逐符行節拍相資作麼生道九萬里鵬才展翼三千年鶴便翱翔復偈云滿院竹風關不住一聲長笛到江聞弘佛祖機前令偏向洪波浪裏行受漏澤請升座師接疏云一言未啓千里同風欲得錦上添花要須向人天衆前分明剖露大衆委麼不可道兵隨印轉將逐符行不可道一朝權在手便把令全施須知有向上一竅始得且作麼生是向上一竅昔日靈鷲山中親付飲光以及國王王子大臣廣令弘護傳示將來毋使斷絶即今大司空豈翁居士同大護法當道尊官一郡紳襟合詞專啓重開古寺建立道場即此一會何異靈山既然今古無差便乃聲和響順千峰頂上興慈不妨十字街頭垂手十字街頭垂手要見千峰頂上興慈大衆委麼乃竪拂子云鶴有九霄難翥翼馬無千里謾追風久立珍重更受請提綱保寧勇禪師再受保寧帖上堂拍手三下指口搖手三下下座大慧杲禪師在育王再受徑山敕升座善法堂前瑞氣新天書來自九重城惟憑一句無私語上祝吾皇億萬春受請當晚小參提綱真淨文禪師在洞山受請當晚小參新豐古洞萬疊爭攢悟本真宗千林競簇古今勝地佛事常興所以昔日悟本大師有時提唱云惟有佛菩提是真歸仗處復喝一喝云猶有者箇去就在諸德祇如大師道猶作者箇去就在且道意作麼生還知落處麼叢林中多有商量者有底道聞佛聞法似生冤家況更有歸仗處故遭悟本大師檢點有底道悟本祇要人休歇去有底道悟本祇見錐頭利不見鑿頭方似與麼匹配又何曾夢見他古人既不如是又且如何諸德此箇事大須子細不可粗心一等參禪窮教到底宗門中千差萬別隱顯殊途惟大智方明降茲已往莫測涯際而今多是抱不哭孩兒打淨潔毬子把纜放船抱橋柱澡洗彼此丈夫阿誰無分若便明去驅耕夫之牛奪饑人之食入火不燒入水不溺於一切處不留一切處或就靈光獨耀烜赫殊分可謂蕩蕩乎落落乎張起濟岸帆撥動渡人舟於生死海內白浪堆中出沒去來逍遙自在乃喝云從他謗任他非雨中兼箬笠蓑衣而今暫別海門月擕魚且向市歸下座五祖演禪師受東山請當晚小參一則三三則七牧羊隄畔女貞花拒馬河邊望夫石石擊尺赤土畫簸箕從教眼搭癡復云淮甸三十載今作老黃梅好事明明說從教鴨聽雷明覺顯禪師受雪竇請當晚小參諸仁者未有常行而不住未有常住而不行古之今之各有攸往且如茲院僻處一隅若非念報佛恩無以四來居此恐山僧進發之後法席空虗今命素公開士接續住持幸冀衆慈同心勸請圓悟禪師高郵乾明受敕住金山龍遊當晚小參祖師心印狀似鐵牛之機諸佛密語正如擊塗毒鼓未擬議前先蹉過才思量處隔千山須要眼似流星心如鐵石所以從上來提持向上綱宗只有三句有時咬去有時咬住有時一向不去有時一向不住明眼漢沒窠臼若論戰也箇箇力在轉處却物為上逐物為下要須把斷凡聖路頭不立毫末然後舉一毫毛盡無邊香水海七達八通說一句子窮龍宮盈海藏此猶是極則之談未是衲僧巴鼻若論衲僧受用直饒棒如雨點喝似雷奔列千聖下風立毗盧頂上擊石火閃電光俊俊鷹也趕他不及要須正一切知見發明大解脫無不歷落無不透脫則在天同天在地同地物同物我同我證一切智明一切道無處不通容無機不圓證正當恁麼時諸人各各返照自己分上曾移易一絲毫許麼所謂十世圓融十分成就且道不落機緣一句作麼生道覿面要須宗正眼臨機截斷聖凡蹤辭衆提綱白雲端禪師受法華請辭衆上堂佛身充滿於法界普現一切群生前隨緣赴感靡不周而常處此菩提座大衆作麼生說箇隨緣赴感底道理祇於一彈指間盡大地含生根機一時應得周足而未嘗動著一毫頭便且喚作隨緣赴感而常處此座祇如山僧此者受法華請相次與大衆相別去宿松縣裏開堂了方歸院去且道還離此座也無若道離則世諦流布若道不離作麼生見得箇不離底事莫是無邊剎境自他不隔於毫端十世古今始終不離於當念麼又莫是一切無心一時自遍麼若恁麼正是掉棒打月到者裏直須悟始得悟後更須遇人始得汝道既悟了便休又何必更須遇人若悟了遇人底當垂手方便之時著著自有出身之路不瞎却學者眼若祇悟得乾蘿蔔頭底不惟瞎却學者眼兼自己動便先自犯鋒傷手汝看我楊岐先師問慈明師翁道幽鳥語喃喃辭雲入亂峰時如何答云我行荒草裏汝又入深村進云官不容針更借一問師翁便喝進云好喝師翁又喝先師亦喝師翁乃連喝兩喝先師遂禮拜大衆須知悟了遇人者向十字街頭與人相逢却在千峰頂上握手向千峰頂上相逢却在十字街頭握手所以山僧嘗有頌云他人住處我不住他人行處我不行不是與人難共聚大都緇素要分明山僧此者臨行解開布袋頭一時撒在諸人面前了也有眼者莫錯怪好珍重真淨文禪師在筠州九峰受歸宗請晚參上堂辭衆舉拂子云昔日世尊拈花迦葉微笑今夜歸宗舉拂大衆寂然為復寂然者是微笑者是是又是箇什麼只如歸宗舉拂與世尊拈花是同是別若言同法無同相若言別豈有兩般久參先德聞舉便了後進初機却須子細良久云法法總歸宗臨機要變通靈源明妙處平等主人翁明覺顯禪師辭翠峰上堂山僧斯者抑狥彼請難可稽留束裝告行但多攀感況住持久煩勤舊備認歲寒希各務道專孜以副誠祝其有參隨高士動逾千里俯近百僧忽齊粥疏遺船車隘窄冀相回互禪悅自貽則佛國遍遊亦不為遠何以諸禪德去來不以象故無器而不形動靜不以心故無感而不應然則心生於有心象出於有象象非我出故金石流而不焦形非我生故日用而不勤紜紜自彼於我何為請諸人高挂征帆不勝珍重元叟端禪師受杭州路中天竺寺請辭衆上堂我昔來禺泉四年八箇月打鼓弄猢猻日夜不知歇朝廷公道開分條遇明哲拯斃除貪婪搜賢選英傑胡為天竺峰而乃付愚拙差官逼殺人不容更分說束包登前途聊與衆人別千歲禪巖跳上天六月火雲飛瑞雪呆庵莊禪師應高僧選辭衆上堂我來雲中居五載如轉燭所樂在妄緣心心自知是虗名不可逃驛書到空谷笑看折腳鐺委置憑誰續摩挲七尺藤光漆耀人目用捨各有時去住拘何束珍重同道流共唱清平曲驀拈拄杖召大衆云且道清平曲是甚腔調喝一喝下座愚庵及禪師赴徑山別衆上堂備員南宕恰三年又向凌霄闡化權了却先師舊公案饑來喫飯困來眠且先師公案作麼生了拍禪床下座名德頭首受請借座升座住持先為引座提綱白雲端禪師演首座受四面請師上堂云年年秋暑甚如初何事清涼特有餘盡是當人心地感不虗把手在龍舒且道把手一句作麼生道良久云行到水窮處坐看雲起時保寧勇禪師壽寧長老進發上堂曹溪一宿也大無端黃檗三頓遞相鈍置蒲團禪板屈抑當人索火來燒猶較些子保寧今日別無相送壽寧長老拈拄杖云祇有一條黑漆拄杖更不囊藏向大衆前兩手分付擲杖下座圓悟勤禪師報寧民和尚受帖上堂一向孤峰獨宿目視雲霄雖則不埋沒宗風無乃太高生一向十字路口土面灰頭利物應機雖則埋沒自己無乃太屈辱生況明悟之士頂門具眼肘下有符出沒卷舒得大自在動若行雲止猶谷神可以或孤峰獨宿不得土面灰頭或土面灰頭不得孤峰獨宿恁麼中有不恁麼不恁麼中却有恁麼且應時應節一句作麼生道良久云瑞氣逢嘉運靈苗觸處春應庵華禪師隆報覺長老受請上堂云無上法王有大陀羅尼門名為圓覺流出一切清淨真如菩提涅槃驀拈拄杖卓一卓云普請向者裏入聞聲悟道見色明心觀音菩薩將錢買胡餅放下元來是箇饅頭又拈拄杖卓一卓云若向者裏入瞎却人眼不向者裏入又向什麼處入伶俐漢一撥便轉更須知有出身一路敢問大衆作麼生是出身一路又卓一卓云舉頭天外看誰是我般人夢庵信禪師丹陽邵安撫遠將書帖就庵請竦禪人住孝感功德院因為引座遍探虎穴須是英靈獨摘驪珠豈無奇傑既操如是之志必應如是之求且道如是之事又作麼生用知音千里遠相囑為我拈來與衆看臨安府南蕩慶善專使來就庵請堅禪人住持因為引座錢塘浣漫連渤澥拋餌垂綸難草草莫學空船載月歸深入煙波為尋討鯤鯨早晚如上鈎不枉隨波同混流百丈山前成底事先將漁笛上扁舟乃左右顧視云幸有知音便將拈出肯堂充禪師因元庵和尚受智者請引座南山有箇老魔王炯炯雙眸放電光口似血盆呵佛祖牙如劍樹罵諸方幾度業風吹不動吹得動雲黃山畔與嵩頭陀傅大士一火破落戶依舊孟八郎賺他無限癡男女開眼堂堂入鑊湯忽有箇衲僧出來道既是善知識為甚麼賺人入鑊湯只向他道非公境界楚石琦禪師了庵和尚赴靈巖進發上堂三聖道我逢人即出出即不為人興化道我逢人即不出出即便為人你看他臨濟兒孫如水銀落地相似大底大圓小底小圓卒討他頭鼻不著新靈巖和尚權衡佛祖鎔鍛聖凡為四海禪流掃諸方露布洞庭湖上竪起金剛幢智積山中豁開正法眼畢竟憑箇什麼拈拄杖卓一下下座元叟端禪師為明州新瑞巖前山和尚引座控佛祖大機定乾坤正眼從上以來據曲彔木如恆河沙鞠其指歸直是萬中無一所以道譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發擊拂子十二峰前月如剪清光千里共依依為旌忠了堂和尚引座開蓮華於臘月落氷片於炎天疏正脉之淵源碎邪師之窠臼寒木在握兮全機可笑秋水橫按兮半提可滅使八極頂目者不自爭衡將見斯人兮駕馭昂枿擊拂子云叢林在處今寥落聽取西山第二禪愚庵及禪師衍書記赴普慶上堂欲識佛性義當觀時節因緣豈不見馬祖問藥山子近日見處作麼生山云皮膚脫落盡唯有一真實祖云子之所得可謂協於心體布於四肢既然如是將三條篾束取肚皮隨處住山去山云某甲又是何人敢言住山祖云不然未有長行而不住未有長住而不行欲益無所益欲為無所為宜作舟航無久住此馬簸箕固是蝦為子屈然則時節既至其理自彰正與麼時且如何說箇自彰底理驀拈拄杖召衆云來日普慶山中看取斯道長老為一切人分明舉似卓拄杖喝一喝顏藏主赴千頃上堂舉古德道者一片田地分付來多時也我立地待你搆去法眼道者一片田地分付來多時也我坐地待你搆去佛果道者一片田地分付來多時也我今為汝當面慶讚一即三三即一所見不同互有得失徑山道者一片田地分付來多時也自是你搆不著今日分付用愚長老赤手提持袒肩擔荷向千頃雲中放兩拋三深耕淺種栽荊棘林開三毒花結無明果改禾莖為粟柄變瓦礫作黃金直得釋迦彌勒拍手喜歡文殊普賢合掌贊歎遵從百代典刑振起一方叢席卓拄杖云要識真金火裏看棒頭有眼明如日笑隱欣禪師為奉聖滅庵和尚引座傳佛心宗不是細事荷擔大法須得其人所以首山風穴單丁草屋住三十年而法道之盛過於萬指千礎後來真淨和尚又道先師在黃檗衆不滿百而明眼輩幾半今雖三倍當時才一兩人而已可謂千兵易得一將難求今日奉聖專使來請第一座住山留之則孤彼來意放行則此衆失依諸人還定當得麼若定當得便見靈山會上千葉騰芳少室峰前一枝獨秀如或未然更聽拄杖子通箇消息卓一下云銀山鐵壁無回互草偃風行得自由復舉楊岐在九峰受請下座九峰勤和尚把住云且喜得箇同參岐云同參底事作麼生峰云九峰牽犁楊岐拽耙岐云正與麼時楊岐在前九峰在前峰擬議岐拓開云將謂同參元來不是師云楊岐九峰塤篪迭奏今古罕聞龍翔今日對衆舉揚貴要大家知有且道知有箇什麼祖翁田地無多子努力同心兩弟兄前堂首座赴保寧請上堂開無明華結三毒果魔王惡業現前驅耕夫牛奪饑人食白拈手段尤高所以百丈再參馬祖震威一喝直得三日耳聾黃檗聞之不覺吐舌始知大機大用不假師承鉗鎚妙密屬乎當人如我仲方法弟先師之所敬畏頃辭海上名藍屈為山中表率茲奉丞相鈞命往赴保寧之請所謂法隨法行法幢隨處建立鎔凡鍛聖烹金爐耀古騰今打鳳羅龍龜毛綱漫天匝地直得無路可行無門可入山僧為汝諸人作箇方便拈拄杖擲下云喪身失命知多少照顧南山鱉鼻蛇
