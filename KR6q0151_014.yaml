body:
  text: 武林十八㵎理安禪寺住持婁東行悅集告香普說圓悟勤禪師告香普說只者箇便承當得去如天普蓋似地普擎更不缺一毫頭亦無第二見設使盡無邊香水海塵塵剎剎一時穿却鼻孔也更不落別處儻或思量擬議即沒交涉所以道一念不生前後際斷即名為佛若也涉思量作計校分能所作知解則千里萬里祖師門下直教見須實見悟須實悟證須實證諸人各各有一靈妙性確實而論才被拶著便腳忙手亂作麼生見得親信得徹桶底子脫去只為從無始劫來妄想濃厚只在諸塵境界中元不曾踏著本地風光明見本來面目若是真實人直下承當了知生本不生知死本不死向不生不死處千聖著眼覷不見千手大悲提不起而今兄弟若能返照更無第二人更不待山僧兩回三度不惜眉毛入泥入水何況拋沙撒土說心說性未免落七落八當面相謾去也豈不見破竈墮和尚聞古廟作孽遂領十八弟子入山觀之全無神相唯見三間空屋一所泥竈遂以杖擊之云汝本泥土合成靈從何來聖從何起其竈乃颯颯而墮破竈墮云破也破也墮也墮也不覺紙錢後有一神人出云某甲乃竈神蒙師為說無生法已得生天禮謝而去其十八弟子乃白師云某等皆久參侍和尚殊不蒙開示無生法今日竈神何幸和尚却為伊說破竈墮云我只向伊道汝本磚瓦泥土合成靈從何來聖從何起其徒皆作禮破竈墮云破也破也墮也墮也其十八弟子悉皆省悟只如山僧即今舉拂子且道與破竈墮是同是別遂云破也破也墮也墮也若也見得不唯不孤負破竈墮和尚亦乃不孤負從上祖師若也不見不唯孤負破竈墮和尚亦乃孤負自己知有此事不從他得所以道靈從何來聖從何起只如諸人見今身是父母血氣成就若於中識得靈明妙性則若凡若聖覓你意根了不可得便乃內無見聞覺知外無山河大地尋常著衣喫飯更無奇特所以道我若向刀山刀山自摧折我若向地獄地獄自消滅方知有如是靈通有如是自在只如今禪僧家何不回光返照明教徹去若也未明得且向三根椽下七尺單前默默地究取不見雲門大師道你且東卜西卜忽然卜著也不定若也打開自己庫藏運出自己家財拯濟一切教無始妄想一時空索索地豈不慶快老僧往日為熱病所苦死却一日觀前路黑漫漫地都不知何往獲再蘇醒遂驚駭生死事便乃發心行腳訪尋有道知識體究此事初到大溈參真如和尚終日面壁默坐將古人公案翻覆看及一年許忽有箇省處然只是認得箇昭昭靈靈驢前馬後只向四大身中作箇動用若被人拶著一似無見處只為解脫坑埋却禪道滿肚於佛法上看即有於世法上看即無後到白雲老師處被他云你總無見處自此全無咬嚼分遂煩悶辭去心中疑情終不能安樂又上白雲再參先師便令作侍者一日忽有官員問道次先師云官人你不見小𧰟詩道頻呼小玉元無事只要檀郎認得聲官人却未曉老僧聽得忽然打破漆桶向腳跟下親見得了元不由別人方信乾坤之內宇宙之間中有一寶祕在形山已至諸佛出世祖師西來只教人明此一件事若也未知只管作知作解瞪眉努目元不知只是揑目生華擔枷過狀何曾得自在安樂如紅爐上一點雪去若打破了或喝或掌一切皆得然終不作此解方可放下人我擔子千休萬歇方可生死奈何不得也須是實到此箇田地始得若實到此便能提唱大因緣建立法幢與一切人抽釘拔楔解黏去縛如是揭千人萬人如金翅鳥入海直取龍吞如諸菩薩入生死海中撈摝衆生放在菩提岸上方可一舉一切舉一了一切了有時一喝如金剛王寶劍有時一喝如踞地獅子有時一喝如探竿影草有時一喝不作一喝用方可殺活自由布置臨時謂之我為法王於法自在諸人既是挑囊負鉢遍參知識懷中自有無價之寶方向者裏參學先師常云莫學琉璃瓶子禪輕輕被人觸著便百雜碎參時須參皮可漏子禪任是向高峯頂上撲下亦無傷損劫火洞然我此不壞若是作家本分漢遇著咬猪狗底手腳放下復子靠將去十年二十年管取打成一片且作麼生得獨脫去須是入流人方知恁麼事古林茂禪師告香普說舉不顧即差互擬思量何劫悟向上一路列在下風千聖不傳置之一處竪起拂子云看看雲門大師來也一句語具三句函蓋乾坤句截斷衆流句隨波逐浪句一時撒向諸人面前見汝不會又作死馬醫去也雖然也謾汝諸人不得忽若三句內三句外當頭一拶撩起便行三千里外築著磕著便見水底火發通上徹下是箇大解脫人何處更有許多不了事也雖然也須實到者箇田地始得古人垂一機示一境險峻處直是險峻奇特處直是奇特若佛若祖同一元由乃古乃今別無二致兄弟據實而論自己分上少箇甚麼自是從無量劫來妄想㳂襲背覺合塵日漸月深不能回顧以致膠膠擾擾不得自由才說自己分上一段奇特大事如存若亡縱有百千法門無量方便到你面前只成戲論不然則起心動念作意商量立主立賓說向上向下為人不為人諦當不諦當及乎搏量不及計較不成便揚向無事甲中謂從上來事不過只是箇無孔鐵鎚但與麼承當將去到處亂呈懵袋更不受人決擇殊不知此事本來成現不假外求求而得之盡是鬼家活計德山和尚云汝但無心於事無事於心則虗而靈寂而妙若毫端許言之本末皆為自欺何故毫氂繫念三途業因瞥爾情生萬劫鎖聖名凡號盡是虗聲殊相劣形皆為幻色汝欲求之得無纍乎及其厭之又成大患終而無益者箇說話便是釋迦老子再出頭來經三大阿僧祇劫勤苦修習以至入雪山詣鹿苑轉無上法輪說三乘十二分教不過如此只如毫端不立本末都亡心佛衆生境智俱泯還成自欺否到者裏須是箇斬釘截鐵不顧危亡撒手懸崖不拘得失底然後向無功用大解脫場中拈出一機所謂金剛圈栗棘蓬使盡大地人吞透得過受用自在方可稱為逸群種草向此門中與從上列祖把手共行始有相應分豈不見圓悟未離蜀時在講肆中已為同輩所推及至出蜀時所至諸方無不盡其底蘊首謁真如哲和尚欲呈所見哲云且歇去次日復往哲云昔有僧問睦州以一重去一重即不問不以一重去一重時如何睦州云昨日栽茄子今日種冬瓜汝靜思之悟遂靜默數月忽然有省即以告哲哲詰之悟曰知客在門頭典座在廚下哲頷之看他先輩出來究明此事大不容易直是先去佛祖頭上立地然後放身捨命就人決擇何以見得是他一念確實發起現行明知三乘十二分教皆是表顯之說如人說食終不能飽返照自己真實受用於一切處無纖毫滲漏方為究竟豈是今日麻纏紙裹胡亂撐拄道我曾見前輩來更不肯退步就己揣摩還曾穩當也無後來圓悟又謁黃龍晦堂心禪師心云我此間要宗說俱通一處不明非吾眷屬只如獅子尊者被害白乳涌頸今人惟血出汝意云何悟云乳血果有異耶心曰安得同悟曰二物從何而有心曰傷汝膚乳何在悟曰待和尚一鋤成井我亦如是晦堂笑曰此後生亦可穿鑿可惜晦堂當時放過待他道待和尚一鋤成井我亦如是只向他道山僧功不浪施當時若下得者一著免得圓悟波波挈挈上人門戶如喋屎狗相似有甚用處又謁東林總和尚總曰路逢達磨否悟曰今日獲瞻慈相總斥之曰汝狂矣悟私自謂此平實禪也次日復往總曰人人有一慧日汝有之乎悟曰無總曰安得無悟曰在山南總可其語且道圓悟此語落在甚麼處東林既是落七落八圓悟未免頭上安頭則前所謂平實禪者語不誣矣是時叢林中有人不似今日雖在衆中頭白齒黃至竟不知祖師巴鼻是箇甚麼有一老宿聞知圓悟所歷諸方門戶機鋒峻捷辨說過人笑曰勤川子被禪道裂破肚皮矣何年得安樂耶者箇便是將圓悟推向萬丈深坑更擠以石然後要他蘇醒起來自作活計圓悟聞之不覺負愧遂往龍舒謁太平演祖祖詬罵曰佛法大事豈口頭聲色所至哉若以機辨為禪則臘月三十日涅槃堂裏爭奈孤燈獨照何悟色變而去至金山因故人有疾悟授以己見其人臨終狼狽萬狀悟曰吾輩極頭處今敗績矣古人到者裏論實不論虗只如圓悟平日所歷諸方宗匠之門有如是契證古人淵奧罔不窮盡因甚至演祖之室一旦如賊入空屋更無一物可稱其意後因入浙至蘇州萬壽大病怖不自持平日見解亦無所用乃謂佛鑑曰太平老人所謂涅槃堂裏禪今日驗矣豈此老果有異於人乎不然則何銀山鐵壁如是之堅也由是還太平時演祖已遷海會祖曰汝來乎吾望汝久矣所謂欲識佛性義當觀時節因緣時節若至其理自彰山僧尋常嘗謂兄弟曰必欲究明此事因緣吻合自有其時但辦悠久真實身心自然相應看他圓悟豈不是因緣時節耶未幾為侍者一日因官人相訪請問法要祖曰官人曾讀小豔詩乎頻呼小玉元無事只要檀郎認得聲若向者裏明得參學事畢圓悟聞之謂祖曰此兩句亦能發機乎祖應聲曰麻三斤才道及麻字圓悟豁然大悟時有雞正啼乃斥之曰汝亦會禪耶乃告祖曰今日喪却目前機去却胸中物矣祖大悅好兄弟末後一著始到牢關絶後再蘇欺君不得便是全心即佛全佛即心一人發真歸源十方虗空悉皆消殞底時節也向年有一尊宿曾見前輩來一生住大院點胸不少嘗與兄弟室中舉話不原所自因演祖應聲對圓悟曰麻三斤才道及麻字圓悟忽然大悟而此尊宿不知古人舌頭落處將謂麻字便能發圓悟之機至舉話時只舉一麻字遞相印證直是好笑掩彩殺人如此敢稱宗匠更要與人舉話在當時演祖若舉到麻三兩字圓悟因時悟去後人室中依他作解亦只云麻三是何言歟所謂眼目不明錯認驢鞍橋作阿爺下頷當知圓悟悟處在彼而不在此也看他謂演祖曰此兩句亦能發機乎便是百了千當時節縱使演祖未開口曰麻三斤圓悟是時亦自如桶底子脫相似及至道箇麻三斤胸中礙膺之物豈不脫然者耶所謂宗師為人但除其病不除其法聲前領旨猶迷顧鑑之端句後精通尚昧識情之表圓悟礙膺之物既已脫然無著快活處時有雞正啼乃斥之曰汝亦會禪耶者箇便是回乾轉坤千聖羅籠不住透頂透底獨步大方從上列祖企仰不及的樣子所謂靈光洞耀逈脫根塵體露真常不拘文字自後演祖之門能大其家者若子若孫分光四海猶揭日月惟圓悟一人豈易事耶山中兄弟來此相聚固是不多皆江湖抱道之士既不遠數千里相尋而來不為他事二六時中直須窮究高庵和尚云父母生汝身師友成汝志無饑寒之迫無征役之勞於此不堅確精進成辦道業他日何面目見父母師友乎然此事不在多知多解只要據實而論大衆會麼舉不顧即差互坐斷上頭關截斷千差路更不著商量千聖齊却步喝一喝下座夏前告香普說古林茂禪師云向上一路千聖共行調達因甚麼入地獄達磨不來東土二祖不往西天玄沙因甚麼築破腳指打破虗空底人向甚處安著此是山僧適來對大衆前垂此三轉語諸人無不委知只是無一人向山僧未開口已前道得一句首座雖則下語終是曲順人情明眼人前一場笑具若是箇漢便好向者裏掀倒禪床喝散大衆拗折拄杖向三條椽下作箇灑灑落落無事人去豈不快哉既無如是作略未免向第二義門為諸人通一線路古人云諸佛未出世人人鼻孔遼天出世後杳無消息雖無消息要且謾諸人一點不得何也天不能蓋地不能載日月不能照臨虗空不能包裹萬象不能覆藏通上徹下是箇大解脫人何處更有許多名字所以道處處真處處真塵塵盡是本來人真實說時人不識正體堂堂沒却身與麼說話還得相應也無兄弟白日青天有甚麼事從上佛祖立機立境千差萬別隱顯殊途只要你實證實悟於實證實悟處靠者一著子直是乾嚗嚗地所謂上無攀仰下絶己躬常光現前壁立萬仞豈不見大梅常禪師問馬大師如何是佛大師云即心是佛大梅於言下大悟徑往大梅結庵二十年影不出山後有僧問和尚見馬大師得箇甚麼便住此山梅云大師向我道即心是佛便向者裏住者箇豈不是實證實悟於實證實悟處靠者一著能信自心決定是佛更不別求僧云大師近日佛法又別了也梅云作麼生別僧云非心非佛梅云者老漢惑亂人家男女未有了日任他非心非佛我只即心即佛且道大梅具甚麼眼者些子說似人不得大智非名真空絶跡功多業熟職到威成如月印千江波隨衆水才有是非紛然失心趙州和尚云至道無難惟嫌揀擇才有語言是揀擇是明白老僧不在明白裏是汝諸人還護惜也無時有僧便問和尚既不在明白裏護惜箇甚麼州云我亦不知僧云和尚既不知為甚麼道不在明白裏州云問事即得禮拜了退有底便道趙州赤心片片為物垂慈殊不知正是渾鋼打就生鐵鑄成他明明道老僧不在明白裏諸人還護惜也無既不可揀擇又不在明白裏自然頭頭上明物物上了當體解脫非離真而立處即真十二時中要你護惜不可放捨者僧也不易推究便問和尚既不在明白裏護惜箇甚麼州云我亦不知不妨頭正尾正僧云和尚既不知因甚麼道不在明白裏州云問事即得禮拜了退要識真金須經敏手後來雪竇和尚云趙州倒退三千雪竇可使一代宗師要且只知趙州放行不知趙州把定大凡參學須是頂門具眼自然不肯造次承當隨他顛倒巖頭云才與麼便不與麼是句亦剗非句亦剗者箇喚作無功用大解脫門後有僧問至道無難惟嫌揀擇如何是不揀擇州云天上天下惟我獨尊一句合頭語萬劫繫驢橛僧云此猶是揀擇州云田庫奴甚麼處是揀擇甜瓜徹蒂甜苦瓠連根苦雪竇和尚頌云似海之深如山之固蚊虻弄空裏猛風螻蟻撼於鐵拄揀兮擇兮當軒布鼓一時裂破雖然也是箇斬釘截鐵漢始得僧又問至道無難惟嫌揀擇是時人窠窟否州云曾有人問我直得五年分疏不下好與掀倒禪床雪竇頌云象王回旋獅子哮吼無義之談塞斷人口南北東西烏飛兔走是什麼說話也好與一拶後又僧問至道無難惟嫌揀擇才有語言是揀擇和尚如何為人州云何不引盡者話僧云某甲只念到者裏州云只者便是至道無難惟嫌揀擇孟八郎漢又與麼去雪竇頌云風吹不入水灑不濕虎步龍行神號鬼泣頭長三尺知是誰相對無言獨足立一對無孔鐵鎚者般說話諸人十二時中還曾窮究也未若未曾窮究切忌向者裏東卜西卜古人云却物為上逐物為下是他本色道流自然活鱍鱍地豈肯將古人機緣配在八識田中自作障礙雲門云拈得便用把得便撲在今諸方覓箇舉話底也難得好兄弟如斯理論意在於何只要你向古人未屙已前千聖著眼不及處坐斷報化佛頭直是風凜凜地山僧自來愛與兄弟東語西話諸方聞得往往謂之密室傳授殊不知自有體裁才見他開口便知得他心肝五臟何也為他自己本分事上不曾嗄地一聲不能向古人未屙已前著得隻眼所以隨語生解縱使和盤托出掇向面前有甚交涉嘗記大慧和尚有云我便是參禪底精子山僧早年聞與麼道亦為不平大抵參禪到啐地折嚗地斷十方世界都盧是箇大解脫門動靜去來咳唾掉臂無非盡是文殊普賢大人境界有甚麼精與不精後來因看大慧廣録見他往荊南謁張無盡一段機緣方知古人言不虗發大慧一日與張無盡夜話無盡云老夫頃寓居江寧戒壇院因閲雪竇語至百丈再參馬祖因緣雪竇云大冶精金應無變色遂擲卷於地云審如是臨濟佛法豈有今日耶十數年來諸方往往以豫聰明博記少有知余者公自江西法窟中來必辨優劣試與老夫言之大慧云公之所見正與真淨死心符合近世得此機用獨二老耳無盡云真淨何謂大慧云真淨頌云客情步步隨人轉有大威光不能現突然一喝雙耳聾那吒眼開黃檗面無盡云死心何謂大慧云死心道我要問雪竇既是大冶精金因甚却三日耳聾還會麼從前汗馬無人識只要重論蓋代功無盡乃撫几云不因公舉爭知真淨死心用處若非真淨死心難顯雪竇馬祖由是相與禪悅法喜之樂者般說話久參先德想已見聞後學初機卒難洞曉山僧因行掉臂舉似一番百丈再參馬祖祖以目視繩床角拂子丈云即此用離此用祖云你他後開兩片皮將何為人百丈取拂子竪起祖云即此用離此用丈挂拂於舊處祖震威一喝丈直得三日耳聾後來雪竇和尚拈云夫列其派者甚多究其源者極少總道百丈於喝下大悟還端的也無然刁刀相似魚魯參差若是明眼人謾他一點不得只如馬祖道你他後開兩片皮將何為人百丈竪起拂子為復如蟲禦木啐同時諸人要會三日耳聾麼大冶精金應無變色敢問諸人大冶精金應無變色置而勿論只如張無盡投卷於地云審如是臨濟佛法豈有今日耶意在於何如今衆中稍蘊知識者往往便道無盡大似作家宗師既會馬祖一喝百丈三日耳聾又須發明雪竇大冶精金應無變色然後倒行逆施投卷於地所謂變通逸格向上提持是則固是據山僧見處又且不然張無盡滿肚文章要且不識朕聞上古其風朴略馬祖一喝百丈耳聾正是去却貼肉汗衫拈却髑髏前妄想雪竇云大冶精金應無變色可謂本分草料死心真淨據款結案未稱全提後來無盡亦有頌云馬師一喝大雄峯深入髑髏三日聾黃檗聞之驚吐舌江西從此立宗風依舊向語脉裏轉却山僧昔年送僧往南屏再參曾有頌云百丈參馬師伎倆俱已盡一喝三日聾當機須猛省若謂大冶金正是佛祖病所以無盡翁掩卷未肯信妙喜天人師今古眼目正雲庵與死心提掇事已定敲唱既雙行節拍頗相應一舉便知音撫膝始加敬更有云云不能盡舉山僧自來鄱陽未嘗不與兄弟切切提撕終是未曾拈出者一著子古人有十度發言九度休去之說在今豈不然乎若是真正本色道流未嘗虧缺僧問趙州狗子還有佛性也無州云無到者裏提撕也提撕不得拈出也拈出不得擬要發言向甚處下口縱使休去還休得麼五祖和尚云趙州露刃劍寒霜光𦦨𦦨更擬問如何分身作兩段大慧和尚云參學人向露刃劍上著得隻眼便是百了千當還丹一粒點鐵成金至理一言轉凡成聖更欲多言恐無利益珍重月江印禪師夏前告香普說鐘樓上念讚床腳下種菜荊棘林中是什麼人行履兩箇泥牛鬬入海無位真人因甚額頭汗出達磨不來東土二祖不往西天祖師鼻孔長多少山僧適來垂此三轉語若不是堂中第一座具人天眼目出來證明未免一場懡㦬須知衲僧頂𩕳上一著子如十日並照輝天鑑地耀古騰今何曾有一絲毫許障礙得他所以大覺世尊初生下來便道天上天下惟我獨尊已是明明白白地說向諸人了也一大藏教一千七百陳爛葛藤總是為蛇畫足後代兒孫承虗接響不能一刀截斷致使三百五百閙浩浩地者邊商量那邊卜度莫不隨他腳跟後轉若是英靈上士如金翅擘海直取龍吞千人萬人羅籠不住做箇滅胡種草豈不快哉何用山僧向曲彔床上搖唇鼓舌說黃道黑成得甚麼事今時兄弟出來多是覓佛覓法覓道覓菩提涅槃真如解脫不肯退步向衣線下默默體究何不放教身心蕩蕩地閒閒地胸中不留一箇元字腳久久自然相應若是人我山高是非鋒起為五欲八風之所搖求其到大安樂大休歇之地不亦難乎設有一箇半箇向髑髏前認得箇昭昭靈靈底便道獼猴佩一面古鏡狸奴有萬里神光有底逴得古人些子殘光剩影便道不離當處常湛然覓即知君不可見似則也似是則未是有底但於理性上明得來聲色中透得去謂之綿綿密密不漏絲毫純是真空更無別法如斯見解未出常情勘證將來白雲萬里所以道向上一路千聖不傳學者勞形如猿捉影只如靈山會上世尊拈一枝花是時百萬之衆智如鶖子辨若滿慈尚乃忙然不知落處直饒金色頭陀破顏微笑也未夢見教外別傳意旨在缺齒老胡十萬里得得西來面壁九年二祖禮三拜起來依位而立喚作汝得吾髓且莫誑呼別人好自餘德山臨濟趙州雲門天下老和尚用盡自己查梸總是平地生堆無風浪起點檢將來各人腳跟下好與爛捶一頓免見教壞人家男女兄弟若非真正要了辨生死大事𢬵得十年二十年工夫全身放下靠著本色宗匠與之決擇如金在礦中入其爐鞴受其鉗鎚千鍛萬煉去其礦穢則金之本體自然現前又如清淨摩尼寶珠處塵勞中忽遇智人指出去其塵垢則珠之本體光明頓然發現而此金珠乃是當人本有之體非假外求但經敏手煅煉磨瑩出來則其本地風光何曾缺少不見靈雲和尚三十年做工夫一日見桃花豁然契悟乃有頌云三十年來尋劍客幾回落葉又抽枝自從一見桃花後直至於今更不疑且道不疑箇什麼舉似溈山懶安和尚溈山云從緣入者永無退失冬瓜印子又舉似玄沙沙云諦當甚諦當敢保老兄未徹在一手不獨拍兩手鳴摑摑東山五祖云說甚未徹更參三十年始得利動君子雪竇頌云本無迷悟數如麻獨許靈雲是作家借問遍參諸祖客不知何處見桃花金屑雖貴落眼成翳山僧亦曾有一頌桃花開日好風光引得遊人煞著忙劍客不知何處去令人長憶謝三郎靈雲住後長生問云混沌未分時如何雲云露柱懷胎生云分後如何雲云如片雲點太清生云未審太清還受點也無雲不對生云恁麼則含生不來也雲亦不對生云直得純清絶點時如何雲云猶是真常流注生云如何是真常流注雲云似鏡常明生云向上還有事也無雲云有生云如何是向上事雲云打破鏡來與汝相見還識靈雲麼金鏃慣調曾百戰鐵鞭多力恨無讐又有香嚴和尚在溈山會下一日溈山問云聞子在百丈先師處問一答十問十答百只今向父母未生已前道將一句來香嚴忙然無對將平生所閲底文字檢尋竝無一言可以酬對遂歎云畫餅不可充饑屢請溈山為說破溈山云我若向汝說他日眼開罵我去在香嚴云此生不學佛法且作個常行粥飯僧看他大力量人只者一箇全身放下千佛出世也不奈何如今只討一箇常行粥飯僧也無討處直抵南陽卓庵一日芟除草木瓦礫擊竹作聲豁然大悟畢竟悟箇什麼且道與靈雲見桃花相去多少一對無孔鐵鎚遽歸沐浴焚香遙拜溈山曰和尚大悲恩逾父母當時若為我說破豈有今日事耶者漢和骨頭一時換了仍述一偈云一擊忘所知更不假修持動容揚古路不墮悄然機處處無踪跡聲色外威儀諸方達道者咸言上上機將謂有多少奇特徑歸溈山具陳所解溈山云今日方知吾不汝欺也何不與本分草料一日仰山問云聞師弟有悟道頌試舉看香嚴遂舉前偈仰山云此是閒時搆置底未為極則太煞減人威光香嚴再舉一偈云去年貧未是貧今年貧始是貧去年貧有卓錐之地今年貧錐也無不聞夜來鴈爭見海門秋仰山云如來禪許你會祖師禪未夢見在鐵蒺藜椎轉弄轉危香嚴又呈一偈吾有一機瞬目視伊若也不會別喚沙彌白雪陽春不同調仰山云且喜師弟會祖師禪孟八郎漢又恁麼去香嚴住後示衆云如人在千尺懸崖口銜樹枝手無所攀腳無所踏樹下有人問西來意不答則違他所問若答他則喪身失命當恁麼時如何即是香嚴旁若無人發此一問不妨奇特時有虎頭上座云上樹即不問未上樹請和尚道也好一拶香嚴呵呵大笑若人知得此笑笑須三十年雪竇拈云樹上道即易樹下道即難老僧上樹也置將一問來懸羊頭賣狗肉殊不知香嚴坐籌帷幄之中決勝千里之外虎頭上座也賞他大膽向饑鷹爪下分餐猛虎口中奪食若不是作家宗匠洎被打破蔡州還識香嚴麼三千劍客今何在獨許莊周致太平你兄弟家出一叢林入一保社撥草瞻風尋師訪道還曾如靈雲真到不疑之地一回麼還如香嚴一擊忘所知麼有底道聲色頭上坐聲色頭上臥有底道聲不是聲色不是色有底道聞聲悟道見色明心有底道青青翠竹總是真如鬱鬱黃花無非般若如斯理論閻羅老子未放你過在巖頭和尚云若欲播揚大教一一從自己胸中流出將來與我蓋天蓋地去始得山僧濫尸此席無補宗門現前一衆總是碩德耆年諸方龍象挽向上古風規舉行叢林盛典非圖後來有所見聞亦使法道不致寂寥諸人既具鐵眼銅睛山僧安敢妄通消息適來所舉數則因緣總是古人煎過藥查嚼了殘飯有甚麼滋味可以咂啖雖然忽於無滋味中蹉口咽却舌頭也難得山僧更與汝舉箇古話僧問馬大師云和尚為甚麼道即心即佛大師云只為止兒啼僧云啼止後如何大師云非心非佛僧云除此外如何指示大師云不是心不是佛不是物今時兄弟才見舉箇即心即佛便把作尋常說話才舉箇麻三斤乾屎橛丈林山下竹筋鞭以至釣絲絞水鋸解稱椎新婦騎驢阿家牽三腳驢子弄蹄行如此之類便作玄妙奇特商量若作玄妙奇特商量入地獄如箭射若作平常說話入地獄如箭射佛鑑勤和尚頌云美如西子離金闕嬌似楊妃倚玉樓猶把琵琶半遮面不令人見轉風流者箇頌子作平常說話得麼作玄妙奇特商量得麼又北山隆和尚頌云即心即佛有木有竹屋便好非心非佛不襪不冠身自由不是心不是佛不是物閒倚闌干立清曉紅芭蕉引碧牽牛者箇頌子作平常說話得麼作玄妙奇特商量得麼又霍山昭和尚云即心即佛嘉眉果閬懷裏有狀非心非佛筠袁虔吉頭上插筆不是心不是佛不是物漳泉福建頭匾似扇只可聞名不可見面者箇頌子作平常說話得麼作玄妙奇特商量得麼具眼禪流試定當看諸人二六時中忽然一拳打破虗空方知三世諸佛寐語何山寐語久立衆慈伏惟珍重中夏普說古林茂禪師中夏普說心不附物意不停玄大智非名真空絶跡是汝諸人十二時中向甚處措足直下無事墮在見聞覺知才涉安排未免依草附木兄弟據實而論盡十方世界有甚麼物與汝為緣為對三乘十二分教達磨西來直指人心見性成佛增一絲毫不得及至揚向他方世界無依無欲離相離名無去無來不生不滅也減一絲毫不得九霄絶翳何用穿通一道神光未嘗昏昧所以恁麼也得不恁麼也得恁麼不恁麼總得如王寶劍孰敢當鋒擬欲擡頭橫尸萬里古人垂一機示一境至痛快為人處直是透頂透底情生智隔想變體殊情未生時隔箇甚麼此亦是一期方便控你入處為你未曾及到者箇田地所以有佛有法有玄有妙有向上向下者邊那邊自作障礙曠大劫來不得自由況此事豈是你赤肉團上心識搏量底事心若無事萬法不生意絶玄微纖塵何立雲門云直得觸目無滯達得名身句身一切法空山河大地是名名亦不可得喚作三昧性海俱備猶是無風匝匝之波直得忘知於覺覺即佛性喚作無事人更須知有向上一竅若教山僧向上論量直是無啓口處諸人到者裏亦無立地分三千里外道絶人荒善法堂前草深一丈豈是分外何故立機立境不是向上事揚眉瞬目不是向上事竪拂敲床不是向上事棒喝交馳賓主互換不是向上事只要你從前伎倆一時截斷腳跟下空牢牢地如水上葫蘆一切處拘絆不著然後將古人機緣密切提撕畢竟是箇甚麼道理僧問雲門如何是佛門云乾屎橛明如杲日寬若太虗大地山河全彰海印一明一切明一見一切見一了一切了兄弟時光可惜不易來此聚頭直須辦一片真實身心空教徹去者箇喚作生死大事不是你趂口快圖衣食衒聲利底生活𢬵却十年五年不出僧堂門無人道你不會古來尊宿擔荷此事大不容易不知歷涉多少艱難汾陽參七十餘員善知識具大眼目只有一二自餘之輩不在言也近來一等兄弟智識不明於自己本分事上無參學分不能體究却去冊子上做工夫要資談柄錯了也拋却真金去尋瓦礫有甚用處夾山未見船子時看他所得豈是尋常一日上堂僧問如何是法身答云法身無相如何是法眼答云法眼無瑕可謂金不博金水不洗水洎乎被道吾一笑便乃手忙腳亂且道那裏是他未盡善處下座問道吾云適來答者僧話上座因甚發笑請為我說瞻風撥草為法求人須是者漢始得道吾云不道不是只是未有師在盲人指路豈免旁觀夾山因道吾所指徑往華亭去訪船子早是七花八裂了也船子問云大德住何寺山云寺則不住住則不似鷺池鷲嶺海殿庵園甚處有者箇消息船云不似又不似箇甚麼山云不是目前法船云甚處學得來山云非耳目之所能到如印印泥如印印空如印印水須是恁麼人方明恁麼事船云一句合頭語萬劫繫驢橛鐵壁銀山萬仞高船云垂絲千尺意在深潭離鈎三寸子何不道金剛圈栗棘蓬吞者十萬八千透者如麻似粟山擬開口被船子一篙打下水中鞭長不及馬腹山才上船船云道道山擬開口船又打得也得也山因此有省水中點頭三下俊哉俊哉船云竿頭絲線從君弄不犯清波意自殊寧可截舌不犯國諱山遂問拋綸擲釣師意如何船云絲懸緑水浮定有無之意一箇砑郎當一箇福建子山云語帶玄而無路舌頭談而不談何不領取前話船云釣盡江波錦鱗始遇用盡自己心笑破他人口山乃掩耳不特慎初亦能護末然猛虎不食伏肉坐井豈能觀天當時道吾密之三寸夾山未免擔板過却大凡參學須貴眼正者般說話豈是你長連床上妄想計較得來山僧十三上為僧未嘗去村院裏過夏遇著本色宗匠有師友處即便放下身心相與體究二十年來把人杓柄不知費了多少鹽醋捱到楚水東頭依舊波波挈挈一點也謾諸人不得雲門云盡十方世界乾坤大地以拄杖畫一畫云百雜碎了也三乘十二分教達磨西來放過即不可若不放過不消一喝大衆會麼名不得狀還非千年常住一朝僧楚雞不是丹山鳳喝一喝下座告香不獨在夏前中夏住持入院人事定庫司備香首座頷衆懇請為衆告香然後開室古法未預告香不許入室檀越特請普說大慧杲禪師秦國太夫人請普說僧問圓覺經道譬如清淨摩尼寶珠映於五色色未現時珠在甚麼處師云圓覺經何曾恁麼道進云未審作麼生會師云圓覺經不曾恁麼道更會甚麼進云畢竟如何師云靜處薩婆訶問胡張三黑李四即不問嘉州大象鼻孔長多少師云長二百來丈進云得恁麼郎當師云你川僧自合知進云為甚麼被陝府鐵牛吞却師云誰恁麼道進云高高處觀之不足低低處平之有餘師云你試向不高不低處道看進云險師云者箇猶是高低處底進云有意氣時添意氣師云草賊大敗乃云今日是秦國太夫人計氏法真慶誕之辰謹施淨財遠詣當山修設清淨禪衆香齊仍命山野升于此座為衆普說舉揚般若所願進道無魔色身安樂此是秦國太夫人意旨者婆子平生行履處川僧無有不知者唯魯子僧未知今日因齊慶讚舉似大衆見說者婆子三十左右歲時先太師捐館徽猷與相公尚幼卓卓立身凜然有不可犯之色東鄰西舍望風知畏極力教二子讀書處事極有家法尋常徽猷與相公左右侍奉不教坐亦不敢坐其嚴毅如此相公常說今日做官皆是老母平昔教育所致所得俸資除逐日家常菜飯外老母盡將布施齊僧用祝吾君之壽常有無功受祿之慊聞先師歸蜀受渠供養不少只是未知參禪徽猷與相公却於先師處各有發明向謙禪在他家徽猷與相公親向謙道老母修行四十年只缺者一著公久侍徑山和尚多所聞見且留公早晚相伴說話蓋某兄弟子母分上難為開口見說每日與謙相聚手一味激揚此事一日問謙徑山和尚尋常如何為人謙云和尚只教人看狗子無佛性話竹篦子話只是不得下語不得思量不得向舉起處會不得去開口處承當狗子還有佛性也無無只恁麼教人看渠遂諦信日夜體究每常愛看經禮佛謙云和尚尋常道要辦此事須是輟去看經禮佛誦呪之類且息心參究莫使工夫間斷若一向執著看經禮佛希求功德便是障道候一念相應了依舊看經禮佛乃至一香一華一瞻一禮種種作用皆無虗棄盡是佛之妙用亦是把本修行但相聽信決不相誤渠聞謙言便一時放下專專只是坐禪看狗子無佛性話聞去冬忽一夜睡中驚覺乘興起來坐禪舉話驀然有箇歡喜處近日謙歸秦國有親書并作數頌來呈山僧其間一頌云逐日看經文如逢舊識人勿言頻有礙一舉一回新山僧常常為兄弟說參得禪了凡讀看經文字如去自家屋裏行一遭相似又如與舊時相識底人相見一般今秦國此頌乃暗合孫吳你看他是箇女流宛有丈夫之作能了大丈夫之事謙禪昨日上來告山僧子細說些禪病且與秦國結大衆般若緣山僧向他道禪有甚麼病可說禪又不曾患頭疼又不曾患腳痛又不曾患耳聾又不曾患眼暗只是參禪底人參得差別證得差別用心差別依師差別因此差別故說名為病非謂禪有病也如何是佛即心是佛有甚麼病狗子還有佛性也無無有甚麼病喚作竹篦則觸不喚作竹篦則背有甚麼病如何是佛麻三斤有甚麼病如何是佛乾屎橛有甚麼病你不透了才作道理要透便千里萬里沒交涉也擬心湊泊他擬心思量他向舉起處領略擊石火閃電光處會者箇方始是病世醫拱手然究竟不干禪事趙州云要與空王為弟子莫教心病最難醫記得舍利弗問月上女曰汝於今者行何乘也為行聲聞乘為行辟支佛乘為行大乘月上女答曰舍利弗汝既問我行何乘者我今還問舍利弗惟願隨意答我如舍利弗所證法者為行聲聞乘為行辟支佛乘為行大乘舍利弗言非也月上女所以者何然彼法者無可分別亦無言說非別非一亦非衆多月上女曰舍利弗是故不應分別諸法一相異相無別異相於諸相中無有可住師云舍利弗恁麼問月上女恁麼答且道與秦國太夫人所證之法相去幾何還有人斷得麼試出來斷看如無且向葛藤裏薦取所以道夫參學者須參活句莫參死句活句下薦得永劫不忘死句下薦得自救不了你諸人每日上來下去寮舍裏喫茶喫湯莊上搬鹽搬麵僧堂裏行益長廊下擇菜後園裏擔糞磨坊下推磨當恁麼時佛眼也你不見且道是死句是活句是不死不活句試定當看直饒定當得出也未免在三句裏豈不見僧問南泉和尚即心是佛又不得非心非佛又不得師意如何泉云你但信即心是佛便了更說甚麼得與不得只如大德喫飯了從東廊上西廊下不可總問人得與不得也者裏若識得南泉方不被三句所使便能使得三句既使得三句始與南泉同一眼見同一耳聞同一鼻嗅同一舌嘗同一身觸同一意思更無差別只為你執藥為病舊病未除新病復作却被死句活句使得來七顛八倒將他古人徑截處一時紆曲了且那箇是古人徑截處我更為你舉一兩則只如南泉道牽牛向溪東放不免食他國王水草牽牛向溪西放不免食他國王水草不如隨分納些些總不見得者箇公案有多少人錯斷如何是納些些底道理便道著衣喫飯有甚麼難向驢前馬後教活計且莫謗他南泉好你既錯會者箇定又錯會黃檗道汝等諸人盡是噇酒糟漢恁麼行腳何處有今日還知大唐國裏無禪師麼時有僧出云只如諸方匡徒領衆又作麼生檗云不道無禪只是無師者箇話頭便是箇禍胎莫道未悟者錯會直饒悟得徹頭徹尾大法不明也他黃檗不見只如黃檗道不道無禪只是無師你如何理會衆中商量道人人分上誰不丈夫豈假師承噇酒糟便是咬言語言語乃古人糟粕也且喜沒交涉欲得不招無間業莫謗如來正法輪豈不見溈山舉此話問仰山云黃檗意作麼生仰山云鵝王擇乳素非鴨類溈山云此實難辨只如溈山仰山恁麼問答又作麼生商量到者裏須是箇人始得既不會者箇便將庭前柏樹子麻三斤乾屎橛踞解稱鎚之類盡為糟粕既錯會者箇定又錯會洞山問蟾首座佛真法身猶若虗空應物現形如水中月作麼生說箇應底道理蟾云如驢井山云道則大殺道只道得八成蟾云和尚作麼生山云如井覷驢諸方商量道如驢覷井是有迹如井驢是無迹又喚作忘情拂迹且喜沒交涉要且不是者箇道理既錯會者箇定又錯會南嶽和尚道譬牛駕車車若不行打車即是打牛即是馬祖聞舉忽然大悟而今禪和家理會道牛喻心車喻法但只明心法自明矣但只打牛車自行矣且喜沒交涉若恁麼馬祖驢年也不能得悟去者老漢始初將謂佛可以坐得成禪可以坐得悟一向坐地等南嶽和尚知其不凡故將甎去他庵前磨祖云和尚磨甎作甚麼南嶽云磨作鏡祖云磨甎豈得成鏡南嶽云磨甎既不成鏡坐禪豈得成佛馬祖被他動一動心中熱忙便問如何即是只者裏鼻孔索頭便在南嶽和尚手裏了也所以道欲識佛性義當觀時節因緣南嶽和尚知他時節已至即向他道汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理一時籍沒了他家計却更要他納物事教他無所從出始肯捨命討箇死處命既捨了便解問如何用心即合無相三昧南嶽云汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道又問道非色相云何能見南嶽云心地法眼能見乎道無相三昧亦復然矣祖云有成壞否南嶽云若以成壞聚散而見道者非也馬祖於是泮然無疑所謂不入虎穴不得虎子悟了若不遇人十箇有五雙杜撰決定為人不得諸人要識悟了遇人者麼只者馬祖便是樣子也馬祖既得法直往江西建立宗旨一日南嶽和尚曰道一在江西說法總不見持箇消息來遂囑一僧云汝去待他上堂便問作麼生看他道甚麼記取來其僧依教去見上堂便出問作麼生祖云自從胡亂後三十年不曾少鹽醬師召大衆云祖師門下穿人鼻孔底盡從者一句子來你道者一句子從甚麼處來從打牛打車處來你若會得者箇便會得臺山路上婆子每有僧問臺山路向甚麼處去婆云驀直去僧才行婆云好箇阿師却恁麼去趙州聞得云待我去勘過者婆子趙州去見婆子亦如是問婆子亦如是答歸來謂衆云臺山路上婆子被老僧勘破了也諸人還會麼寰中天子勑塞外將軍令但恁麼看取山僧昔年理會不得曾請益一杜撰長老為山僧注解云者僧才問臺山路向甚麼處去便被婆子勘破了也婆云驀直去僧便行正是隨聲逐色如何不被勘破又道才開口便勘破了也今日思量直是叵耐山僧為你說破若會得趙州道臺山路上婆子被老僧勘破了也便會婆子道好箇阿師却恁麼去山僧嘗頌云天下禪和說勘破爭知趙州已話墮引得兒孫不丈夫人人黠過冷地臥此頌甚分明切不得錯會既錯會者箇定又錯會睦州喚僧大德僧回首州云擔板漢曾有箇禪頭舉者話問僧你作麼生會才見僧開口便云果然擔版且喜沒交涉雪竇拈云睦州只具一隻眼者僧喚既回頭因甚却成擔版晦堂云雪竇亦只具一隻眼者僧一喚便回為甚不成擔版者兩箇老漢可與睦州把手共行若是箇靈利漢才聞舉著眼似銅鈴終不向者裏打之繞既不會者箇定又錯會百丈野狐話便道不落也是不昧也是只是當時答此話不合帶疑所以墮野狐謂野狐性多疑故且喜沒交涉既錯會者箇定又錯會祖師云不是風動不是幡動仁者心動山僧亦曾請益一箇長老意旨如何長老將衫袖搖作風動勢云是甚麼苦哉苦哉慚惶殺人鈍置殺人有者道不是風動不是幡動定是心動山僧尋常問學者不是風動不是幡動不是心動作麼生者裏豈容眨眼既錯會者箇定又錯會文殊是七佛之師為甚麼出女子定不得罔明菩薩為甚麼出得女子定衆中商量道杓柄在女子手裏且喜沒交涉既錯會者箇定又錯會雪峯道望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也如今諸方商量道作麼生是望州亭相見處便道南頭買賤北頭賣貴烏石嶺相見意旨如何便道石頭大底大小底小僧堂前相見又作麼生便道歸堂喫茶去且喜沒交涉自餘邪解不可勝數山僧尋常亦問學者望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也作麼生者箇便是金剛圈栗棘蓬你如何吞如何透你要識能吞能透者麼豈不見保福問鵝湖僧堂前且置望州亭烏石嶺甚麼處相見鵝湖驟步歸方丈保福便入僧堂汾陽和尚頌曰望州烏石與堂前相見相知幾萬千唯有鵝湖并保福此時相見解推遷此頌分明為你說了也既不會者箇定又錯會玄沙道諸方總道接物利生或遇三種病人來合作麼生接患盲者拈鎚豎拂他又不見患聾者語言三昧他又不聞患啞者教伊說又說不得若接此人不得佛法無靈驗師顧視大衆云要識玄沙麼平生心膽向人傾相識還如不相識當時地藏和尚在座下便出來道某甲有口不啞有眼不盲有耳不聾和尚作麼生接師云非父不生其子玄沙呵呵大笑師云笑裏有刀山僧有時舉此話問學者有來依樣畫葫蘆也道某甲有口有耳有眼和尚作麼生接山僧向他道咬人屎橛不是好狗又却去不得既錯會者箇定又錯會香嚴道如人上樹口銜樹枝手不攀枝腳不踏樹樹下有人問西來意不對則違他所問若對又喪身失命師云好與玄沙一坑埋却山僧昔年曾請益一箇尊宿未審香嚴意旨如何遂以拂子柄銜在口中緊閉却眼便作銜樹枝勢搖手擺腳祗對山僧師乃彈指云如此者亦是當年馳聲走譽底尚作者般去就其餘作怪不在言也你要會麼但只作一句看我先為你說莫見道作一句看便向舉起處會舉了便會了且不是者箇道理是甚麼道理如人上樹口銜樹枝手不攀枝腳不踏樹樹下有人問西來意不對則違他所問若對又喪身失命如何者裏間不容髮當時香嚴會中只有箇虎頭上座領得香嚴意便出來為香嚴出氣云上樹即不問未上樹請和尚道師云雖得一場榮刖却一雙足香嚴呵呵大笑師云鐵作面皮又云回天輪轉地軸後來雪竇拈云樹上道即易樹下道即難老僧上樹也致將一問來雪竇雖為虎頭上座出氣爭奈蹉過香嚴今時有般謬漢聞雪竇恁麼道便引洞山語云但能莫觸當今諱也勝前朝斷舌才謂香嚴立此箇問頭喻如一團火相似不可觸雖然如此不可斷却言句有問如何是佛麻三斤如何是祖師西來意庭前柏樹子又且何妨你不妨會得好不見汾陽和尚頌曰香嚴銜樹示多人要引同袍達本真師云依實供通擬議却從言下覓喪身失命數如塵師云不是苦心人不知汾陽為你開天路雲散長空月色新師云閒言語雖然如是若向者裏提得一生參學事畢既提不得定又錯會百丈問溈山五峯雲巖云併却咽喉脣吻作麼生道溈山云却請和尚道百丈云我不辭向汝道恐已後喪我兒孫五峯云和尚也須併却百丈云無人處斫額望汝雲巖云和尚有也未百丈云喪我兒孫衆中商量道百丈大似抱贓叫屈掩耳偷鈴三子恁麼祗對大家走入荒草裏且喜沒交涉向你道此事決定不在言語上既不在言語上當恁麼時合作麼生我早是與你說了也既錯會者箇定又錯會德山道今夜不答話問話者三十棒時有僧出禮拜德山便打僧云某甲話也未問為甚打某甲山云你是甚處人僧云新羅人山云未踏船舷好與三十棒後來法眼云大小德山話作兩橛圓明云大小德山龍頭蛇尾雪竇拈云二老宿雖善裁長補短捨重從輕要見德山亦未可何故德山大似握閫外威權有當斷不斷不招其亂底劍要識新羅僧麼只是撞著露柱底箇瞎漢衆中商量道某甲話也未問便好打德山不打却問你是甚處人者裏便是話作兩橛龍頭蛇尾處且喜沒交涉又道者僧若是作家才見他問你是甚處人便好掀倒禪床他既不能却被德山道未踏船舷好與三十棒者裏是當斷不斷不招其亂底劍所以雪竇云要識新羅僧麼只是撞著露柱底箇瞎漢且喜沒交涉禪若是恁麼地會得時更不消悟也聰明靈利底一時隨語生解解注將去便了我且問你恁麼解注得一時有下落了生死到來却如何支遣而今分明向你道者些閒言長語便是出生死底徑路你莫去徑路上栽荊棘掘屎窖或若有箇衲僧出來道和尚現在者裏栽荊棘掘屎窖也不是却作麼生祗對山僧有箇推托處且如何推托聽取一偈女流中有大丈夫示現其身化其類以戒定慧解脫法攝彼貪欲嗔恚癡雖處於中作佛事如風行空無所依過去未來及現在塵沙諸佛及菩薩異口同音發是言善哉奇特世希有心源清淨無憂喜不作無喜無憂想逢場作戲隨世緣而於世緣無所著六月火雲燒碧空雷聲忽震三千界銷除熱惱獲清涼是彼丈夫誕時節我說此偈助光明普施法界諸女人喝一喝
