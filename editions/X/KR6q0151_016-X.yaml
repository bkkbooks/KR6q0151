body:
  text: 武林十八㵎理安禪寺住持婁東行悅集檀越特請普說大慧杲禪師錢計議請普說師云法不可見聞覺知若行見聞覺知是則見聞覺知非求法也既離見聞覺知外却喚甚麼作法到者裏如人飲水冷煖自知除非親證親悟方可見得若實曾證悟底人拈起一絲毫頭盡大地一時明得今時不但禪和子便是士大夫聰明靈利博極群書底人箇箇有兩般病若不著意便是忘懷忘懷則墮在黑山下鬼窟裏教中謂之昏沉著意則心識紛飛一念續一念前念未止後念相續教中謂之掉舉不知有人人脚跟下不沉不掉底一段大事因緣如天普葢似地普擎未有世界早有此段大事因緣世界壞時此段大事因緣不曾動著一絲毫頭往往士大夫多是掉舉而今諸方有一般默照邪禪見士大夫為塵勞所障方寸不寧怗便教他寒灰枯木去一條白練去古廟香爐去冷湫湫地去將者箇休歇人你道還休歇得麼殊不知者箇猢猻子不死如何休歇得來為先鋒去為殿後底不死如何休歇得此風往年福建路極盛妙喜紹興初入閩住庵時便力排之謂之斷佛慧命千佛出世不通懺悔彼中有箇士人鄭尚明極聰明教乘也理會得道藏也理會得儒教則故是也一日持一片香來妙喜室中怒氣可掬聲色俱厲曰昂有一片香未燒在欲與和尚理會一件事只如默然無言是法門中第一等休歇處和尚肆意詆訶昂心疑和尚不到者田地所以信不及且如釋迦老子在摩竭提國三七日中掩室不作聲豈不是佛默然毗耶離城三十二菩薩各說不二法門末後維摩詰無語文殊讚善豈不是菩薩默然須菩提在巖中宴坐無言無說豈不是聲聞默然天帝釋見須菩提在巖中宴坐乃雨華供養亦無言說豈不是凡夫默然達磨游梁歷魏少林冷坐九年豈不是祖師默然魯祖見僧便面壁豈不是宗師默然和尚因甚麼却力排默照以為邪非妙喜曰尚明你問得我也是待我與你說我若說不行却燒一炷香禮你三拜我若說得行却受你燒香禮拜我也不與你說釋迦老子及先德言句我即就你屋裏說所謂借婆帔子拜婆年乃問你曾讀莊子麼曰是何不讀妙喜曰莊子云言而足終日言而盡道言而不足終日言而盡物道物之極言默不足以載非言非默義所有極我也不曾看郭象解并諸家解註只據我杜撰說破你者默然豈不見孔夫子一日大驚小怪曰參乎吾道一以貫之曾子曰唯你措大家纔聞箇唯字便來者裏惡口却云者一唯與天地同根萬物一體致君於堯舜之上成家立國出將入相以至啟手足時不出者一唯且喜沒交涉殊不知者箇道理便是曾子言而足孔子言而足其徒不會却問曰何謂也曾子見他理會不得却向第二頭答他話謂夫子之道不可無言所以云夫子之道忠恕而已矣要之道與物至極處不在言語上不在默然處言也載不得默也載不得公之所說尚不契莊子意何況要契釋迦老子達磨大師意耶你要理會得莊子非言非默義有所極麼便是雲門大師拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似傾盆你若會得雲門者箇說話便是莊子說底曾子說底孔子說底一般渠遂不作聲妙喜曰你雖不語心未伏在然古人決定不在默然處坐地明矣你適來舉釋迦掩室維摩默然且看舊時有箇座主喚作肇法師把那無言說處說出來與人云釋迦掩室於摩竭淨名杜口於毗耶須菩提唱無說以顯道釋梵絕聽而雨華斯皆理為神御故口以之而默豈曰無辯辯所不能言也者箇是理與神忽然相撞著不覺到說不得處雖然不語其聲如雷故云豈曰無辯葢辯所不能言也者裏世間聰明辯才用一點不得到得恁麼田地方始是放身捨命處者般境界須是當人自證自悟始得所以華嚴經云如來宮殿無有邊自然覺者處其中此是從上諸聖大解脫法門無邊無量無得無失無默無語無去無來塵塵爾剎剎爾念念爾法法爾只為眾生根性狹劣不到三教聖人境界所以分彼分此殊不知境界如此廣大却向黑山下鬼窟裏默然坐地故先聖訶為解脫深坑是可怖畏之處以神通道眼觀之則是刀山劍樹鑊湯爐炭裏坐地一般座主家尚不滯在默然處況祖師門下客却道纔開口便落今時且喜沒交涉尚明不覺作禮妙喜曰公雖作禮然更有事在至晚間來入室乃問他今年幾歲曰六十四又問你六十四年前從甚麼處來渠開口不得被我將竹篦劈脊打出去次日又來室中曰六十四年前尚未有昂在如何和尚却問昂從甚麼處來妙喜曰你六十四年前不可元在福州鄭家只今者聽法說法一段歷歷孤明底未生已前畢竟在甚麼處曰不知妙喜曰你若不知便是生大今生且限百歲百歲後你待飛出三千大千世界外去須是與他入棺材始得當爾之時四大五蘊一時解散有眼不見物有耳不聞聲有箇肉團心分別不行有箇身火燒刀斫都不覺痛到者裏歷歷孤明底却向甚麼處去曰昂也不知妙喜曰你既不知便是死大故曰無常迅速生死事大便是者箇道理者裏使聰明也不得記持也不得我更問你平生做許多之乎者也臘月三十日將那一句敵他生死須是知得生來死去處分曉始得若不知即是愚人渠方心伏從此遂救他不坐在無言無說處肯來者下做工夫今日一會同此聽法須知人人有此一段大事因緣亘古亘今不變不動也不著忘懷也不著著意但自時時提撕妄念起時亦不得將心止遏止動歸止止更彌動只就動止處看箇話頭便是釋迦老子達磨大師出來也只是者箇僧問趙州狗子還有佛性也無州云無你措大家多愛穿鑿說道者箇不是有無之無乃是真無之無不屬世間虗豁之無恁麼說時還敵得他生死也無既敵他生死不得則未是在既然未是須是行也提撕坐也提撕喜怒哀樂時應用酬酢時總是提撕時節提撕來提撕去沒滋味心頭恰如頓一團熱鐵相似那時便是好處不得放捨忽然心華發明照十方剎便能於一毛端現寶王剎坐微塵裏轉大法輪汝等諸人聞恁麼說話往往心裏道妙喜老漢搖脣鼓舌說得也相似不知他肚裏如何須知妙喜說得底便是行得底更無兩般所以西天第十三祖迦毗摩羅尊者欲求一弟子繼紹祖位謂深山窮谷中必有高人居止因往求之故知非但弟子求師切師求弟子亦切遂入山果見一人出迎曰深山孤寂龍蠎所居大德至尊何枉神足祖曰吾非至尊來訪賢者彼默念曰此師得決定性明道眼否是大聖繼真乘否祖曰汝雖心語吾已意知但辦出家何慮吾之不聖彼聞已悔謝於是投祖出家即第十四祖龍樹是也今時學道者多不自疑却疑他人所以道大疑之下必有大悟且道悟得箇甚麼良久云我不敢輕於汝等汝等皆當作佛下座禮侍者斷七請普說僧問和尚室中道喚作竹篦則觸不喚作竹篦則背不得下語不得無語遂以坐具打地一下云學人為蛇畫足却請和尚頭上安頭師云自起自倒得人憎進云也要和尚相委悉師云切忌裏動指頭進云還有為人處也無師云無進云却較些子師云換却你眼睛乃云喚作竹篦則觸不喚作竹篦則背不得下語不得無語不得思量不得擬議當恁麼時釋迦老子達磨大師雖有鼻孔直是無出氣處還委悉麼遇貴則賤遇賤則貴若向貴賤處著到更須買草鞵行脚始得所以道不可以有心求不可以無心得不可以語言造不可以寂默通雖然如是如天普葢似地普擎全放全收全殺全活妙喜恁麼道也不離者箇消息正如適來禪客以坐具打地一般乃拍禪床一下云且道明甚麼邊事斯辰比丘了賢為近禮侍者將俗家寄來衣物估唱請老漢舉揚宗旨莊嚴報地可惜者兄弟方始於竹篦子話有箇發明處而今已是說前年話一日問他喚作竹篦則觸不喚作竹篦則背如何渠答不得却曰望和尚為某作箇方便指示山僧向他道你是福州人我說箇喻子向你如將名品茘枝和皮殻一時剝了以手送在你口邊只是你不解吞渠聞之不覺失笑曰和尚吞著即禍事過得幾時又問他前日吞了底荔枝只是你不知滋味渠曰若知滋味轉見禍事我愛他者兩轉語所謂從門入者不是家珍信知宗師家無實法與人且如世間工巧技藝有樣子便做得若是者一解須是自悟始得得之於心應之於手若未得箇安樂處一向求知見覔解會者般雜毒纔入心如油入永取不出縱取得出亦費料理此事如青天白日元無障礙却被者些雜毒障却所以於法不得自在老漢常愛真淨和尚道如今人多是得箇身心寂滅前後際斷休去歇去一念萬年去似古廟裏香爐去冷湫湫地去便為究竟殊不知却被比勝妙境界障蔽自己正知見不能現前神通光明不能發露或又執箇一切平常心是道以為極則天是天地是地山是山水是水僧是僧俗是俗大盡三十日小盡二十九凡百施為須要平常一路子以為穩當定將去合將去更不敢別移一步怕墮坑落塹長時一似雙盲人行路一條拄杖子寸步拋不得緊把著憑將去步步依倚一日若道眼豁開頓覺前非拋却杖子撒開兩手十方蕩蕩七縱八橫東西南北無可不可到者裏方得自在如今人能有幾箇放得杖撒得手昔因真淨和尚新開語錄其時我老和尚在五祖堂中作首座五祖一日廊下見僧把一冊文字祖曰你手中是甚文字僧曰是真淨和尚語錄祖遂取讀即讚歎曰慚愧末世中有恁地尊宿乃喚首座我老和尚時在後架洗韈聞呼狠忙走出來祖曰我得一本文字不可思議所謂善說法要你試看休去歇去一念萬年前後際斷諸方如今有幾箇得到者田地他却喚作勝妙境𢌿舊時寶峯有箇廣道者便是者般人一箇渾身都不理會都不見有世間事世間塵勞昧他不得雖然恁麼却被者勝妙境界障却道眼須知到一念不生前後際斷處正要尊宿如水潦和尚因採藤次問馬祖曰如何是祖師西來意祖曰近前來向你道水潦纔近前馬祖當胷一蹋蹋倒水潦忽然大悟不覺起來呵呵大笑祖曰你見箇甚麼道理潦曰百千法門無量妙義只向一毛頭上便識得根源去者箇教中謂之入流亡所所入既寂動靜二相了然不生纔得箇入處便亡了定相定相既亡不墮有為不墮無為動靜二相了然不生便是觀音入理之門他既悟了便打開自己庫藏運出自己家珍乃曰百千法門無量妙義只向一毛頭上便識得根源去又呵呵大笑馬祖知他已到者箇田地更不采他亦無後語後來住水潦庵禪和家來參他有百十眾纔舉揚便賣弄者一蹋云自從一喫馬師蹋直至而今笑不休渠又何曾有峯巒疊翠㵎水潺湲岸柳含煙庭華笑日鸎啼喬木蝶舞芳叢底說話來只道自從一喫馬師蹋直至而今笑不休者箇便是第一箇入流亡所動靜二相了然不生底樣子又不見雲門問洞山近離甚處山曰查渡門曰夏在甚處山曰湖南報慈門曰幾時離彼山曰八月二十五門曰放你三頓棒古人淳樸據實祇對自言我此回實從查渡來有甚麼過便道放我三頓棒大丈夫漢須共者老漢理會始得至明日便去問曰昨日蒙和尚放三頓棒未審過在甚麼處門曰飯袋子江西湖南便恁麼去洞山忽然大悟更無消息可通亦無道理可拈出只禮拜而已既悟了便打開自己庫藏運出自己家珍乃曰他後向無人煙處住箇草庵不蓄一粒米不種一莖菜接待十方往來盡與伊出却釘拔却楔拈却炙脂帽子脫却鶻臭布衫教伊灑灑地作箇衲僧豈不俊哉雲門曰你身如椰子大開得許大口者箇是第二箇入流亡所動靜二相了然不生底樣子又鼓山晏國師在雪峯多年一日雪峯知其緣熟忽起搊住曰是甚麼晏釋然了悟唯舉手搖曳而已峯曰子作道理耶晏曰何道理之有後來楊大年收在傳燈錄中謂之亡其了心此是第三箇入流亡所動靜二相了然不生底樣子又灌谿和尚一日見臨濟濟下繩床纔擒住谿便云領領者箇是第四箇入流亡所動靜二相了然不生底樣子者箇說似人不得傳授人不得老漢十七年參也曾零零碎碎悟來雲門下也理會得些子曹洞下也理會得些子只是不能得前後際斷後來在京師天寧見老和尚陞堂舉僧問雲門如何是諸佛出身處門曰東山水上行若是天寧即不然如何是諸佛出身處薰風自南來殿閣生微涼向者裏忽然前後際斷譬如一綟亂絲將刀一截截斷相似當時通身汗出雖然動相不生却坐在淨倮倮處得一日去入室老和尚曰也不易你到者箇田地可惜你死了不能活不疑言句是為大病不見道懸崖撒手自肯承當絕後再甦欺君不得須信有者箇道理老漢自言我只據如今得處已是快活更不能理會得也老和尚却令我在擇木寮作不𣯛務侍者每日同士大夫須得三四回入室只舉有句無句如藤倚樹纔開口便道不是如是半年間只管參一日同諸官員在方丈藥石次我只把箸在手都忘了喫食老和尚曰者漢參得黃楊木禪却倒縮去我遂說箇譬喻曰和尚者箇道理恰如狗看著熱油鐺相似要䑛又䑛不得要捨又捨不得老和尚曰你喻得極好只者箇便是金剛圈栗棘蓬一日因問老和尚見說和尚當時在五祖曾問者箇話不知五祖和尚如何答和尚不肯說老漢曰和尚當時不可獨自問須對大眾前問如今說又何妨老和尚乃曰我問有句無句如藤倚樹時如何祖曰描也描不成畫也畫不就又問忽遇樹倒藤枯時如何祖曰相隨來也老漢纔聞舉便理會得乃曰某會也老和尚曰只恐你透公案未得老漢曰請和尚舉老和尚遂連舉一絡索誵訛公案被我三轉兩轉截斷如箇大平無事時得路便行更無滯礙老和尚曰如今方知道我不謾你我既會了却倒疑著幾箇禪頭乃問老和尚老和尚曰我箇禪如大海相似是你將得箇大海來傾取去始得若只將得鉢盂來盛得些子去便休是你器量只如此教我怎柰何能有幾箇得到你田地舊時只有一箇璟上座與你一般只是死了過得幾時便舉我立僧後來在雲居首座寮夜間常與兄弟入室老和尚愛來聽有時入室了却上方丈見老和尚同在火爐頭坐老和尚曰或有箇禪和子得似老僧你又如何支遣老漢曰何幸如之正如東坡說作劊子得一箇肥漢剮我却倒與老和尚入室被我拶得上壁老和尚呵呵大笑思量者老和尚粉骨碎身亦未能報得因禮上座聞老漢舉福州人喫茘枝有箇瞥地處所以說到者裏者兄弟在叢林中規行矩步無衲子之過可惜尺頭短然打箇筋斗出來決定昧他不得有一則古話舉似大眾教中道吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝後來湛堂和尚頌曰老胡徹底老婆心為阿難陀意轉深韓幹馬嘶青草渡戴嵩牛臥綠楊陰妙喜亦有箇頌子雖不甚文彩却不在湛堂之下荒田無人耕耕著有人爭無風荷葉動決定有魚行念誦提綱圓悟勤禪師看藏經上堂祥煙繚繞瑞氣氤氳公案現成有誰扣擊乃云塵中大經卷莫測津涯聰慧淨眼人始能拈出直得義天性海若帝網交羅智照神光如洪爐猛𦦨今日幸遇皇風蕩蕩帝道平平有大心檀越為汝發機使諸人各各八字打開直得霞絛展處玉牒舒時文彩已彰各宜薦取且不落文墨一句作麼生道一堂風冷淡千古意分明祖師會上堂千聖頂𩕳上可容剎海衲僧命脉中不許真機更通一線路以佛現祖從祖證佛印印無差機機圓證靈山拈花示眾建立此箇宗風金色頭陀曾承妙旨以至西天四七此土二三自曹溪散席已來數百年間列剎相望各各握靈蛇珠人人抱荊山璧有照有用有權有實提振向上宗風傳持正法眼藏要且百川異流同歸大海千重百帀無出一源所以道西天二十八祖也恁麼唐土六祖也恁麼天下列剎相望諸老宿也恁麼山僧也恁麼且道恁麼事作麼生商量還提掇得出麼還緇素得明麼山僧不惜兩莖眉毛與諸人點破遂拈拄杖云還見麼三世諸佛歷代祖師天下老和尚盡在拄杖頭上放大光明現權現實現機現境列五位君臣開三玄宗要機境相投箭鋒相拄一字三句同源圓相境致殊別若也於此委悉百草頭上罷却平生事根株亦不留聞清聲外句莫向句中求儻或未然山僧不免又拖泥涉水也達磨不來東土二祖不往西天人人壁立萬仞箇箇常光現前卓拄杖一下下座蓮華會上堂毗婆尸已前千華現瑞天中天正地優曇呈祥直得徧界不曾藏通身無影像現大蓮華王周帀千華座一葉一釋迦一鬚一彌勒塵塵爾剎剎爾處處爾念念爾一塵舉大地收一華開世界起可謂殊勝中最殊勝奇特中倍奇特感慈塔前凝瑞氣羅漢洞邊顯真容法會儼然人天普集到者裏合談何事說玄說妙得麼說佛說祖得麼舉古舉今得麼顯作顯用得麼盡是從前已後大宗師拈出了也即今不如總不動著只呈一箇現成公案若也薦得人人心華發明處處照十方剎正當恁麼時推功歸本一句作麼生道還委悉麼萬方有慶歸明聖願見黃河百度清龍門遠禪師檀越還佛頂心經上堂唵齒臨唵齒臨唵部臨唵部臨大眾此是甚麼言語義理如何還有人會得麼若道是言語又不成言語若道有道理又不成道理可謂言詮不到分別不及先聖呼為密語又曰真言一切言音從是而生一切語教從是而出山僧適來看經中得七字陀羅尼能滅千灾成就萬德今對諸人舉此七字陀羅尼一遍諸人諦聽遂默然屈第一指至第七指曰諸人聞得麼恐諸人不聞更舉一遍又默然屈一指至七指曰聞得麼大眾唯佛與佛乃能知之自餘群生悉皆罔措有方便門名曰重說偈言今更載三分明說此七字呪曰佛頂心經齋願了大眾曉得其中旨趣麼待山僧奉為解釋一字字要知落處若論佛祇是當人更無物若論頂晝夜舒光照前境若論心看時無相用時深若論經解語能言不是聲若論齋所為所作盡和諧若論願猶如身在龍門院若論了無慮無疑心皎皎心皎皎增添福壽災殃少論量功德廣難思須彌未大滄溟小山僧適來說者是真言世人只知有言不知有真若不知真所言皆妄何者名為真言能出萬宗故曰真言亦名三昧王亦名萬字頂亦名微妙章句亦名秘密大總持至心受持大有靈驗所謂山僧七字呪也乃屈指曰一二三四五六七諷誦受持皆秘密如人親入寶山中一切珍奇從此出久立東山齊己禪師蓮社會道友請上堂漸漸鷄皮鶴髮父少而子老看看行步躘蹱疑殺木上座直饒金玉滿堂照顧白拈賊豈免衰殘老病正好著精彩任汝千般快樂渠儂合自由無常終是到來歸堂喫茶去唯有徑路修行依舊打之遶但念阿彌陀佛念得不濟事復云噁者條活路已被善導和尚直截指出了也是你諸人朝夕在徑路中往來因甚麼當面錯過阿彌陀佛者裏薦得便可除迷倒障拔猶豫箭截疑惑網斷癡愛河伐心稠林浣心垢濁正心諂曲絕心生死然後轉入那邊擡起脚向佛祖履踐不到處進一步開却口向佛祖言詮不到處說一句喚回善導和尚別求徑路修行其或準前捨父逃走流落他鄉撞東磕西苦哉阿彌陀佛元叟端禪師朝廷看藏經滿散上堂毗盧藏中有大經卷量等三千大千世界書寫三千大千世界中事悉盡無餘今上皇帝以清淨天眼觀此大經卷在一微塵中敦遣使臣頒降御香命天下僧員破此一塵出此經卷普使法界有情知一一塵中有如是經卷一一經卷有如是章句一一章句有如是妙義一一妙義有如是奇特如是殊勝如是廣大如是自在今朝滿散之次仍命山僧升于此座舉揚無上般若表懺上項功德所有種種法門智慧海種種因果德相海種種進修行願海種種教導方便海種種依正究竟海種種互融攝入海不可說不可說種種功德光明海普用回向真如實際莊嚴無上佛果菩提四方銷兵革之憂萬民樂畊桑之業正與麼時八表來朝萬入貢一句作麼生道但見皇風成一片不知何處是封疆楚石琦禪師經會上堂諸供養中法供養最供養即不無如何是法莫道我謾你南無佛陀南無達磨南無僧伽卓拄杖云山河大地草本叢林盡向者裏平等證入未解脫者令得解脫未涅槃者令得涅槃雖在衲僧分上如經蠱毒之家水也不得沾他一滴靠拄杖下座聖旨看藏經上堂百千法門同歸方寸河沙妙德總在心源大福德人修大福德人受是以恒沙剎土莫不稟其威靈草木昆虫亦皆資其化育今則法筵洞啟教藏宏開重重福德門種種壽量海如天普覆如地普擎如日普照如風普吹仲尼云吾禱久矣復舉宋太宗皇帝因入寺問僧云看什麼經僧云仁王護國經帝云既是寡人經因什麼落在卿手裏僧無對後來雪竇代云皇天無親惟德是輔師云若問永祚但以頂戴經云萬歲萬歲看華嚴經上堂東西南北四維上下塵塵剎剎總不離箇華藏世界海有高有下有濶有狹有具有不具有等有不等有清淨有不清淨有短壽有長年且道毗盧遮那如來即今在阿那箇世界中說法又說什麼法為說三乘法為說一乘法為說無上乘法為無所說試道看若道得許你淨佛國土遊戲神通有情無情同證同入若道不得生死海內沉浮施主看楞嚴上堂體理得妙了了常知一種平懷綿綿不漏著衣喫飯葢是尋常見色聞聲猶如聾瞽但可入佛不可入魔透得十種禪關出得五陰區宇處處無非佛事頭頭總是道場酒肆淫坊了無罣礙龍宮虎穴任便經過亦可入魔亦可入佛然後佛魔俱遣凡聖不存不取涅槃不居生死道我大事了畢拄杖不在苕帚柄聊與三十呆庵莊禪師法華會上堂久默斯要不務速說今當說之各宜善聽良久云我不敢輕於汝等汝等皆當作佛箬庵問禪師總督漕撫恭順候吳實宰居士請至淮城文通塔寺啟建華嚴道場請上堂大人境界非大人不知殊勝因緣非殊勝不偶山僧遠離鴛水來至黃淮途中閱歷州郡縣邑江湖河海計程千有餘程閱日十有五日其中無去來相無久暫相無違順相無動靜相所以道觀方知彼去去者不至方又云去去實不去來來實不來又云動靜二相了然不生者裏覰得透便能世出世法交羅動靜去來自在恁麼則山僧既到此間未違丈室未到此間無日不與大總督實翁居士把手共行無日不與現前尊官諸上善友同遊華藏界中事無礙理無礙事理無礙事事無礙所謂大人境界殊勝因緣早從未舉已前一一現成具足既然如是且道即今建立道場重開普光明會又什麼人分上事豁開大地群生眼直得歌謠載道途牧雲門禪師滿華嚴會上堂華嚴法界理事無礙懺罪消災一彩兩賽驀拈拄杖云大眾杜順和尚來也在拄杖頭上口喃喃道懷州牛喫禾益州馬腹脹天下覓醫人炙猪左膊上諸人還見麼若也見未免頭上安頭若不見日用堂堂無葢覆本來同是遮那身水陸陞座提綱應庵華禪師王機宜為弟樞密相公散水陸請陞座師示眾云大人具大見大智得大用升大解脫堂演大解脫義是故留守樞密大資相公雖示世人有去有來極其本體不動不變所以羅籠不肯住呼喚不回頭佛祖不安排至今無處所塵塵剎剎普現威光物物頭頭全彰勝相殊勝中殊勝奇特中奇特他方此界全心淨土人間天上同一真境正當恁麼時且道留守樞密大資相公即今在什麼處手提殺活金剛劍誰敢當頭正眼看悲濟會陞座師召眾云大智洞明體無去住明逾日月寬若太虗天地以此為覆載日月以此為照臨山嶽以此為崔嵬江河以此為流注賢聖以此為威靈凡夫以此為安養陣亡以此為超昇冤讐以此為解脫諸佛以此為示現祖師以此為單傳諸人以此為悲濟光孝以此為方便驀拈拄杖云釋迦老子祇今在山僧拄杖頭上放大光明其光清淨無壞無雜光光相羅前後無別塵塵普入剎剎全彰然後無量為一一為無量大中現小小中現大於一毫端現寶王剎坐微塵裏轉大法輪且道諸人向甚麼處見釋迦老子若向拄杖頭上見未見在若向妙法蓮華中見亦未見在既不如是畢竟向什麼處見釋迦老子以拄杖卓一卓云願今得果成寶王還度如是恒沙眾元叟端禪師朝廷金山作水陸陞座拈香祝聖畢乃云盡不可說不可說微塵數世界是箇金剛正體淨躶躶絕承當盡不可說不可說微塵數世界是箇寶覺真心赤灑灑無空闕如天普葢似地普擎如日普照如風普吹無一時不徧無一處不周無一理不圓無一事不具塵塵剎剎八面玲瓏物物頭頭十方通暢拈一莖草作丈六金身將丈六金身作一莖草腹中現百億閻浮提室內湧三萬二千獅子座七縱八橫千變萬化左之右之無可不可三世諸佛以此正體以此真心座寶蓮華成等正覺津濟四生梯航九有六代祖師以此正體以此真心開甘露門廣度群品啟廸盲聾炳耀癡昧奕世人王帝主以此正體以此真心為生民立極為世開太平基拯黎元於塗炭措天下於盤石大元世界主當今皇帝以此正體以此真心克紹丕圖纘登大寶百億須彌盧百億香水海日月所照風雨所至悉稟威靈咸歸化育乃至此日特頒聖旨敦遣使臣就金山古澤心寺照依梁武皇帝科儀修設天地冥陽水陸大會七晝夜爇種種香然種種燈營種種上妙飲食設種種上妙服御金銀珊瑚真珠瑪瑙種種上妙珍寶而為供養命僧一千五百員披轉三藏五乘十二分秘典真詮權也實也頓也漸也半也滿也偏也圓也交光相羅如寶絲網上以翊衛皇圖下以資培民本徑山臣僧行端與教禪律三宗耆年碩德以此正體以此真心欽奉綸言高陞寶座闡揚諸佛無上奧旨發揮諸佛無上秘傳若幽若顯若聖若凡若飛若潛若動若植普仗良因均霑妙利四方消災沴之虞萬姓樂耕桑之業同濟仁壽共享昇平當此之時理周事徧果滿功圓直下無私一句畢竟如何擎展擊拂子云化行舜日山川外人在堯天雨露中復說偈云執尺量虗空終難究其數持蠡測海水豈解知其源吾君本心體廣大亦如是欲求其邊際畢竟不可得吾君之壽量與此心體同欲求其窮極是亦不可得吾君之福源與此壽量同欲求其窮盡是亦不可得太后皇太子嬪妃諸眷屬心體及福源等無有差別一塵一佛剎一剎一釋迦各現廣長舌共說如上事百千萬億中亦不能及一天人群生類地獄鬼畜等十方諸有情三界眾含識當知此心體本來相如是月江印禪師朝廷金山寺建水陸會陞座如來往昔為眾生修治法海無邊行猶如沛澤清炎暑普滌眾生煩惱熱所以乘大悲願力示現世間為三界大師四生慈父如優曇華時一現爾或於一毫端現寶王剎坐微塵裏轉大法輪或為轉輪聖王王四天下千子圍繞七寶莊嚴壽八萬歲飛行自在所向無礙其國豐樂人民熾盛威德特尊無有為比是皆大悲願力中之所發現所以道大悲願力猶如大海甚深無底大悲願力如大虗空廣大無際大悲願力如大日輪升于虗空大悲願力如須彌山普雨眾寶大悲願力如如意珠滿眾生願大悲願力如世明燈普照一切大悲願力猶如空葢普蔭群生我佛如來以大悲心而為體因於眾生所起大悲因於大悲生菩提心因菩提心成等正覺譬如曠野之中有大樹王根若得水枝葉花果悉皆繁茂菩提樹王亦復如是一切眾生而為樹根諸佛菩薩而為花果若諸菩薩以大悲水饒益眾生則能成就諸佛智慧花果若諸菩薩以大悲心饒益眾生則能成就阿耨菩提是故菩提屬於眾生若無眾生一切菩薩終不能成無上正覺故我大元佛心聖人與釋迦如來轉輪聖王同一根本同一枝葉亦乘大悲願力示現世間作大國王為世界主允文允武克哲克明扆法永垂視四海眾生如赤子金輪統御攝十方剎土為一家具十地菩薩之身心超四輪王之壽量萬機之暇留心佛法以正法治民故佛教倍前光明熾盛以大悲心饒益眾生開甘露門廣度群品由是於楊子江建金山萬僧之海會修水陸無礙之大齋披閱五千四十八卷之尊經講演禪教直指難思之妙法以百億日月而為燈燭使一切眾生得證光明三昧門故以百億須彌而為香饌使一切眾生悉皆飽滿得證法喜禪悅樂故以百億香水海而為醍醐酥酪使一切眾生頓息饑虗得入如來清淨法海故以百億四天下七寶而為布施使一切眾生永離貧苦皆得如意富樂故以過現未來百千萬億恒河沙微塵數諸佛菩薩而為眷屬使一切眾生得依怙善知識故以三千大千世界而為經卷使一切眾生常轉如是經故上窮有頂下極空輪若幽若顯咸脫於苦輪曰天曰人皆承其恩力莫不皆從佛心聖主清淨微妙大悲願力中之所流出上合諸佛本妙覺心下與一切眾生同一悲仰以此祝聖壽壽如妙高不動之山以此延聖福福等華藏甚深之海以此治國家則民康物阜以此平天下則海晏河清百億劫之罕逢十方國之希有何異釋迦出世彌勒降生恒河沙界盡入提封九十六種咸歸正化巍巍乎蕩蕩乎不可得而稱量不可得而思議只今君臣慶會佛法光輝知恩報恩作麼生道兩輪日月無私照一統乾坤樂太平復舉梁武帝夢神僧告曰六道四生幽囚者眾何不建水陸大齋而濟拔之帝既寤詔十大高僧披尋大藏撰成儀文始於金山建此大會於初夜分悉停燈燭帝親臨筵禱曰若此儀文理協聖凡願我拜起燈燭自明如未得聖意燭暗如故帝一拜燈燭皆明二拜宮殿震動三拜天雨寶花當時靈異不可勝數至於歷代修建顯驗尤多當今佛心天子以梁武之心為心特降御香七寶練段修設齋供建此大會宰相百官光臨法會諸山碩德共闡玄音凡聖混融人天交接直得娑竭羅龍王從海涌出親獻寶珠天帝釋空中雨花殷勤贊嘆上來臣僧升於寶座舉唱宗乘所萃鴻因端為祝延天筭復成一偈堯眉八采輝寰宇舜目重瞳照四方紫金山頭日卓午大千沙界仰恩光久立尊官伏惟珍重楚石琦禪師洪武元年九月十一日欽奉聖旨於蔣山禪寺水陸會中陞座真如淨境界一泯未甞存能隨染淨緣遂成十法界法界者眾生心也眾生心即佛心大哉心乎無形無相充徧十方亘古亘今包含萬有但在眾生分上一向染用謂之無明諸佛分上一向淨用謂之佛性無明佛性是二俱空然而眾生不了于空無明所惑從無量劫而至今世因身口意起貪嗔癡貪行多者二萬一千嗔行多者二萬一千癡行多者二萬一千等分行者二萬一千共造八萬四千諸煩惱業生罹王憲死在地獄動經劫數未有出期古德有言一切苦果因業而受受盡還無何苦之有豈不見梁朝傅大士心王銘云觀心空王微妙難測無形無相有大神力能滅千灾成就萬德體性雖空能施法則觀之無形呼之有聲為之法將心戒傳經水中鹽味色裏膠青決定是有不見其形又云欲求成佛莫染一物心性雖空貪嗔體實入此法門端坐成佛驀竪起拂子云還見麼無量壽世尊即今在拂子頭上放大光明普照十方盡虗空徧法界不可說不可說又不可說極微塵數三千大千世界百億日月百億四天下百億四大海百億五須彌百億欲界天宮殿百億色界天宮殿百億佛色界天宮殿於中一一世界天宮殿內皆有菩薩海眾圍繞隨機說法各各不同頓說漸說實說權說縱說橫說顯了說葢覆說凡有所說皆說此心何一理而不圓何一事而不備何一塵而不攝何一剎而不收者裏見得未度令度未解令解未到彼岸者令到彼岸未證涅槃者令得涅槃皇恩佛恩一時報畢其或未然更添注脚去也擊拂子云還聞麼者裏聞去諸人耳在一聲中一聲普徧諸人耳此是觀音大士圓通法門十方俱擊鼓十處一時聞此是圓真實隔垣聽音響遐邇俱可聞此是通真實聲無既非滅聲有亦非生生滅二緣離是則常真實是故諸佛於此得之徧十方界成等正覺菩薩於此得之圓滿六度萬行獨覺於此得之洞明十二緣生聲聞於此得之三明六通證八解脫諸天於此得之高超十地人倫於此得之具足眾善修羅於此得之永絕憍慢地獄於此得之咸脫苦輪乃至餓鬼旁生并及四生九類一切含識於此得之莫不悟自心佛成自心佛金剛般若云過去心不可得未來心不可得現在心不可得心既不可得佛亦不可得菩薩亦不可得獨覺亦不可得聲聞亦不可得諸天亦不可得人倫亦不可得修羅亦不可得餓鬼旁生四生九類一切含識亦不可得此不可得亦不可得永嘉大士道了了見無一物亦無人亦無佛大千沙界海中漚一切聖賢如電拂所以二祖神光參初祖菩提達磨曰我心未寧乞師安心初祖云將心來與汝安神光云覓心了不可得初祖云與汝安心竟以拂子劃一劃云劃斷葛藤正與麼時果滿功圓一句作麼生道將此深心奉塵剎是則名為報國恩欽惟皇帝陛下英武仁聖削平海內子育兆民九夷八蠻罔不賓服是以梯山入貢航海獻琛元年大赦天下洽以寬恩無辜冤枉亦蒙濟拔特賜銀帑命善世院就蔣山禪寺修建冥陽水陸大齋七晝夜於中作諸佛事供佛賢聖天地神祇三界鬼神并召臣僧梵琦舉唱宗乘所集功勛并用超度四生六道無辜冤枉悉脫幽冥往生佛土成就菩提所願如意珠爍破無明窟智慧劍截斷生死根因大法以悟心趣樂而見佛復舉梁朝武帝請傅大士講經大士登座揮尺一下寶公菩薩謂帝曰陛下還會麼帝默然菩薩云大士講經竟師拈云今日聖恩令臣僧梵琦陞於此座舉揚第一義諦普願迷流同成佛道釋迦老子四十九年說不盡底細大法門盡被傅大士一時吐露了也且道節文在什麼處冥陽水陸大齋緣徧滿三千與大千東走金烏西玉兔上窮碧落下黃泉永拋業識無明海高坐如來妙寶蓮恩重須彌何以報祝延聖壽萬斯年洪武二年三月十三日欽奉聖旨於蔣山禪寺水陸會中陞座震法雷擊法鼓布慈雲兮洒甘露即今法雷已震法鼓已擊慈雲已布甘露已洒且道山僧說甚麼法說向聲聞乘法耶說向獨覺乘法耶說向菩薩乘法耶說向阿耨多羅三藐三菩提法耶說向凡夫界法耶教中道法界中無有法名向聲聞乘向獨覺乘向菩薩乘向阿耨多羅三藐三菩提無有法名向凡夫界無有法名向染向淨向生死向涅槃何以故諸法無二故譬如虗空若去來今求不可得然非無虗空據實而論只者虗空早是釘橛了也雲門手中扇子𨁝跳上三十三天觸著帝釋鼻孔東海鯉魚打一棒雨似盆傾諸人又作麼生會良久云不起纖毫修學心無相光中常自在又云不是心不是佛不是物是箇什麼明白道了也更要解注那此事不在言語上十雙五箇作言語會苦哉屈哉香嚴和尚道如人上樹手不攀枝脚不踏枝樹下有人來問祖師西來意若答他則喪身失命若不答他則違他所問答則是不答則是大慧和尚云我者裏禪如一團火相似若觸他則燒殺你若背他則凍殺你只如永嘉大師有兩句子與賊過梯道什麼鏡裏看形見不難水中捉月爭拈得平如鏡面險似懸崖金剛取泥處是我屋裏人知得更饒箇古話吾宗第四祖優波毱多尊者因一族姓子出家夜投天寺宿尊者乃作方便化一夜叉擔一死人更有一夜叉空手而至二鬼共諍一言我擔死人來第二者言我擔死人來前一鬼言我有證人此人見我擔死人來時此人念言我今必定死應作實語語後鬼言此死人者前鬼擔來非是汝許後鬼大嗔拔其一臂前鬼以死人臂還續如故後鬼復拔一臂前鬼更拔死人臂還復補處後鬼其兩脚前鬼悉以死人脚補之如本如是二鬼共食所拔新肉即便出去此族姓子豁然大悟今日聖天子普度幽冥令臣僧梵琦說法度諸佛子所冀一言之下泮然無疑知一切法即心自性成就慧身不用他悟如夢忽覺如蓮華開正恁麼時如何舉似一百五日近清明上元定是正月半復舉昔有士人撰無鬼論鬼現身云我聻士人無對後來五祖演和尚代以兩手合作鵓鴣觜云谷谷呱師拈云五祖和尚可謂是千聖頂上拈來萬人叢中指出語默所不到情解所不及向上一句作麼生論量常憶江南三月裏鷓鴣啼處百花香
