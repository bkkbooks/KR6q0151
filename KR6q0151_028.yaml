body:
  text: 武林十八㵎理安禪寺住持婁東行悅集報謝回寺提綱五祖演禪師郡中回上堂船上無散工時時事不同昨朝城郭裏今日白雲中且道不動尊在什麼處自云氣似韛袋令人可愛密庵傑禪師府中歸上堂一出一入一動一靜酒肆茶坊紅塵鬧市猪肉案頭驀然築著磕著如虎帶角凜凜風生及乎歸來相見依舊眉毛鳥崒嵂地且道是佛法耶世法耶記得修山主云具足凡夫法凡夫不知具足聖人法聖人不會卓拄杖云一不知二不會東西南北轉雱霈夢庵信禪師出外歸上堂多日出郊說盡天寒日暖今朝歸院又豈免漢語胡言既知句句見諦朝宗方信道言言斬釘截鐵若也領略去說者聽者功不唐捐苟或未然乃主乃賓二俱失利下座元叟端禪師城歸上堂去時夏暑侵衣熱歸日秋風滿面涼彈指聲中便差別百年能得幾時長城歸上堂華街柳巷張本地風光酒肆茶坊突出衲僧巴鼻人人八面玲瓏箇箇十方通暢何必覺城東際始見文殊樓閣門開方參慈氏拈拄杖云三箇童兒抱花鼓莫來攔我毬門路楚石琦禪師省中把茶回上堂舉風穴在郢州衙內上堂云祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是時有盧陂長老出問某甲有鐵牛之機請師不搭印風穴云慣釣鯨鯢澄巨浸却嗟蛙步輾泥沙陂佇思穴喝云長老何不進語陂擬議穴打一拂子云還記得話頭麼試舉看陂擬開口穴又打一拂子牧主云將知佛法與王法一般穴云見箇什麼道理牧主云當斷不斷反招其亂穴便下座師云擊石火閃電光搆得搆不得未免喪身失命風穴壁立千仞坐斷盧陂舌頭盧陂若是箇人未到牧主檢責才見他道祖師心印狀似鐵牛之機呵呵大笑若擬議拍一拍便行無端請師不搭印倚他門戶傍他牆剛被時人喚作郎如今有人與風穴作主我要問他心印在什麼處同諸山探院官回上堂舉石門聰和尚入州看官路逢延慶長老問云中路相逢一句作麼生道門云某甲禮拜和尚有分明日到院茶話次慶云昨日聞學士說新石門和尚和尚久在石門為什麼却新去門云腦後合掌問云來時無物去時空二路都迷且如何得不迷去門云稱頭半斤稱尾八兩師云石門道某甲禮拜和尚有分延慶著賊也不知要識石門麼李靖三兄久經行陳雖然如是未免倚勢欺人探元帥回上堂兵隨印轉紀信登九龍之輦將逐符行霍光賣假銀之城然則有符必有將有印必有兵兵在者裏印在什麼處良久云報恩今日小出大遇初冬回寺上堂一毫吞却山河大地則易山河大地吞却一毫則難也不難也不易鋪箇破席日裏睡料想上方兜率宮也無如此日炙背復舉青蘿夤緣直上寒松之頂白雲淡濘出沒太虗之中萬法本閒而人自閙黃龍云閙箇什麼師云莫道無事好朝京回上堂風不鳴條雨不破塊民不失所路不拾遺正恁麼時好箇太平時節山僧近承使命遠屆上京面對龍顏親聞詔旨風雲慶會千載一時及此還山將何報答也不出者箇時節諸佛出世祖師西來天下老和尚直指曲說總不出者箇時節所以道欲識佛性義當觀時節因緣時節若至其理自彰且作麼生是自彰底理皇圖齊北極聖壽等南山石屋珙禪師回院上堂老牯偷閒去半年祖翁田地草芊芊歸來懶更重還債犁耙春風又上肩是即是祖禰不了難逃宿業拘牽四蹄耕白水兩角指青天拍膝一下云可惜無人知此意風前令我憶南泉愚庵及禪師出莊歸請知客上堂昨日過南莊今朝又東郭動靜與去來何曾有間隔然動則涉塵勞之境靜則沉昏醉之鄉動靜雙泯則落空亡動靜雙行則顢頇佛性七十三八十四途路之樂不如在家喝一喝云誰在畫樓沽酒處相邀來喫趙州茶無文璨禪師入浙歸上堂一出五六月往返三千里信腳踢得著信手提得起不曾輕示人深藏懷袖裏歸來普請大衆做箇入門歡是甚麼浙東山浙西水了庵欲禪師上堂入城思量上堂歸來舉似大衆只恐聽事不真未免喚鐘作甕便下座南石琇禪師京都回兼謝書記知事上堂動若行雲止猶谷神既無心於彼此寧有象於去來山野去年五月初赴召入文淵閣圈點永樂大典出入禁庭波波挈挈繼預大會蒙賜華嚴大經動經八月回來姑蘇訪舊又過兩月及到山中恰值仲春且道有心於彼此耶無心於彼此耶有象於去來耶無象於去來耶靈利衲僧未言先領未舉先知便能伸出佛手抹過祖關滅却老胡種族扶起千古叢林雖然國恩深重言思莫窮敬成一偈以述鄙懷經從內府特頒賜人自九重城裏歸五髻峰頭春日暖山林泉石盡光輝箬庵問禪師還山上堂威音王已前涅槃心易曉威音王已後差別智難明如何是涅槃心今日雨昨日晴如何是差別智昨日晴今日雨忽有箇衲僧出來道和尚恁麼說話於唱教門中則不無未夢見衲僧本分事在且作麼生是衲僧本分事歸來庭院閒方得嫩緑駸駸已過牆牧雲門禪師參假歸上堂去去實不去途中好善為來來實不來路上莫虧危山僧出外五六日恭惟頭首執事大衆尊慈各各萬福記得前晚在檀越家一陽將復未復之際桑林閒曠星漢寥廓幽懷頗愜不覺口占半偈此夜月殊好輕雲薄似秋說猶未了只見大風從西北來忽然一陳大雨轟兩箇霹𮦷未審此間還有者箇消息麼有僧便喝師云為汝徹困便下座白衆出隊提綱五祖演禪師白衆出隊上堂明日匹馬單鎗為國出戰得勝回戈之日滿路歌謠大衆作麼生是歌謠一曲乃云囉邏哩囉邏哩還有和得麼良久云鴛鴦繡了從君看莫把金針度與人圓悟勤禪師出隊小參開佛祖爐韛用向上鉗鎚擬議不來則千里萬里當鋒薦得則坐斷要津此猶是化門之說若確實而論山僧有口無說處諸人有耳無側聆處乃至日月未足為明虗空未足為廣乾坤未足為大萬象未足為衆到者裏一搓一捺一挨一拶要見本分事且問如何是本分事大千沙界海中漚一切聖賢如電拂夢庵信禪師出隊白衆上堂長街短巷裏轉大法輪須是大家出手酒肆魚行中建立佛事不可獨自趨前如今同共入中願見歡喜牟尼寶積佛下座密庵傑禪師出鄉上堂六月炎炎如火熱誰知冷處勝氷雪紅塵閙市等箇人七佛軌儀都漏泄報龍王須福護大千揑聚為檀度一言劄住萬機通自然光壯少林風復舉世尊敕阿難持鉢公案師云大小世尊被阿難輕輕靠著未免喚鐘作甕月江印禪師七月旦行道上堂三十年來住子胡二時粥飯氣力粗無事下山行一轉借問時人會也無子胡大似年老心孤雲峰則不然三四年來住道場二時粥飯氣力強普請下山行一轉萬頃田疇耙稏香玉林琇禪師白衆出隊上堂西天佛祖多行化而不興道場東土知識多興道場而不行化雖是殊方合天仔細簡點將來也是各守一隅不善通變新報恩則不然興道場不妨隨時行化隨時行化原為興道場且道新報恩是什麼人有恁麼力量惟憑一點報恩心身命全將奉塵剎拈杖竟行劍門分禪師行化上堂架造劍門庵老僧自行疏慳鬼絶蹤由施主開門戶佛國共安居大哉永堅固利益無有窮古今無別路多時不下山明日下山去從他富與貧拈出無回互下座五祖演禪師出隊歸上堂出隊半箇月眼不見鼻孔忘却祖師禪拾得箇骨董且道向什麼處著一分奉釋迦牟尼佛一分奉多寶佛塔緣化回上堂白雲海會院足水兼柴炭惟少麻與麥衆人皆盡見親去化檀那疏却阿羅漢且望大慈悲一一看佛面大衆佛身充滿於法界且作麼生看我道不隔一條線佛眼遠禪師出隊歸上堂迎日出門去已覺披煙霧冒月望山歸重露濕禪衣心悄悄步遲遲無孔笛再三吹哩哩囉囉囉哩遊子乍聞征袖濕佳人猶唱翠眉低君更聽莫狐疑是何曲歸堂去大慧杲禪師出鄉歸上堂舉肇法師道動若行雲止猶谷神既無心於彼此豈有象於去來修山主道去去實不去途中好善為來來實不來路上莫虧危師云者二老漢惜乎不與徑山同時若也同時便與縛作一束送在錢塘江裏何故古今山河古今日月古今人倫寒則普天普地寒熱則普天普地熱去去來來動動靜靜又有什麼過或有箇衲僧出來道徑山恁麼說話也好縛作一束送在錢塘江裏山僧却熱炙盞子點茶與伊喫為什麼如此大丈夫兒捋虎鬚豈是分外出鄉歸上堂舉五祖師翁出隊歸示衆云出隊半箇月眼不見鼻孔失却祖師禪拾得箇骨董且道向甚處著一分奉釋迦牟尼佛一分奉多寶佛塔徑山法孫出隊八十餘日鼻孔常與眼睛相見亦無祖師禪可失亦不曾拾得骨董既無骨董則無以奉釋迦牟尼佛亦無以奉多寶佛塔畢竟得箇什麼夜靜水寒魚不食滿船空載月明歸應庵華禪師出隊歸上堂透過鐵壁銀山紅塵閙市全彰古佛家風經過酒肆茶坊突出衲僧巴鼻冷笑諸方寒灰枯木坐在無魂必死之地妙嚴有些子神通為汝諸人出氣卓拄杖云三十年弄馬騎却被瞎驢受記又卓一下下座密庵傑禪師出鄉歸上堂持鉢去持鉢歸草鞋根斷通消息玲瓏八面盡光輝遊魔宮入虎穴當機撞著惡聱頭直教心地盡休歇且據箇什麼道理便乃如是老不以筋力為能天目禮禪師出隊歸上堂移舟行化水雲鄉逆順風波已慣嘗今日歸來湖上寺更無一法可商量既無一法商量且將什麼供養大衆俞任袁柳豐鮑史唐雲外岫禪師出隊歸上堂閙市紅塵裏有閙市紅塵裏佛法深山巖崖中有深山巖崖中佛法山僧昨日出城門閙市紅塵裏佛法一時忘却了也行到二十里松雲便見深山巖崖中佛法大衆且道如何是深山巖崖中佛法良久云白雲淡濘出沒太虗之中青蘿夤緣直上寒松之頂師子端禪師化緣回上堂元豐七年中秋上旬忽因四大相逼思昔日之願心換寶殿之大柱修僧堂之正門箱無一寸之帛囊無挑藥之金不免入城乞化遍叩豪門莫非人人歡喜處處相欣盡道承長老親自到及拈捨五文十文才問求千錢百貫一似抽筋蓋是我福緣淺薄莫怨他人自知蒲繩子短爭嫌枯井源深不如早歸巖畔作箇閒人觀月色之清輝望孤鶴以為鄰誓弘般若報佛深恩奉勸後代兒孫莫打此般鼓笛聒噪他人月江印禪師行化歸上堂有佛處不得住無佛處急走過三千里外逢人不得錯舉趙州老人大似抱橋柱洗澡把纜放船山僧一出四十餘日有佛處與他錐破卦文無佛處也曾勘過歷了三州五縣逢人也曾錯舉來只是土曠人稀知音者少摘楊花摘楊花青山忽憶便歸去塵世要看還下來重建上塔緣化歸上堂鐵輪王使鬼神功靈塔飛來鄮嶺東有客不隨流水去磬敲疏雪細雲中乃竪拂子云看看大權菩薩歸也與耶舍尊者只今在山僧拂子頭上相見尊者云菩薩一出月餘四大輕安否世事可忍否衆生易度否菩薩云你在屋裏受人天供養坐致太平茄子瓠子那得知阿育王聞得出來道你二人何必之乎者也若無我釋迦如來真身舍利寶塔縱有神通妙用也無施展處三人撫掌呵呵大笑且道笑箇什麼夜靜水寒魚不食滿船空載月明歸佛朗性禪師化緣歸上堂一切破慳貪真人赤骨律生死為活計赤手拏飛日撲碎鐵心肝推倒銀山壁金穀寶鈔綾羅緞匹索取無厭真白拈賊囊括一布袋大地總收拾不獨成我法堂且要散汝牢宅化得衆生世界空管甚檀度波羅密擲拄杖下座修蓋萬佛閣重裝佛像化緣歸上堂不動雙足踏遍娑婆壁立萬仞和和囉囉拋三放兩減少添多聖主冥符剎土恩波十方圓鑑融徹太和大衆會麼卓拄杖云化得大千無一物情與無情證佛陀南石琇禪師行化歸上堂教中道無所從來亦無所去故名如來山僧出去已得兩箇月歸來恰值殘冬且道有去來相也無衆中忽有箇英靈底出來道長老長老者箇是三家村裏十字街頭欺謾胡漢誑唬閭閻底說話人天衆前不勞拈出山僧便須分付明窗下如法安排何故不貪香餌味可謂碧潭龍立聖像胎骨法語無用寬禪師立金剛胎骨一對大漢生得大善鼻孔吞却須彌驚得虗空栗戰良久露捉住清風剝了皮立伽藍胎骨會得瞿曇那一通幾乎蹉過主人翁本來骨格天然別永護伽藍振祖風立羅漢胎骨十六應真萬斧千斤銅頭鐵額鶻眼鷹睛喝一喝云竪起脊梁火急翻身雨順風調祝聖恩立佛胎骨潦倒瞿曇不識羞通身擔版逞風流香嚴寺裏重持起坐斷毗盧頂𩕳頭入聖像腹臟提綱應庵華禪師入羅漢五臟示衆云黃面老人乾屎橛參隨一火爛泥團心肝腸胃皆條直蔬飯茶華照膽寒佛法雖然未夢見神通却許入雲端應須痛念歸宗寺時復持盂下翠巒密庵傑禪師寶鑑大師請入金剛五臟師指金剛云賢劫千佛數末後最殷勤倒握降魔杵高標利物拳心肝無屈曲腸胃有區分神通願力雖無盡且為山僧護法門佛朗性禪師靈山一會湧壁觀音羅漢祖師諸天聖衆同入腹藏上堂實際理地不受一塵萬行門中不捨一法如是薦得摩醯三眼高低普矚無法不圓無功不周坐大道場應微塵國演色演空為一切有情轉大法輪淫坊酒肆奴呼文殊普賢柳巷花衢婢使釋迦觀音祖師羅漢到處做驢做馬諸天龍神隨身執鞭墜凳無明三毒恣訶叱熱喝嗔拳常逼拶盡十方虗空撮來置毛端極無邊法界一撚投于針鋒有時諸佛菩薩祖師羅漢無自無他無取無捨無彼無此無內無外法法全彰正體頭頭妙化莊嚴普薰諸聖凡平等真寂滅共成無上覺圓明一切智其或未然更聽一偈大千俱入如來腹銷盡衆生界即休過現未來同授記萬象森羅笑點頭卓拄杖下座聖像開光明提綱大慧杲禪師江給事請開佛光明師執筆云教中道清淨慈門剎塵數共生如來一妙相一一諸相莫不然是故見者無厭足又道如來眼有大人相名自在普見雲以衆妙寶而為莊嚴摩尼寶光清淨瑩徹普見一切皆無障礙既然如是為甚麼却要他人點眼還有道得底麼若也道得非獨為黃面老子出氣亦使遍法界衆生悉沾利益若道不得聽取一頌舉頭忽覩明星現因茲病眼見空華遂以筆點云今日還渠舊光彩碧眸炯炯照塵沙應庵華禪師塑佛開光明示衆云達之居士以無礙智力洞明吾佛相好以無礙辨才成就一切奇特殊勝不可思議解脫門設使虗空為口江海為舌盡塵沙劫讚歎而莫得其倣佛矣且道釋迦老子是有光明可開是無光明可開若道有光明可開歸宗當墮五無間獄若道無光明可開盡乾坤大地無一人發菩提心到箇裏苟非契證從上諸佛妙心又焉能觀瞻如來勝妙頂相正當恁麼時如何當陽拈出真消息豈教辜負釋迦文法舟濟禪師精嚴寺佛開光示衆南寺佛點眼北寺佛放光若作奇特商量大似白日著鬼咄且置是事只如教中道佛真法身猶若虗空應物現形如水中月又云佛身充滿於法界且道者光明向甚麼處點即是以拄杖作點勢云今佛放光明助發實相義南石琇禪師粧達磨百丈國一三祖師像完開光明拈筆示衆云達磨大師與大智國一即今在毫端上現大人相大衆還見麼若道見向甚麼處見若道不見蹉過三大祖師畢竟作麼生海神知貴不知價留與人間光照夜元叟端禪師為佛開光云我如來以清淨天眼普觀大地衆生去劫已前來劫已後纖塵無有障礙徑山今日因甚為他重新點出只恐諸人昧其所自千巖長禪師檀越樓清翁一得建山門塑金剛開光明示衆以筆點一點云者一箇莫道不曾相識好又點一點云者一箇却即是樓一得外護山門內承佛記金剛正體洞徹十虗大用現前威而不猛有為界中不壞無為之相無為界上不宰有為之功爾能借我神通我亦助君精彩所以道眼眼相面面相對灼然不在筆尖頭自有光明動天地檀越樓文翁造殿又塑佛開光明示衆云德山拆却殿丹霞燒却佛樓文翁造殿又塑佛且道拆殿燒佛底是起殿塑佛底是以筆點云者裏見得靈山一會儼然未散若也不見是真精進是名真法供養如來若要分明更下注腳作福者作福造罪者造罪張公喫酒李公醉總不干無明一星子事乃呵呵大笑天衣聰禪師因裝普賢大士開光明次師登梯秉筆顧大衆曰道得即為下筆衆無對師召侍者與老僧牢扶梯子遂點之笑隱欣禪師開佛光明示衆云體虗常照現毗盧頂後神光妙應無私開舜若身中正眼密覆千華羅網光生七寶金山九重之尊貴難名萬德之莊嚴莫及而憫物願深利生情急示同居土隱尊特軀一身變現百千萬億應身八十相好塵塵具足一目普攝八萬四千寶目八百功德法法圓通焉有願皆從晃晃焉無幽不燭且道今日因甚却要重新點眼於斯明得便見欽奉聖旨鑄造佛像圓成臺官慶讚皇恩佛恩報畢倘或未明更看山僧筆頭點出頂門正眼明如日覿面當機見得親正法萬年宣聖化山河國土現全身箬庵問禪師盛川到岸菴佛開光請小參佛真法身猶如虗空應物現形如水中月拈筆云大衆此豈不是法身作麼生說箇應物現形之理莫是秋水長天落霞孤鶩是應物現形麼莫是鐘魚互答梵唄交加是應物現形麼莫是緇素駢臻人天聚會是應物現形麼若也是去則一切色是佛色一切聲是佛聲一切若色若聲若有若無若隱若現咸是佛光之所顯煥諸人於佛光中影現諸佛于諸人影中發光彼彼無雜彼彼無壞彼彼圓滿彼彼充足又教山僧向什麼處點出若不點出諸人有眼共見有耳共聞若點出諸人又向什麼處見若以眼見眼不可見若以耳聞耳不可聞若以智知智不可知若以識識識不可識山僧不惜眉毛為諸人竭力去也乃點云普令今佛放光明助發如來實相義喝像成檀越請提綱應庵華禪師檀越裝佛上堂云正眼洞明十虗無間直下坐斷情塵意想不落玄妙機關只向生佛已前識取本來面目不是心不是佛不是物恁麼中不恁麼剗草除根不恁麼中却恁麼同生同死正如壯士展臂不假他力又如師子王游戲得大自在有時拈一莖草作丈六金身有時將丈六金身作一莖草亦能殺人亦能活人正恁麼時歸宗如何折合百寶莊嚴無相身一超直入如來地復舉昔毗藍園裏摩耶聖母左手攀枝釋迦老子右脅降誕九龍吐水沐金軀四顧周行各七步作大獅子吼天上天下唯我獨尊後來雲門大師道我當時若見一棒打殺與狗子喫却貴圖天下太平師云達之居士打開無盡寶藏運出自己家珍裝嚴釋迦老子且道與雲門是同是別若道是同一人打殺一人成就若道是別佛法豈有兩般者裏得透去堪為如來種草苟或未然山僧有一頌舉似諸人跛腳雲門言打殺達之居士示全身當陽出格無多子報佛深恩只兩人檀越張子明裝佛慶懺請小參示衆云如來密語初不覆藏覿體無私當陽顯示祇如一大藏教從甚處得來非頂門具眼肘後有符又安能洞明者一著子祇今坐立儼然各各頂天立地含齒戴髮且作麼生說箇初不覆藏底道理莫是一動一靜告往知來是麼莫是折旋俯仰周遍一切處是麼莫是一語一默坐臥談笑是麼若把者箇作不覆藏底無異吹毛覓縫撥火求漚殊不知正是業識茫茫無本可據豈不見長沙和尚道學道之人不識真祇為從前認識神無量劫來生死本癡人喚作本來人是他古人見得如來密語徹底無疑等閒拈一機示一境無不透頂透底終不向夢幻殼子裏顛倒肉團心識上揑怪也又有僧問古德學人有一問在和尚處時如何古德云設有也斬為三段看他得底人躍出來不妨烜赫何嘗有一絲頭許與學者作道理直是乾嚗嚗地如一座須彌山相似世間一切逆順境界搖撼不動善惡因緣籠無門豈不是大丈夫格外道人也敢問諸人祇如釋迦老子未入母胎時三十二相八十種好又向什麼處塑裝者裏見得徹去便見得大心檀越張子明同妻趙氏裝嚴釋迦老子最初一念起處祇如子明未起裝嚴最初一念釋迦老子又在甚處切忌向夢幻殼子裏顛倒肉團心識上揑怪到者裏莫問釋迦老子如之若何但直下了却最初一念此念若了未入母胎底也不是入母胎後底也不是從母胎出底也不是塑底也不是裝底也不是最初一念也不是了却最初一念也不是然後張子明與妻趙氏男宗朝舉家眷等却有與釋迦老子相見分既是從頭俱不是了又向什麼處相見還委悉麼將此身心奉塵剎是則名為報佛恩喝一喝下座無用寬禪師金牛離相寺塑佛請升座大寶華王座從地湧出法報化三身自天降下大衆釋迦老子來也急著眼看靈山一會泥團土塊明月清風威音劫外喝一喝云離相離名萬年千載下座楚石琦禪師施主裝佛上堂舉昔有秀才問長沙某甲曾看千佛名經百千諸佛但見其名未審居何國土長沙召秀才才應諾沙云黃鶴樓崔皓題後秀才還曾題否才云不曾題沙云得閒題取一篇好師頌云百千諸佛但聞名國土從來作麼生黃鶴樓中詩一首任教今古競頭爭鑄佛上堂僧問如何是金佛不度爐師云填溝塞壑進云如何是木佛不度火師云正是時進云如何是泥佛不度水師云東西南北十萬八千乃云泥佛浸了也木佛燒了也金佛鎔了也真佛勘破了也趙州老漢趂出院了也一去更不再來咄造萬佛上堂夜夜抱佛眠喚什麼作佛朝朝還共起莫錯認定盤星起坐鎮相隨畢竟是阿誰語默同居止非一亦非二纖毫不相離如身影相似只者一段虗空多少人摸索不著任是精金百煉巧計千般鑄也鑄不成雕也雕不就傅大士才開橐籥便見精神直得鑑地輝天騰今耀古雖然也祇寫得一半你諸人從朝至暮升堂入戶開單展鉢本來面目有甚掩處還見麼如今若不究根源直待當年問彌勒雕千手千眼大悲像上堂舉南泉喚院主主應諾泉云佛昔九十日在忉利天為母說法時優填王思佛請目連運神通三轉攝匠人往彼雕佛像只雕得三十一相為什麼梵音相雕不得院主問云如何是梵音相泉召院主主應諾泉云賺殺人師召衆云若識得梵音相應以佛身得度者即現佛身而為說法乃至應以天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等身得度者即皆現之而為說法且道說什麼法便下座鑄千手大悲像上堂據教中道衆生妄見不離前塵開眼見明明不是明合眼見暗暗不是暗在佛殿前過不見佛殿後事在佛殿後過不見佛殿前事皆屬妄見前塵所遮若離前塵無佛可見約永祚見處大悲菩薩本自無身亦無手眼有底便道我會也我會也打二十九棒趂出留一棒自喫莫有人下得手麼如無今日失利舉麻谷問臨濟大悲千手眼阿那箇是正眼濟云大悲千手眼阿那箇是正眼速道速道谷拽濟下禪床谷却坐濟云不審谷便喝濟拽谷下禪床濟便坐谷便出去濟歸方丈師云二大老主賓互換縱奪可觀如猛焰燒空忽雷震地相似雖然與他大悲千手眼有何交涉只見波濤湧不見龍王宮雪關誾禪師栴檀像成檀越請上堂趙州云我有時將一莖草作丈六金身用有時將丈六金身當一莖草用曹山問僧云佛真法身猶若虗空應物現形如水中月作麼生說個應底道理僧云如驢覷井山云道也太煞道祇道得八成僧云和尚作麼生山云如井覷驢山僧道善塑無如曹山善雕無如趙老不露些子刀痕真個手段高妙若會得如驢覷井便曉莖草化作金身若會得如井覷驢便曉丈六金身當草目犍連枉運神通優填王徒煩匠巧丹霞正令劈頭行誰道子孫賢不肖然則理無二般爭奈法無一向丁蘭刻木事親針刺血流異樣忉利天宮轉下來像迎佛兮佛迎像若將情識妄分疏隔靴搔癢徒瞻仰今日是新安洪惟心居士設齊為報薦先慈敬塑栴檀尊像一軀送入先師塔院供養仍勞書幣殷勤以山僧誕辰懇請為衆說法說法且置畢竟造像齊僧有何功德卓拄杖云不求有漏人天福大孝全彰古佛心嵩乳密禪師大士誕日像成開光上堂春氣晴和衆鳥鳴煙村一帶柳拖青色聲堆裏分明現觸著通身是眼睛諸人若恁麼會得聞聲時妙智降生見色處圓通示現總持權柄密運大機通乎上徹乎下天地不能蓋載萬物豈能覆藏顯而不露隱而彌彰古今不異達者同途諸人要知同途底事麼良久云伯樂一過駑馬皆嘶下座
