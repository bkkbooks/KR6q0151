body:
  text: 武林十八㵎理安禪寺住持婁東行悅集即入院日請開堂提綱箬庵問禪師金山入院開堂神龍窟宅古佛名藍我二十世祖圓悟禪師重開正覺之場十八高人打失鼻孔眼睛一回徹證之地洵江南之巨剎誠衲子之寶坊不勞彈指樓閣門開無所希求風雲際合據此位者顯示不言正令導此機者激揚向上宗乘明如杲日皎若太虗一語歸宗千差坐斷迴千百年既倒之瀾挽今時世已隳之轍直得臨濟有喝倒退三千德山棒有無敢動著抹過建化門裂破囫圇句風高浪湧水沸波騰正當恁麼時且妙高已到寶所親登剎影高揚誰遭毒手劈開華嶽連天色放出波濤動地雷謝詞不錄復舉三聖開堂云我逢人即出出即不為人興化云我逢人即不出出即便為人師云綱宗在握正令當行照用全提拳踢相應三聖興化是他臨濟的子方敢向人天眾前激揚箇事山僧要將二大老肝膽一時揭露擲向人前莫有辨得者麼有不犯之威乃能樹起屍之德有不言之化始可成歃血之功太平只用垂裳治建土分疆列下風磬山入院開堂四十九年全成露布末後一句曳尾靈龜西天四七東土二三總是接響承虗據實而論諸佛諸祖無出頭分自古至今無語話分翻轉劫初田地撥開向上宗猷突出頂𩕳一機顯示金剛正眼臨濟三玄三要不消一劄洞山五位君臣不直一唾迴真風於既墜續慧命於將殘還他實地行來自然有本可據拈起也剷斷天下人命根放下也振轉衲僧鼻孔饒伊牙如劍樹口似血盆底到來也須讓他一頭地何故綱宗在握寶劍橫揮正印全提十方坐斷莫有同明大機同徹大用為先師吐氣者麼從前汗馬無人識且要重論葢代功復舉法燈禪師開堂山僧卑志本欲深棲巖壑隱遁過時柰緣先師有未了公案出來為他了却僧問如何是未了公案燈打云祖禰不了殃及兒孫僧云過在甚麼處燈云過在我殃及你師云古人恁麼提持要且未稱衲僧本色豈知者箇門戶從來潑開要避避不得要諉諉不得即如山僧今日領眾入此先磬山來且道是隱遁過時耶出來了却耶山僧却也不行棒也不殃及大眾一總既到者裏誰敢不為先師竭力若只平地上展演佛法寧有今日驀擲拄杖云三十年後莫道不與諸人舉似結座云諦觀法王法法王法如是下座漏澤入院上堂此日無問話者師乃顧左右云今日一眾可謂善說法要何故問如瓶瀉答似雲興簇錦攢華牽來拽去滿慈鶖子利智利能共展奇猷各興神用於宗乘中事天地懸殊爭之不足讓之有餘拈一機則機機普應建一法則法法周圓掀翻露布葛藤決斷現成公案何妨就荊棘為旃檀林即瓦礫為黃金地開四生門戶作九有梯航直教不蓄一粒不聚一莖頓使天下衲僧箇箇飽地繡湖南畔花滿郊堈煙水城東春連雉堞是處有慈氏無門無善財何必東涌西沒南涌北沒中涌邊沒普天匝地不動一毫頭全成殊勝利到者裏報不報之恩助無為之治亦非為分外事且道法筵初啟法皷方聞條令斬新一句又作麼生快逢野老謳歌日喜見嘉禾合穗生玉林琇禪師報恩入院上堂師卓拄杖云去歲元公黃居士祈遠唐居士暨眾居士等要某舉揚此事某以先師會下頗多精鍊之士大膽小廝不妨暫時鈍置誰知先師有讖云不是我兮便是你今日拓開潑天門戶萬不可諉眾檀護諸弟兄仍推向人前不可囊藏被葢也驀竪拄杖云看看乃橫云不直前薦取向門外打之遶先師隱入某上座拄杖裏去也復舉臨濟大師初住河北謂普化克符二上座曰我欲於此建立黃檗宗旨汝二人成褫我二人珍重下去三日後普化上來云和尚三日前道甚麼濟便打三日後克符上來云和尚三日前打普化作甚麼濟亦打師云臨濟大師眼孔太窄欲立先宗止望那兩人成禠某上座則不然今欲於此建立先報恩宗旨仰望大眾盡皆成褫我若或擬議遲疑各各自領三十棒驀卓拄杖喝一喝下座牧雲門禪師住破山興福入寺上堂出山髮尚青還山齒半落入門仔細看青山宛如昨黃葉打頭來高林風索索馳騁不知休當初悔行脚昔有梵志出家白首而歸鄰人見之曰昔人尚存乎梵志曰吾猶昔人非昔人也鄰人愕然非其言大眾鄰人只知百年一身不知念念遷變新新不住梵志雖知當體無常有變有滅不知有不變者存於出家法中尚欠一著且如何是不變者死生老病非他物渴飲饑餐祇舊人下座弘覺忞禪師天童入院上堂古殿洞開明同杲日玲瓏八面寬若太虗風送寶鐸聲搖夢回家園春曉一一脚跟下重重樓閣門太煞現成十分受用因甚諸人到此排身不進入作無門蓋緣執悋情存尚留觀聽以致零星家寶自昧衣珠苟能上無攀仰下絕己躳一肩擔荷將來赤手提持得去則事出當然宛同本得何勞三登九上一任七縱八橫便見大地全收十方坐斷然後奮金剛杵現自在身向虎穴魔宮為人作主坐浮幢王剎轉大法輪直得如明鏡當臺千妖百怪莫能迯其影質春風匝地三草二木咸悉賴其栽培正當恁麼時貨舖初開斬新條令一句作麼生道但願東風齊著力一時吹入我門來起身云道忞向緣薄福自揣無能業遁跡巖阿深藏愚拙不意人天眼滅法社中虗誼當諸位法兄則又固為辭讓所以古南和尚靈鷲大師與諸同門季昆在郡檀越一時把住驢脚生按牛頭必欲道忞繼席先人高陞此座深愧恩光過溢況當象駕簇臨今則祝聖開堂為眾演法一期佛事幸已云周敬回以上善緣用培巨嶽邊土伏願一人有慶萬國咸寧在筵群公觸目證無生之旨現前知識普天建最勝之幢有煩久立伏惟珍重復據座云昔日臨濟大師至滹沱河側住一小院名曰臨濟座下亦有三百來眾一日謂普化克符曰我欲於此建立黃檗宗旨你二人須成禠我二人珍重下去三日後普化上來三日前和尚道甚麼臨濟拈棒便打三日後克符上來和尚三日前因甚打普化濟亦打師云一賓一主一挨一拶生鐵鑄就鈍綱打成建立黃檗宗旨發明從上心髓須是者般漢但惜二人珍重下去臨濟不與當下勦絕致令後人向三日前三日後弄精魂今日山僧路見不平不免為伊勦絕去也諸仁者山僧亦欲於此建立天童宗旨敢問諸人作麼生成禠山僧好為復珍重下去耶為復三日後上來耶為復從東過西耶為復默然良久耶為復拂袖出堂耶為復繞座三帀作女人拜耶為復揚眉眴目竪指擎拳耶為復掀倒法座喝散大眾耶上來做處總不出弄精魂畢竟作麼出隻手眼共山僧建立宗旨會麼鶴有九皐難翥翼馬無千里謾追風白槌諦觀法王法法王法如是師下座費隱容禪師住天童上堂入大寶剎登大法壇吹大法螺擊大法皷演大法義顯揚臨濟宗猷提持向上一路指蹤則萬別千差透脫固一字也無到者裏先師面目現在太白風規猶古所以法隨法行法幢隨處建立遇緣即宗隨處作主摧邪挽正據真鋤偽直得四海沸騰五嶽起舞佛祖於時歡呼龍象自此奔馳乃至若貴若賤是聖是凡四眾普集俱在一處人天交接兩得相見都教箇箇機契單傳人人悟同本得然則即此大寶剎大法壇鐘皷喧天法雷震地靈山勝會宛然見深沐皇恩不等閒石奇雲禪師雪竇開堂日陞座云當陽一著獨露無遮八面玲瓏十方軒豁明眼作證豈敢囊藏直得瓊樓玉殿百草頭上全彰千丈報身瓦礫堆邊頓現塵塵爾剎剎爾突出無位真人發明現成公案直饒三世諸佛歷代老古錐到來箇箇退身有分正當恁麼時如何水歸大海波濤靜雲到蒼梧氣象閒浮石賢禪師報恩入院上堂假使頂戴經塵劫身為床座遍三千若不傳法度眾生畢竟無能報恩者擲下拂曰新報恩今傳法了也大眾一時擔荷載住入院提綱雲峰悅禪師載住雲峰上堂古者道風動心搖樹雲生性起塵若明今日事昧却本來人今日事且置作麼生是本來人良久云鶴有九臯難翥翼馬無千里謾追風珍重棲賢舜禪師南康守因私忿民其衣後仁宗勅賜依舊為僧特旨載住棲賢入院上堂無端被譖枉遭迍半載有餘作俗人今日載歸三峽寺幾多歡喜幾多嗔佛眼遠禪師知府錢公奏請載住褒禪上堂君命重宣降薛蘿不容靜處薩婆訶襴衫席帽寒酸甚又向人前唱哩囉哩哩囉拍一拍囉哩囉又拍一拍云去年梅今歲柳顏色馨香依舊人漸老水長流無心道合頭下座大慧杲禪師載住徑山入院上堂古人道去去實不去途中好善為來來實不來路上莫虧危敢問大眾既不去善為箇甚麼既不來有甚麼虧危妙喜離徑山十八年今日歸來亦不見有善為亦不見有虧危三門依舊向南開為甚麼如此良久云而今四海清如鏡行人莫與路為讎應菴華禪師載住歸宗入院上堂大道無方所從容寰海間幾思歸隱處安樂在廬山如是也周旋舊日家風豈敢妄更途轍再禮耶舍相好重瞻拭眼慈容祇要聲和響順形直影端所以道拈起也天回地轉應須拱手歸降放下也草偃風行必合全身遠害在彼在此本無間然一去一來豈有二相雖然猶是業識茫茫且風恬浪靜一句作麼生道雲靜日月正雪晴天地春愚庵及禪師載住徑山山僧隨緣受報濫此承乏坐嬰宿障誓欲投閒茲承監察御史太尉柱國丞相不忘靈山付囑協心削牘復任住持難為迴避只得免循舊例陞於此座䖍爇寶香祝延今上皇帝聖壽萬安皇后齊年太子千秋文武官班同增祿筭欽願皇圖永固帝道遐昌武偃文修河清海晏風調雨順物阜民康便恁麼散去一期事畢寧不盡善盡美更教山僧說箇什麼即得且山僧雖離此山恰恰二年朝夕與諸人眉毛廝結行則與諸人同行坐則與諸人同坐覓一絲毫隔礙底道理了不可得此日歸來依然只是舊時人不改舊時行履處所以道往復無際動靜一源去來不以象動靜不以心覓一絲毫動靜去來之相了不可得若信得及便好各各安家樂業張祖父田園吹無孔笛唱太平歌驅逐文殊普賢走使觀音勢至於一毫端見寶王剎坐微塵裏轉大法輪任運優游隨緣自在雖然如是若衲僧分上要且未夢見他汗臭氣在豈不見江西馬大師昔日令西堂智藏馳書到當山大覺欽禪師大覺開緘見一圓相索筆於圓相中點一點可謂龍驤虎驟玉轉珠回好手手中呈好手紅心心裏中紅心因甚南陽忠國師却道欽師猶被馬師惑後來雪竇道徑山被惑且置若將呈似國師別作箇什麼伎倆免被惑去敢謂天下老和尚各具金剛眼睛廣作神通變化還免得麼雪竇見處也要諸人共知即者馬師當時畫出早是惑了也且道雪竇與麼批判還能自免也無山僧今日因齋慶讚舉似諸人以拂子折圓相云莫有不受惑者麼喝一喝復舉應庵和尚載住歸宗上堂舉南禪師出城還山有頌示眾云去日一溪流水送回時滿谷白雲迎一身去住非去住二物無情似有情應庵道南禪師好則好只是愛便宜歸宗亦有一頌舉似大眾去時冐雨連宵去回時帶水又拖泥自怪一生無定力尋常多被業風吹愚庵今日載住徑山亦有一頌舉似大眾去日應須償宿債回時宿債本來空山上鯉魚打𨁝跳一國之師展笑容弘覺忞禪師載住天童入院上堂潑天門戶開張千聖仰攀不及廣大家風浩浩含靈依蔭何窮所以從上先德莫不蔭茲長育群萌王有三界禠成佛祖流出萬宗其柰草庵止宿人多門外周遊者眾遂使弘規罔紹大業就荒眾中莫有法王真子克咸厥家者麼出眾相見眾問話次又一僧出師拈拄杖便打復喝一喝須知海嶽歸明主未信乾坤別有天卓拄杖下座當晚小參提綱圓悟勤禪師蔣山寺小參相逢不拈出舉意便知有萬人眾前顯顢頇不是目前機亦非目前事三千里外納敗闕直得盡乾坤大地無絲毫法可當情靜悄悄地絕誵訛千聖不敢擬議致之諸佛頂𩕳上到者裏更說什麼行棒行喝論正論偏有語有默絕玄絕妙雙放雙收同死同生向窠窟裏作活計正當恁麼時且作麼生參究且作麼生捉摸作麼生弄拈作麼生證入若有一絲頭伎倆去便見神見鬼更不作一絲頭伎倆未免墮在無事界裏箇事如壺公瓢中自有天地日月所以雪峰和尚道盡大地撮來如粟米粒大又道盡大地是沙門一隻眼鹽官又道虗空為皷須彌為槌什麼人打得南泉道王老師不打者破皷法眼道王老師不打玄沙道深山巖崖千年萬年無人到處還有佛法也無雲門大師道日裏來去日裏辨人忽然教夜中取箇物無日月燈不曾到處作麼生取似此若不通透有纖毫隔礙則如山如嶽或若盡情透得要行便行更疑什麼雖然如是直須是真實到者田地始得向萬丈懸崖處撒手百尺竿頭進步且道此事畢竟如何委悉撞著道伴交肩過君向瀟湘吾向秦下座大慧杲禪師住徑山當晚小參大道只在目前要且目前難覩欲識大道真體不離聲色言語舉起拂子云者箇是色擊禪床云者箇是聲山僧只今口吧吧地是言語那箇是大道真體喝一喝云即此見聞非見聞無餘聲色可呈君箇中若了全無事體用無妨分不分若也分去雨下地上濕天晴日頭出小盡二十九大盡三十日若也不分金剛與土地揩背一擦骨出復云古者道末後一句始到牢關把斷要津不通凡聖作麼生是末後一句良久云且莫說夢拍禪床下座雪巖欽禪師住道林當晚小參濟北之道出乎平常語默動靜脫體全彰三玄三要松直棘曲四賓四主鳧短鶴長所以老圓悟於諸佛出身處道薰風自南來殿閣生微涼帶累妙喜打失鼻孔徧界難藏山蒼蒼水茫茫無朕迹絕承當竹籬茅舍江村外遠浦歸帆挂夕陽復舉麻谷訪臨濟問大悲千手眼阿那箇是正眼速道速道谷拽濟下禪床却坐濟起云不審谷擬議濟拽谷下禪床却坐谷便出師拈云二大老恁麼激揚雖則百千手眼一時俱露又爭免得箇二俱瞎漢且道還有檢點得出底麼瞎住光孝云佛法本無多子堂堂日用之間只因自信不及却於易處艱難今夜不免作此方便為諸人豁開戶牖拶碎疑團擊拂子云星在稱兮不在盤復舉雲門大師示眾聞聲悟道話拈云跛脚阿師撫憐愛子動是倒腹傷腸只是做造忽忙帶些粘牙綴齒欽上座則不然聞聲悟道見色明心卓拄杖云家家觀世音住仰山云佛法徧在一切處豈間七閩二浙江東江西無過只是一箇夜暗晝明春寒秋熱而已就中忽有通方上士在背地裏拍手一下咳嗽一聲道長老將謂你來自冷泉亭上必新言語必異見聞元來伎倆也只恁麼拍頰一下云仰山罪過復舉僧問先仰山法身還解說法也無山云我說不得別有一人說得僧云說得底在什麼處仰山推出枕子溈山聞得云寂子用劍刃上事師拈云法身說法已於問處流通推出枕子也只是箇信受奉行溈山老漢用劍刃上事雖曰列段分科若是正文敢道不事落處元叟端禪師住中天竺云一切諸法本無自性亦無生性菩提涅槃等名從淨法中得貪瞋愛取等名從穢法中得靜穢兩邊俱莫依怙但有空名名字亦無三藏十二分種種名言種種句義總不出此箇元由所以古聖有言若心想所思出生諸法虗假皆不實心尚無有云何出生諸法如人取聲安置篋中又如吹網欲令氣滿此是諦實之說若以為實大錯了也開山寶掌和尚年一千七十二歲三藏五乘十二分種種名言種種句義靡不練磨靡不究竟後於梁武城中得遇缺齒老胡方乃頓明大法不是容易直須仔細復舉寶掌和尚偈云梁武遇導師參禪了心地飄飄二浙游更盡佳山水師亦說偈云參禪只要了心地心地了時諸法空南山昨夜日卓午白額咬殺焦尾蟲楚石琦禪師住天寧當晚小參舉同安丕和尚因僧問如何是和尚家風安云金鷄抱子離霄漢玉兔懷胎入紫微僧云忽遇客來將何祗待安云金果早朝猿摘去玉華晚後鳳啣來師云正偏回互不犯鋒鋩問答縱橫性明尊貴同安老人慣得其便或有人問天寧如何是和尚家風向道鉢盂饙子忽遇客來將何祗待飯後一盃茶且道與古人是同是別住本覺云眼裏著沙不得耳裏著水不得恁麼來者不向一人眼裏著得須彌山耳裏著得大海水恁麼去者不背一人無言處演言無事處成事無佛處作佛無生處度生卷舒立方外乾坤縱橫挂域中日月得失俱喪是非杳忘撥轉向上關𭣟瞎頂門眼拋却空王殿卸下本來衣猶未是衲僧受用處還委悉麼家無小使不成君子復舉智者詮和尚示眾云要扣玄關須是有節操極慷慨斬得釘截得鐵硬剝剝地漢始得若是畏刀避箭之徒看即有分師云大小智者用盡自己心笑破他人口壽山別無奇特朝晨熱水洗面黃昏脫襪打睡大海從魚躍長空任鳥飛住光孝舉臨濟四喝話畢師便喝云且道者一喝落在什麼處為復是金剛王寶劍為復是踞地獅子為復是探竿影草為復是一喝不作一喝用試辨看若辨不出報恩與你註破金剛王劍目前可騐擬議不來墮坑落塹踞地獅子直下便是打破髑髏拈却牙齒探竿影草好也不好左手扶起右手推倒有時一喝不作喝用大小臨濟只管說夢便與麼會猶欠一喝在喝一喝恕中慍禪師靈巖當晚小參靈巖峭絕到者應難已到者享用安然未到者竛竮孤露孤露底正好踏步向前享用底更須退步就己所以道事無一向有時翻頭作尾有時翻尾作頭收放縱橫寧存軌轍摩竭掩室毗耶杜詞雖曰正令全提要且未臻其極山僧今夜入門之始聚首之初與汝諸人約法三章第一不得起佛見第二不得起法見第三不得道不起佛見法見若也依而行之管取眉毛廝結驀拈拄杖云明眼漢沒窠臼高高處觀之不足低低處平之有餘卓拄杖鐵牛不喫欄邊草直向須彌頂上眠住瑞巖云瑞巖山中阿練若堂殿玲瓏絕點塵昔日暫游今載到到來只是舊時人既是舊時人且說舊時話山川秀發龍象駢填人境宛然如昔風光不減當時顯揚少室徽猷揭示靈山奧旨無絲毫同相無絲毫異相全體是箇金剛正體全體是箇大解脫門全體是箇華藏世界海是以從上老宿競出頭來激揚鏗鏘只要各各當人明自本心見自本性高聳人天壁立萬仞睦州和尚云汝等諸人還得箇入頭處也未若未得箇入頭須得箇入頭若得箇入頭不得孤負老僧玄沙和尚云我若舉揚宗教法堂前草深一丈二大老一人牢關把斷水泄不通一人入草求人拖泥帶水正眼觀來總是無風起浪殊不知者條通天活路千聖共行萬靈同徹不離真際建一切法不壞假名而說實相拈拄杖者箇是假名那箇是實相卓拄杖實相假名一擊百雜碎了也咄咄咄力囗希驢前馬後莫亂針錐南泉偏要斬猫兒復舉當山開山空照祖師甞於室中自呼應云主人翁諾惺惺著他時後日莫受人瞞諾諾師拈云祖師弄者一解可謂超今邁古然只作得看家兒子山僧向者裏著一隻眼非獨紹續箕裘直要衡樓跨竈會麼電光莫及石火難追兔徑非大象之所游雞粟豈鳳凰之㗖喝一喝月江印禪師住育王晚參寶劍出匣誰敢嬰鋒明鏡當臺舉無遺照雪峰杓頭邊舀一千五百人善知識只好無佛處稱尊妙喜竹篦下打翻萬七千指衲僧僅免死水裡浸殺山僧素非建大將旗皷手段又無青天白日轟霹靂之機只是近離清苕過了三江九堰到得古鄮山中直是眼不見鼻孔此際更深夜靜月白風清不免唱箇脫空歌子使現前一眾與我中峰老祖兩得相見赤日晒來乾絡索秋風吹起又新鮮幾向江邊問消息鷺鷥踏却釣魚船喝一喝復舉首山和尚示眾云咄哉巧女兒攛梭不解織貪看鬬鷄人水牛也不識又云咄哉拙郎君巧妙無人識打破鳳林關著靴水上立師云二人同心其義斷金前住當山此庵和尚拈云總有來處拈拄杖云上大人丘乙己化三千七十士師云唵齒臨唵部臨莎訶天目禮禪師鴈山入院小參法不孤起仗境方生境既不存法從何立龍湫瀉千尋瀑布且不是境鴈峰聳萬丈高寒且不是法明眼衲僧到者裏合作麼生直饒倜儻分明山僧棒折也未放在何故殺人刀活人劍復舉高亭參德山德山隔江招手高亭便乃橫趨諸方盡道水空相照啐同時有甚交涉要見德山高亭麼便下座入院小參宗鏡堂前拂袖千聖不擕福泉山裏藏身萬緣寢息峰回路轉火冷雲寒草沒松楸苔封古屋堪笑魯祖面壁牆壍不牢秘魔擎叉戈鋌自亂是則損己為人遭人檢點且道思大居南嶽亮公隱西山是為人不為人良久云萬古碧潭空界月再三撈摝始應知復舉投子因僧問和尚住此山有何境界投子云丫鬟女子白頭絲師頌云住山境界問如何女子雙鬟𩯭已皤覿面不逢休更會白雲飛過舊山阿愚庵及禪師淨慈入院小參馬祖百丈已前無住持事道人相尋於空閒寂寞之濵其後雖有住持王臣尊禮為人天師今則不然挂名官府如有戶籍之民此晦堂不赴大溈之招而致斯語觀此則知住持之道那時已是不堪著眼了也更教看著今時做處也好慙惶煞人明教謂住持者持其法使之永住而不滅所以法隨法行法幢隨處建立永嘉道建法幢立宗旨明明佛勅曹溪是世降俗末名存實亡大法凋瘵無甚今日山僧道慙涼薄行愧荒疎誓欲深藏巖壑隱遯過時悞蒙柱國丞相不忘靈山付囑遠勞使命推輓來此住持是猶使蚊負山螳螂怒臂以當車轍却不似法燈和尚道為緣先師有未了公案出來為他了却所謂王臣尊禮為人天師建法幢立宗旨則吾豈敢雖然南屏勝地衲子淵藪人能弘道非道弘人佛運垂秋宗綱委地冀諸勝眾勠力匡持弘贊法社驀拈拄杖你有拄杖子與你拄杖子你無拄杖子我奪却你拄杖子卓拄杖云三汲浪高魚化龍癡人猶戽夜塘水復舉德山小參不答話公案法眼益云大小德山話作兩橛圓明密云大小德山龍頭蛇尾雪竇拈云二尊宿雖善截長補短捨重從輕要見德山老漢亦未可在何故殊不知德山握閫外之威權有當斷不斷不招其亂底劍諸人要識新羅僧麼只是撞著露柱底瞎漢師云者箇公案諸方老宿每至小參未甞不拈出註解一上雖則各資一路未免所見不同互有得出法眼云話作兩橛易分雪裏粉難辨墨中煤圓明云龍頭蛇尾只見波濤湧不見海龍宮雪竇道德山握閫外之威權有當斷不斷不招其亂底劍正是扶強不扶弱殊不知大小德山當斷不斷自招其亂諸人要識者僧麼子過新羅
