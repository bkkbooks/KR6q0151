body:
  text: 武林十八㵎理安禪寺住持婁東行悅集迎待尊宿致謝提綱石霜圓禪師因同道相訪上堂颯颯凉風景同人訪寂寥煑茶山上水燒鼎洞中樵珍重楊岐會禪師楊岐詮長老來上堂拈花付囑有屈當人面壁九年胡言漢語當人分上把斷乾坤且道作麼生是把斷乾坤底句還有人道得麼如無雲葢失利五祖演禪師諸院長老入山上堂臨濟入門便喝是甚盌鳴聲德山入門便棒抝曲作直雲門三句曹洞五位大開眼了作夢何故如此國清才子貴家富小兒嬌石臺師弟至上堂昔日先師頌臨濟三頓棒云一拳拳倒黃鶴樓一趯趯飜鸚鵡洲有意氣時添意氣不風流處也風流大眾若到白雲門下須要眾人助拳真淨文禪師因逍遙長老來上堂青山深處人來我紅塵裏紅塵偶不見白雲與流水耳目何所分浮名與浮利為是紅塵非為復青山是是非兩途間幾多殊未已幸遇逍遙人可可述遙理下座因雙林下生長老來上堂寶山不易到既到莫空迴莫有不空迴者麼遂擲下拄杖云是什麼良久云不見雙林釋迦老又聞彌勒下生來喝一喝下座章江長老來上堂舉僧問雲門如何是諸佛出身處門云東山水上行泐潭即不然若有人問如何是諸佛出身處但向伊道遠離洪井深入寶山大眾且道是同是別忽有箇衲僧出來云者裏是什麼所在說同說別也難得須是實到者田地始得若未到且不得草草永固長老至上堂幽固深遠無人能到到則山青水綠別是人間好諸禪德江月照松風吹永夜清霄何所為却怪長時杜䳌子春山無限好猶道不如歸因清凉長老到上堂熱惱既盡清凉現前分別不生虗明自照然後我當按指海印發光汝暫舉心塵勞先起乃喝云三世諸佛一棒打殺填溝塞壑拋東擲西一任諸人看驀拈拄杖云過去諸佛亦如是現在諸佛亦如是未來諸佛亦如是遂擲下云看因快山長老至上堂快然大道祇在目前縱橫十字擬即留連乃顧大眾良久喝一喝下座因華嚴座主到上堂法界者一切眾生身心之本體也乃拈拄杖云不是法界是諸人無始已來靈明廓徹廣大虗寂之妙體故此土他界天堂地獄六凡四聖情與無情同一無異無壞無雜猶帝網之明珠互相融通更相涉入可謂無邊剎境自他不隔於毫端十世古今始終不離於拄杖頭上若爾則何啻擲大千於方外納須彌於芥中而今百億日月百億須彌百億世界都在拄杖子裏許乃擲下云擲在諸人面前還見麼信得及麼不思議解脫力神通游戲妙用現前非假於他術皆吾心之常分耳喝一喝下座化城大師來上堂三界無安猶如火宅出得火宅未到寶所且在化城今日相逢化城不見寶所何在元來只是舊時源上座大眾元來一時總是舊時人伏惟珍重大慧杲禪師雪竇持和尚至上堂仰山道東寺師叔若在慧寂不受寂莫仰山只知有己不知有人徑山即不然雪竇師叔若在天下衲僧不受寂莫何故不見古雪竇有言寒木在握兮全機可笑秋水橫按兮半提可滅使八極頂目者不自爭衡見斯人兮駕御昂枿應庵華禪師長蘆到上堂風行草偃水到渠成夙世冤家同門出入聞禪聞道似鴨聽雷見佛見祖如風過樹隔江見剎竿便回去脚跟下好與三十棒未足觀光直須眉毛廝結同生同死且道五逆聞雷一句作麼生道良久云上大人丘乙己密庵傑禪師國清直庵和尚到上堂雲開千嶂出木落一枝分相見又無事不來還憶君復舉芙蓉和尚一日訪實性大師大師陞座以右手拈拄杖倚左邊云此事若不是芙蓉師兄大難委悉師召大眾云實性大師弄巧成拙鈍置他芙蓉師兄今日國清師兄到來烏巨也不拈拄杖亦不與麼道且道與古人是同是別良久云相逢自有知音知何必清風動天地徑山別峰和尚至上堂舉仰山道東寺師叔若在慧寂不致寂寥師云仰山和尚好語只是語上偏枯靈隱即不然徑山師叔若在靈隱不致寂寥何故閩蜀同風雪巖欽禪師上堂就謝天竺侍者肯頑石省清夢默翁西堂生公臺上橫說竪說直得空花亂墜頑石點頭要且不若淨名室內一點全收報恩恁麼說話敢道更經三生六十劫也未夢見在何故紅蓼岸白蘋洲夕陽西去水東流上堂謝興化首座人從興化來接得劍州信說道凌霄峰頂碁盤元是錢王石硯二十年前一共看今日重逢有何照證展手云面目見在退庵休禪師同參到上堂先師尋常用腦後一鎚卸却學者胸中許多屈曲當年克賓維那曾中興化此毒往往天下叢林喚作超宗異目非惟孤負興化亦乃克賓受辱若是臨濟兒孫終不依草附木資福喜見同參今日傾腸倒腹遂卓拄杖喝一喝云還知先師落處麼伎死禪和如麻似粟高峯妙禪師妙湛無為長老至上堂舉劉鐵磨來參溈山把髻投衙山云老㹀牛汝來也引狗入寨磨云來日臺山大會有齋和尚還去麼癩兒牽伴溈山作臥勢隨邪逐惡磨便出咄直饒逴得便行也是韓盧逐塊千巖長禪師雙林玉溪和尚至上堂天上無彌勒地下無彌勒千門萬戶開輪鎚只一擊下座雙林友雲和尚至上堂路逢道伴交肩過一生參學事畢且道以何為驗拈拄杖卓一下云空手把鋤頭客至上堂披衣登法座道者是高僧將謂多奇特元來百不能西風吹細雨落葉滿空庭有客來相訪青山自送迎天如則禪師雪中客至煨芋作供次示眾懶殘捉我芋頭煨羨我深居似大梅有客無端來借問一花五葉幾時開蘇州呆蘇州呆門外雪成堆徹骨還他凍一回舊同行至上堂透網金鱗何似不入好忽然會得箇入處不是同行也大難蔣山藏主至示眾全提半提全藏半藏十寸是一尺十尺是一丈尺有尺形剪有剪樣拂子也用打圓相楖𣗖橫挑不顧人誌公豈是閑和尚天目禮禪師雲巢巖和尚至上堂舉古德因故人至云相見不揚眉君東我亦西紅霞穿碧落白日繞須彌南湖今日瑞光和尚至且作麼生相見不揚眉君東我亦西紅霞穿碧落白日繞須彌雖然我與古人不同率庵宗和尚至上堂昨夜南山虎咬大蟲不存性命今日金剛與泥神揩背一拶骨出只如雪峰三到投子九上洞山又作麼生無求是處人情好不飲從他酒價高元叟端禪師上堂謝寶中原藏主舉大珠和尚云貧道聞江西和尚道自家寶藏一切具足使用自在不假外求從此一時休去乃至盡十方世界無纖塵不是自家財寶師云馬師一期與麼說大珠一期與麼聞終身不忘得大受用苟非深信堅固安能透頂透底如此中原藏主昔年於古鄮山中顯示此箇法門還有深信堅固得大受用者麼此日特承光降幸望款留斷江首座至上堂山僧昔年行脚駐足茲山育王橫川和尚一偈寄云清溪長短聲獨自倚廊柱三際俱不來一片冷泉水非惟無眾生無佛亦無己短句與長吟遣興適意爾夜半落霜花日輪正卓午寥寥天地間只有寒山子好大眾有祖以來提持衲僧頂𩕳上一著子如石火電光搆得搆不得未免喪身失命總出不得者箇老和尚今日因其得法上足斷江首座垂訪舉似諸人大家薦取上堂兼謝吉祥香長老達磨盡力提持只道得箇不識六祖全身擔荷只道得箇不會小根小器輕心慢心師承學解露布葛藤其可妄生希冀哉東陵法姪久處眾中深諳此事應緣利物一句作麼生道掣斷金鏁天麒麟高舉鐵鞭擊三百愚庵及禪師寶陀古鼎和尚至上堂舉龍牙道雲居師兄得第二句我得第一句師云大小龍牙只知開張大口不覺舌頭拖地山僧茲承寶陀法兄和尚曲勞象駕枉賁空山但愧荒疎無伸供養豈敢妄通消息觀音菩薩將錢買糊餅放下手却是饅頭是第二句且如何是第一句喝一喝下座靈隱天童侍者至上堂舉玄沙因光侍者道師叔若參得禪小姪當打鐵船下海去沙住後令人持書問光云打得鐵船也未光無對後汾陽昭代云只見錐頭利不見鑿頭方玄覺云玄沙也是貧兒思舊債師云大小玄沙光侍者人我未忘互揚家醜千載之下遭人點檢翠屏終不學他古人一切只是如常昨承靈隱天童侍者相訪寒溫纔罷燒香喫茶茶罷送歸客位自然主賓道合叔姪情忘今日陞堂略此敘陳伏希道照無文璨禪師謝寶嚴上堂不撥一塵不露一機錦包特石綿裹秤鎚開先見了直得百寶莊嚴而頂戴之何故有行鬼不識無心人未知恕中慍禪師謝國清清凉開元三藏主上堂向上一路千聖不傳未曾踏著早隔大千清凉山裏萬菩薩拖犁拽耙方廣寺中半千尊者掇供邏齋惟有開元石佛硬糾糾地風吹不入水灑不著五千餘卷言言異一一龍宮海藏來仲膚首座允藏主至上堂風行草偃水到渠成正令既行十方坐斷睦州拶人脚折雲門颺下柴片雖是逸格超宗未免麻纏紙裹也堪笑也堪悲烏石嶺頭相見事知音知後更誰知多福秋江和尚至并侍者進退上堂通宗通途挾帶挾路一句全提萬機頓赴僧問多福如何是多福一叢竹福云一莖兩莖斜僧云學人不會福云二莖四莖曲奇怪諸禪德是牛鼻勒芒繩是馬口啣生鐵提妙明之心印用格外之生機還他多福始得且者僧與麼問還有孤負處麼金鷄啼向玉闌干一聲直透須彌頂愚極慧禪師謝劍南儒藏主雲谷慶藏主無則珍藏主上堂舉白雲師祖開堂拈香有云眾中衣鉢道友有一言半句利益我者同伸報謝山僧乍住二三故人遠來相賀又非一言半句者比豈無片香以為供養燒楓香是著菩提邊事燒黃熟是說佛說祖邊事而今猛炳一爐也要盡大地人知道浙西管內嘉興府川原道地且道燒底是什麼香良久云不下閣楚石琦禪師淨慈雪窻光書記至上堂上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也召眾云是什麼語話孔門弟子無人識碧眼胡僧笑點頭諸山至上堂一花開大地春一葉落天下秋動絃別曲貴知音瞬目揚眉早蹉過然則不犯之令把斷要津無味之談塞斷人口德山棒臨濟喝俱胝竪指魯祖面壁歸宗斬蛇大隋燒畬石鞏張弓子湖看狗或則平田淺草或則鐵壁銀山或則掣電轟雷或則和泥合水全提正印獨振宏綱檢點將來不無滲漏所以即心即佛今時未入玄微非心非佛猶是指蹤之極向上一路千聖不傳學者勞形如猿捉影還有趣向分也無平蕪盡處是青山行人更在青山外復舉僧問黃龍璣和尚云禪以何為義璣云以謗為義師云若有人問南湖禪以何為義向他道以贊為義且道謗的是贊底是眼見則瞎耳聽則聾口說則啞心思則窮天際雪埋千尺石洞門凍折數株松無夢噩書記至上堂舉白雲端和尚云寫盡千張紙徒煩心手勞人情如太華爭似道情高師云大小白雲猶有者箇在永祚承無夢師兄相訪麤茶淡話兀坐忘懷若有一箇元字脚彼此不著便何也人平不語水平不流道舊至上堂舉颯颯凉風景同人訪寂寥煑茶山下水燒鼎洞中樵師云白雲老人家貧難辦素食事忙不及草書只是不合將常住物入自己用諸山講主至上堂先聖道諸法不自生亦不從他生不共不無因是故說無生盡大地是餬餅任你橫咬竪咬西天那爛陀寺裏一萬來僧人人得喫只有摩訶迦羅大神不得喫把須彌山一摑百雜碎帝釋𨁝跳上梵天去也同參至上堂舉泉大道訪慈明明云片雲橫谷口遊人何處來泉云夜來何處火燒出古人墳明云未在更道泉便作虎聲明便打一坐具泉推明向禪床上明却作虎聲泉云我見八十餘員善知識惟師繼得臨濟宗風師云錯下名言當時慈明爭容得者風顛漢恁麼道更與一坐具且看他作箇什麼伎倆纔眼目定動便連棒趂出臨濟法道未至寂寥了庵和尚退靈巖回敘謝上堂夫為善知識者驅耕奪食轉凡成聖其見善知識者如見青蓮華眼根清淨其聞善知識說法者如餐香積國飯毛孔俱香靈巖禪師之謂也再歸擕李深愜鄙懷龍象參陪幸希珍重南石琇禪師前荊溪南嶽天錫和尚至上堂舉大顛通禪師因水空和尚來顛把住坐具云不用通時暄亦不用通來處空云擬欲恁麼又恐人情不足顛放手云還足也未空提起坐具云若通時暄恐迷來處顛云暫時相見也無妨靈巖今日承南嶽天錫和尚到來通時暄了便云從虎丘來特為相賀來處不迷人情周足諸人總是不知賴有露柱證明光孝仲虗法弟禪師至上堂楊岐牽犁九峰拽耙閒言語道吾作舞雪峰輥毬閒言語光孝仲虗和尚則不然凌霄峰頂碁盤石攤向門前賣與人誰道于今行市少一番提起一番新且道靈巖又作麼生卓拄杖下座了庵欲禪師客至上堂三世如來同一舌大藏教中無法說衲僧手裏定盤星萬里長天耀孤月首座有長處且不循途轍荊棘林中放步行出時人釘根楔妙智長老至上堂瞿曇舌頭無骨妙智皮下有血西天解守蠟人氷東土不聞鵝護雪翻思百丈有三訣喫茶珍重歸堂歇末法師僧幾箇知茫茫弄巧翻成拙喝蹊首座至上堂杲日麗天盲人摸地本色衲僧無處出氣豈不見興化一日同參到纔上法堂化便喝僧亦喝化又喝僧復喝化云你看者瞎漢猶作主在僧擬議化拽拄杖直打下法堂侍者云者僧觸忤和尚化云是他適來也有權也有實也有照也有用及乎我將手向伊面前橫兩橫便去不得似者般瞎漢不打更待何時阿呵呵獅子兒返躑龍馬駒𨁝跳打破上頭關主賓俱失照有底便道當時好再與一喝不然掀倒禪床拂袖而去有甚共語處山僧不逢別者終不開拳適值大道師兄遠臨要使現前一眾與他古人兩得相見還委悉麼青山不鎻長飛勢滄海合知來處高永福頴首座至上堂離四句絕百非摩訶演法夢裏提持敢問大眾夢裏覺裏是同是別若也道得倜儻分明非惟小釋迦無遁形之地便可將鄱陽三百里水面納向鴛鴦湖一滴之中直是不寬不隘無欠無餘還委悉麼驚群須是英靈漢敵勝還他獅子兒鷄足西堂至上堂鷄足峰前風悄然能仁堂下浪黏天騰身抹過青霄外一曲胡笳奏未圓山僧數日拋離大眾昨晚歸來得與飲光尊者相見既曰情忘彼我自然道叶主賓提起陳年葛藤直是牽拽不斷眾中莫有一刀兩段底麼良久云設有也是草裏漢末宗西堂至上堂并謝頭首一大藏教道什麼如是我聞先已錯廣福堂前正令行空裏磨盤生八角主賓互換縱奪臨時掀翻大海躍倒須彌擊拂子太湖三萬六千頃月在波心說向誰無想仲謀和尚至上堂興化接同參傷鹽仍費醋本覺遇知己目擊而道存棒喝既不施權實將焉措石上與松根相對意自足為復古人非為復今人是到此休論是與非畢竟古今無二致須彌頂上擊金鐘下載清風殊未已喝一喝源首座至上堂二由一有一亦莫守一心不生萬法無咎首座有長處何須更開口萬仞峯頭把釣竿一掣六龍頻入手松間石上不妨暫且盤桓佛祖位中自是推門入白大眾還委悉麼豐城寶劍未出匣夜夜寒光射斗牛禮首座至上堂法昌一力撾皷功臣萬象說禪二老徐六擔板未免各見一邊本覺虗心閱世一切任之自然或則逆風把柁或則順水行船總不妨事所以道寂寥非內寬廓非外寂寥非內也一毫穿眾穴寬廓非外也眾穴一毫收豈不見趙州會下二僧相推不肯作第一座主事白趙州州云總教作第二座主事云教誰作第一座州云裝香著主事云裝香了也州云戒香定香慧香解脫香應庵老祖云趙州下一槌不妨驚群動眾子細檢點將來大似泥裏洗土塊若是薦福門下不用相推第一座也有人第二座也有人第三座也有人雖然不免從頭註過第一座鐵眼銅睛不破第二座陽春白雪無人和第三座真實身心同達磨且道與趙州是同是別若也會得許你具一隻眼若也不會也許你具一隻眼有箇衲僧出來道總不恁麼時如何對他道切忌向鬼窟裏作活計隨機應變本分作家裂半分三輸他敏手到箇裏正如披圖經而升高臺據王令以蒞萬國非惟收放在我抑旦遐邇不遺山僧如斯舉唱要且不是扶他先作簧皷後人何故面前自有五百眾中老作家為汝作證信得及麼擊拂子云棋逢敵手難藏行琴遇知音不厭彈月江印禪師𡺸西堂至上堂喚醒馬耆千載夢招回船子一帆風何如晏坐獅子窟哮吼一聲天地空華藏海十三重都盧收在一塵中若是機輪能獨脫看他八面自玲瓏笑隱訢禪師上堂摩竭掩室拂跡跡生毗邪杜詞雕文喪德何况據曲彔木皷兩片皮如以五采繪畫虗空徒自勞爾山僧尋常不陞此座貴在心心相知而道場豐安二法弟來訪勸請為眾敷揚記得芙蓉訓禪師訪實性大師實性以右手拈拄杖過左邊云此事若非芙蓉師兄也大難委悉諸德看他得底人直是不肯容易動著所以長慶道撞著道伴交肩過一生參學事畢且喚什麼作參學事擊拂子𦏰羊挂角千峰頂更有𦏰羊在上頭百丈和尚朝覲回上堂一扭鼻頭痛一喝雙耳聾黃金不重鑛獨坐大雄峰佛智先師將百丈祖師活計一時併蕩賴有東陽法弟向九重城裏萬乘之前全璧而歸致令山僧均受光寵今日不敢囊藏對眾明明顯示諸人要識祖師麼拈拄杖擲下云西天此土無人識五百生前箇野狐護法至致謝提綱白雲端禪師郭功甫入山上堂夜來枕上作得箇山頌謝功甫大儒廬山二十年故舊今日遠訪白雲舉似大眾請已後分明舉似諸方此頌豈惟謝功甫大儒直要與天下有鼻孔衲僧脫却著肉汗衫莫言不道乃云上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也楊長官至云自古自今說理說事者如稻麻竹葦會禪者更比比然討一箇家裏人如天上揀月相似黃梅賢宰楊次公聞名十載有餘夜來忽蒙訪及元來却是一箇本分家裏人杓柄長短鍋子大小雖然未曾一一點過看他數目也甚分明可謂如在東溪日華開葉落時幾擬將黃金鑄作鍾子期昨來當塗郭功甫到曾舉上大人一遍今日次公來更須舉一徧夜凉堂上坐忽聞人叫喚黃梅楊長官來到白雲畔久聞竊吾宗未得當面斷一夜燈火前勘過舊公案所犯一一招也要眾人看鼻直顴骨高一箇沒量漢何日履亨衢吾道聊輝煥共唱太平歌掃盡天下亂文章不礙他兼能大衍筭兩箇五百文依前是一貫吾本來茲土傳法救迷情豈不知一花開五葉結果自然成因風吹火用力不多五祖演禪師王提刑入山上堂舉阿難問迦葉世尊傳金襴外別傳何物迦葉召阿難阿難應諾迦葉云倒却門前剎竿著又永嘉道建法幢立宗旨明明佛勅曹溪是師云迦葉教倒却剎竿永嘉又教立宗旨且道倒底是立底是到者裏須是具擇法眼始得畢竟如何倒也七縱八橫立也二三成六七峰閣上共談玄一句一言清耳目提刑入寺上堂兵隨印轉將逐符行大權菩薩覆護眾生相順者善言誘諭凶頑者枷棒縱橫中間有箇沒量大漢金鎻玄關留不住聖凡位裏莫能收若柰何不得佛法無靈驗白雲有箇消息試說看古人云無邊剎境自他不隔於毫端十世古今始終不離於當念納須彌於芥中擲大千於方外變大地為黃金攪長河為酥酪到者裏合作麼生國土動搖迎勢至寶花彌滿送觀音真淨文禪師王主簿到上堂憶在報寧時彼彼各年少而今住山來各各已衰老休話人間短與長相逢把手呵呵笑呵呵笑逍遙自合無為道驀拈拄杖敲香臺云不可不自在復擲下云不可不逍遙喝一喝下座圓悟勤禪師知縣入山上堂拈香示眾信手拈來光明烜赫結而為葢散而為雲爇向爐中莊嚴知縣宣德妍智道人伏願道心堅固種智圓明遂𢾭座適來錦上鋪華如今鋪華錦上還有明眼底解拈得探得麼試出來激揚看復云心不是佛認心乖宗智不是道立智失旨道本無為佛亦無相於無相無為處辨得去一切諸相悉皆是佛一切所為悉皆是道拈起也天回地轉放下也草偃風行若是向上更不落二落三直下單刀直入其或尚存光彩猶滯皮膚不免向者裏談妙談玄演事演理行棒行喝舉古舉今且道山僧畢竟將什麼為人不住舊時無相貌外尋知識也非真大慧杲禪師張汪二狀元至上堂舉僧問雲門如何是和尚家風門云有讀書人來報師云讀書人已在者裏且作麼生與伊相見乃顧視左右云不是冤家不聚頭張侍郎至上堂古人道我宗無語句實無一法與人恁麼道早是通身浸在屎窖裏了也那堪更踏步向前如之若何問向上向下三要三玄銀盌裏盛雪北斗裏藏身意旨如何豈不是屎窖旁邊更掘屎窖雖然如是若於屎窖中知些氣息方知三世諸佛歷代祖師天下老和尚古往今來一切知識盡在屎窖裏轉大法輪其或未然切忌向屎窖裏著到應庵華禪師韓大尉入山上堂舉朱行軍入南際寺齋僧執手爐行香乃云直下是直下是時有僧云直下是箇什麼行軍便喝僧云行軍是佛法中人惡發作麼行軍云你作惡發會那僧便喝行軍亦喝云鈎在不疑之地遂呼左右認取者僧著師云行軍拈出倚天長劍者僧披襟敢衝雪刃雖然兩不相傷爭柰二俱弄險今日承宣大尉入山齋僧雖無如是問答須知此話已行此話既行且道說箇什麼臥龍纔奮迅丹鳳亦翱翔官客入山上堂釋迦老子道吾有正法眼藏涅槃妙心分付摩訶大迦葉恁麼說話大似旁若無人豈不見陳操尚書一日訪資福福見來以手畫一圓相尚書云弟子恁麼來早是不著便那堪更畫圓相資福便歸方丈閉却門後來雪竇道尚書祇具一隻眼真如喆和尚云資福雖是本分鉗鎚爭柰尚書是煅過了底精金師云雖然如是若到天童門下未放過在當時待尚書道弟子恁麼來早是不著便那堪更畫圓相天童則大開東閣明窻下如法安排何故門內有君子門外君子至密庵傑禪師李侍郎入山上堂幽禽噪破那伽定便見文星入寺來倒屣門迎開笑面林泉陡覺起風雷風雷起處萬壑生春正眼洞明十虗無間手携仲尼日月腰佩佛祖靈符在處為瑞為祥為龜為鑒牆壍法門股肱王室不是神通妙用亦非法爾如然何謂如此自從踏斷千差路便向毗盧頂上行雪巖欽禪師上堂謝青原居士眼空東魯口吸西江機𨦟峻捷不讓老龐仰山者裏別無禪道佛法只有一口吹毛利劍凜凜如霜要為人剪除毛病換骨洗腸長憶江南三月裏鷓鴣啼處百花香高峰妙禪師直翁居士至上堂山僧有一奇特因緣未甞輕易拈出今日幸遇直翁證明供養大眾良久云美食不中飽人餐薌林居士至上堂此事如欲登天目大山相似未到山時不免蘊一座山於八識田中洎至一到所蘊之山恍焉消殞因甚如此竪起拂子云只緣身在此山中復舉老子道湛兮似或存吾不知其誰之子象帝之先師拈云咄哉者漢錯下註脚湛兮似或存吾不知其誰之子毗耶城裏老維摩千巖長禪師東陽陳君釆至示眾舉白雲端因郭功父到云夜來作得箇山偈說向大眾請舉似諸方非惟謝功父大儒且要天下有鼻孔衲僧脫却貼肉汗衫乃云上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也師云白雲固是作家爐鞴功父亦是煆了精金檢點將來好與三十棒何故一箇不合將常住物作私己人情一箇攻乎異端斯害也已要脫他天下衲僧貼肉汗衫倒添了百二十斤黃金鎻甲如何有箇洒洒落落時節無明茅庵之下君釆大儒訪及我也不統夜思量作箇山偈我也不擊皷敘謝廣演條章只有一味杜田禪自然兩眼對兩眼如何是杜田禪喝一喝云朕聞上古其風樸略長翁淨禪師客至上堂陸修靜陶淵明文殊普賢作圓相曰咦一款具呈且道憑誰批判若是孔夫子吾無隱乎爾恕中慍禪師秀才道士相訪上堂竪拂子云三教聖人總在拂子頭上牽枝引蔓說妙談玄儒者曰吾道一以貫之老者曰聖人抱一為天下式佛者曰惟此一事實餘二則非真既各有來由未免稱強稱弱且作麼生判斷使其聲和響順形直影端剖破人我蕃籬塞却無明窟穴擊拂子二由一有一亦莫守日午打三更面南看北斗楚石琦禪師教授俞觀光入山上堂舉雲巖示眾云有箇人家兒子問著無有答不得者洞山問云他屋裏有多少典籍云一字也無山云爭得恁麼多知巖云日夜不曾眠山云問一段事得否巖云道得即不道師云道得即不道作麼生會長恨春歸無覓處不知流入此中來忽都達兒狀元入山上堂舉玉泉浩布裩因東坡居士微服相訪浩問云尊官何姓坡云姓秤是秤天下長老的秤浩唾地云者一唾重多少坡休去師云玉泉是作家宗匠東坡是當世大儒驀劄相逢發揮此道盡謂東坡休去秤尾無星殊不知八兩半斤總在自家手裏雖然如是也須扶起玉泉只如他道者一唾重多少多少人道不得直饒道得更與一唾唯庵然禪師官員至上堂舉昔日朗州刺史李翱慕藥山和尚道風屢請不赴乃肅裝客禮直造座前山默然殊不顧視李乃云見面不如聞名拂袖便行山召李翱李回首山云何得貴耳賤目李遂禮拜起問云如何是道山以手指天復指淨瓶云會麼李云不會山云雲在青霄水在瓶李因有省乃呈偈云煉得身形似鶴形千株松下兩圅經我來問道無餘說雲在青霄水在瓶師云我者裏則不然今日若問龍峰如何是道但云國正天心順官清民自安且道與藥山還有優劣也無靠拄杖下座了庵欲禪師路官馬知事至上堂久雨不晴天道晦冥浸爛鼻孔滴穿眼睛山僧正是煩惱不暇忽然聽得尚書履聲呼童掃榻喚僧點燈抵掌劇談半餉悶中不覺惺惺起來豁開戶牖萬里不挂片雲今朝月望陞高座一炷清香祝聖君天目禮禪師平齋洪中書入山上堂月墮金莖香飄丹桂以我為隱乎吾無隱乎爾老晦堂與麼提撕黃山谷打失鼻孔檢點將來不是不是到宗剎諸山請提綱智門祚禪師到南嶽承天陞座承天師兄早是瞞你諸人了也翠嶺乍到不可雪上更加霜然則一言纔出駟馬難追事到如斯不免塗灰抹土葢為祖禰不了殃及兒孫三十年後鼻孔遼天莫錯怪人好下座雪竇顯禪師到萬壽眾請上堂萬壽門下一一作家葢是強將之兵也雖然如此保福有言擊石火閃電光搆得搆不得未免喪身失命若教據令而行盡蘇臺一境人箇箇三頭六臂到翠峰手裏也須瓦解氷消如今放過一著分付萬壽和尚到越州承天寺眾請陞座作者相見一拶一捺撩起便行若佇思停機卒摸𢱢不著若言問在答處答在問宗箇箇依草附木問不在答處答不在問宗罕見頂上有眼諸人還薦得也無薦得薦不得竝是新雪竇之過且莫鈍致承天和尚白雲端禪師到圓通云秋江清淺時白鷺和煙島良哉觀世音全身入荒草大眾承天未出世時或有一箇半箇衲子相疑著誰知道出世後直得無言可說無理可伸然雖如是猶賴得圓通主人在何謂如此千古萬古無人知眼裏瞳兒看分明到歸宗云真性心地藏無頭亦無尾應緣而化物方便呼為智大眾承天此者來禮拜歸宗師叔師叔若行一丈承天也行一丈師叔若行一尺承天也行一尺何謂如此得風流處且風流有般漢到者裏道耶舍塔高金輪峯峻眨眼回頭早是子過新羅似恁麼還稱得老師叔也無不見道打麵還他州土麥唱歌須是帝鄉人雖然如是三十年後清平過水到開先云莫行舊時路莫挂本來衣如今有人向鋒刃上橫身火焰裏出手盡是勞而無功豈可更擔水向河頭賣然雖如是若教嫫母臨明鏡也道不勞紅粉施到棲賢上堂承天自開堂後便安排些葛藤來山南東葛西葛却為在歸宗開先萬杉一時打疊却了也今日到三峽會裏大似臨嫁醫癭卒著手脚不辦幸望大眾不怪伏惟珍重保寧勇禪師到長蘆上堂未到者裏萬事不言既到者裏如何即是有口有舌何妨亂說有問話者麼再召無人師云猶較些子古資福云隔江見資福剎竿便回脚跟下好與二十保寧昨日離金陵泛小舟渡大江到長蘆門下見剎竿觀佛殿上方丈禮拜祖印禪師蒙不賜罪責特加殷勤何故恩深轉無語懷抱自分明禪師又令對眾陞座不免胡言漢語瞞諸人等是不識好惡更有一頌乘興安然泛小舟霎時風送到江頭不知相見談何事諸高德試道看太平州瑞竹上堂主人命陞此座為眾說法若論此座而無所陞無所不陞若論此法而無所說無所不說三世諸佛亦如是東西祖師亦如是諸人亦如是保寧亦如是既然如是誰是坐者誰是立者誰是說者誰是聽者若也會得已是頭上安頭若也不會一任斬頭覓活五祖演禪師到海會上堂白雲山裏白雲人把定封疆無縫罅無縫罅知幾價莫有知價底麼乃云一二三四五到興化上堂世事冗如麻空門路轉賒青松林下客幾箇得歸家共唱胡笳曲分開五葉花幸逢諸道友同上白牛車大眾車在者裏牛在什麼處芳草渡頭尋不見夜來依舊宿蘆花下座甘露資長老把住師云舒州管界元來有箇草賊師云和尚也須提防資擬議師便拓開圓悟勤禪師到洛浦上堂萬木縈紆一逕遙躭躭古屋枕山腰今朝喜到深深處幾度飛書辱見招爍爍山桃似火絲絲溪柳拖金日暖風和鸎吟燕語所以不離普光殿不出菩提場徧遊華藏海無邊剎境左穿右穴重重無盡一一交羅且作麼生是洛浦深深處覿面若無宗正眼回頭只見翠山巖到梁山上堂擊布皷於龍門曜螢火於太陽到者裏直得藏身無路還有忍俊不禁底麼師復云無生獅子窟哮吼驚群不二栴檀林香風帀座直得言超象外句演真乘道出古今用過佛祖山僧到者裏如何啟口所謂見所未見聞所未聞雖然借路經過不免逢場作戲乃古乃今無彼無此適來覺海舉夾山道太陽溢目萬里不挂片雲清清之水遊魚自迷目前無闍黎此間無老僧若能知雲月是同溪山各異便見但知作佛愁什麼眾生如此則三玄三要八字打開五位君臣一筆勾下諸人還見麼出頭天外看須是箇中人到德山上堂高懸古鏡列萬象於臺前橫按鏌鎁截群機於句下開作家爐鞴奮佛祖鉗鎚演見性之真風紹圓明之宗範直得如天普葢似地普擎頭頭物物明明了了要津坐斷選佛場開到者裏豈可飲氣吞聲不免借華獻水大眾當年見性禪師據一條白棒佛來也打至於隔江搖扇斫木傳心巖頭雪峰唱末後句洞山龍牙明殺活機今古流傳叢林龜鑑而今堂頭繼此真風截斷眾流不存涓滴山僧幸獲觀光敢問人境相稱一句作麼生道五溪清不盡千古美無虧龍門遠禪師到真乘請上堂真乘舉石霜徧界不曾藏語師云徧界不藏全體露絲毫有見事還差會中誰是仙陀客不動纖塵便到家真實到家之者得意忘言竛竮在外之人隨情起解情解既起名相日興言意兩忘十方咸暢豈不見適來堂頭已普告大眾如何更令山野稱提葢為妙旨幽深人難洞達何也既知咫尺之間為什麼却道不覩師顏既言徧界徧空如何更云不曾藏覆還見落節處麼若見得便見石霜老子雪峰大師亦知龍門山僧與真乘長老又此一眾禪和總有分付處山僧未離本院不到此中時真乘無一人龍門長老山僧離本院度荒山來到真乘諸人一一相見此間有一人龍門長老若有一人龍門長老於法成增若無一人龍門長老於法成减减故落斷增故落常既墮斷常豈云正見一似上座未出家時無一人上座既出家後有一人上座你諸人如何裁斷得心地安樂去還裁辨得麼向此有箇入處更有什麼事也或若未明良久曰不解作客久立到蔣山上堂玄沙白紙費封題一聽雷音萬仞低慰釋私懷已無量那堪更唱邏羅哩乃呵呵大笑曰古人道笑須三十年誠哉此語某頃在白雲時與堂上佛果師兄道聚其樂無涯至今樂猶未已也又呵呵大笑云一手一獨拍兩手鳴摑摑舉意超情念相看回路陌摩雲鐘阜高徧界烏輪赫妙機速雷電神珠不在額珍重人天大導師衲僧一見喪魂魄何也誰敢正眼著下座此庵元禪師耿龍學請就淨光陞座靈峰古禪師舉白雲見楊岐岐令舉茶陵悟道頌公案請師批判師乃云諸禪德楊岐大笑眼觀東南意在西北白雲悟去聽事不真喚鐘作甕檢點將來和楊岐老漢都在架子上將錯就錯若是南明即不然我有明珠一顆切忌當頭蹉過雖然覿面相呈也須一鎚打破舉拂子曰還會麼碁逢敵手難藏行詩到重吟始見功雪竇宗禪師初至雪竇日因顯和尚請陞座僧問寶劍未出匣時如何云神光射斗牛僧云出匣後如何云千兵易得一將難求僧退師乃云寶劍未出匣神光射斗牛千兵雖易得一將實難求便下座雪堂行禪師到國清眾請上堂句亦剗意亦剗絕毫絕氂處如山如嶽句亦到意亦到如山如嶽處絕毫絕氂忽若拶通一線意句俱到俱不到俱剗俱不剗直得三句外絕牢籠六句外無標的正當恁麼時一句作麼生道傾葢同途不同轍相將携手上高臺大慧杲禪師到資福請上堂舉香城順和尚頌黃龍三關云黃龍老和尚有箇三關語山僧承嗣伊今日為君舉為君舉猫兒偏解捉老鼠廣鑑英禪師因見此頌乃曰好只好第恐學者作無事會去師云誠哉是言山僧今日也有箇頌子黃龍此語葢天地從來縝密不通風後昆隨例承其響總道猫兒解捉蟲資福乃廣鑑法孫到雪竇請上堂平常無生句妙玄無私句體明無盡句一鏃破三關他家有本據作麼生是他家本據莫怪從前多意氣他家曾踏上頭關復舉僧問明覺禪師如何是諸佛本源明覺云千峰寒色僧云未審向上還有事也無明覺云雨滴巖花師云千峰寒色雨滴巖花今日不妨應時應節若是諸佛本源不得動著為甚麼不得動著自有雪竇主人在到啟霞請上堂適來蒙堂頭法叔禪師舉臨濟訪龍光因緣客聽主裁敢不遵依嚴命略與諸人下箇註脚龍光據坐雖然無語其聲如雷臨濟云者老漢今日敗闕堂頭法叔禪師道那裏是他敗闕處妙喜道路遠夜長休把火大家吹殺暗中行到天童請上堂垂萬里鈎駐千里烏騅布漫天網打衝浪鯤鯨此是天童老人尋常用底育王今日得得入山瞻禮客聽主裁令陞此座到者裏說箇什麼即得莫是說心說性得麼說玄說妙說理說事得麼既總不得不可只恁麼休去既不可休去又不可說心說性說玄說妙說理說事莫是世諦流布得麼若恁麼喚作順水張帆未是衲僧用處雖然如是略借主人威光與大眾赴箇時節且道即今是什麼時節尺蠖之屈乃欲求伸擊碎蟠桃核得見箇中仁箇中仁既見此道出常情且道出常情一句作麼生道還委悉麼眼光爍破四天下主盟此道是渠儂復云適來蒙堂頭老人舉僧問香林如何是衲衣下事林云臘月火燒山師云此是香林語堂頭今日舉育王隨摟𢳯也未敢相許因什麼未敢相許選佛若無如是眼假饒千載又奚為無用全禪師到靈隱請上堂靈山正派達者猶迷明來暗來誰當辨的雙收雙放孰辨端倪直饒千聖出來也祇結舌有分何故人歸大國方為貴水到瀟湘始是清復云適來松源和尚舉竹篦話令天童納敗闕諸人要知麼聽取一頌黑漆竹篦握起迅雷不及掩耳德山臨濟茫然懵底如何插嘴吉祥訥禪師到隱靜上堂五峰影裏雙㵎聲中草木青葱煙雲澹泞風光溢目觸處可觀然雖如是祇如撞著道伴一句作麼生道還知落處麼良久曰玲瓏八面自迴合峭峻一方誰敢窺復曰嘯月吟風水石間忘機嬴得此心閒無端打破空狼藉羞對白雲歸舊山月江印禪師到雪竇眾請上堂向上一路千聖不傳釋迦彌勒仰望不及向上一路千聖不然德山臨濟窺無門故我明覺祖師昔日向妙高臺上唱出陽春白雪直得須彌岌嶪海水騰波十方世界風凜凜地育王今日得得入山瞻禮慈容特蒙堂頭禪師闡揚二覺之家風傾瀉千尋之雪瀑復令山野高陞此座舉唱宗乘然則客聽主裁又說什麼即得擊拂子就樹摘將黃葉去等閒推出白雲來復舉堂頭禪師適來舉臨濟栽松次黃檗問云深山中栽許多松作麼濟云一與山門作境致二與後人作標榜道了以钁頭築地三下檗云雖然子已喫吾三十棒了也濟又以钁頭築地作噓噓聲檗云吾宗到汝大興於世溈山問仰山云當時黃檗只囑一人別更有在仰山云有祇是年代深遠不欲舉似和尚溈云但舉看吾也要知仰云一人指南令行吳越遇大風則止應庵和尚拈云黃檗道雖然如是子已喫吾三十棒了也養子之緣固當如是臨濟正令雖行可惜向钁頭邊甘自活埋仰山見解未出常流豈止遇大風則止當時何不道直待虗空界盡此話方始大行豈不是頭正尾正師乃召大眾云黃檗臨濟兩父子開口不在舌頭上溈山仰山杓卜聽虗聲老應庵劈開太華放出黃河石室翁手然犀炬照開滄海育王見處也要諸人共知一人指南令行吳越太虗空中不消釘橛藕絲竅裏騎大鵬等閒挨落天邊月久立眾慈伏惟珍重朝宗忍禪師到黃檗請上堂斷際出身處黃檗古道場誰云來作客到處是家鄉山僧以昔日同參之誼來訪黃檗法姪承遣僧百里遠迎兼領眾敦請說法雖是一片好心未免彼此鈍置何故聻作家相見嘴盧都何事今朝者也乎大抵欲談辭已喪高陞法座共歡呼辭已喪又歡呼箇甚麼良久云相逢自有知音知何必清風動天地下座主人即隱元禪師箬庵問禪師到報恩玉林和尚請上堂維那宣疏云惟我箬庵法兄大和尚十年以長幸獲比肩某甫三旬兄登不惑賁然惠顧一眾欣慶因某禁足養親不獲對眾引請謹奉先師法服一頂惟願法兄大和尚不忘久入先師之室早已雷震一方恭請披先師衣坐先師座揭露先師正法眼藏令見者聞者同明向上一竅使無知劣弟斗室安眠匪敢攀古人閉門打睡之機亦稍慕高祖死關之遺範云爾師接疏云大眾會麼我堂頭玉林法兄大和尚已為諸人一槌兩當了也伶俐底不妨便請前來對眾激揚眾問話畢乃云問話且止者是什麼所在盡擬向者裏指東畫西說長道短昔年先師於此建立法幢繼得我玉林法兄和尚展開潑天門戶直使舊業維新問上座今日到來直是讚歎莫及何況登他寶座向人天大眾前皷兩片皮欺胡謾漢追憶問上座自見先師二十年來端為此事未甞有絲毫自欺昔日在磬山室中親侍先師受盡鉗鎚耐盡氷雪固是不敢自欺及來到者報恩寺裏輔弼先師合水和泥通身擔荷亦何常有絲毫自欺處迨後先師示寂安厝後事曳杖他山至今八九年來若有一絲毫自欺今日爭敢與我玉林法兄和尚覿面相見既承推出座上為眾舉揚此事更是不得有一絲毫許自欺以欺諸仁者顧左右云且道作麼生是此事那裏是問上座不自欺處還知麼若也知得灼然佛祖向上一機廓爾人天正法眼藏若也不知少間下座伏望諸仁者同詣方丈懇請堂頭和尚不惜屈曲垂慈深錐痛拶惟此敘陳伏希鑒炤下座到萬壽三宜和尚請上堂主賓互換偏正隨機雙𤨏金針縱橫妙叶古佛堂前不留朕跡黃金殿上逈出尊卑者是萬壽和尚尋常瞞人不得處若向言中取則埋沒己靈更若句外旁資辱他先聖不見先德云道則太煞道相續也大難山僧今日借板門槌為諸人略通一線去也卓拄杖云竿頭絲線從君弄不犯清波意自殊
